<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>焼かれた伝説｜入口</title>

<style>

body{
margin:0;
font-family:system-ui,-apple-system,"Noto Sans JP",sans-serif;
color:#fff;
background:
radial-gradient(circle at 50% 30%, #1a2040 0%, #070812 60%),
linear-gradient(#05060b,#0c1025);
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
}

/* ===== メイン ===== */

.stage{
width:min(900px,92vw);
text-align:center;
}

/* ===== タイトル ===== */

.logo{
margin-bottom:10px;
}

.logo .jp{
font-weight:1000;
letter-spacing:.16em;
font-size:20px;
}

.logo .en{
font-size:11px;
opacity:.8;
letter-spacing:.22em;
}

/* ===== 扉エリア ===== */

.hero{
position:relative;
display:inline-block;
width:280px;
}

/* ===== 扉 ===== */

.door{
display:block;
width:220px;
margin:0 auto;
cursor:pointer;
}

.door img{
width:100%;
image-rendering:pixelated;
}

/* ===== キャラクター ===== */

.charWrap{
position:absolute;

/* ← 少し左へ移動 */
right:-35px;

/* 高さ */
bottom:90px;

width:120px;
pointer-events:none;
}

.char img{
width:100%;
image-rendering:pixelated;
}

/* ===== 街へ入る ===== */

.doorTag{

/* 扉に対して固定 */
position:absolute;

left:50%;

/* ← 少し上へ移動 */
bottom:24px;

transform:translateX(-50%);

font-weight:900;
font-size:12px;
}

.doorTag a{
color:white;
text-decoration:none;
padding:6px 10px;
border-radius:20px;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.2);
}

/* ===== セリフ ===== */

.msg{
margin-top:30px;
background:#fffdf6;
color:#1a1a1a;
border:3px solid #b98a2c;
border-radius:12px;
padding:16px;
font-weight:900;
}

.name{
font-size:13px;
opacity:.7;
margin-bottom:6px;
}

.text{
font-size:15px;
}

/* ===== スマホ ===== */

@media(max-width:900px){

.hero{
width:240px;
}

.door{
width:200px;
}

/* キャラ左 */
.charWrap{
right:-25px;
bottom:110px;
width:100px;
}

/* 街へ入る */
.doorTag{
bottom:18px;
}

}

</style>
</head>

<body>

<div class="stage">

<div class="logo">
<div class="jp">焼かれた伝説</div>
<div class="en">TAKOYAKI TRADING CARD</div>
</div>

<div class="hero">

<a class="door" href="town/index.html">
<img src="https://ul.h3z.jp/v0hjoXZ3.png">
</a>

<div class="charWrap">
<div class="char">
<img src="https://ul.h3z.jp/X8jPVkhD.png">
</div>
</div>

<div class="doorTag">
<a href="town/index.html">街へ入る</a>
</div>

</div>

<div class="msg">
<div class="name">たこぴ</div>
<div class="text">
ようこそ、焼かれた伝説の入口だたこ。<br>
扉をタップすると街へ入れるたこ。
</div>
</div>

</div>

</body>
</html>
