<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>カード募集板｜たこ焼きトレカ</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Noto+Sans+JP:wght@500;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./assets/matching-board.css">
</head>
<body>
  <div class="page">

    <header class="topbar">
      <button class="topBtn topBtn--back" id="backBtn" aria-label="戻る">←</button>

      <div class="topTitle">
        <h1>カード募集板</h1>
        <p>今日の相手を探すたこ</p>
      </div>

      <a class="topBtn topBtn--book" id="bookBtn" href="./book.html" aria-label="図鑑へ移動">
        <span class="topBtnMain">図鑑</span>
        <span class="topBtnSub">見に行く</span>
      </a>
    </header>

    <section class="hero">
      <div class="heroFrame">
        <img
          id="heroImage"
          class="heroImage"
          src="https://ul.h3z.jp/lqCNnwQH.png"
          alt="カード募集板トップ画像">
      </div>

      <div class="heroSpeechWrap">
        <div class="heroSpeech">
          <div class="heroSpeechBadge">たこぴの一言</div>
          <p id="heroSpeechText">今日は誰に焼かれるたこ？</p>
        </div>
      </div>
    </section>

    <section class="intro">
      <div class="introLeft">
        <h2>今日の募集相手</h2>
        <p>
          条件が合えばマッチ成立たこ。<br>
          成立するとオクトと資材がもらえるたこ。
        </p>
      </div>

      <aside class="legendNotice">
        <div class="legendNoticeBadge">低確率で出現</div>
        <h3>伝説マッチ</h3>
        <p>
          LRやSP相当の相手は別枠で現れるたこ。<br>
          出会えた日はかなりアツいたこ。
        </p>
      </aside>
    </section>

    <main class="board">
      <section class="matchList" id="matchList"></section>
      <section class="legendMatch hidden" id="legendMatch"></section>
    </main>

    <p class="footNote">
      ※ コラボのタネ、ハーフアニバーサリーのタネは報酬に含めないたこ。<br>
      ※ 条件が合わない相手は「片想い」表示になるたこ。
    </p>
  </div>

  <button class="takopiFloat" id="takopiFloat" aria-label="たこぴのひとこと">
    <span class="takopiFloatFace">🐙</span>
    <span class="takopiFloatLabel">たこぴ</span>
  </button>

  <div class="takopiToast" id="takopiToast" aria-live="polite">
    <div class="takopiToastInner" id="takopiToastInner">……知ってるたこ？</div>
  </div>

  <div class="modal" id="jobModal" aria-hidden="true">
    <div class="modalCard" role="dialog" aria-modal="true" aria-labelledby="modalJobName">
      <button class="modalClose" id="jobModalClose" aria-label="閉じる">✕</button>
      <div class="modalBody" id="jobModalBody"></div>
    </div>
  </div>

  <div class="rewardModal" id="rewardModal" aria-hidden="true">
    <div class="rewardCard">
      <div class="rewardCap">マッチ成立</div>
      <h2 class="rewardTitle" id="rewardTitle">……焼けたね</h2>
      <p class="rewardSub" id="rewardSub">報酬を受け取ったたこ。</p>
      <div class="rewardList" id="rewardList"></div>
      <button class="rewardCloseBtn" id="rewardCloseBtn">閉じる</button>
    </div>
  </div>

  <!-- 外部セリフファイル -->
  <script src="./assets/love-lines.js"></script>

  <!-- メイン処理 -->
  <script src="./assets/matching-board.js"></script>
</body>
</html>
