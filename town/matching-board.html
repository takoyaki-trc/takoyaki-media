<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>たこ焼きマッチング板｜たこ焼きトレカ</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Noto+Sans+JP:wght@500;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/matching-board.css">
</head>
<body>
  <div class="page">
    <!-- =========================
         Header
    ========================== -->
    <header class="topbar">
      <button class="topBtn backBtn" id="backBtn" aria-label="戻る">←</button>

      <div class="topTitle">
        <h1>たこ焼きマッチング板</h1>
        <p>条件が合うタコ民と、今日の一枚をつなげるたこ</p>
      </div>

      <button class="topBtn zukanBtn" id="zukanBtn" aria-label="図鑑へ">
        図鑑
        <span>見に行く</span>
      </button>
    </header>

    <!-- =========================
         Hero
    ========================== -->
    <section class="heroSection">
      <div class="heroFrame">
        <img
          id="heroImage"
          class="heroImage"
          src="https://ul.h3z.jp/lqCNnwQH.png"
          alt="たこ焼きマッチング板のトップ画像">
      </div>

      <div class="heroSpeech">
        <div class="heroSpeechBadge">たこぴの一言</div>
        <p id="heroSpeechText">今日は誰に焼かれるたこ？</p>
      </div>
    </section>

    <!-- =========================
         Intro / rule
    ========================== -->
    <section class="introSection">
      <div class="introText">
        <h2>今日のマッチ候補</h2>
        <p>
          条件が合えばマッチ成立たこ。<br>
          成立するとオクトと資材がもらえるたこ。
        </p>
      </div>

      <div class="legendMini">
        <div class="legendMiniBadge">低確率で出現</div>
        <h3>伝説マッチ</h3>
        <p>LRやSP相当の相手は別枠で現れるたこ。出会えた日はかなりアツいたこ。</p>
      </div>
    </section>

    <!-- =========================
         Board
    ========================== -->
    <section class="boardSection">
      <div class="jobList" id="jobList"></div>
      <div class="legendMatch hidden" id="legendMatch"></div>
    </section>

    <p class="pageFootNote">
      ※ コラボのタネ、ハーフアニバーサリーのタネは報酬に含めないたこ。<br>
      ※ 条件が合わない相手は「片想い」表示になるたこ。
    </p>
  </div>

  <!-- =========================
       Floating Takopi
  ========================== -->
  <button class="takopiFloat" id="takopiFloat" aria-label="たこぴのひとこと">
    <span class="takopiFace">🐙</span>
    <span class="takopiLabel">たこぴ</span>
  </button>

  <div class="takopiToast" id="takopiToast">
    <div class="takopiToastInner" id="takopiToastInner">……ねぇ、知ってるたこ？</div>
  </div>

  <!-- =========================
       Detail Modal
  ========================== -->
  <div class="modal" id="jobModal" aria-hidden="true">
    <div class="modalCard" role="dialog" aria-modal="true" aria-labelledby="modalJobName">
      <button class="modalClose" id="jobModalClose" aria-label="閉じる">✕</button>
      <div class="modalBody" id="jobModalBody"></div>
    </div>
  </div>

  <!-- =========================
       Reward Modal
  ========================== -->
  <div class="rewardModal" id="rewardModal" aria-hidden="true">
    <div class="rewardCard">
      <div class="rewardCap">マッチ成立</div>
      <h2 class="rewardTitle" id="rewardTitle">……焼けたね</h2>
      <p class="rewardSub" id="rewardSub">報酬を受け取ったたこ。</p>
      <div class="rewardList" id="rewardList"></div>
      <button class="rewardCloseBtn" id="rewardCloseBtn">閉じる</button>
    </div>
  </div>

  <script src="assets/matching-board.js"></script>
</body>
</html>
