<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>焼神の最後の試練</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  body{
    margin:0;
    font-family:"DotGothic16","MS Gothic",sans-serif;
    background:linear-gradient(180deg,#2a1450,#130722);
    color:#fff8e8;
    padding:16px;
  }
  .wrap{max-width:440px;margin:0 auto;}
  .panel{
    border-radius:20px;
    background:linear-gradient(180deg,rgba(111,52,179,.72),rgba(47,20,86,.96));
    border:2px solid rgba(255,223,150,.42);
    overflow:hidden;
    box-shadow:0 14px 30px rgba(0,0,0,.35);
  }
  .head{
    padding:16px;
    text-align:center;
    font-family:"Press Start 2P",monospace;
    font-size:14px;
    line-height:1.8;
    color:#ffe7b0;
    background:linear-gradient(180deg,#4c287a,#281248);
  }
  .body{padding:14px;}
  .note{text-align:center;line-height:1.8;color:#e9dcc0;font-size:13px;margin-bottom:12px;}
  .status{text-align:center;margin-bottom:12px;font-family:"Press Start 2P",monospace;font-size:11px;line-height:1.8;}
  .farm{
    background:linear-gradient(180deg,#6f4b1e,#473113);
    border-radius:18px;
    padding:12px;
    box-shadow:inset 0 0 0 2px rgba(255,255,255,.08);
  }
  .holes{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
  }
  .hole{
    aspect-ratio:1/1;
    border-radius:16px;
    background:radial-gradient(circle at 50% 60%,#1a1107 0 34%,#6e4c1c 36%,#9b6f2e 70%,#5b3d16 100%);
    position:relative;
    overflow:hidden;
  }
  .mole{
    position:absolute;
    left:50%;
    bottom:-100%;
    transform:translateX(-50%);
    width:70%;
    aspect-ratio:1/1;
    border-radius:50%;
    background:radial-gradient(circle at 50% 40%,#ffd36f,#d67722 60%,#8e4513);
    border:3px solid rgba(255,245,190,.55);
    display:grid;
    place-items:center;
    font-size:28px;
    cursor:pointer;
    transition:bottom .14s ease;
    user-select:none;
  }
  .mole.show{ bottom:12%; }
  .bar{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:12px;
  }
  .box{
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,223,140,.16);
    border-radius:14px;
    padding:10px;
    text-align:center;
    line-height:1.7;
  }
  .btn{
    width:100%;
    min-height:52px;
    border:0;
    border-radius:15px;
    cursor:pointer;
    font-size:18px;
    font-weight:900;
    font-family:"DotGothic16","MS Gothic",sans-serif;
    color:#2d220f;
    background:linear-gradient(180deg,#ffe98a 0%,#efc445 100%);
    border:2px solid rgba(120,93,45,.42);
    margin-top:14px;
  }
  .btn.secondary{
    background:linear-gradient(180deg,#fffef8 0%,#efe7d0 100%);
  }
  .result{
    margin-top:12px;
    padding:12px;
    border-radius:14px;
    background:rgba(255,255,255,.08);
    line-height:1.8;
    text-align:center;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <div class="head">焼神の最後の試練</div>
    <div class="body">
      <div class="note">たこ焼きファーム風の畑で、飛び出すたこ焼きを叩け。</div>
      <div class="status" id="status">準備中...</div>
      <div class="farm">
        <div class="holes" id="holes"></div>
      </div>
      <div class="bar">
        <div class="box">HIT<br><strong id="hit">0</strong></div>
        <div class="box">MISS<br><strong id="miss">0</strong></div>
      </div>
      <div class="result" id="result">20秒以内にできるだけ多く叩こう</div>
      <button class="btn" id="startBtn" type="button">試練開始</button>
      <button class="btn secondary" id="cancelBtn" type="button">戻る</button>
    </div>
  </div>
</div>

<script>
(() => {
  "use strict";

  const LS_TRIAL_SESSION = "ttc_god_trial_session_v1";
  const LS_TRIAL_RESULT  = "ttc_god_trial_result_v1";
  const EXPECTED_SEED = "seed_god_yaki";

  const holesEl = document.getElementById("holes");
  const statusEl = document.getElementById("status");
  const hitEl = document.getElementById("hit");
  const missEl = document.getElementById("miss");
  const resultEl = document.getElementById("result");
  const startBtn = document.getElementById("startBtn");
  const cancelBtn = document.getElementById("cancelBtn");

  let session = null;
  let playing = false;
  let hit = 0;
  let miss = 0;
  let left = 20;
  let timer = null;
  let spawn = null;
  let currentHole = -1;

  function loadSession(){
    try{
      return JSON.parse(localStorage.getItem(LS_TRIAL_SESSION) || "null");
    }catch{
      return null;
    }
  }

  function saveResult(grade, score){
    if(!session) return;
    localStorage.setItem(LS_TRIAL_RESULT, JSON.stringify({
      sessionId: session.sessionId,
      seedId: EXPECTED_SEED,
      grade,
      score,
      at: Date.now()
    }));
  }

  function goBack(){
    if(session?.returnTo){
      location.href = session.returnTo;
    }else{
      history.back();
    }
  }

  function buildHoles(){
    holesEl.innerHTML = "";
    for(let i=0;i<6;i++){
      const hole = document.createElement("div");
      hole.className = "hole";
      hole.innerHTML = `<button class="mole" type="button">🐙</button>`;
      const mole = hole.querySelector(".mole");
      mole.addEventListener("click", () => {
        if(!playing) return;
        if(currentHole === i && mole.classList.contains("show")){
          hit++;
          hitEl.textContent = hit;
          mole.classList.remove("show");
          currentHole = -1;
        }
      });
      holesEl.appendChild(hole);
    }
  }

  function hideAll(){
    holesEl.querySelectorAll(".mole").forEach(v => v.classList.remove("show"));
    currentHole = -1;
  }

  function pop(){
    if(!playing) return;
    const idx = Math.floor(Math.random() * 6);
    const moles = holesEl.querySelectorAll(".mole");

    if(currentHole >= 0 && moles[currentHole]?.classList.contains("show")){
      miss++;
      missEl.textContent = miss;
    }

    hideAll();
    currentHole = idx;
    moles[idx].classList.add("show");
  }

  function finish(){
    playing = false;
    clearInterval(timer);
    clearInterval(spawn);
    hideAll();

    let grade = "fail";
    if(hit >= 18) grade = "perfect";
    else if(hit >= 13) grade = "great";
    else if(hit >= 8) grade = "clear";

    saveResult(grade, hit);
    statusEl.textContent = "試練終了";
    resultEl.innerHTML = `結果：${grade}<br>HIT ${hit} / MISS ${miss}`;
    startBtn.disabled = true;
    startBtn.textContent = "結果を持ち帰る";
    startBtn.disabled = false;
    startBtn.onclick = goBack;
  }

  function start(){
    if(!session || session.seedId !== EXPECTED_SEED){
      alert("試練セッションが見つかりません");
      return;
    }

    playing = true;
    hit = 0;
    miss = 0;
    left = 20;
    hitEl.textContent = "0";
    missEl.textContent = "0";
    resultEl.textContent = "モグラたたき開始";
    statusEl.textContent = "残り 20 秒";
    startBtn.disabled = true;

    pop();
    timer = setInterval(() => {
      left--;
      statusEl.textContent = `残り ${left} 秒`;
      if(left <= 0) finish();
    }, 1000);

    spawn = setInterval(pop, 650);
  }

  session = loadSession();
  buildHoles();

  if(!session || session.seedId !== EXPECTED_SEED){
    statusEl.textContent = "無効な試練です";
    resultEl.textContent = "称号ページからやり直してください";
    startBtn.disabled = true;
  }

  startBtn.addEventListener("click", start);
  cancelBtn.addEventListener("click", goBack);
})();
</script>
</body>
</html>
