<title>たこ焼きタイミングタワー</title>
<style>
  :root{
    --w: 420px;
    --h: 720px;
  }
  *{ box-sizing:border-box; }

  html, body{
    margin:0;
    padding:0;
    width:100%;
    min-height:100%;
  }

  body{
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Yu Gothic", sans-serif;
    background:#0f1115;
    color:#fff;
    display:flex;
    min-height:100svh;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }

  .wrap{
    width:min(var(--w), 100vw);
    min-height:100svh;
    padding:10px 10px 12px;
    display:flex;
    flex-direction:column;
    gap:8px;
  }

  .hud{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin:2px 2px 0;
    font-size:14px;
    opacity:.95;
    flex:0 0 auto;
  }
  .hud b{ font-size:16px; }

  .panel{
    background:#141824;
    border:1px solid rgba(255,255,255,.08);
    border-radius:14px;
    overflow:hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,.35);
    position:relative;
    flex:1 1 auto;
    display:flex;
    flex-direction:column;
    min-height:0;
  }

  canvas{
    display:block;
    width:100%;
    height:auto;
    background:
      radial-gradient(120% 80% at 50% 15%, rgba(255,255,255,.06), rgba(0,0,0,0) 50%),
      linear-gradient(#0f1320, #0b0d13);
    touch-action:manipulation;
    flex:1 1 auto;
  }

  .controls{
    display:flex;
    gap:10px;
    padding:10px;
    background: rgba(0,0,0,.18);
    border-top:1px solid rgba(255,255,255,.08);
    flex:0 0 auto;
  }
  button{
    flex:1;
    appearance:none;
    border:0;
    border-radius:12px;
    padding:14px 12px;
    font-weight:700;
    font-size:16px;
    color:#111;
    background:#ffd34d;
    cursor:pointer;
  }
  button.secondary{
    background:#2a3147;
    color:#fff;
    font-weight:600;
  }

  .toast{
    position:absolute;
    left:50%;
    top:18%;
    transform:translateX(-50%);
    background: rgba(0,0,0,.55);
    border:1px solid rgba(255,255,255,.18);
    padding:10px 14px;
    border-radius:999px;
    font-weight:800;
    letter-spacing:.02em;
    opacity:0;
    transition: opacity .15s ease, transform .15s ease;
    pointer-events:none;
    white-space:nowrap;
    z-index:5;
  }
  .toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(-2px);
  }

  .hint{
    font-size:12px;
    opacity:.75;
    line-height:1.5;
    margin:0;
    flex:0 0 auto;
  }

  #takoyakiResultOverlay{
    position:absolute;
    inset:0;
    display:none;
    align-items:center !important;
    justify-content:center !important;
    padding:
      max(10px, env(safe-area-inset-top))
      10px
      max(10px, env(safe-area-inset-bottom))
      10px;
    box-sizing:border-box;
    z-index:9999;
  }

  #takoyakiResultOverlay .result-card{
    position:relative;
    width:min(92%, 440px);
    max-height:calc(100% - 8px);
    border-radius:18px;
    border:1px solid rgba(255,255,255,.18);
    background:linear-gradient(180deg, rgba(24,28,40,.95), rgba(12,14,20,.95));
    box-shadow:0 20px 60px rgba(0,0,0,.55);
    display:flex;
    flex-direction:column;
    overflow:hidden;
    box-sizing:border-box;
    transform:translateY(6px) scale(.98);
    opacity:0;
    transition:transform .18s ease, opacity .18s ease;
  }

  #takoyakiResultOverlay .result-scroll{
    flex:1 1 auto;
    min-height:0;
    overflow:auto;
    -webkit-overflow-scrolling:touch;
    padding:12px 12px 8px;
    scrollbar-width:none;
  }
  #takoyakiResultOverlay .result-scroll::-webkit-scrollbar{
    display:none;
  }

  #takoyakiResultOverlay .result-actions{
    flex:0 0 auto;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    padding:10px 12px calc(10px + env(safe-area-inset-bottom));
    border-top:1px solid rgba(255,255,255,.08);
    background:linear-gradient(180deg, rgba(18,22,32,.96), rgba(12,15,22,.98));
  }
  #takoyakiResultOverlay .result-actions button{
    width:100%;
    min-width:0;
    padding:13px 12px;
    border-radius:12px;
    font-size:16px;
    font-weight:800;
  }
  #takoyakiResultOverlay .result-actions .quit-btn{
    background:#2a3147;
    color:#fff;
    font-weight:700;
  }

  .drop-card{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,.14);
    background:rgba(255,255,255,.06);

  }
  .drop-card img{
    width:64px;

  .drop-card .drop-kicker{

  .drop-card .drop-name{

  .drop-card .drop-count{

    line-height:1.4;

  .drop-none{
    padding:10px 12px;
    border-radius:14px;
    border:1px dashed rgba(255,255,255,.18);
    background:rgba(255,255,255,.04);
    margin:8px 0 8px;
    font-size:13px;
    line-height:1.55;
    opacity:.92;
  }

  .tower-drop-splash{
    position:absolute;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    background:
      radial-gradient(circle at center, rgba(255,220,120,.22) 0%, rgba(38,18,4,.94) 28%, rgba(0,0,0,.992) 100%);
    z-index:10020;
    padding:16px;
    overflow:hidden;
  }
  .tower-drop-splash.show{
    display:flex;
    animation:dropOverlayShake .52s ease-out 1;
  }

  .tower-drop-flash{
    position:absolute;
    inset:0;
    background:
      radial-gradient(circle at center, rgba(255,255,255,.96) 0%, rgba(255,224,140,.58) 20%, rgba(255,180,70,.18) 42%, rgba(0,0,0,0) 72%);
    mix-blend-mode:screen;
    pointer-events:none;
    opacity:0;

  .tower-drop-splash.show .tower-drop-flash{
    animation:dropFlash .55s ease-out 1;
  }

  .tower-drop-bg-core{

    left:50%;
    top:50%;

    height:380px;
    transform:translate(-50%,-50%);

  }

  .tower-drop-vignette{
    position:absolute;
    inset:0;
    pointer-events:none;
    background:
      radial-gradient(circle at center, rgba(0,0,0,0) 0%, rgba(0,0,0,.14) 36%, rgba(0,0,0,.82) 100%);
  }

  .tower-drop-particles,
  .tower-drop-confetti{
    position:absolute;
    inset:0;
    pointer-events:none;
    overflow:hidden;
  }

    position:absolute;
    width:10px;
    height:10px;
    border-radius:50%;
    animation:towerParticleFloat 1.8s linear infinite;
    opacity:0;
  }

  .tower-drop-particles span:nth-child(13){ left:8%; top:66%; animation-delay:.14s; animation-duration:1.66s; transform:scale(.82); }

  .tower-drop-confetti span{
    position:absolute;
    top:-20px;

    height:16px;
    border-radius:4px;

  .tower-drop-confetti span:nth-child(1){ left:8%; animation-delay:.00s; transform:rotate(12deg); }
  .tower-drop-confetti span:nth-child(2){ left:15%; animation-delay:.12s; transform:rotate(-16deg); }

  .tower-drop-rays{
    position:absolute;
    left:50%;
    top:50%;
    width:330px;
    height:330px;
    transform:translate(-50%,-50%);
    pointer-events:none;
    z-index:1;
    opacity:.82;
    filter: blur(.2px);
  }
  .tower-drop-rays span{
    position:absolute;
    left:50%;
    top:50%;
    width:4px;
    height:185px;
    margin-left:-2px;
    transform-origin:50% 0%;
    border-radius:999px;
    opacity:.92;
  }
  .tower-drop-rays span:nth-child(1){ transform:rotate(0deg); }
  .tower-drop-rays span:nth-child(2){ transform:rotate(15deg); }
  .tower-drop-rays span:nth-child(3){ transform:rotate(30deg); }

  .tower-drop-rays span:nth-child(5){ transform:rotate(60deg); }

  .tower-drop-card{
    width:min(430px, 100%);
    border-radius:30px;
    border:1px solid rgba(255,240,205,.30);
    background:
      linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.05) 18%, rgba(0,0,0,.08) 18%, rgba(0,0,0,0) 34%),
      linear-gradient(180deg, rgba(36,26,14,.96), rgba(10,8,12,.98));
    box-shadow:
      0 0 0 1px rgba(255,255,255,.05) inset,
      0 1px 0 rgba(255,255,255,.08) inset,
      0 -20px 34px rgba(0,0,0,.22) inset,
      0 0 44px rgba(255,180,70,.16),
      0 28px 80px rgba(0,0,0,.68);
    padding:20px 18px 18px;
    text-align:center;
    position:relative;
    overflow:hidden;
    animation:towerDropPop .55s cubic-bezier(.18,.88,.25,1.15);
    z-index:3;
  }
  .tower-drop-card::before{
    content:"";
    position:absolute;
    inset:-45%;
    background:
      linear-gradient(120deg,
        rgba(255,255,255,0) 0%,
        rgba(255,248,220,.14) 32%,
        rgba(255,255,255,0) 56%);
    transform: rotate(12deg);
    animation:towerCardShine 1.9s ease-in-out infinite;
    pointer-events:none;
  }
  .tower-drop-card::after{
    content:"";
    position:absolute;
    inset:0;
    border-radius:30px;
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,.04),
      inset 0 36px 40px rgba(255,220,110,.06),
      inset 0 -22px 28px rgba(0,0,0,.34);
    pointer-events:none;
  }

  @keyframes towerDropPop{
    0%{ transform:scale(.58) translateY(24px); opacity:0; }
    55%{ transform:scale(1.06) translateY(-4px); opacity:1; }
    100%{ transform:scale(1) translateY(0); opacity:1; }
  }
  @keyframes dropFlash{
    0%{ opacity:0; }
    18%{ opacity:1; }
    100%{ opacity:0; }
  }
  @keyframes towerCorePulse{
    0%,100%{ transform:translate(-50%,-50%) scale(1); opacity:.82; }
    50%{ transform:translate(-50%,-50%) scale(1.12); opacity:1; }
  }
  @keyframes towerCardShine{
    0%,100%{ opacity:.10; transform:translateX(-16%) rotate(12deg); }
    50%{ opacity:.48; transform:translateX(18%) rotate(12deg); }
  }
  @keyframes towerParticleFloat{
    0%{ transform:translateY(12px) scale(.8); opacity:0; }
    12%{ opacity:1; }
    100%{ transform:translateY(-190px) scale(1.24); opacity:0; }
  }
  @keyframes dropConfettiFall{
    0%{ transform:translateY(-24px) rotate(0deg); opacity:0; }
    12%{ opacity:1; }
    100%{ transform:translateY(460px) rotate(340deg); opacity:0; }
  }
  @keyframes dropOverlayShake{
    0%{ transform:translate3d(0,0,0); }
    15%{ transform:translate3d(-3px,0,0); }
    30%{ transform:translate3d(3px,0,0); }
    45%{ transform:translate3d(-2px,0,0); }
    60%{ transform:translate3d(2px,0,0); }
    100%{ transform:translate3d(0,0,0); }
  }

  .tower-drop-badge{
    display:inline-block;
    padding:7px 14px;
    border-radius:999px;
    font-size:12px;
    font-weight:1000;
    letter-spacing:.12em;
    border:1px solid rgba(255,245,220,.22);
    color:#fff3d7;
    box-shadow:
      0 0 10px rgba(255,210,110,.10),
      inset 0 0 10px rgba(255,255,255,.03);
    margin-bottom:14px;
    position:relative;
    z-index:4;
  }

  .tower-drop-stage{
    position:relative;
    width:100%;
    height:230px;
    margin:0 auto 6px;
    z-index:2;
  }

  .tower-drop-ring{
    width:188px;
    height:188px;
    margin:0 auto;
    border-radius:50%;
    position:absolute;
    left:50%;
    top:44%;
    transform:translate(-50%,-50%);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:3;
  }
  .tower-drop-ring::before,
  .tower-drop-ring::after{
    content:"";
    position:absolute;
    inset:0;
    border-radius:50%;
    border:2px solid rgba(255,225,150,.24);
    animation:towerRingPulse 1.5s ease-out infinite;
  }
  .tower-drop-ring::after{
    inset:14px;
    animation-delay:.22s;
  }
  @keyframes towerRingPulse{
    0%{ transform:scale(.86); opacity:0; }
    22%{ opacity:1; }
    100%{ transform:scale(1.12); opacity:0; }
  }

  .tower-drop-hero-wrap{
    position:absolute;
    left:50%;
    top:44%;
    transform:translate(-50%,-50%);
    width:138px;
    height:164px;
    z-index:5;
    display:flex;
    align-items:center;
    justify-content:center;
    perspective:800px;
  }

  .tower-drop-hero{
    width:118px;
    height:118px;
    border-radius:30px;
    border:1px solid rgba(255,245,215,.22);
    background:
      linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.05) 48%, rgba(0,0,0,.18) 100%),
      rgba(255,255,255,.05);
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:
      0 0 0 1px rgba(255,255,255,.04) inset,
      0 0 30px rgba(255,190,80,.20),
      0 18px 30px rgba(0,0,0,.38);
    position:relative;
    overflow:hidden;
    transform:translateY(30px) scale(.56) rotateX(16deg);
    opacity:0;
  }
  .tower-drop-splash.show .tower-drop-hero{
    animation:towerHeroIntro .56s cubic-bezier(.2,.9,.25,1.25) forwards;
  }
  .tower-drop-hero::before{
    content:"";
    position:absolute;
    inset:-30%;
    background:linear-gradient(120deg,
      rgba(255,255,255,0) 0%,
      rgba(255,255,255,.16) 42%,
      rgba(255,255,255,0) 64%);
    transform:rotate(15deg);
    animation:towerHeroShine 2.2s linear infinite;
  }
  .tower-drop-hero img{
    width:92px;
    height:92px;
    object-fit:cover;
    border-radius:22px;
    display:block;
    position:relative;
    z-index:1;
    box-shadow: 0 10px 20px rgba(0,0,0,.28);
  }
  @keyframes towerHeroIntro{

<body>
<div class="wrap">
  <div class="hud">
    <div>Score: <b id="score">0</b></div>
    <div>Best: <b id="best">0</b></div>
    <div id="state">READY</div>
  </div>

  <div class="panel">
    <div id="toast" class="toast">PERFECT!!</div>
    <canvas id="cv" width="420" height="720" aria-label="たこ焼きタイミングタワー"></canvas>
    <div class="controls">
      <button id="stopBtn" type="button">STOP（タップ）</button>
      <button id="restartBtn" class="secondary" type="button">RESTART</button>
    </div>
  </div>

  <div class="hint" id="hint">
    ・操作は「STOP」だけ。<br/>
    ・下のブロックと重なった分だけ残ります。<br/>
    ・PERFECT（ほぼ同じ位置）だと削れません。<br/>
    ・10階以上で、終了時にタワー肥料の抽選があります。<br/>
  </div>
</div>

<script>
(() => {
  "use strict";

  const TOP_URL = "index.html";
  const LS_MONTHLY_STATS = "ttc_monthly_stats_v1";

  function getMonthKey(date = new Date()){
    return date.getFullYear() + "-" + String(date.getMonth() + 1).padStart(2, "0");
  }

  function defaultMonthlyStats(){
    return {
      monthKey: getMonthKey(),
      harvest: 0,
      sales: 0,
      fishing: 0,
      tower: 0
    };
  }

  function normalizeMonthlyStats(raw){
    const curMonth = getMonthKey();
    if (!raw || typeof raw !== "object") return defaultMonthlyStats();
    const monthKey = String(raw.monthKey || "");
    if (monthKey !== curMonth) return defaultMonthlyStats();
    return {
      monthKey: curMonth,
      harvest: Number(raw.harvest || 0),
      sales: Number(raw.sales || 0),
      fishing: Number(raw.fishing || 0),
      tower: Number(raw.tower || 0)
    };
  }

  function loadMonthlyStats(){
    try{
      const raw = localStorage.getItem(LS_MONTHLY_STATS);
      if (!raw){
        const def = defaultMonthlyStats();
        localStorage.setItem(LS_MONTHLY_STATS, JSON.stringify(def));
        return def;
      }
      const parsed = JSON.parse(raw);
      const norm = normalizeMonthlyStats(parsed);
      localStorage.setItem(LS_MONTHLY_STATS, JSON.stringify(norm));
      return norm;
    }catch(_){
      const def = defaultMonthlyStats();
      localStorage.setItem(LS_MONTHLY_STATS, JSON.stringify(def));
      return def;
    }
  }

  function saveMonthlyStats(stats){
    const norm = normalizeMonthlyStats(stats);
    localStorage.setItem(LS_MONTHLY_STATS, JSON.stringify(norm));
  }

  function updateMonthlyTowerHigh(floor = 0){
    const s = loadMonthlyStats();
    s.monthKey = getMonthKey();
    s.tower = Math.max(Number(s.tower || 0), Math.floor(Number(floor || 0)));
    saveMonthlyStats(s);
  }

  const LS_INV = "tf_v1_inv";

  const TOWER_FERTS = [
    { id: "fert_balance",  name: "天秤にかけた肥料", img: "https://takoyaki-card.com/town/assets/images/hiryou/hiryou6.png" },
    { id: "fert_sleep",    name: "寝かせた肥料",     img: "https://takoyaki-card.com/town/assets/images/hiryou/hiryou7.png" },
    { id: "fert_takoyaki", name: "たこ焼き風味の肥料", img: "https://takoyaki-card.com/town/assets/images/hiryou/hiryou8.png" },
    { id: "fert_drop",     name: "天からの一滴",     img: "https://takoyaki-card.com/town/assets/images/hiryou/hiryou9.png" }
  ];
  const TOWER_FERT_MAP = Object.fromEntries(TOWER_FERTS.map(v => [v.id, v]));

  const DROP_THEME = {
    fert_balance: {
      glow: "#7cc6ff",
      glowSoft: "rgba(124,198,255,.28)",
      accent: "#e7f7ff",
      badgeBg: "linear-gradient(180deg, rgba(130,210,255,.26), rgba(80,150,255,.14))",
      core: "radial-gradient(circle, rgba(190,236,255,.62) 0%, rgba(124,198,255,.28) 38%, rgba(0,0,0,0) 70%)"
    },
    fert_sleep: {
      glow: "#8eff93",
      glowSoft: "rgba(142,255,147,.28)",
      accent: "#effff0",
      badgeBg: "linear-gradient(180deg, rgba(140,255,165,.26), rgba(65,185,95,.14))",
      core: "radial-gradient(circle, rgba(190,255,198,.56) 0%, rgba(142,255,147,.24) 38%, rgba(0,0,0,0) 70%)"
    },
    fert_takoyaki: {
      glow: "#ffbe52",
      glowSoft: "rgba(255,190,82,.30)",
      accent: "#fff5dc",
      badgeBg: "linear-gradient(180deg, rgba(255,210,120,.28), rgba(255,140,50,.14))",
      core: "radial-gradient(circle, rgba(255,236,180,.64) 0%, rgba(255,190,82,.26) 38%, rgba(0,0,0,0) 70%)"
    },
    fert_drop: {
      glow: "#fff1a6",
      glowSoft: "rgba(255,241,166,.32)",
      accent: "#fffef4",
      badgeBg: "linear-gradient(180deg, rgba(255,245,180,.30), rgba(255,210,90,.16))",
      core: "radial-gradient(circle, rgba(255,249,214,.72) 0%, rgba(255,241,166,.30) 38%, rgba(0,0,0,0) 70%)"
    },
    default: {
      glow: "#ffd875",
      glowSoft: "rgba(255,216,117,.28)",
      accent: "#fff4df",
      badgeBg: "linear-gradient(180deg, rgba(255,225,130,.28), rgba(255,180,70,.14))",
      core: "radial-gradient(circle, rgba(255,239,190,.62) 0%, rgba(255,216,117,.26) 38%, rgba(0,0,0,0) 70%)"
    }
  };

  function getDropTheme(itemId){
    return DROP_THEME[itemId] || DROP_THEME.default;
  }

  function loadFarmInv(){
    try{
      const raw = localStorage.getItem(LS_INV);
      if (!raw) return { ver: 1, seed: {}, water: {}, fert: {} };
      const obj = JSON.parse(raw);
      if (!obj || typeof obj !== "object") return { ver: 1, seed: {}, water: {}, fert: {} };
      obj.seed = obj.seed || {};
      obj.water = obj.water || {};
      obj.fert = obj.fert || {};
      for (const f of TOWER_FERTS){
        if (!(f.id in obj.fert)) obj.fert[f.id] = 0;
      }
      return obj;
    }catch(_){
      return { ver: 1, seed: {}, water: {}, fert: {} };
    }
  }

  function saveFarmInv(inv){
    localStorage.setItem(LS_INV, JSON.stringify(inv));
  }

  function addTowerFertToInv(fertId, qty = 1){
    const inv = loadFarmInv();
    inv.fert = inv.fert || {};
    const addQty = Math.max(0, Math.floor(Number(qty || 0)));
    const cur = Math.max(0, Math.floor(Number(inv.fert[fertId] || 0)));
    inv.fert[fertId] = cur + addQty;
    saveFarmInv(inv);
    return inv.fert[fertId];
  }

  function getTowerFertTotal(fertId){
    const inv = loadFarmInv();
    return Math.max(0, Math.floor(Number((inv.fert || {})[fertId] || 0)));
  }

  function getTowerDropConfig(floors){
    const f = Math.floor(Number(floors || 0));
    if (f < 10) return null;
    if (f < 20){
      return {
        rate: 0.25,
        table: [
          { id: "fert_takoyaki", w: 55 },
          { id: "fert_balance",  w: 25 },
          { id: "fert_sleep",    w: 15 },
          { id: "fert_drop",     w: 5  }
        ]
      };
    }
    if (f < 30){
      return {
        rate: 0.35,
        table: [
          { id: "fert_takoyaki", w: 40 },
          { id: "fert_balance",  w: 30 },
          { id: "fert_sleep",    w: 20 },
          { id: "fert_drop",     w: 10 }
        ]
      };
    }
    if (f < 40){
      return {
        rate: 0.45,
        table: [
          { id: "fert_takoyaki", w: 28 },
          { id: "fert_balance",  w: 30 },
          { id: "fert_sleep",    w: 25 },
          { id: "fert_drop",     w: 17 }
        ]
      };
    }
    return {
      rate: 0.55,
      table: [
        { id: "fert_takoyaki", w: 20 },
        { id: "fert_balance",  w: 28 },
        { id: "fert_sleep",    w: 27 },
        { id: "fert_drop",     w: 25 }
      ]
    };
  }

  function pickWeighted(list){
    let total = 0;
    for (const row of list){
      total += Math.max(0, Number(row.w || 0));
    }
    if (total <= 0) return list[0] || null;
    let r = Math.random() * total;
    for (const row of list){
      r -= Math.max(0, Number(row.w || 0));
      if (r <= 0) return row;
    }
    return list[list.length - 1] || null;
  }

  function rollTowerDrop(floors){
    const conf = getTowerDropConfig(floors);
    if (!conf) return { eligible:false, dropped:false, item:null };

    if (Math.random() >= conf.rate){
      return { eligible:true, dropped:false, item:null };
    }

    const picked = pickWeighted(conf.table);
    const item = picked ? TOWER_FERT_MAP[picked.id] : null;
    if (!item) return { eligible:true, dropped:false, item:null };

    const total = addTowerFertToInv(item.id, 1);
    return {
      eligible: true,
      dropped: true,
      item: {
        id: item.id,
        name: item.name,
        img: item.img,
        qty: 1,
        total
      }
    };
  }

  const SPR = {
    takoA: "https://ul.h3z.jp/OPpiBayk.png",
    takoB: "https://ul.h3z.jp/8lVPkSPJ.png",
    takoC: "https://ul.h3z.jp/rbG1ovxG.png",
    takoG: "https://ul.h3z.jp/XPTM8m5U.png",
    takoR: "https://ul.h3z.jp/dXRcAx01.png",
    takoX: "https://ul.h3z.jp/Uia1oOpk.png",
  };

  const IMG = {};
  function loadImages(){
    const entries = Object.entries(SPR);
    let loaded = 0;
    return new Promise((resolve) => {
      if (!entries.length){
        resolve();
        return;
      }
      for (const [key, src] of entries){
        const im = new Image();
        im.onload = () => {
          IMG[key] = im;
          loaded++;
          if (loaded === entries.length) resolve();
        };
        im.onerror = () => {
          console.warn("Image load failed:", key, src);
          loaded++;
          if (loaded === entries.length) resolve();
        };
        im.src = src;
      }
    });
  }

  const cv = document.getElementById("cv");
  const panel = cv.closest(".panel");
  const hud = document.querySelector(".hud");
  const hint = document.getElementById("hint");
  const controls = panel.querySelector(".controls");

  function fitCanvas(){
    const vh = Math.max(320, window.innerHeight);
    const pad = 35;
    const hudH = hud ? hud.getBoundingClientRect().height : 0;
    const hintH = hint ? hint.getBoundingClientRect().height : 0;
    const ctrlH = controls ? controls.getBoundingClientRect().height : 0;
    const maxCanvasH = Math.max(220, vh - (hudH + hintH + ctrlH + pad));
    const aspect = 720 / 420;
    const panelW = panel.getBoundingClientRect().width;
    const byWidthH = panelW * aspect;
    const displayH = Math.min(byWidthH, maxCanvasH);
    const displayW = Math.min(panelW, displayH / aspect);
    cv.style.width = Math.round(displayW) + "px";
    cv.style.height = Math.round(displayH) + "px";
    cv.style.margin = "0 auto";
  }

  window.addEventListener("resize", fitCanvas, { passive:true });
  window.addEventListener("orientationchange", () => setTimeout(fitCanvas, 80), { passive:true });

  const CONF = {
    canvasW: 420,
    canvasH: 720,
    baseWidth: 230,
    blockHDefault: 34,
    minWidth: 34,
    marginX: 16,
    speedBase: 2.25,
    speedPerLevel: 0.085,
    perfectPx: 4,
    grid: true,
    CAMERA_ANCHOR_Y: 0.28,
    CAMERA_SMOOTH: 0.16,
    CAMERA_MIN: 0,
    KEEP_BLOCKS_DRAW: 140,
    BASE_BOOST: [1.65, 1.55, 1.45, 1.35, 1.25],
    SCORE_BASE0: 60,
    SCORE_PER_FLOOR: 10,
    SPEED_BONUS_FAST_MS: 450,
    SPEED_BONUS_MID_MS: 850,
    SPEED_BONUS_FAST: 40,
    SPEED_BONUS_MID: 20,
    PERFECT_MUL: 1.30,
    NEAR_MUL: 1.12,
    COMBO_MUL_ADD: 0.05,
    MUL_CAP: 2.00,
  };

  const BLOCK_TABLE = [
    { key:"takoA", p: 44, h: 64, label:"素焼き（薄）", speedMul: 1.05 },
    { key:"takoB", p: 40, h: 64, label:"イカさま（標準）", speedMul: 1.22 },
    { key:"takoC", p: 30, h: 64, label:"生焼け（厚）", speedMul: 1.60 },
    { key:"takoG", p: 10, h: 64, label:"金焼き", perfectPlus: 3, speedMul: 1.25 },
    { key:"takoR", p:  7, h: 64, label:"激辛", speedMul: 1.4 },
    { key:"takoX", p:  4, h: 64, label:"虹伝説", insurance: true, speedMul: 1.10 },
  ];

  let lastKey = null;
  function pickBlockDef(){
    let total = 0;
    for (const d of BLOCK_TABLE) total += (d.p ?? 1);
    for (let tries=0; tries<8; tries++){
      let r = Math.random() * total;
      for (const d of BLOCK_TABLE){
        r -= (d.p ?? 1);
        if (r <= 0){
          if (d.key === lastKey) break;
          lastKey = d.key;
          return d;
        }
      }
    }
    const fb = BLOCK_TABLE[Math.floor(Math.random() * BLOCK_TABLE.length)];
    lastKey = fb.key;
    return fb;
  }

  const ctx = cv.getContext("2d");
  const scoreEl = document.getElementById("score");
  const bestEl  = document.getElementById("best");
  const stateEl = document.getElementById("state");
  const toastEl = document.getElementById("toast");
  const stopBtn = document.getElementById("stopBtn");
  const restartBtn = document.getElementById("restartBtn");

  const BEST_POINT_KEY = "takoyakiTimingTower_best_points";
  function loadBestPoints(){
    const v = Number(localStorage.getItem(BEST_POINT_KEY) || 0);
    return Number.isFinite(v) ? v : 0;
  }
  function saveBestPoints(v){
    localStorage.setItem(BEST_POINT_KEY, String(v));
  }

  const S = {
    playing: false,
    over: false,
    ending: false,
    floors: 0,
    points: 0,
    bestPoints: loadBestPoints(),
    mul: 1.0,
    comboPerfect: 0,
    level: 0,
    cameraY: 0,
    dir: 1,
    blocks: [],
    curr: null,
    allBlocks: [],
    lastTitle: "",
    lastSubtitle: "",
    lastRunAt: "",
    lastRunFloors: 0,
    lastRunPoints: 0,
    lastDrop: null,
    lastFrameT: 0,
  };

  function showToast(text){
    toastEl.textContent = text;
    toastEl.classList.add("show");
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => toastEl.classList.remove("show"), 520);
  }

  const SKY_COLORS = {
    morning:{ top:"#cfe8ff", bottom:"#fff2d4" },
    day:    { top:"#a9cfe6", bottom:"#eaf5fb" },
    sunset: { top:"#f0b38c", bottom:"#6b4e71" },
    night:  { top:"#0b132b", bottom:"#1c2541" },
    space:  { top:"#050710", bottom:"#0a1030" },
    flare:  { top:"#05060b", bottom:"#14070b" },
  };

  function getTimePhase(floors){
    const f = Math.floor(Number(floors) || 0);
    if (f <= 10) return "morning";
    if (f <= 20) return "day";
    if (f <= 30) return "sunset";
    if (f <= 40) return "night";
    if (f <= 50) return "space";
    return "flare";
  }

  const STAR_FIELD = (() => {
    const stars = [];
    const N = 180;
    for (let i=0; i<N; i++){
      const x = Math.random() * CONF.canvasW;
      const y = Math.random() * CONF.canvasH;
      const r = (Math.random() < 0.12) ? 2 : 1;
      const a = 0.25 + Math.random() * 0.55;
      const hue = (Math.random() < 0.18) ? (190 + Math.random()*40) : (0 + Math.random()*20);
      stars.push({ x, y, r, a, hue });
    }
    return stars;
  })();

  function drawStars(alpha=1.0, density=1.0){
    const count = Math.max(0, Math.floor(STAR_FIELD.length * density));
    ctx.save();
    ctx.globalAlpha = alpha;
    for (let i=0; i<count; i++){
      const s = STAR_FIELD[i];
      ctx.fillStyle = `hsla(${s.hue}, 80%, 88%, ${s.a})`;
      ctx.fillRect((s.x|0), (s.y|0), s.r, s.r);
      if (s.r >= 2){
        ctx.fillRect((s.x|0)+1, (s.y|0)-1, 1, 1);
        ctx.fillRect((s.x|0)-1, (s.y|0)+1, 1, 1);
      }
    }
    ctx.restore();
  }

  function drawSolarFlare(){
    const cx = CONF.canvasW * 0.52;
    const cy = CONF.canvasH * 1.12;
    const R  = CONF.canvasH * 0.85;

    ctx.save();
    const g0 = ctx.createRadialGradient(cx, cy, R*0.08, cx, cy, R);
    g0.addColorStop(0.00, "rgba(255,240,200,.95)");
    g0.addColorStop(0.18, "rgba(255,190,90,.70)");
    g0.addColorStop(0.42, "rgba(255,120,40,.42)");
    g0.addColorStop(0.70, "rgba(240,60,30,.18)");
    g0.addColorStop(1.00, "rgba(0,0,0,0)");
    ctx.fillStyle = g0;
    ctx.fillRect(0,0,CONF.canvasW, CONF.canvasH);
    ctx.restore();

    ctx.save();
    ctx.globalCompositeOperation = "lighter";
    ctx.translate(cx, CONF.canvasH * 0.72);
    const rays = 10;
    for (let i=0; i<rays; i++){
      const ang = (-0.55 + i*(1.10/(rays-1))) + (Math.sin((i+1)*3.1)*0.03);
      ctx.save();
      ctx.rotate(ang);
      const w = 10 + i*1.2;
      const h = CONF.canvasH * 0.95;
      const g = ctx.createLinearGradient(0, 0, 0, -h);
      g.addColorStop(0.00, "rgba(255,210,120,.35)");
      g.addColorStop(0.35, "rgba(255,130,60,.14)");
      g.addColorStop(1.00, "rgba(0,0,0,0)");
      ctx.fillStyle = g;
      ctx.fillRect(-w/2, 40, w, -h);
      ctx.restore();
    }
    ctx.restore();

    ctx.save();
    ctx.globalCompositeOperation = "screen";
    const gx = ctx.createRadialGradient(CONF.canvasW*0.52, CONF.canvasH*0.22, 0, CONF.canvasW*0.52, CONF.canvasH*0.22, CONF.canvasW*0.55);
    gx.addColorStop(0.00, "rgba(255,240,220,.10)");
    gx.addColorStop(0.25, "rgba(255,180,120,.08)");
    gx.addColorStop(0.55, "rgba(255,80,60,.04)");
    gx.addColorStop(1.00, "rgba(0,0,0,0)");
    ctx.fillStyle = gx;
    ctx.fillRect(0,0,CONF.canvasW, CONF.canvasH);
    ctx.restore();
  }

  function drawBG(){
    const phase = getTimePhase(S.floors);
    const sky = SKY_COLORS[phase] || SKY_COLORS.day;
    const grad = ctx.createLinearGradient(0,0,0,CONF.canvasH);
    grad.addColorStop(0, sky.top);
    grad.addColorStop(1, sky.bottom);
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,CONF.canvasW, CONF.canvasH);

    if (phase === "night"){
      drawStars(0.90, 0.55);
    } else if (phase === "space"){
      drawStars(1.00, 0.95);
      ctx.save();
      const neb = ctx.createRadialGradient(CONF.canvasW*0.30, CONF.canvasH*0.35, 0, CONF.canvasW*0.30, CONF.canvasH*0.35, CONF.canvasW*0.70);
      neb.addColorStop(0.00, "rgba(120,160,255,.10)");
      neb.addColorStop(0.35, "rgba(180,120,255,.06)");
      neb.addColorStop(1.00, "rgba(0,0,0,0)");
      ctx.fillStyle = neb;
      ctx.fillRect(0,0,CONF.canvasW, CONF.canvasH);
      ctx.restore();
    } else if (phase === "flare"){
      drawStars(0.85, 0.75);
      drawSolarFlare();
    }

    if (!CONF.grid) return;
    ctx.save();
    ctx.globalAlpha = 0.08;
    const step = 30;
    for (let y=0; y<CONF.canvasH; y+=step){
      ctx.beginPath();
      ctx.moveTo(0,y);
      ctx.lineTo(CONF.canvasW,y);
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 1;
      ctx.stroke();
    }
    ctx.restore();
  }

  function makeBlock({ x, width, y, h, tileKey, label="", perfectPlus=0, speedMul=1, insurance=false, spawnedAt=0 }){

  function pushConfirmedBlock(b){
    S.blocks.push(b);
    S.allBlocks.push({ x: b.x, y: b.y, width: b.width, h: b.h, tileKey: b.tileKey });
    if (CONF.KEEP_BLOCKS_DRAW > 0 && S.blocks.length > CONF.KEEP_BLOCKS_DRAW){
      S.blocks = S.blocks.slice(S.blocks.length - CONF.KEEP_BLOCKS_DRAW);
    }
  }

  function spawnBase(){
    const def = pickBlockDef();
    const w = CONF.baseWidth;
    const x = (CONF.canvasW - w) / 2;
    const y = CONF.canvasH - 90;

    const base = makeBlock({
      x, width: w, y,
      h: def.h ?? CONF.blockHDefault,
      tileKey: def.key,
      label: def.label || "",
      perfectPlus: def.perfectPlus || 0,
      speedMul: def.speedMul || 1,
      insurance: !!def.insurance
    });

    S.blocks = [];
    S.allBlocks = [];
    pushConfirmedBlock(base);
    S.level = 1;
  }

  function spawnCurrent(){
    const prev = S.blocks[S.blocks.length - 1];
    const def = pickBlockDef();
    const w = prev.width;
    const h = def.h ?? CONF.blockHDefault;
    const y = prev.y - h;
    const startLeft = (S.level % 2 === 0);
    const x = startLeft ? CONF.marginX : (CONF.canvasW - CONF.marginX - w);
    S.dir = startLeft ? 1 : -1;

    S.curr = makeBlock({
      x, width: w, y, h,
      tileKey: def.key,
      label: def.label || "",
      perfectPlus: def.perfectPlus || 0,
      speedMul: def.speedMul || 1,
      insurance: !!def.insurance,
      spawnedAt: performance.now(),
    });

    if (S.curr.insurance) showToast("🌈 虹伝説（1回セーフ）");
    else if ((S.curr.perfectPlus||0) > 0) showToast("🥇 金焼き（甘判定）");
    else if ((S.curr.speedMul||1) > 1.9) showToast("🌶 激辛（高速）");
  }

  function getTopMostY(){
    let topY = Infinity;
    for (const b of S.blocks){
      if (Number.isFinite(b.y)) topY = Math.min(topY, b.y);
    }
    if (S.curr && Number.isFinite(S.curr.y)) topY = Math.min(topY, S.curr.y);
    if (!Number.isFinite(topY)) topY = 0;
    return topY;
  }

  function updateCamera(){
    const topY = getTopMostY();
    const anchorY = CONF.canvasH * CONF.CAMERA_ANCHOR_Y;
    const target = Math.max(CONF.CAMERA_MIN, anchorY - topY);
    S.cameraY += (target - S.cameraY) * CONF.CAMERA_SMOOTH;
  }

  function drawImageCover(g, img, x, y, w, h){
    const iw = img.naturalWidth || img.width;
    const ih = img.naturalHeight || img.height;
    if (!iw || !ih){
      g.drawImage(img, x, y, w, h);
      return;
    }
    const s = Math.max(w / iw, h / ih);
    const dw = iw * s;
    const dh = ih * s;
    const dx = x + (w - dw) / 2;
    const dy = y + (h - dh) / 2;
    g.drawImage(img, dx, dy, dw, dh);
  }

  function renderTowerMini(canvas, blocks){
    const mctx = canvas.getContext("2d");
    const W = canvas.width;
    const H = canvas.height;

    mctx.clearRect(0,0,W,H);
    mctx.imageSmoothingEnabled = false;

    const g = mctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0, "#071327");
    g.addColorStop(1, "#02050d");
    mctx.fillStyle = g;
    mctx.fillRect(0,0,W,H);

    if (!blocks || blocks.length === 0) return;

    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for (const b of blocks){
      minX = Math.min(minX, b.x);
      maxX = Math.max(maxX, b.x + b.width);
      minY = Math.min(minY, b.y);
      maxY = Math.max(maxY, b.y + b.h);
    }

    const pad = 10;
    const bw = Math.max(1, maxX - minX);
    const bh = Math.max(1, maxY - minY);
    const s = Math.min((W - pad*2) / bw, (H - pad*2) / bh);

    const ox = pad + (W - pad*2 - bw*s)/2 - minX*s;
    const oy = pad + (H - pad*2 - bh*s) - minY*s;

    const sorted = [...blocks].sort((a,b) => (a.y - b.y));
    for (const b of sorted){
      const x = Math.round(ox + b.x*s);
      const y = Math.round(oy + b.y*s);
      const w = Math.max(1, Math.round(b.width*s));
      const h = Math.max(1, Math.round(b.h*s));
      const tile = b.tileKey ? IMG[b.tileKey] : null;
      const r = Math.max(3, Math.round(Math.min(w, h) * 0.22));

      mctx.save();
      mctx.beginPath();
      roundedPathOn(mctx, x, y, w, h, r);
      mctx.clip();
      if (tile && tile.naturalWidth) drawImageCover(mctx, tile, x, y, w, h);
      else {
        mctx.fillStyle = "rgba(255,210,80,.9)";
        mctx.fillRect(x, y, w, h);
      }
      mctx.restore();
    }
  }

  function roundedPathOn(g, x, y, w, h, r){
    const rr = Math.min(r, w/2, h/2);
    g.moveTo(x+rr, y);
    g.arcTo(x+w, y, x+w, y+h, rr);
    g.arcTo(x+w, y+h, x, y+h, rr);
    g.arcTo(x, y+h, x, y, rr);
    g.arcTo(x, y, x+w, y, rr);
    g.closePath();
  }

  function roundedPath(x, y, w, h, r){
    const rr = Math.min(r, w/2, h/2);
    ctx.moveTo(x+rr, y);
    ctx.arcTo(x+w, y, x+w, y+h, rr);
    ctx.arcTo(x+w, y+h, x, y+h, rr);
    ctx.arcTo(x, y+h, x, y, rr);
    ctx.arcTo(x, y, x+w, y, rr);
    ctx.closePath();
  }

  function drawBlock(b, index){
    const y = b.y + S.cameraY;
    if (y > CONF.canvasH + 120 || y < -240) return;

    const x = Math.round(b.x);
    const w = Math.round(b.width);
    const boost = CONF.BASE_BOOST[index] ?? 1.0;
    const h = Math.round(b.h * boost);

    const tile = b.tileKey ? IMG[b.tileKey] : null;
    const rAll = Math.round(Math.min(w, h) * 0.40);

    ctx.save();
    ctx.beginPath();
    roundedPath(x, y, w, h, rAll);
    ctx.clip();

    if (!tile || !tile.naturalWidth){
      const grad = ctx.createLinearGradient(x, y, x, y+h);
      grad.addColorStop(0, "#ffd34d");
      grad.addColorStop(1, "#f08b2f");
      ctx.fillStyle = grad;
      ctx.fillRect(x, y, w, h);
    } else {
      drawImageCover(ctx, tile, x, y, w, h);
    }

    ctx.restore();
  }

  function draw(){
    ctx.clearRect(0,0,CONF.canvasW, CONF.canvasH);
    ctx.imageSmoothingEnabled = false;
    drawBG();
    for (let i=0; i<S.blocks.length; i++){
      drawBlock(S.blocks[i], i);
    }
    if (S.curr) drawBlock(S.curr, S.blocks.length);

    ctx.save();
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = "#fff";
    ctx.font = "700 12px system-ui, sans-serif";
    ctx.fillText(`点数: ${S.points} / ${S.floors}F / ×${S.mul.toFixed(2)}`, 14, 24);
    ctx.restore();
  }

  function reset(){
    hideResultOverlay();
    if (dropOverlay) dropOverlay.box.classList.remove("show");

    S.playing = false;
    S.over = false;
    S.ending = false;
    S.floors = 0;
    S.points = 0;
    S.mul = 1.0;
    S.comboPerfect = 0;
    S.lastTitle = "";
    S.lastSubtitle = "";
    S.lastRunAt = "";
    S.lastRunFloors = 0;
    S.lastRunPoints = 0;
    S.lastDrop = null;
    S.cameraY = 0;
    S.dir = 1;
    S.lastFrameT = 0;

    spawnBase();
    spawnCurrent();

    setHUD();
    draw();
  }

  function start(){
    if (S.ending) return;
    if (S.over) reset();
    S.playing = true;
    setHUD();
  }

  function levelSpeed(){
    const base = CONF.speedBase + S.level * CONF.speedPerLevel;
    const mul = (S.curr && S.curr.speedMul) ? S.curr.speedMul : 1;
    return base * mul;
  }

  async function endRun(){
    S.lastRunFloors = S.floors;
    S.lastRunPoints = S.points;

    const t = getTakoyakiTitle(S.floors);
    S.lastTitle = t.title;
    S.lastSubtitle = t.sub;

    if (S.points > S.bestPoints){
      S.bestPoints = S.points;
      saveBestPoints(S.bestPoints);
    }

    updateMonthlyTowerHigh(S.floors);
    S.lastDrop = rollTowerDrop(S.floors);

    setResultDatetime();
    setHUD();

    if (S.lastDrop && S.lastDrop.dropped && S.lastDrop.item){
      await showTowerDropSplash(S.lastDrop);
    }

    showResultOverlay();
    S.ending = false;
    setHUD();
  }

  async function gameOver(){
    if (S.over || S.ending) return;
    S.over = true;
    S.playing = false;
    S.ending = true;
    setHUD();
    await endRun();
  }

  function drop(){
    if (!S.curr || S.over || S.ending) return;

    const prev = S.blocks[S.blocks.length - 1];
    const curr = S.curr;

    const overlapLeft  = Math.max(prev.x, curr.x);
    const overlapRight = Math.min(prev.x + prev.width, curr.x + curr.width);
    const overlapW = overlapRight - overlapLeft;

    if (overlapW <= 0){
      gameOver();
      return;
    }

    const diff = Math.abs(curr.x - prev.x);
    const perfectRange = CONF.perfectPx + (curr.perfectPlus || 0);
    const isPerfect = diff <= perfectRange;
    const nearPerfect = (!isPerfect && diff <= perfectRange * 2);
    const willShrink = overlapW < curr.width;

    if (curr.insurance && willShrink){
      curr.x = overlapLeft;
      curr.insurance = false;
      showToast("🌈 セーフ！");
    } else if (isPerfect){
      curr.x = prev.x;
      curr.width = prev.width;
      showToast(`PERFECT! ×${(S.comboPerfect+1)}`);
    } else {
      curr.x = overlapLeft;
      curr.width = overlapW;
    }

    pushConfirmedBlock(curr);
    S.curr = null;

    S.level++;
    S.floors = Math.max(0, S.allBlocks.length - 1);

    const base = (CONF.SCORE_BASE0 + S.floors * CONF.SCORE_PER_FLOOR);
    const elapsed = performance.now() - (curr.spawnedAt || performance.now());
    const speedBonus = (elapsed <= CONF.SPEED_BONUS_FAST_MS) ? CONF.SPEED_BONUS_FAST
                    : (elapsed <= CONF.SPEED_BONUS_MID_MS)  ? CONF.SPEED_BONUS_MID : 0;

    if (isPerfect){
      S.comboPerfect++;
      S.mul = Math.min(CONF.MUL_CAP, Math.max(1.0, CONF.PERFECT_MUL + S.comboPerfect * CONF.COMBO_MUL_ADD));
    } else if (nearPerfect){
      S.comboPerfect = 0;
      S.mul = Math.min(CONF.MUL_CAP, Math.max(1.0, CONF.NEAR_MUL));
    } else {
      S.comboPerfect = 0;
      S.mul = 1.0;
    }

    const gained = Math.floor(base * S.mul) + speedBonus;
    S.points += gained;

    if (speedBonus > 0 && isPerfect) showToast(`+${gained}（早×PERFECT）`);
    else if (isPerfect) showToast(`+${gained}（×${S.mul.toFixed(2)}）`);
    else if (speedBonus > 0) showToast(`+${gained}（早押し）`);

    if (S.points > S.bestPoints){
      S.bestPoints = S.points;
      saveBestPoints(S.bestPoints);
    }

    if (curr.width < CONF.minWidth){
      gameOver();
      return;
    }

    spawnCurrent();
    setHUD();
  }

  function update(now){
    if (!S.lastFrameT) S.lastFrameT = now;
    let dt = (now - S.lastFrameT) / 1000;
    S.lastFrameT = now;
    dt = Math.min(dt, 0.033);

    if (S.playing && !S.over && !S.ending && S.curr){
      const sp = levelSpeed();
      const step = sp * dt * 60;
      S.curr.x += step * S.dir;

      const minX = CONF.marginX;
      const maxX = CONF.canvasW - CONF.marginX - S.curr.width;

      if (S.curr.x <= minX){
        S.curr.x = minX;
        S.dir = 1;
      } else if (S.curr.x >= maxX){
        S.curr.x = maxX;
        S.dir = -1;
      }
    }

    if (!S.over) updateCamera();
  }

  function loop(now){
    update(now || performance.now());
    draw();
    requestAnimationFrame(loop);
  }

  cv.addEventListener("pointerdown", (e) => {
    e.preventDefault();
    if (S.ending) return;
    if (!S.playing) start();
    else drop();
  }, { passive:false });

  stopBtn.addEventListener("click", () => {
    if (S.ending) return;
    if (!S.playing) start();
    else drop();
  });

  restartBtn.addEventListener("click", () => {
    reset();
  });

  loadImages().then(() => {
    loadMonthlyStats();
    fitCanvas();
    requestAnimationFrame(fitCanvas);
    reset();
    loop();
  });
})();
</script>
