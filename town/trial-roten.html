<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>露店神の最後の試練</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  body{
    margin:0;
    font-family:"DotGothic16","MS Gothic",sans-serif;
    background:linear-gradient(180deg,#2a1450,#130722);
    color:#fff8e8;
    padding:16px;
  }
  .wrap{max-width:440px;margin:0 auto;}
  .panel{
    border-radius:20px;
    background:linear-gradient(180deg,rgba(111,52,179,.72),rgba(47,20,86,.96));
    border:2px solid rgba(255,223,150,.42);
    overflow:hidden;
    box-shadow:0 14px 30px rgba(0,0,0,.35);
  }
  .head{
    padding:16px;
    text-align:center;
    font-family:"Press Start 2P",monospace;
    font-size:14px;
    line-height:1.8;
    color:#ffe7b0;
    background:linear-gradient(180deg,#4c287a,#281248);
  }
  .body{padding:14px;}
  .note{text-align:center;line-height:1.8;color:#e9dcc0;font-size:13px;margin-bottom:12px;}
  .question{
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,223,140,.16);
    border-radius:16px;
    padding:12px;
    margin-bottom:10px;
    line-height:1.8;
  }
  .choices{display:grid;gap:8px;}
  .choice{
    width:100%;
    min-height:48px;
    border-radius:14px;
    border:1px solid rgba(255,223,140,.18);
    background:rgba(255,255,255,.08);
    color:#fff6e6;
    font-size:15px;
    font-weight:900;
    cursor:pointer;
  }
  .status{
    margin-top:10px;
    text-align:center;
    line-height:1.8;
  }
  .btn{
    width:100%;
    min-height:52px;
    border:0;
    border-radius:15px;
    cursor:pointer;
    font-size:18px;
    font-weight:900;
    font-family:"DotGothic16","MS Gothic",sans-serif;
    color:#2d220f;
    background:linear-gradient(180deg,#fffef8 0%,#efe7d0 100%);
    border:2px solid rgba(120,93,45,.42);
    margin-top:12px;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <div class="head">露店神の最後の試練</div>
    <div class="body">
      <div class="note">神が来店する。全5問の問いに答えよ。</div>
      <div class="question" id="questionBox">準備中...</div>
      <div class="choices" id="choices"></div>
      <div class="status" id="status"></div>
      <button class="btn" id="backBtn" type="button">戻る</button>
    </div>
  </div>
</div>

<script>
(() => {
  "use strict";

  const LS_TRIAL_SESSION = "ttc_god_trial_session_v1";
  const LS_TRIAL_RESULT  = "ttc_god_trial_result_v1";
  const EXPECTED_SEED = "seed_god_shop";

  const questionBox = document.getElementById("questionBox");
  const choicesEl = document.getElementById("choices");
  const statusEl = document.getElementById("status");
  const backBtn = document.getElementById("backBtn");

  const quiz = [
    { q:"神「儲かっているか。」 どう答える？", c:["はい、でも数え切れません","たぶん…","今日は休みです"], a:0 },
    { q:"神「売れ残った時、お前はどうする。」", c:["全部食べる","見なかったことにする","海に返す"], a:0 },
    { q:"神「客は並んでいるか。」", c:["見える者には見えます","行列です","ゼロです"], a:1 },
    { q:"神「露店に最も必要なものは。」", c:["熱","風格","タイミング"], a:2 },
    { q:"神「最後に問う。儲けとは何だ。」", c:["数字","流れ","焼き上がった瞬間"], a:2 }
  ];

  let session = null;
  let index = 0;
  let score = 0;

  function loadSession(){
    try{
      return JSON.parse(localStorage.getItem(LS_TRIAL_SESSION) || "null");
    }catch{
      return null;
    }
  }

  function saveResult(grade, rawScore){
    if(!session) return;
    localStorage.setItem(LS_TRIAL_RESULT, JSON.stringify({
      sessionId: session.sessionId,
      seedId: EXPECTED_SEED,
      grade,
      score: rawScore,
      at: Date.now()
    }));
  }

  function goBack(){
    if(session?.returnTo){
      location.href = session.returnTo;
    }else{
      history.back();
    }
  }

  function finish(){
    let grade = "fail";
    if(score === 5) grade = "perfect";
    else if(score === 4) grade = "great";
    else if(score === 3) grade = "clear";

    saveResult(grade, score);
    questionBox.innerHTML = `試練終了<br>正解数：${score} / 5`;
    choicesEl.innerHTML = "";
    statusEl.innerHTML = `結果：${grade}<br>戻るボタンで称号ページへ戻ります`;
  }

  function render(){
    if(index >= quiz.length){
      finish();
      return;
    }

    const item = quiz[index];
    questionBox.textContent = item.q;
    statusEl.textContent = `第 ${index + 1} 問 / 5　|　正解 ${score}`;
    choicesEl.innerHTML = "";

    item.c.forEach((label, i) => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.type = "button";
      btn.textContent = label;
      btn.addEventListener("click", () => {
        if(i === item.a) score++;
        index++;
        render();
      });
      choicesEl.appendChild(btn);
    });
  }

  session = loadSession();

  if(!session || session.seedId !== EXPECTED_SEED){
    questionBox.textContent = "無効な試練です";
    choicesEl.innerHTML = "";
    statusEl.textContent = "称号ページからやり直してください";
  }else{
    render();
  }

  backBtn.addEventListener("click", goBack);
})();
</script>
</body>
</html>
