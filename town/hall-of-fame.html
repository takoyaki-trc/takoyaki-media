<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>殿堂祭壇｜月間ランキング王者の間</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
:root{
  --gold1:#fff0b8;
  --text:#fff8e8;
  --muted:#dccfb0;
}

*{box-sizing:border-box}
html,body{min-height:100%}

body{
  margin:0;
  font-family:"DotGothic16","MS Gothic",sans-serif;
  color:var(--text);
  padding:18px 14px 34px;
  overflow-x:hidden;
  background:
    radial-gradient(circle at 50% 0%,rgba(255,232,150,.25) 0 100px,transparent 280px),
    radial-gradient(circle at 50% 18%,#5d2d9d 0%,#35135f 30%,#19092d 62%,#08040f 100%);
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(90deg,transparent 0 5%,rgba(255,228,150,.12) 5% 6%,rgba(255,228,150,.04) 6% 10%,transparent 10% 90%,rgba(255,228,150,.04) 90% 94%,rgba(255,228,150,.12) 94% 95%,transparent 95%),
    linear-gradient(transparent 0 97%,rgba(255,255,255,.045) 97% 100%);
  background-size:100% 100%,100% 3px;
  opacity:.95;
}

.wrap{
  width:min(100%,960px);
  margin:0 auto;
  position:relative;
  z-index:1;
}

.main-card{
  border-radius:24px;
  overflow:hidden;
  border:2px solid rgba(247,213,118,.55);
  background:
    radial-gradient(circle at 50% -8%,rgba(255,229,138,.18),transparent 34%),
    linear-gradient(180deg,rgba(126,63,198,.36),rgba(29,13,58,.98)),
    linear-gradient(180deg,#2a1450,#1c0f37);
  box-shadow:
    0 0 0 2px rgba(95,49,154,.55) inset,
    0 0 0 6px rgba(255,219,130,.06) inset,
    0 18px 40px rgba(0,0,0,.55);
  padding:20px 14px 24px;
}

.hero{
  text-align:center;
  padding:22px 10px 18px;
}

.badge{
  display:inline-block;
  padding:8px 14px;
  border-radius:999px;
  background:linear-gradient(180deg,rgba(255,221,143,.24),rgba(255,221,143,.08));
  border:1px solid rgba(255,221,143,.38);
  color:var(--gold1);
  font-family:"Press Start 2P",monospace;
  font-size:10px;
  line-height:1.6;
  letter-spacing:.06em;
}

h1{
  margin:14px 0 8px;
  font-size:28px;
  line-height:1.35;
  color:#fff5ef;
  text-shadow:0 3px 0 rgba(0,0,0,.35),0 0 18px rgba(255,220,120,.22);
}

.lead{
  margin:0 auto;
  max-width:640px;
  color:#f2dfbf;
  font-size:14px;
  line-height:1.8;
}

.month-section{
  margin:18px 0 0;
  border-radius:22px;
  overflow:hidden;
  background:linear-gradient(180deg,rgba(255,255,255,.98),rgba(244,237,220,.96));
  color:#271d11;
  border:2px solid rgba(136,101,42,.55);
  box-shadow:0 12px 26px rgba(0,0,0,.24);
}

.month-head{
  padding:14px 16px;
  text-align:center;
  background:linear-gradient(180deg,#4c287a,#281248);
  color:#fff3ce;
  font-size:20px;
  font-weight:900;
  letter-spacing:.08em;
  text-shadow:0 2px 0 rgba(0,0,0,.35);
  cursor:pointer;
  user-select:none;
}

.month-head::after{
  content:" ▼";
  font-size:14px;
}

.month-section.closed .month-head::after{
  content:" ▶";
}

.month-body{
  display:block;
}

.month-section.closed .month-body{
  display:none;
}

.trophy-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  padding:14px;
}

.trophy-card{
  position:relative;
  min-height:250px;
  border-radius:18px;
  padding:14px 10px;
  text-align:center;
  overflow:hidden;
  border:2px solid rgba(157,101,16,.42);
  background:
    radial-gradient(circle at 50% 0%,rgba(255,255,255,.85),transparent 28%),
    linear-gradient(180deg,#fff6c9 0%,#ffd86b 45%,#e3a92e 100%);
  color:#2b1900;
  box-shadow:
    0 0 0 2px rgba(255,244,185,.46) inset,
    0 0 18px rgba(255,211,80,.35),
    0 8px 18px rgba(118,70,0,.18);
}

.trophy-card::after{
  content:"";
  position:absolute;
  inset:-45% -40%;
  background:linear-gradient(120deg,transparent 38%,rgba(255,255,255,.55) 50%,transparent 62%);
  transform:translateX(-60%);
  animation:shine 3.2s ease-in-out infinite;
  pointer-events:none;
}

@keyframes shine{
  0%{transform:translateX(-70%);opacity:0}
  28%{opacity:.7}
  55%{transform:translateX(70%);opacity:0}
  100%{transform:translateX(70%);opacity:0}
}

.trophy-inner{
  position:relative;
  z-index:1;
}

.trophy-icon{
  font-size:48px;
  line-height:1;
  filter:drop-shadow(0 4px 0 rgba(0,0,0,.18));
}

.division{
  margin-top:10px;
  font-size:18px;
  font-weight:900;
}

.king-title{
  margin:8px auto;
  display:inline-block;
  padding:4px 8px;
  border-radius:999px;
  background:rgba(71,42,5,.12);
  border:1px solid rgba(71,42,5,.18);
  font-size:12px;
  font-weight:900;
}

.winner-name{
  margin-top:8px;
  font-size:22px;
  font-weight:900;
  line-height:1.35;
  word-break:break-word;
}

.score{
  margin-top:8px;
  font-family:"Press Start 2P",monospace;
  font-size:12px;
  line-height:1.7;
}

.comment{
  margin:10px 0 0;
  font-size:12px;
  line-height:1.65;
}

.detail-btn{
  width:100%;
  min-height:40px;
  margin-top:12px;
  border:1px solid rgba(71,42,5,.25);
  border-radius:12px;
  background:linear-gradient(180deg,#fffdf3,#ead7a8);
  color:#2b1900;
  font-family:"DotGothic16","MS Gothic",sans-serif;
  font-size:14px;
  font-weight:900;
  cursor:pointer;
}

.empty-card{
  background:linear-gradient(180deg,#eee4cd,#c9b894);
  color:#5d4a2e;
  box-shadow:none;
}

.loading,.empty-page{
  padding:22px 14px;
  text-align:center;
  color:#fff1ce;
  line-height:1.8;
  border-radius:18px;
  background:rgba(0,0,0,.22);
  border:1px dashed rgba(255,223,140,.24);
  margin:16px 0 0;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(6,3,14,.76);
  display:none;
  align-items:center;
  justify-content:center;
  padding:18px;
  z-index:80;
  backdrop-filter:blur(4px);
}

.modal.show{display:flex}

.modal-card{
  width:min(100%,520px);
  max-height:min(88vh,760px);
  overflow:auto;
  border-radius:20px;
  background:radial-gradient(circle at 50% 0%,rgba(255,230,140,.14),transparent 34%),linear-gradient(180deg,rgba(63,29,111,.98),rgba(24,12,46,.98));
  border:2px solid rgba(255,223,140,.45);
  box-shadow:0 24px 44px rgba(0,0,0,.52);
  padding:16px;
}

.modal-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:12px;
}

.modal-title{
  font-size:18px;
  font-weight:900;
  color:#ffeab2;
  letter-spacing:.08em;
  line-height:1.5;
}

.close-btn{
  width:42px;
  height:42px;
  border-radius:12px;
  border:0;
  cursor:pointer;
  font-size:20px;
  font-weight:900;
  color:#2a1d0a;
  background:linear-gradient(180deg,#fffef7,#e8dcc0);
}

.rank-list{
  display:grid;
  gap:8px;
}

.rank-row{
  display:grid;
  grid-template-columns:54px 1fr auto;
  gap:8px;
  align-items:center;
  padding:11px 10px;
  border-radius:12px;
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,223,140,.16);
  color:#fff8ea;
  font-weight:900;
}

.rank-row.top1{
  background:linear-gradient(180deg,#fff6c9,#e3a92e);
  color:#2b1900;
}

.rank-score{
  font-family:"Press Start 2P",monospace;
  font-size:10px;
  white-space:nowrap;
}

.footer-note{
  padding:16px 6px 0;
  text-align:center;
  color:#dccfb0;
  font-size:12px;
  line-height:1.8;
}

@media(max-width:820px){
  .trophy-grid{grid-template-columns:1fr 1fr}
}

@media(max-width:480px){
  body{padding:14px 10px 28px}
  h1{font-size:24px}
  .trophy-grid{grid-template-columns:1fr}
  .month-head{font-size:18px}
}
</style>
</head>

<body>

<div class="wrap">
  <main class="main-card">
    <section class="hero">
      <div class="badge">HALL OF FAME</div>
      <h1>殿堂祭壇<br>月間ランキング王者の間</h1>
      <p class="lead">
        月間ランキングで頂点に立ったタコ民たちを、ここに記録します。<br>
        2026年4月から、前月までの王者を自動で表示します。
      </p>
    </section>

    <div id="hallRoot">
      <div class="loading">殿堂データを読み込み中...</div>
    </div>

    <div class="footer-note">
      ※今月分はまだ途中経過のため表示しません。<br>
      月が変わると、前月分の殿堂が自動で追加されます。<br>
      最新月だけ最初から開き、過去月はタップで開閉できます。
    </div>
  </main>
</div>

<div class="modal" id="rankModal" aria-hidden="true">
  <div class="modal-card">
    <div class="modal-head">
      <div class="modal-title" id="modalTitle">ランキング詳細</div>
      <button class="close-btn" id="closeModalBtn" type="button">×</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
(() => {
"use strict";

/* =========================
   設定
========================= */

const GAS_RANKING_API_URL = "https://script.google.com/macros/s/AKfycbxZ6s4bgrR4CywdgGiOAk7l9istFjPEK7ph2laKc14NvqGPbNTCQFrFNoqDkgnOK84kJA/exec";

/* 殿堂表示開始月 */
const START_MONTH_KEY = "2026-04";

/* 部門設定 */
const RANKING_TYPES = [
  {
    type:"harvest",
    label:"🔥 収穫王",
    short:"収穫",
    unit:"枚",
    trophy:"🏆",
    king:"神焼き収穫王",
    comment:"焼いて、収穫して、頂点へ。今月の畑を制した王者。"
  },
  {
    type:"sales",
    label:"🪙 露店王",
    short:"売上",
    unit:"oct",
    trophy:"🏆",
    king:"黄金露店王",
    comment:"積み上げた売上は、まさに黄金の証。露店を制した王者。"
  },
  {
    type:"fishing",
    label:"🎣 釣り王",
    short:"釣り",
    unit:"点",
    trophy:"🏆",
    king:"深海釣り王",
    comment:"沈黙の海から結果を引き上げた、釣りの頂点。"
  },
  {
    type:"tower",
    label:"🗼 タワー王",
    short:"タワー",
    unit:"階",
    trophy:"🏆",
    king:"頂上タワー王",
    comment:"崩れず、積み上げ、空へ届いた者。タワーの王者。"
  }
];

const hallRoot = document.getElementById("hallRoot");
const rankModal = document.getElementById("rankModal");
const modalTitle = document.getElementById("modalTitle");
const modalBody = document.getElementById("modalBody");
const closeModalBtn = document.getElementById("closeModalBtn");

/* =========================
   汎用
========================= */

function escapeHtml(str){
  return String(str ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#39;");
}

function fmtNum(n){
  return Number(n || 0).toLocaleString("ja-JP");
}

function getRankingTypeMeta(type){
  return RANKING_TYPES.find(v => v.type === type) || RANKING_TYPES[0];
}

function buildRankingApiUrl(action, params={}){
  const url = new URL(GAS_RANKING_API_URL);
  url.searchParams.set("action", action);

  Object.entries(params).forEach(([key,val])=>{
    url.searchParams.set(key, String(val ?? ""));
  });

  url.searchParams.set("t", String(Date.now()));
  return url.toString();
}

function loadJsonp(url, timeoutMs=15000){
  return new Promise((resolve, reject)=>{
    const callbackName = "__ttc_hof_cb_" + Date.now() + "_" + Math.floor(Math.random() * 1000000000);
    const sep = url.includes("?") ? "&" : "?";

    let script = null;
    let done = false;

    const cleanup = ()=>{
      try{
        delete window[callbackName];
      }catch(_){
        window[callbackName] = undefined;
      }

      if(script && script.parentNode){
        script.parentNode.removeChild(script);
      }
    };

    const timer = setTimeout(()=>{
      if(done) return;
      done = true;
      cleanup();
      reject(new Error("JSONP_TIMEOUT"));
    }, timeoutMs);

    window[callbackName] = (data)=>{
      if(done) return;
      done = true;
      clearTimeout(timer);
      cleanup();
      resolve(data);
    };

    script = document.createElement("script");
    script.async = true;

    script.onerror = ()=>{
      if(done) return;
      done = true;
      clearTimeout(timer);
      cleanup();
      reject(new Error("JSONP_SCRIPT_ERROR"));
    };

    script.src = `${url}${sep}callback=${encodeURIComponent(callbackName)}&_=${Date.now()}`;

    const target = document.head || document.body || document.documentElement;
    target.appendChild(script);
  });
}

/* =========================
   月リスト自動生成
   2026-04 〜 前月まで
========================= */

function parseMonthKey(monthKey){
  const [y,m] = String(monthKey).split("-").map(Number);
  return { year:y, month:m };
}

function toMonthKey(year, month){
  return `${year}-${String(month).padStart(2,"0")}`;
}

function addMonth(year, month){
  month += 1;

  if(month >= 13){
    year += 1;
    month = 1;
  }

  return { year, month };
}

function getPreviousMonthKey(){
  const now = new Date();

  let y = now.getFullYear();
  let m = now.getMonth() + 1;

  m -= 1;

  if(m <= 0){
    y -= 1;
    m = 12;
  }

  return toMonthKey(y,m);
}

function compareMonthKey(a,b){
  const aa = parseMonthKey(a);
  const bb = parseMonthKey(b);

  if(aa.year !== bb.year){
    return aa.year - bb.year;
  }

  return aa.month - bb.month;
}

function getHallMonths(){
  const endKey = getPreviousMonthKey();

  if(compareMonthKey(START_MONTH_KEY,endKey) > 0){
    return [];
  }

  const list = [];
  let {year,month} = parseMonthKey(START_MONTH_KEY);

  while(compareMonthKey(toMonthKey(year,month),endKey) <= 0){
    list.push(toMonthKey(year,month));

    const next = addMonth(year,month);
    year = next.year;
    month = next.month;
  }

  return list;
}

function monthLabel(monthKey){
  const {year,month} = parseMonthKey(monthKey);
  return `${year}年${month}月`;
}

/* =========================
   ランキング取得
========================= */

async function fetchRanking(monthKey,type){
  const url = buildRankingApiUrl("getRanking", {
    monthKey,
    type
  });

  const data = await loadJsonp(url);

  if(!data || !data.ok){
    throw new Error(data && data.error ? data.error : "RANKING_LOAD_FAILED");
  }

  const rows = Array.isArray(data.ranking) ? data.ranking : [];

  return normalizeRankingRows(rows);
}

/* 同点は同率順位 */
function normalizeRankingRows(rows){
  const sorted = [...rows]
    .map(row => ({
      ...row,
      score:Number(row.score || 0),
      userName:String(row.userName || "名無しのタコ民")
    }))
    .sort((a,b)=>Number(b.score||0)-Number(a.score||0));

  let lastScore = null;
  let lastRank = 0;

  return sorted.map((row,index)=>{
    const score = Number(row.score || 0);

    if(lastScore === null || score !== lastScore){
      lastRank = index + 1;
      lastScore = score;
    }

    return {
      ...row,
      displayRank:lastRank
    };
  }).slice(0,5);
}

async function fetchMonthData(monthKey){
  const result = {};

  await Promise.all(RANKING_TYPES.map(async meta=>{
    try{
      result[meta.type] = {
        ok:true,
        rows:await fetchRanking(monthKey,meta.type)
      };
    }catch(err){
      console.error("ranking fetch error", monthKey, meta.type, err);

      result[meta.type] = {
        ok:false,
        rows:[],
        error:String(err.message || err)
      };
    }
  }));

  return result;
}

/* =========================
   表示
========================= */

function renderTrophyCard(monthKey,meta,data){
  const rows = data?.rows || [];
  const winner = rows[0];

  if(!winner){
    return `
      <div class="trophy-card empty-card">
        <div class="trophy-inner">
          <div class="trophy-icon">—</div>
          <div class="division">${escapeHtml(meta.label)}</div>
          <div class="king-title">記録なし</div>
          <div class="winner-name">未登録</div>
          <div class="score">0 ${escapeHtml(meta.unit)}</div>
          <div class="comment">この月のランキングデータが見つかりませんでした。</div>
          <button class="detail-btn" type="button" data-month="${escapeHtml(monthKey)}" data-type="${escapeHtml(meta.type)}">
            詳細を見る
          </button>
        </div>
      </div>
    `;
  }

  return `
    <div class="trophy-card">
      <div class="trophy-inner">
        <div class="trophy-icon">${escapeHtml(meta.trophy)}</div>
        <div class="division">${escapeHtml(meta.label)}</div>
        <div class="king-title">${escapeHtml(meta.king)}</div>
        <div class="winner-name">${escapeHtml(winner.userName)}</div>
        <div class="score">${fmtNum(winner.score)} ${escapeHtml(meta.unit)}</div>
        <div class="comment">${escapeHtml(meta.comment)}</div>
        <button class="detail-btn" type="button" data-month="${escapeHtml(monthKey)}" data-type="${escapeHtml(meta.type)}">
          2位〜5位を見る
        </button>
      </div>
    </div>
  `;
}

function renderMonthSection(monthKey,monthData,isOpen){
  return `
    <section class="month-section ${isOpen ? "" : "closed"}">
      <div class="month-head" data-toggle-month="${escapeHtml(monthKey)}">
        ${escapeHtml(monthLabel(monthKey))} 殿堂祭壇
      </div>

      <div class="month-body">
        <div class="trophy-grid">
          ${RANKING_TYPES.map(meta => renderTrophyCard(monthKey,meta,monthData[meta.type])).join("")}
        </div>
      </div>
    </section>
  `;
}

function bindDetailButtons(cache){
  document.querySelectorAll("[data-month][data-type]").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const monthKey = btn.getAttribute("data-month");
      const type = btn.getAttribute("data-type");
      const meta = getRankingTypeMeta(type);
      const rows = cache?.[monthKey]?.[type]?.rows || [];

      openRankingModal(monthKey,meta,rows);
    });
  });
}

function bindMonthToggles(){
  document.querySelectorAll("[data-toggle-month]").forEach(head=>{
    head.addEventListener("click",()=>{
      const section = head.closest(".month-section");
      if(!section) return;

      section.classList.toggle("closed");
    });
  });
}

function openRankingModal(monthKey,meta,rows){
  modalTitle.textContent = `${monthLabel(monthKey)} ${meta.short}ランキング`;

  if(!rows.length){
    modalBody.innerHTML = `
      <div class="rank-list">
        <div class="rank-row">
          <div>—</div>
          <div>ランキングデータがありません</div>
          <div class="rank-score">0 ${escapeHtml(meta.unit)}</div>
        </div>
      </div>
    `;
  }else{
    modalBody.innerHTML = `
      <div class="rank-list">
        ${rows.map(row => `
          <div class="rank-row ${Number(row.displayRank)===1 ? "top1" : ""}">
            <div>${escapeHtml(row.displayRank)}位</div>
            <div>${escapeHtml(row.userName || "名無しのタコ民")}</div>
            <div class="rank-score">${fmtNum(row.score)} ${escapeHtml(meta.unit)}</div>
          </div>
        `).join("")}
      </div>
    `;
  }

  rankModal.classList.add("show");
  rankModal.setAttribute("aria-hidden","false");
  document.body.style.overflow = "hidden";
}

function closeModal(){
  rankModal.classList.remove("show");
  rankModal.setAttribute("aria-hidden","true");
  document.body.style.overflow = "";
}

/* =========================
   初期化
========================= */

async function init(){
  const months = getHallMonths();

  if(!months.length){
    hallRoot.innerHTML = `
      <div class="empty-page">
        まだ殿堂入り対象の月がありません。<br>
        2026年4月以降、月が変わると前月分が表示されます。
      </div>
    `;
    return;
  }

  hallRoot.innerHTML = `
    <div class="loading">
      ${months.map(monthLabel).join(" / ")} の殿堂データを読み込み中...
    </div>
  `;

  const cache = {};

  for(const monthKey of months){
    cache[monthKey] = await fetchMonthData(monthKey);
  }

  hallRoot.innerHTML = months
    .slice()
    .reverse()
    .map((monthKey,index) => renderMonthSection(monthKey,cache[monthKey], index === 0))
    .join("");

  bindDetailButtons(cache);
  bindMonthToggles();
}

closeModalBtn.addEventListener("click",closeModal);

rankModal.addEventListener("click",e=>{
  if(e.target === rankModal){
    closeModal();
  }
});

window.addEventListener("keydown",e=>{
  if(e.key === "Escape"){
    closeModal();
  }
});

init();

})();
</script>
