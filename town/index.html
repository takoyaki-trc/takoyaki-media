  <style>
    /* 空レイヤー：BASEの背景に負けない */
    body::before{
      content:"";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;

      /* 3層＋ビネット */
      background:
        /* ビネット（端を少し暗く） */
        radial-gradient(
          ellipse at center,
          rgba(0,0,0,0) 55%,
          rgba(0,0,0,0.18) 100%
        ),
        /* 空の3層（JSがここを書き換える） */
        var(--sky, linear-gradient(
          #87b8e5 0%,
          #cfe8ff 55%,
          #ffffff 100%
        ));

      transition: background 6s linear;
    }

    /* ===== 太陽 / 月 レイヤー ===== */

    /* “今の位置”だけ光る */
    .phase-dot.is-active{
      opacity: 1;
      transform: scale(1.0);
      filter: drop-shadow(0 0 6px rgba(255,255,255,0.35));
    }

    /* 太陽（左端） */
    .phase-dot.sun{
      background: radial-gradient(circle at 30% 30%, #fff7c8 0%, #ffd86b 55%, #f2b705 100%);
      box-shadow: 0 0 14px rgba(255,200,80,0.35);
    }

    /* 月のベース（右端側） */
    .phase-dot.moon{
      background: radial-gradient(circle at 35% 30%, #ffffff 0%, #e6e6e6 70%, #cfcfcf 100%);
    }

    /* 月相：黒い影を重ねて欠けを作る（CSSだけでOK） */
    .phase-dot.moon::after{
      content:"";
      position:absolute;
      inset:0;
      border-radius:50%;
      background: rgba(15,20,32,0.95);
      transform: translateX(var(--shadow-x, 0px));
    }

    /* 端末で大きさ調整したいならここだけ触る */
    @media (max-width:480px){
      #phase-strip .phase-dot{ width:36px; height:36px; }
    }

    /* ===== 太陽／月が動くレール ===== */
    #phase-strip{
      position: relative;
      width: 220px;          /* 横幅（好みで調整OK） */
      height: 54px !important;
      margin: 0 auto 4px !important;  /* 下だけ4pxに */
      padding: 0 !important;
    }

    /* ===== 動く本体（共通） ===== */
    #phase-orb{
      position: absolute;
      top: 0 !important;
      left: 0;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      image-rendering: pixelated;
      transition:
        transform 0.6s ease,
        filter 0.6s ease,
        background 0.6s ease;
    }

    /* ===== 太陽（昼） ===== */
    #phase-orb.sun{
      background: radial-gradient(
        circle at 30% 30%,
        #fff7c8 0%,
        #ffd86b 55%,
        #f2b705 100%
      );
      box-shadow: 0 0 14px rgba(255,200,80,0.35);
      transform: scale(1);     /* 太陽は大きめ */
    }

    /* ===== 月（夜） ===== */
    #phase-orb.moon{
      background: radial-gradient(
        circle at 35% 30%,
        #ffffff 0%,
        #e6e6e6 70%,
        #cfcfcf 100%
      );
      transform: scale(0.8);   /* 月は小さく */
    }

    /* ===== 月の満ち欠け（影） ===== */
    #phase-orb.moon::after{
      content:"";
      position:absolute;
      inset:0;
      border-radius:50%;
      background: rgba(15,20,32,0.95);
      transform: translateX(var(--shadow-x, 0px));
    }

    /* ===== スマホ微調整 ===== */
    @media (max-width:480px){
      #phase-strip{ width: 200px; }
      #phase-orb{ width: 36px; height: 36px; }
    }

    /* ================================
       MAP 基準（iPhoneズレ対策 完全版）
       ★ここを丸ごと置き換え
    ================================ */

    /* 余計な左右ズレ要因を殺す */
    html, body{
      margin: 0;
      padding: 0;
      width: 100%;
    }

    /* iOSで横幅がズレる時の保険（親の影響で右に出るのを防ぐ） */
    body{
      overflow-x: hidden;
    }

    /* タイトルGIF（そのままでOK） */
    .title-gif{
      width: min(720px, 90%);
      margin: 0 auto 24px;
      display: block;
    }

    /* =========================
       MAPの「座標基準」
       - 画像と同じ箱（map-wrap）を基準にする
       - 余計なpadding/transformの影響を受けにくくする
    ========================= */
    .map-wrap{
      position: relative !important;
      display: block;
      width: 100% !important;
      max-width: 800px;          /* PC上限 */
      margin: 0 auto !important; /* 中央固定 */
      padding: 0 !important;     /* ← %座標のズレ原因を消す */
      border: 0 !important;
      box-sizing: border-box !important;

      /* iOSの合成/丸め誤差でズレるのを抑える */
      transform: translateZ(0);
      -webkit-transform: translateZ(0);
    }

    /* 画像：map-wrap に100%フィット（余計な指定を全部潰す） */
    .map-wrap .map-img{
      position: relative;        /* 念のため */
      display: block !important;
      width: 100% !important;
      max-width: 100% !important;
      height: auto !important;
      margin: 0 !important;
      padding: 0 !important;
      border: 0 !important;
      box-sizing: border-box !important;

      image-rendering: pixelated;

      /* iOSで画像が“微妙に横にずれる”時の保険 */
      transform: translateZ(0);
      -webkit-transform: translateZ(0);
    }

    /* =========================
       当たり判定 / 建物（共通）
       - 必ず map-wrap を基準に absolute
    ========================= */
    .map-wrap .hotspot,
    .map-wrap .tf-building{
      position: absolute !important;
      display: block !important;
      z-index: 60 !important; /* 画像より上 */
      cursor: pointer;

      /* iOSのタップ/合成ズレを抑える */
      transform: translateZ(0);
      -webkit-transform: translateZ(0);

      /* タップ遅延/拡大を抑制（iPhone向け） */
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    /* 建物リンク内の画像も「基準箱いっぱい」 */
    .map-wrap .tf-building > img{
      display: block;
      width: 100%;
      height: auto;
    }

    /* ホバー演出（PC） */
    @media (hover:hover){
      .map-wrap .hotspot:hover,
      .map-wrap .tf-building:hover{
        outline: 2px solid rgba(255,255,200,0.9);
        box-shadow: 0 0 12px rgba(255,255,200,0.9);
      }
    }

    /* =========================
       フッター下の“でかい余白”を潰す（原因2つを上書き）
    ========================= */
    body.shop #mainFooter.wrapper{ margin-bottom: 0 !important; }
    body.shop #mainFooter{ margin: 20px auto 0 !important; padding: 0 !important; }
    body.shop #mainFooter .footerMenu ul li{ margin-bottom: 0 !important; }
    body.shop #mainFooter.wrapper,
    body.shop #mainFooter.wrapper + #base_url{
      margin: 0 !important;
      padding: 0 !important;
    }

    /* ===== iPhone配置バグ 強制Fix（最重要） ===== */
    .map-wrap .tf-building{ position: absolute !important; display: block !important; z-index: 60 !important; }
    .map-wrap .map-img{ position: relative; z-index: 0; }
    .map-wrap .hotspot{ z-index: 10 !important; }
    .map-wrap .spot{ z-index: 20 !important; }
    .map-wrap .gate-hit{ z-index: 30 !important; }
    .map-wrap .tf-building{ z-index: 40 !important; }
    .map-wrap .takomin{ z-index: 60 !important; }
    .map-wrap .takomin-balloon{ z-index: 80 !important; }
  </style>

<script>
(() => {
  // =========================
  // 1) たこ焼きタワー起動（遷移）
  // =========================
  const towerBtn = document.querySelector('.takomin--tawa');
  if (towerBtn) {
    towerBtn.addEventListener('click', () => {
      location.href = './takoyaki-tower.html';
    });
  }

  // =========================
  // 2) 昼夜画像切替
  // =========================
  const isNight = () =>
    document.documentElement.classList.contains("is-night") ||
    document.body?.classList.contains("is-night");

  // ✅ 昼夜切替したい画像を追加
  const targets = [
    ".takomin--tawa img",
    ".takomin--tawa1 img",
    ".takomin--fish img"
  ];

  function apply(){
    targets.forEach(sel => {
      const img = document.querySelector(sel);
      if (!img) return;

      const day   = img.dataset.day;
      const night = img.dataset.night;
      const url   = isNight() ? night : day;

      if (url) img.src = url;
    });
  }

  // 初回
  apply();

  // class変化で即反映
  const mo = new MutationObserver(apply);
  mo.observe(document.documentElement, { attributes:true, attributeFilter:["class"] });
  if (document.body) mo.observe(document.body, { attributes:true, attributeFilter:["class"] });

  // （保険）他JSがsrcを上書きする場合
  setInterval(apply, 1000);
})();
</script>

<script>
(() => {
  /* ===== Tokyo time (全てこれ基準) ===== */
  function nowTokyo(){
    return new Date(new Date().toLocaleString("en-US", { timeZone: "Asia/Tokyo" }));
  }

  /* ===== マップ切替 ===== */
  function slotByHour(h){
    if(h >= 5 && h < 11) return "morning";
    if(h >= 11 && h < 20) return "day";
    return "night";
  }
  function applyMapByHour(h){
    const img = document.querySelector('.map-img');
    if(!img) return;

    const slot = slotByHour(h);
    const url =
      slot === 'morning' ? img.dataset.morning :
      slot === 'day'     ? img.dataset.day :
                           img.dataset.night;

    if(url && img.src !== url) img.src = url;
  }

  /* ===== 空グラデーション ===== */
  const SKY = [
    ["#0b1020", "#141c2e"], ["#0b1020", "#141c2e"],
    ["#0c1224", "#18223a"], ["#121a33", "#22304f"],
    ["#1b2a44", "#3b4a6b"], ["#3c3b5a", "#7b6ea8"],
    ["#8a5a7b", "#f2b5c4"], ["#d97b6a", "#ffd1a9"],
    ["#8ec1e8", "#eaf4ff"], ["#6fa8dc", "#cfe8ff"],
    ["#63a4e1", "#dbeeff"], ["#76b5ea", "#eaf4ff"],
    ["#87b8e5", "#eaf4ff"], ["#87b8e5", "#eaf4ff"],
    ["#7fb3d5", "#eaf4f4"], ["#9fc5d1", "#eaf4f4"],
    ["#f9cb9c", "#fff1c1"], ["#f2a65a", "#f6d365"],
    ["#d96c4f", "#f2a65a"], ["#a35d7b", "#5b4e7a"],
    ["#2c2f4a", "#1b2430"], ["#1b2430", "#141c2e"],
    ["#121a2b", "#10131f"], ["#0b1020", "#141c2e"]
  ];

  const mix = (a,b,t)=>{
    const h=x=>parseInt(x,16);
    const r=x=>x.toString(16).padStart(2,"0");
    const A=a.slice(1).match(/../g).map(h);
    const B=b.slice(1).match(/../g).map(h);
    return "#"+A.map((v,i)=>r(Math.round(v+(B[i]-v)*t))).join("");
  };

  /* ===== 太陽／月 ===== */
  function updatePhaseOrb(now){
    const strip = document.getElementById("phase-strip");
    const orb   = document.getElementById("phase-orb");
    if(!strip || !orb) return;

    const minutes = now.getHours()*60 + now.getMinutes();
    const sunrise = 6*60;
    const sunset  = 19*60;
    const nextSunrise = 24*60 + sunrise;

    let p, isDay;
    if(minutes >= sunrise && minutes < sunset){
      isDay = true;
      p = (minutes - sunrise) / (sunset - sunrise);
    }else{
      isDay = false;
      const m = minutes < sunrise ? minutes + 1440 : minutes;
      p = (m - sunset) / (nextSunrise - sunset);
    }

    const maxX = strip.clientWidth - orb.clientWidth;
    orb.style.transform =
      `translateX(${Math.round(maxX * p)}px) scale(${isDay ? 1 : 0.8})`;

    orb.classList.toggle("sun", isDay);
    orb.classList.toggle("moon", !isDay);

    if(!isDay){
      const sx = Math.round(26 - 52 * p);
      orb.style.setProperty("--shadow-x", `${sx}px`);
    }else{
      orb.style.removeProperty("--shadow-x");
    }
  }

  /* ===== まとめて反映 ===== */
  function applyAll(){
    const now = nowTokyo();
    const h = now.getHours();
    // 夜判定（ボス用に is-night へ統一）
    const night = (h >= 20 || h < 5);

    const html = document.documentElement;

    if (night) {
      html.classList.add("is-night");
      html.classList.remove("day");
    } else {
      html.classList.remove("is-night");
      html.classList.add("day");
    }

    // マップ切替
    applyMapByHour(h);

    // 空グラデーション（分単位でなめらか）
    const t = (now.getMinutes()*60 + now.getSeconds()) / 3600;
    const next = (h+1)%24;
    document.body.style.setProperty(
      "--sky",
      `linear-gradient(${mix(SKY[h][0],SKY[next][0],t)}, ${mix(SKY[h][1],SKY[next][1],t)})`
    );

    // 太陽/月
    updatePhaseOrb(now);
  }

  document.addEventListener("DOMContentLoaded", ()=>{
    applyAll();
    setInterval(applyAll, 20 * 1000);
  });
  window.addEventListener("pageshow", applyAll);
})();
</script>

<script>
(() => {
  "use strict";

  // ===== 主要キー（必要ならここだけ増やせる） =====
  const KEY = {
    resident: "trc_v1_resident",
    lastLogin: "trc_v1_last_login",
  };

  const EXIST = {
    farmBook:      "tf_v1_book",
    farmInv:       "tf_v1_inv",
    rotenOcto:     "roten_v1_octo",
    tower:         "tower_v1_state",
    fish:          "fish_v1_state",

    // ★称号の頂
    monthly:       "ttc_monthly_stats_v1",
    history:       "ttc_monthly_history_v1",
    godfarm:       "ttc_godfarm_v1",
    godbonus:      "ttc_god_bonus_v1",

    // ★募集板 / 熱量 / 好感度
    matchingBoard: "ttc_matching_board_v7",
    matchingMeta:  "ttc_matching_meta_v6",
    matchingHeat:  "matching_heat_v1",
    affection:     "roten_v1_guest_affection",

    // ★かすみぴガチャ
    kasumiGacha:   "kasumipi_gacha_v2",
    kasumiBook:    "kasumipi_gacha_book_v2"
  };

  // ===== utils =====
  const getRaw = (k) => {
    const v = localStorage.getItem(k);
    return (v === null || v === undefined) ? null : String(v);
  };

  const safeJSONParse = (raw, fallback) => {
    try { return JSON.parse(raw); } catch (_) { return fallback; }
  };

  const safeStringify = (obj) => {
    try { return JSON.stringify(obj); } catch (_) { return "null"; }
  };

  function listKeysByRegex(re) {
    const out = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (!k) continue;
      if (re.test(k)) out.push(k);
    }
    return out;
  }

  function getUA() {
    return navigator.userAgent || "";
  }

  function isInstagramInAppBrowser() {
    return /Instagram/i.test(getUA());
  }

  function isYahooInAppBrowser() {
    const ua = getUA();
    return /YJApp/i.test(ua) || /Yahoo/i.test(ua);
  }

  function isFirefoxLike() {
    const ua = getUA();
    return /Firefox/i.test(ua) || /FxiOS/i.test(ua);
  }

  function isLikelyRestrictedBrowser() {
    return isInstagramInAppBrowser() || isYahooInAppBrowser() || isFirefoxLike();
  }

  // ===== 図鑑slim（count+img等） =====
  function slimBookRawKeepImg() {
    const raw = getRaw(EXIST.farmBook);
    if (!raw) return null;

    const book = safeJSONParse(raw, null);
    if (!book || typeof book !== "object") return raw;

    const got = (book.got && typeof book.got === "object") ? book.got : {};
    const outGot = {};

    for (const id of Object.keys(got)) {
      const node = got[id] || {};
      const c = Number(node.count || 0);
      if (c > 0) {
        const out = { id, count: c };
        if (typeof node.img === "string" && node.img.trim()) out.img = node.img.trim();
        if (typeof node.name === "string" && node.name.trim()) out.name = node.name.trim();
        if (typeof node.rarity === "string" && node.rarity.trim()) out.rarity = node.rarity.trim();
        if (node.at != null && String(node.at).trim()) out.at = node.at;
        if (node.lastAt != null && String(node.lastAt).trim()) out.lastAt = node.lastAt;
        outGot[id] = out;
      }
    }

    const slim = { ver: book.ver ?? 1, got: outGot };
    return safeStringify(slim);
  }

  function findFarmProgressKeys() {
    const out = [];

    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (!k) continue;
      if (!/^tf_v1_/i.test(k)) continue;
      if (/log|history|debug/i.test(k)) continue;
      if (k === EXIST.farmBook || k === EXIST.farmInv) continue;
      out.push(k);
    }

    const prefer = [
      "tf_v1_state",
      "tf_v1_level",
      "tf_v1_xp",
      "tf_v1_farm",
      "tf_v1_progress"
    ];

    const ordered = [];
    for (const p of prefer) {
      if (localStorage.getItem(p) != null && !ordered.includes(p)) ordered.push(p);
    }
    for (const k of out) {
      if (!ordered.includes(k)) ordered.push(k);
    }

    return ordered.slice(0, 40);
  }

  function findRotenProgressKeys() {
    const out = [];

    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (!k) continue;
      if (!/^roten_v1_/i.test(k)) continue;
      if (/log|history|debug/i.test(k)) continue;
      out.push(k);
    }

    const prefer = [
      "roten_v1_level",
      "roten_v1_rep",
      "roten_v1_myshop",
      "roten_v1_inventory",
      "roten_v1_market",
      "roten_v1_state",
      "roten_v1_shelves",
      "roten_v1_octo",
      "roten_v1_guest_affection"
    ];

    const ordered = [];
    for (const p of prefer) {
      if (localStorage.getItem(p) != null && !ordered.includes(p)) ordered.push(p);
    }
    for (const k of out) {
      if (!ordered.includes(k)) ordered.push(k);
    }

    return ordered.slice(0, 90);
  }

  function findMatchingKeys() {
    const out = [];

    const exact = [
      EXIST.matchingBoard,
      EXIST.matchingMeta,
      EXIST.matchingHeat
    ];

    for (const k of exact) {
      const v = getRaw(k);
      if (v != null && !out.includes(k)) out.push(k);
    }

    for (const k of listKeysByRegex(/^ttc_matching_/i)) {
      if (!out.includes(k)) out.push(k);
    }

    for (const k of listKeysByRegex(/^matching_heat_/i)) {
      if (!out.includes(k)) out.push(k);
    }

    return out.slice(0, 30);
  }

  function findKasumiGachaKeys() {
    const out = [];

    const exact = [
      EXIST.kasumiGacha,
      EXIST.kasumiBook,
      EXIST.matchingHeat
    ];

    for (const k of exact) {
      const v = getRaw(k);
      if (v != null && !out.includes(k)) out.push(k);
    }

    for (const k of listKeysByRegex(/^kasumipi_gacha_/i)) {
      if (!out.includes(k)) out.push(k);
    }

    return out.slice(0, 30);
  }

  // ===== バックアップ作成 =====
  function buildSlimBackupPayload() {
    const keys = {};

    keys[KEY.resident] = getRaw(KEY.resident);
    keys[KEY.lastLogin] = getRaw(KEY.lastLogin);

    keys[EXIST.rotenOcto] = getRaw(EXIST.rotenOcto);
    keys[EXIST.farmInv]   = getRaw(EXIST.farmInv);
    keys[EXIST.farmBook]  = slimBookRawKeepImg();

    for (const k of findFarmProgressKeys()) {
      const v = getRaw(k);
      if (v != null) keys[k] = v;
    }

    for (const k of findRotenProgressKeys()) {
      const v = getRaw(k);
      if (v != null) keys[k] = v;
    }

    if (getRaw(EXIST.tower) != null) keys[EXIST.tower] = getRaw(EXIST.tower);
    for (const k of listKeysByRegex(/tower/i)) {
      const v = getRaw(k);
      if (v != null) keys[k] = v;
    }

    if (getRaw(EXIST.fish) != null) keys[EXIST.fish] = getRaw(EXIST.fish);
    for (const k of listKeysByRegex(/fish|takofish|tako_fish|tfish/i)) {
      const v = getRaw(k);
      if (v != null) keys[k] = v;
    }

    if (getRaw(EXIST.monthly)  != null) keys[EXIST.monthly]  = getRaw(EXIST.monthly);
    if (getRaw(EXIST.history)  != null) keys[EXIST.history]  = getRaw(EXIST.history);
    if (getRaw(EXIST.godfarm)  != null) keys[EXIST.godfarm]  = getRaw(EXIST.godfarm);
    if (getRaw(EXIST.godbonus) != null) keys[EXIST.godbonus] = getRaw(EXIST.godbonus);

    for (const k of findMatchingKeys()) {
      const v = getRaw(k);
      if (v != null) keys[k] = v;
    }
    if (getRaw(EXIST.affection) != null) keys[EXIST.affection] = getRaw(EXIST.affection);

    for (const k of findKasumiGachaKeys()) {
      const v = getRaw(k);
      if (v != null) keys[k] = v;
    }

    for (const k of Object.keys(keys)) {
      if (keys[k] === null || keys[k] === undefined) delete keys[k];
    }

    return {
      app: "takoyaki-trc",
      ver: 8,
      kind: "slim+roten+title+matching+gacha-compatible",
      exportedAt: new Date().toISOString(),
      note: "住民票/オクト/資材/図鑑(count+img+id)/畑進行(tf_v1_*)/露店進行(roten_v1_*)/タワー/釣り/称号の頂/募集板/熱量/好感度/かすみぴガチャ を保存。旧keys形式バックアップの復元にも対応。",
      keys
    };
  }

  // ===== 共通モーダル基礎 =====
  function createOverlayModal(id, innerHtml) {
    let modal = document.getElementById(id);
    if (modal) return modal;

    modal = document.createElement("div");
    modal.id = id;
    modal.style.cssText = `
      position:fixed;
      inset:0;
      z-index:999999;
      background:rgba(0,0,0,.82);
      display:none;
      align-items:center;
      justify-content:center;
      padding:16px;
      box-sizing:border-box;
    `;
    modal.innerHTML = innerHtml;
    document.body.appendChild(modal);

    modal.addEventListener("click", (e) => {
      if (e.target === modal) modal.style.display = "none";
    });

    return modal;
  }

  // ===== JSON表示保存モーダル =====
  function ensureBackupTextModal() {
    return createOverlayModal("trcBackupTextModal", `
      <div style="
        width:min(720px, 96vw);

        overflow:auto;

        border:2px solid rgba(255,255,255,.18);

        box-sizing:border-box;
      ">
        <div style="font-size:18px;font-weight:900;margin-bottom:10px;">
          バックアップJSON
        </div>

        <div id="trcBackupTextDesc" style="font-size:13px;line-height:1.7;color:rgba(255,255,255,.85);margin-bottom:12px;">
          下の内容をコピーして、メモ帳などに保存してください。
        </div>

        <div id="trcBackupFilenameBox" style="
          margin-bottom:10px;

  function openBackupTextModal(jsonText, filename, message) {
    const modal = ensureBackupTextModal();
    modal.style.display = "flex";

    const ta = modal.querySelector("#trcBackupTextArea");
    const desc = modal.querySelector("#trcBackupTextDesc");
    const filenameBox = modal.querySelector("#trcBackupFilenameBox");
    const btnCopy = modal.querySelector("#trcBackupCopyBtn");
    const btnRetry = modal.querySelector("#trcBackupSaveFileBtn");
    const btnClose = modal.querySelector("#trcBackupTextCloseBtn");

    ta.value = jsonText;
    desc.innerHTML = message || "下の内容をコピーして、メモ帳などに保存してください。";
    filenameBox.textContent = `保存名の例：${filename}`;

    btnClose.onclick = () => {
      modal.style.display = "none";
    };

    btnCopy.onclick = async () => {
      ta.focus();
      ta.select();

      let copied = false;

      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(ta.value);
          copied = true;
        }
      } catch (_) {}

      if (!copied) {
        try {
          document.execCommand("copy");
          copied = true;
        } catch (_) {}
      }

      alert(copied ? "バックアップJSONをコピーしました。" : "コピーに失敗しました。長押しや手動コピーをしてください。");
    };

    btnRetry.onclick = async () => {
      const result = await tryFileDownload(jsonText, filename);
      if (result.ok) {
        modal.style.display = "none";
        alert("ファイル保存を開始しました。");
      } else {
        alert("このブラウザではファイル保存に失敗しました。コピー保存をおすすめします。");
      }
    };
  }

  // ===== 保存処理 =====
  async function tryFileDownload(jsonText, filename) {
    try {
      const blob = new Blob([jsonText], { type: "application/json" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      a.rel = "noopener";
      a.style.display = "none";
      document.body.appendChild(a);
      a.click();

      setTimeout(() => {
        a.remove();
        URL.revokeObjectURL(url);
      }, 1200);

      return { ok: true, mode: "download" };
    } catch (e) {
      return { ok: false, mode: "download", error: e };
    }
  }

  async function tryShareFile(jsonText, filename) {
    try {
      if (!navigator.share || typeof File === "undefined") {
        return { ok: false, mode: "share" };
      }

      const file = new File([jsonText], filename, { type: "application/json" });

      if (navigator.canShare && !navigator.canShare({ files: [file] })) {
        return { ok: false, mode: "share" };
      }

      await navigator.share({
        title: "たこ焼きトレカ バックアップ",
        text: "バックアップファイルを保存してください。",
        files: [file]
      });

      return { ok: true, mode: "share" };
    } catch (e) {
      return { ok: false, mode: "share", error: e };
    }
  }

  async function backupAsFile(payload, filename) {
    const jsonText = JSON.stringify(payload, null, 2);
    const result = await tryFileDownload(jsonText, filename);

    if (result.ok) {
      if (isLikelyRestrictedBrowser()) {
        setTimeout(() => {
          alert("このブラウザでは、保存できていない場合があります。保存されていない時は『テキストで保存』を使ってください。");
        }, 180);
      }
      return true;
    }

    openBackupTextModal(
      jsonText,
      filename,
      "このブラウザではファイル保存に失敗しました。<br>下のJSONをコピーして、メモ帳などに保存してください。"
    );
    return false;
  }

    const jsonText = JSON.stringify(payload, null, 2);
    openBackupTextModal(
      jsonText,
      filename,
      "下のJSONをコピーして、メモ帳などに保存してください。<br>Yahoo・Firefox・アプリ内ブラウザではこの方法がいちばん確実です。"
    );
    return true;
  }

  async function backupAsShare(payload, filename) {
    const jsonText = JSON.stringify(payload, null, 2);
    const result = await tryShareFile(jsonText, filename);

    if (result.ok) {
      alert("共有画面を開きました。ファイルアプリやドライブ等に保存してください。");
      return true;
    }

    openBackupTextModal(
      jsonText,
      filename,
      "共有に失敗しました。<br>下のJSONをコピーして、メモ帳などに保存してください。"
    );
    return false;
  }

  // ===== 復元 =====
  function restoreFromParsedData(data) {
    if (!data || typeof data !== "object") {
      alert("この内容はバックアップ形式ではありません。");
      return false;
    }

    const source =
      (data.keys && typeof data.keys === "object") ? data.keys :
      (data.storage && typeof data.storage === "object") ? data.storage :
      null;

    if (!source) {
      alert("この内容はバックアップ形式ではありません。");
      return false;
    }

    const keys = Object.keys(source);
    const exportedAt = String(data.exportedAt || data.exported || "");

    const ok = confirm(
      "バックアップから復元します。\n" +
      "現在のデータは上書きされます（元に戻せません）。\n\n" +
      `復元キー数: ${keys.length}\n` +
      `書き出し日時: ${exportedAt}\n\n` +
      "続行しますか？"
    );
    if (!ok) return false;

    for (const k of keys) {
      const v = source[k];
      if (v === null || v === undefined) {
        localStorage.removeItem(k);
      } else {
        localStorage.setItem(k, String(v));
      }
    }

    alert("復元しました。ページを再読み込みします。");
    location.reload();
    return true;
  }

  async function restoreFromFile(file) {
    const text = await file.text();
    const data = safeJSONParse(text, null);

    if (!data) {
      alert("このファイルはバックアップ形式ではありません。");
      return;
    }

    restoreFromParsedData(data);
  }

  function normalizePastedText(text) {
    let t = String(text || "").trim();

    if (t.startsWith("takoyaki-trc-backup.json")) {
      t = t.replace(/^takoyaki-trc-backup\.json\s*/i, "").trim();
    }

    return t;
  }

  function restoreFromPastedText(text) {
    const normalized = normalizePastedText(text);

    if (!normalized) {
      alert("貼り付け内容が空です。");
      return;
    }

    const data = safeJSONParse(normalized, null);
    if (!data) {
      alert("JSONの形式が正しくありません。最初の { から最後の } まで貼り付けてください。");
      return;
    }

    restoreFromParsedData(data);
  }

    };

    const pasteText  = pasteModal.querySelector("#trcPasteRestoreText");
    const pasteRun   = pasteModal.querySelector("#trcPasteRestoreRun");
    const pasteClose = pasteModal.querySelector("#trcPasteRestoreClose");

    pasteClose.onclick = () => {
      pasteModal.style.display = "none";
    };

    pasteRun.onclick = () => {
      restoreFromPastedText(pasteText.value);
    };
  }

  // ===== UI wiring =====
  const btnBackup  = document.getElementById("trcFooterBackup");
  const btnRestore = document.getElementById("trcFooterRestore");
  const inp        = document.getElementById("trcFooterRestoreFile");

  if (!btnBackup || !btnRestore || !inp) return;

  btnBackup.addEventListener("click", async () => {
    const normal = btnBackup.textContent;
    btnBackup.disabled = true;
    btnBackup.textContent = "準備中…";

    try {
      openBackupChoiceModal();
    } catch (err) {
      console.error(err);
      alert("バックアップ画面の表示に失敗しました。");
    } finally {
      btnBackup.disabled = false;
      btnBackup.textContent = normal;
    }
  });

  btnRestore.addEventListener("click", () => {
    openRestoreChoiceModal();
  });

  inp.addEventListener("change", async () => {
    const f = inp.files && inp.files[0];
    inp.value = "";
    if (!f) return;

    const normal = btnRestore.textContent;
    btnRestore.disabled = true;
    btnRestore.textContent = "読込中…";

    try {
      await restoreFromFile(f);
    } finally {
      btnRestore.disabled = false;
      btnRestore.textContent = normal;
    }
  });
})();
