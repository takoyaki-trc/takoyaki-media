<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>釣神の最後の試練</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
  :root{
    --bg0:#06050b;
    --bg1:#0c1025;
    --panel: rgba(255,255,255,.07);
    --line: rgba(255,255,255,.14);
    --text:#fff;
    --muted:rgba(255,255,255,.76);
    --btn: rgba(255,255,255,.10);
    --btn2: rgba(255,255,255,.16);
    --shadow: 0 14px 40px rgba(0,0,0,.55);
    --cyan:#7fd0ff;
    --gold:#ffd979;
    --danger:#ff6a6a;
    --purple:#c897ff;
  }

  *{ box-sizing:border-box; }
  html,body{ height:100%; }

  body{
    margin:0;
    font-family:"DotGothic16","Noto Sans JP",system-ui,sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at 50% 10%, rgba(255,228,140,.08) 0, rgba(255,228,140,0) 22%),
      radial-gradient(circle at 50% 18%, #1b2147 0%, #090a14 58%),
      linear-gradient(var(--bg0),var(--bg1));
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }

  .app{
    min-height:100svh;
    display:flex;
    flex-direction:column;
  }

  .topbar{
    position:sticky;
    top:0;
    z-index:50;
    padding:10px 10px 8px;
    background:linear-gradient(180deg, rgba(0,0,0,.58), rgba(0,0,0,0));
    backdrop-filter:blur(8px);
  }

  .topbar-inner{
    max-width:920px;
    margin:0 auto;
    display:flex;
    align-items:center;
    gap:10px;
  }

  .backbtn{
    appearance:none;
    border:1px solid var(--line);
    background:rgba(255,255,255,.08);
    color:var(--text);
    border-radius:12px;
    padding:10px 12px;
    font-weight:900;
    cursor:pointer;
  }

  .titlebox{
    min-width:0;
    display:flex;
    flex-direction:column;
    gap:2px;
  }

  .title{
    font-weight:1000;
    letter-spacing:.02em;
    line-height:1.1;
    font-size:16px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .subtitle{
    font-size:11px;
    color:var(--muted);
    line-height:1.45;
  }

  .main{
    flex:1;
    display:flex;
    justify-content:center;
    padding:10px 10px calc(16px + env(safe-area-inset-bottom));
  }

  .card{
    width:min(560px, 100%);
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.14);
    border-radius:18px;
    box-shadow:var(--shadow);
    overflow:hidden;
    display:flex;
    flex-direction:column;
    min-height:0;
  }

  .hud{
    padding:10px 12px;
    border-bottom:1px solid rgba(255,255,255,.12);
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    background:rgba(0,0,0,.12);
  }

  .hud-left{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    align-items:center;
  }

  .btn{
    appearance:none;
    border:1px solid var(--line);
    background:var(--btn);
    color:var(--text);
    border-radius:14px;
    padding:10px 12px;
    font-weight:900;
    cursor:pointer;
  }

  .btn:hover{ background:var(--btn2); }
  .btn[disabled]{ opacity:.45; cursor:not-allowed; }

  .stats{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
    font-size:12px;
    color:rgba(255,255,255,.92);
  }

  .stats b{ font-weight:1000; }

  .canvaswrap{
    position:relative;
    padding:10px;
    display:flex;
    flex-direction:column;
    gap:10px;
    min-height:0;
    flex:1;
  }

  .canvasbox{
    position:relative;
    width:100%;
    border-radius:16px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,.14);
    background:#8edcff;
    flex:1;
    min-height:0;
    display:flex;
    align-items:center;
    justify-content:center;
    touch-action:none;
  }

  canvas{
    width:100%;
    height:auto;
    display:block;
    image-rendering:pixelated;
    touch-action:none;
    background:#8edcff;
  }

  .footnote{
    font-size:11px;
    color:rgba(255,255,255,.74);
    line-height:1.6;
  }

  .countOverlay{
    position:absolute;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    z-index:20;
    pointer-events:none;
    background:transparent;
  }

  .countOverlay.show{ display:flex; }

  .countInner{
    min-width:210px;
    text-align:center;
    padding:18px 22px;
    border-radius:20px;
    background:rgba(8,15,28,.28);
    border:1px solid rgba(255,255,255,.14);
    box-shadow:0 10px 34px rgba(0,0,0,.28);
    backdrop-filter:blur(3px);
  }

  .countLabel{
    font-size:12px;
    font-weight:1000;
    letter-spacing:.14em;
    color:rgba(255,255,255,.86);
    margin-bottom:8px;
  }

  .countNum{
    font-size:76px;
    line-height:1;
    font-weight:1000;
    text-shadow:
      0 0 10px rgba(127,208,255,.38),
      0 0 24px rgba(127,208,255,.18);
  }

  .countHelp{
    margin-top:8px;
    font-size:12px;
    font-weight:900;
    color:rgba(255,255,255,.82);
  }

  .resultOverlay{
    position:fixed;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    padding:
      max(10px, env(safe-area-inset-top))
      10px
      max(10px, env(safe-area-inset-bottom))
      10px;
    z-index:200;
    background:rgba(0,0,0,.78);
    backdrop-filter:blur(3px);
  }

  .resultOverlay.show{ display:flex; }

  .resultModal{
    width:min(460px, calc(100vw - 20px));
    max-height:min(calc(100svh - 20px - env(safe-area-inset-top) - env(safe-area-inset-bottom)), 760px);
    border-radius:22px;
    border:1px solid rgba(255,255,255,.16);
    background:
      radial-gradient(120% 80% at 50% 0%, rgba(255,214,120,.12), rgba(255,214,120,0) 36%),
      radial-gradient(100% 80% at 50% 100%, rgba(84,118,255,.09), rgba(84,118,255,0) 40%),
      linear-gradient(180deg, rgba(24,30,52,.97), rgba(10,14,26,.98));
    box-shadow:
      0 20px 60px rgba(0,0,0,.55),
      0 0 30px rgba(255,196,90,.08) inset;
    display:flex;
    flex-direction:column;
    min-height:0;
    overflow:hidden;
      transform:translateY(12px) scale(.96);
    opacity:0;
    animation:resultPop .24s ease forwards;
  }

  @keyframes resultPop{
    0%{ transform:translateY(14px) scale(.95); opacity:0; }
    70%{ transform:translateY(-3px) scale(1.01); opacity:1; }
    100%{ transform:translateY(0) scale(1); opacity:1; }
  }

  .resultScroll{
    flex:1 1 auto;
    min-height:0;
    overflow-y:auto;
    overflow-x:hidden;
    -webkit-overflow-scrolling:touch;
    overscroll-behavior:contain;
    padding:12px 12px 10px;
  }

  .resultHero{
    margin:0 0 10px;
    padding:12px 10px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,.12);
    background:
      radial-gradient(circle at 50% 0%, rgba(255,210,90,.18), rgba(255,210,90,0) 55%),
      linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
    text-align:center;
    position:relative;
    overflow:hidden;
  }

  .resultScoreLabel{
    font-size:12px;
    font-weight:900;
    letter-spacing:.12em;
    opacity:.78;
    margin-bottom:6px;
  }

  .resultScoreValue{
    font-size:42px;
    line-height:1;
    font-weight:1000;
    color:#fff8ea;
    text-shadow:
      0 0 12px rgba(255,214,110,.25),
      0 0 28px rgba(255,179,60,.16);
  }

  .rankWrap{
    margin:0 0 10px;
    padding:12px 12px 11px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,.12);
    background:
      radial-gradient(circle at 50% 0%, rgba(255,215,120,.14), rgba(255,215,120,0) 52%),
      linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025)),
      rgba(255,255,255,.03);
  }

  .rankLabel{
    font-size:11px;
    opacity:.72;
    font-weight:900;
    letter-spacing:.1em;
    margin-bottom:4px;
  }

  .rankValue{
    font-size:22px;
    font-weight:1000;
    line-height:1.35;
    color:#fff4d8;
  }

  .rankSub{
    margin-top:6px;
    font-size:13px;
    opacity:.9;
    line-height:1.55;
  }

  .resultStats{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin-bottom:10px;
  }

  .statCard{
    padding:10px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.06);
    min-width:0;
  }

  .statLabel{
    font-size:12px;
    opacity:.75;
    margin-bottom:4px;
    font-weight:900;
    letter-spacing:.04em;
  }

  .statValue{
    font-size:18px;
    font-weight:1000;
    line-height:1.2;
  }

  .statMini{
    margin-top:4px;
    font-size:11px;
    opacity:.86;
    line-height:1.4;
  }

  .resultActions{
    flex:0 0 auto;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    padding:10px 12px calc(10px + env(safe-area-inset-bottom));
    border-top:1px solid rgba(255,255,255,.08);
    background:linear-gradient(180deg, rgba(18,22,32,.96), rgba(12,15,22,.98));
  }

  .resultActions .actionBtn{
    width:100%;
    min-width:0;
    padding:13px 12px;
    border-radius:14px;
    font-size:15px;
    font-weight:900;
    cursor:pointer;
    border:1px solid rgba(255,255,255,.14);
  }

  .actionRetry{
    background:linear-gradient(180deg, #7fd0ff, #41aef0);
    color:#06253b;
    box-shadow:0 10px 20px rgba(80,175,240,.18);
  }

  .actionClose{
    background:#2a3147;
    color:#fff;
  }

  @media (max-width:560px){
    .countNum{ font-size:60px; }
    .resultModal{
      width:min(100%, 420px);
      border-radius:18px;
    }
    .resultScoreValue{ font-size:34px; }
    .rankValue{ font-size:19px; }
    .resultActions{
      grid-template-columns:1fr 1fr;
      gap:8px;
      padding:10px 10px calc(10px + env(safe-area-inset-bottom));
    }
    .resultActions .actionBtn{
      font-size:14px;
      padding:12px 10px;
    }
  }
</style>
</head>

<body>
<div class="app">
  <header class="topbar">
    <div class="topbar-inner">
      <button id="backBtn" class="backbtn" type="button" aria-label="戻る">← 戻る</button>
      <div class="titlebox">
        <div class="title">釣神の最後の試練</div>
        <div class="subtitle">超極小だけを釣り上げ、神域に届け</div>
      </div>
    </div>
  </header>

  <main class="main">
    <section class="card" aria-label="釣神の最後の試練">
      <div class="hud">
        <div class="hud-left">
          <button id="retryBtn" class="btn" type="button">もう一回</button>
        </div>
        <div class="stats" aria-label="ステータス">
          <span>成功：<b id="tfCatch">0</b></span>
          <span>神極小：<b id="tfDivine">0</b></span>
          <span>失敗：<b id="tfMiss">0</b></span>
          <span>残り：<b id="tfTime">--</b>s</span>
          <span>判定：<b id="tfJudge">---</b></span>
        </div>
      </div>

      <div class="canvaswrap">
        <div class="canvasbox">
          <canvas id="tfCanvas" width="360" height="520"></canvas>

          <div id="countOverlay" class="countOverlay" aria-hidden="true">
            <div class="countInner">
              <div class="countLabel">TRIAL START</div>
              <div id="countNum" class="countNum">3</div>
              <div class="countHelp">超極小だけを狙え</div>
            </div>
          </div>
        </div>

        <div class="footnote">
          タップで糸を落下 → 超極小だけを回収。<br>
          最後の5秒は神域モード。さらに小さい獲物が現れます。
        </div>
      </div>
    </section>
  </main>
</div>

<div id="resultOverlay" class="resultOverlay" role="dialog" aria-modal="true" aria-label="結果">
  <div class="resultModal">
    <div id="resultScroll" class="resultScroll">
      <div class="resultHero">
        <div class="resultScoreLabel">TRIAL RESULT</div>
        <div id="resultScoreValue" class="resultScoreValue">FAIL</div>
      </div>

      <div class="rankWrap">
        <div class="rankLabel">JUDGEMENT</div>
        <div id="rankValue" class="rankValue">---</div>
        <div id="rankSub" class="rankSub">---</div>
      </div>

      <div class="resultStats">
        <div class="statCard">
          <div class="statLabel">TOTAL CATCH</div>
          <div id="statCatch" class="statValue">0個</div>
          <div id="statDivine" class="statMini">神極小：0個</div>
        </div>
        <div class="statCard">
          <div class="statLabel">MISS</div>
          <div id="statMiss" class="statValue">0</div>
          <div id="statMode" class="statMini">神域モード：未到達</div>
        </div>
      </div>
    </div>

    <div class="resultActions">
      <button id="playAgainBtn" class="actionBtn actionRetry" type="button">もう一回試す</button>
      <button id="resultCloseBtn" class="actionBtn actionClose" type="button">結果を持ち帰る</button>
    </div>
  </div>
</div>

<script>
(() => {
  "use strict";

  const LS_TRIAL_SESSION = "ttc_god_trial_session_v1";
  const LS_TRIAL_RESULT  = "ttc_god_trial_result_v1";
  const EXPECTED_SEED = "seed_god_fish";

  const CDN_BASE = "https://cdn.jsdelivr.net/gh/takoyaki-trc/takoyaki-gate@main/assets/takofish/";
  const IMG_URLS = {
    pick: `${CDN_BASE}pick.png?v=3`,
    tiny: `${CDN_BASE}tako_sauce.png?v=3`,
    divine: `${CDN_BASE}tako_rainbow.png?v=3`,
  };

  const CFG = {
    W: 360,
    H: 520,
    LIMIT: 20,
    COUNTDOWN_SEC: 3,
    FLOOR_Y_RATIO: 0.86,
    TOP_Y: 18,

    /* 超極小 */
    TARGET_DRAW: 16,
    TARGET_BASE: 1,

    /* 神極小 */
    DIVINE_DRAW: 20,
    DIVINE_BONUS: 2,
    DIVINE_CHANCE: 0.12,

    /* 神域モード */
    DIVINE_PHASE_START: 15, /* 残り5秒で開始 */
    GOD_MODE_DRAW: 12,
    GOD_MODE_DIVINE_DRAW: 15,

    ITEM_COUNT: 6,
    HOOK_DROP_BASE: 700,
    HOOK_REEL_BASE: 320,
  };

  const els = {
    backBtn: document.getElementById("backBtn"),
    retryBtn: document.getElementById("retryBtn"),
    canvas: document.getElementById("tfCanvas"),

    countOverlay: document.getElementById("countOverlay"),
    countNum: document.getElementById("countNum"),

    tfCatch: document.getElementById("tfCatch"),
    tfDivine: document.getElementById("tfDivine"),
    tfMiss: document.getElementById("tfMiss"),
    tfTime: document.getElementById("tfTime"),
    tfJudge: document.getElementById("tfJudge"),

    resultOverlay: document.getElementById("resultOverlay"),
    resultScoreValue: document.getElementById("resultScoreValue"),
    rankValue: document.getElementById("rankValue"),
    rankSub: document.getElementById("rankSub"),
    statCatch: document.getElementById("statCatch"),
    statDivine: document.getElementById("statDivine"),
    statMiss: document.getElementById("statMiss"),
    statMode: document.getElementById("statMode"),
    playAgainBtn: document.getElementById("playAgainBtn"),
    resultCloseBtn: document.getElementById("resultCloseBtn"),
  };

  let IMGS = null;
  let STATE = null;
  let rafId = null;
  let countdownTimer = null;
  let countdownRunning = false;
  let onPointer = null;
  let session = null;

  function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }
  function rand(a, b){ return a + Math.random() * (b - a); }
  function nowMs(){ return performance.now(); }

  function openResult(){
    els.resultOverlay.classList.add("show");
    document.body.style.overflow = "hidden";
  }

  function closeResult(){
    els.resultOverlay.classList.remove("show");
    document.body.style.overflow = "";
  }

  function loadImage(src){
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = () => reject(new Error(src));
      img.src = src;
    });
  }

  async function loadAllImages(){
    const out = {};
    for (const [k, v] of Object.entries(IMG_URLS)){
      out[k] = await loadImage(v);
    }
    return out;
  }

  function loadSession(){
    try{
      return JSON.parse(localStorage.getItem(LS_TRIAL_SESSION) || "null");
    }catch{
      return null;
    }
  }

  function saveTrialResult(grade, detail){
    if (!session) return;
    localStorage.setItem(LS_TRIAL_RESULT, JSON.stringify({
      sessionId: session.sessionId,
      seedId: EXPECTED_SEED,
      grade,
      detail,
      score: detail.totalScore,
      at: Date.now()
    }));
  }

  function goBack(){
    if (session?.returnTo){
      location.href = session.returnTo;
    } else {
      history.back();
    }
  }

  function detachPointer(){
    const cvs = els.canvas;
    if (cvs && onPointer){
      cvs.removeEventListener("pointerdown", onPointer);
      onPointer = null;
    }
  }

  function stopCountdown(){
    countdownRunning = false;
    if (countdownTimer){
      clearTimeout(countdownTimer);
      countdownTimer = null;
    }
    els.countOverlay.classList.remove("show");
  }

  function stopGame(){
    stopCountdown();
    if (rafId) cancelAnimationFrame(rafId);
    rafId = null;
    detachPointer();
    STATE = null;
  }

  function pointerToCanvasX(e, cvs){
    const rect = cvs.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (CFG.W / rect.width);
    return clamp(x, 10, CFG.W - 10);
  }

  function hookDropSpeed(hy, floorY){
    const t = clamp((hy - CFG.TOP_Y) / Math.max(1, (floorY - CFG.TOP_Y)), 0, 1);
    return CFG.HOOK_DROP_BASE * (1.0 + 0.55 * t);
  }

  function hookReelSpeed(hy, floorY, hasCatch){
    const t = clamp((hy - CFG.TOP_Y) / Math.max(1, (floorY - CFG.TOP_Y)), 0, 1);
    return CFG.HOOK_REEL_BASE * (1.20 + 0.65 * (1 - t)) * (hasCatch ? 1.18 : 1.0);
  }

  function circleHit(ax, ay, ar, bx, by, br){
    const dx = ax - bx;
    const dy = ay - by;
    return (dx * dx + dy * dy) <= (ar + br) * (ar + br);
  }

  function getJudge(catchCount, divineCount){
    const total = catchCount + divineCount * CFG.DIVINE_BONUS;
    if (total >= 16) return { grade:"perfect", label:"PERFECT", line:"釣神はあなたを神域の者と認めた。" };
    if (total >= 11) return { grade:"great", label:"GREAT", line:"神域の縁に触れた。あと一歩で完全到達。" };
    if (total >= 7)  return { grade:"clear", label:"CLEAR", line:"試練突破。釣神の眼に映るだけの腕がある。" };
    return { grade:"fail", label:"FAIL", line:"まだ足りない。もっと小さな世界を見抜け。" };
  }

  function updateJudgeUI(){
    if (!STATE) return;
    const j = getJudge(STATE.catchCount, STATE.divineCount);
    els.tfJudge.textContent = j.label;
  }

  function setHud(){
    if (!STATE) return;
    els.tfCatch.textContent = String(STATE.catchCount);
    els.tfDivine.textContent = String(STATE.divineCount);
    els.tfMiss.textContent = String(STATE.miss);
    els.tfTime.textContent = String(Math.max(0, CFG.LIMIT - STATE.elapsed));
    updateJudgeUI();
  }

  function makeTarget(){
    const divine = Math.random() < CFG.DIVINE_CHANCE;
    const godMode = STATE.godMode;
    return {
      x: rand(CFG.W * 0.14, CFG.W * 0.86),
      baseY: STATE.world.FLOOR_Y - 14 + rand(-2, 2),
      y: 0,
      alive: true,
      divine,
      draw: divine
        ? (godMode ? CFG.GOD_MODE_DIVINE_DRAW : CFG.DIVINE_DRAW)
        : (godMode ? CFG.GOD_MODE_DRAW : CFG.TARGET_DRAW),
      vx: (Math.random() < 0.5 ? -1 : 1) * rand(26, 56),
      vxTarget: (Math.random() < 0.5 ? -1 : 1) * rand(26, 64),
      bobAmp: rand(0.8, 2.6),
      bobSpd: rand(3.4, 7.8),
      bobPhase: rand(0, Math.PI * 2),
      nextMind: nowMs() + rand(360, 1200),
      pauseUntil: 0,
    };
  }

  function resetTarget(it){
    const t = makeTarget();
    Object.assign(it, t);
    it.y = it.baseY;
  }

  function startCountdown(){
    if (!STATE) return;
    countdownRunning = true;
    STATE.phase = "countdown";
    STATE.inputEnabled = false;
    STATE.timerStarted = false;

    let n = CFG.COUNTDOWN_SEC;
    els.countNum.textContent = String(n);
    els.countOverlay.classList.add("show");

    function tick(){
      if (!STATE || !countdownRunning) return;

      if (n > 1){
        n--;
        els.countNum.textContent = String(n);
        countdownTimer = setTimeout(tick, 1000);
        return;
      }

      els.countNum.textContent = "GO!";
      countdownTimer = setTimeout(() => {
        if (!STATE) return;
        stopCountdown();
        STATE.phase = "play";
        STATE.inputEnabled = true;
        STATE.timerStarted = true;
        STATE.lastTickAt = nowMs();
      }, 420);
    }

    countdownTimer = setTimeout(tick, 1000);
  }

  function startGame(){
    stopGame();
    closeResult();

    const cvs = els.canvas;
    const ctx = cvs.getContext("2d");
    ctx.imageSmoothingEnabled = false;

    const FLOOR_Y = Math.floor(CFG.H * CFG.FLOOR_Y_RATIO);
    const HORIZON_Y = Math.floor(CFG.H * 0.34);

    STATE = {
      elapsed: 0,
      catchCount: 0,
      divineCount: 0,
      miss: 0,
      godMode: false,
      ended: false,

      phase: "countdown",
      inputEnabled: false,
      timerStarted: false,
      lastTickAt: 0,

      flashMsg: "",
      flashUntil: 0,

      items: [],
      hook: null,

      world: {
        FLOOR_Y,
        HORIZON_Y
      }
    };

    for (let i = 0; i < CFG.ITEM_COUNT; i++){
      const it = makeTarget();
      it.y = it.baseY;
      STATE.items.push(it);
    }

    STATE.hook = {
      x: CFG.W * 0.5,
      y: CFG.TOP_Y,
      phase: "idle",
      hasCatch: false,
      caught: null,
    };

    function setHookIdle(){
      const h = STATE.hook;
      h.phase = "idle";
      h.y = CFG.TOP_Y;
      h.hasCatch = false;
      h.caught = null;
    }

    function startDropAt(x){
      if (!STATE || !STATE.inputEnabled || STATE.ended) return;
      const h = STATE.hook;
      if (h.phase !== "idle") return;
      h.x = clamp(x, 10, CFG.W - 10);
      h.phase = "drop";
      h.hasCatch = false;
      h.caught = null;
    }

    onPointer = (e) => {
      e.preventDefault();
      startDropAt(pointerToCanvasX(e, cvs));
    };
    cvs.addEventListener("pointerdown", onPointer, { passive:false });

    function drawBackground(now){
      const god = STATE.godMode;
      const seaRough = clamp(STATE.miss / 10, 0, 1);
      const HORIZON_Y = STATE.world.HORIZON_Y;
      const FLOOR_Y = STATE.world.FLOOR_Y;

      const skyGrad = ctx.createLinearGradient(0, 0, 0, HORIZON_Y);
      if (god){
        skyGrad.addColorStop(0, "#6246a8");
        skyGrad.addColorStop(.6, "#1b3264");
        skyGrad.addColorStop(1, "#102647");
      } else {
        skyGrad.addColorStop(0, "#9ee7ff");
        skyGrad.addColorStop(.62, "#c6f0ff");
        skyGrad.addColorStop(1, "#dff7ff");
      }
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, CFG.W, HORIZON_Y);

      const seaGrad = ctx.createLinearGradient(0, HORIZON_Y, 0, CFG.H);
      if (god){
        seaGrad.addColorStop(0, "#2d64b7");
        seaGrad.addColorStop(.5, "#173d7f");
        seaGrad.addColorStop(1, "#0b214b");
      } else {
        seaGrad.addColorStop(0, "#36a4db");
        seaGrad.addColorStop(.5, "#1675a9");
        seaGrad.addColorStop(1, "#0b3d67");
      }
      ctx.fillStyle = seaGrad;
      ctx.fillRect(0, HORIZON_Y, CFG.W, CFG.H - HORIZON_Y);

      const waveAmp = god ? 3.2 + seaRough * 3.4 : 1.5 + seaRough * 3.2;
      const waveAlpha = god ? 0.34 : 0.24;

      for (let i = 0; i < CFG.W + 40; i += 18){
        const y = HORIZON_Y + 6 + Math.sin((now / 140) + i * 0.18) * waveAmp;
        ctx.fillStyle = `rgba(255,255,255,${waveAlpha})`;
        ctx.fillRect(i, y, 12, 2);
      }

      ctx.fillStyle = god ? "rgba(255,220,130,.07)" : "rgba(255,255,255,.05)";
      for (let i = 0; i < 11; i++){
        const bx = 16 + (i * 31 % CFG.W);
        const by = HORIZON_Y + 30 + ((i * 33 + Math.sin(now / 700 + i) * 18) % (CFG.H - HORIZON_Y - 90));
        const r = (i % 3) + 1;
        ctx.beginPath();
        ctx.arc(bx, by, r, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.fillStyle = god ? "#12345d" : "#1d6288";
      ctx.fillRect(0, FLOOR_Y, CFG.W, CFG.H - FLOOR_Y);
      ctx.fillStyle = "rgba(255,255,255,.10)";
      ctx.fillRect(0, FLOOR_Y - 6, CFG.W, 6);

      if (god){
        ctx.fillStyle = "rgba(255,222,130,.08)";
        ctx.fillRect(0, 0, CFG.W, CFG.H);
      }

      if (STATE.flashUntil > now && STATE.flashMsg){
        ctx.fillStyle = "rgba(0,0,0,.48)";
        ctx.fillRect(0, 46, CFG.W, 26);
        ctx.fillStyle = "#fff";
        ctx.font = "13px system-ui";
        ctx.fillText(STATE.flashMsg, 12, 64);
      }
    }

    function drawTargets(){
      for (const it of STATE.items){
        if (!it.alive) continue;
        const img = it.divine ? IMGS.divine : IMGS.tiny;
        ctx.save();
        if (it.divine){
          ctx.shadowColor = "rgba(255,223,120,.38)";
          ctx.shadowBlur = 10;
        }
        ctx.drawImage(img, Math.round(it.x - it.draw / 2), Math.round(it.y - it.draw / 2), it.draw, it.draw);
        ctx.restore();
      }
    }

    function drawHook(){
      const h = STATE.hook;
      ctx.strokeStyle = "rgba(255,255,255,.28)";
      ctx.beginPath();
      ctx.moveTo(h.x, CFG.TOP_Y);
      ctx.lineTo(h.x, h.y);
      ctx.stroke();

      ctx.drawImage(IMGS.pick, Math.round(h.x - 12), Math.round(h.y - 12), 24, 24);

      if (h.hasCatch && h.caught){
        const size = h.caught.draw;
        const ty = h.y + 12 + (size / 2) - 2;
        const img = h.caught.divine ? IMGS.divine : IMGS.tiny;
        ctx.save();
        if (h.caught.divine){
          ctx.shadowColor = "rgba(255,223,120,.40)";
          ctx.shadowBlur = 10;
        }
        ctx.drawImage(img, Math.round(h.x - size / 2), Math.round(ty - size / 2), size, size);
        ctx.restore();
      }
    }

    function render(now){
      drawBackground(now);
      drawTargets();
      drawHook();
    }

    function finish(){
      STATE.ended = true;
      const judge = getJudge(STATE.catchCount, STATE.divineCount);

      saveTrialResult(judge.grade, {
        catchCount: STATE.catchCount,
        divineCount: STATE.divineCount,
        miss: STATE.miss,
        godMode: STATE.godMode,
        totalScore: STATE.catchCount + STATE.divineCount * CFG.DIVINE_BONUS
      });

      els.resultScoreValue.textContent = judge.label;
      els.rankValue.textContent = judge.label;
      els.rankSub.textContent = judge.line;
      els.statCatch.textContent = `${STATE.catchCount}個`;
      els.statDivine.textContent = `神極小：${STATE.divineCount}個`;
      els.statMiss.textContent = String(STATE.miss);
      els.statMode.textContent = `神域モード：${STATE.godMode ? "到達" : "未到達"}`;

      openResult();
    }

    let last = nowMs();

    function step(now){
      if (!STATE) return;

      const dt = Math.min(0.033, (now - last) / 1000);
      last = now;

      if (STATE.timerStarted && !STATE.ended){
        const sec = Math.floor((now - STATE.lastTickAt) / 1000);
        if (sec > STATE.elapsed){
          STATE.elapsed = sec;
          const remain = Math.max(0, CFG.LIMIT - STATE.elapsed);

          if (!STATE.godMode && remain <= 5){
            STATE.godMode = true;
            STATE.flashMsg = "神域モード突入";
            STATE.flashUntil = now + 1200;

            for (const it of STATE.items){
              if (it.alive){
                it.draw = it.divine ? CFG.GOD_MODE_DIVINE_DRAW : CFG.GOD_MODE_DRAW;
              }
            }
          }

          if (remain <= 0){
            finish();
          }
          setHud();
        }
      }

      if (!STATE.ended){
        for (const it of STATE.items){
          if (!it.alive) continue;

          if (now < it.pauseUntil){
            it.vx *= 0.90;
          } else {
            if (now >= it.nextMind){
              if (Math.random() < 0.12) it.pauseUntil = now + rand(220, 520);
              const flip = (Math.random() < 0.5 ? -1 : 1);
              it.vxTarget = flip * rand(26, STATE.godMode ? 86 : 62);
              it.bobAmp = clamp(it.bobAmp + rand(-0.6, 0.8), 0.8, 4.0);
              it.bobSpd = clamp(it.bobSpd + rand(-1.1, 1.2), 3.2, 10);
              it.nextMind = now + rand(280, 820);
            }

            const dv = it.vxTarget - it.vx;
            it.vx += clamp(dv, -250 * dt, 250 * dt);
            it.x += it.vx * dt;
            it.y = it.baseY + Math.sin((now / 1000) * it.bobSpd + it.bobPhase) * it.bobAmp;

            const half = it.draw / 2;
            if (it.x - half < 12){
              it.x = 12 + half;
              it.vx = Math.abs(it.vx);
              it.vxTarget = Math.abs(it.vxTarget);
            }
            if (it.x + half > CFG.W - 12){
              it.x = CFG.W - 12 - half;
              it.vx = -Math.abs(it.vx);
              it.vxTarget = -Math.abs(it.vxTarget);
            }
          }
        }

        const h = STATE.hook;
        const FLOOR_Y = STATE.world.FLOOR_Y;

        if (h.phase === "drop"){
          const spd = hookDropSpeed(h.y, FLOOR_Y);
          h.y += spd * dt;

          if (!h.hasCatch){
            for (const it of STATE.items){
              if (!it.alive) continue;
              const rr = it.draw * 0.34;
              if (circleHit(h.x, h.y, 9, it.x, it.y, rr)){
                h.hasCatch = true;
                h.phase = "reel";
                h.caught = { divine:it.divine, draw:it.draw };
                it.alive = false;
                break;
              }
            }
          }

          if (h.y >= FLOOR_Y - 10){
            h.y = FLOOR_Y - 10;
            h.phase = "reel";
            if (!h.hasCatch){
              STATE.miss++;
              STATE.flashMsg = "空振り";
              STATE.flashUntil = now + 700;
              setHud();
            }
          }
        }

        if (h.phase === "reel"){
          const spd = hookReelSpeed(h.y, FLOOR_Y, h.hasCatch);
          h.y -= spd * dt;

          if (h.y <= CFG.TOP_Y){
            h.y = CFG.TOP_Y;

            if (h.hasCatch && h.caught){
              if (h.caught.divine){
                STATE.divineCount++;
                STATE.flashMsg = "神極小捕獲";
              } else {
                STATE.catchCount++;
                STATE.flashMsg = "超極小捕獲";
              }
              STATE.flashUntil = now + 800;

              const dead = STATE.items.find(v => !v.alive);
              if (dead) resetTarget(dead);

              h.phase = "idle";
              h.hasCatch = false;
              h.caught = null;
              setHud();
            } else {
              h.phase = "idle";
            }
          }
        }
      }

      render(now);
      rafId = requestAnimationFrame(step);
    }

    function begin(){
      const cvs = els.canvas;
      const ctx = cvs.getContext("2d");
      ctx.imageSmoothingEnabled = false;

      ctx.fillStyle = "#8fdbff";
      ctx.fillRect(0, 0, CFG.W, CFG.H);
      ctx.fillStyle = "#fff";
      ctx.font = "14px system-ui";
      ctx.fillText("試練準備中…", 128, 260);

      startCountdown();
      setHud();
      rafId = requestAnimationFrame(step);
    }

    async function init(){
      try{
        IMGS = await loadAllImages();
      } catch(e){
        const ctx = els.canvas.getContext("2d");
        ctx.fillStyle = "#081425";
        ctx.fillRect(0, 0, CFG.W, CFG.H);
        ctx.fillStyle = "#fff";
        ctx.font = "14px system-ui";
        ctx.fillText("画像の読み込みに失敗しました", 70, 250);
        return;
      }

      session = loadSession();
      if (!session || session.seedId !== EXPECTED_SEED){
        const ctx = els.canvas.getContext("2d");
        ctx.fillStyle = "#081425";
        ctx.fillRect(0, 0, CFG.W, CFG.H);
        ctx.fillStyle = "#fff";
        ctx.font = "14px system-ui";
        ctx.fillText("無効な試練です", 120, 250);
        return;
      }

      els.canvas.getContext("2d").imageSmoothingEnabled = false;
      startGame();
      begin();
    }

    els.backBtn.addEventListener("click", goBack);
    els.retryBtn.addEventListener("click", () => {
      startGame();
      begin();
    });
    els.playAgainBtn.addEventListener("click", () => {
      closeResult();
      startGame();
      begin();
    });
    els.resultCloseBtn.addEventListener("click", goBack);
    els.resultOverlay.addEventListener("click", (e) => {
      if (e.target === els.resultOverlay) closeResult();
    });

    init();
  })();
</script>
