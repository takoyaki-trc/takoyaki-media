<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>釣神の最後の試練</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  body{
    margin:0;
    font-family:"DotGothic16","MS Gothic",sans-serif;
    background:linear-gradient(180deg,#2a1450,#130722);
    color:#fff8e8;
    padding:16px;
  }
  .wrap{max-width:440px;margin:0 auto;}
  .panel{
    border-radius:20px;
    background:linear-gradient(180deg,rgba(111,52,179,.72),rgba(47,20,86,.96));
    border:2px solid rgba(255,223,150,.42);
    overflow:hidden;
    box-shadow:0 14px 30px rgba(0,0,0,.35);
  }
  .head{
    padding:16px;
    text-align:center;
    font-family:"Press Start 2P",monospace;
    font-size:14px;
    line-height:1.8;
    color:#ffe7b0;
    background:linear-gradient(180deg,#4c287a,#281248);
  }
  .body{padding:14px;}
  .note{text-align:center;line-height:1.8;color:#e9dcc0;font-size:13px;margin-bottom:12px;}
  .sea{
    position:relative;
    height:320px;
    border-radius:18px;
    overflow:hidden;
    background:
      linear-gradient(180deg,#7fd4ff 0 26%, #2f8fd6 26% 100%);
    box-shadow:inset 0 0 0 2px rgba(255,255,255,.08);
  }
  .target{
    position:absolute;
    width:18px;
    height:18px;
    border-radius:50%;
    background:radial-gradient(circle at 40% 35%, #ffd574 0 35%, #b75d16 60%, #6d320e 100%);
    border:1px solid rgba(255,245,190,.6);
    box-shadow:0 0 10px rgba(255,214,116,.24);
    cursor:pointer;
  }
  .status{
    margin-top:12px;
    padding:12px;
    border-radius:14px;
    background:rgba(255,255,255,.08);
    line-height:1.8;
    text-align:center;
  }
  .btn{
    width:100%;
    min-height:52px;
    border:0;
    border-radius:15px;
    cursor:pointer;
    font-size:18px;
    font-weight:900;
    font-family:"DotGothic16","MS Gothic",sans-serif;
    color:#2d220f;
    background:linear-gradient(180deg,#ffe98a 0%,#efc445 100%);
    border:2px solid rgba(120,93,45,.42);
    margin-top:12px;
  }
  .btn.secondary{
    background:linear-gradient(180deg,#fffef8 0%,#efe7d0 100%);
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <div class="head">釣神の最後の試練</div>
    <div class="body">
      <div class="note">超極小たこ焼きだけを20秒で釣り上げろ。</div>
      <div class="sea" id="sea"></div>
      <div class="status" id="status">開始を押してください</div>
      <button class="btn" id="startBtn" type="button">開始</button>
      <button class="btn secondary" id="backBtn" type="button">戻る</button>
    </div>
  </div>
</div>

<script>
(() => {
  "use strict";

  const LS_TRIAL_SESSION = "ttc_god_trial_session_v1";
  const LS_TRIAL_RESULT  = "ttc_god_trial_result_v1";
  const EXPECTED_SEED = "seed_god_fish";

  const sea = document.getElementById("sea");
  const statusEl = document.getElementById("status");
  const startBtn = document.getElementById("startBtn");
  const backBtn = document.getElementById("backBtn");

  let session = null;
  let playing = false;
  let left = 20;
  let caught = 0;
  let timer = null;
  let spawn = null;

  function loadSession(){
    try{
      return JSON.parse(localStorage.getItem(LS_TRIAL_SESSION) || "null");
    }catch{
      return null;
    }
  }

  function saveResult(grade, score){
    if(!session) return;
    localStorage.setItem(LS_TRIAL_RESULT, JSON.stringify({
      sessionId: session.sessionId,
      seedId: EXPECTED_SEED,
      grade,
      score,
      at: Date.now()
    }));
  }

  function goBack(){
    if(session?.returnTo){
      location.href = session.returnTo;
    }else{
      history.back();
    }
  }

  function spawnOne(){
    if(!playing) return;
    const t = document.createElement("button");
    t.className = "target";
    t.type = "button";
    const x = Math.random() * (sea.clientWidth - 20);
    const y = 90 + Math.random() * (sea.clientHeight - 120);
    t.style.left = x + "px";
    t.style.top = y + "px";
    t.addEventListener("click", () => {
      if(!playing) return;
      caught++;
      statusEl.innerHTML = `残り ${left} 秒<br>釣果 ${caught}`;
      t.remove();
    });
    sea.appendChild(t);

    setTimeout(() => {
      t.remove();
    }, 1200);
  }

  function finish(){
    playing = false;
    clearInterval(timer);
    clearInterval(spawn);

    let grade = "fail";
    if(caught >= 16) grade = "perfect";
    else if(caught >= 11) grade = "great";
    else if(caught >= 7) grade = "clear";

    saveResult(grade, caught);
    statusEl.innerHTML = `試練終了<br>釣果 ${caught}<br>結果：${grade}`;
    startBtn.textContent = "戻る";
    startBtn.onclick = goBack;
  }

  function start(){
    if(!session || session.seedId !== EXPECTED_SEED) return;
    playing = true;
    left = 20;
    caught = 0;
    sea.innerHTML = "";
    statusEl.innerHTML = `残り 20 秒<br>釣果 0`;
    startBtn.disabled = true;

    timer = setInterval(() => {
      left--;
      statusEl.innerHTML = `残り ${left} 秒<br>釣果 ${caught}`;
      if(left <= 0) finish();
    }, 1000);

    spawn = setInterval(spawnOne, 420);
  }

  session = loadSession();
  if(!session || session.seedId !== EXPECTED_SEED){
    statusEl.textContent = "無効な試練です";
    startBtn.disabled = true;
  }

  startBtn.addEventListener("click", start);
  backBtn.addEventListener("click", goBack);
})();
</script>
</body>
</html>
