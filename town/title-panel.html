<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>称号の頂 - 月間記録パネル</title>

  <style>
    :root{
      --bg1:#12071f;
      --bg2:#24103d;
      --gold1:#ffe8a3;
      --gold2:#f5c85e;
      --gold3:#b77b1f;
      --panel:#2a1450;
      --panel2:#1c0f37;
      --line:rgba(255,232,163,.28);
      --text:#fff8e8;
      --muted:#dbcfae;
      --danger1:#d31721;
      --danger2:#7e0f15;
      --btn:#f5edd7;
      --btnText:#2d220f;
      --shadow:0 14px 30px rgba(0,0,0,.45);
      --radius:18px;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family:
        "Press Start 2P",
        "DotGothic16",
        "MS Gothic",
        "Hiragino Sans",
        sans-serif;
      background:
        radial-gradient(circle at 50% 18%, #4b2484 0%, #2a124c 30%, #160925 58%, #09040f 100%);
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      overflow:hidden;
    }

    body::before,
    body::after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
    }
    body::before{
      background:
        radial-gradient(circle at 18% 26%, rgba(255,216,120,.18) 0 2px, transparent 3px),
        radial-gradient(circle at 73% 19%, rgba(255,216,120,.16) 0 2px, transparent 3px),
        radial-gradient(circle at 31% 78%, rgba(255,216,120,.12) 0 2px, transparent 3px),
        radial-gradient(circle at 84% 67%, rgba(255,216,120,.14) 0 2px, transparent 3px),
        radial-gradient(circle at 56% 43%, rgba(147,105,255,.18) 0 2px, transparent 3px);
      opacity:.9;
    }
    body::after{
      background:
        linear-gradient(transparent 0 97%, rgba(255,255,255,.04) 97% 100%);
      background-size:100% 3px;
      mix-blend-mode:soft-light;
      opacity:.28;
    }

    .back-btn{
      position:fixed;
      top:14px;
      left:14px;
      z-index:100;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      min-height:44px;
      padding:10px 14px;
      border-radius:12px;
      border:2px solid rgba(255,223,140,.42);
      cursor:pointer;
      font-size:14px;
      font-weight:900;
      letter-spacing:.04em;
      color:#2a1d0a;
      background:
        linear-gradient(180deg, #fffef7 0%, #e8dcc0 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.92),
        0 8px 18px rgba(0,0,0,.24);
    }
    .back-btn:hover{
      filter:brightness(1.03);
    }
    .back-btn:active{
      transform:translateY(1px);
    }

    .wrap{
      width:min(100%, 440px);
      position:relative;
    }

    .card{
      position:relative;
      border-radius:22px;
      background:
        linear-gradient(180deg, rgba(126,63,198,.35), rgba(29,13,58,.96)),
        linear-gradient(180deg, var(--panel), var(--panel2));
      border:2px solid rgba(247,213,118,.48);
      box-shadow:
        0 0 0 2px rgba(95,49,154,.55) inset,
        0 0 0 6px rgba(255,219,130,.06) inset,
        0 18px 40px rgba(0,0,0,.5);
      overflow:hidden;
    }

    .ornament-top,
    .ornament-bottom{
      position:absolute;
      left:12px;
      right:12px;
      height:18px;
      pointer-events:none;
      opacity:.9;
    }
    .ornament-top{ top:10px; }
    .ornament-bottom{ bottom:10px; }

    .ornament-top::before,
    .ornament-top::after,
    .ornament-bottom::before,
    .ornament-bottom::after{
      content:"";
      position:absolute;
      top:50%;
      width:18px;
      height:18px;
      border:2px solid rgba(255,222,145,.8);
      transform:translateY(-50%) rotate(45deg);
      opacity:.75;
    }
    .ornament-top::before,
    .ornament-bottom::before{ left:0; }
    .ornament-top::after,
    .ornament-bottom::after{ right:0; }

    .ornament-top .line,
    .ornament-bottom .line{
      position:absolute;
      left:24px;
      right:24px;
      top:50%;
      height:2px;
      transform:translateY(-50%);
      background:linear-gradient(90deg, transparent, rgba(255,223,150,.65), transparent);
    }

    .head{
      padding:24px 20px 12px;
      text-align:center;
    }

    .head-title{
      display:inline-block;
      padding:8px 16px;
      border-radius:999px;
      background:
        linear-gradient(180deg, rgba(255,221,143,.20), rgba(255,221,143,.08));
      border:1px solid rgba(255,221,143,.35);
      color:var(--gold1);
      font-size:13px;
      letter-spacing:.06em;
      text-shadow:0 1px 0 rgba(0,0,0,.4);
      box-shadow:0 0 18px rgba(255,202,96,.12) inset;
    }

    .record-panel{
      margin:8px 14px 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,.98), rgba(244,237,220,.96));
      color:#271d11;
      border-radius:16px;
      border:2px solid rgba(136,101,42,.55);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.85),
        0 8px 20px rgba(0,0,0,.18);
      overflow:hidden;
    }

    .record-header{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:48px;
      padding:12px 16px;
      background:
        linear-gradient(180deg, #36205c, #241043);
      color:#fff3ce;
      border-bottom:2px solid rgba(88,56,133,.55);
      font-size:18px;
      font-weight:700;
      letter-spacing:.08em;
      text-shadow:0 2px 0 rgba(0,0,0,.35);
    }

    .rows{
      padding:8px 10px 10px;
    }

    .row{
      display:grid;
      grid-template-columns: 28px 1fr auto;
      align-items:center;
      gap:10px;
      min-height:52px;
      padding:8px 6px;
      border-bottom:1px dashed rgba(76,51,12,.18);
    }
    .row:last-child{ border-bottom:none; }

    .icon{
      width:28px;
      height:28px;
      display:grid;
      place-items:center;
      border-radius:8px;
      background:
        linear-gradient(180deg, #ffe6a6, #dca947);
      border:1px solid rgba(108,73,15,.35);
      font-size:16px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.65);
    }

    .label{
      font-size:15px;
      font-weight:700;
      letter-spacing:.02em;
      color:#2d2214;
      text-shadow:none;
    }

    .value{
      font-size:18px;
      font-weight:900;
      color:#120d07;
      letter-spacing:.03em;
      white-space:nowrap;
    }

    .title-cap{
      margin:14px 14px 8px;
      text-align:center;
      font-size:20px;
      font-weight:900;
      color:#ffe8b0;
      letter-spacing:.10em;
      text-shadow:0 2px 0 rgba(0,0,0,.32);
    }

    .main-title{
      margin:0 14px;
      padding:16px 14px;
      border-radius:16px;
      text-align:center;
      font-size:24px;
      font-weight:900;
      letter-spacing:.06em;
      line-height:1.25;
      color:#fff4ef;
      background:
        linear-gradient(180deg, #e0242e 0%, #b2131d 58%, #780d13 100%);
      border:2px solid rgba(255,215,164,.42);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.34),
        0 10px 22px rgba(0,0,0,.32);
      text-shadow:
        0 2px 0 rgba(0,0,0,.28),
        0 0 12px rgba(255,170,170,.10);
    }

    .stars{
      display:flex;
      justify-content:center;
      gap:8px;
      padding:10px 0 8px;
      color:#ffd770;
      font-size:14px;
      text-shadow:0 1px 0 rgba(0,0,0,.35);
    }

    .actions{
      padding:0 14px 22px;
    }

    .history-btn{
      width:100%;
      min-height:56px;
      border:0;
      border-radius:16px;
      cursor:pointer;
      font-size:22px;
      font-weight:900;
      letter-spacing:.08em;
      color:var(--btnText);
      background:
        linear-gradient(180deg, #fffef8 0%, #efe7d0 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.95),
        0 8px 18px rgba(0,0,0,.22);
      border:2px solid rgba(120,93,45,.42);
    }
    .history-btn:active{
      transform:translateY(1px);
    }

    .subinfo{
      padding:0 16px 18px;
      text-align:center;
      color:var(--muted);
      font-size:12px;
      line-height:1.8;
    }

    .modal{
      position:fixed;
      inset:0;
      background:rgba(6,3,14,.72);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:50;
      backdrop-filter:blur(4px);
    }
    .modal.show{ display:flex; }

    .modal-card{
      width:min(100%, 520px);
      max-height:min(85vh, 760px);
      overflow:auto;
      border-radius:20px;
      background:
        linear-gradient(180deg, rgba(63,29,111,.98), rgba(24,12,46,.98));
      border:2px solid rgba(255,223,140,.45);
      box-shadow:0 24px 44px rgba(0,0,0,.52);
      padding:16px;
    }

    .modal-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
    }

    .modal-title{
      font-size:20px;
      font-weight:900;
      color:#ffeab2;
      letter-spacing:.08em;
    }

    .close-btn{
      width:42px;
      height:42px;
      border-radius:12px;
      border:0;
      cursor:pointer;
      font-size:20px;
      font-weight:900;
      color:#2a1d0a;
      background:linear-gradient(180deg, #fffef7, #e8dcc0);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.9);
    }

    .history-list{
      display:grid;
      gap:10px;
    }

    .history-item{
      display:grid;
      grid-template-columns: 92px 1fr;
      gap:10px;
      align-items:start;
      padding:14px 12px;
      border-radius:14px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,223,140,.16);
    }

    .history-month{
      font-size:14px;
      font-weight:800;
      color:#ffe0a0;
      padding-top:2px;
    }

    .history-main{
      min-width:0;
    }

    .history-title{
      font-size:16px;
      font-weight:800;
      color:#fff8ea;
      margin-bottom:6px;
      line-height:1.4;
      word-break:break-word;
    }

    .history-stats{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:4px 10px;
      font-size:12px;
      color:#dbcfae;
      line-height:1.55;
    }

    .empty{
      padding:20px 14px;
      border-radius:14px;
      text-align:center;
      color:#dbcfae;
      background:rgba(255,255,255,.05);
      border:1px dashed rgba(255,223,140,.22);
      line-height:1.8;
      font-size:14px;
    }

    @media (max-width: 480px){
      .back-btn{
        top:10px;
        left:10px;
        min-height:40px;
        padding:8px 12px;
        font-size:13px;
      }
      .wrap{ width:min(100%, 390px); }
      .record-header{ font-size:16px; }
      .label{ font-size:14px; }
      .value{ font-size:16px; }
      .title-cap{ font-size:17px; }
      .main-title{ font-size:21px; }
      .history-btn{ font-size:19px; min-height:52px; }
      .history-item{ grid-template-columns: 1fr; }
      .history-month{ padding-top:0; }
    }
  </style>
</head>
<body>

  <button class="back-btn" id="backBtn" type="button" aria-label="前のページに戻る">← 戻る</button>

  <div class="wrap">
    <section class="card" aria-label="称号の頂 月間記録パネル">
      <div class="ornament-top"><div class="line"></div></div>

      <div class="head">
        <div class="head-title">MONTHLY RECORD</div>
      </div>

      <div class="record-panel">
        <div class="record-header">今月の記録</div>

        <div class="rows">
          <div class="row">
            <div class="icon">🔥</div>
            <div class="label">収穫数</div>
            <div class="value" id="harvestValue">0 枚</div>
          </div>

          <div class="row">
            <div class="icon">🪙</div>
            <div class="label">露店売上</div>
            <div class="value" id="salesValue">0 oct</div>
          </div>

          <div class="row">
            <div class="icon">🎣</div>
            <div class="label">釣り</div>
            <div class="value" id="fishingValue">0 点</div>
          </div>

          <div class="row">
            <div class="icon">🗼</div>
            <div class="label">タワー</div>
            <div class="value" id="towerValue">0 F</div>
          </div>
        </div>
      </div>

      <div class="title-cap">TITLE</div>

      <div class="main-title" id="mainTitle">タコ民</div>

      <div class="stars" aria-hidden="true">
        <span>★</span><span>★</span><span>★</span><span>★</span><span>★</span>
      </div>

      <div class="actions">
        <button class="history-btn" id="openHistoryBtn" type="button">HISTORY</button>
      </div>

      <div class="subinfo" id="monthInfo">
        今月の収穫数・露店売上・釣り・タワーの記録から称号を表示します
      </div>

      <div class="ornament-bottom"><div class="line"></div></div>
    </section>
  </div>

  <div class="modal" id="historyModal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="historyTitle">
      <div class="modal-head">
        <div class="modal-title" id="historyTitle">称号履歴</div>
        <button class="close-btn" id="closeHistoryBtn" type="button" aria-label="閉じる">×</button>
      </div>

      <div class="history-list" id="historyList"></div>
    </div>
  </div>

  <script>
    (() => {
  "use strict";

  // ===== 主要キー（必要ならここだけ増やせる） =====
  const KEY = {
    resident: "trc_v1_resident",
    lastLogin: "trc_v1_last_login",
  };

  const EXIST = {
    farmBook:   "tf_v1_book",
    farmInv:    "tf_v1_inv",
    rotenOcto:  "roten_v1_octo",
    tower:      "tower_v1_state",
    fish:       "fish_v1_state",

    // ★称号の頂
    monthly:    "ttc_monthly_stats_v1",
    history:    "ttc_monthly_history_v1",
    godfarm:    "ttc_godfarm_v1",
    godbonus:   "ttc_god_bonus_v1",

    // ★追加：マイ露店月間売上
    myshopMonthlySales: "ttc_myshop_monthly_sales_v1"
  };

  // ===== utils =====
  const getRaw = (k) => {
    const v = localStorage.getItem(k);
    return (v === null || v === undefined) ? null : String(v);
  };

  const safeJSONParse = (raw, fallback) => {
    try { return JSON.parse(raw); } catch (_) { return fallback; }
  };

  const safeStringify = (obj) => {
    try { return JSON.stringify(obj); } catch (_) { return "null"; }
  };

  function listKeysByRegex(re) {
    const out = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (!k) continue;
      if (re.test(k)) out.push(k);
    }
    return out;
  }

  // ===== 図鑑slim（count+img等） =====
  function slimBookRawKeepImg() {
    const raw = getRaw(EXIST.farmBook);
    if (!raw) return null;

    const book = safeJSONParse(raw, null);
    if (!book || typeof book !== "object") return raw;

    const got = (book.got && typeof book.got === "object") ? book.got : {};
    const outGot = {};

    for (const id of Object.keys(got)) {
      const node = got[id] || {};
      const c = Number(node.count || 0);
      if (c > 0) {
        const out = { id, count: c };
        if (typeof node.img === "string" && node.img.trim()) out.img = node.img.trim();
        if (typeof node.name === "string" && node.name.trim()) out.name = node.name.trim();
        if (typeof node.rarity === "string" && node.rarity.trim()) out.rarity = node.rarity.trim();
        if (node.at != null && String(node.at).trim()) out.at = node.at;
        if (node.lastAt != null && String(node.lastAt).trim()) out.lastAt = node.lastAt;
        outGot[id] = out;
      }
    }

    const slim = { ver: book.ver ?? 1, got: outGot };
    return safeStringify(slim);
  }

  function findFarmProgressKeys() {
    const out = [];

    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (!k) continue;
      if (!/^tf_v1_/i.test(k)) continue;
      if (/log|history|debug/i.test(k)) continue;
      if (k === EXIST.farmBook || k === EXIST.farmInv) continue;
      out.push(k);
    }

    const prefer = [
      "tf_v1_state",
      "tf_v1_level",
      "tf_v1_xp",
      "tf_v1_farm",
      "tf_v1_progress"
    ];

    const ordered = [];
    for (const p of prefer) {
      if (localStorage.getItem(p) != null && !ordered.includes(p)) ordered.push(p);
    }
    for (const k of out) {
      if (!ordered.includes(k)) ordered.push(k);
    }

    return ordered.slice(0, 40);
  }

  function findRotenProgressKeys() {
    const out = [];

    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (!k) continue;
      if (!/^roten_v1_/i.test(k)) continue;
      if (/log|history|debug/i.test(k)) continue;
      out.push(k);
    }

    const prefer = [
      "roten_v1_level",
      "roten_v1_rep",
      "roten_v1_myshop",
      "roten_v1_inventory",
      "roten_v1_market",
      "roten_v1_state",
      "roten_v1_shelves",
      "roten_v1_octo"
    ];

    const ordered = [];
    for (const p of prefer) {
      if (localStorage.getItem(p) != null && !ordered.includes(p)) ordered.push(p);
    }
    for (const k of out) {
      if (!ordered.includes(k)) ordered.push(k);
    }

    return ordered.slice(0, 90);
  }

  // ===== バックアップ作成 =====
  function buildSlimBackupPayload() {
    const keys = {};

    keys[KEY.resident] = getRaw(KEY.resident);
    keys[KEY.lastLogin] = getRaw(KEY.lastLogin);

    keys[EXIST.rotenOcto] = getRaw(EXIST.rotenOcto);
    keys[EXIST.farmInv]   = getRaw(EXIST.farmInv);
    keys[EXIST.farmBook]  = slimBookRawKeepImg();

    for (const k of findFarmProgressKeys()) {
      const v = getRaw(k);
      if (v != null) keys[k] = v;
    }

    for (const k of findRotenProgressKeys()) {
      const v = getRaw(k);
      if (v != null) keys[k] = v;
    }

    if (getRaw(EXIST.tower) != null) keys[EXIST.tower] = getRaw(EXIST.tower);
    for (const k of listKeysByRegex(/tower/i)) {
      const v = getRaw(k);
      if (v != null) keys[k] = v;
    }

    if (getRaw(EXIST.fish) != null) keys[EXIST.fish] = getRaw(EXIST.fish);
    for (const k of listKeysByRegex(/fish|takofish|tako_fish|tfish/i)) {
      const v = getRaw(k);
      if (v != null) keys[k] = v;
    }

    // ★追加：称号の頂
    if (getRaw(EXIST.monthly)  != null) keys[EXIST.monthly]  = getRaw(EXIST.monthly);
    if (getRaw(EXIST.history)  != null) keys[EXIST.history]  = getRaw(EXIST.history);
    if (getRaw(EXIST.godfarm)  != null) keys[EXIST.godfarm]  = getRaw(EXIST.godfarm);
    if (getRaw(EXIST.godbonus) != null) keys[EXIST.godbonus] = getRaw(EXIST.godbonus);

    // ★追加：マイ露店売上
    if (getRaw(EXIST.myshopMonthlySales) != null) keys[EXIST.myshopMonthlySales] = getRaw(EXIST.myshopMonthlySales);

    // ★追加：ランキング用ユーザー情報
    if (getRaw("ttc_user_id_v1")   != null) keys["ttc_user_id_v1"]   = getRaw("ttc_user_id_v1");
    if (getRaw("ttc_user_name_v1") != null) keys["ttc_user_name_v1"] = getRaw("ttc_user_name_v1");

    for (const k of Object.keys(keys)) {
      if (keys[k] === null || keys[k] === undefined) delete keys[k];
    }

    return {
      app: "takoyaki-trc",
      ver: 7,
      kind: "slim+roten+title-compatible",
      exportedAt: new Date().toISOString(),
      note: "住民票/オクト/資材/図鑑(count+img+id)/畑進行(tf_v1_*)/露店進行(roten_v1_*)/タワー/釣り/称号の頂/マイ露店売上/ランキング用ユーザーID を保存。旧keys形式バックアップの復元にも対応。",
      keys
    };
  }

  function downloadJson(obj, filename) {
    const blob = new Blob(
      [JSON.stringify(obj, null, 2)],
      { type: "application/json" }
    );

    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  function backupSlim() {
    const payload = buildSlimBackupPayload();
    const stamp = new Date().toISOString().replace(/[:.]/g, "-");
    downloadJson(payload, `takoyaki-trc-backup_${stamp}.json`);
  }

  // ===== 復元（旧形式 keys / 新形式 storage 両対応） =====
  async function restoreFromFile(file) {
    const text = await file.text();
    const data = safeJSONParse(text, null);

    if (!data || typeof data !== "object") {
      alert("このファイルはバックアップ形式ではありません。");
      return;
    }

    const source =
      (data.keys && typeof data.keys === "object") ? data.keys :
      (data.storage && typeof data.storage === "object") ? data.storage :
      null;

    if (!source) {
      alert("このファイルはバックアップ形式ではありません。");
      return;
    }

    const keys = Object.keys(source);
    const exportedAt = String(data.exportedAt || data.exported || "");

    const ok = confirm(
      "バックアップから復元します。\n" +
      "現在のデータは上書きされます（元に戻せません）。\n\n" +
      `復元キー数: ${keys.length}\n` +
      `書き出し日時: ${exportedAt}\n\n` +
      "続行しますか？"
    );
    if (!ok) return;

    for (const k of keys) {
      const v = source[k];
      if (v === null || v === undefined) {
        localStorage.removeItem(k);
      } else {
        localStorage.setItem(k, String(v));
      }
    }

    alert("復元しました。ページを再読み込みします。");
    location.reload();
  }

  // ===== UI wiring（フッター版） =====
  const btnBackup  = document.getElementById("trcFooterBackup");
  const btnRestore = document.getElementById("trcFooterRestore");
  const inp        = document.getElementById("trcFooterRestoreFile");

  if (!btnBackup || !btnRestore || !inp) return;

  btnBackup.addEventListener("click", () => {
    const normal = btnBackup.textContent;
    btnBackup.disabled = true;
    btnBackup.textContent = "作成中…";

    setTimeout(() => {
      try {
        backupSlim();
      } finally {
        btnBackup.disabled = false;
        btnBackup.textContent = normal;
      }
    }, 50);
  });

  btnRestore.addEventListener("click", () => {
    inp.click();
  });

  inp.addEventListener("change", async () => {
    const f = inp.files && inp.files[0];
    inp.value = "";
    if (!f) return;

    const normal = btnRestore.textContent;
    btnRestore.disabled = true;
    btnRestore.textContent = "読込中…";

    try {
      await restoreFromFile(f);
    } finally {
      btnRestore.disabled = false;
      btnRestore.textContent = normal;
    }
  });

})();
  </script>
</body>
</html>
