<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>カード復元</title>
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:#111827;
      color:#fff;
      font-family:system-ui,-apple-system,"Noto Sans JP",sans-serif;
      padding:20px;
    }
    .box{
      width:min(92vw,560px);
      background:#1f2937;
      border:1px solid rgba(255,255,255,.12);
      border-radius:16px;
      padding:20px;
      box-shadow:0 12px 30px rgba(0,0,0,.35);
    }
    h1{
      margin:0 0 12px;
      font-size:22px;
    }
    p{
      line-height:1.7;
      color:#dbe4ff;
      margin:0 0 10px;
    }
    .list{
      margin:12px 0 0;
      padding:12px;
      border-radius:12px;
      background:rgba(255,255,255,.06);
      line-height:1.8;
      font-size:14px;
    }
    button{
      width:100%;
      margin-top:16px;
      padding:14px 16px;
      border:0;
      border-radius:12px;
      background:#f59e0b;
      color:#111827;
      font-weight:800;
      font-size:16px;
      cursor:pointer;
    }
    .log{
      margin-top:14px;
      padding:12px;
      border-radius:12px;
      background:rgba(255,255,255,.06);
      white-space:pre-wrap;
      line-height:1.6;
      font-size:14px;
    }
    .note{
      margin-top:10px;
      font-size:12px;
      color:#c9d4f4;
      opacity:.9;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>カード復元ページ</h1>
    <p>
      不具合で消えてしまったカードを、この端末の図鑑に復元します。<br>
      ボタンを押したあと、図鑑ページを開き直してください。
    </p>

    <div class="list">
      【復元対象】<br>
      ・Anniversaryカード 5種<br>
      ・ぐらたんコラボカード 2種<br>
      ・職人カード01
    </div>

    <button id="restoreBtn" type="button">復元する</button>
    <div id="log" class="log">待機中…</div>
    <div class="note">※この復元は、この端末のブラウザデータに対してのみ行われます。</div>
  </div>

  <script>
    (() => {
      "use strict";

      const KEY_BOOK = "tf_v1_book";
      const log = document.getElementById("log");
      const btn = document.getElementById("restoreBtn");

      function safeParse(raw, fallback){
        try{
          const v = JSON.parse(raw);
          return v ?? fallback;
        }catch{
          return fallback;
        }
      }

      function normalizeCount(v){
        const n = Number(v);
        if(!Number.isFinite(n)) return 0;
        return Math.max(0, Math.floor(n));
      }

      function upsertCard(book, card){
        if(!book.got || typeof book.got !== "object"){
          book.got = {};
        }

        const current = book.got[card.id];
        const currentCount =
          current && typeof current === "object"
            ? normalizeCount(current.count ?? current.owned ?? current.qty ?? 0)
            : 0;

        const now = Date.now();

        book.got[card.id] = {
          ...(current && typeof current === "object" ? current : {}),
          id: card.id,
          name: card.name,
          img: card.img,
          rarity: card.rarity,
          tier: card.tier || card.rarity,
          at: (current && current.at) || now,
          lastAt: now,
          lastAddedAt: now,
          count: Math.max(1, currentCount, card.count || 1)
        };
      }

      const restoreCards = [
        // ぐらたん
        {
          id: "col-001",
          name: "伝説のたこ焼きライバー",
          img: "https://ul.h3z.jp/CmVTkAd2.png",
          rarity: "LR",
          tier: "LR",
          count: 1
        },
        {
          id: "col-002",
          name: "たこ焼き実況者ライバー",
          img: "https://ul.h3z.jp/1VQvIP7v.png",
          rarity: "N",
          tier: "N",
          count: 1
        },

        // Anniversary
        {
          id: "SP-ANV-001",
          name: "会話トリガー:店主",
          img: "https://takoyaki-card.com/town/assets/images/anniversary/1.png",
          rarity: "SP",
          tier: "N",
          count: 1
        },
        {
          id: "SP-ANV-002",
          name: "定型ループNPC",
          img: "https://takoyaki-card.com/town/assets/images/anniversary/2.png",
          rarity: "SP",
          tier: "R",
          count: 1
        },
        {
          id: "SP-ANV-003",
          name: "始まりの合図",
          img: "https://takoyaki-card.com/town/assets/images/anniversary/3.png",
          rarity: "SP",
          tier: "SR",
          count: 1
        },
        {
          id: "SP-ANV-004",
          name: "ここにいる店主",
          img: "https://takoyaki-card.com/town/assets/images/anniversary/4a.jpg",
          rarity: "SP",
          tier: "UR",
          count: 1
        },
        {
          id: "SP-ANV-005",
          name: "物語の外側",
          img: "https://takoyaki-card.com/town/assets/images/anniversary/4b.jpg",
          rarity: "SP",
          tier: "LR",
          count: 1
        },

        // 職人カード01
        {
          id: "craft_001",
          name: "たこ焼き菜々",
          img: "https://takoyaki-trc.github.io/takoyaki-media/town/assets/images/syokunin/01.png",
          rarity: "CRAFT",
          tier: "CRAFT",
          count: 1
        }
      ];

      btn.addEventListener("click", () => {
        const book = safeParse(localStorage.getItem(KEY_BOOK), { ver: 1, got: {} });

        restoreCards.forEach(card => upsertCard(book, card));

        book.ver = 1;
        localStorage.setItem(KEY_BOOK, JSON.stringify(book));

        log.textContent =
          "復元が完了しました。\n" +
          "このあと図鑑ページを開き直してください。\n\n" +
          "復元カード数: " + restoreCards.length + "枚";
      });
    })();
  </script>
</body>
</html>
