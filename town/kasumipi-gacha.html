<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>焼け残りの想い｜かすみぴガチャ</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg1:#f8edf3;
  --bg2:#f2dde8;
  --bg3:#e8cad9;

  --text:#64384b;
  --text2:#7d5a6a;
  --text3:#9c8090;

  --panel:#fffafc;
  --panel2:#fff5f9;
  --line:#ead4de;
  --line2:#e0c5d1;

  --gold1:#fff7d6;
  --gold2:#f7e6a1;
  --gold3:#f5c759;
  --gold4:#d48c12;

  --pink1:#ff8fb1;
  --pink2:#ff5c91;
  --pink3:#c24373;

  --purple1:#8e6ad7;
  --purple2:#5e409f;

  --shadow:0 12px 28px rgba(116,58,91,.12);
  --shadow2:0 8px 18px rgba(116,58,91,.10);

  --safeTop:max(10px, env(safe-area-inset-top));
  --safeBottom:max(12px, env(safe-area-inset-bottom));
}

*{box-sizing:border-box}
html,body{min-height:100%}
body{
  margin:0;
  font-family:"Noto Sans JP",system-ui,sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 50% -10%, rgba(255,255,255,.85), transparent 18%),
    linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 48%, var(--bg3) 100%);
  overflow-x:hidden;
}

button{font:inherit}
a{text-decoration:none;color:inherit}
.hidden{display:none !important}

.page{
  width:min(920px, calc(100% - 14px));
  margin:0 auto;
  padding:var(--safeTop) 0 calc(26px + var(--safeBottom));
}

/* =========================
   top header
========================= */
.heroHeader{
  display:grid;
  grid-template-columns:58px 1fr 90px;
  gap:8px;
  align-items:center;
  padding:8px;
  border-radius:24px;
  background:linear-gradient(180deg, rgba(255,255,255,.96), rgba(255,245,250,.92));
  border:1px solid var(--line);
  box-shadow:var(--shadow);
  margin-bottom:10px;
}
.heroBtn{
  min-height:54px;
  border:none;
  cursor:pointer;
  border-radius:14px;
  color:#6a3c19;
  font-weight:900;
  background:
    linear-gradient(180deg, rgba(255,255,255,.95), rgba(255,255,255,.80)),
    linear-gradient(180deg,var(--gold1),var(--gold2));
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.75),
    inset 0 -4px 0 rgba(202,164,71,.26),
    0 6px 16px rgba(149,109,37,.12);
}
.heroBtn--back{
  font-size:28px;
  line-height:1;
}
.heroBtn--link{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:0;
}
.heroBtnMain{
  font-size:15px;
  line-height:1.1;
}
.heroBtnSub{
  font-size:10px;
  line-height:1.1;
  opacity:.8;
}
.heroTitle{
  text-align:center;
  padding:3px 6px 1px;
}
.heroTitle h1{
  margin:0;
  font-size:21px;
  line-height:1.08;
  font-weight:900;
  letter-spacing:.02em;
  color:#8a4b68;
}
.heroTitle p{
  margin:3px 0 0;
  font-size:11px;
  line-height:1.25;
  font-weight:800;
  color:var(--text2);
}

/* =========================
   top image
========================= */
.topVisual{
  margin-bottom:12px;
}
.topVisualFrame{
  position:relative;
  overflow:hidden;
  border-radius:0;
  border:5px solid #22151f;
  background:#120c17;
  box-shadow:var(--shadow);
}
.topVisualImage{
  display:block;
  width:100%;
  aspect-ratio:16/10;
  object-fit:cover;
}

/* =========================
   speech
========================= */
.speechPanel{
  position:relative;
  padding:16px 16px 15px;
  border-radius:20px;
  background:linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,249,252,.88));
  border:1px solid var(--line);
  box-shadow:var(--shadow2);
  margin-bottom:12px;
}
.speechPanel::before{
  content:"";
  position:absolute;
  top:-11px;
  left:34px;
  width:22px;
  height:22px;
  background:linear-gradient(180deg, rgba(255,255,255,.96), rgba(255,249,252,.90));
  border-left:1px solid var(--line);
  border-top:1px solid var(--line);
  transform:rotate(45deg);
}
.cornerBadge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:34px;
  padding:6px 14px;
  border-radius:10px;
  background:linear-gradient(180deg, #955674, #7e4663);
  color:#fff7fb;
  font-size:14px;
  font-weight:900;
  box-shadow:0 6px 14px rgba(108,53,81,.18);
  margin-bottom:10px;
}
.speechText{
  margin:0;
  font-size:16px;
  line-height:1.7;
  font-weight:800;
  color:#624256;
}

/* =========================
   heat summary
========================= */
.heatSummary{
  display:grid;
  grid-template-columns:122px 1fr;
  gap:10px;
  margin-bottom:14px;
}
.heatBox,
.gachaBox{
  background:linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,247,251,.88));
  border:1px solid var(--line);
  box-shadow:var(--shadow2);
}
.heatBox{
  border-radius:18px;
  padding:12px 8px;
  text-align:center;
}
.heatNum{
  font-size:24px;
  line-height:1.02;
  font-weight:900;
  color:#8b3d63;
  word-break:break-all;
}
.heatLabel{
  margin-top:5px;
  font-size:12px;
  font-weight:800;
  color:var(--text2);
}
.gachaBox{
  display:grid;
  grid-template-columns:1fr auto;
  gap:12px;
  align-items:center;
  border-radius:18px;
  padding:12px 12px 12px 14px;
}
.gachaLead{
  min-width:0;
}
.meter{
  height:22px;
  border-radius:6px;
  background:#f5dfe9;
  overflow:hidden;
  box-shadow:inset 0 1px 2px rgba(0,0,0,.04);
}
.meterFill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg, #ff7a9f, #ff356d);
}
.gachaLabel{
  font-size:13px;
  line-height:1.2;
  font-weight:900;
  color:#7f4461;
  margin-top:8px;
}
.gachaMeta{
  font-size:12px;
  line-height:1.7;
  font-weight:800;
  color:var(--text2);
  margin-top:3px;
}
.gachaBtn{
  position:relative;
  overflow:hidden;
  min-width:168px;
  min-height:66px;
  border:none;
  cursor:pointer;
  border-radius:16px;
  color:#76380d;
  font-size:16px;
  font-weight:900;
  letter-spacing:.01em;
  background:
    radial-gradient(circle at 50% 18%, rgba(255,255,255,.58), transparent 40%),
    linear-gradient(180deg, #fff4bf 0%, #ffd96d 52%, #ffae1c 100%);
  box-shadow:
    inset 0 0 0 2px rgba(255,242,190,.85),
    inset 0 -4px 0 rgba(179,111,15,.26),
    0 8px 18px rgba(247,164,28,.24);
}
.gachaBtn::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.34), transparent);
  transform:translateX(-110%);
  animation:btnshine 2.1s linear infinite;
}
@keyframes btnshine{
  to{ transform:translateX(110%); }
}
.gachaBtn:disabled{
  opacity:.55;
  cursor:not-allowed;
  filter:saturate(.6);
}

/* =========================
   info chips
========================= */
.infoChips{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-bottom:14px;
}
.infoChip{
  padding:13px 12px 12px;
  border-radius:16px;
  background:linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,247,251,.88));
  border:1px solid var(--line);
  box-shadow:var(--shadow2);
}
.infoChipLabel{
  font-size:11px;
  line-height:1.25;
  color:var(--text3);
  font-weight:900;
  margin-bottom:6px;
}
.infoChipValue{
  font-size:20px;
  line-height:1.08;
  font-weight:900;
  color:#8a4b68;
}

/* =========================
   result panel
========================= */
.resultPanel{
  margin-bottom:14px;
  padding:16px;
  border-radius:22px;
  background:linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,247,251,.88));
  border:1px solid var(--line);
  box-shadow:var(--shadow);
}
.panelBadge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:30px;
  padding:6px 12px;
  border-radius:10px;
  background:linear-gradient(180deg, #ffc2d4, #ff98b7);
  color:#6a2940;
  font-size:12px;
  font-weight:900;
  margin-bottom:10px;
}
.panelBadge.violet{
  background:linear-gradient(180deg, #c7bcff, #9c8df1);
  color:#382c72;
}
.resultTitle,
.collectionTitle{
  margin:0 0 10px;
  font-size:22px;
  line-height:1.2;
  font-weight:900;
  color:#8a4b68;
}
.resultBody{
  display:grid;
  grid-template-columns:170px 1fr;
  gap:14px;
  align-items:start;
}
.resultVisual{
  position:relative;
  min-height:230px;
  overflow:hidden;
  border-radius:16px;
  border:1px solid var(--line2);
  background:linear-gradient(180deg, #f7edf4, #f3e5ee);
  display:grid;
  place-items:center;
}
.resultVisual::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(180deg, rgba(255,255,255,.22), transparent 32%, rgba(255,255,255,.10));
  pointer-events:none;
}
.resultCardImage{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.resultPlaceholder{
  padding:18px;
  text-align:center;
  font-size:13px;
  line-height:1.8;
  color:var(--text3);
  font-weight:800;
}
.resultRarity{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:30px;
  padding:5px 12px;
  border-radius:10px;
  font-size:12px;
  font-weight:900;
  margin-bottom:10px;
  color:#fff;
}
.resultRarity.sp{
  background:linear-gradient(180deg, #ffcf71, #e49e1a);
}
.resultRarity.n{
  background:linear-gradient(180deg, #b58aa0, #8f667b);
}
.resultName{
  margin:0 0 8px;
  font-size:23px;
  line-height:1.35;
  font-weight:900;
  color:#673d52;
}
.resultText{
  margin:0;
  font-size:14px;
  line-height:1.85;
  color:var(--text2);
  font-weight:800;
  white-space:pre-line;
}

/* =========================
   collection
========================= */
.collectionPanel{
  padding:16px;
  border-radius:22px;
  background:linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,247,251,.88));
  border:1px solid var(--line);
  box-shadow:var(--shadow);
}
.collectionNote{
  margin:-2px 0 12px;
  font-size:12px;
  line-height:1.7;
  font-weight:800;
  color:var(--text3);
}
.collectionGrid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}
.collectionItem{
  position:relative;
  overflow:hidden;
  min-height:142px;
  border-radius:16px;
  background:linear-gradient(180deg, #fffafc, #f8edf4);
  border:1px solid var(--line2);
  box-shadow:var(--shadow2);
  padding:10px;
}
.collectionItem.locked{
  filter:grayscale(.35) saturate(.6) brightness(.96);
}
.collectionTop{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  margin-bottom:8px;
}
.collectionRarity{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:24px;
  padding:4px 8px;
  border-radius:8px;
  font-size:11px;
  font-weight:900;
  color:#fff;
}
.collectionRarity.sp{
  background:linear-gradient(180deg, #ffcf71, #e49e1a);
}
.collectionRarity.n{
  background:linear-gradient(180deg, #b58aa0, #8f667b);
}
.collectionCount{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:24px;
  min-width:32px;
  padding:4px 8px;
  border-radius:8px;
  background:linear-gradient(180deg, #fff0b7, #efd687);
  color:#734816;
  font-size:11px;
  font-weight:900;
}
.collectionThumb{
  height:68px;
  border-radius:12px;
  margin-bottom:8px;
  overflow:hidden;
  border:1px solid var(--line2);
  background:#fff;
}
.collectionThumb img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.collectionCode{
  font-size:11px;
  color:#9a6c82;
  font-weight:900;
  margin-bottom:4px;
}
.collectionName{
  font-size:12px;
  line-height:1.55;
  color:#6a4256;
  font-weight:800;
}

/* =========================
   overlays
========================= */
.drawOverlay,
.bigResultOverlay{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  padding:18px;
  z-index:100;
}
.drawOverlay.show,
.bigResultOverlay.show{
  display:flex;
}
.drawOverlay{
  background:rgba(20,10,28,.76);
  backdrop-filter:blur(6px);
}
.drawScene{
  position:relative;
  width:min(480px, 100%);
  height:420px;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}
.drawAura{
  position:absolute;
  width:270px;
  height:270px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(255,223,125,.44) 0%, rgba(255,188,50,.22) 28%, rgba(255,128,180,.10) 50%, transparent 72%);
  filter:blur(8px);
  animation:aurarotate 2.4s linear infinite;
}
@keyframes aurarotate{
  from{ transform:rotate(0deg) scale(1); }
  50%{ transform:rotate(180deg) scale(1.06); }
  to{ transform:rotate(360deg) scale(1); }
}
.drawRing{
  position:absolute;
  width:220px;
  height:220px;
  border-radius:50%;
  border:2px solid rgba(255,225,130,.8);
  box-shadow:0 0 24px rgba(255,208,90,.30), inset 0 0 20px rgba(255,208,90,.18);
  animation:ringpulse 1.2s ease-in-out infinite;
}
@keyframes ringpulse{
  0%{ transform:scale(.84); opacity:.58; }
  50%{ transform:scale(1.04); opacity:1; }
  100%{ transform:scale(.84); opacity:.58; }
}
.cardSilhouette{
  position:absolute;
  width:152px;
  height:212px;
  border-radius:16px;
  background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(255,245,210,.82));
  box-shadow:0 0 34px rgba(255,220,115,.44), 0 0 74px rgba(255,190,40,.16);
  animation:cardfloat 1.6s ease-in-out infinite;
  overflow:hidden;
}
.cardSilhouette::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, rgba(255,255,255,.82), rgba(255,255,255,0) 35%, rgba(255,240,180,.24));
}
.cardSilhouette::after{
  content:"";
  position:absolute;
  inset:8px;
  border-radius:12px;
  background:linear-gradient(180deg, #f7c14c, #ffefbb);
}
@keyframes cardfloat{
  0%{ transform:translateY(0) rotate(-4deg) scale(1); }
  50%{ transform:translateY(-16px) rotate(4deg) scale(1.04); }
  100%{ transform:translateY(0) rotate(-4deg) scale(1); }
}
.drawText{
  position:absolute;
  bottom:28px;
  left:0;
  right:0;
  text-align:center;
  font-size:23px;
  line-height:1.4;
  font-weight:900;
  letter-spacing:.02em;
  color:#fff8e8;
  text-shadow:0 0 18px rgba(255,220,110,.28), 0 10px 24px rgba(0,0,0,.28);
}
.drawFlash{
  position:absolute;
  inset:0;
  background:radial-gradient(circle, rgba(255,255,255,.86), rgba(255,225,120,.62), transparent 62%);
  opacity:0;
  pointer-events:none;
}
.drawFlash.show{ animation:flashburst .55s ease; }
@keyframes flashburst{
  0%{ opacity:0; }
  18%{ opacity:1; }
  100%{ opacity:0; }
}
.bigResultOverlay{
  background:radial-gradient(circle at center, rgba(255,230,130,.12), rgba(0,0,0,.74));
  backdrop-filter:blur(7px);
}
.bigResult{
  text-align:center;
  animation:bigpop .22s ease;
}
@keyframes bigpop{
  from{ opacity:0; transform:scale(.92); }
  to{ opacity:1; transform:scale(1); }
}
.bigResultRarity{
  font-size:22px;
  font-weight:900;
  letter-spacing:.16em;
  color:#ffe07f;
  margin-bottom:10px;
  text-shadow:0 0 18px rgba(255,210,80,.28);
}
.bigResultName{
  font-size:40px;
  line-height:1.28;
  font-weight:900;
  color:#fffaf0;
  text-shadow:0 0 20px rgba(255,210,80,.26), 0 14px 30px rgba(0,0,0,.30);
}
.particles{
  position:absolute;
  inset:0;
  overflow:hidden;
  pointer-events:none;
}
.spark{
  position:absolute;
  width:8px;
  height:8px;
  border-radius:50%;
  background:radial-gradient(circle, #fff7dd 0%, #ffd54d 45%, rgba(255,195,0,0) 75%);
  box-shadow:0 0 16px rgba(255,210,90,.48);
  animation:sparkmove var(--dur) ease-out forwards;
}
.spark.star{
  width:10px;
  height:10px;
  clip-path:polygon(50% 0%,61% 38%,100% 50%,61% 62%,50% 100%,39% 62%,0% 50%,39% 38%);
}
.spark.line{
  width:4px;
  height:22px;
  border-radius:999px;
  background:linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,214,80,.72), rgba(255,214,80,0));
}
@keyframes sparkmove{
  from{
    opacity:0;
    transform:translate(var(--sx), var(--sy)) scale(.2) rotate(0deg);
  }
  12%{ opacity:1; }
  to{
    opacity:0;
    transform:translate(var(--tx), var(--ty)) scale(1.2) rotate(220deg);
  }
}
.theme-soft .drawAura{
  background:radial-gradient(circle, rgba(255,236,160,.44) 0%, rgba(255,190,70,.22) 28%, rgba(255,150,190,.10) 48%, transparent 70%);
}
.theme-dark .drawAura{
  background:radial-gradient(circle, rgba(255,110,170,.35) 0%, rgba(125,80,255,.18) 32%, rgba(255,190,70,.10) 52%, transparent 72%);
}
.theme-choice .drawAura{
  background:radial-gradient(circle, rgba(160,200,255,.28) 0%, rgba(255,220,110,.18) 32%, rgba(255,150,190,.10) 54%, transparent 72%);
}
.theme-final .drawAura{
  background:radial-gradient(circle, rgba(255,240,190,.56) 0%, rgba(255,210,70,.30) 24%, rgba(255,150,120,.16) 44%, transparent 68%);
}
.theme-final .drawRing{
  width:250px;
  height:250px;
  border-color:rgba(255,235,140,.92);
  box-shadow:0 0 30px rgba(255,215,90,.45), inset 0 0 28px rgba(255,215,90,.22);
}
.theme-normal .drawAura{
  background:radial-gradient(circle, rgba(255,200,220,.34) 0%, rgba(170,125,180,.18) 34%, rgba(255,200,120,.10) 56%, transparent 74%);
}
.theme-normal .drawRing{
  border-color:rgba(220,185,215,.80);
  box-shadow:0 0 18px rgba(205,165,197,.28), inset 0 0 16px rgba(205,165,197,.16);
}

/* =========================
   responsive
========================= */
@media (max-width:720px){
  .heroHeader{
    grid-template-columns:54px 1fr 84px;
    gap:7px;
    padding:7px;
    border-radius:22px;
  }
  .heroBtn{
    min-height:50px;
    border-radius:13px;
  }
  .heroTitle h1{
    font-size:18px;
  }
  .heroTitle p{
    font-size:10px;
  }
  .heatSummary{
    grid-template-columns:112px 1fr;
  }
  .gachaBox{
    grid-template-columns:1fr auto;
  }
  .gachaBtn{
    min-width:146px;
    min-height:62px;
    font-size:15px;
  }
  .infoChips{
    grid-template-columns:1fr;
  }
  .resultBody{
    grid-template-columns:1fr;
  }
  .resultVisual{
    min-height:240px;
  }
  .collectionGrid{
    grid-template-columns:repeat(2,1fr);
  }
  .bigResultName{
    font-size:30px;
  }
}
</style>
</head>
<body>
<div class="page">

  <header class="heroHeader">
    <button class="heroBtn heroBtn--back" id="backBtn" aria-label="戻る">←</button>

    <div class="heroTitle">
      <h1>焼け残りの想い</h1>
      <p>熱量を使って、かすみぴのカードを引く</p>
    </div>

    <a class="heroBtn heroBtn--link" href="./matching-board.html" aria-label="募集板へ戻る">
      <span class="heroBtnMain">募集板</span>
      <span class="heroBtnSub">戻る</span>
    </a>
  </header>

  <section class="topVisual">
    <div class="topVisualFrame">
      <img
        id="topImage"
        class="topVisualImage"
        src="https://ul.h3z.jp/gQiokHCL.png"
        alt="かすみぴガチャのトップ画像">
    </div>
  </section>

  <section class="speechPanel">
    <div class="cornerBadge">かすみぴ</div>
    <p class="speechText" id="speechText">今日は、どの願いが深く沈んでるじゃなイカ？</p>
  </section>

  <section class="heatSummary">
    <div class="heatBox">
      <div class="heatNum" id="heatNow">0</div>
      <div class="heatLabel">熱量</div>
    </div>

    <div class="gachaBox">
      <div class="gachaLead">
        <div class="meter">
          <div class="meterFill" id="pityMeter"></div>
        </div>
        <div class="gachaLabel" id="drawHint">爆発寸前　ガチャが引けるじゃなイカ</div>
        <div class="gachaMeta">
          1回：500熱量　
          SP確定まで <span id="pityRemain">10</span>
        </div>
      </div>

      <button class="gachaBtn" id="drawBtn">かすみぴガチャ</button>
    </div>
  </section>

  <section class="infoChips">
    <div class="infoChip">
      <div class="infoChipLabel">総ガチャ回数</div>
      <div class="infoChipValue" id="gachaTotal">0</div>
    </div>
    <div class="infoChip">
      <div class="infoChipLabel">所持カード種数</div>
      <div class="infoChipValue" id="ownedCount">0</div>
    </div>
    <div class="infoChip">
      <div class="infoChipLabel">収録カード数</div>
      <div class="infoChipValue" id="allCardCount">10</div>
    </div>
  </section>

  <section class="resultPanel">
    <div class="panelBadge">RESULT</div>
    <h2 class="resultTitle">排出カード</h2>

    <div class="resultBody">
      <div class="resultVisual">
        <img id="resultImage" class="resultCardImage hidden" src="" alt="排出カード">
        <div id="resultPlaceholder" class="resultPlaceholder">
          まだ引いていません。<br>
          光る一枚が現れるのを待っています。
        </div>
      </div>

      <div class="resultInfo">
        <div class="resultRarity n" id="resultRarity">---</div>
        <h3 class="resultName" id="resultName">---</h3>
        <p class="resultText" id="resultText">ここに排出結果が表示されます。</p>
      </div>
    </div>
  </section>

  <section class="collectionPanel">
    <div class="panelBadge violet">COLLECTION</div>
    <h2 class="collectionTitle">かすみぴカード一覧</h2>
    <p class="collectionNote">ノーマルもSPも、この図鑑では同じ「かすみぴSP保管枠」に保存されます。</p>
    <div class="collectionGrid" id="collectionGrid"></div>
  </section>

</div>

<div class="drawOverlay" id="drawOverlay" aria-hidden="true">
  <div class="drawScene theme-soft" id="drawScene">
    <div class="particles" id="particleField"></div>
    <div class="drawAura"></div>
    <div class="drawRing"></div>
    <div class="cardSilhouette" id="cardSilhouette"></div>
    <div class="drawFlash" id="drawFlash"></div>
    <div class="drawText" id="drawText">Synchronizing…</div>
  </div>
</div>

<div class="bigResultOverlay" id="bigResultOverlay" aria-hidden="true">
  <div class="bigResult">
    <div class="bigResultRarity" id="bigResultRarity">SP</div>
    <div class="bigResultName" id="bigResultName">かすみぴSP</div>
  </div>
</div>

<script>
(() => {
  "use strict";

  const KEY_HEAT  = "matching_heat_v1";
  const KEY_GACHA = "kasumipi_gacha_v4";
  const KEY_BOOK  = "kasumipi_gacha_book_v4";

  const COST = 500;
  const PITY_MAX = 10;

  const IMG_TOP   = "https://ul.h3z.jp/gQiokHCL.png";
  const IMG_STAGE = "https://ul.h3z.jp/UtPlWaZz.png";

  const CARD_POOL = [
    {
      id: "KSP-01",
      rarity: "SP",
      name: "かすみぴ《浮上》",
      theme: "soft",
      text: "静かな金の光の中で、ゆっくり浮かび上がってきた一枚。",
      img: "https://files.catbox.moe/9m5q8j.jpg"
    },
    {
      id: "KSP-02",
      rarity: "SP",
      name: "かすみぴ《抱えた記憶》",
      theme: "dark",
      text: "赤紫の脈動をまとい、手放せない記憶のように現れた。",
      img: "https://files.catbox.moe/t2l2o8.jpg"
    },
    {
      id: "KSP-03",
      rarity: "SP",
      name: "かすみぴ《選別》",
      theme: "choice",
      text: "数ある候補の中から、最後に選ばれた特別な一枚。",
      img: "https://files.catbox.moe/v1rrsx.jpg"
    },
    {
      id: "KSP-04",
      rarity: "SP",
      name: "かすみぴ《深層》",
      theme: "final",
      text: "金の奔流の中心で、ついに深層そのものが姿を現した。",
      img: "https://files.catbox.moe/o7x1k3.jpg"
    },
    {
      id: "KN-01",
      rarity: "N",
      name: "かすみぴ《微熱》",
      theme: "normal",
      text: "小さく残った熱が、まだ消えずにゆらいでいる。",
      img: IMG_TOP
    },
    {
      id: "KN-02",
      rarity: "N",
      name: "かすみぴ《見送り》",
      theme: "normal",
      text: "届かなかった言葉だけが、あとからゆっくり追いかけてくる。",
      img: IMG_STAGE
    },
    {
      id: "KN-03",
      rarity: "N",
      name: "かすみぴ《未読》",
      theme: "normal",
      text: "開かれないまま沈んでいた感情が、今日だけ少し光った。",
      img: IMG_TOP
    },
    {
      id: "KN-04",
      rarity: "N",
      name: "かすみぴ《余韻》",
      theme: "normal",
      text: "終わったあとに残るものほど、案外ずっとしぶとい。",
      img: IMG_STAGE
    },
    {
      id: "KN-05",
      rarity: "N",
      name: "かすみぴ《片想い》",
      theme: "normal",
      text: "一方通行でも、熱だけは妙に本物だったりする。",
      img: IMG_TOP
    },
    {
      id: "KN-06",
      rarity: "N",
      name: "かすみぴ《置き去り》",
      theme: "normal",
      text: "忘れたつもりの気持ちほど、あとから一番面倒を起こす。",
      img: IMG_STAGE
    }
  ];

  const SP_POOL = CARD_POOL.filter(v => v.rarity === "SP");
  const NORMAL_POOL = CARD_POOL.filter(v => v.rarity === "N");

  const $ = (sel, root = document) => root.querySelector(sel);
  const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

  function safeParse(raw, fallback) {
    try {
      const v = JSON.parse(raw);
      return v ?? fallback;
    } catch {
      return fallback;
    }
  }

  function getHeat() {
    return Number(localStorage.getItem(KEY_HEAT) || 0);
  }

  function setHeat(v) {
    localStorage.setItem(KEY_HEAT, String(Math.max(0, Number(v || 0))));
  }

  function getGacha() {
    return safeParse(localStorage.getItem(KEY_GACHA), {
      total: 0,
      pity: 0,
      lastId: null
    });
  }

  function saveGacha(v) {
    localStorage.setItem(KEY_GACHA, JSON.stringify(v));
  }

  function getBook() {
    return safeParse(localStorage.getItem(KEY_BOOK), {
      owned: {}
    });
  }

  function saveBook(v) {
    localStorage.setItem(KEY_BOOK, JSON.stringify(v));
  }

  function addOwned(card) {
    const book = getBook();
    if (!book.owned[card.id]) {
      book.owned[card.id] = {
        count: 0,
        name: card.name,
        rarity: card.rarity,
        img: card.img
      };
    }
    book.owned[card.id].count += 1;
    saveBook(book);
  }

  function ownedTotal() {
    const book = getBook();
    return CARD_POOL.reduce((sum, card) => {
      return sum + (book.owned[card.id] ? 1 : 0);
    }, 0);
  }

  function pickNormal() {
    return NORMAL_POOL[Math.floor(Math.random() * NORMAL_POOL.length)];
  }

  function pickSP() {
    return SP_POOL[Math.floor(Math.random() * SP_POOL.length)];
  }

  function rarityClass(rarity) {
    return rarity === "SP" ? "sp" : "n";
  }

  function renderCollection() {
    const book = getBook();
    const root = $("#collectionGrid");
    root.innerHTML = "";

    CARD_POOL.forEach(card => {
      const owned = book.owned[card.id];
      const item = document.createElement("article");
      item.className = "collectionItem" + (owned ? "" : " locked");

      item.innerHTML = `
        <div class="collectionTop">
          <div class="collectionRarity ${rarityClass(card.rarity)}">${card.rarity}</div>
          <div class="collectionCount">${owned ? "×" + owned.count : "未"}</div>
        </div>
        <div class="collectionThumb">
          <img src="${owned ? card.img : IMG_TOP}" alt="${owned ? card.name : "未所持カード"}">
        </div>
        <div class="collectionCode">${card.id}</div>
        <div class="collectionName">${owned ? card.name : "未所持"}</div>
      `;
      root.appendChild(item);
    });
  }

  function renderHeat() {
    const heat = getHeat();
    const g = getGacha();

    $("#heatNow").textContent = heat.toLocaleString();
    $("#gachaTotal").textContent = String(g.total || 0);
    $("#pityRemain").textContent = String(Math.max(1, PITY_MAX - (g.pity || 0)));
    $("#ownedCount").textContent = String(ownedTotal());
    $("#allCardCount").textContent = String(CARD_POOL.length);

    const pityPercent = Math.min(100, Math.round(((g.pity || 0) / PITY_MAX) * 100));
    $("#pityMeter").style.width = pityPercent + "%";

    const btn = $("#drawBtn");
    const hint = $("#drawHint");

    if (heat >= COST) {
      btn.disabled = false;
      hint.textContent = "爆発寸前　ガチャが引けるじゃなイカ";
    } else {
      btn.disabled = true;
      hint.textContent = `あと ${Math.max(0, COST - heat).toLocaleString()} 熱量で引けるじゃなイカ`;
    }
  }

  function renderIdleResult() {
    $("#resultRarity").textContent = "---";
    $("#resultRarity").className = "resultRarity n";
    $("#resultName").textContent = "---";
    $("#resultText").textContent = "ここに排出結果が表示されます。";
  }

  function renderResult(card) {
    const img = $("#resultImage");
    const ph = $("#resultPlaceholder");

    img.src = card.img;
    img.classList.remove("hidden");
    ph.classList.add("hidden");

    $("#resultRarity").textContent = card.rarity;
    $("#resultRarity").className = `resultRarity ${rarityClass(card.rarity)}`;
    $("#resultName").textContent = card.name;
    $("#resultText").textContent = card.text;
  }

  function clearParticles() {
    $("#particleField").innerHTML = "";
  }

  function spawnParticles(count, theme = "gold") {
    const root = $("#particleField");
    clearParticles();

    for (let i = 0; i < count; i++) {
      const el = document.createElement("span");
      const kindRoll = Math.random();
      el.className = "spark";
      if (kindRoll < 0.22) el.classList.add("star");
      else if (kindRoll < 0.36) el.classList.add("line");

      const sx = (Math.random() * 80 - 40).toFixed(1) + "px";
      const sy = (Math.random() * 80 - 40).toFixed(1) + "px";
      const tx = (Math.random() * 520 - 260).toFixed(1) + "px";
      const ty = (Math.random() * 360 - 180).toFixed(1) + "px";
      const dur = (0.9 + Math.random() * 1.2).toFixed(2) + "s";

      el.style.setProperty("--sx", sx);
      el.style.setProperty("--sy", sy);
      el.style.setProperty("--tx", tx);
      el.style.setProperty("--ty", ty);
      el.style.setProperty("--dur", dur);

      if (theme === "dark") {
        el.style.background = kindRoll < 0.36
          ? "linear-gradient(180deg, rgba(255,190,220,.95), rgba(180,120,255,.72), rgba(180,120,255,0))"
          : "radial-gradient(circle, #fff3fb 0%, #ff83ba 40%, rgba(135,96,255,0) 76%)";
        el.style.boxShadow = "0 0 16px rgba(255,110,170,.42)";
      } else if (theme === "choice") {
        el.style.background = kindRoll < 0.36
          ? "linear-gradient(180deg, rgba(255,255,255,.95), rgba(140,190,255,.72), rgba(140,190,255,0))"
          : "radial-gradient(circle, #ffffff 0%, #ffd85d 38%, rgba(110,180,255,0) 76%)";
        el.style.boxShadow = "0 0 16px rgba(150,200,255,.36)";
      } else if (theme === "final") {
        el.style.background = kindRoll < 0.36
          ? "linear-gradient(180deg, rgba(255,255,255,.98), rgba(255,214,82,.82), rgba(255,214,82,0))"
          : "radial-gradient(circle, #fffef3 0%, #ffd84b 40%, rgba(255,190,0,0) 76%)";
        el.style.boxShadow = "0 0 22px rgba(255,220,90,.55)";
      } else if (theme === "normal") {
        el.style.background = kindRoll < 0.36
          ? "linear-gradient(180deg, rgba(255,255,255,.95), rgba(215,175,210,.72), rgba(215,175,210,0))"
          : "radial-gradient(circle, #fffafd 0%, #d6acc3 42%, rgba(214,172,195,0) 76%)";
        el.style.boxShadow = "0 0 14px rgba(177,129,161,.30)";
      }

      root.appendChild(el);
    }
  }

  function setTheme(theme) {
    const scene = $("#drawScene");
    scene.className = "drawScene";
    scene.classList.add(`theme-${theme}`);
  }

  async function playNormalScene() {
    setTheme("normal");
    $("#drawText").textContent = "Tracing…";
    spawnParticles(26, "normal");
    await sleep(480);

    $("#drawText").textContent = "A faint signal…";
    spawnParticles(42, "normal");
    await sleep(620);

    $("#drawFlash").classList.add("show");
    spawnParticles(56, "normal");
    await sleep(360);
    $("#drawFlash").classList.remove("show");
  }

  async function playSoftScene() {
    setTheme("soft");
    $("#drawText").textContent = "Connecting…";
    spawnParticles(36, "gold");
    await sleep(600);

    $("#drawText").textContent = "Signal Rising…";
    spawnParticles(48, "gold");
    await sleep(750);

    $("#drawFlash").classList.add("show");
    spawnParticles(72, "gold");
    await sleep(420);
    $("#drawFlash").classList.remove("show");
  }

  async function playDarkScene() {
    setTheme("dark");
    $("#drawText").textContent = "Resonance Detected…";
    spawnParticles(36, "dark");
    await sleep(650);

    $("#cardSilhouette").style.filter = "hue-rotate(-20deg) saturate(1.18)";
    $("#drawText").textContent = "Memory Pulse…";
    spawnParticles(64, "dark");
    await sleep(820);

    $("#drawFlash").classList.add("show");
    spawnParticles(86, "dark");
    await sleep(450);
    $("#drawFlash").classList.remove("show");
    $("#cardSilhouette").style.filter = "";
  }

  async function playChoiceScene() {
    setTheme("choice");
    $("#drawText").textContent = "Selecting one memory…";
    spawnParticles(40, "choice");
    await sleep(520);

    const sil = $("#cardSilhouette");
    for (let i = 0; i < 3; i++) {
      sil.style.transform = i % 2 === 0
        ? "translateX(-68px) translateY(-10px) rotate(-8deg) scale(.96)"
        : "translateX(68px) translateY(-10px) rotate(8deg) scale(.96)";
      await sleep(180);
    }
    sil.style.transform = "";
    $("#drawText").textContent = "Chosen.";
    spawnParticles(96, "choice");
    $("#drawFlash").classList.add("show");
    await sleep(460);
    $("#drawFlash").classList.remove("show");
  }

  async function playFinalScene() {
    setTheme("final");
    $("#drawText").textContent = "Deep Core Opened…";
    spawnParticles(80, "final");
    await sleep(500);

    $("#drawText").textContent = "Special Signal Confirmed";
    spawnParticles(120, "final");
    await sleep(620);

    $("#drawFlash").classList.add("show");
    spawnParticles(170, "final");
    await sleep(520);
    $("#drawFlash").classList.remove("show");

    $("#drawText").textContent = "Manifest.";
    spawnParticles(140, "final");
    await sleep(280);
  }

  async function playDrawAnimation(card) {
    const overlay = $("#drawOverlay");
    const big = $("#bigResultOverlay");

    overlay.classList.add("show");
    clearParticles();
    $("#cardSilhouette").style.transform = "";
    $("#cardSilhouette").style.filter = "";

    if (card.theme === "normal") await playNormalScene();
    else if (card.theme === "soft") await playSoftScene();
    else if (card.theme === "dark") await playDarkScene();
    else if (card.theme === "choice") await playChoiceScene();
    else await playFinalScene();

    overlay.classList.remove("show");
    clearParticles();

    $("#bigResultRarity").textContent = card.rarity;
    $("#bigResultName").textContent = card.name;
    big.classList.add("show");
    await sleep(card.theme === "final" ? 1700 : 1300);
    big.classList.remove("show");
  }

  function pickCardByRate(g) {
    if ((g.pity || 0) >= PITY_MAX) {
      return pickSP();
    }
    return Math.random() < 0.18 ? pickSP() : pickNormal();
  }

  async function drawOnce() {
    const heat = getHeat();
    if (heat < COST) {
      renderHeat();
      return;
    }

    setHeat(heat - COST);

    const g = getGacha();
    g.total += 1;
    g.pity += 1;

    const card = pickCardByRate(g);

    if (card.rarity === "SP") {
      g.pity = 0;
    }

    g.lastId = card.id;
    saveGacha(g);
    addOwned(card);

    renderHeat();
    await playDrawAnimation(card);
    renderResult(card);
    renderCollection();
  }

  function bindUI() {
    $("#backBtn").addEventListener("click", () => {
      if (history.length > 1) history.back();
      else location.href = "./";
    });

    $("#drawBtn").addEventListener("click", drawOnce);
  }

  function init() {
    renderHeat();
    renderIdleResult();
    renderCollection();
    bindUI();
  }

  init();
})();
</script>
</body>
</html>
