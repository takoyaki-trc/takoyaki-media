<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>焼け残りの想い｜かすみぴガチャ</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg1:#0a0615;
  --bg2:#130a24;
  --bg3:#221038;
  --bg4:#2f144f;

  --text:#fff9ff;
  --muted:#d6c7e8;
  --muted2:#a998bf;

  --gold1:#fff4c7;
  --gold2:#ffd86a;
  --gold3:#ffb300;
  --gold4:#c77a00;

  --pink1:#ff9fc5;
  --pink2:#ff5fa5;
  --pink3:#a92d67;

  --vio1:#9e88ff;
  --vio2:#6d55ff;

  --card:rgba(255,255,255,.08);
  --card2:rgba(255,255,255,.05);
  --line:rgba(255,255,255,.10);

  --shadow:0 20px 50px rgba(0,0,0,.38);
  --shadow2:0 10px 24px rgba(0,0,0,.28);

  --safeTop:max(12px, env(safe-area-inset-top));
  --safeBottom:max(14px, env(safe-area-inset-bottom));
}

*{box-sizing:border-box}
html,body{min-height:100%}
body{
  margin:0;
  font-family:"Noto Sans JP",system-ui,sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 50% -10%, rgba(255,210,90,.12), transparent 18%),
    radial-gradient(circle at 20% 10%, rgba(255,95,165,.10), transparent 22%),
    radial-gradient(circle at 80% 20%, rgba(130,100,255,.14), transparent 28%),
    linear-gradient(180deg, var(--bg4) 0%, var(--bg3) 28%, var(--bg2) 62%, var(--bg1) 100%);
  overflow-x:hidden;
}

button{font:inherit}
a{text-decoration:none;color:inherit}
.hidden{display:none !important}

.page{
  width:min(960px, calc(100% - 14px));
  margin:0 auto;
  padding:var(--safeTop) 0 calc(28px + var(--safeBottom));
}

/* ---------------- topbar ---------------- */
.topbar{
  display:grid;
  grid-template-columns:60px 1fr 92px;
  gap:8px;
  align-items:center;
  margin-bottom:12px;
}
.topBtn{
  min-height:54px;
  border:none;
  cursor:pointer;
  border-radius:16px;
  color:#35190a;
  background:
    linear-gradient(180deg, rgba(255,255,255,.95), rgba(255,255,255,.72)),
    linear-gradient(180deg,var(--gold1),var(--gold2));
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,.42),
    inset 0 -5px 0 rgba(183,124,22,.36),
    0 10px 22px rgba(0,0,0,.22);
  font-weight:900;
}
.topBtn--back{font-size:22px}
.topBtn--link{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:1px;
}
.topBtnMain{font-size:14px}
.topBtnSub{font-size:10px;font-weight:800;opacity:.85}

.topTitle{
  position:relative;
  overflow:hidden;
  border-radius:18px;
  padding:12px 14px;
  text-align:center;
  background:
    linear-gradient(180deg, rgba(255,255,255,.11), rgba(255,255,255,.06));
  border:1px solid var(--line);
  box-shadow:var(--shadow2);
}
.topTitle::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.10), transparent);
  transform:translateX(-100%);
  animation:topshine 4s linear infinite;
}
@keyframes topshine{
  to{ transform:translateX(100%); }
}
.topTitle h1{
  margin:0;
  font-size:24px;
  line-height:1.1;
  font-weight:900;
  letter-spacing:.02em;
}
.topTitle p{
  margin:5px 0 0;
  font-size:11px;
  line-height:1.5;
  color:var(--muted);
  font-weight:700;
}

/* ---------------- heat panel ---------------- */
.heatPanel{
  position:relative;
  overflow:hidden;
  padding:14px;
  border-radius:24px;
  margin-bottom:12px;
  background:
    radial-gradient(circle at 0% 0%, rgba(255,220,120,.10), transparent 22%),
    radial-gradient(circle at 100% 0%, rgba(255,105,165,.10), transparent 24%),
    linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05));
  border:1px solid var(--line);
  box-shadow:var(--shadow);
}
.heatPanel::after{
  content:"";
  position:absolute;
  inset:-30% auto auto -10%;
  width:160px;
  height:160px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(255,220,100,.16), transparent 70%);
  pointer-events:none;
}
.heatTop{
  display:grid;
  grid-template-columns:1fr auto;
  gap:12px;
  align-items:center;
}
.heatMainLabel{
  font-size:12px;
  color:#ffe8b1;
  font-weight:800;
  margin-bottom:4px;
}
.heatMainValue{
  font-size:38px;
  line-height:1;
  font-weight:900;
  color:#fff9e9;
  text-shadow:
    0 0 12px rgba(255,210,90,.24),
    0 0 26px rgba(255,210,90,.12);
}
.heatNeed{
  text-align:right;
  font-size:12px;
  line-height:1.65;
  color:var(--muted);
  font-weight:700;
}
.heatMiniGrid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-top:12px;
}
.heatMini{
  padding:11px 8px;
  border-radius:14px;
  text-align:center;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08);
}
.heatMiniLabel{
  font-size:10px;
  color:var(--muted2);
  margin-bottom:4px;
  font-weight:700;
}
.heatMiniValue{
  font-size:16px;
  font-weight:900;
}

/* ---------------- test tools ---------------- */
.testPanel{
  padding:12px;
  border-radius:20px;
  margin-bottom:12px;
  background:linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.04));
  border:1px solid var(--line);
  box-shadow:var(--shadow2);
}
.testHead{
  font-size:12px;
  color:#ffdca8;
  font-weight:800;
  margin-bottom:10px;
}
.testBtns{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}
.testBtn{
  min-height:42px;
  border:none;
  cursor:pointer;
  border-radius:13px;
  color:#fff;
  font-size:12px;
  font-weight:900;
  background:linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.05));
  border:1px solid rgba(255,255,255,.10);
  box-shadow:0 6px 12px rgba(0,0,0,.16);
}
.testBtn.reset{
  background:linear-gradient(180deg, rgba(255,120,145,.35), rgba(255,90,125,.18));
}

/* ---------------- stage ---------------- */
.stagePanel{
  margin-bottom:14px;
}
.stageFrame{
  position:relative;
  overflow:hidden;
  border-radius:26px;
  border:1px solid rgba(255,255,255,.10);
  box-shadow:var(--shadow);
  background:#080610;
}
.stageFrame::before{
  content:"";
  position:absolute;
  inset:-20% -20%;
  background:
    radial-gradient(circle at 50% 20%, rgba(255,215,115,.08), transparent 18%),
    radial-gradient(circle at 30% 60%, rgba(255,110,170,.08), transparent 16%),
    radial-gradient(circle at 70% 40%, rgba(145,120,255,.09), transparent 18%);
  pointer-events:none;
}
.stageImage{
  display:block;
  width:100%;
  aspect-ratio:16/10;
  object-fit:cover;
}
.stageCaption{
  margin-top:10px;
  padding:12px 14px;
  border-radius:18px;
  background:linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.05));
  border:1px solid var(--line);
}
.stageBadge{
  display:inline-flex;
  min-height:26px;
  align-items:center;
  justify-content:center;
  padding:4px 10px;
  border-radius:999px;
  margin-bottom:8px;
  background:linear-gradient(180deg,var(--gold1),var(--gold2));
  color:#4d2b10;
  font-size:11px;
  font-weight:900;
}
.stageMessage{
  margin:0;
  font-size:13px;
  line-height:1.75;
  color:#f2eaf8;
  font-weight:700;
}

/* ---------------- draw button ---------------- */
.drawPanel{ margin-bottom:14px; }
.drawBtn{
  position:relative;
  overflow:hidden;
  width:100%;
  min-height:68px;
  border:none;
  cursor:pointer;
  border-radius:24px;
  color:#4d1f0a;
  font-size:22px;
  font-weight:900;
  letter-spacing:.02em;
  background:
    radial-gradient(circle at 50% 18%, rgba(255,255,255,.58), transparent 38%),
    linear-gradient(180deg, #fff8d8 0%, #ffd96f 45%, #ffbf2d 100%);
  box-shadow:
    inset 0 4px 0 rgba(255,255,255,.62),
    inset 0 -5px 0 rgba(171,115,18,.35),
    0 0 24px rgba(255,200,80,.22),
    0 14px 26px rgba(0,0,0,.20);
}
.drawBtn::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.28), transparent);
  transform:translateX(-100%);
  animation:drawshine 2.3s linear infinite;
}
@keyframes drawshine{
  to{ transform:translateX(100%); }
}
.drawBtn:active{ transform:translateY(1px); }
.drawBtn:disabled{
  opacity:.55;
  cursor:not-allowed;
  filter:saturate(.7);
}
.drawHint{
  margin:8px 2px 0;
  text-align:center;
  font-size:12px;
  line-height:1.6;
  color:var(--muted);
  font-weight:700;
}

/* ---------------- result panel ---------------- */
.resultPanel{
  margin-bottom:14px;
  padding:14px;
  border-radius:24px;
  background:
    radial-gradient(circle at 100% 0%, rgba(255,210,95,.07), transparent 20%),
    radial-gradient(circle at 0% 100%, rgba(255,110,175,.07), transparent 18%),
    linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.05));
  border:1px solid var(--line);
  box-shadow:var(--shadow);
}
.resultHead{ margin-bottom:10px; }
.resultBadge{
  display:inline-flex;
  min-height:25px;
  align-items:center;
  justify-content:center;
  padding:4px 10px;
  border-radius:999px;
  margin-bottom:8px;
  background:linear-gradient(180deg, #ffc1d8, #ff8cb1);
  color:#5a2335;
  font-size:11px;
  font-weight:900;
}
.resultHead h2{
  margin:0;
  font-size:24px;
  line-height:1.2;
  font-weight:900;
}
.resultBody{
  display:grid;
  grid-template-columns:160px 1fr;
  gap:14px;
  align-items:start;
}
.resultVisual{
  position:relative;
  min-height:210px;
  border-radius:18px;
  overflow:hidden;
  background:
    radial-gradient(circle at 50% 20%, rgba(255,210,85,.14), transparent 32%),
    rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.10);
  display:grid;
  place-items:center;
}
.resultVisual::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(180deg, rgba(255,255,255,.04), transparent 30%, rgba(255,255,255,.03));
  pointer-events:none;
}
.resultCardImage{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.resultPlaceholder{
  padding:16px;
  text-align:center;
  font-size:12px;
  line-height:1.75;
  color:#d2c4dd;
  font-weight:700;
}
.resultRarity{
  display:inline-flex;
  min-height:28px;
  padding:4px 12px;
  border-radius:999px;
  align-items:center;
  justify-content:center;
  background:linear-gradient(180deg,var(--gold1),var(--gold2));
  color:#57320f;
  font-size:12px;
  font-weight:900;
  margin-bottom:8px;
}
.resultName{
  margin:0 0 8px;
  font-size:22px;
  line-height:1.35;
  font-weight:900;
}
.resultText{
  margin:0;
  font-size:13px;
  line-height:1.8;
  color:#e4d9eb;
  font-weight:700;
  white-space:pre-line;
}

/* ---------------- collection ---------------- */
.collectionPanel{
  padding:14px;
  border-radius:24px;
  background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
  border:1px solid var(--line);
  box-shadow:var(--shadow);
}
.collectionHead{ margin-bottom:10px; }
.collectionBadge{
  display:inline-flex;
  min-height:25px;
  align-items:center;
  justify-content:center;
  padding:4px 10px;
  border-radius:999px;
  margin-bottom:8px;
  background:linear-gradient(180deg, #afa4ff, #7d71ec);
  color:#22174f;
  font-size:11px;
  font-weight:900;
}
.collectionHead h2{
  margin:0;
  font-size:22px;
  line-height:1.2;
  font-weight:900;
}
.collectionGrid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}
.collectionItem{
  position:relative;
  overflow:hidden;
  min-height:134px;
  border-radius:18px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.11), rgba(255,255,255,.05)),
    linear-gradient(180deg, rgba(145,120,255,.10), rgba(255,210,100,.06));
  border:1px solid rgba(255,255,255,.10);
  box-shadow:var(--shadow2);
  padding:10px;
}
.collectionItem::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, rgba(255,255,255,.08), transparent 35%, transparent 65%, rgba(255,255,255,.05));
  pointer-events:none;
}
.collectionItem.locked{
  filter:saturate(.35) brightness(.82);
}
.collectionThumb{
  height:64px;
  border-radius:12px;
  margin-bottom:8px;
  display:grid;
  place-items:center;
  background:rgba(255,255,255,.05);
  color:#ffe28e;
  font-size:24px;
  font-weight:900;
}
.collectionCode{
  font-size:11px;
  color:#ffe4a6;
  font-weight:900;
  margin-bottom:4px;
}
.collectionName{
  font-size:12px;
  line-height:1.6;
  color:#f2ebf6;
  font-weight:700;
}

/* ---------------- overlays ---------------- */
.drawOverlay,
.bigResultOverlay{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  padding:18px;
  z-index:100;
}
.drawOverlay.show,
.bigResultOverlay.show{ display:flex; }

.drawOverlay{
  background:
    radial-gradient(circle at center, rgba(255,215,90,.10), transparent 20%),
    rgba(6,4,15,.82);
  backdrop-filter:blur(6px);
}

.drawScene{
  position:relative;
  width:min(480px, 100%);
  height:420px;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.drawAura{
  position:absolute;
  width:260px;
  height:260px;
  border-radius:50%;
  background:
    radial-gradient(circle, rgba(255,225,120,.42) 0%, rgba(255,190,40,.20) 26%, rgba(255,120,180,.12) 46%, transparent 70%);
  filter:blur(8px);
  animation:aurarotate 2.3s linear infinite;
}
@keyframes aurarotate{
  from{ transform:rotate(0deg) scale(1); }
  50%{ transform:rotate(180deg) scale(1.08); }
  to{ transform:rotate(360deg) scale(1); }
}

.drawRing{
  position:absolute;
  width:220px;
  height:220px;
  border-radius:50%;
  border:2px solid rgba(255,220,110,.68);
  box-shadow:
    0 0 20px rgba(255,205,80,.28),
    inset 0 0 20px rgba(255,205,80,.18);
  animation:ringpulse 1.2s ease-in-out infinite;
}
@keyframes ringpulse{
  0%{ transform:scale(.85); opacity:.55; }
  50%{ transform:scale(1.05); opacity:1; }
  100%{ transform:scale(.85); opacity:.55; }
}

.cardSilhouette{
  position:absolute;
  width:150px;
  height:210px;
  border-radius:16px;
  background:linear-gradient(180deg, rgba(255,255,255,.95), rgba(255,245,210,.8));
  box-shadow:
    0 0 35px rgba(255,220,115,.45),
    0 0 70px rgba(255,190,40,.18);
  transform-style:preserve-3d;
  animation:cardfloat 1.6s ease-in-out infinite;
  overflow:hidden;
}
.cardSilhouette::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, rgba(255,255,255,.75), rgba(255,255,255,0) 35%, rgba(255,240,180,.28));
}
.cardSilhouette::after{
  content:"";
  position:absolute;
  inset:8px;
  border-radius:12px;
  background:linear-gradient(180deg, #f7c14c, #ffefbb);
}
@keyframes cardfloat{
  0%{ transform:translateY(0) rotate(-4deg) scale(1); }
  50%{ transform:translateY(-16px) rotate(4deg) scale(1.04); }
  100%{ transform:translateY(0) rotate(-4deg) scale(1); }
}

.drawText{
  position:absolute;
  bottom:30px;
  left:0;
  right:0;
  text-align:center;
  font-size:24px;
  line-height:1.5;
  font-weight:900;
  letter-spacing:.03em;
  color:#fff8e8;
  text-shadow:
    0 0 18px rgba(255,220,110,.28),
    0 10px 24px rgba(0,0,0,.28);
}

.drawFlash{
  position:absolute;
  inset:0;
  background:radial-gradient(circle, rgba(255,255,255,.86), rgba(255,225,120,.62), transparent 62%);
  opacity:0;
  pointer-events:none;
}
.drawFlash.show{
  animation:flashburst .55s ease;
}
@keyframes flashburst{
  0%{ opacity:0; }
  18%{ opacity:1; }
  100%{ opacity:0; }
}

.bigResultOverlay{
  background:
    radial-gradient(circle at center, rgba(255,230,130,.12), rgba(0,0,0,.78));
  backdrop-filter:blur(7px);
}
.bigResult{
  position:relative;
  text-align:center;
  animation:bigpop .22s ease;
}
@keyframes bigpop{
  from{ opacity:0; transform:scale(.92); }
  to{ opacity:1; transform:scale(1); }
}
.bigResultRarity{
  font-size:22px;
  font-weight:900;
  letter-spacing:.16em;
  color:#ffe07f;
  margin-bottom:10px;
  text-shadow:0 0 18px rgba(255,210,80,.28);
}
.bigResultName{
  font-size:40px;
  line-height:1.28;
  font-weight:900;
  text-shadow:
    0 0 20px rgba(255,210,80,.26),
    0 14px 30px rgba(0,0,0,.30);
}

.particles{
  position:absolute;
  inset:0;
  overflow:hidden;
  pointer-events:none;
}
.spark{
  position:absolute;
  width:8px;
  height:8px;
  border-radius:50%;
  background:radial-gradient(circle, #fff7dd 0%, #ffd54d 45%, rgba(255,195,0,0) 75%);
  box-shadow:0 0 16px rgba(255,210,90,.48);
  animation:sparkmove var(--dur) ease-out forwards;
}
.spark.star{
  width:10px;
  height:10px;
  clip-path:polygon(50% 0%,61% 38%,100% 50%,61% 62%,50% 100%,39% 62%,0% 50%,39% 38%);
}
.spark.line{
  width:4px;
  height:22px;
  border-radius:999px;
  background:linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,214,80,.72), rgba(255,214,80,0));
}
@keyframes sparkmove{
  from{
    opacity:0;
    transform:translate(var(--sx), var(--sy)) scale(.2) rotate(0deg);
  }
  12%{ opacity:1; }
  to{
    opacity:0;
    transform:translate(var(--tx), var(--ty)) scale(1.2) rotate(220deg);
  }
}

/* card-specific overlay themes */
.theme-soft .drawAura{
  background:radial-gradient(circle, rgba(255,236,160,.44) 0%, rgba(255,190,70,.22) 28%, rgba(255,150,190,.10) 48%, transparent 70%);
}
.theme-dark .drawAura{
  background:radial-gradient(circle, rgba(255,110,170,.35) 0%, rgba(125,80,255,.18) 32%, rgba(255,190,70,.10) 52%, transparent 72%);
}
.theme-choice .drawAura{
  background:radial-gradient(circle, rgba(160,200,255,.28) 0%, rgba(255,220,110,.18) 32%, rgba(255,150,190,.10) 54%, transparent 72%);
}
.theme-final .drawAura{
  background:radial-gradient(circle, rgba(255,240,190,.56) 0%, rgba(255,210,70,.30) 24%, rgba(255,150,120,.16) 44%, transparent 68%);
}
.theme-final .drawRing{
  width:250px;
  height:250px;
  border-color:rgba(255,235,140,.9);
  box-shadow:
    0 0 30px rgba(255,215,90,.45),
    inset 0 0 28px rgba(255,215,90,.22);
}

/* ---------------- responsive ---------------- */
@media (max-width:620px){
  .topbar{ grid-template-columns:56px 1fr 82px; }
  .topTitle h1{ font-size:20px; }
  .heatMiniGrid{ grid-template-columns:repeat(3,1fr); }
  .testBtns{ grid-template-columns:repeat(2,1fr); }
  .resultBody{ grid-template-columns:1fr; }
  .resultVisual{ min-height:230px; }
  .drawBtn{ font-size:19px; min-height:62px; }
  .drawText{ font-size:20px; bottom:26px; }
  .bigResultName{ font-size:30px; }
}
</style>
</head>
<body>
<div class="page">

  <header class="topbar">
    <button class="topBtn topBtn--back" id="backBtn" aria-label="戻る">←</button>

    <div class="topTitle">
      <h1>焼け残りの想い</h1>
      <p>熱量を使って、かすみぴのSPカードを引く</p>
    </div>

    <a class="topBtn topBtn--link" href="./matching-board.html" aria-label="募集板へ戻る">
      <span class="topBtnMain">募集板</span>
      <span class="topBtnSub">戻る</span>
    </a>
  </header>

  <section class="heatPanel">
    <div class="heatTop">
      <div>
        <div class="heatMainLabel">現在の熱量</div>
        <div class="heatMainValue" id="heatNow">0</div>
      </div>

      <div class="heatNeed">
        1回：500熱量<br>
        あと <span id="heatNeed">500</span>
      </div>
    </div>

    <div class="heatMiniGrid">
      <div class="heatMini">
        <div class="heatMiniLabel">総ガチャ回数</div>
        <div class="heatMiniValue" id="gachaTotal">0</div>
      </div>
      <div class="heatMini">
        <div class="heatMiniLabel">SP確定まで</div>
        <div class="heatMiniValue" id="pityRemain">10</div>
      </div>
      <div class="heatMini">
        <div class="heatMiniLabel">所持SP数</div>
        <div class="heatMiniValue" id="ownedCount">0</div>
      </div>
    </div>
  </section>

  <section class="testPanel">
    <div class="testHead">テスト用：熱量を手動で増やす</div>
    <div class="testBtns">
      <button class="testBtn" data-add-heat="100">+100</button>
      <button class="testBtn" data-add-heat="500">+500</button>
      <button class="testBtn" data-add-heat="5000">+5000</button>
      <button class="testBtn reset" id="resetHeatBtn">リセット</button>
    </div>
  </section>

  <section class="stagePanel">
    <div class="stageFrame">
      <img id="stageImage" class="stageImage" src="https://ul.h3z.jp/UtPlWaZz.png" alt="かすみぴガチャ演出">
    </div>
    <div class="stageCaption">
      <div class="stageBadge">DEEP MATCHING</div>
      <p class="stageMessage" id="stageMessage">まだ見つかっていない想いが、深い場所で静かに光っている。</p>
    </div>
  </section>

  <section class="drawPanel">
    <button class="drawBtn" id="drawBtn">500熱量で引く</button>
    <p class="drawHint" id="drawHint">熱量が足りないと引けません。</p>
  </section>

  <section class="resultPanel">
    <div class="resultHead">
      <div class="resultBadge">RESULT</div>
      <h2>排出カード</h2>
    </div>

    <div class="resultBody">
      <div class="resultVisual">
        <img id="resultImage" class="resultCardImage hidden" src="" alt="排出カード">
        <div id="resultPlaceholder" class="resultPlaceholder">
          まだ引いていません。<br>
          光る一枚が現れるのを待っています。
        </div>
      </div>

      <div class="resultInfo">
        <div class="resultRarity" id="resultRarity">---</div>
        <h3 class="resultName" id="resultName">---</h3>
        <p class="resultText" id="resultText">ここに排出結果が表示されます。</p>
      </div>
    </div>
  </section>

  <section class="collectionPanel">
    <div class="collectionHead">
      <div class="collectionBadge">COLLECTION</div>
      <h2>かすみぴSP一覧</h2>
    </div>

    <div class="collectionGrid" id="collectionGrid"></div>
  </section>

</div>

<div class="drawOverlay" id="drawOverlay" aria-hidden="true">
  <div class="drawScene theme-soft" id="drawScene">
    <div class="particles" id="particleField"></div>
    <div class="drawAura"></div>
    <div class="drawRing"></div>
    <div class="cardSilhouette" id="cardSilhouette"></div>
    <div class="drawFlash" id="drawFlash"></div>
    <div class="drawText" id="drawText">Synchronizing…</div>
  </div>
</div>

<div class="bigResultOverlay" id="bigResultOverlay" aria-hidden="true">
  <div class="bigResult">
    <div class="bigResultRarity" id="bigResultRarity">SP</div>
    <div class="bigResultName" id="bigResultName">かすみぴSP</div>
  </div>
</div>

<script>
(() => {
  "use strict";

  const KEY_HEAT = "matching_heat_v1";
  const KEY_GACHA = "kasumipi_gacha_v2";
  const KEY_BOOK = "kasumipi_gacha_book_v2";

  const COST = 500;
  const PITY_MAX = 10;

  const SP_POOL = [
    {
      id: "KSP-01",
      rarity: "SP",
      name: "かすみぴ《浮上》",
      theme: "soft",
      text: "静かな金の光の中で、ゆっくり浮かび上がってきた一枚。",
      img: "https://files.catbox.moe/9m5q8j.jpg",
      stageMsg: "淡い金光に包まれ、やわらかく浮上してくる……"
    },
    {
      id: "KSP-02",
      rarity: "SP",
      name: "かすみぴ《抱えた記憶》",
      theme: "dark",
      text: "赤紫の脈動をまとい、手放せない記憶のように現れた。",
      img: "https://files.catbox.moe/t2l2o8.jpg",
      stageMsg: "赤紫の鼓動が、深い場所からじわじわ近づいてくる……"
    },
    {
      id: "KSP-03",
      rarity: "SP",
      name: "かすみぴ《選別》",
      theme: "choice",
      text: "数ある候補の中から、最後に選ばれた特別な一枚。",
      img: "https://files.catbox.moe/v1rrsx.jpg",
      stageMsg: "複数の気配の中で、ひとつだけ強く光り始めた……"
    },
    {
      id: "KSP-04",
      rarity: "SP",
      name: "かすみぴ《深層》",
      theme: "final",
      text: "金の奔流の中心で、ついに深層そのものが姿を現した。",
      img: "https://files.catbox.moe/o7x1k3.jpg",
      stageMsg: "全体がまばゆく染まり、特別な存在が降りてくる……"
    }
  ];

  const $ = (sel, root = document) => root.querySelector(sel);
  const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));
  const sleep = (ms) => new Promise(r => setTimeout(r, ms));

  function safeParse(raw, fallback) {
    try {
      const v = JSON.parse(raw);
      return v ?? fallback;
    } catch {
      return fallback;
    }
  }

  function getHeat() {
    return Number(localStorage.getItem(KEY_HEAT) || 0);
  }

  function setHeat(v) {
    localStorage.setItem(KEY_HEAT, String(Math.max(0, Number(v || 0))));
  }

  function addHeat(v) {
    setHeat(getHeat() + Number(v || 0));
  }

  function getGacha() {
    return safeParse(localStorage.getItem(KEY_GACHA), {
      total: 0,
      pity: 0,
      lastId: null
    });
  }

  function saveGacha(v) {
    localStorage.setItem(KEY_GACHA, JSON.stringify(v));
  }

  function getBook() {
    return safeParse(localStorage.getItem(KEY_BOOK), {
      owned: {}
    });
  }

  function saveBook(v) {
    localStorage.setItem(KEY_BOOK, JSON.stringify(v));
  }

  function addOwned(card) {
    const book = getBook();
    if (!book.owned[card.id]) {
      book.owned[card.id] = {
        count: 0,
        name: card.name,
        rarity: card.rarity,
        img: card.img
      };
    }
    book.owned[card.id].count += 1;
    saveBook(book);
  }

  function ownedTotal() {
    const book = getBook();
    return Object.keys(book.owned).length;
  }

  function pickNormal() {
    return SP_POOL[Math.floor(Math.random() * SP_POOL.length)];
  }

  function pickPity() {
    return SP_POOL[Math.floor(Math.random() * SP_POOL.length)];
  }

  function renderCollection() {
    const book = getBook();
    const root = $("#collectionGrid");
    root.innerHTML = "";

    SP_POOL.forEach(card => {
      const owned = book.owned[card.id];
      const item = document.createElement("article");
      item.className = "collectionItem" + (owned ? "" : " locked");
      item.innerHTML = `
        <div class="collectionThumb">${owned ? "✦" : "?"}</div>
        <div class="collectionCode">${card.id}</div>
        <div class="collectionName">${owned ? card.name : "未所持"}</div>
      `;
      root.appendChild(item);
    });
  }

  function renderHeat() {
    const heat = getHeat();
    const g = getGacha();

    $("#heatNow").textContent = heat.toLocaleString();
    $("#heatNeed").textContent = String(Math.max(0, COST - heat));
    $("#gachaTotal").textContent = String(g.total || 0);
    $("#pityRemain").textContent = String(Math.max(1, PITY_MAX - (g.pity || 0)));
    $("#ownedCount").textContent = String(ownedTotal());

    const btn = $("#drawBtn");
    const hint = $("#drawHint");

    if (heat >= COST) {
      btn.disabled = false;
      hint.textContent = "今なら引けます。深い場所に沈んだ想いを呼び出せます。";
    } else {
      btn.disabled = true;
      hint.textContent = `あと ${Math.max(0, COST - heat)} 熱量で引けます。`;
    }
  }

  function renderIdleStage() {
    $("#stageImage").src = "https://ul.h3z.jp/UtPlWaZz.png";
    $("#stageMessage").textContent = "まだ見つかっていない想いが、深い場所で静かに光っている。";
  }

  function renderResult(card) {
    const img = $("#resultImage");
    const ph = $("#resultPlaceholder");
    img.src = card.img;
    img.classList.remove("hidden");
    ph.classList.add("hidden");

    $("#resultRarity").textContent = card.rarity;
    $("#resultName").textContent = card.name;
    $("#resultText").textContent = card.text;
  }

  function bindHeatTools() {
    $$("[data-add-heat]").forEach(btn => {
      btn.addEventListener("click", () => {
        addHeat(Number(btn.dataset.addHeat || 0));
        renderHeat();
      });
    });

    $("#resetHeatBtn").addEventListener("click", () => {
      setHeat(0);
      renderHeat();
    });
  }

  function clearParticles() {
    $("#particleField").innerHTML = "";
  }

  function spawnParticles(count, theme = "gold") {
    const root = $("#particleField");
    if (!root) return;
    clearParticles();

    for (let i = 0; i < count; i++) {
      const el = document.createElement("span");
      const kindRoll = Math.random();
      el.className = "spark";
      if (kindRoll < 0.22) el.classList.add("star");
      else if (kindRoll < 0.36) el.classList.add("line");

      const sx = (Math.random() * 80 - 40).toFixed(1) + "px";
      const sy = (Math.random() * 80 - 40).toFixed(1) + "px";
      const tx = (Math.random() * 520 - 260).toFixed(1) + "px";
      const ty = (Math.random() * 360 - 180).toFixed(1) + "px";
      const dur = (0.9 + Math.random() * 1.2).toFixed(2) + "s";

      el.style.setProperty("--sx", sx);
      el.style.setProperty("--sy", sy);
      el.style.setProperty("--tx", tx);
      el.style.setProperty("--ty", ty);
      el.style.setProperty("--dur", dur);

      if (theme === "dark") {
        el.style.background = kindRoll < 0.36
          ? "linear-gradient(180deg, rgba(255,190,220,.95), rgba(180,120,255,.72), rgba(180,120,255,0))"
          : "radial-gradient(circle, #fff3fb 0%, #ff83ba 40%, rgba(135,96,255,0) 76%)";
        el.style.boxShadow = "0 0 16px rgba(255,110,170,.42)";
      } else if (theme === "choice") {
        el.style.background = kindRoll < 0.36
          ? "linear-gradient(180deg, rgba(255,255,255,.95), rgba(140,190,255,.72), rgba(140,190,255,0))"
          : "radial-gradient(circle, #ffffff 0%, #ffd85d 38%, rgba(110,180,255,0) 76%)";
        el.style.boxShadow = "0 0 16px rgba(150,200,255,.36)";
      } else if (theme === "final") {
        el.style.background = kindRoll < 0.36
          ? "linear-gradient(180deg, rgba(255,255,255,.98), rgba(255,214,82,.82), rgba(255,214,82,0))"
          : "radial-gradient(circle, #fffef3 0%, #ffd84b 40%, rgba(255,190,0,0) 76%)";
        el.style.boxShadow = "0 0 22px rgba(255,220,90,.55)";
      }

      root.appendChild(el);
    }
  }

  function setTheme(theme) {
    const scene = $("#drawScene");
    scene.className = "drawScene";
    scene.classList.add(`theme-${theme}`);
  }

  async function playSoftScene(card) {
    setTheme("soft");
    $("#drawText").textContent = "Connecting…";
    spawnParticles(36, "gold");
    await sleep(600);

    $("#drawText").textContent = "Signal Rising…";
    spawnParticles(48, "gold");
    await sleep(750);

    $("#drawFlash").classList.add("show");
    spawnParticles(72, "gold");
    await sleep(420);
    $("#drawFlash").classList.remove("show");
  }

  async function playDarkScene(card) {
    setTheme("dark");
    $("#drawText").textContent = "Resonance Detected…";
    spawnParticles(36, "dark");
    await sleep(650);

    $("#cardSilhouette").style.filter = "hue-rotate(-20deg) saturate(1.18)";
    $("#drawText").textContent = "Memory Pulse…";
    spawnParticles(64, "dark");
    await sleep(820);

    $("#drawFlash").classList.add("show");
    spawnParticles(86, "dark");
    await sleep(450);
    $("#drawFlash").classList.remove("show");
    $("#cardSilhouette").style.filter = "";
  }

  async function playChoiceScene(card) {
    setTheme("choice");
    $("#drawText").textContent = "Selecting one memory…";
    spawnParticles(40, "choice");
    await sleep(520);

    const sil = $("#cardSilhouette");
    for (let i = 0; i < 3; i++) {
      sil.style.transform = i % 2 === 0
        ? "translateX(-68px) translateY(-10px) rotate(-8deg) scale(.96)"
        : "translateX(68px) translateY(-10px) rotate(8deg) scale(.96)";
      await sleep(180);
    }
    sil.style.transform = "";
    $("#drawText").textContent = "Chosen.";
    spawnParticles(96, "choice");
    $("#drawFlash").classList.add("show");
    await sleep(460);
    $("#drawFlash").classList.remove("show");
  }

  async function playFinalScene(card) {
    setTheme("final");
    $("#drawText").textContent = "Deep Core Opened…";
    spawnParticles(80, "final");
    await sleep(500);

    $("#drawText").textContent = "Special Signal Confirmed";
    spawnParticles(120, "final");
    await sleep(620);

    $("#drawFlash").classList.add("show");
    spawnParticles(170, "final");
    await sleep(520);
    $("#drawFlash").classList.remove("show");

    $("#drawText").textContent = "Manifest.";
    spawnParticles(140, "final");
    await sleep(280);
  }

  async function playDrawAnimation(card) {
    const overlay = $("#drawOverlay");
    const big = $("#bigResultOverlay");

    overlay.classList.add("show");
    clearParticles();
    $("#cardSilhouette").style.transform = "";
    $("#cardSilhouette").style.filter = "";

    if (card.theme === "soft") await playSoftScene(card);
    else if (card.theme === "dark") await playDarkScene(card);
    else if (card.theme === "choice") await playChoiceScene(card);
    else await playFinalScene(card);

    $("#stageImage").src = card.img;
    $("#stageMessage").textContent = card.stageMsg;

    overlay.classList.remove("show");
    clearParticles();

    $("#bigResultRarity").textContent = card.rarity;
    $("#bigResultName").textContent = card.name;
    big.classList.add("show");
    await sleep(card.theme === "final" ? 1700 : 1350);
    big.classList.remove("show");
  }

  async function drawOnce() {
    const heat = getHeat();
    if (heat < COST) {
      renderHeat();
      return;
    }

    setHeat(heat - COST);

    const g = getGacha();
    g.total += 1;
    g.pity += 1;

    let card;
    if (g.pity >= PITY_MAX) {
      card = pickPity();
      g.pity = 0;
    } else {
      card = pickNormal();
    }

    g.lastId = card.id;
    saveGacha(g);
    addOwned(card);

    renderHeat();
    await playDrawAnimation(card);
    renderResult(card);
    renderCollection();
  }

  function bindUI() {
    $("#backBtn").addEventListener("click", () => {
      if (history.length > 1) history.back();
      else location.href = "./";
    });

    $("#drawBtn").addEventListener("click", drawOnce);
  }

  renderIdleStage();
  renderHeat();
  renderCollection();
  bindHeatTools();
  bindUI();
})();
</script>
</body>
</html>
