<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>焼け残りの想い｜かすみぴガチャ</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg1:#fff6fb;
  --bg2:#f6e6ef;
  --bg3:#ecd3df;
  --bg4:#dfbfd0;

  --panel:#fffdfd;
  --panel2:#fff7fb;
  --panel3:#f9edf3;

  --ink:#6f3f58;
  --ink2:#865973;
  --muted:#a18193;
  --muted2:#b89dac;

  --line:#ebd7e1;
  --line2:#ddc2cf;

  --gold1:#fff6cb;
  --gold2:#ffd86e;
  --gold3:#ffb629;
  --gold4:#dc8d13;

  --pink1:#ffbed3;
  --pink2:#ff8db2;
  --pink3:#ee5c95;

  --vio1:#b9abff;
  --vio2:#8a79ec;
  --vio3:#6652bf;

  --berry1:#9f5a7a;
  --berry2:#7e4764;

  --shadow:0 16px 36px rgba(121,66,95,.12);
  --shadow2:0 8px 18px rgba(121,66,95,.10);
  --shadow3:0 24px 48px rgba(88,34,66,.16);

  --safeTop:max(10px, env(safe-area-inset-top));
  --safeBottom:max(12px, env(safe-area-inset-bottom));
}

*{box-sizing:border-box}
html,body{min-height:100%}
body{
  margin:0;
  font-family:"Noto Sans JP",system-ui,sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at 50% -10%, rgba(255,255,255,.95), transparent 18%),
    radial-gradient(circle at 15% 10%, rgba(255,170,205,.22), transparent 24%),
    radial-gradient(circle at 88% 18%, rgba(167,145,255,.16), transparent 22%),
    linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 36%, var(--bg3) 72%, var(--bg4) 100%);
  overflow-x:hidden;
}

button{font:inherit}
a{text-decoration:none;color:inherit}
img{max-width:100%}
.hidden{display:none !important}

.page{
  width:min(940px, calc(100% - 14px));
  margin:0 auto;
  padding:var(--safeTop) 0 calc(28px + var(--safeBottom));
}

/* =========================
   header
========================= */
.heroHeader{
  display:grid;
  grid-template-columns:58px 1fr 92px;
  gap:8px;
  align-items:center;
  padding:8px;
  border-radius:24px;
  background:linear-gradient(180deg, rgba(255,255,255,.96), rgba(255,246,251,.94));
  border:1px solid var(--line);
  box-shadow:var(--shadow);
  margin-bottom:10px;
}
.heroBtn{
  min-height:54px;
  border:none;
  cursor:pointer;
  border-radius:14px;
  color:#6a3c19;
  font-weight:900;
  background:
    linear-gradient(180deg, rgba(255,255,255,.98), rgba(255,255,255,.84)),
    linear-gradient(180deg,var(--gold1),#f8e3a8);
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.82),
    inset 0 -4px 0 rgba(202,164,71,.22),
    0 8px 18px rgba(149,109,37,.12);
}
.heroBtn--back{
  font-size:28px;
  line-height:1;
}
.heroBtn--link{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:1px;
}
.heroBtnMain{font-size:15px;line-height:1.1}
.heroBtnSub{font-size:10px;line-height:1.1;opacity:.82}
.heroTitle{
  text-align:center;
  padding:1px 6px 0;
}
.heroTitle h1{
  margin:0;
  font-size:21px;
  line-height:1.08;
  font-weight:900;
  letter-spacing:.02em;
  color:#8d4f6c;
}
.heroTitle p{
  margin:4px 0 0;
  font-size:11px;
  line-height:1.2;
  font-weight:800;
  color:var(--ink2);
}

/* =========================
   top image
========================= */
.topVisual{
  margin-bottom:12px;
}
.topVisualFrame{
  position:relative;
  overflow:hidden;
  border-radius:0;
  border:5px solid #24151f;
  background:#140d14;
  box-shadow:var(--shadow3);
}
.topVisualFrame::after{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(180deg, rgba(255,255,255,.06), transparent 22%, transparent 78%, rgba(255,255,255,.04));
}
.topVisualImage{
  display:block;
  width:100%;
  aspect-ratio:16/10;
  object-fit:cover;
}

/* =========================
   main gacha panel
========================= */
.gachaHero{
  position:relative;
  overflow:hidden;
  padding:14px;
  border-radius:24px;
  margin-bottom:14px;
  background:
    radial-gradient(circle at 8% 0%, rgba(255,220,120,.16), transparent 22%),
    radial-gradient(circle at 100% 0%, rgba(255,120,175,.12), transparent 26%),
    radial-gradient(circle at 100% 100%, rgba(160,140,255,.12), transparent 28%),
    linear-gradient(180deg, rgba(255,255,255,.95), rgba(255,246,251,.90));
  border:1px solid var(--line);
  box-shadow:var(--shadow);
}
.gachaHero::before{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(135deg, rgba(255,255,255,.18), transparent 26%, transparent 72%, rgba(255,255,255,.10)),
    radial-gradient(circle at 50% -20%, rgba(255,255,255,.26), transparent 42%);
}
.gachaBtnTop{
  position:relative;
  z-index:1;
  margin-bottom:12px;
}
.gachaBtn{
  position:relative;
  overflow:hidden;
  width:100%;
  min-height:78px;
  border:none;
  cursor:pointer;
  border-radius:22px;
  color:#7a3c10;
  font-size:18px;
  line-height:1.15;
  font-weight:900;
  letter-spacing:.01em;
  background:
    radial-gradient(circle at 50% 18%, rgba(255,255,255,.72), transparent 42%),
    linear-gradient(180deg, #fff7c9 0%, #ffd86d 52%, #ffb321 100%);
  box-shadow:
    inset 0 0 0 2px rgba(255,245,197,.82),
    inset 0 -5px 0 rgba(177,108,13,.23),
    0 12px 24px rgba(247,164,28,.22);
}
.gachaBtn::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.34), transparent);
  transform:translateX(-110%);
  animation:btnshine 2.2s linear infinite;
}
@keyframes btnshine{
  to{ transform:translateX(110%); }
}
.gachaBtn:active{ transform:translateY(1px); }
.gachaBtn:disabled{
  opacity:.56;
  cursor:not-allowed;
  filter:saturate(.64);
}

.gachaHeroTop{
  display:grid;
  grid-template-columns:minmax(132px, 160px) minmax(0, 1fr);
  gap:12px;
  align-items:stretch;
  position:relative;
  z-index:1;
}
.heatCard{
  position:relative;
  overflow:hidden;
  padding:14px 12px 12px;
  border-radius:20px;
  text-align:center;
  background:
    linear-gradient(180deg, rgba(255,255,255,.95), rgba(255,248,252,.90)),
    linear-gradient(180deg, #fff, #fff7fa);
  border:1px solid var(--line);
  box-shadow:var(--shadow2);
  min-height:142px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}
.heatCard::after{
  content:"";
  position:absolute;
  inset:auto -26px -36px auto;
  width:92px;
  height:92px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(255,184,210,.32), transparent 70%);
  pointer-events:none;
}
.heatValue{
  font-size:clamp(28px, 5.4vw, 42px);
  line-height:.94;
  font-weight:900;
  color:#8c4165;
  letter-spacing:-.05em;
  word-break:normal;
  overflow-wrap:anywhere;
  max-width:100%;
}
.heatLabel{
  margin-top:10px;
  font-size:13px;
  font-weight:900;
  color:var(--ink2);
}
.gachaCenter{
  display:flex;
  flex-direction:column;
  justify-content:center;
  min-width:0;
  padding:4px 2px 0;
}
.gachaMiniLabel{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  align-self:flex-start;
  min-height:26px;
  padding:4px 10px;
  border-radius:9px;
  background:linear-gradient(180deg, #efdce5, #e5d0da);
  color:#956b80;
  font-size:11px;
  font-weight:900;
  margin-bottom:10px;
}
.gaugeWrap{
  position:relative;
  margin-bottom:12px;
}
.gaugeTrack{
  height:24px;
  border-radius:8px;
  overflow:hidden;
  background:
    linear-gradient(180deg, #f4dbe6, #edd2de);
  box-shadow:
    inset 0 2px 3px rgba(255,255,255,.55),
    inset 0 -1px 2px rgba(0,0,0,.04);
}
.gaugeFill{
  position:relative;
  height:100%;
  width:0%;
  background:
    linear-gradient(90deg, #ff8ab0 0%, #ff4b86 52%, #ff2f71 100%);
  box-shadow:0 0 18px rgba(255,84,140,.18);
}
.gaugeFill::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(180deg, rgba(255,255,255,.34), rgba(255,255,255,.08));
}
.gaugeMeta{
  display:flex;
  flex-wrap:wrap;
  gap:8px 14px;
  font-size:clamp(12px, 2.9vw, 15px);
  line-height:1.65;
  font-weight:900;
  color:var(--ink2);
}
.gaugeMeta strong{
  color:#7b4460;
}

/* =========================
   result panel
========================= */
.resultPanel{
  position:relative;
  overflow:hidden;
  margin-bottom:14px;
  padding:16px;
  border-radius:24px;
  background:
    radial-gradient(circle at 100% 0%, rgba(255,220,120,.10), transparent 18%),
    radial-gradient(circle at 0% 100%, rgba(255,120,175,.08), transparent 16%),
    linear-gradient(180deg, rgba(255,255,255,.95), rgba(255,247,251,.90));
  border:1px solid var(--line);
  box-shadow:var(--shadow);
}
.resultPanel::before{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(135deg, rgba(255,255,255,.16), transparent 24%, transparent 78%, rgba(255,255,255,.08));
}
.panelBadge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:30px;
  padding:6px 12px;
  border-radius:10px;
  background:linear-gradient(180deg, #ffc2d4, #ff98b7);
  color:#6a2940;
  font-size:12px;
  font-weight:900;
  box-shadow:0 8px 16px rgba(255,121,168,.14);
}
.panelBadge.violet{
  background:linear-gradient(180deg, #c7bcff, #9c8df1);
  color:#382c72;
}
.resultHead{
  position:relative;
  z-index:1;
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:10px;
  margin-bottom:12px;
}
.resultHeadLeft{
  min-width:0;
}
.resultTitle{
  margin:10px 0 0;
  font-size:22px;
  line-height:1.2;
  font-weight:900;
  color:#8a4b68;
}
.resultActionBtn{
  flex:0 0 auto;
  min-height:40px;
  padding:8px 14px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  color:#4f315d;
  font-size:13px;
  font-weight:900;
  background:
    linear-gradient(180deg, rgba(255,255,255,.98), rgba(245,239,255,.92)),
    linear-gradient(180deg, #d8d0ff, #aa9bf6);
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.74),
    inset 0 -3px 0 rgba(97,80,168,.14),
    0 8px 16px rgba(110,95,177,.12);
}
.resultBody{
  display:grid;
  grid-template-columns:180px 1fr;
  gap:14px;
  align-items:start;
  position:relative;
  z-index:1;
}
.resultVisual{
  position:relative;
  min-height:246px;
  overflow:hidden;
  border-radius:20px;
  border:1px solid var(--line2);
  background:
    radial-gradient(circle at 50% 12%, rgba(255,215,120,.18), transparent 28%),
    linear-gradient(180deg, #f6ebf2 0%, #f1e2eb 100%);
  display:grid;
  place-items:center;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.48);
}
.resultVisual::before{
  content:"";
  position:absolute;
  inset:10px;
  border-radius:15px;
  border:1px solid rgba(255,255,255,.48);
  pointer-events:none;
}
.resultVisual::after{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:linear-gradient(180deg, rgba(255,255,255,.18), transparent 32%, rgba(255,255,255,.08));
}
.resultCardImage{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.resultPlaceholder{
  padding:18px;
  text-align:center;
  font-size:14px;
  line-height:1.9;
  color:#9b7f8e;
  font-weight:800;
}
.resultInfo{
  min-width:0;
}
.resultRarity{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:30px;
  padding:5px 12px;
  border-radius:10px;
  font-size:12px;
  font-weight:900;
  margin-bottom:10px;
  color:#fff;
  box-shadow:0 8px 14px rgba(0,0,0,.08);
}
.resultRarity.sp{
  background:linear-gradient(180deg, #ffcf71, #e49e1a);
}
.resultRarity.n{
  background:linear-gradient(180deg, #b58aa0, #8f667b);
}
.resultName{
  margin:0 0 8px;
  font-size:24px;
  line-height:1.34;
  font-weight:900;
  color:#6f4558;
}
.resultText{
  margin:0;
  font-size:14px;
  line-height:1.88;
  color:var(--ink2);
  font-weight:800;
  white-space:pre-line;
}

/* =========================
   collection
========================= */
.collectionPanel{
  position:relative;
  overflow:hidden;
  padding:16px;
  border-radius:24px;
  background:
    radial-gradient(circle at 0% 0%, rgba(170,145,255,.08), transparent 18%),
    radial-gradient(circle at 100% 100%, rgba(255,190,120,.08), transparent 18%),
    linear-gradient(180deg, rgba(255,255,255,.95), rgba(255,247,251,.90));
  border:1px solid var(--line);
  box-shadow:var(--shadow);
}
.collectionPanel::before{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:linear-gradient(135deg, rgba(255,255,255,.14), transparent 24%, transparent 80%, rgba(255,255,255,.08));
}
.collectionTitle{
  position:relative;
  z-index:1;
  margin:10px 0 12px;
  font-size:22px;
  line-height:1.2;
  font-weight:900;
  color:#8a4b68;
}
.collectionNote{
  position:relative;
  z-index:1;
  margin:-2px 0 12px;
  font-size:12px;
  line-height:1.7;
  font-weight:800;
  color:var(--muted);
}
.collectionGrid{
  position:relative;
  z-index:1;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}
.collectionItem{
  position:relative;
  overflow:hidden;
  min-height:148px;
  border-radius:18px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.95), rgba(248,237,244,.92)),
    linear-gradient(180deg, #fff, #faeef4);
  border:1px solid var(--line2);
  box-shadow:var(--shadow2);
  padding:10px;
}
.collectionItem.locked{
  filter:grayscale(.28) saturate(.64) brightness(.98);
}
.collectionItem::after{
  content:"";
  position:absolute;
  inset:auto -18px -24px auto;
  width:82px;
  height:82px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(255,255,255,.32), transparent 70%);
  pointer-events:none;
}
.collectionTop{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  margin-bottom:8px;
}
.collectionRarity{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:24px;
  padding:4px 8px;
  border-radius:8px;
  font-size:11px;
  font-weight:900;
  color:#fff;
}
.collectionRarity.sp{
  background:linear-gradient(180deg, #ffcf71, #e49e1a);
}
.collectionRarity.n{
  background:linear-gradient(180deg, #b58aa0, #8f667b);
}
.collectionCount{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:24px;
  min-width:32px;
  padding:4px 8px;
  border-radius:8px;
  background:linear-gradient(180deg, #fff0b7, #efd687);
  color:#734816;
  font-size:11px;
  font-weight:900;
}
.collectionThumb{
  height:72px;
  border-radius:13px;
  margin-bottom:8px;
  overflow:hidden;
  border:1px solid var(--line2);
  background:#fff;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.45);
}
.collectionThumb img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.collectionCode{
  font-size:11px;
  color:#9a6c82;
  font-weight:900;
  margin-bottom:4px;
}
.collectionName{
  font-size:12px;
  line-height:1.56;
  color:#6a4256;
  font-weight:800;
}

/* =========================
   overlays
========================= */
.drawOverlay,
.bigResultOverlay{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  padding:18px;
  z-index:100;
}
.drawOverlay.show,
.bigResultOverlay.show{
  display:flex;
}
.drawOverlay{
  background:
    radial-gradient(circle at center, rgba(255,225,120,.10), transparent 20%),
    rgba(20,10,28,.78);
  backdrop-filter:blur(7px);
}
.drawScene{
  position:relative;
  width:min(500px, 100%);
  height:430px;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}
.drawAura{
  position:absolute;
  width:278px;
  height:278px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(255,223,125,.44) 0%, rgba(255,188,50,.22) 28%, rgba(255,128,180,.10) 50%, transparent 72%);
  filter:blur(8px);
  animation:aurarotate 2.4s linear infinite;
}
@keyframes aurarotate{
  from{ transform:rotate(0deg) scale(1); }
  50%{ transform:rotate(180deg) scale(1.06); }
  to{ transform:rotate(360deg) scale(1); }
}
.drawRing{
  position:absolute;
  width:226px;
  height:226px;
  border-radius:50%;
  border:2px solid rgba(255,225,130,.8);
  box-shadow:0 0 24px rgba(255,208,90,.30), inset 0 0 20px rgba(255,208,90,.18);
  animation:ringpulse 1.2s ease-in-out infinite;
}
@keyframes ringpulse{
  0%{ transform:scale(.84); opacity:.58; }
  50%{ transform:scale(1.04); opacity:1; }
  100%{ transform:scale(.84); opacity:.58; }
}
.cardSilhouette{
  position:absolute;
  width:156px;
  height:218px;
  border-radius:18px;
  background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(255,245,210,.84));
  box-shadow:0 0 34px rgba(255,220,115,.44), 0 0 74px rgba(255,190,40,.16);
  animation:cardfloat 1.6s ease-in-out infinite;
  overflow:hidden;
}
.cardSilhouette::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, rgba(255,255,255,.82), rgba(255,255,255,0) 35%, rgba(255,240,180,.24));
}
.cardSilhouette::after{
  content:"";
  position:absolute;
  inset:8px;
  border-radius:14px;
  background:linear-gradient(180deg, #f7c14c, #ffefbb);
}
@keyframes cardfloat{
  0%{ transform:translateY(0) rotate(-4deg) scale(1); }
  50%{ transform:translateY(-16px) rotate(4deg) scale(1.04); }
  100%{ transform:translateY(0) rotate(-4deg) scale(1); }
}
.drawText{
  position:absolute;
  bottom:28px;
  left:0;
  right:0;
  text-align:center;
  font-size:23px;
  line-height:1.4;
  font-weight:900;
  letter-spacing:.02em;
  color:#fff8e8;
  text-shadow:0 0 18px rgba(255,220,110,.28), 0 10px 24px rgba(0,0,0,.28);
}
.drawFlash{
  position:absolute;
  inset:0;
  background:radial-gradient(circle, rgba(255,255,255,.86), rgba(255,225,120,.62), transparent 62%);
  opacity:0;
  pointer-events:none;
}
.drawFlash.show{ animation:flashburst .55s ease; }
@keyframes flashburst{
  0%{ opacity:0; }
  18%{ opacity:1; }
  100%{ opacity:0; }
}
.bigResultOverlay{
  background:radial-gradient(circle at center, rgba(255,230,130,.12), rgba(0,0,0,.74));
  backdrop-filter:blur(7px);
}
.bigResult{
  text-align:center;
  animation:bigpop .22s ease;
}
@keyframes bigpop{
  from{ opacity:0; transform:scale(.92); }
  to{ opacity:1; transform:scale(1); }
}
.bigResultRarity{
  font-size:22px;
  font-weight:900;
  letter-spacing:.16em;
  color:#ffe07f;
  margin-bottom:10px;
  text-shadow:0 0 18px rgba(255,210,80,.28);
}
.bigResultName{
  font-size:40px;
  line-height:1.28;
  font-weight:900;
  color:#fffaf0;
  text-shadow:0 0 20px rgba(255,210,80,.26), 0 14px 30px rgba(0,0,0,.30);
}
.particles{
  position:absolute;
  inset:0;
  overflow:hidden;
  pointer-events:none;
}
.spark{
  position:absolute;
  width:8px;
  height:8px;
  border-radius:50%;
  background:radial-gradient(circle, #fff7dd 0%, #ffd54d 45%, rgba(255,195,0,0) 75%);
  box-shadow:0 0 16px rgba(255,210,90,.48);
  animation:sparkmove var(--dur) ease-out forwards;
}
.spark.star{
  width:10px;
  height:10px;
  clip-path:polygon(50% 0%,61% 38%,100% 50%,61% 62%,50% 100%,39% 62%,0% 50%,39% 38%);
}
.spark.line{
  width:4px;
  height:22px;
  border-radius:999px;
  background:linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,214,80,.72), rgba(255,214,80,0));
}
@keyframes sparkmove{
  from{
    opacity:0;
    transform:translate(var(--sx), var(--sy)) scale(.2) rotate(0deg);
  }
  12%{ opacity:1; }
  to{
    opacity:0;
    transform:translate(var(--tx), var(--ty)) scale(1.2) rotate(220deg);
  }
}
.theme-soft .drawAura{
  background:radial-gradient(circle, rgba(255,236,160,.44) 0%, rgba(255,190,70,.22) 28%, rgba(255,150,190,.10) 48%, transparent 70%);
}
.theme-dark .drawAura{
  background:radial-gradient(circle, rgba(255,110,170,.35) 0%, rgba(125,80,255,.18) 32%, rgba(255,190,70,.10) 52%, transparent 72%);
}
.theme-choice .drawAura{
  background:radial-gradient(circle, rgba(160,200,255,.28) 0%, rgba(255,220,110,.18) 32%, rgba(255,150,190,.10) 54%, transparent 72%);
}
.theme-final .drawAura{
  background:radial-gradient(circle, rgba(255,240,190,.56) 0%, rgba(255,210,70,.30) 24%, rgba(255,150,120,.16) 44%, transparent 68%);
}
.theme-final .drawRing{
  width:250px;
  height:250px;
  border-color:rgba(255,235,140,.92);
  box-shadow:0 0 30px rgba(255,215,90,.45), inset 0 0 28px rgba(255,215,90,.22);
}
.theme-normal .drawAura{
  background:radial-gradient(circle, rgba(255,200,220,.34) 0%, rgba(170,125,180,.18) 34%, rgba(255,200,120,.10) 56%, transparent 74%);
}
.theme-normal .drawRing{
  border-color:rgba(220,185,215,.80);
  box-shadow:0 0 18px rgba(205,165,197,.28), inset 0 0 16px rgba(205,165,197,.16);
}

   responsive
========================= */

  .heroHeader{
    grid-template-columns:54px 1fr 84px;
    gap:7px;
    padding:7px;
    border-radius:22px;
  }
  .heroBtn{
    min-height:50px;
    border-radius:13px;

  .heroTitle h1{ font-size:18px; }

  .gachaBtn{

  .gachaHeroTop{

  .gachaHero{

  .gachaBtnTop{

  }
  .gachaBtn{

  .gachaHeroTop{

    gap:10px;

  .heatCard{
    min-height:126px;
    padding:12px 10px 11px;
    border-radius:18px;
  }
  .heatValue{
    font-size:clamp(24px, 8vw, 34px);
  }
  .heatLabel{

    margin-top:8px;

  .gachaCenter{
    padding-top:2px;

  .gachaMiniLabel{
    min-height:24px;
    padding:4px 9px;

  .gaugeTrack{

  }

    gap:8px;

    padding:10px 8px;
  }

  .resultTitle,
  .collectionTitle{

</style>
</head>
<body>
<div class="page">

  <header class="heroHeader">
    <button class="heroBtn heroBtn--back" id="backBtn" aria-label="戻る">←</button>

    <div class="heroTitle">
      <h1>焼け残りの想い</h1>
      <p>熱量を使って、かすみぴのカードを引く</p>
    </div>

    <a class="heroBtn heroBtn--link" href="./matching-board.html" aria-label="募集板へ戻る">
      <span class="heroBtnMain">募集板</span>
      <span class="heroBtnSub">戻る</span>
    </a>
  </header>

  <section class="topVisual">
    <div class="topVisualFrame">
      <img
        id="topImage"
        class="topVisualImage"
        src="https://ul.h3z.jp/gQiokHCL.png"
        alt="かすみぴガチャのトップ画像">
    </div>
  </section>

  <section class="gachaHero">
    <div class="gachaBtnTop">
      <button class="gachaBtn" id="drawBtn">かすみぴガチャ</button>
    </div>

    <div class="gachaHeroTop">
      <div class="heatCard">
        <div class="heatValue" id="heatNow">0</div>
        <div class="heatLabel">熱量</div>
      </div>

      <div class="gachaCenter">
        <div class="gachaMiniLabel">爆発寸前ゲージ</div>

        <div class="gaugeWrap">
          <div class="gaugeTrack">
            <div class="gaugeFill" id="heatMeter"></div>
          </div>
        </div>

        <div class="gaugeMeta">
          <span id="drawHint">爆発寸前　ガチャが引けるじゃなイカ</span>
          <span>1回：<strong>500熱量</strong></span>
        </div>
      </div>
    </div>
  </section>

  <section class="resultPanel">
    <div class="resultHead">
      <div class="resultHeadLeft">
        <div class="panelBadge">RESULT</div>
        <h2 class="resultTitle">排出カード</h2>
      </div>
      <button class="resultActionBtn" id="toCollectionBtn" type="button">図鑑へ</button>
    </div>

    <div class="resultBody">
      <div class="resultVisual">
        <img id="resultImage" class="resultCardImage hidden" src="" alt="排出カード">
        <div id="resultPlaceholder" class="resultPlaceholder">
          まだ引いていません。<br>
          光る一枚が現れるのを待っています。
        </div>
      </div>

      <div class="resultInfo">
        <div class="resultRarity n" id="resultRarity">---</div>
        <h3 class="resultName" id="resultName">---</h3>
        <p class="resultText" id="resultText">ここに排出結果が表示されます。</p>
      </div>
    </div>
  </section>

  <section class="collectionPanel" id="collectionPanel">
    <div class="panelBadge violet">COLLECTION</div>
    <h2 class="collectionTitle">かすみぴカード一覧</h2>
    <p class="collectionNote">ノーマルもSPも、この図鑑では同じ保管枠に保存されます。</p>
    <div class="collectionGrid" id="collectionGrid"></div>
  </section>

</div>

<div class="drawOverlay" id="drawOverlay" aria-hidden="true">
  <div class="drawScene theme-soft" id="drawScene">
    <div class="particles" id="particleField"></div>
    <div class="drawAura"></div>
    <div class="drawRing"></div>
    <div class="cardSilhouette" id="cardSilhouette"></div>
    <div class="drawFlash" id="drawFlash"></div>
    <div class="drawText" id="drawText">Synchronizing…</div>
  </div>
</div>

<div class="bigResultOverlay" id="bigResultOverlay" aria-hidden="true">
  <div class="bigResult">
    <div class="bigResultRarity" id="bigResultRarity">SP</div>
    <div class="bigResultName" id="bigResultName">かすみぴSP</div>
  </div>
</div>

<script>
(() => {
  "use strict";

  const KEY_HEAT  = "matching_heat_v1";
  const KEY_GACHA = "kasumipi_gacha_v7";
  const KEY_BOOK  = "kasumipi_gacha_book_v7";

  const COST = 500;

  const IMG_TOP = "https://ul.h3z.jp/gQiokHCL.png";

  // 図鑑カテゴリはSP枠に入れるが、表示レアリティは R / SR / UR / LR
  const CARD_POOL = [
    {
      id: "KSP-01",
      bookCategory: "SP",
      rarity: "R",
      name: "かすみぴ《浮上》",
      theme: "soft",
      text: "静かな金の光の中で、ゆっくり浮かび上がってきた一枚。",
      img: "https://takoyaki-card.com/town/assets/images/sp/koi01.png",
      weight: 70
    },
    {
      id: "KSP-02",
      bookCategory: "SP",
      rarity: "SR",
      name: "かすみぴ《抱えた記憶》",
      theme: "dark",
      text: "赤紫の脈動をまとい、手放せない記憶のように現れた。",
      img: "https://takoyaki-card.com/town/assets/images/sp/koi02.png",
      weight: 18
    },
    {
      id: "KSP-03",
      bookCategory: "SP",
      rarity: "UR",
      name: "かすみぴ《選別》",
      theme: "choice",
      text: "数ある候補の中から、最後に選ばれた特別な一枚。",
      img: "https://takoyaki-card.com/town/assets/images/sp/koi03ur.png",
      weight: 7
    },
    {
      id: "KSP-04",
      bookCategory: "SP",
      rarity: "LR",
      name: "かすみぴ《深層》",
      theme: "final",
      text: "金の奔流の中心で、ついに深層そのものが姿を現した。",
      img: "https://takoyaki-card.com/town/assets/images/sp/koi04lr.png",
      weight: 5
    }
  ];

  const $ = (sel, root = document) => root.querySelector(sel);
  const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

  function safeParse(raw, fallback) {
    try {
      const v = JSON.parse(raw);
      return v ?? fallback;
    } catch {
      return fallback;
    }
  }

  function getHeat() {
    return Number(localStorage.getItem(KEY_HEAT) || 0);
  }

  function setHeat(v) {
    localStorage.setItem(KEY_HEAT, String(Math.max(0, Number(v || 0))));
  }

  function getGacha() {
    return safeParse(localStorage.getItem(KEY_GACHA), {
      total: 0,
      lastId: null
    });
  }

  function saveGacha(v) {
    localStorage.setItem(KEY_GACHA, JSON.stringify(v));
  }

  function getBook() {
    return safeParse(localStorage.getItem(KEY_BOOK), {
      owned: {}
    });
  }

  function saveBook(v) {
    localStorage.setItem(KEY_BOOK, JSON.stringify(v));
  }

  function addOwned(card) {
    const book = getBook();

    if (!book.owned[card.id]) {
      book.owned[card.id] = {
        count: 0,
        name: card.name,
        rarity: card.rarity,
        bookCategory: card.bookCategory || "SP",
        img: card.img
      };
    }

    book.owned[card.id].count += 1;
    book.owned[card.id].name = card.name;
    book.owned[card.id].rarity = card.rarity;
    book.owned[card.id].bookCategory = card.bookCategory || "SP";
    book.owned[card.id].img = card.img;

    saveBook(book);
  }

  function rarityClass(rarity) {
    const r = String(rarity || "").toLowerCase();
    if (r === "lr") return "lr";
    if (r === "ur") return "ur";
    if (r === "sr") return "sr";
    return "r";
  }

  function renderCollection() {
    const book = getBook();
    const root = $("#collectionGrid");
    if (!root) return;

    root.innerHTML = "";

    CARD_POOL.forEach(card => {
      const owned = book.owned[card.id];
      const item = document.createElement("article");
      item.className = "collectionItem" + (owned ? "" : " locked");

      item.innerHTML = `
        <div class="collectionTop">
          <div class="collectionRarity ${rarityClass(card.rarity)}">${card.rarity}</div>
          <div class="collectionCount">${owned ? "×" + owned.count : "未"}</div>
        </div>
        <div class="collectionThumb">
          <img src="${owned ? card.img : IMG_TOP}" alt="${owned ? card.name : "未所持カード"}">
        </div>
        <div class="collectionCode">${card.id}</div>
        <div class="collectionName">${owned ? card.name : "未所持"}</div>
      `;
      root.appendChild(item);
    });
  }

  function renderHeat() {
    const heat = getHeat();

    if ($("#heatNow")) $("#heatNow").textContent = heat.toLocaleString();

    const btn = $("#drawBtn");
    const hint = $("#drawHint");
    const meter = $("#heatMeter");

    const meterPercent = Math.max(0, Math.min(100, Math.round((heat / COST) * 100)));
    if (meter) meter.style.width = meterPercent + "%";

    if (!btn || !hint) return;

    if (heat >= COST) {
      btn.disabled = false;
      hint.textContent = "爆発寸前　ガチャが引けるじゃなイカ";
    } else {
      btn.disabled = true;
      hint.textContent = `あと ${Math.max(0, COST - heat).toLocaleString()} 熱量で引けるじゃなイカ`;
    }
  }

  function renderIdleResult() {
    if ($("#resultRarity")) {
      $("#resultRarity").textContent = "---";
      $("#resultRarity").className = "resultRarity r";
    }
    if ($("#resultName")) $("#resultName").textContent = "---";
    if ($("#resultText")) $("#resultText").textContent = "ここに排出結果が表示されます。";
  }

  function renderResult(card) {
    const img = $("#resultImage");
    const ph = $("#resultPlaceholder");

    if (img) {
      img.src = card.img;
      img.classList.remove("hidden");
    }
    if (ph) ph.classList.add("hidden");

    if ($("#resultRarity")) {
      $("#resultRarity").textContent = card.rarity;
      $("#resultRarity").className = `resultRarity ${rarityClass(card.rarity)}`;
    }
    if ($("#resultName")) $("#resultName").textContent = card.name;
    if ($("#resultText")) $("#resultText").textContent = card.text;
  }

  function clearParticles() {
    const field = $("#particleField");
    if (field) field.innerHTML = "";
  }

  function spawnParticles(count, theme = "gold") {
    const root = $("#particleField");
    if (!root) return;

    clearParticles();

    for (let i = 0; i < count; i++) {
      const el = document.createElement("span");
      const kindRoll = Math.random();
      el.className = "spark";
      if (kindRoll < 0.22) el.classList.add("star");
      else if (kindRoll < 0.36) el.classList.add("line");

      const sx = (Math.random() * 80 - 40).toFixed(1) + "px";
      const sy = (Math.random() * 80 - 40).toFixed(1) + "px";
      const tx = (Math.random() * 520 - 260).toFixed(1) + "px";
      const ty = (Math.random() * 360 - 180).toFixed(1) + "px";
      const dur = (0.9 + Math.random() * 1.2).toFixed(2) + "s";

      el.style.setProperty("--sx", sx);
      el.style.setProperty("--sy", sy);
      el.style.setProperty("--tx", tx);
      el.style.setProperty("--ty", ty);
      el.style.setProperty("--dur", dur);

      if (theme === "dark") {
        el.style.background = kindRoll < 0.36
          ? "linear-gradient(180deg, rgba(255,190,220,.95), rgba(180,120,255,.72), rgba(180,120,255,0))"
          : "radial-gradient(circle, #fff3fb 0%, #ff83ba 40%, rgba(135,96,255,0) 76%)";
        el.style.boxShadow = "0 0 16px rgba(255,110,170,.42)";
      } else if (theme === "choice") {
        el.style.background = kindRoll < 0.36
          ? "linear-gradient(180deg, rgba(255,255,255,.95), rgba(140,190,255,.72), rgba(140,190,255,0))"
          : "radial-gradient(circle, #ffffff 0%, #ffd85d 38%, rgba(110,180,255,0) 76%)";
        el.style.boxShadow = "0 0 16px rgba(150,200,255,.36)";
      } else if (theme === "final") {
        el.style.background = kindRoll < 0.36
          ? "linear-gradient(180deg, rgba(255,255,255,.98), rgba(255,214,82,.82), rgba(255,214,82,0))"
          : "radial-gradient(circle, #fffef3 0%, #ffd84b 40%, rgba(255,190,0,0) 76%)";
        el.style.boxShadow = "0 0 22px rgba(255,220,90,.55)";
      } else if (theme === "normal") {
        el.style.background = kindRoll < 0.36
          ? "linear-gradient(180deg, rgba(255,255,255,.95), rgba(215,175,210,.72), rgba(215,175,210,0))"
          : "radial-gradient(circle, #fffafd 0%, #d6acc3 42%, rgba(214,172,195,0) 76%)";
        el.style.boxShadow = "0 0 14px rgba(177,129,161,.30)";
      }

      root.appendChild(el);
    }
  }

  function setTheme(theme) {
    const scene = $("#drawScene");
    if (!scene) return;
    scene.className = "drawScene";
    scene.classList.add(`theme-${theme}`);
  }

  async function playNormalScene() {
    setTheme("normal");
    if ($("#drawText")) $("#drawText").textContent = "Tracing…";
    spawnParticles(26, "normal");
    await sleep(480);

    if ($("#drawText")) $("#drawText").textContent = "A faint signal…";
    spawnParticles(42, "normal");
    await sleep(620);

    if ($("#drawFlash")) $("#drawFlash").classList.add("show");
    spawnParticles(56, "normal");
    await sleep(360);
    if ($("#drawFlash")) $("#drawFlash").classList.remove("show");
  }

  async function playSoftScene() {
    setTheme("soft");
    if ($("#drawText")) $("#drawText").textContent = "Connecting…";
    spawnParticles(36, "gold");
    await sleep(600);

    if ($("#drawText")) $("#drawText").textContent = "Signal Rising…";
    spawnParticles(48, "gold");
    await sleep(750);

    if ($("#drawFlash")) $("#drawFlash").classList.add("show");
    spawnParticles(72, "gold");
    await sleep(420);
    if ($("#drawFlash")) $("#drawFlash").classList.remove("show");
  }

  async function playDarkScene() {
    setTheme("dark");
    if ($("#drawText")) $("#drawText").textContent = "Resonance Detected…";
    spawnParticles(36, "dark");
    await sleep(650);

    if ($("#cardSilhouette")) $("#cardSilhouette").style.filter = "hue-rotate(-20deg) saturate(1.18)";
    if ($("#drawText")) $("#drawText").textContent = "Memory Pulse…";
    spawnParticles(64, "dark");
    await sleep(820);

    if ($("#drawFlash")) $("#drawFlash").classList.add("show");
    spawnParticles(86, "dark");
    await sleep(450);
    if ($("#drawFlash")) $("#drawFlash").classList.remove("show");
    if ($("#cardSilhouette")) $("#cardSilhouette").style.filter = "";
  }

  async function playChoiceScene() {
    setTheme("choice");
    if ($("#drawText")) $("#drawText").textContent = "Selecting one memory…";
    spawnParticles(40, "choice");
    await sleep(520);

    const sil = $("#cardSilhouette");
    if (sil) {
      for (let i = 0; i < 3; i++) {
        sil.style.transform = i % 2 === 0
          ? "translateX(-68px) translateY(-10px) rotate(-8deg) scale(.96)"
          : "translateX(68px) translateY(-10px) rotate(8deg) scale(.96)";
        await sleep(180);
      }
      sil.style.transform = "";
    }

    if ($("#drawText")) $("#drawText").textContent = "Chosen.";
    spawnParticles(96, "choice");
    if ($("#drawFlash")) $("#drawFlash").classList.add("show");
    await sleep(460);
    if ($("#drawFlash")) $("#drawFlash").classList.remove("show");
  }

  async function playFinalScene() {
    setTheme("final");
    if ($("#drawText")) $("#drawText").textContent = "Deep Core Opened…";
    spawnParticles(80, "final");
    await sleep(500);

    if ($("#drawText")) $("#drawText").textContent = "Special Signal Confirmed";
    spawnParticles(120, "final");
    await sleep(620);

    if ($("#drawFlash")) $("#drawFlash").classList.add("show");
    spawnParticles(170, "final");
    await sleep(520);
    if ($("#drawFlash")) $("#drawFlash").classList.remove("show");

    if ($("#drawText")) $("#drawText").textContent = "Manifest.";
    spawnParticles(140, "final");
    await sleep(280);
  }

  async function playDrawAnimation(card) {
    const overlay = $("#drawOverlay");
    const big = $("#bigResultOverlay");

    if (overlay) overlay.classList.add("show");
    clearParticles();

    if ($("#cardSilhouette")) {
      $("#cardSilhouette").style.transform = "";
      $("#cardSilhouette").style.filter = "";
    }

    if (card.theme === "soft") await playSoftScene();
    else if (card.theme === "dark") await playDarkScene();
    else if (card.theme === "choice") await playChoiceScene();
    else if (card.theme === "final") await playFinalScene();
    else await playNormalScene();

    if (overlay) overlay.classList.remove("show");
    clearParticles();

    if ($("#bigResultRarity")) $("#bigResultRarity").textContent = card.rarity;
    if ($("#bigResultName")) $("#bigResultName").textContent = card.name;

    if (big) big.classList.add("show");
    await sleep(card.theme === "final" ? 1700 : 1300);
    if (big) big.classList.remove("show");
  }

  // 確率:
  // R  70%
  // SR 18%
  // UR  7%
  // LR  5%
  // 高レア（UR/LR）はそれぞれ5～10%帯に調整
  function pickRandomCard() {
    const totalWeight = CARD_POOL.reduce((sum, card) => sum + Number(card.weight || 0), 0);
    let roll = Math.random() * totalWeight;

    for (const card of CARD_POOL) {
      roll -= Number(card.weight || 0);
      if (roll < 0) return card;
    }
    return CARD_POOL[CARD_POOL.length - 1];
  }

  async function drawOnce() {
    const heat = getHeat();
    if (heat < COST) {
      renderHeat();
      return;
    }

    setHeat(heat - COST);

    const g = getGacha();
    g.total += 1;

    const card = pickRandomCard();

    g.lastId = card.id;
    saveGacha(g);
    addOwned(card);

    renderHeat();
    await playDrawAnimation(card);
    renderResult(card);
    renderCollection();
  }

  function bindUI() {
    const backBtn = $("#backBtn");
    if (backBtn) {
      backBtn.addEventListener("click", () => {
        if (history.length > 1) history.back();
        else location.href = "./";
      });
    }

    const drawBtn = $("#drawBtn");
    if (drawBtn) {
      drawBtn.addEventListener("click", drawOnce);
    }

    const toCollectionBtn = $("#toCollectionBtn");
    if (toCollectionBtn) {
      toCollectionBtn.addEventListener("click", () => {
        const panel = $("#collectionPanel");
        if (panel) panel.scrollIntoView({ behavior: "smooth", block: "start" });
      });
    }
  }

  function init() {
    renderHeat();
    renderIdleResult();
    renderCollection();
    bindUI();
  }

  init();
})();
</script>
</body>
</html>
