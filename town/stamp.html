<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>焼き印スタンプ所</title>

  <!-- フォント -->
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/stamp.css">

  <!-- ✅ CDN変更済み（これが重要） -->
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/minified/html5-qrcode.min.js"></script>
</head>

<body>
<div class="wrap">

  <!-- ================= HUD ================= -->
  <section class="hud-shell">
    <div class="hud-row top">
      <a class="navbtn" href="town.html">← 戻る</a>

      <div class="chip">
        <div class="chip-ico">🐙</div>
        <div>
          <div class="chip-label">所持オクト</div>
          <div class="chip-value" id="octoNow">0</div>
        </div>
      </div>

      <div class="chip">
        <div class="chip-ico">🔥</div>
        <div>
          <div class="chip-label">スタンプ</div>
          <div class="chip-value"><span id="stampNow">0</span>/10</div>
        </div>
      </div>
    </div>

    <div class="hud-row bottom">
      <button class="iconbtn wide" id="checkinBtn">
        📷 チェックイン
      </button>
    </div>
  </section>

  <!-- ================= メイン ================= -->
  <section class="scene">

    <div style="padding:20px;text-align:center;">
      <h2>焼き印スタンプ所</h2>
      <p>QRを読み込むとスタンプGET！</p>
    </div>

    <!-- スタンプ -->
    <div id="stampGrid" style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;padding:20px;"></div>

  </section>
</div>

<!-- ================= QRモーダル ================= -->
<div class="modal" id="scannerModal">
  <div class="modal-card">
    <div class="modal-top">
      <h2>QRを読み取る</h2>
    </div>

    <div class="modal-body">
      <div id="reader" style="width:100%;"></div>
      <br>
      <button onclick="closeScanner()">閉じる</button>
    </div>
  </div>
</div>

<script>
"use strict";

/* ================= 設定 ================= */
const VALID_QR_VALUE = "TAKOYAKI_CHECKIN_NANA";

/* ================= 状態 ================= */
let html5QrCode;

/* ================= スタンプ ================= */
function getStamp(){
  return Number(localStorage.getItem("stamp") || 0);
}

function setStamp(v){
  localStorage.setItem("stamp", v);
}

function render(){
  const s = getStamp();
  document.getElementById("stampNow").textContent = s;

  const grid = document.getElementById("stampGrid");
  grid.innerHTML = "";

  for(let i=1;i<=10;i++){
    const d = document.createElement("div");
    d.style.height = "50px";
    d.style.border = "2px solid #999";
    d.style.display = "flex";
    d.style.alignItems = "center";
    d.style.justifyContent = "center";
    d.style.background = i<=s ? "#ffcc66" : "#fff";
    d.textContent = i<=s ? "🐙" : i;
    grid.appendChild(d);
  }
}

/* ================= QR起動 ================= */
document.getElementById("checkinBtn").onclick = () => {
  document.getElementById("scannerModal").classList.add("show");

  html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (decodedText) => {
      if(decodedText === VALID_QR_VALUE){
        successCheckin();
      }else{
        alert("違うQRです");
      }
    }
  );
};

/* ================= 閉じる ================= */
function closeScanner(){
  if(html5QrCode){
    html5QrCode.stop().then(()=> html5QrCode.clear());
  }
  document.getElementById("scannerModal").classList.remove("show");
}

/* ================= 成功処理 ================= */
function successCheckin(){
  closeScanner();

  let s = getStamp();
  s++;

  if(s>=10){
    s = 0;
    alert("タワー完成🔥");
  }else{
    alert("スタンプGET！");
  }

  setStamp(s);
  render();
}

/* ================= 初期 ================= */
render();

</script>
</body>
</html>
