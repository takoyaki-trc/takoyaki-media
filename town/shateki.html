<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>たこ焼き射的｜完全版</title>
  <style>
    :root{
      --bg1:#2d1208;
      --bg2:#5a220f;
      --bg3:#8b3415;
      --gold1:#ffe3a1;
      --gold2:#f8c565;
      --gold3:#b87420;
      --cream:#fff5df;
      --ink:#3a1c10;
      --white:#fffaf2;
      --shadow:0 12px 28px rgba(0,0,0,.28);
      --danger:#d84b3e;
      --ok:#49b96d;
      --warn:#f0b84f;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      min-height:100%;
      background:
        radial-gradient(circle at top, #7a3116 0%, #4a1d0d 42%, #220e07 100%);
      color:var(--white);
      font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
    }

    body{
      -webkit-tap-highlight-color: transparent;
    }

    .wrap{
      width:min(100%, 960px);
      margin:0 auto;
      padding:14px 12px 28px;
    }

    .title{
      text-align:center;
      margin:4px 0 14px;
    }
    .title h1{
      margin:0;
      font-size:clamp(28px,5vw,44px);
      line-height:1.1;
      letter-spacing:.04em;
    }
    .title p{
      margin:8px 0 0;
      font-size:14px;
      opacity:.95;
      line-height:1.6;
    }

    .hud{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
      margin:0 0 14px;
    }

    .card{
      background:rgba(255,245,223,.98);
      color:var(--ink);
      border:3px solid #efc97f;
      border-radius:18px;
      padding:10px 12px;
      min-height:78px;
      box-shadow:var(--shadow);
    }
    .card .label{
      font-size:12px;
      font-weight:800;
      opacity:.8;
      margin-bottom:6px;
    }
    .card .value{
      font-size:22px;
      font-weight:900;
      line-height:1.1;
    }

    .game-shell{
      position:relative;
      border:5px solid #f0c97d;
      border-radius:28px;
      overflow:hidden;
      background:
        linear-gradient(to bottom, rgba(255,217,133,.12), rgba(255,179,71,.05)),
        linear-gradient(to bottom, #7d2f13, #4f1e0d 58%, #271008);
      box-shadow:var(--shadow);
    }

    canvas{
      display:block;
      width:100%;
      height:auto;
      touch-action:none;
      user-select:none;
      background:transparent;
    }

    .controls{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    button{
      appearance:none;
      border:none;
      border-radius:14px;
      padding:14px 16px;
      font-size:15px;
      font-weight:900;
      cursor:pointer;
      box-shadow:var(--shadow);
    }

    .btn-main{
      flex:1 1 220px;
      background:linear-gradient(to bottom,#ffd98c,#ffb347);
      color:#4c210e;
    }

    .btn-sub{
      flex:1 1 180px;
      background:#fff4df;
      color:#4c210e;
    }

    .note{
      margin-top:14px;
      border-radius:18px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      padding:12px 14px;
      font-size:13px;
      line-height:1.8;
    }

    .result{
      margin-top:14px;
      background:#fff4df;
      color:#34170d;
      border:3px solid #efc97f;
      border-radius:18px;
      padding:14px;
      box-shadow:var(--shadow);
    }
    .result[hidden]{ display:none; }
    .result h2{
      margin:0 0 8px;
      font-size:20px;
    }
    .result-list{
      display:grid;
      gap:8px;
      margin-top:10px;
    }
    .result-item{
      background:#fffaf0;
      border:2px solid #ecd8ad;
      border-radius:12px;
      padding:10px 12px;
      font-weight:800;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:18px;
      transform:translateX(-50%);
      background:rgba(29,12,7,.95);
      color:#fff5df;
      border:2px solid #ffcf7f;
      border-radius:999px;
      padding:11px 16px;
      font-size:14px;
      font-weight:900;
      opacity:0;
      pointer-events:none;
      transition:.25s;
      z-index:9999;
      white-space:nowrap;
      max-width:calc(100vw - 24px);
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .toast.show{ opacity:1; }

    @media (max-width:700px){
      .hud{
        grid-template-columns:repeat(2,1fr);
      }
      .card .value{
        font-size:20px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">
      <h1>たこ焼き射的</h1>
      <p>
        赤い照準はまだ早い。緑になった瞬間がチャンス。<br>
        たこ焼きのサイズで飛ぶ速さが変わる完全版です。
      </p>
    </div>

    <div class="hud">
      <div class="card">
        <div class="label">のこり弾</div>
        <div class="value" id="bulletsView">8</div>
      </div>
      <div class="card">
        <div class="label">スコア</div>
        <div class="value" id="scoreView">0</div>
      </div>
      <div class="card">
        <div class="label">今回の獲得</div>
        <div class="value" id="gainView">0</div>
      </div>
      <div class="card">
        <div class="label">ベスト</div>
        <div class="value" id="bestView">0</div>
      </div>
    </div>

    <div class="game-shell">
      <canvas id="game" width="900" height="1420" aria-label="たこ焼き射的ゲーム"></canvas>
    </div>

    <div class="controls">
      <button class="btn-main" id="startBtn">もう一回あそぶ</button>
      <button class="btn-sub" id="resetBestBtn">ベスト記録リセット</button>
    </div>

    <div class="note">
      画面下のボタンで <strong>たこ焼きサイズ</strong> を選び、<strong>SHOOT!</strong> を押して発射します。<br>
      各段のターゲットマークが <strong>赤＝ずれ</strong>、<strong>黄＝惜しい</strong>、<strong>緑＝ドンピシャ</strong>。<br>
      大きいたこ焼きは当たりやすいかわりに遅い。極小は速いかわりに難しい、という設定です。<br>
      緑の瞬間に撃って、ミズ・ヒリョウ・タネをGETしよう。
    </div>

    <div class="result" id="resultBox" hidden>
      <h2>今回の結果</h2>
      <div id="resultSummary">まだ結果はありません。</div>
      <div class="result-list" id="resultList"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
  (() => {
    "use strict";

    const STORAGE = {
      bestScore: "trc_shateki_best_score_v4",
      rewards:   "trc_shateki_rewards_v4"
    };

    const DEFAULT_REWARD_STATE = {
      seed: 0,
      water: 0,
      fertilizer: 0
    };

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const bulletsView   = document.getElementById("bulletsView");
    const scoreView     = document.getElementById("scoreView");
    const gainView      = document.getElementById("gainView");
    const bestView      = document.getElementById("bestView");
    const startBtn      = document.getElementById("startBtn");
    const resetBestBtn  = document.getElementById("resetBestBtn");
    const resultBox     = document.getElementById("resultBox");
    const resultSummary = document.getElementById("resultSummary");
    const resultList    = document.getElementById("resultList");
    const toastEl       = document.getElementById("toast");

    let cssWidth = 900;
    let cssHeight = 1420;
    let dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    let rafId = 0;
    let toastTimer = null;

    const CONFIG = {
      bulletsMax: 8,
      laneRatios: [0.23, 0.37, 0.51],
      laneSpeed: [-105, 145, -195], // 1段目左、2段目右、3段目左
      targetsPerLane: [5, 5, 6],
      counterYRatio: 0.69,
      gunYRatio: 0.83,
      shotCooldownMs: 180,
      hitFlashMs: 180,
      laneBandHeight: 126
    };

    const TARGET_TYPES = {
      water: {
        key: "water",
        label: "ミズ",
        emoji: "💧",
        color: "#79d8ff",
        particle: "#b3efff",
        baseScore: 95,
        rewardByTargetSize: { xs: 3, s: 2, m: 1, l: 1 },
        bad: false
      },
      fertilizer: {
        key: "fertilizer",
        label: "ヒリョウ",
        emoji: "🧪",
        color: "#d9a7ff",
        particle: "#efd6ff",
        baseScore: 105,
        rewardByTargetSize: { xs: 3, s: 2, m: 1, l: 1 },
        bad: false
      },
      seed: {
        key: "seed",
        label: "タネ",
        emoji: "🌱",
        color: "#9fe16d",
        particle: "#d4f7af",
        baseScore: 115,
        rewardByTargetSize: { xs: 3, s: 2, m: 1, l: 1 },
        bad: false
      },
      bad: {
        key: "bad",
        label: "ハズレ",
        emoji: "💀",
        color: "#ffa27a",
        particle: "#ffd5c3",
        baseScore: -90,
        rewardByTargetSize: { xs: 0, s: 0, m: 0, l: 0 },
        bad: true
      }
    };

    const TARGET_SIZE_MAP = {
      xs: 18,
      s: 30,
      m: 42,
      l: 56
    };

    const TARGET_SIZE_LABEL = {
      xs: "極小",
      s: "小",
      m: "中",
      l: "大"
    };

    const PROJECTILE_TYPES = {
      xl: {
        key: "xl",
        label: "大",
        radius: 32,
        flightMs: 760,
        scoreAdj: -6,
        ringBonus: 30,
        uiColor: "#f2c565"
      },
      l: {
        key: "l",
        label: "中",
        radius: 24,
        flightMs: 560,
        scoreAdj: 0,
        ringBonus: 18,
        uiColor: "#f6ce76"
      },
      s: {
        key: "s",
        label: "小",
        radius: 17,
        flightMs: 390,
        scoreAdj: 12,
        ringBonus: 10,
        uiColor: "#ffd78f"
      },
      xs: {
        key: "xs",
        label: "極小",
        radius: 11,
        flightMs: 270,
        scoreAdj: 22,
        ringBonus: 6,
        uiColor: "#ffe4ad"
      }
    };

    const PROJECTILE_ORDER = ["xl", "l", "s", "xs"];

    const state = {
      running: false,
      bullets: CONFIG.bulletsMax,
      score: 0,
      gainedCount: 0,
      bestScore: readNumber(STORAGE.bestScore, 0),
      rewardsThisRun: { ...DEFAULT_REWARD_STATE },

      targets: [],
      flyingShots: [],
      particles: [],
      floatTexts: [],
      hitRings: [],
      guideBursts: [],

      lastTs: 0,
      lastShootAt: 0,
      selectedProjectileKey: "l"
    };

    function laneY(index){
      return cssHeight * CONFIG.laneRatios[index];
    }

    function counterTopY(){
      return cssHeight * CONFIG.counterYRatio;
    }

    function gunX(){
      return cssWidth * 0.5;
    }

    function gunY(){
      return cssHeight * CONFIG.gunYRatio;
    }

    function laneAimX(lane){
      return cssWidth * (lane === 1 ? 0.60 : 0.40);
    }

    function setupCanvas(){
      const rect = canvas.getBoundingClientRect();
      const parentWidth = canvas.parentElement ? canvas.parentElement.clientWidth : 900;
      cssWidth = Math.max(320, Math.floor(rect.width || parentWidth || 900));
      cssHeight = Math.floor(cssWidth * (1420 / 900));
      dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));

      canvas.style.height = cssHeight + "px";
      canvas.width = Math.floor(cssWidth * dpr);
      canvas.height = Math.floor(cssHeight * dpr);

      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(dpr, dpr);
    }

    function initTargets(){
      state.targets = [];

      for (let lane = 0; lane < 3; lane++) {
        const count = CONFIG.targetsPerLane[lane];
        const dir = CONFIG.laneSpeed[lane] > 0 ? 1 : -1;
        const spacing = cssWidth / (count + 0.45);

        for (let i = 0; i < count; i++) {
          const type = pickTargetType();
          const targetSizeKey = pickTargetSizeKey(type.key);
          const r = TARGET_SIZE_MAP[targetSizeKey];

          let x = spacing * (i + 0.72);
          if (dir < 0) x = cssWidth - x;
          x += rand(-18, 18);

          state.targets.push({
            id: `t_${lane}_${i}_${Math.random().toString(36).slice(2,8)}`,
            lane,
            type,
            targetSizeKey,
            r,
            x,
            y: laneY(lane),
            baseY: laneY(lane),
            vx: CONFIG.laneSpeed[lane] * rand(0.92, 1.08),
            bobT: Math.random() * Math.PI * 2,
            hitFlash: 0,
            hitBounce: 0
          });
        }
      }
    }

    function pickTargetType(){
      const roll = Math.random();
      if (roll < 0.28) return TARGET_TYPES.water;
      if (roll < 0.52) return TARGET_TYPES.fertilizer;
      if (roll < 0.76) return TARGET_TYPES.seed;
      return TARGET_TYPES.bad;
    }

    function pickTargetSizeKey(typeKey){
      const roll = Math.random();

      if (typeKey === "bad") {
        if (roll < 0.08) return "xs";
        if (roll < 0.24) return "s";
        if (roll < 0.58) return "m";
        return "l";
      }

      if (roll < 0.14) return "xs";
      if (roll < 0.36) return "s";
      if (roll < 0.72) return "m";
      return "l";
    }

    function startGame(){
      cancelAnimationFrame(rafId);

      state.running = true;
      state.bullets = CONFIG.bulletsMax;
      state.score = 0;
      state.gainedCount = 0;
      state.rewardsThisRun = { ...DEFAULT_REWARD_STATE };
      state.targets = [];
      state.flyingShots = [];
      state.particles = [];
      state.floatTexts = [];
      state.hitRings = [];
      state.guideBursts = [];
      state.lastShootAt = 0;

      setupCanvas();
      initTargets();

      resultBox.hidden = true;
      startBtn.textContent = "プレイ中";
      state.lastTs = performance.now();

      updateHud();
      draw();
      showToast("たこ焼き射的スタート！");
      rafId = requestAnimationFrame(loop);
    }

    function endGame(){
      state.running = false;
      cancelAnimationFrame(rafId);

      if (state.score > state.bestScore) {
        state.bestScore = state.score;
        localStorage.setItem(STORAGE.bestScore, String(state.bestScore));
      }

      saveRewards(state.rewardsThisRun);
      updateHud();
      renderResult();
      startBtn.textContent = "もう一回あそぶ";
      showToast("ゲーム終了！報酬を保存しました");
      draw();
    }

    function loop(ts){
      if (!state.running) return;

      const dt = Math.min(34, ts - state.lastTs || 16);
      state.lastTs = ts;

      update(dt);
      draw();
      rafId = requestAnimationFrame(loop);
    }

    function update(dt){
      for (const t of state.targets) {
        t.x += t.vx * dt / 1000;
        t.bobT += dt * 0.004;
        const bounce = t.hitBounce > 0 ? Math.sin((280 - t.hitBounce) * 0.06) * 10 : 0;
        t.baseY = laneY(t.lane);
        t.y = t.baseY + Math.sin(t.bobT) * 4 - bounce;

        if (t.hitFlash > 0) t.hitFlash -= dt;
        if (t.hitBounce > 0) t.hitBounce -= dt;

        if (t.vx < 0 && t.x + t.r < -50) {
          recycleTarget(t);
        } else if (t.vx > 0 && t.x - t.r > cssWidth + 50) {
          recycleTarget(t);
        }
      }

      state.flyingShots = state.flyingShots.filter(s => {
        s.life -= dt;
        if (s.life <= 0) {
          resolveShot(s);
          return false;
        }
        return true;
      });

      state.particles = state.particles.filter(p => {
        p.x += p.vx * dt * 0.06;
        p.y += p.vy * dt * 0.06;
        p.vy += p.gravity;
        p.life -= dt;
        return p.life > 0;
      });

      state.floatTexts = state.floatTexts.filter(f => {
        f.y -= dt * 0.038;
        f.life -= dt;
        return f.life > 0;
      });

      state.hitRings = state.hitRings.filter(r => {
        r.life -= dt;
        return r.life > 0;
      });

      state.guideBursts = state.guideBursts.filter(g => {
        g.life -= dt;
        return g.life > 0;
      });
    }

    function recycleTarget(t){
      const lane = t.lane;
      const dir = CONFIG.laneSpeed[lane] > 0 ? 1 : -1;
      const type = pickTargetType();
      const targetSizeKey = pickTargetSizeKey(type.key);

      t.type = type;
      t.targetSizeKey = targetSizeKey;
      t.r = TARGET_SIZE_MAP[targetSizeKey];
      t.baseY = laneY(lane);
      t.y = laneY(lane);
      t.bobT = Math.random() * Math.PI * 2;
      t.hitFlash = 0;
      t.hitBounce = 0;
      t.vx = CONFIG.laneSpeed[lane] * rand(0.92, 1.08);

      if (dir < 0) {
        t.x = cssWidth + t.r + rand(20, 100);
      } else {
        t.x = -t.r - rand(20, 100);
      }
    }

    function attemptShoot(){
      if (!state.running) return;
      if (state.bullets <= 0) return;

      const now = performance.now();
      if (now - state.lastShootAt < CONFIG.shotCooldownMs) return;
      state.lastShootAt = now;

      const projectile = PROJECTILE_TYPES[state.selectedProjectileKey];
      if (!projectile) return;

      const laneData = getBestLaneForProjectile(projectile);
      state.bullets--;

      state.flyingShots.push({
        lane: laneData.lane,
        projectileKey: projectile.key,
        projectileRadius: projectile.radius,
        flightMs: projectile.flightMs,
        life: projectile.flightMs,
        maxLife: projectile.flightMs,
        fromX: gunX(),
        fromY: gunY() - 76,
        toX: laneAimX(laneData.lane),
        toY: laneY(laneData.lane)
      });

      burstGuide(laneAimX(laneData.lane), laneY(laneData.lane), laneData.color);

      updateHud();

      if (state.bullets <= 0) {
        // 弾が飛び終わってから終了判定
        setTimeout(() => {
          if (state.running && state.bullets <= 0 && state.flyingShots.length === 0) {
            endGame();
          }
        }, projectile.flightMs + 120);
      }
    }

    function getBestLaneForProjectile(projectile){
      let best = { lane: 0, quality: 999999, color: "red" };

      for (let lane = 0; lane < 3; lane++) {
        const aimX = laneAimX(lane);
        const matching = state.targets
          .filter(t => t.lane === lane)
          .sort((a, b) => Math.abs(a.x - aimX) - Math.abs(b.x - aimX));

        const target = matching[0];
        if (!target) continue;

        const quality = getAimQuality(target, projectile);
        if (quality.distance < best.quality) {
          best = {
            lane,
            quality: quality.distance,
            color: quality.color
          };
        }
      }
      return best;
    }

    function resolveShot(shot){
      const projectile = PROJECTILE_TYPES[shot.projectileKey];
      const aimX = laneAimX(shot.lane);

      const laneTargets = state.targets
        .filter(t => t.lane === shot.lane)
        .sort((a, b) => Math.abs(a.x - aimX) - Math.abs(b.x - aimX));

      const target = laneTargets[0];

      if (!target) {
        registerMiss(shot.toX, shot.toY, "MISS");
        maybeEndAfterLastShot();
        return;
      }

      const distance = Math.abs(target.x - aimX);
      const greenWindow = target.r + projectile.radius + projectile.ringBonus;
      const yellowWindow = greenWindow + 28;

      if (distance <= greenWindow) {
        registerHit(target, shot, distance);
      } else if (distance <= yellowWindow) {
        registerMiss(shot.toX, shot.toY, "おしい!");
        state.score = Math.max(0, state.score - 10);
        updateHud();
      } else {
        registerMiss(shot.toX, shot.toY, "MISS");
        state.score = Math.max(0, state.score - 16);
        updateHud();
      }

      maybeEndAfterLastShot();
    }

    function maybeEndAfterLastShot(){
      if (state.running && state.bullets <= 0 && state.flyingShots.length === 0) {
        setTimeout(() => {
          if (state.running && state.bullets <= 0 && state.flyingShots.length === 0) {
            endGame();
          }
        }, 80);
      }
    }

    function registerHit(target, shot, distance){
      const projectile = PROJECTILE_TYPES[shot.projectileKey];
      const type = target.type;

      target.hitFlash = CONFIG.hitFlashMs;
      target.hitBounce = 280;

      const base = type.baseScore;
      const sizeBonus = target.targetSizeKey === "xs" ? 85
                      : target.targetSizeKey === "s"  ? 45
                      : target.targetSizeKey === "m"  ? 18
                      : 0;

      const closeBonus = Math.max(0, Math.round((target.r + projectile.radius + projectile.ringBonus - distance) * 0.6));
      let scoreAdd = base + sizeBonus + projectile.scoreAdj + closeBonus;

      if (type.bad) {
        scoreAdd = Math.min(-15, Math.round(base - closeBonus * 0.4));
      }

      state.score = Math.max(0, state.score + scoreAdd);

      state.hitRings.push({
        x: laneAimX(target.lane),
        y: laneY(target.lane),
        life: 360,
        maxLife: 360,
        miss: false
      });

      if (!type.bad) {
        const amount = type.rewardByTargetSize[target.targetSizeKey] || 0;
        if (type.key === "water") state.rewardsThisRun.water += amount;
        if (type.key === "fertilizer") state.rewardsThisRun.fertilizer += amount;
        if (type.key === "seed") state.rewardsThisRun.seed += amount;

        state.gainedCount += amount;

        state.floatTexts.push({
          x: laneAimX(target.lane),
          y: laneY(target.lane) - 8,
          text: "GET!",
          color: "#fff7af",
          life: 900,
          maxLife: 900,
          size: 40
        });

        state.floatTexts.push({
          x: laneAimX(target.lane),
          y: laneY(target.lane) + 28,
          text: `+${type.label}×${amount}`,
          color: "#ffffff",
          life: 900,
          maxLife: 900,
          size: 26
        });

        burst(laneAimX(target.lane), laneY(target.lane), type.particle, 16, false);
        showToast(`${type.emoji} ${type.label} ×${amount}`);
      } else {
        state.floatTexts.push({
          x: laneAimX(target.lane),
          y: laneY(target.lane) - 6,
          text: "MISS...",
          color: "#ffd7c9",
          life: 900,
          maxLife: 900,
          size: 36
        });

        burst(laneAimX(target.lane), laneY(target.lane), type.particle, 12, false);
        showToast("ハズレに命中！");
      }

      updateHud();
      recycleTarget(target);
    }

    function registerMiss(x, y, label){
      state.hitRings.push({
        x, y,
        life: 240,
        maxLife: 240,
        miss: true
      });

      state.floatTexts.push({
        x,
        y: y - 4,
        text: label,
        color: label === "おしい!" ? "#ffe6a5" : "#fff0d9",
        life: 760,
        maxLife: 760,
        size: label === "おしい!" ? 30 : 34
      });

      burst(x, y, "#fff0d9", 8, true);
      showToast(label === "おしい!" ? "惜しい！" : "はずれ！");
    }

    function getAimQuality(target, projectile){
      const aimX = laneAimX(target.lane);
      const distance = Math.abs(target.x - aimX);
      const greenWindow = target.r + projectile.radius + projectile.ringBonus;
      const yellowWindow = greenWindow + 28;

      if (distance <= greenWindow) {
        return { color: "green", distance };
      }
      if (distance <= yellowWindow) {
        return { color: "yellow", distance };
      }
      return { color: "red", distance };
    }

    function draw(){
      ctx.clearRect(0, 0, cssWidth, cssHeight);
      drawBackground();
      drawLaneGuides();
      drawTargets();
      drawAimMarkers();
      drawShots();
      drawHitRings();
      drawGuideBursts();
      drawParticles();
      drawFloatTexts();
      drawGun();
      drawProjectileSelector();
      drawShootButton();
      drawBottomHud();
    }

    function drawBackground(){
      const g = ctx.createLinearGradient(0, 0, 0, cssHeight);
      g.addColorStop(0, "#7c2f14");
      g.addColorStop(0.15, "#65240f");
      g.addColorStop(0.15, "#f2c978");
      g.addColorStop(0.28, "#f2c978");
      g.addColorStop(0.28, "#e03b16");
      g.addColorStop(0.40, "#e03b16");
      g.addColorStop(0.40, "#f0d29b");
      g.addColorStop(0.55, "#f0d29b");
      g.addColorStop(0.55, "#7d2f14");
      g.addColorStop(1, "#5b220f");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, cssWidth, cssHeight);

      roundRect(ctx, 26, 34, cssWidth - 52, 84, 18, "#f1c66d");
      ctx.fillStyle = "#5c2410";
      ctx.font = `900 ${Math.max(24, cssWidth * 0.06)}px sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("たこ焼き射的", cssWidth / 2, 76);

      const lanternXs = [0.12, 0.31, 0.5, 0.69, 0.88];
      for (const rate of lanternXs) drawLantern(cssWidth * rate, 22);

      drawShelf(0, laneY(0) - 60, cssWidth, 14);
      drawShelf(0, laneY(1) - 60, cssWidth, 14);
      drawShelf(0, laneY(2) - 60, cssWidth, 14);

      ctx.fillStyle = "#60230e";
      ctx.fillRect(0, counterTopY(), cssWidth, cssHeight - counterTopY());

      ctx.fillStyle = "#4a1608";
      ctx.fillRect(0, counterTopY() + 32, cssWidth, 18);

      ctx.fillStyle = "rgba(0,0,0,.18)";
      ctx.fillRect(0, counterTopY() + 52, cssWidth, cssHeight - (counterTopY() + 52));
    }

    function drawLantern(x, y){
      ctx.fillStyle = "#f9e2ae";
      ctx.fillRect(x - 2, y, 4, 18);

      roundRect(ctx, x - 34, y + 18, 68, 86, 18, "#ffa757");
      ctx.strokeStyle = "#883513";
      ctx.lineWidth = 4;
      ctx.strokeRect(x - 28, y + 26, 56, 70);

      ctx.fillStyle = "#6f230f";
      ctx.font = "900 26px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("祭", x, y + 60);
    }

    function drawShelf(x, y, w, h){
      ctx.fillStyle = "#4c1b0c";
      ctx.fillRect(x, y, w, h);
      ctx.fillStyle = "rgba(255,236,194,.08)";
      ctx.fillRect(x, y, w, 3);
    }

    function drawLaneGuides(){
      for (let lane = 0; lane < 3; lane++) {
        const y = laneY(lane);
        const aimX = laneAimX(lane);

        ctx.save();
        ctx.globalAlpha = 0.14;
        ctx.fillStyle = "#fff4dd";
        ctx.fillRect(0, y - CONFIG.laneBandHeight / 2, cssWidth, CONFIG.laneBandHeight);
        ctx.restore();

        ctx.save();
        ctx.strokeStyle = "rgba(255,247,230,.25)";
        ctx.lineWidth = 3;
        ctx.setLineDash([10, 10]);
        ctx.beginPath();
        ctx.moveTo(aimX, y - 64);
        ctx.lineTo(aimX, y + 64);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();

        ctx.fillStyle = "rgba(255,245,220,.92)";
        ctx.font = "900 16px sans-serif";
        ctx.textAlign = "left";
        ctx.textBaseline = "middle";
        const label = lane === 0 ? "1段目 ←" : lane === 1 ? "2段目 →" : "3段目 ←";
        ctx.fillText(label, 16, y - 80);
      }
    }

    function drawTargets(){
      for (const t of state.targets) {
        const glow = Math.max(0, t.hitFlash / CONFIG.hitFlashMs);
        const pulse = 1 + glow * 0.16;
        const r = t.r * pulse;

        ctx.save();
        ctx.globalAlpha = 0.22;
        ctx.fillStyle = "#000";
        ctx.beginPath();
        ctx.ellipse(t.x, t.baseY + t.r + 18, r * 0.8, r * 0.24, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        if (glow > 0) {
          ctx.save();
          ctx.globalAlpha = glow * 0.45;
          ctx.fillStyle = "#fff3b1";
          ctx.beginPath();
          ctx.arc(t.x, t.y, r + 14, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        ctx.fillStyle = t.type.color;
        ctx.beginPath();
        ctx.arc(t.x, t.y, r, 0, Math.PI * 2);
        ctx.fill();

        ctx.lineWidth = 4;
        ctx.strokeStyle = "#fff6e7";
        ctx.stroke();

        ctx.lineWidth = 3;
        ctx.strokeStyle = "rgba(255,255,255,.45)";
        ctx.beginPath();
        ctx.arc(t.x, t.y, r * 0.65, 0, Math.PI * 2);
        ctx.stroke();

        ctx.fillStyle = "#26130c";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = `900 ${Math.max(16, r * 0.9)}px sans-serif`;
        ctx.fillText(t.type.emoji, t.x, t.y + 3);

        roundRect(ctx, t.x - 26, t.y + r + 10, 52, 22, 10, "rgba(255,250,242,.96)");
        ctx.fillStyle = "#502110";
        ctx.font = "900 12px sans-serif";
        ctx.fillText(TARGET_SIZE_LABEL[t.targetSizeKey], t.x, t.y + r + 22);
      }
    }

    function drawAimMarkers(){
      const projectile = PROJECTILE_TYPES[state.selectedProjectileKey];

      for (let lane = 0; lane < 3; lane++) {
        const aimX = laneAimX(lane);
        const y = laneY(lane);

        const nearest = state.targets
          .filter(t => t.lane === lane)
          .sort((a, b) => Math.abs(a.x - aimX) - Math.abs(b.x - aimX))[0];

        let color = "#d84b3e";
        let fill = "rgba(216,75,62,.18)";
        let text = "×";

        if (nearest) {
          const q = getAimQuality(nearest, projectile);
          if (q.color === "green") {
            color = "#49b96d";
            fill = "rgba(73,185,109,.2)";
            text = "◎";
          } else if (q.color === "yellow") {
            color = "#f0b84f";
            fill = "rgba(240,184,79,.18)";
            text = "△";
          }
        }

        ctx.save();
        ctx.strokeStyle = color;
        ctx.fillStyle = fill;
        ctx.lineWidth = 4;

        ctx.beginPath();
        ctx.arc(aimX, y, 24, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(aimX, y, 12, 0, Math.PI * 2);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(aimX - 38, y);
        ctx.lineTo(aimX - 14, y);
        ctx.moveTo(aimX + 14, y);
        ctx.lineTo(aimX + 38, y);
        ctx.moveTo(aimX, y - 38);
        ctx.lineTo(aimX, y - 14);
        ctx.moveTo(aimX, y + 14);
        ctx.lineTo(aimX, y + 38);
        ctx.stroke();

        ctx.fillStyle = color;
        ctx.font = "900 18px sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(text, aimX, y + 1);
        ctx.restore();
      }
    }

    function drawShots(){
      for (const s of state.flyingShots) {
        const p = 1 - (s.life / s.maxLife);
        const alpha = Math.max(0, s.life / s.maxLife);

        const cx = s.fromX + (s.toX - s.fromX) * p;
        const arcHeight = 38 + (PROJECTILE_TYPES[s.projectileKey].radius * 0.65);
        const cyLinear = s.fromY + (s.toY - s.fromY) * p;
        const cy = cyLinear - Math.sin(Math.PI * p) * arcHeight;

        ctx.save();
        ctx.globalAlpha = alpha * 0.65;
        ctx.strokeStyle = "#ffe7af";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(s.fromX, s.fromY);
        for (let i = 1; i <= 14; i++) {
          const tp = i / 14 * p;
          const tx = s.fromX + (s.toX - s.fromX) * tp;
          const tyl = s.fromY + (s.toY - s.fromY) * tp;
          const ty = tyl - Math.sin(Math.PI * tp) * arcHeight;
          ctx.lineTo(tx, ty);
        }
        ctx.stroke();
        ctx.restore();

        drawTakoyakiBall(cx, cy, PROJECTILE_TYPES[s.projectileKey].radius, alpha);
      }
    }

    function drawTakoyakiBall(x, y, r, alpha){
      ctx.save();
      ctx.globalAlpha = alpha;

      ctx.beginPath();
      ctx.fillStyle = "#be6430";
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();

      ctx.lineWidth = Math.max(2, r * 0.12);
      ctx.strokeStyle = "#ffe3ae";
      ctx.stroke();

      ctx.strokeStyle = "#6b240d";
      ctx.lineWidth = Math.max(2, r * 0.14);
      ctx.beginPath();
      ctx.moveTo(x - r * 0.42, y - r * 0.12);
      ctx.quadraticCurveTo(x, y - r * 0.48, x + r * 0.42, y - r * 0.12);
      ctx.stroke();

      ctx.strokeStyle = "#fff5de";
      ctx.lineWidth = Math.max(2, r * 0.10);
      ctx.beginPath();
      ctx.moveTo(x - r * 0.38, y + r * 0.10);
      ctx.quadraticCurveTo(x, y - r * 0.12, x + r * 0.38, y + r * 0.10);
      ctx.stroke();

      ctx.restore();
    }

    function drawHitRings(){
      for (const r of state.hitRings) {
        const p = 1 - (r.life / r.maxLife);
        const radius = 10 + p * 34;
        const alpha = Math.max(0, r.life / r.maxLife);

        ctx.save();
        ctx.globalAlpha = alpha * 0.75;
        ctx.strokeStyle = r.miss ? "#fff3de" : "#ffe99d";
        ctx.lineWidth = r.miss ? 3 : 5;
        ctx.beginPath();
        ctx.arc(r.x, r.y, radius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }
    }

    function drawGuideBursts(){
      for (const g of state.guideBursts) {
        const alpha = Math.max(0, g.life / g.maxLife);
        const radius = 8 + (1 - alpha) * 26;

        ctx.save();
        ctx.globalAlpha = alpha * 0.7;
        ctx.strokeStyle = g.color;
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(g.x, g.y, radius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }
    }

    function drawParticles(){
      for (const p of state.particles) {
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
        ctx.fillStyle = p.color;

        if (p.square) {
          ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
        } else {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }
    }

    function drawFloatTexts(){
      for (const f of state.floatTexts) {
        ctx.save();
        ctx.globalAlpha = Math.max(0, f.life / f.maxLife);
        ctx.fillStyle = f.color;
        ctx.font = `900 ${f.size}px sans-serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.lineWidth = 5;
        ctx.strokeStyle = "rgba(63,27,12,.45)";
        ctx.strokeText(f.text, f.x, f.y);
        ctx.fillText(f.text, f.x, f.y);
        ctx.restore();
      }
    }

    function drawGun(){
      const cx = gunX();
      const baseY = gunY();

      roundRect(ctx, cx - 126, baseY + 48, 252, 84, 24, "#f0ca7a");
      roundRect(ctx, cx - 28, baseY - 86, 56, 142, 14, "#e2a643");
      roundRect(ctx, cx - 15, baseY - 56, 30, 84, 10, "#fff4dc");

      ctx.beginPath();
      ctx.fillStyle = "#c0632f";
      ctx.arc(cx, baseY - 108, 48, 0, Math.PI * 2);
      ctx.fill();

      ctx.lineWidth = 6;
      ctx.strokeStyle = "#fff0cb";
      ctx.stroke();

      ctx.fillStyle = "#fff9e8";
      ctx.font = "900 18px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("たこ焼き砲", cx, baseY + 90);
    }

    function drawProjectileSelector(){
      const boxY = cssHeight - 295;
      const boxW = Math.min(cssWidth - 28, 560);
      const boxX = (cssWidth - boxW) / 2;

      roundRect(ctx, boxX, boxY, boxW, 92, 22, "rgba(37,16,9,.72)");

      ctx.fillStyle = "#fff4df";
      ctx.font = "900 16px sans-serif";
      ctx.textAlign = "left";
      ctx.textBaseline = "middle";
      ctx.fillText("たこ焼きサイズ", boxX + 16, boxY + 18);

      const segmentW = (boxW - 24) / 4;
      const y = boxY + 34;

      PROJECTILE_ORDER.forEach((key, i) => {
        const p = PROJECTILE_TYPES[key];
        const x = boxX + 12 + segmentW * i;
        const selected = state.selectedProjectileKey === key;

        roundRect(
          ctx,
          x + 4,
          y,
          segmentW - 8,
          46,
          14,
          selected ? "rgba(255,214,140,.98)" : "rgba(255,244,220,.18)"
        );

        ctx.strokeStyle = selected ? "#ffd27a" : "rgba(255,255,255,.15)";
        ctx.lineWidth = 3;
        roundRectStroke(ctx, x + 4, y, segmentW - 8, 46, 14);

        drawTakoyakiBall(x + segmentW/2 - 16, y + 23, Math.max(8, p.radius * 0.42), 1);

        ctx.fillStyle = selected ? "#44200f" : "#fff4df";
        ctx.font = "900 15px sans-serif";
        ctx.textAlign = "left";
        ctx.fillText(p.label, x + segmentW/2 + 2, y + 24);
      });
    }

    function drawShootButton(){
      const btnW = Math.min(cssWidth - 48, 340);
      const btnH = 76;
      const btnX = (cssWidth - btnW) / 2;
      const btnY = cssHeight - 182;

      roundRect(ctx, btnX, btnY, btnW, btnH, 24, "#ffd27e");
      ctx.strokeStyle = "#b87420";
      ctx.lineWidth = 4;
      roundRectStroke(ctx, btnX, btnY, btnW, btnH, 24);

      ctx.fillStyle = "#4a210f";
      ctx.font = "900 30px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("SHOOT!", btnX + btnW / 2, btnY + btnH / 2 - 2);
    }

    function drawBottomHud(){
      roundRect(ctx, 28, cssHeight - 108, 250, 70, 26, "rgba(40,17,10,.55)");
      roundRect(ctx, cssWidth - 278, cssHeight - 108, 250, 70, 26, "rgba(40,17,10,.55)");

      ctx.fillStyle = "#fff7e8";
      ctx.font = "900 30px sans-serif";
      ctx.textAlign = "left";
      ctx.textBaseline = "middle";
      ctx.fillText(`のこり弾: ${state.bullets}`, 46, cssHeight - 73);

      ctx.textAlign = "right";
      ctx.fillText(`スコア: ${state.score}`, cssWidth - 46, cssHeight - 73);
    }

    function burst(x, y, color, count, square){
      for (let i = 0; i < count; i++) {
        state.particles.push({
          x,
          y,
          vx: rand(-2.8, 2.8),
          vy: rand(-3.6, -0.8),
          gravity: rand(0.08, 0.13),
          size: rand(3, 8),
          color,
          square: !!square,
          life: rand(420, 900),
          maxLife: 900
        });
      }
    }

    function burstGuide(x, y, colorKey){
      const color = colorKey === "green" ? "#49b96d" : colorKey === "yellow" ? "#f0b84f" : "#d84b3e";
      state.guideBursts.push({
        x, y,
        color,
        life: 220,
        maxLife: 220
      });
    }

    function renderResult(){
      resultBox.hidden = false;

      const total = state.rewardsThisRun;
      const items = [];
      if (total.seed) items.push(`🌱 タネ × ${total.seed}`);
      if (total.water) items.push(`💧 ミズ × ${total.water}`);
      if (total.fertilizer) items.push(`🧪 ヒリョウ × ${total.fertilizer}`);
      if (!items.length) items.push("今回は資材を獲得できませんでした");

      resultSummary.innerHTML =
        `スコア <strong>${state.score}</strong> / ベスト <strong>${state.bestScore}</strong><br>` +
        `今回の獲得合計：<strong>${state.gainedCount}</strong>`;

      resultList.innerHTML = items.map(v => `<div class="result-item">${v}</div>`).join("");
    }

    function updateHud(){
      bulletsView.textContent = state.bullets;
      scoreView.textContent = state.score;
      gainView.textContent = state.gainedCount;
      bestView.textContent = state.bestScore;
    }

    function saveRewards(addition){
      const current = readRewards();
      current.seed += Number(addition.seed || 0);
      current.water += Number(addition.water || 0);
      current.fertilizer += Number(addition.fertilizer || 0);
      localStorage.setItem(STORAGE.rewards, JSON.stringify(current));
    }

    function readRewards(){
      try {
        const raw = localStorage.getItem(STORAGE.rewards);
        if (!raw) return { ...DEFAULT_REWARD_STATE };
        const obj = JSON.parse(raw);
        return {
          seed: Number(obj.seed || 0),
          water: Number(obj.water || 0),
          fertilizer: Number(obj.fertilizer || 0)
        };
      } catch (_) {
        return { ...DEFAULT_REWARD_STATE };
      }
    }

    function readNumber(key, fallback){
      const n = Number(localStorage.getItem(key));
      return Number.isFinite(n) ? n : fallback;
    }

    function rand(min, max){
      return Math.random() * (max - min) + min;
    }

    function roundRect(ctx, x, y, w, h, r, fill){
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
      ctx.fillStyle = fill;
      ctx.fill();
    }

    function roundRectStroke(ctx, x, y, w, h, r){
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
      ctx.stroke();
    }

    function showToast(msg){
      toastEl.textContent = msg;
      toastEl.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toastEl.classList.remove("show");
      }, 1200);
    }

    function onPointerDown(e){
      e.preventDefault();

      if (!state.running) return;

      const rect = canvas.getBoundingClientRect();
      const x = (e.clientX - rect.left) * (cssWidth / rect.width);
      const y = (e.clientY - rect.top) * (cssHeight / rect.height);

      // サイズ選択領域
      {
        const boxY = cssHeight - 295;
        const boxW = Math.min(cssWidth - 28, 560);
        const boxX = (cssWidth - boxW) / 2;
        const segmentW = (boxW - 24) / 4;
        const selY = boxY + 34;
        const selH = 46;

        if (y >= selY && y <= selY + selH && x >= boxX + 12 && x <= boxX + boxW - 12) {
          const index = Math.floor((x - (boxX + 12)) / segmentW);
          const key = PROJECTILE_ORDER[Math.max(0, Math.min(3, index))];
          if (key) {
            state.selectedProjectileKey = key;
            draw();
            return;
          }
        }
      }

      // SHOOTボタン領域
      {
        const btnW = Math.min(cssWidth - 48, 340);
        const btnH = 76;
        const btnX = (cssWidth - btnW) / 2;
        const btnY = cssHeight - 182;

        if (x >= btnX && x <= btnX + btnW && y >= btnY && y <= btnY + btnH) {
          attemptShoot();
          return;
        }
      }
    }

    startBtn.addEventListener("click", startGame);

    resetBestBtn.addEventListener("click", () => {
      localStorage.removeItem(STORAGE.bestScore);
      state.bestScore = 0;
      updateHud();
      showToast("ベスト記録をリセットしました");
    });

    canvas.addEventListener("pointerdown", onPointerDown, { passive:false });

    window.addEventListener("resize", () => {
      const wasRunning = state.running;
      cancelAnimationFrame(rafId);
      setupCanvas();

      if (wasRunning) {
        for (const t of state.targets) {
          t.baseY = laneY(t.lane);
          t.y = laneY(t.lane);
        }
        draw();
        state.lastTs = performance.now();
        rafId = requestAnimationFrame(loop);
      } else {
        draw();
      }
    });

    setupCanvas();
    initTargets();
    updateHud();
    draw();
    startGame();
  })();
  </script>
</body>
