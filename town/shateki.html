<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>たこ焼き射的｜たこ焼きトレーディングカード</title>
<style>
  :root{
    --bg1:#3d1408;
    --bg2:#5c220e;
    --bg3:#7b2f12;
    --gold1:#ffd68a;
    --gold2:#ffb347;
    --gold3:#b96b1d;
    --cream:#fff2d8;
    --text:#2f170e;
    --white:#fffaf2;
    --shadow:0 12px 24px rgba(0,0,0,.26);
  }

  *{box-sizing:border-box}
  html,body{
    margin:0;
    padding:0;
    min-height:100%;
    background:
      radial-gradient(circle at top, #6f2a12 0%, #47190c 40%, #230c06 100%);
    font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
    color:var(--white);
  }

  .wrap{
    width:min(100%, 920px);
    margin:0 auto;
    padding:14px 12px 28px;
  }

  .title{
    text-align:center;
    margin:8px 0 14px;
  }
  .title h1{
    margin:0;
    font-size:clamp(28px,5vw,46px);
    line-height:1.15;
    letter-spacing:.04em;
  }
  .title p{
    margin:8px 0 0;
    font-size:14px;
    opacity:.95;
  }

  .hud{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin:0 0 14px;
  }

  .card{
    background:rgba(255,242,216,.96);
    color:var(--text);
    border:3px solid #efc37a;
    border-radius:18px;
    min-height:82px;
    padding:10px 12px;
    box-shadow:var(--shadow);
  }

  .label{
    font-size:12px;
    font-weight:800;
    opacity:.82;
    margin-bottom:6px;
  }

  .value{
    font-size:22px;
    font-weight:900;
    line-height:1.1;
  }

  .game-shell{
    position:relative;
    border:5px solid #f1c77d;
    border-radius:28px;
    overflow:hidden;
    background:
      linear-gradient(to bottom, rgba(255,215,143,.12), rgba(255,179,71,.05)),
      linear-gradient(to bottom, #7a2e13, #4d1d0d 60%, #2b1008);
    box-shadow:var(--shadow);
  }

  canvas{
    display:block;
    width:100%;
    height:auto;
    touch-action:none;
  }

  .top-ui{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:14px;
  }

  button{
    appearance:none;
    border:none;
    border-radius:14px;
    padding:14px 16px;
    font-size:15px;
    font-weight:900;
    cursor:pointer;
    box-shadow:var(--shadow);
  }

  .btn-main{
    flex:1 1 220px;
    background:linear-gradient(to bottom,#ffd98c,#ffb347);
    color:#4b210f;
  }

  .btn-sub{
    flex:1 1 180px;
    background:#fff3dd;
    color:#4b210f;
  }

  .note{
    margin-top:14px;
    border-radius:18px;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.12);
    padding:12px 14px;
    font-size:13px;
    line-height:1.75;
  }

  .result{
    margin-top:14px;
    background:#fff3dd;
    color:#33160d;
    border:3px solid #efc37a;
    border-radius:18px;
    padding:14px;
    box-shadow:var(--shadow);
  }
  .result[hidden]{display:none}

  .result h2{
    margin:0 0 8px;
    font-size:20px;
  }
  .result-list{
    display:grid;
    gap:8px;
    margin-top:10px;
  }
  .result-item{
    background:#fffaf1;
    border:2px solid #efd7aa;
    border-radius:12px;
    padding:10px 12px;
    font-weight:800;
  }

  .toast{
    position:fixed;
    left:50%;
    bottom:18px;
    transform:translateX(-50%);
    background:rgba(31,13,7,.95);
    color:#fff4dd;
    border:2px solid #ffcb7a;
    border-radius:999px;
    padding:10px 16px;
    font-size:14px;
    font-weight:900;
    opacity:0;
    pointer-events:none;
    transition:.25s;
    z-index:9999;
    white-space:nowrap;
  }
  .toast.show{opacity:1}

  @media (max-width:680px){
    .hud{
      grid-template-columns:repeat(2,1fr);
    }
    .value{
      font-size:20px;
    }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="title">
      <h1>たこ焼き射的</h1>
      <p>たこ焼き弾で的を狙え！ ミズ・ヒリョウ・タネを獲得しよう！</p>
    </div>

    <div class="hud">
      <div class="card">
        <div class="label">のこり弾</div>
        <div class="value" id="bulletsView">5</div>
      </div>
      <div class="card">
        <div class="label">スコア</div>
        <div class="value" id="scoreView">0</div>
      </div>
      <div class="card">
        <div class="label">今回の獲得</div>
        <div class="value" id="gainView">0</div>
      </div>
      <div class="card">
        <div class="label">ベスト</div>
        <div class="value" id="bestView">0</div>
      </div>
    </div>

    <div class="game-shell">
      <canvas id="game" width="900" height="1280"></canvas>
    </div>

    <div class="top-ui">
      <button class="btn-main" id="startBtn">もう一回あそぶ</button>
      <button class="btn-sub" id="resetBestBtn">ベスト記録リセット</button>
    </div>

    <div class="note">
      タップした位置に向かって、たこ焼き弾を発射します。<br>
      的は3段に分かれて流れます。1段目と3段目は左、2段目は右へ移動。<br>
      ミズ・ヒリョウ・タネは当たり。ハズレに当たると減点です。
    </div>

    <div class="result" id="resultBox" hidden>
      <h2>今回の結果</h2>
      <div id="resultSummary">まだ結果はありません。</div>
      <div class="result-list" id="resultList"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
<script>
(() => {
  "use strict";

  const STORAGE = {
    bestScore: "trc_shateki_best_score_v3",
    rewards: "trc_shateki_rewards_v3"
  };

  const DEFAULT_REWARD_STATE = {
    seed: 0,
    water: 0,
    fertilizer: 0
  };

  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  const bulletsView = document.getElementById("bulletsView");
  const scoreView = document.getElementById("scoreView");
  const gainView = document.getElementById("gainView");
  const bestView = document.getElementById("bestView");
  const startBtn = document.getElementById("startBtn");
  const resetBestBtn = document.getElementById("resetBestBtn");
  const resultBox = document.getElementById("resultBox");
  const resultSummary = document.getElementById("resultSummary");
  const resultList = document.getElementById("resultList");
  const toastEl = document.getElementById("toast");

  let cssWidth = 900;
  let cssHeight = 1280;
  let dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  let rafId = 0;
  let toastTimer = null;

  const CONFIG = {
    bulletsMax: 5,
    laneRatios: [0.24, 0.39, 0.54],   // 3段
    laneSpeed: [-90, 130, -175],       // 1段目左、2段目右、3段目左
    targetsPerLane: [5, 5, 6],
    counterYRatio: 0.69,
    gunYRatio: 0.84,
    shotLife: 240,
    hitFlashMs: 180
  };

  const SIZE_MAP = {
    xs: 18,
    s: 28,
    m: 40,
    l: 54
  };

  const TARGET_TYPES = {
    water: {
      key: "water",
      label: "ミズ",
      emoji: "💧",
      color: "#74d8ff",
      particle: "#a2ebff",
      scoreBase: 90,
      rewardBySize: { xs: 3, s: 2, m: 1, l: 1 },
      bad: false
    },
    fertilizer: {
      key: "fertilizer",
      label: "ヒリョウ",
      emoji: "🧪",
      color: "#d5a5ff",
      particle: "#edd0ff",
      scoreBase: 100,
      rewardBySize: { xs: 3, s: 2, m: 1, l: 1 },
      bad: false
    },
    seed: {
      key: "seed",
      label: "タネ",
      emoji: "🌱",
      color: "#9be06d",
      particle: "#caf6a9",
      scoreBase: 110,
      rewardBySize: { xs: 3, s: 2, m: 1, l: 1 },
      bad: false
    },
    bad: {
      key: "bad",
      label: "ハズレ",
      emoji: "💀",
      color: "#ffa27a",
      particle: "#ffd0bf",
      scoreBase: -80,
      rewardBySize: { xs: 0, s: 0, m: 0, l: 0 },
      bad: true
    }
  };

  const SIZE_SCORE_BONUS = {
    xs: 90,
    s: 50,
    m: 20,
    l: 0
  };

  const state = {
    running: false,
    bullets: CONFIG.bulletsMax,
    score: 0,
    gainedCount: 0,
    bestScore: readNumber(STORAGE.bestScore, 0),
    rewardsThisRun: { ...DEFAULT_REWARD_STATE },
    targets: [],
    shots: [],
    particles: [],
    floatTexts: [],
    hitRings: [],
    lastTs: 0
  };

  function laneY(index){
    return cssHeight * CONFIG.laneRatios[index];
  }

  function counterTopY(){
    return cssHeight * CONFIG.counterYRatio;
  }

  function gunX(){
    return cssWidth * 0.5;
  }

  function gunY(){
    return cssHeight * CONFIG.gunYRatio;
  }

  function setupCanvas(){
    const rect = canvas.getBoundingClientRect();
    const parentWidth = canvas.parentElement ? canvas.parentElement.clientWidth : 900;
    cssWidth = Math.max(320, Math.floor(rect.width || parentWidth || 900));
    cssHeight = Math.floor(cssWidth * (1280 / 900));
    dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));

    canvas.style.height = cssHeight + "px";
    canvas.width = Math.floor(cssWidth * dpr);
    canvas.height = Math.floor(cssHeight * dpr);

    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);
  }

  function initTargets(){
    state.targets = [];
    for (let lane = 0; lane < 3; lane++) {
      const count = CONFIG.targetsPerLane[lane];
      const dir = CONFIG.laneSpeed[lane] > 0 ? 1 : -1;
      const spacing = cssWidth / (count + 0.4);

      for (let i = 0; i < count; i++) {
        const type = pickTargetType();
        const sizeKey = pickSizeKey(type.key);
        const r = SIZE_MAP[sizeKey];

        let x = spacing * (i + 0.7);
        if (dir < 0) x = cssWidth - x;
        x += rand(-20, 20);

        state.targets.push({
          id: `t_${lane}_${i}_${Math.random().toString(36).slice(2,7)}`,
          lane,
          type,
          sizeKey,
          r,
          x,
          y: laneY(lane),
          baseY: laneY(lane),
          vx: CONFIG.laneSpeed[lane] * rand(0.9, 1.1),
          bobT: Math.random() * Math.PI * 2,
          hitFlash: 0,
          hitBounce: 0
        });
      }
    }
  }

  function pickTargetType(){
    const roll = Math.random();
    if (roll < 0.28) return TARGET_TYPES.water;
    if (roll < 0.52) return TARGET_TYPES.fertilizer;
    if (roll < 0.76) return TARGET_TYPES.seed;
    return TARGET_TYPES.bad;
  }

  function pickSizeKey(typeKey){
    const roll = Math.random();

    if (typeKey === "bad") {
      if (roll < 0.10) return "xs";
      if (roll < 0.28) return "s";
      if (roll < 0.60) return "m";
      return "l";
    }

    if (roll < 0.14) return "xs";
    if (roll < 0.36) return "s";
    if (roll < 0.72) return "m";
    return "l";
  }

  function startGame(){
    cancelAnimationFrame(rafId);

    state.running = true;
    state.bullets = CONFIG.bulletsMax;
    state.score = 0;
    state.gainedCount = 0;
    state.rewardsThisRun = { ...DEFAULT_REWARD_STATE };
    state.shots = [];
    state.particles = [];
    state.floatTexts = [];
    state.hitRings = [];

    setupCanvas();
    initTargets();
    resultBox.hidden = true;
    startBtn.textContent = "プレイ中";
    state.lastTs = performance.now();

    updateHud();
    draw();
    showToast("たこ焼き射的スタート！");
    rafId = requestAnimationFrame(loop);
  }

  function endGame(){
    state.running = false;
    cancelAnimationFrame(rafId);

    if (state.score > state.bestScore) {
      state.bestScore = state.score;
      localStorage.setItem(STORAGE.bestScore, String(state.bestScore));
    }

    saveRewards(state.rewardsThisRun);
    updateHud();
    renderResult();
    startBtn.textContent = "もう一回あそぶ";
    showToast("ゲーム終了！報酬を保存しました");
    draw();
  }

  function loop(ts){
    if (!state.running) return;

    const dt = Math.min(34, ts - state.lastTs || 16);
    state.lastTs = ts;

    update(dt);
    draw();
    rafId = requestAnimationFrame(loop);
  }

  function update(dt){
    for (const t of state.targets) {
      t.x += t.vx * dt / 1000;
      t.bobT += dt * 0.004;

      const bounce = t.hitBounce > 0
        ? Math.sin((280 - t.hitBounce) * 0.06) * 10
        : 0;

      t.baseY = laneY(t.lane);
      t.y = t.baseY + Math.sin(t.bobT) * 4 - bounce;

      if (t.hitFlash > 0) t.hitFlash -= dt;
      if (t.hitBounce > 0) t.hitBounce -= dt;

      if (t.vx < 0 && t.x + t.r < -40) {
        recycleTarget(t);
      } else if (t.vx > 0 && t.x - t.r > cssWidth + 40) {
        recycleTarget(t);
      }
    }

    state.shots = state.shots.filter(s => {
      s.life -= dt;
      return s.life > 0;
    });

    state.particles = state.particles.filter(p => {
      p.x += p.vx * dt * 0.06;
      p.y += p.vy * dt * 0.06;
      p.vy += p.gravity;
      p.life -= dt;
      return p.life > 0;
    });

    state.floatTexts = state.floatTexts.filter(f => {
      f.y -= dt * 0.038;
      f.life -= dt;
      return f.life > 0;
    });

    state.hitRings = state.hitRings.filter(r => {
      r.life -= dt;
      return r.life > 0;
    });
  }

  function recycleTarget(t){
    const lane = t.lane;
    const dir = CONFIG.laneSpeed[lane] > 0 ? 1 : -1;
    const type = pickTargetType();
    const sizeKey = pickSizeKey(type.key);

    t.type = type;
    t.sizeKey = sizeKey;
    t.r = SIZE_MAP[sizeKey];
    t.baseY = laneY(lane);
    t.y = laneY(lane);
    t.bobT = Math.random() * Math.PI * 2;
    t.hitFlash = 0;
    t.hitBounce = 0;
    t.vx = CONFIG.laneSpeed[lane] * rand(0.9, 1.1);

    if (dir < 0) {
      t.x = cssWidth + t.r + rand(20, 100);
    } else {
      t.x = -t.r - rand(20, 100);
    }
  }

  function shoot(targetX, targetY){
    if (!state.running || state.bullets <= 0) return;

    state.bullets--;

    state.shots.push({
      fromX: gunX(),
      fromY: gunY() - 70,
      toX: targetX,
      toY: targetY,
      life: CONFIG.shotLife,
      maxLife: CONFIG.shotLife
    });

    let hitTarget = null;
    for (let i = state.targets.length - 1; i >= 0; i--) {
      const t = state.targets[i];
      const dx = targetX - t.x;
      const dy = targetY - t.y;
      if (dx * dx + dy * dy <= t.r * t.r) {
        hitTarget = t;
        break;
      }
    }

    if (hitTarget) {
      applyHit(hitTarget, targetX, targetY);
    } else {
      state.score = Math.max(0, state.score - 15);
      state.hitRings.push({
        x: targetX,
        y: targetY,
        life: 220,
        maxLife: 220,
        miss: true
      });
      state.floatTexts.push({
        x: targetX,
        y: targetY - 8,
        text: "MISS",
        color: "#fff0d9",
        life: 760,
        maxLife: 760,
        size: 34
      });
      burst(targetX, targetY, "#fff0d9", 7, true);
      showToast("はずれ！");
    }

    updateHud();

    if (state.bullets <= 0) {
      setTimeout(endGame, 420);
    }
  }

  function applyHit(target, x, y){
    const type = target.type;
    const bonus = SIZE_SCORE_BONUS[target.sizeKey] || 0;
    const scoreAdd = type.bad
      ? type.scoreBase - bonus * 0.5
      : type.scoreBase + bonus;

    state.score = Math.max(0, state.score + Math.round(scoreAdd));
    target.hitFlash = CONFIG.hitFlashMs;
    target.hitBounce = 280;

    state.hitRings.push({
      x, y,
      life: 360,
      maxLife: 360,
      miss: false
    });

    if (!type.bad) {
      const amount = type.rewardBySize[target.sizeKey] || 0;

      if (type.key === "water") state.rewardsThisRun.water += amount;
      if (type.key === "fertilizer") state.rewardsThisRun.fertilizer += amount;
      if (type.key === "seed") state.rewardsThisRun.seed += amount;

      state.gainedCount += amount;

      state.floatTexts.push({
        x,
        y: y - 4,
        text: "HIT!",
        color: "#fff7af",
        life: 900,
        maxLife: 900,
        size: 40
      });

      state.floatTexts.push({
        x,
        y: y + 28,
        text: `+${type.label}×${amount}`,
        color: "#ffffff",
        life: 900,
        maxLife: 900,
        size: 26
      });

      burst(x, y, type.particle, 16, false);
      showToast(`${type.emoji} ${type.label} ×${amount}`);
    } else {
      state.floatTexts.push({
        x,
        y: y - 4,
        text: "MISS...",
        color: "#ffd7c9",
        life: 900,
        maxLife: 900,
        size: 36
      });

      burst(x, y, type.particle, 12, false);
      showToast("ハズレに命中！");
    }

    recycleTarget(target);
  }

  function draw(){
    ctx.clearRect(0, 0, cssWidth, cssHeight);
    drawBackground();
    drawLaneGuides();
    drawTargets();
    drawShots();
    drawHitRings();
    drawParticles();
    drawFloatTexts();
    drawGun();
    drawBottomHud();
  }

  function drawBackground(){
    const g = ctx.createLinearGradient(0, 0, 0, cssHeight);
    g.addColorStop(0, "#7c2f14");
    g.addColorStop(0.15, "#65240f");
    g.addColorStop(0.15, "#f2c978");
    g.addColorStop(0.28, "#f2c978");
    g.addColorStop(0.28, "#e03b16");
    g.addColorStop(0.40, "#e03b16");
    g.addColorStop(0.40, "#f0d29b");
    g.addColorStop(0.55, "#f0d29b");
    g.addColorStop(0.55, "#7d2f14");
    g.addColorStop(1, "#5b220f");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, cssWidth, cssHeight);

    roundRect(ctx, 26, 34, cssWidth - 52, 84, 18, "#f1c66d");
    ctx.fillStyle = "#5c2410";
    ctx.font = `900 ${Math.max(24, cssWidth * 0.06)}px sans-serif`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("たこ焼き射的", cssWidth / 2, 76);

    const lanternXs = [0.12, 0.31, 0.5, 0.69, 0.88];
    for (const rate of lanternXs) drawLantern(cssWidth * rate, 22);

    drawShelf(0, laneY(0) - 60, cssWidth, 14);
    drawShelf(0, laneY(1) - 60, cssWidth, 14);
    drawShelf(0, laneY(2) - 60, cssWidth, 14);

    ctx.fillStyle = "#60230e";
    ctx.fillRect(0, counterTopY(), cssWidth, cssHeight - counterTopY());

    ctx.fillStyle = "#4a1608";
    ctx.fillRect(0, counterTopY() + 32, cssWidth, 18);

    ctx.fillStyle = "rgba(0,0,0,.18)";
    ctx.fillRect(0, counterTopY() + 52, cssWidth, cssHeight - (counterTopY() + 52));
  }

  function drawLantern(x, y){
    ctx.fillStyle = "#f9e2ae";
    ctx.fillRect(x - 2, y, 4, 18);

    roundRect(ctx, x - 34, y + 18, 68, 86, 18, "#ffa757");
    ctx.strokeStyle = "#883513";
    ctx.lineWidth = 4;
    ctx.strokeRect(x - 28, y + 26, 56, 70);

    ctx.fillStyle = "#6f230f";
    ctx.font = "900 26px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("祭", x, y + 60);
  }

  function drawShelf(x, y, w, h){
    ctx.fillStyle = "#4c1b0c";
    ctx.fillRect(x, y, w, h);
    ctx.fillStyle = "rgba(255,236,194,.08)";
    ctx.fillRect(x, y, w, 3);
  }

  function drawLaneGuides(){
    for (let i = 0; i < 3; i++) {
      const y = laneY(i);

      ctx.save();
      ctx.globalAlpha = 0.16;
      ctx.fillStyle = "#fff4dd";
      ctx.fillRect(0, y - 64, cssWidth, 128);
      ctx.restore();

      ctx.fillStyle = "rgba(255,245,220,.9)";
      ctx.font = "900 16px sans-serif";
      ctx.textAlign = "left";
      ctx.textBaseline = "middle";
      ctx.fillText(i === 1 ? "2段目 →" : (i === 0 ? "1段目 ←" : "3段目 ←"), 16, y - 78);
    }
  }

  function drawTargets(){
    for (const t of state.targets) {
      const glow = Math.max(0, t.hitFlash / CONFIG.hitFlashMs);
      const pulse = 1 + glow * 0.16;
      const r = t.r * pulse;

      ctx.save();
      ctx.globalAlpha = 0.22;
      ctx.fillStyle = "#000";
      ctx.beginPath();
      ctx.ellipse(t.x, t.baseY + t.r + 18, r * 0.8, r * 0.24, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      if (glow > 0) {
        ctx.save();
        ctx.globalAlpha = glow * 0.45;
        ctx.fillStyle = "#fff3b1";
        ctx.beginPath();
        ctx.arc(t.x, t.y, r + 14, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      ctx.fillStyle = t.type.color;
      ctx.beginPath();
      ctx.arc(t.x, t.y, r, 0, Math.PI * 2);
      ctx.fill();

      ctx.lineWidth = 4;
      ctx.strokeStyle = "#fff6e7";
      ctx.stroke();

      ctx.lineWidth = 3;
      ctx.strokeStyle = "rgba(255,255,255,.45)";
      ctx.beginPath();
      ctx.arc(t.x, t.y, r * 0.65, 0, Math.PI * 2);
      ctx.stroke();

      ctx.fillStyle = "#26130c";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = `900 ${Math.max(16, r * 0.9)}px sans-serif`;
      ctx.fillText(t.type.emoji, t.x, t.y + 3);

      roundRect(ctx, t.x - 26, t.y + r + 10, 52, 22, 10, "rgba(255,250,242,.96)");
      ctx.fillStyle = "#502110";
      ctx.font = "900 12px sans-serif";
      ctx.fillText(sizeLabel(t.sizeKey), t.x, t.y + r + 22);
    }
  }

  function drawShots(){
    for (const s of state.shots) {
      const p = 1 - (s.life / s.maxLife);
      const alpha = Math.max(0, s.life / s.maxLife);

      const cx = s.fromX + (s.toX - s.fromX) * p;
      const cy = s.fromY + (s.toY - s.fromY) * p;

      ctx.save();
      ctx.globalAlpha = alpha * 0.7;
      ctx.strokeStyle = "#ffe8b0";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(s.fromX, s.fromY);
      ctx.lineTo(cx, cy);
      ctx.stroke();
      ctx.restore();

      drawTakoyakiBall(cx, cy, 18, alpha);
    }
  }

  function drawTakoyakiBall(x, y, r, alpha){
    ctx.save();
    ctx.globalAlpha = alpha;

    ctx.beginPath();
    ctx.fillStyle = "#be6430";
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();

    ctx.lineWidth = 3;
    ctx.strokeStyle = "#ffe3ae";
    ctx.stroke();

    ctx.strokeStyle = "#6b240d";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(x - 8, y - 3);
    ctx.quadraticCurveTo(x, y - 10, x + 8, y - 3);
    ctx.stroke();

    ctx.strokeStyle = "#fff5de";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(x - 7, y + 2);
    ctx.quadraticCurveTo(x, y - 3, x + 7, y + 2);
    ctx.stroke();

    ctx.restore();
  }

  function drawHitRings(){
    for (const r of state.hitRings) {
      const p = 1 - (r.life / r.maxLife);
      const radius = 10 + p * 34;
      const alpha = Math.max(0, r.life / r.maxLife);

      ctx.save();
      ctx.globalAlpha = alpha * 0.75;
      ctx.strokeStyle = r.miss ? "#fff3de" : "#ffe99d";
      ctx.lineWidth = r.miss ? 3 : 5;
      ctx.beginPath();
      ctx.arc(r.x, r.y, radius, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
  }

  function drawParticles(){
    for (const p of state.particles) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
      ctx.fillStyle = p.color;

      if (p.square) {
        ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
      } else {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
  }

  function drawFloatTexts(){
    for (const f of state.floatTexts) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, f.life / f.maxLife);
      ctx.fillStyle = f.color;
      ctx.font = `900 ${f.size}px sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.lineWidth = 5;
      ctx.strokeStyle = "rgba(63,27,12,.45)";
      ctx.strokeText(f.text, f.x, f.y);
      ctx.fillText(f.text, f.x, f.y);
      ctx.restore();
    }
  }

  function drawGun(){
    const cx = gunX();
    const baseY = gunY();

    roundRect(ctx, cx - 122, baseY + 44, 244, 80, 22, "#f0ca7a");
    roundRect(ctx, cx - 26, baseY - 84, 52, 138, 14, "#e2a643");
    roundRect(ctx, cx - 14, baseY - 56, 28, 84, 10, "#fff4dc");

    ctx.beginPath();
    ctx.fillStyle = "#c0632f";
    ctx.arc(cx, baseY - 106, 46, 0, Math.PI * 2);
    ctx.fill();

    ctx.lineWidth = 6;
    ctx.strokeStyle = "#fff0cb";
    ctx.stroke();

    ctx.fillStyle = "#fff9e8";
    ctx.font = "900 18px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("発射！", cx, baseY + 86);
  }

  function drawBottomHud(){
    roundRect(ctx, 28, cssHeight - 112, 240, 70, 26, "rgba(40,17,10,.55)");
    roundRect(ctx, cssWidth - 268, cssHeight - 112, 240, 70, 26, "rgba(40,17,10,.55)");

    ctx.fillStyle = "#fff7e8";
    ctx.font = "900 30px sans-serif";
    ctx.textAlign = "left";
    ctx.textBaseline = "middle";
    ctx.fillText(`のこり弾: ${state.bullets}`, 46, cssHeight - 77);

    ctx.textAlign = "right";
    ctx.fillText(`スコア: ${state.score}`, cssWidth - 46, cssHeight - 77);
  }

  function burst(x, y, color, count, square){
    for (let i = 0; i < count; i++) {
      state.particles.push({
        x,
        y,
        vx: rand(-2.8, 2.8),
        vy: rand(-3.6, -0.8),
        gravity: rand(0.08, 0.13),
        size: rand(3, 8),
        color,
        square: !!square,
        life: rand(420, 900),
        maxLife: 900
      });
    }
  }

  function renderResult(){
    resultBox.hidden = false;

    const total = state.rewardsThisRun;
    const items = [];
    if (total.seed) items.push(`🌱 タネ × ${total.seed}`);
    if (total.water) items.push(`💧 ミズ × ${total.water}`);
    if (total.fertilizer) items.push(`🧪 ヒリョウ × ${total.fertilizer}`);
    if (!items.length) items.push("今回は資材を獲得できませんでした");

    resultSummary.innerHTML =
      `スコア <strong>${state.score}</strong> / ベスト <strong>${state.bestScore}</strong><br>` +
      `今回の獲得合計：<strong>${state.gainedCount}</strong>`;

    resultList.innerHTML = items.map(v => `<div class="result-item">${v}</div>`).join("");
  }

  function updateHud(){
    bulletsView.textContent = state.bullets;
    scoreView.textContent = state.score;
    gainView.textContent = state.gainedCount;
    bestView.textContent = state.bestScore;
  }

  function saveRewards(addition){
    const current = readRewards();
    current.seed += Number(addition.seed || 0);
    current.water += Number(addition.water || 0);
    current.fertilizer += Number(addition.fertilizer || 0);
    localStorage.setItem(STORAGE.rewards, JSON.stringify(current));
  }

  function readRewards(){
    try {
      const raw = localStorage.getItem(STORAGE.rewards);
      if (!raw) return { ...DEFAULT_REWARD_STATE };
      const obj = JSON.parse(raw);
      return {
        seed: Number(obj.seed || 0),
        water: Number(obj.water || 0),
        fertilizer: Number(obj.fertilizer || 0)
      };
    } catch (_) {
      return { ...DEFAULT_REWARD_STATE };
    }
  }

  function readNumber(key, fallback){
    const n = Number(localStorage.getItem(key));
    return Number.isFinite(n) ? n : fallback;
  }

  function sizeLabel(key){
    if (key === "xs") return "極小";
    if (key === "s") return "小";
    if (key === "m") return "中";
    return "大";
  }

  function rand(min, max){
    return Math.random() * (max - min) + min;
  }

  function roundRect(ctx, x, y, w, h, r, fill){
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
    ctx.fillStyle = fill;
    ctx.fill();
  }

  function showToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => {
      toastEl.classList.remove("show");
    }, 1200);
  }

  function onPointerDown(e){
    e.preventDefault();
    if (!state.running || state.bullets <= 0) return;

    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (cssWidth / rect.width);
    const y = (e.clientY - rect.top) * (cssHeight / rect.height);
    shoot(x, y);
  }

  startBtn.addEventListener("click", startGame);

  resetBestBtn.addEventListener("click", () => {
    localStorage.removeItem(STORAGE.bestScore);
    state.bestScore = 0;
    updateHud();
    showToast("ベスト記録をリセットしました");
  });

  canvas.addEventListener("pointerdown", onPointerDown, { passive:false });

  window.addEventListener("resize", () => {
    const wasRunning = state.running;
    if (wasRunning) {
      cancelAnimationFrame(rafId);
      setupCanvas();
      for (const t of state.targets) {
        t.baseY = laneY(t.lane);
        t.y = laneY(t.lane);
      }
      draw();
      state.lastTs = performance.now();
      rafId = requestAnimationFrame(loop);
    } else {
      setupCanvas();
      draw();
    }
  });

  setupCanvas();
  initTargets();
  updateHud();
  draw();
  startGame();
})();
</script>
</body>
</html>
