<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>たこ焼き射的｜たこ焼きトレーディングカード</title>
<style>
  :root{
    --bg1:#2d1208;
    --bg2:#4a1f10;
    --panel:#fff3dc;
    --line:#7a3d1f;
    --accent:#ffb347;
    --accent2:#ff7b54;
    --text:#2c160e;
    --white:#fffdf7;
    --shadow:0 10px 24px rgba(0,0,0,.22);
  }
  *{box-sizing:border-box}
  html,body{
    margin:0;
    padding:0;
    background:
      radial-gradient(circle at top, #6a2c18 0%, #39190d 48%, #1f0d06 100%);
    color:var(--white);
    font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
    min-height:100%;
  }

  .wrap{
    width:min(100%, 860px);
    margin:0 auto;
    padding:16px 14px 28px;
  }

  .title{
    text-align:center;
    margin:8px 0 10px;
  }
  .title h1{
    margin:0;
    font-size:clamp(24px,5vw,36px);
    line-height:1.2;
    letter-spacing:.04em;
  }
  .title p{
    margin:8px 0 0;
    opacity:.92;
    font-size:14px;
  }

  .hud{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin:14px 0 14px;
  }

  .card{
    background:var(--panel);
    color:var(--text);
    border:3px solid #f4c27a;
    border-radius:18px;
    box-shadow:var(--shadow);
    padding:10px 12px;
    min-height:74px;
  }
  .card .label{
    font-size:12px;
    opacity:.8;
    margin-bottom:6px;
    font-weight:700;
  }
  .card .value{
    font-size:22px;
    font-weight:900;
    line-height:1.15;
  }

  .game-shell{
    position:relative;
    background:
      linear-gradient(to bottom, rgba(255,214,145,.16), rgba(255,179,71,.08)),
      linear-gradient(to bottom, #8b3f1d 0%, #6f2d16 22%, #53210f 22%, #53210f 100%);
    border:4px solid #f4c27a;
    border-radius:22px;
    overflow:hidden;
    box-shadow:var(--shadow);
  }

  canvas{
    display:block;
    width:100%;
    height:auto;
    touch-action:none;
    background:
      linear-gradient(to bottom, #271003 0%, #3a1906 15%, #5d2a0d 15%, #5d2a0d 100%);
  }

  .top-lanterns{
    position:absolute;
    inset:0 0 auto 0;
    height:56px;
    pointer-events:none;
    display:flex;
    justify-content:space-evenly;
    align-items:flex-start;
    z-index:3;
  }
  .lantern{
    width:42px;
    height:48px;
    border-radius:14px;
    background:linear-gradient(to bottom,#ffd68a,#ff9944);
    border:3px solid #8d3a12;
    position:relative;
    box-shadow:0 6px 12px rgba(0,0,0,.18);
  }
  .lantern::before{
    content:"";
    position:absolute;
    top:-14px;
    left:50%;
    width:4px;
    height:14px;
    margin-left:-2px;
    background:#f8d7a6;
  }
  .lantern::after{
    content:"祭";
    position:absolute;
    inset:0;
    display:grid;
    place-items:center;
    font-size:18px;
    font-weight:900;
    color:#7b270d;
  }

  .controls{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:14px;
  }

  button{
    appearance:none;
    border:none;
    border-radius:14px;
    padding:14px 16px;
    font-size:15px;
    font-weight:900;
    cursor:pointer;
    box-shadow:var(--shadow);
  }
  .btn-main{
    background:linear-gradient(to bottom,#ffd87a,#ffb347);
    color:#4a220d;
    flex:1 1 180px;
  }
  .btn-sub{
    background:#fff3dc;
    color:#53210f;
    flex:1 1 160px;
  }

  .note{
    margin-top:12px;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.12);
    border-radius:16px;
    padding:12px 14px;
    font-size:13px;
    line-height:1.7;
  }

  .result{
    margin-top:14px;
    background:#fff3dc;
    color:#35170c;
    border-radius:18px;
    border:3px solid #f4c27a;
    padding:14px;
    box-shadow:var(--shadow);
  }
  .result h2{
    margin:0 0 8px;
    font-size:20px;
  }
  .result-list{
    display:grid;
    gap:8px;
    margin-top:8px;
  }
  .result-item{
    background:#fffaf0;
    border:2px solid #efcf9a;
    border-radius:12px;
    padding:10px 12px;
    font-weight:700;
  }

  .toast{
    position:fixed;
    left:50%;
    bottom:18px;
    transform:translateX(-50%);
    background:rgba(34,18,10,.94);
    color:#fff8ec;
    border:2px solid #ffcb7a;
    border-radius:999px;
    padding:11px 16px;
    font-weight:800;
    font-size:14px;
    z-index:9999;
    opacity:0;
    pointer-events:none;
    transition:.25s;
  }
  .toast.show{
    opacity:1;
  }

  @media (max-width:640px){
    .hud{
      grid-template-columns:repeat(2,1fr);
    }
    .card .value{
      font-size:20px;
    }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="title">
      <h1>たこ焼き射的</h1>
      <p>タップして的を狙え！ タネ・ミズ・ヒリョウを獲得しよう！</p>
    </div>

    <div class="hud">
      <div class="card">
        <div class="label">のこり弾</div>
        <div class="value" id="bulletsView">5</div>
      </div>
      <div class="card">
        <div class="label">スコア</div>
        <div class="value" id="scoreView">0</div>
      </div>
      <div class="card">
        <div class="label">今回の獲得</div>
        <div class="value" id="gainView">0</div>
      </div>
      <div class="card">
        <div class="label">ベスト</div>
        <div class="value" id="bestView">0</div>
      </div>
    </div>

    <div class="game-shell">
      <div class="top-lanterns" aria-hidden="true">
        <div class="lantern"></div>
        <div class="lantern"></div>
        <div class="lantern"></div>
        <div class="lantern"></div>
        <div class="lantern"></div>
      </div>
      <canvas id="game" width="900" height="1160"></canvas>
    </div>

    <div class="controls">
      <button class="btn-main" id="startBtn">ゲームをはじめる</button>
      <button class="btn-sub" id="resetBestBtn">ベスト記録をリセット</button>
    </div>

    <div class="result" id="resultBox" hidden>
      <h2>今回の結果</h2>
      <div id="resultSummary">まだプレイしていません。</div>
      <div class="result-list" id="resultList"></div>
    </div>

    <div class="note">
      使い方：ゲーム開始後、動いている的をタップすると発射します。<br>
      当たり：🌱タネ / 💧ミズ / 🧪ヒリョウ<br>
      ハズレ：🤢腐ったミズ / 💥崩れたヒリョウ / 🔥焼きすぎタネ
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
(() => {
  "use strict";

  /*
    ============================================================
    保存キー
    ============================================================
  */
  const STORAGE = {
    bestScore: "trc_shateki_best_score_v1",
    rewards:   "trc_shateki_rewards_v1"
  };

  /*
    ============================================================
    報酬保存の基本形
    必要ならあとであなたの既存ファーム在庫キーに合わせて
    saveRewards() の中だけ差し替えればOK
    ============================================================
  */
  const DEFAULT_REWARD_STATE = {
    seed: 0,
    water: 0,
    fertilizer: 0
  };

  /*
    ============================================================
    UI
    ============================================================
  */
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  const bulletsView = document.getElementById("bulletsView");
  const scoreView   = document.getElementById("scoreView");
  const gainView    = document.getElementById("gainView");
  const bestView    = document.getElementById("bestView");
  const startBtn    = document.getElementById("startBtn");
  const resetBestBtn= document.getElementById("resetBestBtn");
  const resultBox   = document.getElementById("resultBox");
  const resultSummary = document.getElementById("resultSummary");
  const resultList  = document.getElementById("resultList");
  const toastEl     = document.getElementById("toast");

  const DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  let cssWidth = 900;
  let cssHeight = 1160;

  /*
    ============================================================
    ゲーム設定
    ============================================================
  */
  const CONFIG = {
    bulletsMax: 5,
    targetCount: 9,
    targetMinR: 46,
    targetMaxR: 68,
    shootFlashMs: 120,
    spawnAreaTop: 150,
    spawnAreaBottom: 900,
    stallY: 930
  };

  /*
    ============================================================
    的データ
    ============================================================
  */
  const TARGET_TYPES = [
    {
      key: "seed",
      label: "タネ",
      emoji: "🌱",
      score: 100,
      reward: { seed: 1 },
      color: "#9be15d"
    },
    {
      key: "water",
      label: "ミズ",
      emoji: "💧",
      score: 90,
      reward: { water: 1 },
      color: "#7fd9ff"
    },
    {
      key: "fertilizer",
      label: "ヒリョウ",
      emoji: "🧪",
      score: 120,
      reward: { fertilizer: 1 },
      color: "#e6b0ff"
    },
    {
      key: "big_seed",
      label: "大タネ",
      emoji: "🌱",
      score: 180,
      reward: { seed: 2 },
      color: "#74d23c"
    },
    {
      key: "big_water",
      label: "大ミズ",
      emoji: "💧",
      score: 170,
      reward: { water: 2 },
      color: "#49c2ff"
    },
    {
      key: "big_fertilizer",
      label: "大ヒリョウ",
      emoji: "🧪",
      score: 210,
      reward: { fertilizer: 2 },
      color: "#d98cff"
    },
    {
      key: "bad_water",
      label: "腐ったミズ",
      emoji: "🤢",
      score: -80,
      reward: {},
      color: "#8f9967",
      bad: true
    },
    {
      key: "bad_fertilizer",
      label: "崩れたヒリョウ",
      emoji: "💥",
      score: -70,
      reward: {},
      color: "#ff9575",
      bad: true
    },
    {
      key: "bad_seed",
      label: "焼きすぎタネ",
      emoji: "🔥",
      score: -90,
      reward: {},
      color: "#ff9b45",
      bad: true
    }
  ];

  let state = {
    running: false,
    bullets: CONFIG.bulletsMax,
    score: 0,
    gainedCount: 0,
    bestScore: readNumber(STORAGE.bestScore, 0),
    targets: [],
    particles: [],
    floatTexts: [],
    shots: [],
    rewardsThisRun: { ...DEFAULT_REWARD_STATE },
    lastTs: 0
  };

  /*
    ============================================================
    初期表示
    ============================================================
  */
  updateHud();
  resizeCanvas();
  createTargets();
  draw();

  window.addEventListener("resize", resizeCanvas);

  startBtn.addEventListener("click", startGame);
  resetBestBtn.addEventListener("click", () => {
    localStorage.removeItem(STORAGE.bestScore);
    state.bestScore = 0;
    updateHud();
    showToast("ベスト記録をリセットしました");
  });

  canvas.addEventListener("pointerdown", onPointerDown, { passive:false });

  /*
    ============================================================
    関数群
    ============================================================
  */
  function startGame(){
    state.running = true;
    state.bullets = CONFIG.bulletsMax;
    state.score = 0;
    state.gainedCount = 0;
    state.targets = [];
    state.particles = [];
    state.floatTexts = [];
    state.shots = [];
    state.rewardsThisRun = { ...DEFAULT_REWARD_STATE };
    state.lastTs = performance.now();
    createTargets();
    resultBox.hidden = true;
    updateHud();
    showToast("たこ焼き射的、開始！");
    requestAnimationFrame(loop);
  }

  function endGame(){
    state.running = false;

    if (state.score > state.bestScore) {
      state.bestScore = state.score;
      localStorage.setItem(STORAGE.bestScore, String(state.bestScore));
    }

    saveRewards(state.rewardsThisRun);
    updateHud();
    renderResult();
    showToast("ゲーム終了！報酬を保存しました");
    draw();
  }

  function createTargets(){
    const arr = [];
    for(let i=0; i<CONFIG.targetCount; i++){
      const t = makeTarget(i);
      arr.push(t);
    }
    state.targets = arr;
  }

  function makeTarget(i){
    const type = pickTargetType();
    const r = rand(CONFIG.targetMinR, CONFIG.targetMaxR);
    const laneY = rand(CONFIG.spawnAreaTop, CONFIG.spawnAreaBottom);
    const dir = Math.random() < 0.5 ? -1 : 1;
    const speed = rand(90, 220) * (type.bad ? 1.08 : 1);
    const x = dir > 0 ? -r - rand(0,150) : cssWidth + r + rand(0,150);

    return {
      id: `t_${Date.now()}_${i}_${Math.random().toString(36).slice(2,7)}`,
      type,
      x,
      y: laneY,
      r,
      vx: speed * dir,
      bobBaseY: laneY,
      bobT: Math.random() * Math.PI * 2,
      hitFlash: 0
    };
  }

  function pickTargetType(){
    const roll = Math.random();
    if (roll < 0.17) return TARGET_TYPES[6];
    if (roll < 0.24) return TARGET_TYPES[7];
    if (roll < 0.31) return TARGET_TYPES[8];
    if (roll < 0.47) return TARGET_TYPES[0];
    if (roll < 0.63) return TARGET_TYPES[1];
    if (roll < 0.79) return TARGET_TYPES[2];
    if (roll < 0.87) return TARGET_TYPES[3];
    if (roll < 0.94) return TARGET_TYPES[4];
    return TARGET_TYPES[5];
  }

  function onPointerDown(e){
    if (!state.running) return;
    e.preventDefault();
    if (state.bullets <= 0) return;

    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (cssWidth / rect.width);
    const y = (e.clientY - rect.top) * (cssHeight / rect.height);

    shoot(x, y);
  }

  function shoot(x, y){
    if (!state.running || state.bullets <= 0) return;

    state.bullets--;
    state.shots.push({ x, y, life: CONFIG.shootFlashMs });

    let hitTarget = null;
    for (let i = state.targets.length - 1; i >= 0; i--) {
      const t = state.targets[i];
      const dx = x - t.x;
      const dy = y - t.y;
      if (dx*dx + dy*dy <= t.r * t.r) {
        hitTarget = t;
        break;
      }
    }

    if (hitTarget) {
      applyHit(hitTarget, x, y);
      const idx = state.targets.findIndex(t => t.id === hitTarget.id);
      if (idx >= 0) {
        state.targets.splice(idx, 1);
        state.targets.push(makeTarget(idx));
      }
    } else {
      state.score = Math.max(0, state.score - 20);
      state.floatTexts.push({
        x, y,
        text: "MISS",
        color: "#fff2d6",
        life: 650
      });
      showToast("はずれ！");
    }

    updateHud();

    if (state.bullets <= 0) {
      setTimeout(endGame, 280);
    }
  }

  function applyHit(target, x, y){
    const t = target.type;
    state.score = Math.max(0, state.score + t.score);
    target.hitFlash = CONFIG.shootFlashMs;

    if (!t.bad) {
      addRewards(state.rewardsThisRun, t.reward);
      state.gainedCount += rewardAmount(t.reward);

      const rewardText = rewardTextFromObj(t.reward);
      state.floatTexts.push({
        x, y,
        text: `+ ${rewardText}`,
        color: "#fff7a8",
        life: 900
      });
      showToast(`${t.emoji} ${t.label} 獲得！`);
    } else {
      state.floatTexts.push({
        x, y,
        text: `${t.emoji} ハズレ`,
        color: "#ffd0c2",
        life: 900
      });
      showToast(`${t.label} に当たった！`);
    }

    burst(x, y, t.color, t.bad ? 8 : 14);
  }

  function burst(x, y, color, count){
    for(let i=0; i<count; i++){
      state.particles.push({
        x, y,
        vx: rand(-2.2, 2.2),
        vy: rand(-3.4, -0.8),
        life: rand(350, 750),
        color,
        size: rand(4, 9)
      });
    }
  }

  function loop(ts){
    if (!state.running) return;

    const dt = Math.min(32, ts - state.lastTs || 16);
    state.lastTs = ts;

    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  function update(dt){
    for (const t of state.targets) {
      t.x += t.vx * dt / 1000;
      t.bobT += dt * 0.003;
      t.y = t.bobBaseY + Math.sin(t.bobT) * 8;

      if (t.vx > 0 && t.x - t.r > cssWidth + 20) {
        recycleTarget(t, "left");
      } else if (t.vx < 0 && t.x + t.r < -20) {
        recycleTarget(t, "right");
      }

      if (t.hitFlash > 0) t.hitFlash -= dt;
    }

    state.particles = state.particles.filter(p => {
      p.x += p.vx * dt * 0.06;
      p.y += p.vy * dt * 0.06;
      p.vy += 0.10;
      p.life -= dt;
      return p.life > 0;
    });

    state.floatTexts = state.floatTexts.filter(f => {
      f.y -= dt * 0.05;
      f.life -= dt;
      return f.life > 0;
    });

    state.shots = state.shots.filter(s => {
      s.life -= dt;
      return s.life > 0;
    });
  }

  function recycleTarget(t, side){
    const newType = pickTargetType();
    t.type = newType;
    t.r = rand(CONFIG.targetMinR, CONFIG.targetMaxR);
    t.bobBaseY = rand(CONFIG.spawnAreaTop, CONFIG.spawnAreaBottom);
    t.bobT = Math.random() * Math.PI * 2;
    t.vx = rand(90, 220) * (Math.random() < 0.5 ? -1 : 1) * (newType.bad ? 1.08 : 1);

    if (side === "left") {
      t.x = -t.r - rand(20,120);
      if (t.vx < 0) t.vx *= -1;
    } else {
      t.x = cssWidth + t.r + rand(20,120);
      if (t.vx > 0) t.vx *= -1;
    }
  }

  function draw(){
    ctx.clearRect(0,0,cssWidth,cssHeight);

    drawBackground();
    drawTargets();
    drawParticles();
    drawShots();
    drawFloatTexts();
    drawGun();
    drawBottomInfo();
  }

  function drawBackground(){
    const g = ctx.createLinearGradient(0,0,0,cssHeight);
    g.addColorStop(0,"#341507");
    g.addColorStop(0.18,"#4e220b");
    g.addColorStop(0.18,"#7b3916");
    g.addColorStop(1,"#5a260f");
    ctx.fillStyle = g;
    ctx.fillRect(0,0,cssWidth,cssHeight);

    // 屋台の上部帯
    ctx.fillStyle = "#7a1d11";
    ctx.fillRect(0,70,cssWidth,64);

    for(let i=0;i<cssWidth;i+=90){
      drawStripe(i, 70, 45, 64, "#ffd69a");
      drawStripe(i+45, 70, 45, 64, "#d53b1a");
    }

    // 棚
    ctx.fillStyle = "#3e1809";
    ctx.fillRect(0, 220, cssWidth, 12);
    ctx.fillRect(0, 510, cssWidth, 14);
    ctx.fillRect(0, 800, cssWidth, 16);

    // 提灯の紐下
    ctx.fillStyle = "rgba(255,234,187,.2)";
    ctx.fillRect(0,0,cssWidth,16);

    // 屋台カウンター
    ctx.fillStyle = "#6f2d16";
    ctx.fillRect(0, CONFIG.stallY, cssWidth, cssHeight - CONFIG.stallY);

    ctx.fillStyle = "#572210";
    ctx.fillRect(0, CONFIG.stallY + 70, cssWidth, 14);

    // タイトル板
    roundRect(ctx, cssWidth/2 - 190, 18, 380, 46, 14, "#ffce78");
    ctx.fillStyle = "#6a230f";
    ctx.font = "900 28px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("たこ焼き射的", cssWidth/2, 41);
  }

  function drawStripe(x,y,w,h,color){
    ctx.fillStyle = color;
    ctx.fillRect(x,y,w,h);
  }

  function drawTargets(){
    for(const t of state.targets){
      const alphaFlash = t.hitFlash > 0 ? 0.25 + Math.random() * 0.45 : 0;
      const { type } = t;

      // 影
      ctx.save();
      ctx.globalAlpha = 0.22;
      ctx.fillStyle = "#000";
      ctx.beginPath();
      ctx.ellipse(t.x, t.y + t.r + 10, t.r*0.8, t.r*0.28, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();

      // 的本体
      ctx.fillStyle = type.color;
      ctx.beginPath();
      ctx.arc(t.x, t.y, t.r, 0, Math.PI*2);
      ctx.fill();

      ctx.lineWidth = 5;
      ctx.strokeStyle = "#fff7df";
      ctx.stroke();

      // 的リング
      ctx.lineWidth = 4;
      ctx.strokeStyle = "rgba(255,255,255,.45)";
      ctx.beginPath();
      ctx.arc(t.x, t.y, t.r*0.64, 0, Math.PI*2);
      ctx.stroke();

      // 絵文字
      ctx.font = `900 ${Math.floor(t.r*0.95)}px sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "#2a180e";
      ctx.fillText(type.emoji, t.x, t.y + 4);

      // ラベル
      roundRect(ctx, t.x - t.r, t.y + t.r + 14, t.r*2, 28, 10, "rgba(255,247,226,.96)");
      ctx.fillStyle = "#4a1f10";
      ctx.font = "900 15px sans-serif";
      ctx.fillText(type.label, t.x, t.y + t.r + 28);

      // ヒット発光
      if (alphaFlash > 0){
        ctx.save();
        ctx.globalAlpha = alphaFlash;
        ctx.fillStyle = "#fff9bf";
        ctx.beginPath();
        ctx.arc(t.x, t.y, t.r + 10, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
      }
    }
  }

  function drawGun(){
    const cx = cssWidth * 0.5;
    const by = cssHeight - 80;

    // 台
    roundRect(ctx, cx - 130, by + 12, 260, 60, 18, "#3c1809");
    roundRect(ctx, cx - 100, by - 24, 200, 48, 18, "#ffd486");

    // 銃身
    ctx.fillStyle = "#e7a642";
    ctx.fillRect(cx - 22, by - 120, 44, 112);
    ctx.fillStyle = "#fff2d0";
    ctx.fillRect(cx - 10, by - 108, 20, 56);

    // たこ焼き砲の玉
    ctx.beginPath();
    ctx.fillStyle = "#b85c2b";
    ctx.arc(cx, by - 140, 28, 0, Math.PI*2);
    ctx.fill();
    ctx.lineWidth = 4;
    ctx.strokeStyle = "#ffe5ae";
    ctx.stroke();

    ctx.fillStyle = "#fff6e7";
    ctx.font = "900 17px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("発射！", cx, by + 2);
  }

  function drawBottomInfo(){
    ctx.fillStyle = "#fff5e0";
    ctx.font = "900 24px sans-serif";
    ctx.textAlign = "left";
    ctx.textBaseline = "middle";
    ctx.fillText(`のこり弾: ${state.bullets}`, 24, cssHeight - 30);

    ctx.textAlign = "right";
    ctx.fillText(`スコア: ${state.score}`, cssWidth - 24, cssHeight - 30);
  }

  function drawParticles(){
    for(const p of state.particles){
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.life / 750);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
  }

  function drawShots(){
    for(const s of state.shots){
      const a = Math.max(0, s.life / CONFIG.shootFlashMs);
      ctx.save();
      ctx.globalAlpha = a;
      ctx.strokeStyle = "#fff7c7";
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.moveTo(cssWidth/2, cssHeight - 170);
      ctx.lineTo(s.x, s.y);
      ctx.stroke();

      ctx.fillStyle = "#fff7c7";
      ctx.beginPath();
      ctx.arc(s.x, s.y, 18 * a + 6, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
  }

  function drawFloatTexts(){
    for(const f of state.floatTexts){
      ctx.save();
      ctx.globalAlpha = Math.max(0, f.life / 900);
      ctx.fillStyle = f.color;
      ctx.font = "900 28px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(f.text, f.x, f.y);
      ctx.restore();
    }
  }

  function renderResult(){
    resultBox.hidden = false;

    const total = state.rewardsThisRun;
    const items = [];

    if (total.seed) items.push(`🌱 タネ × ${total.seed}`);
    if (total.water) items.push(`💧 ミズ × ${total.water}`);
    if (total.fertilizer) items.push(`🧪 ヒリョウ × ${total.fertilizer}`);
    if (!items.length) items.push("今回は資材を獲得できませんでした");

    resultSummary.innerHTML =
      `スコア <strong>${state.score}</strong> / ベスト <strong>${state.bestScore}</strong><br>` +
      `今回の獲得数：<strong>${state.gainedCount}</strong>`;

    resultList.innerHTML = items.map(v => `<div class="result-item">${v}</div>`).join("");
  }

  function updateHud(){
    bulletsView.textContent = state.bullets;
    scoreView.textContent = state.score;
    gainView.textContent = state.gainedCount;
    bestView.textContent = state.bestScore;
  }

  function resizeCanvas(){
    const rect = canvas.getBoundingClientRect();
    const targetWidth = rect.width || canvas.parentElement.clientWidth || 900;
    cssWidth = Math.max(320, Math.floor(targetWidth));
    cssHeight = Math.floor(cssWidth * (1160 / 900));

    canvas.style.height = cssHeight + "px";
    canvas.width = Math.floor(cssWidth * DPR);
    canvas.height = Math.floor(cssHeight * DPR);
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

    if (!state.targets.length) createTargets();
    draw();
  }

  /*
    ============================================================
    報酬保存
    ============================================================
  */
  function readRewards(){
    try{
      const raw = localStorage.getItem(STORAGE.rewards);
      if(!raw) return { ...DEFAULT_REWARD_STATE };
      const obj = JSON.parse(raw);
      return {
        seed: Number(obj.seed || 0),
        water: Number(obj.water || 0),
        fertilizer: Number(obj.fertilizer || 0)
      };
    }catch(_){
      return { ...DEFAULT_REWARD_STATE };
    }
  }

  function saveRewards(addition){
    const current = readRewards();
    current.seed += Number(addition.seed || 0);
    current.water += Number(addition.water || 0);
    current.fertilizer += Number(addition.fertilizer || 0);
    localStorage.setItem(STORAGE.rewards, JSON.stringify(current));

    /*
      ==========================================
      ここを既存ファーム連携用に差し替え可能
      例：
      - tf_v1_inv に入れる
      - 既存の inventory save 関数を呼ぶ
      - GAS API に送る
      ==========================================
    */
  }

  function addRewards(base, add){
    base.seed += Number(add.seed || 0);
    base.water += Number(add.water || 0);
    base.fertilizer += Number(add.fertilizer || 0);
  }

  function rewardAmount(obj){
    return Number(obj.seed || 0) + Number(obj.water || 0) + Number(obj.fertilizer || 0);
  }

  function rewardTextFromObj(obj){
    const arr = [];
    if (obj.seed) arr.push(`タネ×${obj.seed}`);
    if (obj.water) arr.push(`ミズ×${obj.water}`);
    if (obj.fertilizer) arr.push(`ヒリョウ×${obj.fertilizer}`);
    return arr.join(" / ") || "なし";
  }

  /*
    ============================================================
    共通
    ============================================================
  */
  function readNumber(key, fallback=0){
    const n = Number(localStorage.getItem(key));
    return Number.isFinite(n) ? n : fallback;
  }

  function rand(min, max){
    return Math.random() * (max - min) + min;
  }

  function roundRect(ctx, x, y, w, h, r, fill){
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.arcTo(x+w, y, x+w, y+h, r);
    ctx.arcTo(x+w, y+h, x, y+h, r);
    ctx.arcTo(x, y+h, x, y, r);
    ctx.arcTo(x, y, x+w, y, r);
    ctx.closePath();
    ctx.fillStyle = fill;
    ctx.fill();
  }

  let toastTimer = null;
  function showToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => {
      toastEl.classList.remove("show");
    }, 1200);
  }
})();
</script>
</body>
</html>
