<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>称号の頂</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
  :root{
    --bg1:#12071f;
    --bg2:#24103d;
    --gold1:#ffe8a3;
    --gold2:#f5c85e;
    --gold3:#b77b1f;
    --panel:#2a1450;
    --panel2:#1c0f37;
    --line:rgba(255,232,163,.28);
    --text:#fff8e8;
    --muted:#dbcfae;
    --danger1:#d31721;
    --danger2:#7e0f15;
    --btn:#f5edd7;
    --btnText:#2d220f;
    --shadow:0 14px 30px rgba(0,0,0,.45);
    --cardBg:#1e1a38;
    --cardBg2:#141129;
    --ok:#77f3c8;
    --warn:#ffd46e;
    --bad:#ff8b9e;
  }

  *{ box-sizing:border-box; }
  html,body{ min-height:100%; }

  body{
    margin:0;
    font-family:"DotGothic16","MS Gothic",sans-serif;
    background:
      radial-gradient(circle at 50% 18%, #4b2484 0%, #2a124c 30%, #160925 58%, #09040f 100%);
    color:var(--text);
    padding:18px 14px 30px;
    overflow-x:hidden;
  }

  body::before,
  body::after{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
  }

  body::before{
    background:
      radial-gradient(circle at 18% 26%, rgba(255,216,120,.18) 0 2px, transparent 3px),
      radial-gradient(circle at 73% 19%, rgba(255,216,120,.16) 0 2px, transparent 3px),
      radial-gradient(circle at 31% 78%, rgba(255,216,120,.12) 0 2px, transparent 3px),
      radial-gradient(circle at 84% 67%, rgba(255,216,120,.14) 0 2px, transparent 3px),
      radial-gradient(circle at 56% 43%, rgba(147,105,255,.18) 0 2px, transparent 3px);
    opacity:.9;
  }

  body::after{
    background:linear-gradient(transparent 0 97%, rgba(255,255,255,.04) 97% 100%);
    background-size:100% 3px;
    mix-blend-mode:soft-light;
    opacity:.28;
  }

  .wrap{
    width:min(100%, 440px);
    margin:0 auto;
    position:relative;
    z-index:1;
  }

  .card{
    position:relative;
    border-radius:22px;
    background:
      linear-gradient(180deg, rgba(126,63,198,.35), rgba(29,13,58,.96)),
      linear-gradient(180deg, var(--panel), var(--panel2));
    border:2px solid rgba(247,213,118,.48);
    box-shadow:
      0 0 0 2px rgba(95,49,154,.55) inset,
      0 0 0 6px rgba(255,219,130,.06) inset,
      0 18px 40px rgba(0,0,0,.5);
    overflow:hidden;
  }

  .ornament-top,
  .ornament-bottom{
    position:absolute;
    left:12px;
    right:12px;
    height:18px;
    pointer-events:none;
    opacity:.9;
  }
  .ornament-top{ top:10px; }
  .ornament-bottom{ bottom:10px; }

  .ornament-top::before,
  .ornament-top::after,
  .ornament-bottom::before,
  .ornament-bottom::after{
    content:"";
    position:absolute;
    top:50%;
    width:18px;
    height:18px;
    border:2px solid rgba(255,222,145,.8);
    transform:translateY(-50%) rotate(45deg);
    opacity:.75;
  }

  .ornament-top::before,
  .ornament-bottom::before{ left:0; }

  .ornament-top::after,
  .ornament-bottom::after{ right:0; }

  .ornament-top .line,
  .ornament-bottom .line{
    position:absolute;
    left:24px;
    right:24px;
    top:50%;
    height:2px;
    transform:translateY(-50%);
    background:linear-gradient(90deg, transparent, rgba(255,223,150,.65), transparent);
  }

  .head{
    padding:24px 20px 10px;
    text-align:center;
  }

  .head-title{
    display:inline-block;
    padding:8px 16px;
    border-radius:999px;
    background:linear-gradient(180deg, rgba(255,221,143,.20), rgba(255,221,143,.08));
    border:1px solid rgba(255,221,143,.35);
    color:var(--gold1);
    font-family:"Press Start 2P", monospace;
    font-size:12px;
    line-height:1.5;
    letter-spacing:.05em;
    text-shadow:0 1px 0 rgba(0,0,0,.4);
    box-shadow:0 0 18px rgba(255,202,96,.12) inset;
  }

  .record-panel,
  .god-panel,
  .altar-panel{
    margin:10px 14px 0;
    background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(244,237,220,.96));
    color:#271d11;
    border-radius:16px;
    border:2px solid rgba(136,101,42,.55);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.85),
      0 8px 20px rgba(0,0,0,.18);
    overflow:hidden;
  }

  .record-header,
  .panel-header{
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:48px;
    padding:12px 16px;
    background:linear-gradient(180deg, #36205c, #241043);
    color:#fff3ce;
    border-bottom:2px solid rgba(88,56,133,.55);
    font-size:18px;
    font-weight:700;
    letter-spacing:.08em;
    text-shadow:0 2px 0 rgba(0,0,0,.35);
  }

  .rows{
    padding:8px 10px 10px;
  }

  .row{
    display:grid;
    grid-template-columns:28px 1fr auto;
    align-items:center;
    gap:10px;
    min-height:52px;
    padding:8px 6px;
    border-bottom:1px dashed rgba(76,51,12,.18);
  }
  .row:last-child{ border-bottom:none; }

  .icon{
    width:28px;
    height:28px;
    display:grid;
    place-items:center;
    border-radius:8px;
    background:linear-gradient(180deg, #ffe6a6, #dca947);
    border:1px solid rgba(108,73,15,.35);
    font-size:16px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.65);
  }

  .label{
    font-size:15px;
    font-weight:700;
    letter-spacing:.02em;
    color:#2d2214;
  }

  .value{
    font-family:"Press Start 2P", monospace;
    font-size:14px;
    font-weight:900;
    color:#120d07;
    letter-spacing:.04em;
    white-space:nowrap;
    line-height:1.6;
  }

  .title-cap{
    margin:14px 14px 8px;
    text-align:center;
    font-family:"Press Start 2P", monospace;
    font-size:15px;
    color:#ffe8b0;
    letter-spacing:.08em;
    text-shadow:0 2px 0 rgba(0,0,0,.32);
    line-height:1.6;
  }

  .main-title{
    margin:0 14px;
    padding:16px 14px;
    border-radius:16px;
    text-align:center;
    font-size:22px;
    font-weight:900;
    letter-spacing:.06em;
    line-height:1.3;
    color:#fff4ef;
    background:linear-gradient(180deg, #e0242e 0%, #b2131d 58%, #780d13 100%);
    border:2px solid rgba(255,215,164,.42);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.34),
      0 10px 22px rgba(0,0,0,.32);
    text-shadow:
      0 2px 0 rgba(0,0,0,.28),
      0 0 12px rgba(255,170,170,.10);
  }

  .stars{
    display:flex;
    justify-content:center;
    gap:8px;
    padding:10px 0 8px;
    color:#ffd770;
    font-size:14px;
    text-shadow:0 1px 0 rgba(0,0,0,.35);
  }

  .seedbox{
    margin:10px 14px 0;
    padding:12px 12px 10px;
    border-radius:16px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,223,140,.18);
  }

  .seedbox-title{
    text-align:center;
    font-family:"Press Start 2P", monospace;
    font-size:11px;
    line-height:1.6;
    color:#ffe8b0;
    margin-bottom:10px;
  }

  .seed-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
  }

  .seed-chip{
    min-height:58px;
    border-radius:12px;
    padding:10px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,223,140,.16);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
  }

  .seed-chip-name{
    color:#fff8ea;
    font-size:14px;
    font-weight:900;
    text-align:left;
    line-height:1.35;
  }

  .seed-chip-count{
    font-family:"Press Start 2P", monospace;
    color:#ffe8a3;
    font-size:10px;
    white-space:nowrap;
    line-height:1.6;
  }

  .god-body{
    padding:14px 12px 12px;
  }

  .god-note{
    text-align:center;
    color:#5a421f;
    font-size:13px;
    line-height:1.7;
    margin-bottom:12px;
  }

  .god-plot-wrap{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
  }

  .god-plot{
    width:min(210px, 70vw);
    aspect-ratio:1/1;
    border-radius:18px;
    position:relative;
    overflow:hidden;
    border:3px solid rgba(145,102,19,.62);
    box-shadow:
      inset 0 0 0 2px rgba(255,248,210,.32),
      0 12px 24px rgba(0,0,0,.20);
    background:
      url("https://takoyaki-trc.github.io/takoyaki-media/town/assets/images/kami.png") center/cover no-repeat;
  }

  .god-plot::before{
    content:"";
    position:absolute;
    inset:0;
    background:
      radial-gradient(circle at 50% 46%, rgba(255,255,230,.35) 0 8%, transparent 18%),
      linear-gradient(transparent 0 94%, rgba(255,255,255,.12) 94% 100%);
    background-size:100% 100%, 100% 4px;
    opacity:.38;
    pointer-events:none;
  }

  .god-plot-inner{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:12px;
    text-align:center;
    line-height:1.4;
    font-size:18px;
    font-weight:900;
    color:#4b2f03;
    text-shadow:
      0 1px 0 rgba(255,255,255,.35),
      0 0 10px rgba(255,248,210,.18);
  }

  .god-plot-inner.ready{
    color:#6b1803;
  }

  .god-status{
    min-height:44px;
    font-size:13px;
    text-align:center;
    color:#4f3911;
    line-height:1.65;
  }

  .god-actions{
    margin-top:12px;
    display:grid;
    gap:8px;
  }

  .god-actions-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
  }

  .btn{
    width:100%;
    min-height:50px;
    border:0;
    border-radius:14px;
    cursor:pointer;
    font-size:18px;
    font-weight:900;
    font-family:"DotGothic16","MS Gothic",sans-serif;
    color:var(--btnText);
    background:linear-gradient(180deg, #fffef8 0%, #efe7d0 100%);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.95),
      0 8px 18px rgba(0,0,0,.22);
    border:2px solid rgba(120,93,45,.42);
  }

  .btn.primary{
    background:linear-gradient(180deg, #ffe98a 0%, #efc445 100%);
  }

  .btn.warn{
    background:linear-gradient(180deg, #ffd7dd 0%, #ffb4c0 100%);
  }

  .btn:disabled{
    opacity:.45;
    cursor:not-allowed;
  }

  .btn:active{
    transform:translateY(1px);
  }

  .altar-body{
    padding:12px;
  }

  .altar-note{
    text-align:center;
    color:#5a421f;
    font-size:13px;
    line-height:1.7;
    margin-bottom:10px;
  }

  .altar-group{
    margin-bottom:12px;
    border-radius:14px;
    overflow:hidden;
    background:rgba(255,255,255,.35);
    border:1px solid rgba(121,90,39,.16);
  }
  .altar-group:last-child{ margin-bottom:0; }

  .altar-group-title{
    padding:10px 12px;
    background:linear-gradient(180deg, rgba(60,35,104,.95), rgba(42,21,79,.95));
    color:#fff1cb;
    font-size:14px;
    font-weight:900;
    letter-spacing:.04em;
  }

  .altar-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
    padding:10px;
  }

  .altar-card{
    min-height:120px;
    border-radius:12px;
    border:1px solid rgba(121,90,39,.18);
    background:linear-gradient(180deg, rgba(255,255,255,.65), rgba(236,226,204,.95));
    padding:6px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    gap:6px;
    color:#2f2417;
    line-height:1.35;
    font-size:11px;
    font-weight:900;
    text-align:center;
  }

  .altar-card.locked{
    background:linear-gradient(180deg, rgba(40,33,28,.88), rgba(24,20,18,.96));
    color:#9a8d79;
    border:1px dashed rgba(255,223,140,.22);
  }

  .altar-card-thumb{
    width:100%;
    aspect-ratio:3/4;
    border-radius:8px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,.12);
    background:linear-gradient(180deg, var(--cardBg), var(--cardBg2));
    display:flex;
    align-items:center;
    justify-content:center;
    color:#ffe8b0;
    font-size:11px;
    line-height:1.4;
    position:relative;
  }

  .altar-card-thumb img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  .altar-card-id{
    font-family:"Press Start 2P", monospace;
    font-size:8px;
    color:#7b6041;
    line-height:1.5;
  }

  .altar-card.locked .altar-card-id{
    color:#7b7267;
  }

  .bonus-box{
    margin-top:12px;
    border-radius:14px;
    overflow:hidden;
    background:linear-gradient(180deg, rgba(91,41,149,.95), rgba(42,19,70,.98));
    border:1px solid rgba(255,223,140,.22);
    color:#fff7e9;
  }

  .bonus-head{
    padding:10px 12px;
    font-family:"Press Start 2P", monospace;
    font-size:10px;
    line-height:1.6;
    color:#ffe7a3;
    border-bottom:1px solid rgba(255,223,140,.14);
  }

  .bonus-body{
    padding:12px;
    text-align:center;
    line-height:1.7;
    font-size:13px;
  }

  .bonus-badge{
    display:inline-block;
    padding:5px 8px;
    border-radius:999px;
    background:linear-gradient(180deg, #ffe8a3, #e1b04a);
    color:#231704;
    font-family:"Press Start 2P", monospace;
    font-size:9px;
    line-height:1.5;
    margin-bottom:8px;
  }

  .actions{
    padding:12px 14px 22px;
    display:grid;
    gap:8px;
  }

  .history-btn{
    width:100%;
    min-height:54px;
    border:0;
    border-radius:16px;
    cursor:pointer;
    font-size:18px;
    font-weight:900;
    font-family:"Press Start 2P", monospace;
    color:var(--btnText);
    background:linear-gradient(180deg, #fffef8 0%, #efe7d0 100%);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.95),
      0 8px 18px rgba(0,0,0,.22);
    border:2px solid rgba(120,93,45,.42);
    line-height:1.5;
    letter-spacing:.04em;
  }

  .subinfo{
    padding:0 16px 18px;
    text-align:center;
    color:var(--muted);
    font-size:12px;
    line-height:1.8;
  }

  .modal{
    position:fixed;
    inset:0;
    background:rgba(6,3,14,.72);
    display:none;
    align-items:center;
    justify-content:center;
    padding:18px;
    z-index:50;
    backdrop-filter:blur(4px);
  }

  .modal.show{ display:flex; }

  .modal-card{
    width:min(100%, 520px);
    max-height:min(88vh, 760px);
    overflow:auto;
    border-radius:20px;
    background:linear-gradient(180deg, rgba(63,29,111,.98), rgba(24,12,46,.98));
    border:2px solid rgba(255,223,140,.45);
    box-shadow:0 24px 44px rgba(0,0,0,.52);
    padding:16px;
  }

  .modal-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-bottom:12px;
  }

  .modal-title{
    font-size:18px;
    font-weight:900;
    color:#ffeab2;
    letter-spacing:.08em;
    line-height:1.5;
  }

  .close-btn{
    width:42px;
    height:42px;
    border-radius:12px;
    border:0;
    cursor:pointer;
    font-size:20px;
    font-weight:900;
    color:#2a1d0a;
    background:linear-gradient(180deg, #fffef7, #e8dcc0);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.9);
  }

  .history-list{
    display:grid;
    gap:10px;
  }

  .history-item{
    display:grid;
    grid-template-columns:96px 1fr;
    gap:10px;
    align-items:start;
    padding:14px 12px;
    border-radius:14px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,223,140,.16);
  }

  .history-month{
    font-family:"Press Start 2P", monospace;
    font-size:10px;
    line-height:1.6;
    color:#ffe0a0;
    padding-top:2px;
  }

  .history-title{
    font-size:16px;
    font-weight:900;
    color:#fff8ea;
    line-height:1.4;
    margin-bottom:6px;
  }

  .history-stats{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:4px 10px;
    font-size:12px;
    color:#dbcfae;
    line-height:1.55;
  }

  .empty{
    padding:20px 14px;
    border-radius:14px;
    text-align:center;
    color:#dbcfae;
    background:rgba(255,255,255,.05);
    border:1px dashed rgba(255,223,140,.22);
    line-height:1.8;
    font-size:14px;
  }

  .seed-select-list{
    display:grid;
    gap:10px;
  }

  .seed-select-btn{
    width:100%;
    border:1px solid rgba(255,223,140,.16);
    background:rgba(255,255,255,.06);
    border-radius:14px;
    padding:12px;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    text-align:left;
    cursor:pointer;
  }

  .seed-select-name{
    font-size:15px;
    font-weight:900;
    color:#fff7e8;
    line-height:1.4;
  }

  .seed-select-sub{
    margin-top:4px;
    font-size:12px;
    color:#dbcfae;
    line-height:1.5;
  }

  .seed-select-count{
    font-family:"Press Start 2P", monospace;
    color:#ffe8a3;
    font-size:10px;
    line-height:1.5;
    white-space:nowrap;
  }

  .trial-wrap{
    display:grid;
    gap:14px;
  }

  .trial-main{
    text-align:center;
    color:#fff7e9;
    font-size:18px;
    font-weight:900;
    line-height:1.5;
  }

  .trial-sub{
    text-align:center;
    color:#dbcfae;
    font-size:13px;
    line-height:1.7;
  }

  .timing-box{
    padding:14px;
    border-radius:16px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,223,140,.16);
  }

  .timing-track{
    position:relative;
    width:100%;
    height:26px;
    border-radius:999px;
    background:rgba(0,0,0,.28);
    overflow:hidden;
    border:1px solid rgba(255,255,255,.14);
  }

  .timing-zone{
    position:absolute;
    top:0;
    bottom:0;
    left:40%;
    width:20%;
    background:linear-gradient(180deg, rgba(255,219,114,.95), rgba(255,161,64,.95));
    box-shadow:0 0 14px rgba(255,184,84,.28);
  }

  .timing-marker{
    position:absolute;
    top:-4px;
    width:12px;
    height:34px;
    border-radius:6px;
    background:#fff;
    box-shadow:0 0 10px rgba(255,255,255,.32);
  }

  .choice-grid{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:10px;
  }

  .choice-btn{
    min-height:78px;
    border-radius:14px;
    border:1px solid rgba(255,223,140,.18);
    background:rgba(255,255,255,.08);
    color:#fff6e6;
    font-size:15px;
    font-weight:900;
    line-height:1.5;
    padding:10px 8px;
    cursor:pointer;
  }

  .trial-result{
    padding:12px;
    border-radius:14px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,223,140,.16);
    text-align:center;
    color:#fff7e8;
    line-height:1.7;
    font-size:14px;
  }

  .reward-box{
    display:grid;
    gap:12px;
  }

  .reward-card{
    border-radius:16px;
    overflow:hidden;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,223,140,.16);
    padding:10px;
  }

  .reward-card-thumb{
    width:min(280px, 100%);
    aspect-ratio:3/4;
    margin:0 auto 10px;
    border-radius:12px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,.14);
    background:linear-gradient(180deg, var(--cardBg), var(--cardBg2));
    display:flex;
    align-items:center;
    justify-content:center;
    color:#ffe8b0;
    text-align:center;
    line-height:1.5;
    padding:10px;
    position:relative;
  }

<script>
(() => {
  "use strict";

  /* =========================================================
     storage keys
  ========================================================= */
  const LS_MONTHLY  = "ttc_monthly_stats_v1";
  const LS_HISTORY  = "ttc_monthly_history_v1";
  const LS_GODFARM  = "ttc_godfarm_v1";
  const LS_BOOK     = "tf_v1_book";
  const LS_INV      = "tf_v1_inv";
  const LS_GODBONUS = "ttc_god_bonus_v1";

  const GROW_MS = 30 * 60 * 1000;
  const HISTORY_LIMIT = 24;

  /* =========================================================
     threshold
  ========================================================= */
  const NORMAL_THRESHOLDS = {
    harvest: 500,
    sales: 50000,
    fishing: 2000,
    tower: 30
  };

  const GOD_THRESHOLDS = {
    harvest: 3000,
    sales: 300000,
    fishing: 5000,
    tower: 50
  };

  /* =========================================================
     data
  ========================================================= */
  const IMG_BASE = "./assets/images/god/";

  const GOD_SEEDS = [
    { id:"seed_god_yaki",  name:"焼き神のタネ", short:"焼き神", icon:"🔥", statKey:"harvest" },
    { id:"seed_god_shop",  name:"露店神のタネ", short:"露店神", icon:"🪙", statKey:"sales" },
    { id:"seed_god_fish",  name:"釣り神のタネ", short:"釣り神", icon:"🎣", statKey:"fishing" },
    { id:"seed_god_tower", name:"塔神のタネ",   short:"塔神",   icon:"🗼", statKey:"tower" }
  ];

  const TITLE_TO_SEED = {
    "神焼きの極": "seed_god_yaki",
    "黄金露店王": "seed_god_shop",
    "深海の釣神": "seed_god_fish",
    "積み上げの神": "seed_god_tower"
  };

  const GOD_CARD_POOLS = {
    seed_god_yaki: [
      { id:"SP-GOD-YAKI-01", name:"焼き神の証", rarity:"SP-N",  group:"yaki",  img: IMG_BASE + "yaki_001.png" },
      { id:"SP-GOD-YAKI-02", name:"炎のヘラ神", rarity:"SP-SR", group:"yaki",  img: IMG_BASE + "yaki_002.png" },
      { id:"SP-GOD-YAKI-03", name:"焼きの極意", rarity:"SP-UR", group:"yaki",  img: IMG_BASE + "yaki_003.png" }
    ],
    seed_god_shop: [
      { id:"SP-GOD-SHOP-01", name:"黄金露店王", rarity:"SP-N",  group:"shop",  img: IMG_BASE + "shop_001.png" },
      { id:"SP-GOD-SHOP-02", name:"商売繁盛神", rarity:"SP-SR", group:"shop",  img: IMG_BASE + "shop_002.png" },
      { id:"SP-GOD-SHOP-03", name:"オクト守護神", rarity:"SP-UR", group:"shop", img: IMG_BASE + "shop_003.png" }
    ],
    seed_god_fish: [
      { id:"SP-GOD-FISH-01", name:"深海の釣神",   rarity:"SP-N",  group:"fish",  img: IMG_BASE + "fish_001.png" },
      { id:"SP-GOD-FISH-02", name:"潮流の支配者", rarity:"SP-SR", group:"fish",  img: IMG_BASE + "fish_002.png" },
      { id:"SP-GOD-FISH-03", name:"伝説の大ダコ", rarity:"SP-UR", group:"fish",  img: IMG_BASE + "fish_003.png" }
    ],
    seed_god_tower: [
      { id:"SP-GOD-TOWER-01", name:"積み上げの神",  rarity:"SP-N",  group:"tower", img: IMG_BASE + "tower_001.png" },
      { id:"SP-GOD-TOWER-02", name:"天空の塔神",    rarity:"SP-SR", group:"tower", img: IMG_BASE + "tower_002.png" },
      { id:"SP-GOD-TOWER-03", name:"無限積層の王",  rarity:"SP-UR", group:"tower", img: IMG_BASE + "tower_003.png" }
    ]
  };

  const GOD_BONUS_CARD = {
    id:"SP-GOD-BONUS-01",
    name:"四神の祝福",
    rarity:"SP-LR",
    img: IMG_BASE + "bonus_001.png"
  };

  const ALTAR_GROUPS = [
    { title:"🔥 焼き神", seedId:"seed_god_yaki", ids:["SP-GOD-YAKI-01","SP-GOD-YAKI-02","SP-GOD-YAKI-03"] },
    { title:"🪙 露店神", seedId:"seed_god_shop", ids:["SP-GOD-SHOP-01","SP-GOD-SHOP-02","SP-GOD-SHOP-03"] },
    { title:"🎣 釣り神", seedId:"seed_god_fish", ids:["SP-GOD-FISH-01","SP-GOD-FISH-02","SP-GOD-FISH-03"] },
    { title:"🗼 塔神",   seedId:"seed_god_tower", ids:["SP-GOD-TOWER-01","SP-GOD-TOWER-02","SP-GOD-TOWER-03"] }
  ];

  const FAIL_RATES    = { N:80, SR:18, UR:2 };
  const SUCCESS_RATES = { N:40, SR:40, UR:20 };

  /* =========================================================
     refs
  ========================================================= */
  const harvestValue = document.getElementById("harvestValue");
  const salesValue   = document.getElementById("salesValue");
  const fishingValue = document.getElementById("fishingValue");
  const towerValue   = document.getElementById("towerValue");
  const mainTitle    = document.getElementById("mainTitle");
  const monthInfo    = document.getElementById("monthInfo");

  const seedGrid     = document.getElementById("seedGrid");
  const godPlotInner = document.getElementById("godPlotInner");
  const godStatus    = document.getElementById("godStatus");
  const altarRoot    = document.getElementById("altarRoot");
  const bonusBox     = document.getElementById("bonusBox");
  const bonusBody    = document.getElementById("bonusBody");

  const plantBtn     = document.getElementById("plantBtn");
  const harvestBtn   = document.getElementById("harvestBtn");
  const clearBtn     = document.getElementById("clearBtn");

  const historyModal   = document.getElementById("historyModal");
  const seedModal      = document.getElementById("seedModal");
  const trialModal     = document.getElementById("trialModal");
  const rewardModal    = document.getElementById("rewardModal");

  const historyList    = document.getElementById("historyList");
  const seedModalList  = document.getElementById("seedModalList");
  const trialBody      = document.getElementById("trialBody");
  const rewardBody     = document.getElementById("rewardBody");

  const openHistoryBtn = document.getElementById("openHistoryBtn");
  const closeHistoryBtn= document.getElementById("closeHistoryBtn");
  const closeSeedBtn   = document.getElementById("closeSeedBtn");
  const closeTrialBtn  = document.getElementById("closeTrialBtn");
  const closeRewardBtn = document.getElementById("closeRewardBtn");

  const toastEl = document.getElementById("toast");

  /* =========================================================
     utils
  ========================================================= */
  function toast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(toast._t);
    toast._t = setTimeout(() => {
      toastEl.classList.remove("show");
    }, 2200);
  }

  function escapeHtml(str){
    return String(str)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");
  }

  function getMonthKey(date = new Date()){
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, "0");
    return `${y}-${m}`;
  }

  function fmtNum(n){
    return Number(n || 0).toLocaleString("ja-JP");
  }

  function fmtRemain(ms){
    if (ms <= 0) return "00:00:00";
    const s = Math.floor(ms / 1000);
    const hh = String(Math.floor(s / 3600)).padStart(2, "0");
    const mm = String(Math.floor((s % 3600) / 60)).padStart(2, "0");
    const ss = String(s % 60).padStart(2, "0");
    return `${hh}:${mm}:${ss}`;
  }

  function openModal(el){
    el.classList.add("show");
    el.setAttribute("aria-hidden", "false");
    document.body.style.overflow = "hidden";
  }

  function closeModal(el){
    el.classList.remove("show");
    el.setAttribute("aria-hidden", "true");

    const anyOpen =
      historyModal.classList.contains("show") ||
      seedModal.classList.contains("show") ||
      trialModal.classList.contains("show") ||
      rewardModal.classList.contains("show");

    document.body.style.overflow = anyOpen ? "hidden" : "";
  }

  function randInt(min, max){
    return min + Math.floor(Math.random() * (max - min + 1));
  }

  function weightedPick(rates){
    const total = Number(rates.N || 0) + Number(rates.SR || 0) + Number(rates.UR || 0);
    if (total <= 0) return "N";

    let r = Math.random() * total;
    r -= Number(rates.UR || 0);
    if (r <= 0) return "UR";
    r -= Number(rates.SR || 0);
    if (r <= 0) return "SR";
    return "N";
  }

  function seedName(seedId){
    return GOD_SEEDS.find(v => v.id === seedId)?.name || seedId;
  }

  function getSeedShort(seedId){
    return GOD_SEEDS.find(v => v.id === seedId)?.short || seedId;
  }

  function getSeedIcon(seedId){
    return GOD_SEEDS.find(v => v.id === seedId)?.icon || "⭐";
  }

  function allGodCards(){
    return Object.values(GOD_CARD_POOLS).flat();
  }

  function cardById(id){
    return allGodCards().find(v => v.id === id) || (id === GOD_BONUS_CARD.id ? GOD_BONUS_CARD : null);
  }

  function normalizeGrantedSeeds(value, legacyId = "", legacyName = ""){
    let arr = [];

    if (Array.isArray(value)) {
      arr = value.map(v => ({
        id: String(v?.id || ""),
        name: String(v?.name || "")
      })).filter(v => v.id);
    } else if (legacyId) {
      arr = [{ id:String(legacyId), name:String(legacyName || seedName(legacyId)) }];
    }

    return arr;
  }

  function getGrantedSeedsFromStats(stats){
    const seeds = [];

    if (Number(stats.harvest || 0) >= GOD_THRESHOLDS.harvest) {
      seeds.push({ id:"seed_god_yaki", name:seedName("seed_god_yaki") });
    }
    if (Number(stats.sales || 0) >= GOD_THRESHOLDS.sales) {
      seeds.push({ id:"seed_god_shop", name:seedName("seed_god_shop") });
    }
    if (Number(stats.fishing || 0) >= GOD_THRESHOLDS.fishing) {
      seeds.push({ id:"seed_god_fish", name:seedName("seed_god_fish") });
    }
    if (Number(stats.tower || 0) >= GOD_THRESHOLDS.tower) {
      seeds.push({ id:"seed_god_tower", name:seedName("seed_god_tower") });
    }

    return seeds;
  }

  function getMainTitleFromStats(stats){
    const harvest = Number(stats.harvest || 0);
    const sales   = Number(stats.sales || 0);
    const fishing = Number(stats.fishing || 0);
    const tower   = Number(stats.tower || 0);

    const godCount =
      (harvest >= GOD_THRESHOLDS.harvest ? 1 : 0) +
      (sales   >= GOD_THRESHOLDS.sales   ? 1 : 0) +
      (fishing >= GOD_THRESHOLDS.fishing ? 1 : 0) +
      (tower   >= GOD_THRESHOLDS.tower   ? 1 : 0);

    if (godCount >= 4) return "四神到達者";
    if (harvest >= GOD_THRESHOLDS.harvest) return "神焼きの極";
    if (sales   >= GOD_THRESHOLDS.sales)   return "黄金露店王";
    if (fishing >= GOD_THRESHOLDS.fishing) return "深海の釣神";
    if (tower   >= GOD_THRESHOLDS.tower)   return "積み上げの神";

    if (harvest >= NORMAL_THRESHOLDS.harvest) return "焼きの達人";
    if (sales   >= NORMAL_THRESHOLDS.sales)   return "露店王";
    if (fishing >= NORMAL_THRESHOLDS.fishing) return "釣り神";
    if (tower   >= NORMAL_THRESHOLDS.tower)   return "塔の覇者";

    return "タコ民";
  }

  function formatGrantedSeedsText(grantedSeeds){
    if (!grantedSeeds || !grantedSeeds.length) return "🌱 なし";
    return "🌱 " + grantedSeeds.map(v => v.name).join(" / ");
  }

  /* =========================================================
     monthly stats
  ========================================================= */
  function createDefaultMonthly(){
    return {
      monthKey: getMonthKey(),
      harvest: 0,
      sales: 0,
      fishing: 0,
      tower: 0
    };
  }

  function normalizeMonthly(v){
    if (!v || typeof v !== "object") return createDefaultMonthly();
    return {
      monthKey: String(v.monthKey || getMonthKey()),
      harvest: Number(v.harvest || 0),
      sales:   Number(v.sales || 0),
      fishing: Number(v.fishing || 0),
      tower:   Number(v.tower || 0)
    };
  }

  function loadMonthly(){
    try{
      const raw = localStorage.getItem(LS_MONTHLY);
      if (!raw){
        const def = createDefaultMonthly();
        localStorage.setItem(LS_MONTHLY, JSON.stringify(def));
        return def;
      }
      const parsed = JSON.parse(raw);
      const safe = normalizeMonthly(parsed);
      localStorage.setItem(LS_MONTHLY, JSON.stringify(safe));
      return safe;
    }catch(_){
      const def = createDefaultMonthly();
      localStorage.setItem(LS_MONTHLY, JSON.stringify(def));
      return def;
    }
  }

  function saveMonthly(v){
    localStorage.setItem(LS_MONTHLY, JSON.stringify(normalizeMonthly(v)));
  }

  /* =========================================================
     history
  ========================================================= */
  function normalizeHistoryItem(item){
    if (!item || typeof item !== "object") return null;
    return {
      monthKey: String(item.monthKey || ""),
      title: String(item.title || "タコ民"),
      harvest: Number(item.harvest || 0),
      sales: Number(item.sales || 0),
      fishing: Number(item.fishing || 0),
      tower: Number(item.tower || 0),
      grantedSeeds: normalizeGrantedSeeds(item.grantedSeeds, item.grantedSeedId, item.grantedSeedName)
    };
  }

  function loadHistory(){
    try{
      const raw = localStorage.getItem(LS_HISTORY);
      if (!raw) return [];
      const parsed = JSON.parse(raw);
      if (!Array.isArray(parsed)) return [];
      return parsed
        .map(normalizeHistoryItem)
        .filter(Boolean)
        .filter(v => v.monthKey);
    }catch(_){
      return [];
    }
  }

  function saveHistory(list){
    const safe = Array.isArray(list) ? list : [];
    const normalized = safe
      .map(normalizeHistoryItem)
      .filter(Boolean)
      .filter(v => v.monthKey)
      .slice(0, HISTORY_LIMIT);

    localStorage.setItem(LS_HISTORY, JSON.stringify(normalized));
  }

  /* =========================================================
     inventory
  ========================================================= */
  function defaultInv(){
    const inv = { ver:1, seed:{}, water:{}, fert:{} };
    for (const s of GOD_SEEDS){
      inv.seed[s.id] = 0;
    }
    return inv;
  }

  function loadInv(){
    try{
      const raw = localStorage.getItem(LS_INV);
      if (!raw){
        const def = defaultInv();
        localStorage.setItem(LS_INV, JSON.stringify(def));
        return def;
      }

      const inv = JSON.parse(raw);
      if (!inv || typeof inv !== "object"){
        const def = defaultInv();
        localStorage.setItem(LS_INV, JSON.stringify(def));
        return def;
      }

      inv.seed = inv.seed || {};
      inv.water = inv.water || {};
      inv.fert = inv.fert || {};

      for (const s of GOD_SEEDS){
        if (!(s.id in inv.seed)) inv.seed[s.id] = 0;
      }

      return inv;
    }catch(_){
      const def = defaultInv();
      localStorage.setItem(LS_INV, JSON.stringify(def));
      return def;
    }
  }

  function saveInv(inv){
    localStorage.setItem(LS_INV, JSON.stringify(inv));
  }

  function addSeed(seedId, count){
    const inv = loadInv();
    inv.seed[seedId] = Number(inv.seed[seedId] || 0) + Math.max(0, Math.floor(Number(count) || 0));
    saveInv(inv);
  }

  function consumeSeed(seedId, count){
    const inv = loadInv();
    const cur = Number(inv.seed[seedId] || 0);
    const need = Math.max(0, Math.floor(Number(count) || 0));
    if (cur < need) return false;

    inv.seed[seedId] = cur - need;
    saveInv(inv);
    return true;
  }

  /* =========================================================
     book
  ========================================================= */
  function loadBook(){
    try{
      const raw = localStorage.getItem(LS_BOOK);
      if (!raw) return { ver:1, got:{} };

      const parsed = JSON.parse(raw);
      if (!parsed || typeof parsed !== "object") return { ver:1, got:{} };

      parsed.got = parsed.got && typeof parsed.got === "object" ? parsed.got : {};
      return parsed;
    }catch(_){
      return { ver:1, got:{} };
    }
  }

  function saveBook(book){
    localStorage.setItem(LS_BOOK, JSON.stringify(book));
  }

  function hasCard(cardId){
    const book = loadBook();
    return !!book.got?.[cardId];
  }

  function addToBook(card){
    if (!card || !card.id) return;

    const book = loadBook();
    if (!book.got) book.got = {};

    if (book.got[card.id]) {
      book.got[card.id].count  = Number(book.got[card.id].count || 0) + 1;
      book.got[card.id].name   = card.name;
      book.got[card.id].img    = card.img || "";
      book.got[card.id].rarity = card.rarity || "SP";
      book.got[card.id].lastAt = Date.now();
    } else {
      book.got[card.id] = {
        id: card.id,
        name: card.name,
        img: card.img || "",
        rarity: card.rarity || "SP",
        count: 1,
        at: Date.now(),
        lastAt: Date.now()
      };
    }

    saveBook(book);
  }

  /* =========================================================
     god farm
  ========================================================= */
  function defaultFarm(){
    return {
      plot: {
        state:"EMPTY",
        seedId:null,
        startAt:0,
        readyAt:0
      }
    };
  }

  function loadFarm(){
    try{
      const raw = localStorage.getItem(LS_GODFARM);
      if (!raw){
        const def = defaultFarm();
        localStorage.setItem(LS_GODFARM, JSON.stringify(def));
        return def;
      }

      const parsed = JSON.parse(raw);
      if (!parsed || typeof parsed !== "object" || !parsed.plot){
        const def = defaultFarm();
        localStorage.setItem(LS_GODFARM, JSON.stringify(def));
        return def;
      }

      return {
        plot: {
          state: String(parsed.plot.state || "EMPTY"),
          seedId: parsed.plot.seedId || null,
          startAt: Number(parsed.plot.startAt || 0),
          readyAt: Number(parsed.plot.readyAt || 0)
        }
      };
    }catch(_){
      const def = defaultFarm();
      localStorage.setItem(LS_GODFARM, JSON.stringify(def));
      return def;
    }
  }

  function saveFarm(farm){
    localStorage.setItem(LS_GODFARM, JSON.stringify(farm));
  }

  function syncFarmReady(){
    const farm = loadFarm();
    if (farm.plot.state === "GROW" && Date.now() >= Number(farm.plot.readyAt || 0)) {
      farm.plot.state = "READY";
      saveFarm(farm);
    }
  }

  /* =========================================================
     month rollover + auto grant
     月が変わった最初のアクセス時に前月を確定
     ★ 部門ごと最大4個付与
  ========================================================= */
  function isMeaningfulMonth(stats){
    return (
      Number(stats.harvest || 0) > 0 ||
      Number(stats.sales || 0) > 0 ||
      Number(stats.fishing || 0) > 0 ||
      Number(stats.tower || 0) > 0
    );
  }

  function rolloverIfNeeded(){
    const currentKey = getMonthKey();
    const monthly = loadMonthly();

    if (monthly.monthKey === currentKey) return monthly;

    const history = loadHistory();

    if (
      monthly.monthKey &&
      isMeaningfulMonth(monthly) &&
      !history.some(v => v.monthKey === monthly.monthKey)
    ) {
      const title = getMainTitleFromStats(monthly);
      const grantedSeeds = getGrantedSeedsFromStats(monthly);

      grantedSeeds.forEach(seed => addSeed(seed.id, 1));

      history.unshift({
        monthKey: monthly.monthKey,
        title,
        harvest: Number(monthly.harvest || 0),
        sales: Number(monthly.sales || 0),
        fishing: Number(monthly.fishing || 0),
        tower: Number(monthly.tower || 0),
        grantedSeeds
      });

      saveHistory(history);

      if (grantedSeeds.length) {
        toast(`${monthly.monthKey} 報酬確定：${grantedSeeds.map(v => v.name).join(" / ")} を授かりました`);
      } else {
        toast(`${monthly.monthKey} の月間結果を確定しました`);
      }
    }

    const fresh = {
      monthKey: currentKey,
      harvest: 0,
      sales: 0,
      fishing: 0,
      tower: 0
    };
    saveMonthly(fresh);
    return fresh;
  }

  /* =========================================================
     reward draw
  ========================================================= */
  function drawReward(seedId, success){
    const pool = GOD_CARD_POOLS[seedId] || [];
    if (!pool.length) return null;

    const rarity = weightedPick(success ? SUCCESS_RATES : FAIL_RATES);
    const rarityKey =
      rarity === "N"  ? "SP-N"  :
      rarity === "SR" ? "SP-SR" :
      "SP-UR";

    const unowned = pool.filter(card => !hasCard(card.id));
    const source = unowned.length ? unowned : pool;

    let candidates = source.filter(card => card.rarity === rarityKey);
    if (!candidates.length) candidates = source.filter(card => card.rarity === "SP-SR");
    if (!candidates.length) candidates = source.filter(card => card.rarity === "SP-N");
    if (!candidates.length) candidates = source;

    return candidates[Math.floor(Math.random() * candidates.length)];
  }

  /* =========================================================
     complete bonus
  ========================================================= */
  function hasGroupComplete(seedId){
    const ids = (GOD_CARD_POOLS[seedId] || []).map(v => v.id);
    return ids.every(id => hasCard(id));
  }

  function hasAllGroupsComplete(){
    return GOD_SEEDS.every(seed => hasGroupComplete(seed.id));
  }

  function loadBonusState(){
    try{
      const raw = localStorage.getItem(LS_GODBONUS);
      if (!raw) return { granted:false };

      const parsed = JSON.parse(raw);
      if (!parsed || typeof parsed !== "object") return { granted:false };

      return { granted: !!parsed.granted };
    }catch(_){
      return { granted:false };
    }
  }

  function saveBonusState(v){
    localStorage.setItem(LS_GODBONUS, JSON.stringify({ granted: !!v.granted }));
  }

  function ensureCompleteBonus(){
    const state = loadBonusState();
    if (state.granted) return false;
    if (!hasAllGroupsComplete()) return false;

    addToBook(GOD_BONUS_CARD);
    saveBonusState({ granted:true });
    return true;
  }

  /* =========================================================

  const Trial = {

    seedId:null,

  function resetTrialState(){
    Trial.running = false;
    Trial.seedId = null;
    Trial.done = null;
  }

  function openTimingTrial(title, subtitle, done){
    trialBody.innerHTML = `
      <div class="trial-wrap">
        <div class="trial-main">${escapeHtml(title)}</div>
        <div class="trial-sub">${escapeHtml(subtitle)}</div>

        <div class="timing-box">
          <div class="timing-track" id="timingTrack">
            <div class="timing-zone"></div>
            <div class="timing-marker" id="timingMarker"></div>
          </div>
        </div>

        <button class="btn primary" id="trialStopBtn" type="button">STOP</button>
      </div>
    `;

    openModal(trialModal);

    const track = document.getElementById("timingTrack");
    const marker = document.getElementById("timingMarker");
    const stopBtn = document.getElementById("trialStopBtn");

    let x = 0;
    let dir = 1;
    let raf = 0;
    let stopped = false;

    function loop(){
      const width = Math.max(0, track.clientWidth - 12);
      x += dir * 4.5;

      if (x <= 0){ x = 0; dir = 1; }
      if (x >= width){ x = width; dir = -1; }

      marker.style.left = x + "px";
      raf = requestAnimationFrame(loop);
    }

    loop();

    stopBtn.addEventListener("click", () => {
      if (stopped) return;
      stopped = true;
      cancelAnimationFrame(raf);

      const width = track.clientWidth;
      const center = x + 6;
      const left = width * 0.40;
      const right = width * 0.60;
      const success = center >= left && center <= right;

      trialBody.innerHTML = `
        <div class="trial-wrap">
          <div class="trial-result">
            ${success ? "試練成功！ 神気が高まりました。" : "試練失敗。だが神の恵みは失われない。"}
          </div>
          <button class="btn primary" id="trialResultBtn" type="button">結果へ</button>
        </div>
      `;

      document.getElementById("trialResultBtn").addEventListener("click", () => {
        closeModal(trialModal);
        resetTrialState();
        done(success);
      });
    });
  }

  function openChoiceTrial(title, subtitle, choices, answerIndex, done){
    trialBody.innerHTML = `
      <div class="trial-wrap">
        <div class="trial-main">${escapeHtml(title)}</div>
        <div class="trial-sub">${escapeHtml(subtitle)}</div>
        <div class="choice-grid" id="choiceGrid"></div>
      </div>
    `;

    openModal(trialModal);

    const grid = document.getElementById("choiceGrid");
    choices.forEach((label, idx) => {
      const btn = document.createElement("button");
      btn.className = "choice-btn";
      btn.type = "button";
      btn.textContent = label;
      btn.addEventListener("click", () => {
        const success = idx === answerIndex;

        trialBody.innerHTML = `
          <div class="trial-wrap">
            <div class="trial-result">
              ${success ? "試練成功！ 神の導きを掴んだ。" : "試練失敗。だが神の欠片は残った。"}
            </div>
            <button class="btn primary" id="trialResultBtn" type="button">結果へ</button>
          </div>
        `;

        document.getElementById("trialResultBtn").addEventListener("click", () => {
          closeModal(trialModal);
          resetTrialState();
          done(success);
        });
      });
      grid.appendChild(btn);
    });
  }

  function openTrial(seedId, done){
    Trial.running = true;
    Trial.seedId = seedId;
    Trial.done = done;

    if (seedId === "seed_god_yaki") {
      return openTimingTrial("焼き神の試練", "動く印を止めて、焼きの芯を見抜け。", done);
    }

    if (seedId === "seed_god_tower") {
      return openTimingTrial("塔神の試練", "積み上げの一点を見極めろ。", done);
    }

    if (seedId === "seed_god_shop") {
      return openChoiceTrial(
        "露店神の試練",
        "神気を帯びた客を見抜け。",
        ["行列の客", "常連の客", "無言の客"],
        randInt(0, 2),
        done
      );
    }

    if (seedId === "seed_god_fish") {
      return openChoiceTrial(
        "釣り神の試練",
        "神気の宿る浮きを選べ。",
        ["左の浮き", "中央の浮き", "右の浮き"],
        randInt(0, 2),
        done
      );
    }

    closeModal(trialModal);
    resetTrialState();
    done(false);
  }

  function cancelTrial(){
    if (!Trial.running) {
      closeModal(trialModal);
      return;
    }

    const ok = confirm("試練を中断しますか？\n中断すると今回の収穫はキャンセルされます。");
    if (!ok) return;

    resetTrialState();
    closeModal(trialModal);
    toast("試練を中断しました");
  }

  /* =========================================================
     harvest
  ========================================================= */
  function harvest(){
    syncFarmReady();
    const farm = loadFarm();

    if (farm.plot.state !== "READY" || !farm.plot.seedId) {
      toast("まだ収穫できません");
      return;
    }

    const seedId = farm.plot.seedId;

    openTrial(seedId, (success) => {
      const reward = drawReward(seedId, success);

      if (!reward) {
        toast("神カード抽選に失敗しました");
        return;
      }

      addToBook(reward);
      saveFarm(defaultFarm());
      renderAll();
      renderRewardCard(reward, success, seedId, false);

      const gotBonus = ensureCompleteBonus();
      if (gotBonus) {
        setTimeout(() => {
          renderAll();
          renderRewardCard(GOD_BONUS_CARD, true, seedId, true);
        }, 400);
      }
    });
  }

      return;
    }

    if (historyModal.classList.contains("show")) {
      closeModal(historyModal);
    }
  });

  /* =========================================================
     buttons
  ========================================================= */
  plantBtn.addEventListener("click", openSeedSelect);
  harvestBtn.addEventListener("click", harvest);
  clearBtn.addEventListener("click", clearFarm);

  /* =========================================================
     tick
  ========================================================= */
  setInterval(() => {
    renderFarm();
  }, 1000);

  /* =========================================================
     dev helper
  ========================================================= */
  window.ttcSetMonthly = function(data){
    const cur = loadMonthly();
    const next = {
      monthKey: cur.monthKey || getMonthKey(),
      harvest: Number(data?.harvest ?? cur.harvest ?? 0),
      sales: Number(data?.sales ?? cur.sales ?? 0),
      fishing: Number(data?.fishing ?? cur.fishing ?? 0),
      tower: Number(data?.tower ?? cur.tower ?? 0)
    };
    saveMonthly(next);
    renderAll();
  };

  window.ttcAddMonthly = function(data){
    const cur = loadMonthly();
    const next = {
      monthKey: cur.monthKey || getMonthKey(),
      harvest: Number(cur.harvest || 0) + Number(data?.harvest || 0),
      sales: Number(cur.sales || 0) + Number(data?.sales || 0),
      fishing: Number(cur.fishing || 0) + Number(data?.fishing || 0),
      tower: Number(cur.tower || 0) + Number(data?.tower || 0)
    };
    saveMonthly(next);
    renderAll();
  };

  window.ttcSetTowerBest = function(floor){
    const cur = loadMonthly();
    const next = {
      monthKey: cur.monthKey || getMonthKey(),
      harvest: Number(cur.harvest || 0),
      sales: Number(cur.sales || 0),
      fishing: Number(cur.fishing || 0),
      tower: Math.max(Number(cur.tower || 0), Number(floor || 0))
    };
    saveMonthly(next);
    renderAll();
  };

  window.ttcGrantSeed = function(seedId, count = 1){
    addSeed(seedId, count);
    renderAll();
  };

  window.ttcSetFarmReady = function(seedId = "seed_god_yaki"){
    saveFarm({
      plot: {
        state:"READY",
        seedId,
        startAt: Date.now() - GROW_MS,
        readyAt: Date.now() - 1000
      }
    });
    renderAll();
  };

  window.ttcResetFarm = function(){
    saveFarm(defaultFarm());
    renderAll();
  };

  window.ttcResetMonthly = function(){
    saveMonthly(createDefaultMonthly());
    renderAll();
  };

  window.ttcForceRolloverTest = function(){
    const cur = loadMonthly();
    const d = new Date();
    d.setMonth(d.getMonth() - 1);

    saveMonthly({
      monthKey: getMonthKey(d),
      harvest: Number(cur.harvest || 0),
      sales: Number(cur.sales || 0),
      fishing: Number(cur.fishing || 0),
      tower: Number(cur.tower || 0)
    });

    renderAll();
  };

  /* =========================================================
     init
  ========================================================= */
  renderAll();
})();
</script>
</body>
</html>
