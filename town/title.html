<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>称号の頂 - 神の畑つき完全版</title>

  <!-- レトロ寄りフォント -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg1:#12071f;
      --bg2:#24103d;
      --gold1:#ffe8a3;
      --gold2:#f5c85e;
      --gold3:#b77b1f;
      --panel:#2a1450;
      --panel2:#1c0f37;
      --line:rgba(255,232,163,.28);
      --text:#fff8e8;
      --muted:#dbcfae;
      --danger1:#d31721;
      --danger2:#7e0f15;
      --btn:#f5edd7;
      --btnText:#2d220f;
      --shadow:0 14px 30px rgba(0,0,0,.45);
      --radius:18px;

      --font-pixel-en:"Press Start 2P", monospace;
      --font-pixel-ja:"DotGothic16","MS Gothic",monospace;
      --font-ui-ja:"DotGothic16","Hiragino Sans","Yu Gothic",sans-serif;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family:var(--font-ui-ja);
      background:
        radial-gradient(circle at 50% 18%, #4b2484 0%, #2a124c 30%, #160925 58%, #09040f 100%);
      color:var(--text);
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding:20px 16px 30px;
      overflow-x:hidden;
      -webkit-font-smoothing:none;
      text-rendering:optimizeSpeed;
    }

    body::before,
    body::after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
    }
    body::before{
      background:
        radial-gradient(circle at 18% 26%, rgba(255,216,120,.18) 0 2px, transparent 3px),
        radial-gradient(circle at 73% 19%, rgba(255,216,120,.16) 0 2px, transparent 3px),
        radial-gradient(circle at 31% 78%, rgba(255,216,120,.12) 0 2px, transparent 3px),
        radial-gradient(circle at 84% 67%, rgba(255,216,120,.14) 0 2px, transparent 3px),
        radial-gradient(circle at 56% 43%, rgba(147,105,255,.18) 0 2px, transparent 3px);
      opacity:.9;
    }
    body::after{
      background:linear-gradient(transparent 0 97%, rgba(255,255,255,.04) 97% 100%);
      background-size:100% 3px;
      mix-blend-mode:soft-light;
      opacity:.28;
    }

    .wrap{
      width:min(100%, 440px);
      position:relative;
    }

    .card{
      position:relative;
      border-radius:22px;
      background:
        linear-gradient(180deg, rgba(126,63,198,.35), rgba(29,13,58,.96)),
        linear-gradient(180deg, var(--panel), var(--panel2));
      border:2px solid rgba(247,213,118,.48);
      box-shadow:
        0 0 0 2px rgba(95,49,154,.55) inset,
        0 0 0 6px rgba(255,219,130,.06) inset,
        0 18px 40px rgba(0,0,0,.5);
      overflow:hidden;
    }

    .ornament-top,
    .ornament-bottom{
      position:absolute;
      left:12px;
      right:12px;
      height:18px;
      pointer-events:none;
      opacity:.9;
    }
    .ornament-top{ top:10px; }
    .ornament-bottom{ bottom:10px; }

    .ornament-top::before,
    .ornament-top::after,
    .ornament-bottom::before,
    .ornament-bottom::after{
      content:"";
      position:absolute;
      top:50%;
      width:18px;
      height:18px;
      border:2px solid rgba(255,222,145,.8);
      transform:translateY(-50%) rotate(45deg);
      opacity:.75;
    }
    .ornament-top::before,
    .ornament-bottom::before{ left:0; }
    .ornament-top::after,
    .ornament-bottom::after{ right:0; }

    .ornament-top .line,
    .ornament-bottom .line{
      position:absolute;
      left:24px;
      right:24px;
      top:50%;
      height:2px;
      transform:translateY(-50%);
      background:linear-gradient(90deg, transparent, rgba(255,223,150,.65), transparent);
    }

    .head{
      padding:24px 20px 12px;
      text-align:center;
    }

    .head-title{
      display:inline-block;
      padding:9px 16px;
      border-radius:999px;
      background:linear-gradient(180deg, rgba(255,221,143,.20), rgba(255,221,143,.08));
      border:1px solid rgba(255,221,143,.35);
      color:var(--gold1);
      font-family:var(--font-pixel-en);
      font-size:12px;
      letter-spacing:.08em;
      line-height:1.35;
      text-shadow:0 1px 0 rgba(0,0,0,.4);
      box-shadow:0 0 18px rgba(255,202,96,.12) inset;
    }

    .record-panel,
    .god-panel{
      margin:8px 14px 0;
      background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(244,237,220,.96));
      color:#271d11;
      border-radius:16px;
      border:2px solid rgba(136,101,42,.55);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.85), 0 8px 20px rgba(0,0,0,.18);
      overflow:hidden;
    }

    .record-header,
    .god-header{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:48px;
      padding:12px 16px;
      background:linear-gradient(180deg, #36205c, #241043);
      color:#fff3ce;
      border-bottom:2px solid rgba(88,56,133,.55);
      font-family:var(--font-pixel-ja);
      font-size:18px;
      font-weight:900;
      letter-spacing:.06em;
      text-shadow:0 2px 0 rgba(0,0,0,.35);
    }

    .rows{
      padding:8px 10px 10px;
    }

    .row{
      display:grid;
      grid-template-columns: 28px 1fr auto;
      align-items:center;
      gap:10px;
      min-height:52px;
      padding:8px 6px;
      border-bottom:1px dashed rgba(76,51,12,.18);
    }
    .row:last-child{ border-bottom:none; }

    .icon{
      width:28px;
      height:28px;
      display:grid;
      place-items:center;
      border-radius:8px;
      background:linear-gradient(180deg, #ffe6a6, #dca947);
      border:1px solid rgba(108,73,15,.35);
      font-size:16px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.65);
    }

    .label{
      font-family:var(--font-pixel-ja);
      font-size:15px;
      font-weight:900;
      letter-spacing:.03em;
      color:#2d2214;
      line-height:1.45;
    }

    .value{
      font-family:var(--font-pixel-en);
      font-size:17px;
      font-weight:900;
      color:#120d07;
      letter-spacing:.05em;
      line-height:1.2;
      white-space:nowrap;
    }

    .title-cap{
      margin:14px 14px 8px;
      text-align:center;
      font-family:var(--font-pixel-en);
      font-size:17px;
      font-weight:900;
      color:#ffe8b0;
      letter-spacing:.08em;
      line-height:1.35;
      text-shadow:0 2px 0 rgba(0,0,0,.32);
    }

    .main-title{
      margin:0 14px;
      padding:16px 14px;
      border-radius:16px;
      text-align:center;
      font-family:var(--font-pixel-ja);
      font-size:24px;
      font-weight:900;
      letter-spacing:.08em;
      line-height:1.3;
      color:#fff4ef;
      background:linear-gradient(180deg, #e0242e 0%, #b2131d 58%, #780d13 100%);
      border:2px solid rgba(255,215,164,.42);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.34), 0 10px 22px rgba(0,0,0,.32);
      text-shadow:0 2px 0 rgba(0,0,0,.28), 0 0 10px rgba(255,180,180,.08);
    }

    .stars{
      display:flex;
      justify-content:center;
      gap:8px;
      padding:10px 0 8px;
      color:#ffd770;
      font-size:14px;
      text-shadow:0 1px 0 rgba(0,0,0,.35);
    }

    .seed-box{
      margin:10px 14px 0;
      padding:12px 12px;
      border-radius:16px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,223,140,.18);
    }

    .seed-title{
      text-align:center;
      font-family:var(--font-pixel-en);
      font-size:12px;
      letter-spacing:.08em;
      color:#ffe8b0;
      margin-bottom:10px;
      line-height:1.4;
    }

    .seed-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }

    .seed-chip{
      min-height:54px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px 10px;
      border-radius:12px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,223,140,.16);
      color:#fff8ea;
    }

    .seed-chip .name{
      font-family:var(--font-pixel-ja);
      font-size:14px;
      line-height:1.35;
      font-weight:900;
    }

    .seed-chip .count{
      font-family:var(--font-pixel-en);
      font-size:12px;
      color:#ffe8a3;
      white-space:nowrap;
    }

    .god-body{
      padding:12px;
    }

    .god-top-note{
      text-align:center;
      font-family:var(--font-pixel-ja);
      font-size:13px;
      color:#5a421f;
      line-height:1.6;
      margin-bottom:12px;
    }

    .god-plot-wrap{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:8px 0 4px;
    }

    .god-plot{
      width:min(220px, 78vw);
      aspect-ratio:1/1;
      border-radius:20px;
      position:relative;
      border:3px solid rgba(145,102,19,.62);
      overflow:hidden;
      box-shadow:
        inset 0 0 0 2px rgba(255,248,210,.32),
        0 12px 24px rgba(0,0,0,.20);
      background:
        radial-gradient(circle at 50% 35%, rgba(255,250,190,.85), rgba(255,214,96,.68) 38%, rgba(176,108,18,.95) 100%);
    }

    .god-plot::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 50% 46%, rgba(255,255,230,.45) 0 8%, transparent 18%),
        linear-gradient(transparent 0 94%, rgba(255,255,255,.15) 94% 100%);
      background-size:100% 100%, 100% 4px;
      pointer-events:none;
      opacity:.55;
    }

    .god-plot-inner{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:12px;
      text-align:center;
      color:#3b2602;
      font-family:var(--font-pixel-ja);
      font-weight:900;
      line-height:1.45;
    }

    .god-plot-inner.empty{
      color:#5e4208;
    }

    .god-plot-inner.grow{
      color:#452c00;
    }

    .god-plot-inner.ready{
      color:#3b1203;
      text-shadow:0 1px 0 rgba(255,255,255,.28);
    }

    .god-status{
      font-family:var(--font-pixel-ja);
      font-size:13px;
      color:#4f3911;
      text-align:center;
      line-height:1.65;
      min-height:44px;
    }

    .god-actions{
      margin-top:12px;
      display:grid;
      gap:8px;
    }

    .god-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }

    .btn{
      width:100%;
      min-height:48px;
      border:0;
      border-radius:14px;
      cursor:pointer;
      font-family:var(--font-pixel-ja);
      font-size:16px;
      font-weight:900;
      letter-spacing:.06em;
      color:var(--btnText);
      background:linear-gradient(180deg, #fffef8 0%, #efe7d0 100%);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.95), 0 8px 18px rgba(0,0,0,.16);
      border:2px solid rgba(120,93,45,.42);
    }

    .btn.primary{
      background:linear-gradient(180deg, #fff2b7 0%, #e2b752 100%);
    }

    .btn.warn{
      background:linear-gradient(180deg, #ffe4d7 0%, #ffb08c 100%);
    }

    .btn:disabled{
      opacity:.48;
      cursor:not-allowed;
      transform:none !important;
    }

    .btn:active{
      transform:translateY(1px);
    }

    .actions{
      padding:12px 14px 22px;
      display:grid;
      gap:8px;
    }

    .history-btn{
      width:100%;
      min-height:54px;
      border:0;
      border-radius:16px;
      cursor:pointer;
      font-family:var(--font-pixel-en);
      font-size:18px;
      font-weight:900;
      letter-spacing:.08em;
      line-height:1.35;
      color:var(--btnText);
      background:linear-gradient(180deg, #fffef8 0%, #efe7d0 100%);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.95), 0 8px 18px rgba(0,0,0,.22);
      border:2px solid rgba(120,93,45,.42);
    }

    .subinfo{
      padding:0 16px 18px;
      text-align:center;
      color:var(--muted);
      font-family:var(--font-pixel-ja);
      font-size:12px;
      line-height:1.8;
      letter-spacing:.03em;
    }

    .modal{
      position:fixed;
      inset:0;
      background:rgba(6,3,14,.72);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:50;
      backdrop-filter:blur(4px);
    }
    .modal.show{ display:flex; }

    .modal-card{
      width:min(100%, 540px);
      max-height:min(85vh, 760px);
      overflow:auto;
      border-radius:20px;
      background:linear-gradient(180deg, rgba(63,29,111,.98), rgba(24,12,46,.98));
      border:2px solid rgba(255,223,140,.45);
      box-shadow:0 24px 44px rgba(0,0,0,.52);
      padding:16px;
    }

    .modal-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
    }

    .modal-title{
      font-family:var(--font-pixel-en);
      font-size:16px;
      font-weight:900;
      color:#ffeab2;
      letter-spacing:.08em;
      line-height:1.4;
    }

    .close-btn{
      width:42px;
      height:42px;
      border-radius:12px;
      border:0;
      cursor:pointer;
      font-size:20px;
      font-weight:900;
      color:#2a1d0a;
      background:linear-gradient(180deg, #fffef7, #e8dcc0);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.9);
    }

    .history-list{
      display:grid;
      gap:10px;
    }

    .history-item{
      display:grid;
      grid-template-columns:92px 1fr;
      gap:10px;
      align-items:start;
      padding:14px 12px;
      border-radius:14px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,223,140,.16);
    }

    .history-month{
      font-family:var(--font-pixel-en);
      font-size:11px;
      font-weight:900;
      color:#ffe0a0;
      padding-top:2px;
      line-height:1.4;
    }

    .history-main{
      min-width:0;
    }

    .history-title{
      font-family:var(--font-pixel-ja);
      font-size:16px;
      font-weight:900;
      color:#fff8ea;
      margin-bottom:6px;
      line-height:1.4;
      word-break:break-word;
    }

    .history-stats{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:4px 10px;
      font-family:var(--font-pixel-ja);
      font-size:12px;
      color:#dbcfae;
      line-height:1.55;
    }

    .empty{
      padding:20px 14px;
      border-radius:14px;
      text-align:center;
      color:#dbcfae;
      background:rgba(255,255,255,.05);
      border:1px dashed rgba(255,223,140,.22);
      line-height:1.8;
      font-family:var(--font-pixel-ja);
      font-size:14px;
    }

    .select-modal-grid{
      display:grid;
      gap:10px;
    }

    .select-card{
      padding:12px;
      border-radius:14px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,223,140,.16);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .select-card .left{
      min-width:0;
    }

    .select-card .name{
      font-family:var(--font-pixel-ja);
      color:#fff7e8;
      font-size:15px;
      font-weight:900;
      line-height:1.45;
    }

    .select-card .sub{
      margin-top:4px;
      font-family:var(--font-pixel-ja);
      color:#dbcfae;
      font-size:12px;
      line-height:1.5;
    }

    .select-card .count{
      font-family:var(--font-pixel-en);
      color:#ffe8a3;
      font-size:12px;
      white-space:nowrap;
    }

    .reward-card{
      padding:10px 10px 12px;
      border-radius:16px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,223,140,.16);
      text-align:center;
    }

    .reward-badge{
      display:inline-block;
      padding:5px 8px;
      border-radius:999px;
      margin-bottom:10px;
      font-family:var(--font-pixel-en);
      font-size:10px;
      letter-spacing:.06em;
      color:#1a1002;
      background:linear-gradient(180deg, #ffe8a3, #e4b24f);
    }

    .reward-title{
      font-family:var(--font-pixel-ja);
      font-size:18px;
      font-weight:900;
      line-height:1.4;
      color:#fff7e9;
    }

    .reward-id{
      margin-top:6px;
      font-family:var(--font-pixel-en);
      font-size:10px;
      color:#dbcfae;
      line-height:1.5;
    }

    .reward-note{
      margin-top:8px;
      font-family:var(--font-pixel-ja);
      font-size:13px;
      line-height:1.65;
      color:#dbcfae;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:20px;
      transform:translateX(-50%);
      max-width:min(92vw, 420px);
      padding:12px 14px;
      border-radius:14px;
      background:rgba(0,0,0,.82);
      border:1px solid rgba(255,223,140,.28);
      color:#fff;
      font-family:var(--font-pixel-ja);
      font-size:14px;
      line-height:1.5;
      text-align:center;
      box-shadow:0 12px 28px rgba(0,0,0,.35);
      opacity:0;
      pointer-events:none;
      transition:opacity .18s ease, transform .18s ease;
      z-index:100;
    }
    .toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(-2px);
    }

    @media (max-width: 480px){
      .wrap{ width:min(100%, 390px); }
      .record-header,.god-header{ font-size:16px; }
      .label{ font-size:14px; }
      .value{ font-size:15px; }
      .title-cap{ font-size:15px; }
      .main-title{ font-size:21px; }
      .history-btn{ font-size:16px; min-height:52px; }
      .history-item{ grid-template-columns:1fr; }
      .history-month{ padding-top:0; }
      .seed-grid{ grid-template-columns:1fr; }
      .god-row{ grid-template-columns:1fr; }
      .modal-title{ font-size:14px; }
    }
  </style>
</head>
<body>

  <div class="wrap">
    <section class="card" aria-label="称号の頂 月間記録パネル">
      <div class="ornament-top"><div class="line"></div></div>

      <div class="head">
        <div class="head-title">MONTHLY RECORD</div>
      </div>

      <div class="record-panel">
        <div class="record-header">今月の記録</div>

        <div class="rows">
          <div class="row">
            <div class="icon">🔥</div>
            <div class="label">収穫数</div>
            <div class="value" id="harvestValue">0 枚</div>
          </div>

          <div class="row">
            <div class="icon">🪙</div>
            <div class="label">マイ露店売上</div>
            <div class="value" id="salesValue">0 oct</div>
          </div>

          <div class="row">
            <div class="icon">🎣</div>
            <div class="label">釣り</div>
            <div class="value" id="fishingValue">0 点</div>
          </div>

          <div class="row">
            <div class="icon">🗼</div>
            <div class="label">タワー</div>
            <div class="value" id="towerValue">0 F</div>
          </div>
        </div>
      </div>

      <div class="title-cap">TITLE</div>
      <div class="main-title" id="mainTitle">タコ民</div>

      <div class="stars" aria-hidden="true">
        <span>★</span><span>★</span><span>★</span><span>★</span><span>★</span>
      </div>

      <div class="seed-box">
        <div class="seed-title">GOD SEEDS</div>
        <div class="seed-grid" id="seedGrid"></div>
      </div>

      <div class="god-panel">
        <div class="god-header">神の畑</div>
        <div class="god-body">
          <div class="god-top-note">
            月末の称号で授かった神のタネを、<br>
            この金色の畑に植えることができます
          </div>

          <div class="god-plot-wrap">
            <div class="god-plot" id="godPlot">
              <div class="god-plot-inner empty" id="godPlotInner">EMPTY</div>
            </div>
            <div class="god-status" id="godStatus">
              まだ何も植えられていません
            </div>
          </div>

          <div class="god-actions">
            <div class="god-row">
              <button class="btn primary" id="plantBtn" type="button">植える</button>
              <button class="btn" id="harvestBtn" type="button">収穫</button>
            </div>
            <button class="btn warn" id="clearBtn" type="button">枯れた時の強制回収</button>
          </div>
        </div>
      </div>

      <div class="actions">
        <button class="history-btn" id="openHistoryBtn" type="button">HISTORY</button>
      </div>

      <div class="subinfo" id="monthInfo">
        今月の収穫数・露店売上・釣り・タワーの記録から称号を表示します
      </div>

      <div class="ornament-bottom"><div class="line"></div></div>
    </section>
  </div>

  <!-- 履歴モーダル -->
  <div class="modal" id="historyModal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="historyTitle">
      <div class="modal-head">
        <div class="modal-title" id="historyTitle">称号履歴</div>
        <button class="close-btn" id="closeHistoryBtn" type="button" aria-label="閉じる">×</button>
      </div>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>

  <!-- 神タネ選択モーダル -->
  <div class="modal" id="seedModal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="seedModalTitle">
      <div class="modal-head">
        <div class="modal-title" id="seedModalTitle">植える神のタネを選ぶ</div>
        <button class="close-btn" id="closeSeedBtn" type="button" aria-label="閉じる">×</button>
      </div>
      <div class="select-modal-grid" id="seedModalList"></div>
    </div>
  </div>

  <!-- 収穫結果モーダル -->
  <div class="modal" id="rewardModal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="rewardTitle">
      <div class="modal-head">
        <div class="modal-title" id="rewardTitle">神カード収穫</div>
        <button class="close-btn" id="closeRewardBtn" type="button" aria-label="閉じる">×</button>
      </div>
      <div id="rewardBody"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    (() => {
      "use strict";

      /* =========================================================
         localStorage keys
      ========================================================= */
      const LS_MONTHLY  = "ttc_monthly_stats_v1";
      const LS_HISTORY  = "ttc_monthly_history_v1";
      const LS_GODFARM  = "ttc_godfarm_v1";
      const LS_INV      = "tf_v1_inv";
      const LS_BOOK     = "tf_v1_book";

      const HISTORY_LIMIT = 24;
      const GOD_GROW_MS = 3 * 60 * 60 * 1000; // 3時間

      /* =========================================================
         神タネ
      ========================================================= */
      const GOD_SEEDS = [
        { id: "seed_god_yaki",  name: "焼き神のタネ",  short: "焼き神" },
        { id: "seed_god_shop",  name: "露店神のタネ",  short: "露店神" },
        { id: "seed_god_fish",  name: "釣り神のタネ",  short: "釣り神" },
        { id: "seed_god_tower", name: "塔神のタネ",    short: "塔神" },
      ];

      const GOD_SEED_BY_TITLE = {
        "神焼きの極": "seed_god_yaki",
        "黄金露店王": "seed_god_shop",
        "深海の釣神": "seed_god_fish",
        "積み上げの神": "seed_god_tower",
      };

      /* =========================================================
         神カードテーブル
         ※ img は仮パス。あとで実画像に差し替えOK
      ========================================================= */
      const GOD_CARD_POOLS = {
        seed_god_yaki: [
          { id:"GY-001", name:"焼き神の証",   img:"assets/images/god/yaki_001.png",  rarity:"N",  title:"神焼きの極" },
          { id:"GY-002", name:"炎のヘラ神",   img:"assets/images/god/yaki_002.png",  rarity:"SR", title:"神焼きの極" },
          { id:"GY-003", name:"焼きの極意",   img:"assets/images/god/yaki_003.png",  rarity:"UR", title:"神焼きの極" },
        ],
        seed_god_shop: [
          { id:"GS-001", name:"黄金露店王",   img:"assets/images/god/shop_001.png",  rarity:"N",  title:"黄金露店王" },
          { id:"GS-002", name:"商売繁盛神",   img:"assets/images/god/shop_002.png",  rarity:"SR", title:"黄金露店王" },
          { id:"GS-003", name:"オクトの守護神", img:"assets/images/god/shop_003.png", rarity:"UR", title:"黄金露店王" },
        ],
        seed_god_fish: [
          { id:"GF-001", name:"深海の釣神",   img:"assets/images/god/fish_001.png",  rarity:"N",  title:"深海の釣神" },
          { id:"GF-002", name:"潮流の支配者", img:"assets/images/god/fish_002.png",  rarity:"SR", title:"深海の釣神" },
          { id:"GF-003", name:"伝説の大ダコ", img:"assets/images/god/fish_003.png",  rarity:"UR", title:"深海の釣神" },
        ],
        seed_god_tower: [
          { id:"GT-001", name:"積み上げの神", img:"assets/images/god/tower_001.png", rarity:"N",  title:"積み上げの神" },
          { id:"GT-002", name:"天空の塔神",   img:"assets/images/god/tower_002.png", rarity:"SR", title:"積み上げの神" },
          { id:"GT-003", name:"無限積層の王", img:"assets/images/god/tower_003.png", rarity:"UR", title:"積み上げの神" },
        ]
      };

      const GOD_RATES = {
        N: 70,
        SR: 25,
        UR: 5,
      };

      /* =========================================================
         utils
      ========================================================= */
      function getMonthKey(date = new Date()){
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, "0");
        return `${y}-${m}`;
      }

      function fmtNum(n){
        return Number(n || 0).toLocaleString("ja-JP");
      }

      function fmtDate(ts){
        const d = new Date(ts);
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        const hh = String(d.getHours()).padStart(2, "0");
        const mm = String(d.getMinutes()).padStart(2, "0");
        return `${y}/${m}/${day} ${hh}:${mm}`;
      }

      function fmtRemain(ms){
        if (ms <= 0) return "00:00:00";
        const s = Math.floor(ms / 1000);
        const hh = String(Math.floor(s / 3600)).padStart(2, "0");
        const mm = String(Math.floor((s % 3600) / 60)).padStart(2, "0");
        const ss = String(s % 60).padStart(2, "0");
        return `${hh}:${mm}:${ss}`;
      }

      function escapeHtml(str){
        return String(str)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function toast(msg){
        const el = document.getElementById("toast");
        if (!el) return;
        el.textContent = msg;
        el.classList.add("show");
        clearTimeout(toast._t);
        toast._t = setTimeout(() => el.classList.remove("show"), 1800);
      }

      /* =========================================================
         monthly
      ========================================================= */
      function createDefaultMonthly(){
        return {
          monthKey: getMonthKey(),
          harvest: 0,
          sales: 0,
          fishing: 0,
          tower: 0
        };
      }

      function normalizeMonthly(parsed){
        if (!parsed || typeof parsed !== "object"){
          return createDefaultMonthly();
        }
        return {
          monthKey: String(parsed.monthKey || getMonthKey()),
          harvest: Number(parsed.harvest || 0),
          sales: Number(parsed.sales || 0),
          fishing: Number(parsed.fishing || 0),
          tower: Number(parsed.tower || 0)
        };
      }

      function getMonthly(){
        try{
          const raw = localStorage.getItem(LS_MONTHLY);
          if (!raw){
            const def = createDefaultMonthly();
            localStorage.setItem(LS_MONTHLY, JSON.stringify(def));
            return def;
          }
          const parsed = JSON.parse(raw);
          const normalized = normalizeMonthly(parsed);
          localStorage.setItem(LS_MONTHLY, JSON.stringify(normalized));
          return normalized;
        }catch(_){
          const def = createDefaultMonthly();
          localStorage.setItem(LS_MONTHLY, JSON.stringify(def));
          return def;
        }
      }

      function saveMonthly(data){
        localStorage.setItem(LS_MONTHLY, JSON.stringify(normalizeMonthly(data)));
      }

      /* =========================================================
         history
      ========================================================= */
      function normalizeHistoryItem(item){
        if (!item || typeof item !== "object") return null;
        return {
          monthKey: String(item.monthKey || ""),
          title: String(item.title || "タコ民"),
          harvest: Number(item.harvest || 0),
          sales: Number(item.sales || 0),
          fishing: Number(item.fishing || 0),
          tower: Number(item.tower || 0),
          godSeedGranted: String(item.godSeedGranted || ""),
          grantedSeedName: String(item.grantedSeedName || "")
        };
      }

      function getHistory(){
        try{
          const raw = localStorage.getItem(LS_HISTORY);
          if (!raw) return [];
          const parsed = JSON.parse(raw);
          if (!Array.isArray(parsed)) return [];
          return parsed.map(normalizeHistoryItem).filter(Boolean).filter(v => v.monthKey);
        }catch(_){
          return [];
        }
      }

      function saveHistory(list){
        const safe = Array.isArray(list) ? list : [];
        const normalized = safe
          .map(normalizeHistoryItem)
          .filter(Boolean)
          .filter(v => v.monthKey)
          .slice(0, HISTORY_LIMIT);
        localStorage.setItem(LS_HISTORY, JSON.stringify(normalized));
      }

      function historyHasMonth(list, monthKey){
        return list.some(v => String(v.monthKey || "") === String(monthKey || ""));
      }

      /* =========================================================
         title logic
      ========================================================= */
      function getTitleFromStats(stats){
        const harvest = Number(stats.harvest || 0);
        const sales = Number(stats.sales || 0);
        const fishing = Number(stats.fishing || 0);
        const tower = Number(stats.tower || 0);

        if (harvest >= 500) return "焼かれし収穫神";
        if (sales >= 50000) return "黄金露店皇";
        if (fishing >= 3000) return "深海の釣神";
        if (tower >= 150) return "積み上げの神";

        if (harvest >= 300) return "神焼きの極";
        if (sales >= 30000) return "黄金露店王";
        if (fishing >= 1500) return "深海の釣神";
        if (tower >= 100) return "積み上げの神";

        if (harvest >= 150) return "焼きの達人";
        if (sales >= 15000) return "露店王";
        if (fishing >= 800) return "釣り神";
        if (tower >= 50) return "塔の覇者";

        if (harvest >= 50) return "収穫見習い";
        if (sales >= 5000) return "露店番";
        if (fishing >= 300) return "釣り好き";
        if (tower >= 20) return "積み上げ人";

        return "タコ民";
      }

      function isMeaningfulMonth(stats){
        return (
          Number(stats.harvest || 0) > 0 ||
          Number(stats.sales || 0) > 0 ||
          Number(stats.fishing || 0) > 0 ||
          Number(stats.tower || 0) > 0
        );
      }

      /* =========================================================
         inventory
      ========================================================= */
      function defaultInv(){
        const inv = { ver: 1, seed: {}, water: {}, fert: {} };
        for (const s of GOD_SEEDS) inv.seed[s.id] = 0;
        return inv;
      }

      function loadInv(){
        try{
          const raw = localStorage.getItem(LS_INV);
          if (!raw){
            const def = defaultInv();
            localStorage.setItem(LS_INV, JSON.stringify(def));
            return def;
          }
          const inv = JSON.parse(raw);
          if (!inv || typeof inv !== "object"){
            const def = defaultInv();
            localStorage.setItem(LS_INV, JSON.stringify(def));
            return def;
          }
          inv.seed = inv.seed || {};
          inv.water = inv.water || {};
          inv.fert = inv.fert || {};
          for (const s of GOD_SEEDS){
            if (!(s.id in inv.seed)) inv.seed[s.id] = 0;
          }
          return inv;
        }catch(_){
          const def = defaultInv();
          localStorage.setItem(LS_INV, JSON.stringify(def));
          return def;
        }
      }

      function saveInv(inv){
        localStorage.setItem(LS_INV, JSON.stringify(inv));
      }

      function getSeedCount(seedId){
        const inv = loadInv();
        return Number(inv.seed?.[seedId] || 0);
      }

      function addSeed(seedId, amount){
        const inv = loadInv();
        inv.seed = inv.seed || {};
        inv.seed[seedId] = Number(inv.seed[seedId] || 0) + Math.max(0, Math.floor(Number(amount) || 0));
        saveInv(inv);
      }

      function consumeSeed(seedId, amount){
        const inv = loadInv();
        inv.seed = inv.seed || {};
        const cur = Number(inv.seed[seedId] || 0);
        const need = Math.max(0, Math.floor(Number(amount) || 0));
        if (cur < need) return false;
        inv.seed[seedId] = cur - need;
        saveInv(inv);
        return true;
      }

      function findSeedName(seedId){
        return GOD_SEEDS.find(v => v.id === seedId)?.name || seedId;
      }

      /* =========================================================
         god farm state
      ========================================================= */
      function defaultGodFarm(){
        return {
          plot: {
            state: "EMPTY", // EMPTY / GROW / READY
            seedId: null,
            startAt: 0,
            readyAt: 0,
            reward: null
          }
        };
      }

      function loadGodFarm(){
        try{
          const raw = localStorage.getItem(LS_GODFARM);
          if (!raw){
            const def = defaultGodFarm();
            localStorage.setItem(LS_GODFARM, JSON.stringify(def));
            return def;
          }
          const parsed = JSON.parse(raw);
          if (!parsed || typeof parsed !== "object" || !parsed.plot){
            const def = defaultGodFarm();
            localStorage.setItem(LS_GODFARM, JSON.stringify(def));
            return def;
          }
          return {
            plot: {
              state: String(parsed.plot.state || "EMPTY"),
              seedId: parsed.plot.seedId || null,
              startAt: Number(parsed.plot.startAt || 0),
              readyAt: Number(parsed.plot.readyAt || 0),
              reward: parsed.plot.reward || null
            }
          };
        }catch(_){
          const def = defaultGodFarm();
          localStorage.setItem(LS_GODFARM, JSON.stringify(def));
          return def;
        }
      }

      function saveGodFarm(data){
        localStorage.setItem(LS_GODFARM, JSON.stringify(data));
      }

      /* =========================================================
         zukan
      ========================================================= */
      function loadBook(){
        try{
          const raw = localStorage.getItem(LS_BOOK);
          if (!raw) return { ver: 1, got: {} };
          const parsed = JSON.parse(raw);
          if (!parsed || typeof parsed !== "object") return { ver: 1, got: {} };
          parsed.got = parsed.got && typeof parsed.got === "object" ? parsed.got : {};
          return parsed;
        }catch(_){
          return { ver: 1, got: {} };
        }
      }

      function saveBook(book){
        localStorage.setItem(LS_BOOK, JSON.stringify(book));
      }

      function addToBook(card){
        if (!card || !card.id) return;
        const book = loadBook();
        if (!book.got) book.got = {};

        const prev = book.got[card.id];
        if (prev) {
          prev.count = Number(prev.count || 0) + 1;
          prev.name = card.name;
          prev.img = card.img;
          prev.rarity = card.rarity || prev.rarity || "";
          prev.lastAt = Date.now();
          book.got[card.id] = prev;
        } else {
          book.got[card.id] = {
            id: card.id,
            name: card.name,
            img: card.img,
            rarity: card.rarity || "",
            count: 1,
            at: Date.now(),
            lastAt: Date.now()
          };
        }
        saveBook(book);
      }

      /* =========================================================
         month rollover -> god seed auto grant
      ========================================================= */
      function grantGodSeedForTitle(title){
        const seedId = GOD_SEED_BY_TITLE[title];
        if (!seedId) return { seedId: "", seedName: "" };

        addSeed(seedId, 1);
        return {
          seedId,
          seedName: findSeedName(seedId)
        };
      }

      function rolloverIfNeeded(){
        const currentKey = getMonthKey();
        const monthly = getMonthly();

        if (monthly.monthKey === currentKey) return monthly;

        const history = getHistory();

        if (monthly.monthKey && isMeaningfulMonth(monthly) && !historyHasMonth(history, monthly.monthKey)) {
          const title = getTitleFromStats(monthly);
          const granted = grantGodSeedForTitle(title);

          history.unshift({
            monthKey: monthly.monthKey,
            title,
            harvest: Number(monthly.harvest || 0),
            sales: Number(monthly.sales || 0),
            fishing: Number(monthly.fishing || 0),
            tower: Number(monthly.tower || 0),
            godSeedGranted: granted.seedId || "",
            grantedSeedName: granted.seedName || ""
          });

          saveHistory(history);

          if (granted.seedId) {
            toast(`${granted.seedName} を授かりました`);
          }
        }

        const fresh = {
          monthKey: currentKey,
          harvest: 0,
          sales: 0,
          fishing: 0,
          tower: 0
        };
        saveMonthly(fresh);
        return fresh;
      }

      /* =========================================================
         god reward
      ========================================================= */
      function drawGodReward(seedId){
        const pool = GOD_CARD_POOLS[seedId] || [];
        if (!pool.length) return null;

        const byRarity = {
          N: pool.filter(x => x.rarity === "N"),
          SR: pool.filter(x => x.rarity === "SR"),
          UR: pool.filter(x => x.rarity === "UR"),
        };

        const r = Math.random() * 100;

        let rarity = "N";
        if (r < GOD_RATES.UR) {
          rarity = "UR";
        } else if (r < GOD_RATES.UR + GOD_RATES.SR) {
          rarity = "SR";
        }

        const targetPool = byRarity[rarity] || [];
        if (!targetPool.length) return pool[0] || null;
        return targetPool[Math.floor(Math.random() * targetPool.length)];
      }

      /* =========================================================
         DOM refs
      ========================================================= */
      const harvestValue = document.getElementById("harvestValue");
      const salesValue   = document.getElementById("salesValue");
      const fishingValue = document.getElementById("fishingValue");
      const towerValue   = document.getElementById("towerValue");
      const mainTitle    = document.getElementById("mainTitle");
      const monthInfo    = document.getElementById("monthInfo");
      const seedGrid     = document.getElementById("seedGrid");

      const godPlotInner = document.getElementById("godPlotInner");
      const godStatus    = document.getElementById("godStatus");
      const plantBtn     = document.getElementById("plantBtn");
      const harvestBtn   = document.getElementById("harvestBtn");
      const clearBtn     = document.getElementById("clearBtn");

      const historyModal = document.getElementById("historyModal");
      const openHistoryBtn = document.getElementById("openHistoryBtn");
      const closeHistoryBtn = document.getElementById("closeHistoryBtn");
      const historyList = document.getElementById("historyList");

      const seedModal = document.getElementById("seedModal");
      const closeSeedBtn = document.getElementById("closeSeedBtn");
      const seedModalList = document.getElementById("seedModalList");

      const rewardModal = document.getElementById("rewardModal");
      const closeRewardBtn = document.getElementById("closeRewardBtn");
      const rewardBody = document.getElementById("rewardBody");

      /* =========================================================
         render
      ========================================================= */
      function renderSeedGrid(){
        const inv = loadInv();
        seedGrid.innerHTML = GOD_SEEDS.map(seed => {
          const count = Number(inv.seed?.[seed.id] || 0);
          return `
            <div class="seed-chip">
              <div class="name">${escapeHtml(seed.name)}</div>
              <div class="count">×${count}</div>
            </div>
          `;
        }).join("");
      }

      function renderMonthly(){
        const stats = rolloverIfNeeded();

        harvestValue.textContent = `${fmtNum(stats.harvest)} 枚`;
        salesValue.textContent   = `${fmtNum(stats.sales)} oct`;
        fishingValue.textContent = `${fmtNum(stats.fishing)} 点`;
        towerValue.textContent   = `${fmtNum(stats.tower)} F`;
        mainTitle.textContent    = getTitleFromStats(stats);

        const [y, m] = String(stats.monthKey || getMonthKey()).split("-");
        monthInfo.textContent = `${y}年${Number(m)}月の記録から称号を判定しています`;
      }

      function syncGodFarmIfReady(){
        const state = loadGodFarm();
        if (state.plot.state === "GROW" && Date.now() >= Number(state.plot.readyAt || 0)) {
          state.plot.state = "READY";
          if (!state.plot.reward && state.plot.seedId) {
            state.plot.reward = drawGodReward(state.plot.seedId);
          }
          saveGodFarm(state);
        }
      }

      function renderGodFarm(){
        syncGodFarmIfReady();
        const state = loadGodFarm();
        const plot = state.plot || {};

        godPlotInner.className = "god-plot-inner";
        plantBtn.disabled = false;
        harvestBtn.disabled = false;
        clearBtn.disabled = false;

        if (plot.state === "EMPTY") {
          godPlotInner.classList.add("empty");
          godPlotInner.textContent = "EMPTY";
          godStatus.innerHTML = "神のタネを植えると、<br>ここで神カードが育ちます";
          harvestBtn.disabled = true;
          clearBtn.disabled = true;
          return;
        }

        const seedName = findSeedName(plot.seedId);

        if (plot.state === "GROW") {
          godPlotInner.classList.add("grow");
          godPlotInner.innerHTML = `${escapeHtml(seedName)}<br>育成中`;
          godStatus.innerHTML = `${escapeHtml(seedName)} を育成中です<br>残り ${fmtRemain(Number(plot.readyAt || 0) - Date.now())}`;
          plantBtn.disabled = true;
          harvestBtn.disabled = true;
          clearBtn.disabled = false;
          return;
        }

        if (plot.state === "READY") {
          godPlotInner.classList.add("ready");
          godPlotInner.innerHTML = `${escapeHtml(seedName)}<br>READY`;
          godStatus.innerHTML = `${escapeHtml(seedName)} の収穫準備ができています`;
          plantBtn.disabled = true;
          harvestBtn.disabled = false;
          clearBtn.disabled = false;
          return;
        }

        godPlotInner.classList.add("empty");
        godPlotInner.textContent = "EMPTY";
        godStatus.textContent = "状態が不明です";
      }

      function renderHistory(){
        const list = getHistory();
        historyList.innerHTML = "";

        if (!list.length) {
          historyList.innerHTML = `
            <div class="empty">
              まだ履歴はありません
            </div>
          `;
          return;
        }

        list.forEach(item => {
          const grantLine = item.grantedSeedName
            ? `<div>🌱 神のタネ ${escapeHtml(item.grantedSeedName)}</div>`
            : `<div>🌱 神のタネ なし</div>`;

          const row = document.createElement("div");
          row.className = "history-item";
          row.innerHTML = `
            <div class="history-month">${escapeHtml(item.monthKey)}</div>
            <div class="history-main">
              <div class="history-title">${escapeHtml(item.title || "タコ民")}</div>
              <div class="history-stats">
                <div>🔥 収穫 ${fmtNum(item.harvest)} 枚</div>
                <div>🪙 売上 ${fmtNum(item.sales)} oct</div>
                <div>🎣 釣り ${fmtNum(item.fishing)} 点</div>
                <div>🗼 タワー ${fmtNum(item.tower)} F</div>
                ${grantLine}
              </div>
            </div>
          `;
          historyList.appendChild(row);
        });
      }

      function renderAll(){
        renderMonthly();
        renderSeedGrid();
        renderGodFarm();
      }

      /* =========================================================
         modals
      ========================================================= */
      function openModal(modal){
        modal.classList.add("show");
        modal.setAttribute("aria-hidden", "false");
        document.body.style.overflow = "hidden";
      }

      function closeModal(modal){
        modal.classList.remove("show");
        modal.setAttribute("aria-hidden", "true");
        document.body.style.overflow = "";
      }

      function openHistory(){
        renderHistory();
        openModal(historyModal);
      }

      function openSeedSelect(){
        const state = loadGodFarm();
        if (state.plot.state !== "EMPTY") {
          toast("神の畑が空ではありません");
          return;
        }

        const inv = loadInv();
        const cards = GOD_SEEDS
          .map(seed => {
            return {
              ...seed,
              count: Number(inv.seed?.[seed.id] || 0)
            };
          })
          .filter(seed => seed.count > 0);

        seedModalList.innerHTML = "";

        if (!cards.length) {
          seedModalList.innerHTML = `
            <div class="empty">
              植えられる神のタネがありません
            </div>
          `;
          openModal(seedModal);
          return;
        }

        seedModalList.innerHTML = cards.map(seed => {
          return `
            <button class="select-card" type="button" data-seed-id="${escapeHtml(seed.id)}">
              <div class="left">
                <div class="name">${escapeHtml(seed.name)}</div>
                <div class="sub">その月の頂に立った者だけが持てるタネ</div>
              </div>
              <div class="count">×${seed.count}</div>
            </button>
          `;
        }).join("");

        seedModalList.querySelectorAll("[data-seed-id]").forEach(btn => {
          btn.addEventListener("click", () => {
            const seedId = btn.getAttribute("data-seed-id");
            plantGodSeed(seedId);
            closeModal(seedModal);
          });
        });

        openModal(seedModal);
      }

      function openReward(card, seedId){
        rewardBody.innerHTML = `
          <div class="reward-card">
            <div class="reward-badge">${escapeHtml(card.rarity)}</div>
            <div class="reward-title">${escapeHtml(card.name)}</div>
            <div class="reward-id">${escapeHtml(card.id)}</div>
            <div class="reward-note">
              ${escapeHtml(findSeedName(seedId))} から、<br>
              神カードが収穫されました
            </div>
          </div>
        `;
        openModal(rewardModal);
      }

      /* =========================================================
         god farm actions
      ========================================================= */
      function plantGodSeed(seedId){
        if (!seedId) return;

        const state = loadGodFarm();
        if (state.plot.state !== "EMPTY") {
          toast("神の畑は使用中です");
          return;
        }

        if (!consumeSeed(seedId, 1)) {
          toast("神のタネが足りません");
          return;
        }

        const now = Date.now();
        state.plot = {
          state: "GROW",
          seedId,
          startAt: now,
          readyAt: now + GOD_GROW_MS,
          reward: null
        };
        saveGodFarm(state);

        renderAll();
        toast(`${findSeedName(seedId)} を植えました`);
      }

      function harvestGodSeed(){
        syncGodFarmIfReady();
        const state = loadGodFarm();
        const plot = state.plot || {};

        if (plot.state !== "READY") {
          toast("まだ収穫できません");
          return;
        }

        const reward = plot.reward || drawGodReward(plot.seedId);
        if (!reward) {
          toast("収穫データが見つかりません");
          return;
        }

        addToBook(reward);

        const usedSeedId = plot.seedId;
        state.plot = {
          state: "EMPTY",
          seedId: null,
          startAt: 0,
          readyAt: 0,
          reward: null
        };
        saveGodFarm(state);

        renderAll();
        openReward(reward, usedSeedId);
      }

      function clearGodFarm(){
        const state = loadGodFarm();
        if (state.plot.state === "EMPTY") {
          toast("神の畑は空です");
          return;
        }

        const ok = confirm("神の畑を強制回収します。\n育成中・収穫待ちの状態は失われます。");
        if (!ok) return;

        state.plot = {
          state: "EMPTY",
          seedId: null,
          startAt: 0,
          readyAt: 0,
          reward: null
        };
        saveGodFarm(state);
        renderAll();
        toast("神の畑を空にしました");
      }

      /* =========================================================
         dev helpers
      ========================================================= */
      window.ttcSetMonthly = function(data){
        const current = getMonthly();
        const next = {
          monthKey: current.monthKey || getMonthKey(),
          harvest: Number(data?.harvest ?? current.harvest ?? 0),
          sales: Number(data?.sales ?? current.sales ?? 0),
          fishing: Number(data?.fishing ?? current.fishing ?? 0),
          tower: Number(data?.tower ?? current.tower ?? 0)
        };
        saveMonthly(next);
        renderAll();
      };

      window.ttcGrantGodSeed = function(seedId, count = 1){
        if (!seedId) return;
        addSeed(seedId, count);
        renderAll();
      };

      window.ttcSetGodFarmReady = function(seedId = "seed_god_yaki"){
        const state = loadGodFarm();
        state.plot = {
          state: "READY",
          seedId,
          startAt: Date.now() - GOD_GROW_MS,
          readyAt: Date.now() - 1000,
          reward: drawGodReward(seedId)
        };
        saveGodFarm(state);
        renderAll();
      };

      window.ttcResetGodFarm = function(){
        saveGodFarm(defaultGodFarm());
        renderAll();
      };

      window.ttcResetHistory = function(){
        localStorage.removeItem(LS_HISTORY);
        renderAll();
      };

      /* =========================================================
         events
      ========================================================= */
      openHistoryBtn.addEventListener("click", openHistory);
      closeHistoryBtn.addEventListener("click", () => closeModal(historyModal));
      historyModal.addEventListener("click", (e) => {
        if (e.target === historyModal) closeModal(historyModal);
      });

      plantBtn.addEventListener("click", openSeedSelect);
      closeSeedBtn.addEventListener("click", () => closeModal(seedModal));
      seedModal.addEventListener("click", (e) => {
        if (e.target === seedModal) closeModal(seedModal);
      });

      harvestBtn.addEventListener("click", harvestGodSeed);
      clearBtn.addEventListener("click", clearGodFarm);

      closeRewardBtn.addEventListener("click", () => closeModal(rewardModal));
      rewardModal.addEventListener("click", (e) => {
        if (e.target === rewardModal) closeModal(rewardModal);
      });

      window.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          if (historyModal.classList.contains("show")) closeModal(historyModal);
          if (seedModal.classList.contains("show")) closeModal(seedModal);
          if (rewardModal.classList.contains("show")) closeModal(rewardModal);
        }
      });

      /* =========================================================
         tick
      ========================================================= */
      setInterval(() => {
        renderGodFarm();
      }, 1000);

      /* =========================================================
         init
      ========================================================= */
      renderAll();
    })();
  </script>
</body>
</html>
