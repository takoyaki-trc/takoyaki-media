<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>称号の頂</title>

<style>

body{
background:#0b0b18;
color:#fff;
font-family:DotGothic16,monospace;
margin:0;
padding:20px;
text-align:center;
}

.panel{
max-width:540px;
margin:auto;
background:#151530;
padding:20px;
border-radius:16px;
box-shadow:0 0 20px rgba(0,0,0,.4);
}

h1{
font-size:24px;
margin-bottom:10px;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

.stat{
background:#1f1f44;
padding:10px;
border-radius:8px;
}

.title{
font-size:22px;
margin:15px 0;
color:#ffd94c;
}

.godfarm{
margin-top:20px;
background:#1b1b3f;
padding:15px;
border-radius:10px;
}

.seedBtn{
background:#ffd94c;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

.harvestBtn{
background:#4cffc8;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

.altar{
margin-top:30px;
}

.altarGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:10px;
}

.card{
background:#1c1c50;
padding:6px;
border-radius:8px;
font-size:11px;
}

.lock{
opacity:.25;
}

.card img{
width:100%;
border-radius:6px;
}

#trialBox{
display:none;
margin-top:20px;
}

.bar{
height:14px;
background:#333;
border-radius:10px;
position:relative;
overflow:hidden;
}

.cursor{
position:absolute;
top:0;
width:10px;
height:14px;
background:#ff4c4c;
}

.zone{
position:absolute;
top:0;
height:14px;
width:20%;
background:#4cffc8;
}

button{
font-family:inherit;
}

</style>
</head>

<body>

<div class="panel">

<h1>称号の頂</h1>

<div class="stats">

<div class="stat">
🔥収穫<br>
<span id="harvestValue">0</span>
</div>

<div class="stat">
🪙売上<br>
<span id="salesValue">0</span>
</div>

<div class="stat">
🎣釣り<br>
<span id="fishingValue">0</span>
</div>

<div class="stat">
🗼タワー<br>
<span id="towerValue">0</span>
</div>

</div>

<div class="title" id="titleText">
称号判定中
</div>

<div class="godfarm">

<h2>神の畑</h2>

<div id="farmStatus">EMPTY</div>

<button class="seedBtn" id="plantBtn">神のタネを植える</button>

<button class="harvestBtn" id="harvestBtn" style="display:none;">収穫する</button>

<div id="trialBox">

<p>神の試練</p>

<div class="bar">
<div class="zone" id="zone"></div>
<div class="cursor" id="cursor"></div>
</div>

<button id="stopBtn">STOP</button>

</div>

</div>

<div class="altar">

<h2>神の祭壇</h2>

<div class="altarGrid" id="altarGrid"></div>

</div>

</div>

<script>

const LS_STATS="ttc_monthly_stats_v1"
const LS_BOOK="tf_v1_book"
const LS_GODFARM="ttc_godfarm_v1"
const LS_SEEDS="ttc_godseeds_v1"
const LS_MONTH="ttc_godmonth_v1"

const GROW_TIME=30*60*1000

const GOD_CARDS=[

{ id:"SP-GOD-YAKI-01",name:"焼き神",img:"images/god/yaki1.png",type:"yaki"},
{ id:"SP-GOD-YAKI-02",name:"炎のヘラ神",img:"images/god/yaki2.png",type:"yaki"},
{ id:"SP-GOD-YAKI-03",name:"焼きの極意",img:"images/god/yaki3.png",type:"yaki"},

{ id:"SP-GOD-SHOP-01",name:"黄金露店王",img:"images/god/shop1.png",type:"shop"},
{ id:"SP-GOD-SHOP-02",name:"商売繁盛神",img:"images/god/shop2.png",type:"shop"},
{ id:"SP-GOD-SHOP-03",name:"オクト守護神",img:"images/god/shop3.png",type:"shop"},

{ id:"SP-GOD-FISH-01",name:"深海の釣神",img:"images/god/fish1.png",type:"fish"},
{ id:"SP-GOD-FISH-02",name:"潮流の支配者",img:"images/god/fish2.png",type:"fish"},
{ id:"SP-GOD-FISH-03",name:"伝説の大ダコ",img:"images/god/fish3.png",type:"fish"},

{ id:"SP-GOD-TOWER-01",name:"積み上げ神",img:"images/god/tower1.png",type:"tower"},
{ id:"SP-GOD-TOWER-02",name:"天空の塔神",img:"images/god/tower2.png",type:"tower"},
{ id:"SP-GOD-TOWER-03",name:"無限積層の王",img:"images/god/tower3.png",type:"tower"}

]

function monthKey(){

let d=new Date()
return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")

}

function grantSeeds(){

let m=monthKey()

if(localStorage.getItem(LS_MONTH)==m)return

localStorage.setItem(LS_MONTH,m)

let s=JSON.parse(localStorage.getItem(LS_STATS)||"{}")

let seeds=JSON.parse(localStorage.getItem(LS_SEEDS)||"{}")

if(s.harvest>=100)seeds.yaki=(seeds.yaki||0)+1
if(s.sales>=5000)seeds.shop=(seeds.shop||0)+1
if(s.fishing>=500)seeds.fish=(seeds.fish||0)+1
if(s.tower>=30)seeds.tower=(seeds.tower||0)+1

localStorage.setItem(LS_SEEDS,JSON.stringify(seeds))

}

function loadStats(){

let s=JSON.parse(localStorage.getItem(LS_STATS)||"{}")

harvestValue.textContent=s.harvest||0
salesValue.textContent=s.sales||0
fishingValue.textContent=s.fishing||0
towerValue.textContent=s.tower||0

}

function getBook(){

return JSON.parse(localStorage.getItem(LS_BOOK)||"{}")

}

function saveBook(b){

localStorage.setItem(LS_BOOK,JSON.stringify(b))

}

function getFarm(){

return JSON.parse(localStorage.getItem(LS_GODFARM)||"{}")

}

function saveFarm(f){

localStorage.setItem(LS_GODFARM,JSON.stringify(f))

}

function plantSeed(){

let seeds=JSON.parse(localStorage.getItem(LS_SEEDS)||"{}")

let type=Object.keys(seeds).find(k=>seeds[k]>0)

if(!type){

alert("神のタネがありません")
return

}

seeds[type]--

localStorage.setItem(LS_SEEDS,JSON.stringify(seeds))

saveFarm({

state:"GROW",
type:type,
ready:Date.now()+GROW_TIME

})

updateFarm()

}

function updateFarm(){

let farm=getFarm()

if(!farm.state){

farmStatus.textContent="EMPTY"
plantBtn.style.display="inline-block"
harvestBtn.style.display="none"
return

}

if(farm.state==="GROW"){

if(Date.now()>farm.ready){

farm.state="READY"
saveFarm(farm)

}

}

if(farm.state==="GROW"){

farmStatus.textContent="成長中..."
plantBtn.style.display="none"

}

if(farm.state==="READY"){

farmStatus.textContent="収穫可能"
harvestBtn.style.display="inline-block"

}

}

let trialTimer
let cursorPos=0

function startTrial(){

trialBox.style.display="block"

trialTimer=setInterval(()=>{

cursorPos+=2

if(cursorPos>100)cursorPos=0

cursor.style.left=cursorPos+"%"

},20)

}

function stopTrial(){

clearInterval(trialTimer)

let success=cursorPos>40&&cursorPos<60

trialBox.style.display="none"

giveCard(success)

}

function giveCard(success){

let farm=getFarm()

let book=getBook()

let owned=Object.keys(book.got||{})

let pool=GOD_CARDS.filter(c=>c.type==farm.type&&!owned.includes(c.id))

if(pool.length==0){

pool=GOD_CARDS.filter(c=>c.type==farm.type)

}

let card=pool[Math.floor(Math.random()*pool.length)]

book.got=book.got||{}
book.got[card.id]={count:1}

saveBook(book)

alert(success?"試練成功！":"試練失敗")

alert("神カード獲得\n"+card.name)

saveFarm({})

updateFarm()

renderAltar()

checkComplete()

}

function renderAltar(){

let book=getBook()

altarGrid.innerHTML=""

GOD_CARDS.forEach(card=>{

let div=document.createElement("div")
div.className="card"

if(!book.got||!book.got[card.id]){

div.classList.add("lock")
div.textContent="？？？"

}else{

div.innerHTML="<img src='"+card.img+"'><br>"+card.name

}

altarGrid.appendChild(div)

})

}

function checkComplete(){

let book=getBook()

let types=["yaki","shop","fish","tower"]

let ok=types.every(t=>

GOD_CARDS.some(c=>c.type==t&&book.got&&book.got[c.id])

)

if(ok){

alert("神4種コンプリート！\n神の祝福！")

}

}

plantBtn.onclick=plantSeed

harvestBtn.onclick=startTrial

stopBtn.onclick=stopTrial

grantSeeds()
loadStats()
updateFarm()
renderAltar()

</script>

</body>
</html>
