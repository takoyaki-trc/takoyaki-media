<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>カード募集板｜たこ焼きトレカ</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#11231f;
      --bg2:#0d1715;
      --panel:#2c160f;
      --panel2:#4d2a16;
      --wood1:#8a5627;
      --wood2:#6f421d;
      --wood3:#4e2d12;
      --gold1:#fff0ba;
      --gold2:#f2cf70;
      --gold3:#ad7a23;
      --cream:#f7efdc;
      --cream2:#e9ddc0;
      --line:rgba(255,255,255,.13);
      --text:#fff7e8;
      --muted:#dfd1b2;
      --ink:#3b2918;
      --ok:#7ee3a2;
      --done:#ead089;
      --danger:#ff9f9f;
      --shadow:0 16px 34px rgba(0,0,0,.32);
      --safeTop:max(12px, env(safe-area-inset-top));
      --safeBottom:max(12px, env(safe-area-inset-bottom));
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }

    body{
      margin:0;
      color:var(--text);
      font-family:"DotGothic16", system-ui, sans-serif;
      background:
        linear-gradient(180deg, rgba(0,0,0,.18), rgba(0,0,0,.28)),
        linear-gradient(180deg, var(--bg), var(--bg2));
      min-height:100dvh;
      overflow-x:hidden;
    }

    .page{
      width:min(900px, calc(100% - 14px));
      margin:0 auto;
      padding:var(--safeTop) 0 calc(18px + var(--safeBottom));
    }

    /* =========================
       Premium top bar
    ========================= */
    .topbar{
      display:grid;
      grid-template-columns:72px 1fr 118px;
      gap:10px;
      align-items:center;
      padding:8px;
      border-radius:24px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03)),
        linear-gradient(180deg, var(--wood1), var(--wood2));
      border:1px solid rgba(255,230,182,.18);
      box-shadow:
        inset 0 0 0 2px rgba(255,255,255,.05),
        var(--shadow);
      position:relative;
      overflow:hidden;
      margin-bottom:12px;
    }

    .topbar::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,234,173,.14), transparent 34%),
        linear-gradient(90deg, transparent, rgba(255,255,255,.05), transparent);
    }

    .top-btn{
      appearance:none;
      border:none;
      cursor:pointer;
      min-height:58px;
      border-radius:22px;
      font:inherit;
      color:#6b4312;
      background:
        linear-gradient(180deg, #fff5d7, #f0cf66);
      box-shadow:
        inset 0 0 0 2px rgba(255,255,255,.42),
        inset 0 -8px 16px rgba(255,255,255,.12),
        0 8px 18px rgba(0,0,0,.18);
      position:relative;
    }

    .top-btn::before{
      content:"";
      position:absolute;
      inset:8px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.4);
      pointer-events:none;
    }

    .top-btn.back{
      font-size:26px;
      font-weight:700;
    }

    .top-btn .btnSub{
      display:block;
      font-size:11px;
      color:#8a662f;
      line-height:1.2;
      margin-top:2px;
    }

    .top-title{
      text-align:center;
      min-width:0;
      position:relative;
      z-index:1;
      padding:6px 4px;
    }

    .top-title h1{
      margin:0;
      font-size:clamp(26px, 5vw, 38px);
      line-height:1.1;
      letter-spacing:.01em;
      color:#fff8ec;
      text-shadow:0 2px 8px rgba(0,0,0,.2);
    }

    .top-title p{
      margin:4px 0 0;
      font-size:13px;
      line-height:1.45;
      color:#f1dfbc;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    /* =========================
       Hero
    ========================= */
    .heroWrap{
      margin-bottom:14px;
    }

    .heroImageBox{
      position:relative;
      border-radius:0;
      overflow:hidden;
      border:4px solid #0e0e0e;
      box-shadow:var(--shadow);
      background:#000;
    }

    .heroImage{
      display:block;
      width:100%;
      height:auto;
      aspect-ratio:16 / 11;
      object-fit:cover;
    }

    .heroNote{
      margin-top:10px;
      background:linear-gradient(180deg, #f7f4ee, #ebe4d5);
      color:#5b4531;
      border:1px solid rgba(90,67,38,.18);
      border-radius:26px;
      box-shadow:var(--shadow);
      padding:16px 18px 14px;
    }

    .heroNoteBadge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:30px;
      padding:5px 12px;
      background:linear-gradient(180deg, #7b4a1e, #5c3415);
      color:#fff3dc;
      border-radius:999px;
      font-size:12px;
      margin-bottom:10px;
      box-shadow:0 6px 14px rgba(0,0,0,.14);
    }

    .heroNoteText{
      margin:0;
      font-size:14px;
      line-height:1.8;
    }

    /* =========================
       Section title
    ========================= */
    .sectionBox{
      background:
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02)),
        linear-gradient(180deg, rgba(40,20,57,.94), rgba(24,12,34,.96));
      border:1px solid var(--line);
      border-radius:26px;
      box-shadow:var(--shadow);
      padding:16px;
      margin-bottom:14px;
    }

    .sectionHead{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      margin-bottom:12px;
      flex-wrap:wrap;
    }

    .sectionTitle{
      margin:0;
      font-size:20px;
      line-height:1.2;
    }

    .sectionSub{
      margin:6px 0 0;
      font-size:12px;
      color:var(--muted);
      line-height:1.7;
    }

    .specialMini{
      min-width:min(250px,100%);
      max-width:330px;
      padding:12px;
      border-radius:18px;
      background:
        linear-gradient(180deg, rgba(130,61,23,.35), rgba(70,24,16,.45)),
        linear-gradient(180deg, #4b1d15, #2b1113);
      border:1px solid rgba(255,215,145,.16);
    }

    .specialMiniCap{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:28px;
      padding:4px 10px;
      background:linear-gradient(180deg, var(--gold1), var(--gold2));
      color:#44270f;
      border-radius:8px;
      font-size:11px;
      margin-bottom:8px;
    }

    .specialMiniTitle{
      margin:0 0 6px;
      font-size:15px;
      line-height:1.35;
      color:#fff0c4;
    }

    .specialMiniText{
      margin:0;
      font-size:12px;
      line-height:1.65;
      color:#f2dfbe;
    }

    /* =========================
       Job list
    ========================= */
    .jobList{
      display:grid;
      gap:12px;
    }

    .jobCard{
      position:relative;
      padding:12px;
      border-radius:24px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02)),
        linear-gradient(180deg, rgba(144,92,40,.78), rgba(104,61,25,.82));
      border:1px solid rgba(255,240,210,.12);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .jobCard::before{
      content:"";
      position:absolute;
      inset:12px;
      border-radius:18px;
      border:2px solid rgba(255,255,255,.06);
      pointer-events:none;
    }

    .jobCard.done{
      opacity:.88;
      filter:saturate(.9);
    }

    .jobTop{
      display:grid;
      grid-template-columns:96px 1fr;
      gap:10px;
      align-items:center;
      margin-bottom:10px;
      position:relative;
      z-index:1;
    }

    .charFrame{
      width:96px;
      height:96px;
      border-radius:18px;
      display:grid;
      place-items:center;
      background:
        radial-gradient(circle at 50% 25%, rgba(255,255,255,.1), transparent 38%),
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(0,0,0,.06));
      border:1px solid rgba(255,255,255,.07);
      overflow:hidden;
    }

    .charImg{
      width:84px;
      height:84px;
      object-fit:contain;
      image-rendering:auto;
      filter:drop-shadow(0 8px 14px rgba(0,0,0,.22));
    }

    .jobInfo{
      min-width:0;
      background:linear-gradient(180deg, rgba(20,9,29,.96), rgba(14,7,22,.96));
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:12px;
    }

    .jobNameRow{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:8px;
      margin-bottom:4px;
    }

    .jobName{
      margin:0;
      font-size:15px;
      line-height:1.4;
      word-break:break-word;
    }

    .badgeRow{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      margin-top:6px;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:28px;
      padding:5px 10px;
      border-radius:8px;
      font-size:11px;
      border:1px solid rgba(255,255,255,.1);
      background:rgba(255,255,255,.07);
      color:#fff8e8;
      white-space:nowrap;
    }

    .badge.ok{
      background:#7ee3a2;
      color:#1a4b2e;
      border-color:rgba(0,0,0,.08);
    }
    .badge.done{
      background:#ead089;
      color:#503915;
      border-color:rgba(0,0,0,.08);
    }
    .badge.ng{
      background:#f1a5a5;
      color:#602727;
      border-color:rgba(0,0,0,.08);
    }
    .badge.featured{
      background:linear-gradient(180deg, var(--gold1), var(--gold2));
      color:#4d2d10;
      border-color:rgba(0,0,0,.08);
    }

    .star{
      font-size:14px;
      line-height:1;
      letter-spacing:1px;
    }
    .star.s1,.star.s2{ color:#dccba7; }
    .star.s3{ color:#97d6ff; }
    .star.s4{ color:#e0b8ff; }
    .star.s5{ color:#ffe88b; }

    .speech{
      position:relative;
      z-index:1;
      margin:0 0 10px 106px;
      width:fit-content;
      max-width:calc(100% - 106px);
      background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(246,235,210,.98));
      color:#4a3521;
      border:2px solid rgba(120,81,28,.24);
      border-radius:18px;
      padding:10px 14px;
      box-shadow:0 8px 18px rgba(0,0,0,.15);
      font-size:13px;
      line-height:1.55;
    }

    .speech::before{
      content:"";
      position:absolute;
      left:18px;
      top:-8px;
      width:14px;
      height:14px;
      transform:rotate(45deg);
      background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(246,235,210,.98));
      border-left:2px solid rgba(120,81,28,.24);
      border-top:2px solid rgba(120,81,28,.24);
    }

    .jobMain{
      position:relative;
      z-index:1;
      margin-left:106px;
      background:linear-gradient(180deg, rgba(18,9,26,.96), rgba(12,6,20,.98));
      border:1px solid rgba(255,255,255,.08);
      border-radius:20px;
      padding:12px;
    }

    .wantRow{
      display:grid;
      grid-template-columns:1fr auto;
      gap:10px;
      align-items:start;
      margin-bottom:10px;
    }

    .wantCards{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      min-width:0;
    }

    .miniCard{
      width:54px;
      height:76px;
      border-radius:6px;
      overflow:hidden;
      position:relative;
      border:2px solid rgba(255,255,255,.18);
      background:#fff2d8;
      box-shadow:0 4px 10px rgba(0,0,0,.18);
      flex:none;
    }

    .miniCard img{
      width:100%;
      height:100%;
      display:block;
      object-fit:cover;
    }

    .miniQty{
      position:absolute;
      right:4px;
      bottom:4px;
      min-width:20px;
      height:20px;
      padding:0 5px;
      border-radius:999px;
      background:rgba(0,0,0,.84);
      color:#fff7e7;
      display:grid;
      place-items:center;
      font-size:10px;
      border:1px solid rgba(255,255,255,.14);
    }

    .miniRarity{
      width:100%;
      height:100%;
      display:grid;
      place-items:center;
      text-align:center;
      padding:6px;
      font-size:10px;
      line-height:1.35;
      color:#24160e;
      border-radius:0;
      background:linear-gradient(180deg,#fff8eb,#efdcb2);
    }
    .miniRarity.N  { background:linear-gradient(180deg,#f7efe3,#e7dccb); }
    .miniRarity.R  { background:linear-gradient(180deg,#e0f2ff,#bddcff); }
    .miniRarity.SR { background:linear-gradient(180deg,#f0ddff,#d8b3ff); }
    .miniRarity.UR { background:linear-gradient(180deg,#fff0c1,#ffd36d); }
    .miniRarity.LR { background:linear-gradient(180deg,#fff4b9,#ffd64a); }
    .miniRarity.SP { background:linear-gradient(180deg,#ffe4e7,#ff9ab4); }

    .actionCol{
      display:grid;
      gap:8px;
      min-width:124px;
      align-content:start;
    }

    .jobBtn{
      appearance:none;
      border:none;
      cursor:pointer;
      font:inherit;
      min-height:42px;
      border-radius:12px;
      background:linear-gradient(180deg, #fff6e2, #edd8a8);
      color:#3c2611;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.75);
      padding:8px 12px;
    }

    .jobBtn.primary{
      background:linear-gradient(180deg, #fff0be, #efc85c);
      color:#4a2c10;
    }

    .rewardRow{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      align-items:center;
    }

    .rewardChip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:28px;
      padding:5px 9px;
      border-radius:8px;
      font-size:11px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.1);
      color:#fff9eb;
      white-space:nowrap;
    }

    .legendCard{
      margin-top:12px;
      border-radius:22px;
      overflow:hidden;
      background:
        linear-gradient(180deg, rgba(118,47,18,.36), rgba(51,18,17,.48)),
        linear-gradient(180deg, #431912, #241013);
      border:1px solid rgba(255,215,145,.16);
      box-shadow:var(--shadow);
      display:none;
    }

    .legendCard.show{ display:block; }

    .legendInner{
      display:grid;
      grid-template-columns:90px 1fr auto;
      gap:12px;
      align-items:center;
      padding:12px;
    }

    .legendAvatar{
      width:90px;
      height:90px;
      object-fit:contain;
      filter:drop-shadow(0 8px 14px rgba(0,0,0,.22));
    }

    .legendCap{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:28px;
      padding:5px 10px;
      background:linear-gradient(180deg, var(--gold1), var(--gold2));
      color:#46270e;
      border-radius:8px;
      font-size:11px;
      margin-bottom:8px;
    }

    .legendName{
      margin:0 0 6px;
      font-size:17px;
      line-height:1.35;
      color:#fff0c4;
    }

    .legendText{
      margin:0;
      font-size:12px;
      line-height:1.65;
      color:#f0debf;
    }

    .helper{
      margin:6px 2px 0;
      color:var(--muted);
      font-size:12px;
      line-height:1.7;
    }

    /* =========================
       Modal
    ========================= */
    .modal{
      position:fixed;
      inset:0;
      z-index:9998;
      display:none;
      align-items:center;
      justify-content:center;
      background:rgba(10,6,18,.76);
      backdrop-filter:blur(6px);
      padding:16px;
    }
    .modal.show{ display:flex; }

    .modalCard{
      width:min(920px, 100%);
      max-height:min(92dvh, 960px);
      overflow:auto;
      background:linear-gradient(180deg, var(--cream), var(--cream2));
      color:var(--ink);
      border-radius:24px;
      border:4px solid #7f5a26;
      box-shadow:0 26px 60px rgba(0,0,0,.44);
      position:relative;
    }

    .modalClose{
      position:absolute;
      right:10px;
      top:10px;
      z-index:2;
      width:42px;
      height:42px;
      border:none;
      border-radius:10px;
      font:inherit;
      cursor:pointer;
      background:rgba(0,0,0,.1);
      color:#2d1d10;
    }

    .modalInner{
      padding:18px;
    }

    .detailTop{
      display:grid;
      grid-template-columns:100px 1fr auto;
      gap:14px;
      align-items:start;
      margin-bottom:14px;
    }

    .detailAvatar{
      width:100px;
      height:100px;
      object-fit:contain;
      background:#fff5df;
      border-radius:18px;
      border:3px solid rgba(105,71,32,.55);
      box-shadow:0 8px 18px rgba(0,0,0,.16);
    }

    .detailName{
      margin:0 0 8px;
      font-size:22px;
      line-height:1.2;
    }

    .detailLine{
      margin:0;
      color:#4b3520;
      font-size:14px;
      line-height:1.7;
      white-space:pre-line;
    }

    .detailRight{
      text-align:right;
      min-width:120px;
    }

    .detailTags{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
      margin-top:8px;
    }

    .tag{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:28px;
      padding:6px 10px;
      border-radius:8px;
      background:rgba(255,255,255,.55);
      border:1px solid rgba(0,0,0,.1);
      color:#3d2a18;
      font-size:12px;
    }

    .sectionTitle2{
      margin:0 0 10px;
      font-size:15px;
      color:#4d3822;
    }

    .wantGrid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(92px, max-content));
      gap:10px;
      margin-bottom:14px;
    }

    .wantItem{
      width:82px;
    }

    .wantCard{
      width:82px;
      height:114px;
      border-radius:6px;
      overflow:hidden;
      position:relative;
      border:3px solid #694720;
      background:#fff2d7;
      box-shadow:0 6px 14px rgba(0,0,0,.15);
    }

    .wantCard img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .needQty{
      position:absolute;
      right:6px;
      bottom:6px;
      min-width:28px;
      height:28px;
      padding:0 7px;
      border-radius:999px;
      background:rgba(18,13,8,.88);
      color:#fff7eb;
      display:grid;
      place-items:center;
      font-size:13px;
      border:2px solid rgba(255,255,255,.18);
    }

    .ownQty{
      position:absolute;
      left:6px;
      top:6px;
      min-width:34px;
      height:24px;
      padding:0 6px;
      border-radius:999px;
      background:rgba(255,255,255,.92);
      color:#2c2016;
      display:grid;
      place-items:center;
      font-size:11px;
      border:2px solid rgba(0,0,0,.08);
    }

    .wantName{
      margin-top:6px;
      font-size:11px;
      line-height:1.45;
      color:#4a3422;
      word-break:break-word;
      min-height:32px;
    }

    .rewardGrid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
      gap:10px;
      margin-bottom:14px;
    }

    .rewardBox{
      background:rgba(255,255,255,.5);
      border:1px solid rgba(0,0,0,.08);
      border-radius:14px;
      padding:10px;
    }
    .rewardBoxLabel{
      font-size:11px;
      color:#6a533d;
      margin-bottom:5px;
    }
    .rewardBoxValue{
      font-size:14px;
      color:#312013;
      line-height:1.6;
      white-space:pre-line;
    }

    .statusList{
      background:rgba(255,255,255,.42);
      border:1px solid rgba(0,0,0,.08);
      border-radius:14px;
      padding:12px;
      margin-bottom:14px;
    }
    .statusLine{
      font-size:13px;
      line-height:1.7;
      color:#523b25;
    }
    .statusLine.ok{ color:#0e7e47; }
    .statusLine.ng{ color:#9d2b2b; }

    .modalActions{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    .modalNote{
      color:#5b4530;
      font-size:12px;
      line-height:1.7;
    }

    /* =========================
       Reward popup
    ========================= */
    .rewardDrop{
      position:fixed;
      inset:0;
      z-index:9999;
      display:none;
      place-items:center;
      background:rgba(8,5,14,.72);
      backdrop-filter:blur(6px);
      padding:16px;
    }
    .rewardDrop.show{ display:grid; }

    .rewardDropCard{
      width:min(720px,100%);
      background:linear-gradient(180deg, rgba(26,14,37,.98), rgba(18,10,27,.98));
      color:var(--text);
      border:1px solid rgba(255,255,255,.12);
      border-radius:24px;
      box-shadow:0 24px 60px rgba(0,0,0,.45);
      padding:18px;
      text-align:center;
    }

    .rewardDropCap{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:6px 12px;
      border-radius:8px;
      background:linear-gradient(180deg, var(--gold1), var(--gold2));
      color:#341e0d;
      font-size:12px;
      margin-bottom:10px;
    }

    .rewardDropTitle{
      margin:0 0 10px;
      font-size:24px;
      line-height:1.3;
    }

    .rewardDropSub{
      margin:0 0 12px;
      color:var(--muted);
      font-size:13px;
      line-height:1.7;
      white-space:pre-line;
    }

    .rewardRevealList{
      display:grid;
      gap:8px;
      margin:0 0 14px;
    }

    .rewardReveal{
      opacity:0;
      transform:translateY(8px) scale(.98);
      transition:.2s ease;
      min-height:44px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      border-radius:12px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      padding:10px 12px;
      font-size:14px;
    }
    .rewardReveal.show{
      opacity:1;
      transform:translateY(0) scale(1);
    }

    @media (max-width:720px){
      .topbar{
        grid-template-columns:64px 1fr 98px;
        gap:8px;
      }

      .top-btn{
        min-height:54px;
      }

        white-space:normal;

        height:86px;
      }

      .charImg{

      .jobMain{

      }

      }

      }

        text-align:left;
      }

      .detailTags{
        justify-content:flex-start;
      }
    }

    @media (max-width:520px){
      .page{
        width:calc(100% - 10px);
      }

      .topbar{
        grid-template-columns:60px 1fr 88px;
      }

      .top-title h1{
        font-size:26px;
      }

      .top-title p{

      }

      .jobCard{

        height:72px;
      }

      .wantGrid{
        grid-template-columns:repeat(3, max-content);
      }

    function seededRandom(seedStr){
      let h = 2166136261;
      for(let i=0;i<seedStr.length;i++){
        h ^= seedStr.charCodeAt(i);
        h = Math.imul(h, 16777619);
      }
      return function(){
        h += h << 13; h ^= h >>> 7;
        h += h << 3;  h ^= h >>> 17;
        h += h << 5;
        return ((h >>> 0) / 4294967295);
      };
    }
    function pick(arr, rnd){

    function pickUnique(arr, count, rnd){
      const src = arr.slice();
      const out = [];
      while(src.length && out.length < count){
        out.push(src.splice(Math.floor(rnd() * src.length), 1)[0]);
      }
      return out;
    }
    function weightedPick(list, rnd){
      const total = list.reduce((s, v) => s + (v.weight || 1), 0);
      let roll = rnd() * total;
      for(const item of list){
        roll -= (item.weight || 1);
        if (roll <= 0) return item;
      }
      return list[list.length - 1];
    }

      if (type === "guide"){
        return CARDS_ALL.filter(c => ["N","R"].includes(c.rarity));

      const allowed = new Set(TYPE_CONFIG[type]?.wantBias || ["N","R","SR"]);
      return CARDS_ALL.filter(card => allowed.has(card.rarity));

    function makeWant(rnd, type, difficulty, usedIds, legend=false){
      const pRarityQuest = legend ? 0.52 : (difficulty >= 4 ? 0.22 : 0.08);
      if (rnd() < pRarityQuest){
        const rarityPool = legend ? ["UR","LR","SP"] : (difficulty >= 5 ? ["SR","UR","LR"] : difficulty >= 4 ? ["SR","UR"] : ["R","SR"]);
        const rarity = pick(rarityPool, rnd);
        return {
          type:"rarity",
          rarity,
          qty: difficulty >= 5 ? 2 : 1,
          label: `${rarity}以上`
        };
      }

      let pool = getDisplayPoolByType(type, legend).filter(c => !usedIds.has(c.id));
      if (!pool.length) pool = getDisplayPoolByType(type, legend);

      const card = pick(pool, rnd);
      usedIds.add(card.id);

      let qty = 1;
      if (difficulty === 2 && rnd() < .35) qty = 2;
      if (difficulty === 3 && rnd() < .45) qty = 2;
      if (difficulty === 4) qty = rnd() < .5 ? 2 : 3;
      if (difficulty >= 5) qty = rnd() < .4 ? 2 : 3;

      if (["collector","ramen","party"].includes(type) && rnd() < .35) qty += 1;
      if (legend) qty = 1;

      return {
        type:"card",
        cardId:card.id,
        name:card.name,
        img:card.img,
        rarity:card.rarity,
        qty
      };
    }

    function rewardOctoByDifficulty(difficulty, isLegend, type, rnd){
      const base = isLegend ? [380, 620]
        : difficulty === 1 ? [30, 60]
        : difficulty === 2 ? [55, 90]
        : difficulty === 3 ? [90, 150]
        : difficulty === 4 ? [140, 240]
        : [220, 360];

      let val = Math.floor(rnd() * (base[1] - base[0] + 1)) + base[0];
      if (type === "rich") val = Math.round(val * 1.35);
      if (type === "streamer" && rnd() < .08) val *= 3;
      return val * 3;
    }

      if (difficulty >= 4) randCount = 2;
      if (difficulty >= 5) randCount = 3;
      if (isLegend) randCount = 3;

      const randPool = profile.rand.map(([kind,id,weight]) => ({ kind, id, weight }));
      for(let i=0;i<randCount;i++){
        const picked = weightedPick(randPool, rnd);
        out.push({ kind:picked.kind, id:picked.id, qty:1 });
      }

      if (isLegend){
        if (rnd() < .28) out.push({ kind:"water", id:"water_supergod", qty:1 });
        if (rnd() < .18) out.push({ kind:"seed", id:"seed_special", qty:1 });
      } else if (difficulty >= 5 && rnd() < .15){
        out.push({ kind:"water", id:"water_supergod", qty:1 });
      }

      const map = new Map();
      out.forEach(item => {
        const key = `${item.kind}:${item.id}`;
        map.set(key, { kind:item.kind, id:item.id, qty:(map.get(key)?.qty || 0) + item.qty });
      });

      return Array.from(map.values());
    }

    function getDifficultyForVisitor(type, rnd){
      if (type === "rich") return 5;
      if (type === "king" || type === "pilgrim") return rnd() < .52 ? 4 : 5;
      if (type === "guide" || type === "careful" || type === "relax") return rnd() < .65 ? 2 : 3;
      if (type === "looker" || type === "diet") return rnd() < .55 ? 2 : 3;
      if (type === "collector" || type === "artisan" || type === "shadow" || type === "gourmet") return rnd() < .35 ? 3 : 4;
      return rnd() < .34 ? 2 : rnd() < .72 ? 3 : 4;
    }

    function makeJob(visitor, idx, dateSeed, featured=false, legend=false){
      const rnd = seededRandom(`${dateSeed}::job::${visitor.id}::${idx}::${legend ? "legend" : "normal"}`);
      const conf = TYPE_CONFIG[visitor.type] || TYPE_CONFIG.careful;
      const difficulty = legend ? 5 : Math.min(5, Math.max(featured ? 3 : 1, getDifficultyForVisitor(visitor.type, rnd)));
      const wantCount = legend ? 1 : difficulty <= 2 ? 1 : difficulty === 3 ? 2 : 2 + (rnd() < .55 ? 1 : 0);
      const usedIds = new Set();
      const wants = [];
      for(let i=0;i<wantCount;i++){
        wants.push(makeWant(rnd, visitor.type, difficulty, usedIds, legend));
      }

      const rewards = {
        octo: rewardOctoByDifficulty(difficulty, legend, visitor.type, rnd),
        exp: rewardExpByDifficulty(difficulty, legend),
        rep: legend ? 5 : Math.max(0, difficulty - 1),
        items: makeRewardItems(
          legend ? "legend" : (conf.rewardProfile || "light"),
          difficulty,
          legend,
          rnd
        )
      };

      return {
        id:`${legend ? "legend" : "job"}_${idx+1}_${visitor.id}`,
        visitorId:visitor.id,
        visitorName:visitor.name,
        visitorType:visitor.type,
        visitorImg:visitor.url,
        difficulty,
        featured,
        legend,
        line: pick(conf.line, rnd),
        wants,
        rewards,
        completed:false,
        completedAt:null
      };
    }

    function generateBoard(force=false){
      const today = todayKey();
      const old = loadJSON(KEY.board, null);
      if (!force && old?.date === today) return old;

      const rnd = seededRandom(`board::${today}`);
      const selectable = ASSETS.visitors.filter(v => v.type !== "guide");
      const chosen = pickUnique(selectable, 5, rnd);

      const featuredIndex = Math.floor(rnd() * chosen.length);
      const jobs = chosen.map((visitor, idx) => makeJob(visitor, idx, today, idx === featuredIndex, false));
      const legendChance = 0.38;
      let legendJob = null;

      if (rnd() < legendChance){
        const legendCandidates = selectable.filter(v => ["rich","king","pilgrim","picky","overflow"].includes(v.type));
        const legendVisitor = pick(legendCandidates, rnd);
        legendJob = makeJob(legendVisitor, 99, today, true, true);
      }

      const state = {
        date:today,
        jobs,
        legendJob
      };
      saveJSON(KEY.board, state);
      return state;
    }

    function getBoard(){
      return loadJSON(KEY.board, null) || generateBoard(false);
    }

    function getNeedStatus(job){
      const lines = [];
      let ok = true;

      for(const want of job.wants){
        if (want.type === "card"){
          const owned = getOwnedCount(want.cardId);
          const good = owned >= want.qty;
          if (!good) ok = false;
          lines.push({ ok:good, text:`${want.name}　${owned}/${want.qty}` });
        }else{
          const list = getOwnedCardsByRarityAtLeast(want.rarity);
          const total = list.reduce((sum, c) => sum + c.count, 0);
          const good = total >= want.qty;
          if (!good) ok = false;
          lines.push({ ok:good, text:`${want.label}　${total}/${want.qty}` });
        }
      }

      return { ok, lines };
    }

    function consumeNeed(want){
      if (want.type === "card"){
        if (getOwnedCount(want.cardId) < want.qty) return false;
        addOwned(want.cardId, -want.qty);
        return true;
      }

      let remain = want.qty;
      const list = getOwnedCardsByRarityAtLeast(want.rarity);
      const total = list.reduce((sum, c) => sum + c.count, 0);
      if (total < remain) return false;

      for(const c of list){
        if (remain <= 0) break;
        const use = Math.min(remain, c.count);
        addOwned(c.id, -use);
        remain -= use;
      }
      return remain === 0;
    }

    function applyRewards(job){
      addOcto(job.rewards.octo);
      addPlayerStats(job.rewards.exp, job.rewards.rep);

      for(const item of job.rewards.items){
        addInventory(item.kind, item.id, item.qty);
      }
    }

    function itemIcon(kind){
      if (kind === "seed") return "🌱";
      if (kind === "water") return "💧";
      return "🧪";
    }

    function itemLabel(kind, id){
      return REWARD_ITEMS[kind]?.[id]?.name || id;
    }

    function getTimeMode(){
      const h = nowTokyo().getHours();
      return (h >= 6 && h < 18) ? "day" : "night";
    }

    function renderHero(){
      const mode = getTimeMode();
      $("#heroImage").src = mode === "day" ? ASSETS.bgDay : ASSETS.bgNight;

      const rnd = seededRandom(`guide::${todayKey()}`);
      $("#guideText").textContent = pick(GUIDE_LINES, rnd);
    }

    function getVisitorStatus(job){
      const need = getNeedStatus(job);
      if (job.completed) return { cls:"done", text:"達成済み", bubble:"受け取ったたこ！" };
      if (need.ok) return { cls:"ok", text:"納品できる", bubble:"そろってるなら今ほしいたこ" };
      return { cls:"ng", text:"カード不足", bubble:job.line };
    }

    function miniWantHTML(want){
      if (want.type === "card"){
        return `
          <div class="miniCard">
            <img src="${want.img}" alt="${escapeHtml(want.name)}">
            <div class="miniQty">×${want.qty}</div>
          </div>
        `;
      }

      return `
        <div class="miniCard">
          <div class="miniRarity ${escapeHtml(want.rarity)}">
            <div>${escapeHtml(want.label)}</div>
            <div>×${want.qty}</div>
          </div>
        </div>
      `;
    }

    function rewardMiniHTML(job){
      const items = job.rewards.items.slice(0, 2).map(item => {
        return `<span class="rewardChip">${itemIcon(item.kind)} ${escapeHtml(itemLabel(item.kind, item.id))}×${item.qty}</span>`;
      }).join("");

      return `
        <span class="rewardChip">🪙 ${job.rewards.octo.toLocaleString()}</span>
        ${items}
      `;
    }

    function sortJobs(jobs){
      return jobs.slice().sort((a,b) => {
        const sa = getVisitorStatus(a);
        const sb = getVisitorStatus(b);

        const weight = (job, status) => {
          if (job.completed) return 2;
          if (status.cls === "ok") return 0;
          return 1;
        };

        const wa = weight(a, sa);
        const wb = weight(b, sb);
        if (wa !== wb) return wa - wb;
        if (a.featured !== b.featured) return a.featured ? -1 : 1;
        return b.difficulty - a.difficulty;
      });
    }

    function renderJobs(){
      const state = getBoard();
      const root = $("#jobList");
      const jobs = sortJobs(state.jobs);

      root.innerHTML = jobs.map(job => {
        const status = getVisitorStatus(job);
        const btnLabel = job.completed ? "達成済み"
          : status.cls === "ok" ? "今すぐ納品"
          : "詳細を見る";

        return `
          <article class="jobCard ${job.completed ? "done" : ""}">
            <div class="jobTop">
              <div class="charFrame">
                <img class="charImg" src="${job.visitorImg}" alt="${escapeHtml(job.visitorName)}">
              </div>

              <div class="jobInfo">
                <div class="jobNameRow">
                  <h3 class="jobName">${escapeHtml(job.visitorName)}</h3>
                  <div class="star s${job.difficulty}">${stars(job.difficulty)}</div>
                </div>

                <div class="badgeRow">
                  ${job.featured ? `<span class="badge featured">目玉依頼</span>` : ``}
                  <span class="badge ${status.cls}">${status.text}</span>
                </div>
              </div>
            </div>

            <div class="speech">${escapeHtml(status.bubble)}</div>

            <div class="jobMain">
              <div class="wantRow">
                <div>
                  <div class="wantCards">${job.wants.slice(0,3).map(miniWantHTML).join("")}</div>
                  <div class="rewardRow" style="margin-top:10px;">${rewardMiniHTML(job)}</div>
                </div>

                <div class="actionCol">
                  <button class="jobBtn ${status.cls === "ok" && !job.completed ? "primary" : ""}" type="button" data-job-id="${job.id}">
                    ${btnLabel}
                  </button>
                </div>
              </div>
            </div>
          </article>
        `;
      }).join("");

      if (state.legendJob){
        const job = state.legendJob;
        const need = getNeedStatus(job);
        $("#legendCard").classList.add("show");
        $("#legendCard").innerHTML = `
          <div class="legendInner">
            <img class="legendAvatar" src="${job.visitorImg}" alt="${escapeHtml(job.visitorName)}">

            <div>
              <div class="legendCap">本日の特別依頼</div>
              <h3 class="legendName">${escapeHtml(job.visitorName)}</h3>
              <p class="legendText">
                ${escapeHtml(job.line)}<br>
                報酬：🪙 ${job.rewards.octo.toLocaleString()}
                ${job.rewards.items.map(v => ` / ${itemIcon(v.kind)} ${itemLabel(v.kind, v.id)}×${v.qty}`).join("")}
              </p>
            </div>

            <div style="display:grid; gap:8px; justify-items:end;">
              <div class="badge ${job.completed ? "done" : need.ok ? "ok" : "ng"}">${job.completed ? "達成済み" : need.ok ? "納品できる" : "カード不足"}</div>
              <button class="jobBtn primary" type="button" data-job-id="${job.id}">詳細を見る</button>
            </div>
          </div>
        `;
      } else {
        $("#legendCard").classList.remove("show");
        $("#legendCard").innerHTML = "";
      }

      $$("[data-job-id]").forEach(btn => {
        btn.addEventListener("click", () => openJobModal(btn.dataset.jobId));
      });
    }

    function findJobById(jobId){
      const state = getBoard();
      return state.jobs.find(v => v.id === jobId) || (state.legendJob?.id === jobId ? state.legendJob : null);
    }

    function wantDetailHTML(want){
      if (want.type === "card"){
        const owned = getOwnedCount(want.cardId);
        return `
          <div class="wantItem">
            <div class="wantCard">
              <img src="${want.img}" alt="${escapeHtml(want.name)}">
              <div class="ownQty">所持${owned}</div>
              <div class="needQty">×${want.qty}</div>
            </div>
            <div class="wantName">${escapeHtml(want.name)}</div>
          </div>
        `;
      }

      const ownedList = getOwnedCardsByRarityAtLeast(want.rarity);
      const total = ownedList.reduce((sum, c) => sum + c.count, 0);
      return `
        <div class="wantItem">
          <div class="wantCard">
            <div class="miniRarity ${escapeHtml(want.rarity)}" style="font-size:12px">
              <div style="font-size:22px;margin-bottom:6px">${escapeHtml(want.rarity)}</div>
              <div>${escapeHtml(want.label)}</div>
            </div>
            <div class="ownQty">所持${total}</div>
            <div class="needQty">×${want.qty}</div>
          </div>
          <div class="wantName">${escapeHtml(want.label)}</div>
        </div>
      `;
    }

    function rewardDetailHTML(job){
      const itemLines = job.rewards.items.map(v => {
        const label = itemLabel(v.kind, v.id);
        return `${itemIcon(v.kind)} ${label} ×${v.qty}`;
      }).join("\n");

      return `
        <div class="rewardGrid">
          <div class="rewardBox">
            <div class="rewardBoxLabel">基本報酬</div>
            <div class="rewardBoxValue">🪙 ${job.rewards.octo.toLocaleString()} オクト</div>
          </div>
          <div class="rewardBox">
            <div class="rewardBoxLabel">成長報酬</div>
            <div class="rewardBoxValue">EXP +${job.rewards.exp}\n評判 +${job.rewards.rep}</div>
          </div>
          <div class="rewardBox" style="grid-column:1 / -1;">
            <div class="rewardBoxLabel">追加資材</div>
            <div class="rewardBoxValue">${escapeHtml(itemLines)}</div>
          </div>
        </div>
      `;
    }

    function renderModal(job){
      const need = getNeedStatus(job);
      $("#jobModalBody").innerHTML = `
        <div class="detailTop">
          <img class="detailAvatar" src="${job.visitorImg}" alt="${escapeHtml(job.visitorName)}">
          <div>
            <h2 class="detailName" id="jobTitle">${escapeHtml(job.visitorName)}</h2>
            <p class="detailLine">${escapeHtml(job.line)}</p>
          </div>
          <div class="detailRight">
            <div class="star s${job.difficulty}">${stars(job.difficulty)}</div>
            <div class="detailTags">
              <span class="tag">難易度 ${job.difficulty}</span>
              <span class="tag">${job.legend ? "特別依頼" : job.featured ? "目玉依頼" : "通常依頼"}</span>
            </div>
          </div>
        </div>

        <section>
          <h3 class="sectionTitle2">探しているカード</h3>
          <div class="wantGrid">
            ${job.wants.map(wantDetailHTML).join("")}
          </div>
        </section>

        <section>
          <h3 class="sectionTitle2">報酬</h3>
          ${rewardDetailHTML(job)}
        </section>

        <section class="statusList">
          ${need.lines.map(v => `<div class="statusLine ${v.ok ? "ok":"ng"}">${escapeHtml(v.text)}</div>`).join("")}
        </section>

        <div class="modalActions">
          <div class="modalNote">
            ${job.completed ? "この依頼はすでに達成済みたこ。" : need.ok ? "必要なカードが足りてるたこ。今すぐ納品できるたこ。" : "カードが足りないたこ。所持枚数が増えたらまた来るたこ。"}
          </div>
          <button class="top-btn" id="deliverBtn" style="min-height:52px; width:min(220px,100%);" ${job.completed || !need.ok ? "disabled" : ""}>${job.completed ? "納品済み" : "納品する"}</button>
        </div>
      `;

      const deliverBtn = $("#deliverBtn");
      if (deliverBtn){
        deliverBtn.addEventListener("click", () => deliverJob(job.id));
      }
    }

    function openJobModal(jobId){
      const job = findJobById(jobId);
      if (!job) return;
      renderModal(job);
      $("#jobModal").classList.add("show");
      $("#jobModal").setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closeJobModal(){
      $("#jobModal").classList.remove("show");
      $("#jobModal").setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
    }

    async function showRewardDrop(job){
      const box = $("#rewardDrop");
      const list = $("#rewardRevealList");
      $("#rewardDropTitle").textContent = `${job.visitorName} が喜んでるたこ！`;
      $("#rewardDropSub").textContent = `納品報酬を受け取ったたこ。\n下の順で追加されるたこ。`;
      list.innerHTML = "";

      const lines = [
        `🪙 ${job.rewards.octo.toLocaleString()} オクト`,
        `EXP +${job.rewards.exp} / 評判 +${job.rewards.rep}`,
        ...job.rewards.items.map(v => `${itemIcon(v.kind)} ${itemLabel(v.kind, v.id)} ×${v.qty}`)
      ];

      box.classList.add("show");

      for(const line of lines){
        const row = document.createElement("div");
        row.className = "rewardReveal";
        row.textContent = line;
        list.appendChild(row);
        await new Promise(r => setTimeout(r, 170));
        row.classList.add("show");
      }
    }

    function hideRewardDrop(){
      $("#rewardDrop").classList.remove("show");
      $("#rewardRevealList").innerHTML = "";
    }

    function saveBoardState(state){
      saveJSON(KEY.board, state);
    }

    function deliverJob(jobId){
      const state = getBoard();
      const job = state.jobs.find(v => v.id === jobId) || (state.legendJob?.id === jobId ? state.legendJob : null);
      if (!job || job.completed) return;

      const need = getNeedStatus(job);
      if (!need.ok){
        renderAll();
        return;
      }

      for(const want of job.wants){
        const ok = consumeNeed(want);
        if (!ok){
          renderAll();
          return;
        }
      }

      applyRewards(job);
      job.completed = true;
      job.completedAt = Date.now();
      saveBoardState(state);

      closeJobModal();
      renderAll();
      showRewardDrop(job);
    }

    function renderAll(){
      renderHero();
      renderJobs();
    }

    function bindUI(){
      $("#backBtn").addEventListener("click", () => {
        if (history.length > 1) history.back();
        else location.href = "./";
      });

      $("#zukanBtn").addEventListener("click", () => {
        location.href = "./book.html";
      });

      $("#jobModalClose").addEventListener("click", closeJobModal);

      $("#jobModal").addEventListener("click", (e) => {
        if (e.target === $("#jobModal")) closeJobModal();
      });

      $("#rewardDropClose").addEventListener("click", hideRewardDrop);
      $("#rewardDrop").addEventListener("click", (e) => {
        if (e.target === $("#rewardDrop")) hideRewardDrop();
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape"){
          closeJobModal();
          hideRewardDrop();
        }
      });
    }

    ensureDefaults();
    generateBoard(false);
    bindUI();
    renderAll();
  })();
  </script>
</body>
</html>
