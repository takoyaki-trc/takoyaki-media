<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SPカード復旧</title>
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:#111827;
      color:#fff;
      font-family:system-ui,-apple-system,"Noto Sans JP",sans-serif;
      padding:20px;
    }
    .box{
      width:min(92vw,560px);
      background:#1f2937;
      border:1px solid rgba(255,255,255,.12);
      border-radius:18px;
      padding:20px;
      box-shadow:0 12px 30px rgba(0,0,0,.35);
    }
    h1{
      margin:0 0 12px;
      font-size:22px;
      line-height:1.3;
    }
    p{
      margin:0 0 12px;
      line-height:1.7;
      color:#dbe4ff;
    }
    .card{
      display:grid;
      grid-template-columns:96px 1fr;
      gap:14px;
      align-items:center;
      margin:14px 0;
      padding:14px;
      border-radius:14px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
    }
    .card img{
      width:96px;
      height:96px;
      object-fit:contain;
      border-radius:12px;
      background:rgba(0,0,0,.18);
      image-rendering:pixelated;
      image-rendering:crisp-edges;
    }
    .meta{
      display:flex;
      flex-direction:column;
      gap:6px;
      min-width:0;
    }
    .name{
      font-size:18px;
      font-weight:800;
      line-height:1.4;
    }
    .sub{
      font-size:13px;
      color:#c9d4f4;
      line-height:1.6;
      word-break:break-all;
    }
    .tag{
      display:inline-flex;
      align-items:center;
      width:max-content;
      padding:4px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      background:rgba(140,200,255,.18);
      border:1px solid rgba(180,220,255,.35);
      color:#eef7ff;
    }
    button{
      width:100%;
      margin-top:8px;
      padding:14px 16px;
      border:0;
      border-radius:12px;
      background:#f59e0b;
      color:#111827;
      font-weight:800;
      font-size:16px;
      cursor:pointer;
    }
    button:disabled{
      opacity:.6;
      cursor:default;
    }
    .log{
      margin-top:14px;
      padding:12px;
      border-radius:12px;
      background:rgba(255,255,255,.06);
      white-space:pre-wrap;
      line-height:1.7;
      font-size:14px;
    }
    .note{
      margin-top:10px;
      font-size:12px;
      color:#c9d4f4;
      opacity:.92;
      line-height:1.6;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>SPカード復旧ページ</h1>
    <p>
      不具合で図鑑に登録されなかったカードを、この端末の図鑑に復旧します。<br>
      ボタンを押したあと、図鑑ページを開き直してください。
    </p>

    <div class="card">
      <img
        src="https://takoyaki-card.com/town/assets/images/sp/fish.png"
        alt="タコ影群影"
      >
      <div class="meta">
        <div class="tag">SP</div>
        <div class="name">タコ影群影</div>
        <div class="sub">ID: SP-FISH-TAKOKAGE</div>
      </div>
    </div>

    <button id="restoreBtn" type="button">このカードを復旧する</button>
    <div id="log" class="log">待機中…</div>
    <div class="note">
      ※この復旧は、この端末・このブラウザのデータにのみ反映されます。<br>
      ※すでに持っている場合は、所持枚数を減らさずに情報だけ補完します。
    </div>
  </div>

  <script>
    (() => {
      "use strict";

      const KEY_BOOK = "tf_v1_book";
      const btn = document.getElementById("restoreBtn");
      const log = document.getElementById("log");

      const CARD = {
        id: "SP-FISH-TAKOKAGE",
        name: "タコ影群影",
        img: "https://takoyaki-card.com/town/assets/images/sp/fish.png",
        rarity: "SP",
        tier: "SP",
        count: 1
      };

      function safeParse(raw, fallback) {
        try {
          const v = JSON.parse(raw);
          return v ?? fallback;
        } catch {
          return fallback;
        }
      }

      function toSafeInt(v) {
        const n = Number(v);
        if (!Number.isFinite(n)) return 0;
        return Math.max(0, Math.floor(n));
      }

      function upsertCard(book, card) {
        if (!book.got || typeof book.got !== "object") {
          book.got = {};
        }

        const current = book.got[card.id];
        const currentCount =
          current && typeof current === "object"
            ? toSafeInt(current.count ?? current.owned ?? current.qty ?? 0)
            : (typeof current === "number" || typeof current === "string")
              ? toSafeInt(current)
              : current === true
                ? 1
                : 0;

        const now = Date.now();

        book.got[card.id] = {
          ...(current && typeof current === "object" ? current : {}),
          id: card.id,
          name: card.name,
          img: card.img,
          rarity: card.rarity,
          tier: card.tier || card.rarity,
          at: (current && typeof current === "object" && current.at) ? current.at : now,
          lastAt: now,
          lastAddedAt: now,
          count: Math.max(1, currentCount, card.count || 1)
        };
      }

      btn.addEventListener("click", () => {
        btn.disabled = true;

        const book = safeParse(localStorage.getItem(KEY_BOOK), { ver: 1, got: {} });
        if (!book || typeof book !== "object") {
          log.textContent = "復旧に失敗しました。\n図鑑データの形式を読み取れませんでした。";
          btn.disabled = false;
          return;
        }

        if (!("ver" in book)) book.ver = 1;
        if (!book.got || typeof book.got !== "object") book.got = {};

        upsertCard(book, CARD);
        localStorage.setItem(KEY_BOOK, JSON.stringify(book));

        const saved = safeParse(localStorage.getItem(KEY_BOOK), null);
        const restored = saved?.got?.[CARD.id];

        if (restored && typeof restored === "object") {
          log.textContent =
            "復旧が完了しました。\n\n" +
            "カード名: " + (restored.name || CARD.name) + "\n" +
            "ID: " + (restored.id || CARD.id) + "\n" +
            "所持枚数: " + (restored.count ?? 1) + "枚\n\n" +
            "このあと図鑑ページを開き直してください。";
        } else {
          log.textContent =
            "復旧処理は実行しましたが、保存確認ができませんでした。\n" +
            "図鑑ページを開き直してご確認ください。";
        }

        btn.disabled = false;
      });
    })();
  </script>
</body>
</html>
