  function safeJSON(raw, fallback){ try{ return JSON.parse(raw);}catch(e){ return fallback; } }
  function lsGet(key, fallback){
    const raw = Storage.getItem(key);
    if(raw==null) return fallback;
    return safeJSON(raw, fallback);

  function lsSet(key, val){
    try{ Storage.setItem(key, JSON.stringify(val)); }

  function getMonthKey(date = new Date()){
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, "0");
    return `${y}-${m}`;
  }

  function loadMonthlyStats(){
    const currentKey = getMonthKey();
    const s = lsGet(LS.monthly, null);

    if(!s || typeof s !== "object"){
      return {
        monthKey: currentKey,
        harvest: 0,
        sales: 0,
        fishing: 0,
        tower: 0
      };
    }

    if(String(s.monthKey || "") !== currentKey){
      return {
        monthKey: currentKey,
        harvest: 0,
        sales: 0,
        fishing: 0,
        tower: 0
      };
    }

    return {
      monthKey: currentKey,
      harvest: Number(s.harvest || 0),
      sales: Number(s.sales || 0),
      fishing: Number(s.fishing || 0),
      tower: Number(s.tower || 0)
    };
  }

  function saveMonthlyStats(stats){
    lsSet(LS.monthly, {
      monthKey: String(stats.monthKey || getMonthKey()),
      harvest: Number(stats.harvest || 0),
      sales: Number(stats.sales || 0),
      fishing: Number(stats.fishing || 0),
      tower: Number(stats.tower || 0)
    });
  }

  function addMonthlyMyShopSales(amount){
    const add = Math.max(0, Math.floor(Number(amount || 0)));
    if(add <= 0) return;

    const s = loadMonthlyStats();
    s.sales = Number(s.sales || 0) + add;
    saveMonthlyStats(s);
  }

  function setGlobalSpawnCooldown(ms = GLOBAL_VISITOR_COOLDOWN_MS){
    const f = loadFlow();
    f.nextSpawnAllowedAt = now() + Math.max(0, Number(ms||0));
    saveFlow(f);
  }
  function getGlobalSpawnCooldownRemainMs(){
    const f = loadFlow();
    return Math.max(0, Number(f.nextSpawnAllowedAt||0) - now());
  }
  function shiftOtherDueTimers(exceptSlot){
    const t = loadTick();
    const n = now();
    const next = { ...(t.nextAtBySlot || {}) };
    Object.keys(next).forEach(k=>{
      const idx = Number(k);
      if(idx === exceptSlot) return;
      const at = Number(next[k] || 0);
      if(at <= n + 2000){
        next[k] = n + rand(POST_VISIT_SHIFT_MIN_MS, POST_VISIT_SHIFT_MAX_MS);
      }
    });
    t.nextAtBySlot = next;
    saveTick(t);
  }

  function escapeHTML(s){
    return String(s||"").replace(/[&<>"']/g, m => ({

    }[m]));

  const LEVEL_DEFAULT = { ver:1, lv:1, exp:0, totalVisit:0, totalSold:0, updatedAt: now() };
  function needExpFor(lv){
    const table = [0, 20, 35, 55, 80, 110, 145, 185];
    if(lv < table.length) return table[lv];
    return table[table.length-1] + (lv - (table.length-1)) * 50;
  }
  function loadLevel(){
    const v = lsGet(LS.lvl, LEVEL_DEFAULT);
    v.lv = Math.max(1, Number(v.lv||1));
    v.exp = Math.max(0, Number(v.exp||0));
    v.totalVisit = Math.max(0, Number(v.totalVisit||0));
    v.totalSold = Math.max(0, Number(v.totalSold||0));
    return v;
  }
  function saveLevel(v){ v.updatedAt = now(); lsSet(LS.lvl, v); }
  function addExp(delta){
    delta = Math.max(0, Math.floor(Number(delta||0)));
    const s = loadLevel();
    s.exp += delta;
    let leveled = false;
    while(s.exp >= needExpFor(s.lv)){
      s.exp -= needExpFor(s.lv);
      s.lv += 1;
      leveled = true;
    }
    saveLevel(s);
    return { state:s, leveled };
  }

  function loadRep(){
    const v = lsGet(LS.rep, { ver:1, rep:50 });
    v.rep = clamp(Number(v.rep ?? 50), 0, 100);

  }

  function addRep(delta){
    const s = loadRep();
    s.rep = Math.round(clamp(s.rep + Number(delta||0), 0, 100));
    saveRep(s);
    return s;
  }

  function loadFarmBook(){
    const book = lsGet(LS.farmBook, { ver:1, got:{} });
    book.got = book.got || {};
    return book;
  }

  function findGotKeyByCardId(book, cardId){
    if(!book || !book.got) return null;
    const id = String(cardId||"");
    if(book.got[id]) return id;
    for(const k of Object.keys(book.got)){
      const c = book.got[k];
      const cid = String(c?.id ?? k);
      if(cid === id) return k;
    }
    return null;
  }

  function decrementBookCountById(cardId, n=1){
    n = Math.max(1, Math.floor(Number(n||1)));
    const book = loadFarmBook();
    const key = findGotKeyByCardId(book, cardId);
    if(!key) return false;
    const c = book.got[key];
    const cnt = Math.max(0, Number(c?.count||0));
    if(cnt < n) return false;
    c.count = cnt - n;
    book.got[key] = c;
    lsSet(LS.farmBook, book);
    return true;
  }

  function incrementBookCountById(cardId, cardSnapshot, n=1){
    n = Math.max(1, Math.floor(Number(n||1)));
    const book = loadFarmBook();
    const key = findGotKeyByCardId(book, cardId) || String(cardId||"");
    const exist = book.got[key] || (cardSnapshot ? {...cardSnapshot} : { id: cardId, name: `カード ${cardId}` });
    const cnt = Math.max(0, Number(exist.count||0));
    exist.count = cnt + n;

    if(cardSnapshot){
      if(!exist.id) exist.id = cardSnapshot.id || cardId;
      if(!exist.name && cardSnapshot.name) exist.name = cardSnapshot.name;
      if(!exist.img  && cardSnapshot.img)  exist.img  = cardSnapshot.img;
      if(!exist.rarity && cardSnapshot.rarity) exist.rarity = cardSnapshot.rarity;
    }
    book.got[key] = exist;
    lsSet(LS.farmBook, book);
    return true;
  }

  function listOwnedCardsFromBook(){
    const book = loadFarmBook();
    const got = book.got || {};
    const arr = Object.keys(got).map(k => {
      const c = got[k] || {};
      const count = Math.max(0, Number(c.count||0));
      const id = String(c.id || k);
      return {
        id,
        name: String(c.name || c.title || c.label || `カード ${id}`),
        img: c.img || c.image || c.url || c.src || "",
        rarity: String(c.rarity || c.rare || c.rank || ""),
        count,
        raw: c,
        _key: k
      };
    }).filter(x => x.count > 0);

    arr.sort((a,b)=> (b.count-a.count) || a.name.localeCompare(b.name, "ja"));
    return arr;
  }

    const s = lsGet(LS.myshop, SHOP_DEFAULT);
    if(!Array.isArray(s.slots)) s.slots = SHOP_DEFAULT.slots.map(x=>({...x}));

    while(s.slots.length < 6){
      const idx = s.slots.length;
      s.slots.push(idx===SHRINE_SLOT
        ? { item:null, qty:0, priceTier:"奉納", createdAt:0 }
        : { item:null, qty:0, priceTier:"普通", createdAt:0 }
      );
    }

    s.slots = s.slots.slice(0,6).map((x, idx) => ({
      item: x.item || null,
      qty: Math.max(0, Math.floor(Number(x.qty ?? (x.item ? 1 : 0)))),
      priceTier: (idx===SHRINE_SLOT) ? "奉納" : (x.priceTier || "普通"),
      createdAt: Number(x.createdAt||0),
    }));

    s.slots = s.slots.map((x, idx)=>{
      if(x.item && (!x.qty || x.qty<1)) x.qty = 1;
      if(!x.item) x.qty = 0;
      if(idx===SHRINE_SLOT && x.qty > 1) x.qty = 1;
      if(idx===SHRINE_SLOT) x.priceTier = "奉納";
      return x;
    });

    return s;

  function ensureNextAtForActiveSlots(){
    const shop = loadMyShop();
    const lv = loadLevel().lv;
    const t = loadTick();
    const n = now();

    shop.slots.forEach((slot, idx)=>{
      const active = !!slot.item && canUseSlot(idx, lv);
      const key = String(idx);
      if(!active){
        delete t.nextAtBySlot[key];
        return;
      }
      const cur = Number(t.nextAtBySlot[key]||0);
      if(!cur || cur < n - 60*1000){
        t.nextAtBySlot[key] = n + nextVisitDelayMs();
      }
    });

    saveTick(t);
    return t;
  }

  function updateNextTag(){
    const t = loadTick();
    const nowMs = now();
    const list = Object.values(t.nextAtBySlot || {}).map(v=>Number(v||0)).filter(v=>v>0);

    const coolRemain = getGlobalSpawnCooldownRemainMs();
    if(coolRemain > 0){
      const sec = Math.max(0, Math.ceil(coolRemain/1000));
      stageNextTag.textContent = `次：待機 ${sec}s`;
      return;
    }

    if(list.length === 0){
      stageNextTag.textContent = "次：—";
      return;
    }
    const nextAt = Math.min(...list);
    const sec = Math.max(0, Math.ceil((nextAt - nowMs)/1000));
    stageNextTag.textContent = `次：${sec}s`;
  }

  function basePriceFor(card){
    const r = String(card?.rarity || "").toUpperCase().trim();
    const map = {
      "N":  500,
      "R":  800,
      "SR": 1500,
      "UR": 3000,
      "LR": 5000
    };
    if(map[r] != null) return map[r];
    const keys = Object.keys(map).sort((a,b)=> b.length - a.length);
    for(const k of keys){
      if(r.includes(k)) return map[k];
    }
    return 1000;
  }

  function weightedPick(list){
    const total = list.reduce((sum, x)=> sum + Math.max(1, Number(x.weight||1)), 0);
    let n = Math.random() * total;
    for(const x of list){
      n -= Math.max(1, Number(x.weight||1));
      if(n <= 0) return x;
    }
    return list[list.length - 1];
  }

    if(Math.random() < 0.18){
      pool = CUSTOMER_TYPES.slice();
    }

    return weightedPick(pool);
  }

      const craft = isCraftCard(c);

      const spare = craft
        ? (Number(c.count||0) - listed)
        : (Number(c.count||0) - 1 - listed);

      if(spare >= 1){
        pickable.push({
          id: c.id,
          name: c.name,
          img: c.img,
          rarity: c.rarity,
          spare,
          count: c.count,
          raw: c,
          craft
        });

  function canDecrementForListing(cardId, n=1){
    n = Math.max(1, Math.floor(Number(n||1)));
    const book = loadFarmBook();
    const key = findGotKeyByCardId(book, cardId);
    if(!key) return false;
    const c = book.got[key];
    const cnt = Math.max(0, Number(c?.count||0));
    const craft = isCraftCard({ id: String(cardId), rarity: String(c?.rarity||"") });

    if(craft && CRAFT_CAN_LIST_LAST_ONE){
      return cnt >= n;
    }
    return cnt >= (n + 1);
  }

  function askBulkQty(slotIdx, max){
    const lv = loadLevel().lv;
    if(!isBulkUnlocked(slotIdx, lv)) return 1;
    if(max <= 1) return 1;

    const raw = prompt(`まとめ陳列の数量を入力（1〜${max}）`, String(Math.min(3, max)));
    if(raw == null) return null;
    const n = Math.floor(Number(raw));
    if(!isFinite(n) || n < 1 || n > max) return 1;
    return n;
  }

  function selectCardForSlot(slotIdx, pickedCard){
    const shop = loadMyShop();
    const slot = shop.slots[slotIdx];
    if(!slot) return;

    const isShrine = (slotIdx === SHRINE_SLOT);

    if(slot.item){
      const qBack = Math.max(1, Number(slot.qty||1));
      incrementBookCountById(slot.item.id, slot.item.raw || slot.item, qBack);
      if(isShrine) clearContract();
    }

    const lv = loadLevel().lv;
    const bulkOK = isBulkUnlocked(slotIdx, lv);

    const maxQty = isShrine ? 1 : (bulkOK ? Math.max(1, Number(pickedCard.spare||1)) : 1);
    const qty = isShrine ? 1 : (bulkOK ? askBulkQty(slotIdx, maxQty) : 1);
    if(qty === null){
      pushLog("キャンセル", `棚${slotIdx+1}の出品をキャンセルした`, "");
      renderAll();
      closePickModal();
      return;
    }

    if(!canDecrementForListing(pickedCard.id, qty)){
      toast("出品できない", "通常カードは1枚残す必要があります（職人は例外）", "");
      renderAll();
      closePickModal();
      return;
    }

    const ok = decrementBookCountById(pickedCard.id, qty);
    if(!ok){
      toast("出品できない", "図鑑側の数が足りません（同期ずれの可能性）", "");
      renderAll();
      closePickModal();
      return;
    }

    const oldQty = Math.max(1, Number(slot.qty||1));

    slot.item = {
      id: pickedCard.id,
      name: pickedCard.name,
      img: pickedCard.img,
      rarity: pickedCard.rarity,
      raw: pickedCard.raw
    };
    slot.qty = Math.max(1, Math.floor(Number(qty||1)));
    slot.createdAt = now();
    slot.priceTier = isShrine ? "奉納" : (slot.priceTier || "普通");

    shop.slots[slotIdx] = slot;
    saveMyShop(shop);

    if(isShrine){
      markContractOffered(slot.item);
      pushLog("奉納", `${pickedCard.name||pickedCard.id} を棚6（祀り棚）に奉納した`, pickedCard.id);
      toast("奉納完了", `棚6に ${pickedCard.name||pickedCard.id}（契約の気配…）`, "contract");
    }else{
      pushLog("出品", `${pickedCard.name||pickedCard.id} を棚${slotIdx+1}に置いた（×${slot.qty}）`, pickedCard.id);
      toast("出品OK", `棚${slotIdx+1}に ${pickedCard.name||pickedCard.id} ×${slot.qty}`, "");
    }

    ensureNextAtForActiveSlots();
    renderAll();
    closePickModal();
  }

  function saleProcess(){
    const st = loadStage();
    if(!st.hasVisitor || st.leaving) return;

    const shop = loadMyShop();
    const slotIdx = st.targetSlot;
    const slot = shop.slots[slotIdx];
    if(!slot || !slot.item){
      addRep(-1);
      beginLeave("……目当ての棚が空だった。客は黙って帰った。");
      renderAll();
      return;
    }

    const rep = loadRep().rep;
    const cust = CUSTOMER_TYPES.find(x=>x.id===st.vType) || CUSTOMER_TYPES[0];
    const base = basePriceFor(slot.item);
    const isShrine = (slotIdx === SHRINE_SLOT);

    let price = 0;
    if(isShrine){
      price = Math.max(1, Math.floor(base * repFactor(rep) * SHRINE_PRICE_MULT));
    }else{
      price = Math.max(1, Math.floor(base * tierMult(slot.priceTier) * repFactor(rep)));
    }

    let buyP = clamp(cust.baseBuy, 0.10, 0.90);

    if(isShrine) buyP = clamp(buyP + 0.10, 0.10, 0.95);
    if(slot.priceTier === "高い" && !isShrine) buyP -= 0.05;
    if(slot.priceTier === "安い" && !isShrine) buyP += 0.05;
    if(rep >= 80) buyP += 0.04;
    else if(rep <= 25) buyP -= 0.04;

    buyP = clamp(buyP, 0.10, 0.95);

    const willBuy = Math.random() < buyP;
    if(!willBuy){
      addRep(-1);
      pushLog("買わない", "……今日は買わなかった。評判 -1", `rep ${loadRep().rep}`);
      beginLeave(pick(LEAVE_LINES));
      renderAll();
      return;
    }

    const beforeQty = Math.max(1, Number(slot.qty||1));
    const afterQty = beforeQty - 1;

    /* ✅ 売上確定：オクト加算 */
    saveOcto(loadOcto() + price);

    /* ✅ 売上確定：称号の頂の月間売上へ加算 */
    addMonthlyMyShopSales(price);

    const lv = addExp(4);
    addRep(cust.repDeltaOnBuy);

    const soldItem = slot.item;

    if(afterQty <= 0){
      shop.slots[slotIdx].item = null;
      shop.slots[slotIdx].qty = 0;
      shop.slots[slotIdx].createdAt = 0;
      if(isShrine) shop.slots[slotIdx].priceTier = "奉納";
    }else{
      shop.slots[slotIdx].qty = afterQty;
    }
    saveMyShop(shop);

    const t = loadTick();
    t.nextAtBySlot = t.nextAtBySlot || {};
    t.nextAtBySlot[String(slotIdx)] = now() + nextVisitDelayMs();
    saveTick(t);

    const leftText = (afterQty > 0) ? `（残り×${afterQty}）` : "（完売）";
    pushLog("売れた！", `${soldItem.name||soldItem.id} が ${fmt(price)} OCTOで売れた ${leftText}`, `棚${slotIdx+1}`);
    toast("🔥 売れた！！ 🔥", `${soldItem.name||soldItem.id} ／ +${fmt(price)} OCTO ${leftText}`, "sale");

    if(isShrine){
      const bonusOk = canTriggerContractBonus();
      const bonusOcto = bonusOk ? rand(CONTRACT_BONUS.octoMin, CONTRACT_BONUS.octoMax) : 0;
      const bonusRep  = bonusOk ? rand(CONTRACT_BONUS.repMin,  CONTRACT_BONUS.repMax)  : 0;

      if(bonusOk){
        saveOcto(loadOcto() + bonusOcto);
        addRep(bonusRep);
        addExp(CONTRACT_BONUS.exp);

        /* ✅ 注意：
           契約ボーナスは「マイ露店売上」ではなくボーナス報酬なので
           月間 sales には加算しない
        */

        pushLog("契約成立", `棚6の契約が成立：+${fmt(bonusOcto)} OCTO / 評判 +${bonusRep} / EXP +${CONTRACT_BONUS.exp}`, soldItem.id);
        toast("📜 契約成立", `${pick(CONTRACT_LINES)}\n+${fmt(bonusOcto)} OCTO / 評判+${bonusRep} / EXP+${CONTRACT_BONUS.exp}`, "contract");
        markContractSuccess();
      }else{
        pushLog("契約（小）", "契約は成立したが、深い報酬は静かに眠っている（クールダウン）", soldItem.id);
        toast("📜 契約成立", "……契約は通った。\n（報酬は少し時間を置くと濃くなる）", "contract");
        clearContract();
      }
    }

    if(lv.leveled){
      pushLog("レベルアップ", `Lv${lv.state.lv}になった！`, "");
      toast("レベルアップ！", `Lv${lv.state.lv}`, "");
    }

    beginLeave("……満足げに帰っていった。");
    renderAll();
  }

  function scheduleStage(){
    applyDayNight();
    renderStage();
    const st = loadStage();
    if(st.hasVisitor && !st.leaving){
      clearStageTimers();
      stageTalkTimer = setInterval(()=>{
        const s2 = loadStage();
        if(!s2.hasVisitor || s2.leaving) return;
        const baseLines = VISITOR_LINES[s2.vType] || ["……"];
        s2.vMsg = pick(baseLines);
        saveStage(s2);
        renderStage();
      }, rand(3000, 6000));

      stageSellTimer = setTimeout(()=> saleProcess(), Math.max(1000, Math.floor((st.stayMs||12000) - 1000)));
      stageLeaveTimer = setTimeout(()=> beginLeave(pick(LEAVE_LINES)), Math.max(5000, Math.floor(st.stayMs||12000)));
      return;
    }
    setStageEmpty("まだ誰も来ていない。");
  }

  let spawnLockUntil = 0;

  function spawnVisitorSoon(targetSlot, type){
    const typeLabel = (type==="shout") ? "呼び込み" : "通常";
    toast("誰かくる！", `${typeLabel}：棚${targetSlot+1} を見てる気配…！`, "");

    spawnLockUntil = now() + 3500;

    setTimeout(()=>{
      const st2 = loadStage();
      if(st2.hasVisitor) return;

      const flowRemain = getGlobalSpawnCooldownRemainMs();
      if(flowRemain > 0 && type !== "shout"){
        return;
      }

      const cust = pickCustomer();
      const asset = pickVisitorAsset(cust.id);

      const stayMs = rand(9000, 18000);
      const msg = pick(VISITOR_LINES[cust.id] || ["……"]);

      const s = loadStage();
      s.hasVisitor = true;
      s.leaving = false;
      s.vType = cust.id;
      s.vName = asset.name || cust.name;
      s.vUrl = asset.url || "";
      s.vMsg = msg;
      s.stayMs = stayMs;
      s.targetSlot = targetSlot;
      s.source = (type==="shout") ? "shout" : "normal";
      saveStage(s);
      rememberVisitorType(cust.id);
      renderStage();

      pushLog("来客", `${s.vName} が棚${targetSlot+1}を見ている`, `${typeLabel}`);

      const lvup = addExp(1);
      if(lvup.leveled){
        pushLog("レベルアップ", `Lv${lvup.state.lv}になった！`, "");
        toast("レベルアップ！", `Lv${lvup.state.lv}`, "");
      }

      clearStageTimers();
      stageTalkTimer = setInterval(()=>{
        const s2 = loadStage();
        if(!s2.hasVisitor || s2.leaving) return;
        const baseLines = VISITOR_LINES[s2.vType] || ["……"];
        s2.vMsg = pick(baseLines);
        saveStage(s2);
        renderStage();
      }, rand(3000, 6000));

      stageSellTimer = setTimeout(()=> saleProcess(), Math.max(1000, stayMs - 1000));
      stageLeaveTimer = setTimeout(()=> beginLeave(pick(LEAVE_LINES)), stayMs);

      const tickObj = loadTick();
      tickObj.nextAtBySlot[String(targetSlot)] = now() + nextVisitDelayMs();
      saveTick(tickObj);

      renderAll();
    }, 3000);
  }

  function tick(){
    updateNextTag();
    updateShoutUI();

    const st = loadStage();
    const nowMs = now();

    if(st.hasVisitor) return;
    if(nowMs < spawnLockUntil) return;
    if(getGlobalSpawnCooldownRemainMs() > 0) return;

    const lv = loadLevel().lv;
    const shop = loadMyShop();
    const t = ensureNextAtForActiveSlots();

    const activeIdx = [];
    shop.slots.forEach((s, idx)=>{
      if(s.item && canUseSlot(idx, lv)) activeIdx.push(idx);
    });
    if(activeIdx.length===0) return;

    const due = activeIdx.filter(i => Number(t.nextAtBySlot[String(i)]||0) <= nowMs);
    if(due.length===0) return;

    const targetSlot = due[Math.floor(Math.random()*due.length)];
    spawnVisitorSoon(targetSlot, "normal");
  }

  const SHOUT_LINES = [
    "🔥 焼きの匂いを撒いた！タコ民の足が向く…！",
    "屋台前がざわついてきた…！いまなら釣れる！",
    "タコ民ホイホイ発動！……寄ってくる、寄ってくる！",
    "《客引き》発動！棚に視線が刺さってる…！"
  ];
  let lastShoutLine = "";
  function pickShoutLine(){
    if(SHOUT_LINES.length === 0) return "呼び込み！";
    if(SHOUT_LINES.length === 1) return SHOUT_LINES[0];
    let s = SHOUT_LINES[Math.floor(Math.random()*SHOUT_LINES.length)];
    if(s === lastShoutLine) s = SHOUT_LINES[Math.floor(Math.random()*SHOUT_LINES.length)];
    lastShoutLine = s;
    return s;
  }

  function shout(){
    const st = loadStage();
    if(st.hasVisitor){
      toast("いまは無理", "客がいる間は呼び込みできません", "");
      return;
    }

    const cd = loadShout();
    const n = now();
    if(Number(cd.nextOkAt||0) > n){
      const sec = Math.ceil((cd.nextOkAt - n)/1000);
      toast("まだ無理", `呼び込みは ${sec}s 後`, "");
      updateShoutUI();
      return;
    }

    const shop = loadMyShop();
    const lv = loadLevel().lv;

    const active = [];
    shop.slots.forEach((s, idx)=>{
      if(s.item && canUseSlot(idx, lv)) active.push(idx);
    });
    if(active.length===0){
      toast("呼び込み失敗", "出品中の棚がありません", "");
      return;
    }

    cd.nextOkAt = n + 60000;
    saveShout(cd);
    updateShoutUI();

    const target = active[Math.floor(Math.random() * active.length)];

    toast("呼び込み！", `棚${target+1}｜${pickShoutLine()}`, "");
    pushLog("呼び込み", `棚${target+1} に客の気配が集まった`, "");

    spawnVisitorSoon(target, "shout");
  }

  function renderAll(){
    renderStats();
    renderShelves();
    applyDayNight();
    updateNextTag();
    updateShoutUI();
  }

  function openHelp(){
    helpModal.classList.add("show");
    helpModal.setAttribute("aria-hidden","false");
    lockBodyScroll();
  }
  function closeHelp(){
    helpModal.classList.remove("show");
    helpModal.setAttribute("aria-hidden","true");
    unlockBodyScroll();
  }

  pickCloseBtn.addEventListener("click", closePickModal);
  pickCancelBtn.addEventListener("click", closePickModal);
  pickModal.addEventListener("click", (e)=>{ if(e.target===pickModal) closePickModal(); });

  helpBtn.addEventListener("click", openHelp);
  helpClose.addEventListener("click", closeHelp);
  helpOk.addEventListener("click", closeHelp);
  helpModal.addEventListener("click", (e)=>{ if(e.target===helpModal) closeHelp(); });

  backBtn.addEventListener("click", ()=>{
    if(history.length > 1) history.back();
    else location.href = "./index.html";
  });

  shoutBtn.addEventListener("click", shout);

  fixBtn.addEventListener("click", ()=>{
    Storage.setItem(LS.stage, JSON.stringify({
      ver:1,hasVisitor:false,leaving:false,vUrl:"",vName:"—",vMsg:"まだ誰も来ていない。",
      vType:"",stayMs:0,targetSlot:-1,updatedAt:Date.now(),source:""
    }));
    Storage.removeItem(LS.tick);
    lsSet(LS.queue, { ver:1, shoutPending:false, shoutTargetSlot:null, shoutSpawnAt:0, normalPending:false, normalTargetSlot:null, queuedAt:0 });
    lsSet(LS.flow, { ver:1, nextSpawnAllowedAt: 0 });

    alert("客状態だけ修理しました（呼び込みCD・レベルは保持）");
    location.reload();
  });

  try{
    applyDayNight();
    renderAll();
    scheduleStage();
    setInterval(tick, 1000);
  }catch(e){
    showErr(e?.stack || e?.message || String(e));
  }
})();
</script>
</body>
