<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>総合ランキング｜焼かれた伝説</title>
  <meta name="description" content="たこ焼きトレカ 月間総合ランキング" />
  <link rel="stylesheet" href="assets/ranking.css">
</head>
<body>
  <div class="page">
    <header class="hero">
      <div class="hero-inner">
        <a class="back-btn" href="index.html">← 戻る</a>
        <div class="hero-title-wrap">
          <div class="eyebrow">MONTHLY RANKING</div>
          <h1 class="hero-title">総合ランキング</h1>
          <p class="hero-sub">上位20人 ＋ あなたの順位</p>
        </div>
      </div>
    </header>

    <main class="wrap">
      <section class="my-card" id="myCard">
        <div class="card-head">
          <div class="card-label">YOUR STATUS</div>
          <button class="btn" id="refreshBtn" type="button">更新</button>
        </div>

        <div class="my-name" id="myName">読み込み中...</div>
        <div class="my-rank" id="myRank">順位を取得しています...</div>
        <div class="my-meta" id="myMeta"></div>
      </section>

      <section class="board-card">
        <div class="board-head">
          <div>
            <div class="card-label">TOP 20</div>
            <div class="board-sub" id="boardSub">読み込み中...</div>
          </div>
        </div>

        <div class="table-wrap">
          <table class="ranking-table">
            <thead>
              <tr>
                <th>順位</th>
                <th>名前</th>
                <th>総合点</th>
                <th>露店売上</th>
                <th>収穫</th>
                <th>釣り</th>
                <th>タワー</th>
              </tr>
            </thead>
            <tbody id="rankingBody">
              <tr><td colspan="7" class="loading">読み込み中...</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="assets/ranking.js"></script>
</body>
</html>
