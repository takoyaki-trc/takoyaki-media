<title>たこ焼きバランスタワー</title>
<style>
  :root{
    --w:420px;
    --h:720px;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html,body{
    margin:0;
    padding:0;
    width:100%;
    min-height:100%;
  }

  body{
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic",sans-serif;
    background:#0f1115;
    color:#fff;
    display:flex;
    min-height:100svh;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    touch-action:none;
  }

  .wrap{
    width:min(var(--w),100vw);
    min-height:100svh;
    padding:10px 10px 12px;
    display:flex;
    flex-direction:column;
    gap:8px;
  }

  .hud{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin:2px 2px 0;
    font-size:14px;
    opacity:.95;
    flex:0 0 auto;
  }

  .hud b{ font-size:16px; }

  .panel{
    background:
      radial-gradient(120% 120% at 50% 0%, rgba(255,210,100,.10), rgba(255,210,100,0) 38%),
      radial-gradient(100% 120% at 50% 100%, rgba(65,110,255,.10), rgba(65,110,255,0) 42%),
      linear-gradient(180deg,#101526 0%,#0b1020 52%,#090d18 100%);
    border:1px solid rgba(255,255,255,.08);
    border-radius:14px;
    overflow:hidden;
    box-shadow:
      0 10px 30px rgba(0,0,0,.35),
      0 0 40px rgba(255,196,90,.06) inset;
    position:relative;
    flex:1 1 auto;
    display:flex;
    flex-direction:column;
    min-height:0;
  }

  canvas{
    display:block;
    width:100%;
    height:auto;
    touch-action:manipulation;
    flex:1 1 auto;
  }

  .controls{
    display:flex;
    gap:10px;
    padding:10px;
    background:rgba(0,0,0,.18);
    border-top:1px solid rgba(255,255,255,.08);
    flex:0 0 auto;
  }

  button{
    flex:1;
    appearance:none;
    border:0;
    border-radius:12px;
    padding:14px 12px;
    font-weight:800;
    font-size:16px;
    color:#111;
    background:#ffd34d;
    cursor:pointer;
  }

  button.secondary{
    background:#2a3147;
    color:#fff;
    font-weight:700;
  }

  .toast{
    position:absolute;
    left:50%;
    top:18%;
    transform:translateX(-50%);
    background:rgba(0,0,0,.55);
    border:1px solid rgba(255,255,255,.18);
    padding:10px 14px;
    border-radius:999px;
    font-weight:900;
    letter-spacing:.02em;
    opacity:0;
    transition:opacity .15s ease, transform .15s ease;
    pointer-events:none;
    white-space:nowrap;
    z-index:5;
  }

  .toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(-2px);
  }

  #takoyakiResultOverlay{
    position:absolute;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    padding:
      max(10px,env(safe-area-inset-top))
      10px
      max(10px,env(safe-area-inset-bottom))
      10px;
    z-index:9999;
  }

  #takoyakiResultOverlay .result-bg{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.72);
    backdrop-filter:blur(2px);
    -webkit-backdrop-filter:blur(2px);
  }

  #takoyakiResultOverlay .result-card{
    position:relative;
    width:min(92%,440px);
    max-height:calc(100% - 8px);
    border-radius:18px;
    border:1px solid rgba(255,255,255,.16);
    background:
      radial-gradient(120% 80% at 50% 0%, rgba(255,214,120,.12), rgba(255,214,120,0) 36%),
      radial-gradient(100% 80% at 50% 100%, rgba(84,118,255,.09), rgba(84,118,255,0) 40%),
      linear-gradient(180deg,rgba(24,30,52,.97),rgba(10,14,26,.98));
    box-shadow:
      0 20px 60px rgba(0,0,0,.55),
      0 0 30px rgba(255,196,90,.08) inset;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    transform:translateY(12px) scale(.95);
    opacity:0;
  }

  #takoyakiResultOverlay .result-card.show{
    animation:resultPop .25s ease forwards;
  }

  @keyframes resultPop{
    0%{ transform:translateY(14px) scale(.95); opacity:0; }
    65%{ transform:translateY(-4px) scale(1.02); opacity:1; }
    100%{ transform:translateY(0) scale(1); opacity:1; }
  }

  .result-scroll{
    flex:1 1 auto;
    min-height:0;
    overflow:auto;
    -webkit-overflow-scrolling:touch;
    padding:12px;
    scrollbar-width:none;
  }

  .result-scroll::-webkit-scrollbar{ display:none; }

  .result-score-hero{
    margin:0 0 10px;
    padding:14px 10px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,.12);
    background:
      radial-gradient(circle at 50% 0%, rgba(255,210,90,.18), rgba(255,210,90,0) 55%),
      linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));
    text-align:center;
  }

  .result-score-label{
    font-size:12px;
    font-weight:900;
    letter-spacing:.12em;
    opacity:.78;
    margin-bottom:6px;
  }

  .result-score-value{
    font-size:38px;
    line-height:1;
    font-weight:1000;
    color:#fff8ea;
    text-shadow:
      0 0 12px rgba(255,214,110,.25),
      0 0 28px rgba(255,179,60,.16);
  }

  .result-rank-wrap{
    margin:0 0 10px;
    padding:12px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,.12);
    background:
      radial-gradient(circle at 50% 0%, rgba(255,215,120,.14), rgba(255,215,120,0) 52%),
      linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.025)),
      rgba(255,255,255,.03);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.06),
      0 0 18px rgba(255,190,80,.08);
  }

  .result-rank-label{
    font-size:11px;
    opacity:.72;
    font-weight:900;
    letter-spacing:.1em;
    margin-bottom:4px;
  }

  .result-rank-value{
    font-size:22px;
    font-weight:1000;
    line-height:1.35;
    color:#fff4d8;
    text-shadow:0 0 14px rgba(255,208,100,.18);
  }

  .result-actions{
    flex:0 0 auto;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    padding:10px 12px calc(10px + env(safe-area-inset-bottom));
    border-top:1px solid rgba(255,255,255,.08);
    background:linear-gradient(180deg,rgba(18,22,32,.96),rgba(12,15,22,.98));
  }

  .result-actions button{
    width:100%;
    min-width:0;
    padding:13px 12px;
    border-radius:12px;
    font-size:16px;
    font-weight:900;
  }

  .result-actions .quit-btn{
    background:#2a3147;
    color:#fff;
  }

  .mini-wrap{
    border-radius:16px;
    border:1px solid rgba(255,255,255,.14);
    background:rgba(255,255,255,.05);
    padding:8px;
    margin-bottom:10px;
  }

  .mini-title{
    font-weight:900;
    font-size:12px;
    opacity:.8;
    margin-bottom:5px;
  }

  .mini-wrap canvas{
    width:100%;
    height:auto;
    display:block;
    image-rendering:pixelated;
    border-radius:12px;
  }

  .drop-none{
    padding:10px 12px;
    border-radius:14px;
    border:1px dashed rgba(255,255,255,.18);
    background:rgba(255,255,255,.04);
    margin:8px 0 8px;
    font-size:13px;
    line-height:1.55;
    opacity:.92;
  }

  .drop-section{
    margin:8px 0 10px;
  }
  .drop-section-title{
    font-size:12px;
    font-weight:900;
    letter-spacing:.05em;
    opacity:.82;
    margin-bottom:6px;
  }
  .drop-card{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,.14);
    background:rgba(255,255,255,.06);
    margin:8px 0;
  }
  .drop-card img{
    width:64px;
    height:64px;
    object-fit:cover;
    border-radius:12px;
    border:1px solid rgba(255,255,255,.16);
    background:rgba(0,0,0,.18);
    flex:0 0 auto;
  }
  .drop-kicker{
    display:inline-block;
    padding:4px 8px;
    border-radius:999px;
    background:rgba(255,196,70,.95);
    color:#2a1600;
    font-size:10px;
    font-weight:1000;
    margin-bottom:5px;
  }
  .drop-name{
    font-size:15px;
    font-weight:900;
    line-height:1.2;
  }
  .drop-count{
    font-size:12px;
    opacity:.84;
    margin-top:4px;
    line-height:1.4;
  }

</style>
</head>

<body>
<div class="wrap">
  <div class="hud">
    <div>Score: <b id="score">0</b></div>
    <div>Best: <b id="best">0</b></div>
    <div id="state">READY</div>
  </div>

  <div class="panel">
    <div id="toast" class="toast">PERFECT!!</div>
    <canvas id="cv" width="420" height="720" aria-label="たこ焼きバランスタワー"></canvas>
    <div class="controls">
      <button id="stopBtn" type="button">STOP（タップ）</button>
      <button id="restartBtn" class="secondary" type="button">RESTART</button>
    </div>
  </div>
</div>

<script>
(() => {
  "use strict";

  const TOP_URL = "index.html";
  const LS_MONTHLY_STATS = "ttc_monthly_stats_v1";
  const LS_INV = "tf_v1_inv";
  const LS_BOOK = "tf_v1_book";

  const LIMITED_CARD_POOL = [
    {
      id:"SP-TT001",
      no:"SP-TT001",
      name:"塔を踏破せし者",
      rarity:"SP",
      tier:"LR",
      img:"https://takoyaki-card.com/town/assets/images/sp/tawa01.png",
      desc:"最後の一段を踏んだ瞬間、世界が静かになった。"
    },
    {
      id:"SP-TT002",
      no:"SP-TT002",
      name:"ずっと見ていた者",
      rarity:"SP",
      tier:"UR",
      img:"https://takoyaki-card.com/town/assets/images/sp/tawa02.png",
      desc:"大丈夫。全部、見ていた。静かに見守り続けた視線が、いまカードになる。"
    }
  ];
  const LIMITED_CARD_MAP = Object.fromEntries(LIMITED_CARD_POOL.map(v => [v.id, v]));

  const TOWER_FERTS = [
    { id:"fert_balance",  name:"天秤にかけた肥料", img:"https://takoyaki-card.com/town/assets/images/hiryou/hiryou6.png" },
    { id:"fert_sleep",    name:"寝かせた肥料",     img:"https://takoyaki-card.com/town/assets/images/hiryou/hiryou7.png" },
    { id:"fert_takoyaki", name:"たこ焼き風味の肥料", img:"https://takoyaki-card.com/town/assets/images/hiryou/hiryou8.png" },
    { id:"fert_drop",     name:"天からの一滴",     img:"https://takoyaki-card.com/town/assets/images/hiryou/hiryou9.png" }
  ];
  const TOWER_FERT_MAP = Object.fromEntries(TOWER_FERTS.map(v => [v.id, v]));


  const SPR = {
    takoA:"https://ul.h3z.jp/OPpiBayk.png",
    takoB:"https://ul.h3z.jp/8lVPkSPJ.png",
    takoC:"https://ul.h3z.jp/rbG1ovxG.png",
    takoG:"https://ul.h3z.jp/XPTM8m5U.png",
    takoR:"https://ul.h3z.jp/dXRcAx01.png",
    takoX:"https://ul.h3z.jp/Uia1oOpk.png",
  };

  const IMG = {};

  function loadImages(){
    const entries = Object.entries(SPR);
    let loaded = 0;
    return new Promise((resolve) => {
      if (!entries.length){ resolve(); return; }
      for (const [key,src] of entries){
        const im = new Image();
        im.onload = () => {
          IMG[key] = im;
          loaded++;
          if (loaded === entries.length) resolve();
        };
        im.onerror = () => {
          console.warn("Image load failed:", key, src);
          loaded++;
          if (loaded === entries.length) resolve();
        };
        im.src = src;
      }
    });
  }

  const cv = document.getElementById("cv");
  const ctx = cv.getContext("2d");
  const panel = cv.closest(".panel");
  const hud = document.querySelector(".hud");
  const controls = panel.querySelector(".controls");
  const scoreEl = document.getElementById("score");
  const bestEl = document.getElementById("best");
  const stateEl = document.getElementById("state");
  const toastEl = document.getElementById("toast");
  const stopBtn = document.getElementById("stopBtn");
  const restartBtn = document.getElementById("restartBtn");

  function fitCanvas(){
    const vh = Math.max(320, window.innerHeight);
    const pad = 35;
    const hudH = hud ? hud.getBoundingClientRect().height : 0;
    const ctrlH = controls ? controls.getBoundingClientRect().height : 0;
    const maxCanvasH = Math.max(220, vh - (hudH + ctrlH + pad));
    const aspect = 720 / 420;
    const panelW = panel.getBoundingClientRect().width;
    const byWidthH = panelW * aspect;
    const displayH = Math.min(byWidthH, maxCanvasH);
    const displayW = Math.min(panelW, displayH / aspect);
    cv.style.width = Math.round(displayW) + "px";
    cv.style.height = Math.round(displayH) + "px";
    cv.style.margin = "0 auto";
  }

  window.addEventListener("resize", fitCanvas, { passive:true });
  window.addEventListener("orientationchange", () => setTimeout(fitCanvas,80), { passive:true });

  const CONF = {
    canvasW:420,
    canvasH:720,
    baseWidth:230,
    blockHDefault:34,
    minWidth:34,
    marginX:16,
    speedBase:2.25,
    speedPerLevel:.085,
    perfectPx:4,
    grid:true,
    CAMERA_ANCHOR_Y:.28,
    CAMERA_SMOOTH:.16,
    CAMERA_MIN:0,
    KEEP_BLOCKS_DRAW:140,
    BASE_BOOST:[1.65,1.55,1.45,1.35,1.25],
    SCORE_BASE0:60,
    SCORE_PER_FLOOR:10,
    SPEED_BONUS_FAST_MS:450,
    SPEED_BONUS_MID_MS:850,
    SPEED_BONUS_FAST:40,
    SPEED_BONUS_MID:20,
    PERFECT_MUL:1.30,
    NEAR_MUL:1.12,
    COMBO_MUL_ADD:.05,
    MUL_CAP:2.00,
  };

  const BLOCK_TABLE = [
    { key:"takoA", p:44, h:64, label:"素焼き（薄）", speedMul:1.05 },
    { key:"takoB", p:40, h:64, label:"イカさま（標準）", speedMul:1.22 },
    { key:"takoC", p:30, h:64, label:"生焼け（厚）", speedMul:1.60 },
    { key:"takoG", p:10, h:64, label:"金焼き", perfectPlus:3, speedMul:1.25 },
    { key:"takoR", p:7, h:64, label:"激辛", speedMul:1.4 },
    { key:"takoX", p:4, h:64, label:"虹伝説", insurance:true, speedMul:1.10 },
  ];

  const BEST_POINT_KEY = "takoyakiTimingTower_best_points";

  const S = {
    playing:false,
    over:false,
    ending:false,
    floors:0,
    points:0,
    bestPoints:loadBestPoints(),
    mul:1,
    comboPerfect:0,
    level:0,
    cameraY:0,
    dir:1,
    blocks:[],
    curr:null,
    allBlocks:[],
    lastTitle:"",
    lastSubtitle:"",
    lastRunAt:"",
    lastRunFloors:0,
    lastRunPoints:0,
    lastRewards:null,
    lastFrameT:0,
  };

  let lastKey = null;
  let resultOverlay = null;

  function loadBestPoints(){
    const v = Number(localStorage.getItem(BEST_POINT_KEY) || 0);
    return Number.isFinite(v) ? v : 0;
  }

  function saveBestPoints(v){
    localStorage.setItem(BEST_POINT_KEY, String(v));
  }

  function getMonthKey(date = new Date()){
    return date.getFullYear() + "-" + String(date.getMonth() + 1).padStart(2,"0");
  }

  function loadMonthlyStats(){
    try{
      const raw = localStorage.getItem(LS_MONTHLY_STATS);
      const cur = getMonthKey();
      if (!raw){
        const def = { monthKey:cur, harvest:0, sales:0, fishing:0, tower:0 };
        localStorage.setItem(LS_MONTHLY_STATS, JSON.stringify(def));
        return def;
      }
      const obj = JSON.parse(raw);
      if (!obj || obj.monthKey !== cur){
        const def = { monthKey:cur, harvest:0, sales:0, fishing:0, tower:0 };
        localStorage.setItem(LS_MONTHLY_STATS, JSON.stringify(def));
        return def;
      }
      return {
        monthKey:cur,
        harvest:Number(obj.harvest || 0),
        sales:Number(obj.sales || 0),
        fishing:Number(obj.fishing || 0),
        tower:Number(obj.tower || 0)
      };
    }catch(_){
      const def = { monthKey:getMonthKey(), harvest:0, sales:0, fishing:0, tower:0 };
      localStorage.setItem(LS_MONTHLY_STATS, JSON.stringify(def));
      return def;
    }
  }

  function updateMonthlyTowerHigh(floor){
    const s = loadMonthlyStats();
    s.tower = Math.max(Number(s.tower || 0), Math.floor(Number(floor || 0)));
    localStorage.setItem(LS_MONTHLY_STATS, JSON.stringify(s));
  }
  function loadBook(){
    try{
      const raw = localStorage.getItem(LS_BOOK);
      if (!raw) return { got:{}, cards:{} };
      const obj = JSON.parse(raw);
      if (!obj || typeof obj !== "object") return { got:{}, cards:{} };
      if (!obj.got || typeof obj.got !== "object") obj.got = {};
      if (!obj.cards || typeof obj.cards !== "object") obj.cards = {};
      return obj;
    }catch(_){
      return { got:{}, cards:{} };
    }
  }

  function saveBook(book){
    const safe = (book && typeof book === "object") ? book : {};
    if (!safe.got || typeof safe.got !== "object") safe.got = {};
    if (!safe.cards || typeof safe.cards !== "object") safe.cards = {};
    localStorage.setItem(LS_BOOK, JSON.stringify(safe));
  }

  function addCardToBook(card){
    if (!card || !card.id) return 0;
    const book = loadBook();
    const prevGot = (book.got && book.got[card.id]) ? book.got[card.id] : {};
    const prevCards = (book.cards && book.cards[card.id]) ? book.cards[card.id] : {};
    const prevCount = Math.max(
      Number(prevGot.count || 0),
      Number(prevGot.qty || 0),
      Number(prevCards.count || 0),
      Number(prevCards.qty || 0),
      0
    );
    const nextCount = prevCount + 1;
    const entry = {
      id:card.id,
      no:card.no || card.id,
      name:card.name || "",
      img:card.img || "",
      rarity:card.rarity || "SP",
      tier:card.tier || "",
      desc:card.desc || "",
      count:nextCount,
      qty:nextCount,
      owned:nextCount,
      total:nextCount,
      category:"SP",
      updatedAt:Date.now()
    };
    book.got[card.id] = entry;
    book.cards[card.id] = entry;
    saveBook(book);
    return nextCount;
  }

  function loadFarmInv(){
    try{
      const raw = localStorage.getItem(LS_INV);
      if (!raw) return { ver:1, seed:{}, water:{}, fert:{} };
      const obj = JSON.parse(raw);
      if (!obj || typeof obj !== "object") return { ver:1, seed:{}, water:{}, fert:{} };
      obj.seed = obj.seed || {};
      obj.water = obj.water || {};
      obj.fert = obj.fert || {};
      for (const f of TOWER_FERTS){
        if (!(f.id in obj.fert)) obj.fert[f.id] = 0;
      }
      return obj;
    }catch(_){
      return { ver:1, seed:{}, water:{}, fert:{} };
    }
  }

  function saveFarmInv(inv){
    localStorage.setItem(LS_INV, JSON.stringify(inv));
  }

  function addTowerFertToInv(fertId, qty=1){
    const inv = loadFarmInv();
    inv.fert = inv.fert || {};
    const addQty = Math.max(0, Math.floor(Number(qty || 0)));
    const cur = Math.max(0, Math.floor(Number(inv.fert[fertId] || 0)));
    inv.fert[fertId] = cur + addQty;
    saveFarmInv(inv);
    return inv.fert[fertId];
  }

  function pickWeighted(list){
    let total = 0;
    for (const row of list) total += Math.max(0, Number(row.w || 0));
    if (total <= 0) return list[0] || null;
    let r = Math.random() * total;
    for (const row of list){
      r -= Math.max(0, Number(row.w || 0));
      if (r <= 0) return row;
    }
    return list[list.length - 1] || null;
  }

  function getTowerDropConfig(floors){
    const f = Math.floor(Number(floors || 0));
    if (f < 10) return null;
    if (f < 20){
      return {
        rate:.25,
        table:[
          { id:"fert_takoyaki", w:55 },
          { id:"fert_balance",  w:25 },
          { id:"fert_sleep",    w:15 },
          { id:"fert_drop",     w:5  }
        ]
      };
    }
    if (f < 30){
      return {
        rate:.35,
        table:[
          { id:"fert_takoyaki", w:40 },
          { id:"fert_balance",  w:30 },
          { id:"fert_sleep",    w:20 },
          { id:"fert_drop",     w:10 }
        ]
      };
    }
    if (f < 40){
      return {
        rate:.45,
        table:[
          { id:"fert_takoyaki", w:28 },
          { id:"fert_balance",  w:30 },
          { id:"fert_sleep",    w:25 },
          { id:"fert_drop",     w:17 }
        ]
      };
    }
    return {
      rate:.55,
      table:[
        { id:"fert_takoyaki", w:20 },

  function rollTowerDrop(floors){
    const conf = getTowerDropConfig(floors);
    if (!conf) return { eligible:false, dropped:false, item:null, type:"fert" };
    if (Math.random() >= conf.rate) return { eligible:true, dropped:false, item:null, type:"fert" };
    const picked = pickWeighted(conf.table);
    const item = picked ? TOWER_FERT_MAP[picked.id] : null;
    if (!item) return { eligible:true, dropped:false, item:null, type:"fert" };
    const total = addTowerFertToInv(item.id, 1);
    return {
      eligible:true,
      dropped:true,
      type:"fert",
      item:{ id:item.id, name:item.name, img:item.img, qty:1, total }
    };
  }

  function rollLimitedCardDrop(floors){
    const f = Math.floor(Number(floors || 0));
    if (f < 25) return { eligible:false, dropped:false, item:null, type:"card" };

    const r = Math.random();
    let card = null;
    if (r < .01) card = LIMITED_CARD_MAP["SP-TT001"];
    else if (r < .04) card = LIMITED_CARD_MAP["SP-TT002"];

    if (!card) return { eligible:true, dropped:false, item:null, type:"card" };

    const total = addCardToBook(card);
    return {
      eligible:true,
      dropped:true,
      type:"card",
      item:{
        id:card.id,
        no:card.no,
        name:card.name,
        rarity:card.rarity,
        tier:card.tier,
        img:card.img,
        desc:card.desc,
        qty:1,
        total
      }
    };
  }

  function showToast(text){

  function clamp01(v){ return Math.max(0, Math.min(1, v)); }

  function hexToRgb(hex){
    const h = hex.replace("#","");
    return {
      r:parseInt(h.slice(0,2),16),
      g:parseInt(h.slice(2,4),16),
      b:parseInt(h.slice(4,6),16)
    };
  }

  function mixHex(a,b,t){
    const A = hexToRgb(a);
    const B = hexToRgb(b);
    const r = Math.round(A.r + (B.r - A.r) * t);
    const g = Math.round(A.g + (B.g - A.g) * t);
    const bb = Math.round(A.b + (B.b - A.b) * t);
    return `rgb(${r},${g},${bb})`;
  }

  const SKY_COLORS = {
    morning:{ top:"#cfe8ff", bottom:"#fff2d4" },
    day:{ top:"#a9cfe6", bottom:"#eaf5fb" },
    sunset:{ top:"#f0b38c", bottom:"#6b4e71" },
    night:{ top:"#070812", bottom:"#15152a" },
    flare:{ top:"#240607", bottom:"#5a1409" },
    heaven:{ top:"#bfe9ff", bottom:"#fff7dc" },
  };

  function getStageBlend(floors){
    const f = Math.floor(Number(floors) || 0);

    if (f < 10) return { a:"morning", b:"morning", t:0, stars:0, flare:0, heaven:0, dark:0 };
    if (f < 20) return { a:"day", b:"day", t:0, stars:0, flare:0, heaven:0, dark:0 };
    if (f < 30) return { a:"sunset", b:"sunset", t:0, stars:0, flare:0, heaven:0, dark:0 };

    if (f < 35){
      return { a:"night", b:"night", t:0, stars:.85, flare:0, heaven:0, dark:.92 };
    }

    if (f < 40){
      const t = clamp01((f - 35) / 5);
      return {
        a:"night",
        b:"flare",
        t,
        stars:.75 * (1 - t),
        flare:t,
        heaven:0,
        dark:.92 * (1 - t)
      };
    }

    if (f < 45){
      return { a:"flare", b:"flare", t:0, stars:.10, flare:1, heaven:0, dark:0 };
    }

    if (f < 50){
      const t = clamp01((f - 45) / 5);
      return {
        a:"flare",
        b:"heaven",
        t,
        stars:.10 * (1 - t),
        flare:1 - t,
        heaven:t,
        dark:0
      };
    }

    return { a:"heaven", b:"heaven", t:0, stars:0, flare:0, heaven:1, dark:0 };
  }

  const STAR_FIELD = (() => {
    const stars = [];
    for (let i=0; i<180; i++){
      stars.push({
        x:Math.random() * CONF.canvasW,
        y:Math.random() * CONF.canvasH,
        r:Math.random() < .12 ? 2 : 1,
        a:.25 + Math.random() * .55,
        hue:Math.random() < .18 ? 200 + Math.random()*40 : 35 + Math.random()*20
      });
    }
    return stars;
  })();

  const HEAVEN_FEATHERS = (() => {
    const arr = [];
    for (let i=0; i<30; i++){
      arr.push({
        x:Math.random() * CONF.canvasW,
        y:Math.random() * (CONF.canvasH + 80),
        s:.50 + Math.random() * .90,
        sp:.25 + Math.random() * .60,
        rot:Math.random() * Math.PI * 2,
        drift:.65 + Math.random() * 1.60
      });
    }
    return arr;
  })();

  function drawStars(alpha=1,density=1){
    const count = Math.max(0, Math.floor(STAR_FIELD.length * density));
    ctx.save();
    ctx.globalAlpha = alpha;
    for (let i=0; i<count; i++){
      const s = STAR_FIELD[i];
      ctx.fillStyle = `hsla(${s.hue},80%,88%,${s.a})`;
      ctx.fillRect(s.x|0, s.y|0, s.r, s.r);
      if (s.r >= 2){
        ctx.fillRect((s.x|0)+1, (s.y|0)-1, 1, 1);
        ctx.fillRect((s.x|0)-1, (s.y|0)+1, 1, 1);
      }
    }
    ctx.restore();
  }

  function drawSolarFlare(alpha=1){
    ctx.save();
    ctx.globalAlpha = alpha;

    const cx = CONF.canvasW * 0.5;
    const cy = CONF.canvasH * 0.92;
    const time = performance.now() * 0.001;

    // 背景の深み：黒赤〜紫を少し入れて、安い炎っぽさを減らす
    const deep = ctx.createLinearGradient(0, 0, 0, CONF.canvasH);
    deep.addColorStop(0.00, "rgba(22, 5, 24, .34)");
    deep.addColorStop(0.42, "rgba(64, 10, 18, .28)");
    deep.addColorStop(1.00, "rgba(255, 94, 22, .16)");
    ctx.fillStyle = deep;
    ctx.fillRect(0, 0, CONF.canvasW, CONF.canvasH);

    // 太陽の核
    const pulse = 1 + Math.sin(time * 1.7) * 0.035;
    const core = ctx.createRadialGradient(
      cx, cy, 8,
      cx, cy, CONF.canvasH * 0.72 * pulse
    );
    core.addColorStop(0.00, "rgba(255,255,245,1)");
    core.addColorStop(0.10, "rgba(255,244,170,.92)");
    core.addColorStop(0.27, "rgba(255,178,82,.64)");
    core.addColorStop(0.52, "rgba(255,92,42,.30)");
    core.addColorStop(0.78, "rgba(120,22,32,.13)");
    core.addColorStop(1.00, "rgba(0,0,0,0)");
    ctx.fillStyle = core;
    ctx.fillRect(0, 0, CONF.canvasW, CONF.canvasH);

    ctx.globalCompositeOperation = "screen";

    // 揺らぐフレア。細い棒ではなく、太めの光の帯にする
    for (let i = 0; i < 11; i++){
      const baseAngle = (-0.72 + i * (1.44 / 10));
      const wave = Math.sin(time * 0.9 + i * 1.37) * 0.075;
      const angle = baseAngle + wave;

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(angle);

      const width = 34 + Math.sin(time * 1.8 + i) * 9;
      const height = CONF.canvasH * (0.82 + (i % 3) * 0.06);

      const g = ctx.createLinearGradient(0, 20, 0, -height);
      g.addColorStop(0.00, "rgba(255,238,150,.36)");
      g.addColorStop(0.28, "rgba(255,178,72,.20)");
      g.addColorStop(0.62, "rgba(255,92,50,.075)");
      g.addColorStop(1.00, "rgba(0,0,0,0)");

      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.moveTo(-width * 0.50, 30);
      ctx.bezierCurveTo(-width * 0.85, -height * 0.32, -width * 0.26, -height * 0.70, 0, -height);
      ctx.bezierCurveTo(width * 0.26, -height * 0.70, width * 0.85, -height * 0.32, width * 0.50, 30);
      ctx.closePath();
      ctx.fill();

      ctx.restore();
    }

    // 太陽の輪郭リング
    ctx.save();
    ctx.globalCompositeOperation = "lighter";
    const ringR = 115 + Math.sin(time * 1.25) * 5;
    const ring = ctx.createRadialGradient(cx, cy, ringR * 0.72, cx, cy, ringR);
    ring.addColorStop(0.00, "rgba(255,255,255,0)");
    ring.addColorStop(0.58, "rgba(255,242,160,.10)");
    ring.addColorStop(0.76, "rgba(255,220,110,.22)");
    ring.addColorStop(1.00, "rgba(255,110,40,0)");
    ctx.fillStyle = ring;
    ctx.fillRect(0,0,CONF.canvasW,CONF.canvasH);
    ctx.restore();

    // 横に走る薄いレンズフレア
    ctx.save();
    ctx.globalCompositeOperation = "lighter";
    for (let i = 0; i < 4; i++){
      const y = cy - 170 + i * 58 + Math.sin(time * 0.7 + i) * 4;
      const g = ctx.createLinearGradient(0, y, CONF.canvasW, y);
      g.addColorStop(0.00, "rgba(255,255,255,0)");
      g.addColorStop(0.28, "rgba(255,206,105,.06)");
      g.addColorStop(0.50, "rgba(255,250,210,.20)");
      g.addColorStop(0.72, "rgba(255,148,66,.07)");
      g.addColorStop(1.00, "rgba(255,255,255,0)");
      ctx.fillStyle = g;
      ctx.fillRect(0, y, CONF.canvasW, 10);
    }
    ctx.restore();

    // ほんの少し火の粉。多すぎると安っぽくなるので控えめ
    ctx.save();
    ctx.globalCompositeOperation = "lighter";
    for (let i = 0; i < 32; i++){
      const px = (i * 73 + Math.sin(time + i) * 30) % CONF.canvasW;
      const py = (CONF.canvasH - ((time * (20 + i % 5 * 7) + i * 41) % CONF.canvasH));
      const size = 1 + (i % 3);
      ctx.fillStyle = i % 4 === 0 ? "rgba(255,255,210,.55)" : "rgba(255,176,72,.38)";
      ctx.fillRect(px, py, size, size);
    }
    ctx.restore();

    ctx.restore();
  }

  function drawHeaven(alpha=1){
    const now = performance.now() * .001;

    ctx.save();
    ctx.globalAlpha = alpha;

    const aura = ctx.createRadialGradient(
      CONF.canvasW*.5, CONF.canvasH*.22, 0,
      CONF.canvasW*.5, CONF.canvasH*.22, CONF.canvasW*.86
    );
    aura.addColorStop(0, "rgba(255,255,255,.80)");
    aura.addColorStop(.30, "rgba(255,238,170,.34)");
    aura.addColorStop(.68, "rgba(130,210,255,.18)");
    aura.addColorStop(1, "rgba(255,255,255,0)");
    ctx.fillStyle = aura;
    ctx.fillRect(0,0,CONF.canvasW,CONF.canvasH);

    ctx.globalAlpha = alpha * .55;
    for (let i=0; i<5; i++){
      const y = 80 + i * 110 + Math.sin(now*.35 + i) * 10;
      const g = ctx.createLinearGradient(0,y,CONF.canvasW,y);
      g.addColorStop(0, "rgba(255,255,255,0)");
      g.addColorStop(.5, "rgba(255,255,255,.30)");
      g.addColorStop(1, "rgba(255,255,255,0)");
      ctx.fillStyle = g;
      ctx.fillRect(0, y, CONF.canvasW, 18);
    }

    ctx.globalAlpha = alpha;
    ctx.fillStyle = "rgba(255,255,255,.80)";
    ctx.strokeStyle = "rgba(255,230,170,.55)";
    ctx.lineWidth = 1;

    for (const f of HEAVEN_FEATHERS){
      const y = (f.y + now * 28 * f.sp) % (CONF.canvasH + 70) - 45;
      const x = f.x + Math.sin(now * f.drift + f.y * .02) * 24;

      ctx.save();
      ctx.translate(x,y);
      ctx.rotate(Math.sin(now + f.rot) * .55);
      ctx.scale(f.s,f.s);

      ctx.beginPath();
      ctx.moveTo(0,-12);
      ctx.bezierCurveTo(15,-6,12,12,0,20);
      ctx.bezierCurveTo(-8,8,-8,-5,0,-12);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(0,-9);
      ctx.lineTo(0,17);
      ctx.strokeStyle = "rgba(210,190,130,.35)";
      ctx.stroke();

      ctx.restore();
    }

    ctx.restore();
  }

  function drawBG(){
    const blend = getStageBlend(S.floors);
    const A = SKY_COLORS[blend.a];
    const B = SKY_COLORS[blend.b];

    const top = mixHex(A.top, B.top, blend.t);
    const bottom = mixHex(A.bottom, B.bottom, blend.t);

    const grad = ctx.createLinearGradient(0,0,0,CONF.canvasH);
    grad.addColorStop(0, top);
    grad.addColorStop(1, bottom);
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,CONF.canvasW,CONF.canvasH);

    if (blend.stars > 0){
      drawStars(.95, blend.stars);
    }

    if (blend.dark > 0){
      ctx.save();
      ctx.globalAlpha = blend.dark;
      const v = ctx.createRadialGradient(
        CONF.canvasW*.5, CONF.canvasH*.45, CONF.canvasW*.08,
        CONF.canvasW*.5, CONF.canvasH*.45, CONF.canvasW*.78
      );
      v.addColorStop(0, "rgba(0,0,0,0)");
      v.addColorStop(.48, "rgba(0,0,0,.18)");
      v.addColorStop(1, "rgba(0,0,0,.58)");
      ctx.fillStyle = v;
      ctx.fillRect(0,0,CONF.canvasW,CONF.canvasH);
      ctx.restore();
    }

    if (blend.flare > 0){
      drawSolarFlare(blend.flare);
    }

    if (blend.heaven > 0){
      drawHeaven(blend.heaven);
    }

    if (CONF.grid){
      ctx.save();
      ctx.globalAlpha = .055;
      for (let y=0; y<CONF.canvasH; y+=30){
        ctx.beginPath();
        ctx.moveTo(0,y);
        ctx.lineTo(CONF.canvasW,y);
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 1;
        ctx.stroke();
      }
      ctx.restore();
    }
  }

  function pickBlockDef(){
    let total = 0;
    for (const d of BLOCK_TABLE) total += (d.p ?? 1);

    for (let tries=0; tries<8; tries++){
      let r = Math.random() * total;
      for (const d of BLOCK_TABLE){
        r -= (d.p ?? 1);
        if (r <= 0){
          if (d.key === lastKey) break;
          lastKey = d.key;
          return d;
        }
      }
    }

    const fb = BLOCK_TABLE[Math.floor(Math.random() * BLOCK_TABLE.length)];
    lastKey = fb.key;
    return fb;
  }

  function roundedPathOn(g,x,y,w,h,r){
    const rr = Math.min(r,w/2,h/2);
    g.moveTo(x+rr,y);
    g.arcTo(x+w,y,x+w,y+h,rr);
    g.arcTo(x+w,y+h,x,y+h,rr);
    g.arcTo(x,y+h,x,y,rr);
    g.arcTo(x,y,x+w,y,rr);
    g.closePath();
  }

  function roundedPath(x,y,w,h,r){
    roundedPathOn(ctx,x,y,w,h,r);
  }

  function drawImageCover(g,img,x,y,w,h){
    const iw = img.naturalWidth || img.width;
    const ih = img.naturalHeight || img.height;
    if (!iw || !ih){
      g.drawImage(img,x,y,w,h);
      return;
    }
    const s = Math.max(w / iw, h / ih);
    const dw = iw * s;
    const dh = ih * s;
    const dx = x + (w - dw) / 2;
    const dy = y + (h - dh) / 2;
    g.drawImage(img,dx,dy,dw,dh);
  }

  function makeBlock({x,width,y,h,tileKey,label="",perfectPlus=0,speedMul=1,insurance=false,spawnedAt=0}){
    return {x,width,y,h,tileKey,label,perfectPlus,speedMul,insurance,spawnedAt};
  }

  function pushConfirmedBlock(b){
    S.blocks.push(b);
    S.allBlocks.push({ x:b.x, y:b.y, width:b.width, h:b.h, tileKey:b.tileKey });
    if (CONF.KEEP_BLOCKS_DRAW > 0 && S.blocks.length > CONF.KEEP_BLOCKS_DRAW){
      S.blocks = S.blocks.slice(S.blocks.length - CONF.KEEP_BLOCKS_DRAW);
    }
  }

  function spawnBase(){
    const def = pickBlockDef();
    const w = CONF.baseWidth;
    const x = (CONF.canvasW - w) / 2;
    const y = CONF.canvasH - 90;

    const base = makeBlock({
      x,
      width:w,
      y,
      h:def.h ?? CONF.blockHDefault,
      tileKey:def.key,
      label:def.label || "",
      perfectPlus:def.perfectPlus || 0,
      speedMul:def.speedMul || 1,
      insurance:!!def.insurance
    });

    S.blocks = [];
    S.allBlocks = [];
    pushConfirmedBlock(base);
    S.level = 1;
  }

  function spawnCurrent(){
    const prev = S.blocks[S.blocks.length - 1];
    const def = pickBlockDef();
    const w = prev.width;
    const h = def.h ?? CONF.blockHDefault;
    const y = prev.y - h;
    const startLeft = (S.level % 2 === 0);
    const x = startLeft ? CONF.marginX : (CONF.canvasW - CONF.marginX - w);
    S.dir = startLeft ? 1 : -1;

    S.curr = makeBlock({
      x,
      width:w,
      y,
      h,
      tileKey:def.key,
      label:def.label || "",
      perfectPlus:def.perfectPlus || 0,
      speedMul:def.speedMul || 1,
      insurance:!!def.insurance,
      spawnedAt:performance.now()
    });

    if (S.curr.insurance) showToast("🌈 セーフ！");
    else if ((S.curr.perfectPlus || 0) > 0) showToast("🥇 金焼き");
    else if ((S.curr.speedMul || 1) > 1.45) showToast("🌶 速い！");
  }

  function getTopMostY(){
    let topY = Infinity;
    for (const b of S.blocks){
      if (Number.isFinite(b.y)) topY = Math.min(topY,b.y);
    }
    if (S.curr && Number.isFinite(S.curr.y)) topY = Math.min(topY,S.curr.y);
    if (!Number.isFinite(topY)) topY = 0;
    return topY;
  }

  function updateCamera(){
    const topY = getTopMostY();
    const anchorY = CONF.canvasH * CONF.CAMERA_ANCHOR_Y;
    const target = Math.max(CONF.CAMERA_MIN, anchorY - topY);
    S.cameraY += (target - S.cameraY) * CONF.CAMERA_SMOOTH;
  }

      { min:25, title:"〘見られていたたこ〙", sub:"25階を越えたあたりから、視線を感じたたこ。" },
      { min:30, title:"〘闇でも見えるたこ〙", sub:"輪郭が光った。黒いたこ焼き、まだ見えるたこ。" },
      { min:35, title:"〘太陽に焼かれはじめたたこ〙", sub:"背景がじわっと熱くなってきたたこ。" },
      { min:40, title:"〘太陽フレアのたこ〙", sub:"もう鉄板じゃなくて、太陽で焼いてるたこ。" },
      { min:45, title:"〘天界が見えたたこ〙", sub:"羽根が落ちてきた。たぶん焼きすぎたこ。" },
      { min:50, title:"〘天国ステージ到達たこ〙", sub:"たこ焼きが、羽根の中を積まれていくたこ。" },
      { min:70, title:"〘落ちなかったたこ〙", sub:"理由は分からないたこ。" },
      { min:100, title:"〘焼かれた伝説〙", sub:"カードになるって言われたたこ。" },
      { min:130, title:"〘返しすぎたたこ〙", sub:"手が先に動いてたこ。" },
      { min:160, title:"〘鉄板の向こう見えたたこ〙", sub:"戻り方、忘れたたこ。" },
      { min:200, title:"〘神話級・丸を管理するたこ〙", sub:"丸が、許可を取りに来たたこ。" },
    ];
    let pick = table[0];
    for (const row of table){
      if (p >= row.min) pick = row;
    }
    return pick;
  }

  function setHUD(){
    scoreEl.textContent = String(S.points);
    bestEl.textContent = String(S.bestPoints);

    if (S.ending){
      stateEl.textContent = `FINISH / ${S.floors}F`;
      return;
    }

    stateEl.textContent = S.over
      ? `GAME OVER / ${S.floors}F`
      : (S.playing ? `${S.floors}F ×${S.mul.toFixed(2)}` : "READY");
  }

  function drawBlock(b,index){
    const y = b.y + S.cameraY;
    if (y > CONF.canvasH + 120 || y < -240) return;

    const x = Math.round(b.x);
    const w = Math.round(b.width);
    const boost = CONF.BASE_BOOST[index] ?? 1.0;
    const h = Math.round(b.h * boost);
    const tile = b.tileKey ? IMG[b.tileKey] : null;
    const rAll = Math.round(Math.min(w,h) * .40);

    const needsBrightOutline =
      S.floors >= 30 ||
      b.tileKey === "takoX" ||
      b.tileKey === "takoR";

    // 30階以降・黒系たこ焼き用の見やすさ補助。
    // 太い白線ではなく、背景になじむ細い外光だけにする。
    if (needsBrightOutline){
      ctx.save();
      ctx.shadowColor = S.floors >= 45
        ? "rgba(255,255,220,.34)"
        : "rgba(255,220,120,.34)";
      ctx.shadowBlur = S.floors >= 40 ? 10 : 9;
      ctx.lineWidth = 1.25;
      ctx.strokeStyle = S.floors >= 50
        ? "rgba(255,255,255,.30)"
        : "rgba(255,215,120,.28)";
      ctx.beginPath();
      roundedPath(x,y,w,h,rAll);
      ctx.stroke();
      ctx.restore();
    }

    ctx.save();
    ctx.beginPath();
    roundedPath(x,y,w,h,rAll);
    ctx.clip();

    if (!tile || !tile.naturalWidth){
      const grad = ctx.createLinearGradient(x,y,x,y+h);
      grad.addColorStop(0,"#ffd34d");
      grad.addColorStop(1,"#f08b2f");
      ctx.fillStyle = grad;
      ctx.fillRect(x,y,w,h);
    }else{
      drawImageCover(ctx,tile,x,y,w,h);
    }

    ctx.restore();

    if (needsBrightOutline){
      ctx.save();
      ctx.globalAlpha = S.floors >= 30 && S.floors < 40 ? .38 : .26;
      ctx.lineWidth = 1;
      ctx.strokeStyle = S.floors >= 50
        ? "rgba(255,255,255,.48)"
        : "rgba(255,226,150,.42)";
      ctx.beginPath();
      roundedPath(x + .5, y + .5, Math.max(1,w - 1), Math.max(1,h - 1), rAll);
      ctx.stroke();
      ctx.restore();
    }
  }

  function draw(){
    ctx.clearRect(0,0,CONF.canvasW,CONF.canvasH);
    ctx.imageSmoothingEnabled = false;

    drawBG();

    for (let i=0; i<S.blocks.length; i++){
      drawBlock(S.blocks[i], i);
    }

    if (S.curr){
      drawBlock(S.curr, S.blocks.length);
    }

    ctx.save();
    ctx.globalAlpha = .42;
    ctx.fillStyle = "#fff";
    ctx.font = "700 12px system-ui,sans-serif";
    ctx.fillText(`点数: ${S.points} / ${S.floors}F / ×${S.mul.toFixed(2)}`,14,24);
    ctx.restore();
  }

  function levelSpeed(){
    const base = CONF.speedBase + S.level * CONF.speedPerLevel;
    const mul = (S.curr && S.curr.speedMul) ? S.curr.speedMul : 1;
    return base * mul;
  }

  function start(){
    if (S.ending) return;
    if (S.over) reset();
    S.playing = true;
    setHUD();
  }

  function reset(){
    hideResultOverlay();

    S.playing = false;
    S.over = false;
    S.ending = false;
    S.floors = 0;
    S.points = 0;
    S.mul = 1;
    S.comboPerfect = 0;
    S.cameraY = 0;
    S.dir = 1;
    S.lastTitle = "";
    S.lastSubtitle = "";
    S.lastRunAt = "";
    S.lastRunFloors = 0;
    S.lastRunPoints = 0;
    S.lastRewards = null;
    S.lastFrameT = 0;

    spawnBase();
    spawnCurrent();
    setHUD();
    draw();
  }

  function drop(){
    if (!S.curr || S.over || S.ending) return;

    const prev = S.blocks[S.blocks.length - 1];
    const curr = S.curr;

    const overlapLeft = Math.max(prev.x, curr.x);
    const overlapRight = Math.min(prev.x + prev.width, curr.x + curr.width);
    const overlapW = overlapRight - overlapLeft;

    if (overlapW <= 0){
      gameOver();
      return;
    }

    const diff = Math.abs(curr.x - prev.x);
    const perfectRange = CONF.perfectPx + (curr.perfectPlus || 0);
    const isPerfect = diff <= perfectRange;
    const nearPerfect = (!isPerfect && diff <= perfectRange * 2);
    const willShrink = overlapW < curr.width;

    if (curr.insurance && willShrink){
      curr.x = overlapLeft;
      curr.insurance = false;
      showToast("🌈 セーフ！");
    }else if (isPerfect){
      curr.x = prev.x;
      curr.width = prev.width;
      showToast(`PERFECT! ×${S.comboPerfect + 1}`);
    }else{
      curr.x = overlapLeft;
      curr.width = overlapW;
    }

    pushConfirmedBlock(curr);
    S.curr = null;

    S.level++;
    S.floors = Math.max(0, S.allBlocks.length - 1);

    const base = CONF.SCORE_BASE0 + S.floors * CONF.SCORE_PER_FLOOR;
    const elapsed = performance.now() - (curr.spawnedAt || performance.now());
    const speedBonus = (elapsed <= CONF.SPEED_BONUS_FAST_MS) ? CONF.SPEED_BONUS_FAST
      : (elapsed <= CONF.SPEED_BONUS_MID_MS) ? CONF.SPEED_BONUS_MID
      : 0;

    if (isPerfect){
      S.comboPerfect++;
      S.mul = Math.min(CONF.MUL_CAP, Math.max(1, CONF.PERFECT_MUL + S.comboPerfect * CONF.COMBO_MUL_ADD));
    }else if (nearPerfect){
      S.comboPerfect = 0;
      S.mul = Math.min(CONF.MUL_CAP, Math.max(1, CONF.NEAR_MUL));
    }else{
      S.comboPerfect = 0;
      S.mul = 1;
    }

    const gained = Math.floor(base * S.mul) + speedBonus;
    S.points += gained;

    if (speedBonus > 0 && isPerfect) showToast(`+${gained}（早×PERFECT）`);
    else if (isPerfect) showToast(`+${gained}（×${S.mul.toFixed(2)}）`);
    else if (speedBonus > 0) showToast(`+${gained}（早押し）`);

    if (S.points > S.bestPoints){
      S.bestPoints = S.points;
      saveBestPoints(S.bestPoints);
    }

    if (curr.width < CONF.minWidth){
      gameOver();
      return;
    }

    spawnCurrent();
    setHUD();
  }

  async function gameOver(){
    if (S.over || S.ending) return;

    S.over = true;
    S.playing = false;
    S.ending = true;

    S.lastRunFloors = S.floors;
    S.lastRunPoints = S.points;

    const t = getTakoyakiTitle(S.floors);
    S.lastTitle = t.title;
    S.lastSubtitle = t.sub;

    if (S.points > S.bestPoints){
      S.bestPoints = S.points;
      saveBestPoints(S.bestPoints);
    }

    updateMonthlyTowerHigh(S.floors);

    S.lastRewards = {
      fert: rollTowerDrop(S.floors),
      card: rollLimitedCardDrop(S.floors)
    };

    S.lastRunAt = new Date().toLocaleString("ja-JP",{
      timeZone:"Asia/Tokyo",
      year:"numeric",
      month:"2-digit",
      day:"2-digit",
      hour:"2-digit",
      minute:"2-digit"
    });

    setHUD();

    setTimeout(() => {
      showResultOverlay();
      S.ending = false;
      setHUD();
    }, 180);
  }

  function update(now){
    if (!S.lastFrameT) S.lastFrameT = now;

    let dt = (now - S.lastFrameT) / 1000;
    S.lastFrameT = now;
    dt = Math.min(dt, .033);

    if (S.playing && !S.over && !S.ending && S.curr){
      const sp = levelSpeed();
      const step = sp * dt * 60;
      S.curr.x += step * S.dir;

      const minX = CONF.marginX;
      const maxX = CONF.canvasW - CONF.marginX - S.curr.width;

      if (S.curr.x <= minX){
        S.curr.x = minX;
        S.dir = 1;
      }else if (S.curr.x >= maxX){
        S.curr.x = maxX;
        S.dir = -1;
      }
    }

    if (!S.over) updateCamera();
  }

  function loop(now){
    update(now || performance.now());
    draw();
    requestAnimationFrame(loop);
  }

  function ensureOverlay(){
    if (resultOverlay) return resultOverlay;

    const wrap = cv.closest(".panel") || document.body;

    const box = document.createElement("div");
    box.id = "takoyakiResultOverlay";

    const bg = document.createElement("div");
    bg.className = "result-bg";
    box.appendChild(bg);

    const card = document.createElement("div");
    card.className = "result-card";
    box.appendChild(card);

    const scroll = document.createElement("div");
    scroll.className = "result-scroll";
    card.appendChild(scroll);

    const miniWrap = document.createElement("div");
    miniWrap.className = "mini-wrap";
    scroll.appendChild(miniWrap);

    const miniTitle = document.createElement("div");
    miniTitle.className = "mini-title";
    miniTitle.textContent = "あなたのタワー（縮小再現）";
    miniWrap.appendChild(miniTitle);

    const miniCanvas = document.createElement("canvas");
    miniCanvas.id = "resMiniCanvas";
    miniCanvas.width = 360;
    miniCanvas.height = 130;
    miniWrap.appendChild(miniCanvas);

    const scoreHero = document.createElement("div");
    scoreHero.className = "result-score-hero";
    scoreHero.innerHTML = `
      <div class="result-score-label">FINAL SCORE</div>
      <div id="resScoreAnimated" class="result-score-value">0</div>
    `;
    scroll.appendChild(scoreHero);

    const rankWrap = document.createElement("div");
    rankWrap.className = "result-rank-wrap";
    rankWrap.innerHTML = `
      <div class="result-rank-label">RANK</div>
      <div id="resRankValue" class="result-rank-value">鉄板と仲良くなったたこ</div>
      <div id="resRankSub" style="margin-top:6px;font-size:13px;opacity:.88;line-height:1.55;">焦げも、友だちたこ。</div>
      <div id="resRankDate" style="margin-top:6px;font-size:12px;opacity:.72;">記録：----</div>
    `;
    scroll.appendChild(rankWrap);

    const stats = document.createElement("div");
    stats.style.display = "grid";
    stats.style.gridTemplateColumns = "1fr 1fr";
    stats.style.gap = "8px";
    stats.style.marginBottom = "8px";
    scroll.appendChild(stats);

    const statA = document.createElement("div");
    statA.style.padding = "10px";
    statA.style.borderRadius = "14px";
    statA.style.border = "1px solid rgba(255,255,255,.12)";
    statA.style.background = "rgba(255,255,255,.06)";
    statA.innerHTML = `
      <div style="opacity:.75;font-size:12px;">到達</div>
      <div id="resReach" style="font-weight:900;font-size:18px;margin-top:2px;"></div>
      <div id="resPts" style="opacity:.85;font-size:12px;margin-top:4px;"></div>
    `;
    stats.appendChild(statA);

    const statB = document.createElement("div");
    statB.style.padding = "10px";
    statB.style.borderRadius = "14px";
    statB.style.border = "1px solid rgba(255,255,255,.12)";
    statB.style.background = "rgba(255,255,255,.06)";
    statB.innerHTML = `
      <div style="opacity:.75;font-size:12px;">BEST</div>
      <div id="resBestPts" style="font-weight:900;font-size:18px;margin-top:2px;"></div>
    `;
    stats.appendChild(statB);

    const rewardsWrap = document.createElement("div");
    rewardsWrap.id = "resRewardsWrap";
    scroll.appendChild(rewardsWrap);

    const row = document.createElement("div");
    row.className = "result-actions";
    card.appendChild(row);

    const againBtn = document.createElement("button");
    againBtn.type = "button";
    againBtn.textContent = "もう一回焼く";
    row.appendChild(againBtn);

    const quitBtn = document.createElement("button");
    quitBtn.type = "button";
    quitBtn.textContent = "やめる";
    quitBtn.className = "quit-btn";
    row.appendChild(quitBtn);

    againBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      hideResultOverlay();
      reset();
      start();
    });

    quitBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      location.href = TOP_URL;
    });

    bg.addEventListener("click", (e) => e.stopPropagation());
    card.addEventListener("click", (e) => e.stopPropagation());

    const st = getComputedStyle(wrap);
    if (st.position === "static") wrap.style.position = "relative";
    wrap.appendChild(box);

    resultOverlay = { box, card, miniCanvas, scroll };
    return resultOverlay;
  }

  function showResultOverlay(){
    const o = ensureOverlay();

    const plainRank = String(S.lastTitle || "焼き結果").replace(/[〘〙]/g,"");
    const rankSub = String(S.lastSubtitle || "");
    const rankDate = S.lastRunAt ? `記録：${S.lastRunAt}` : "";

    document.getElementById("resReach").textContent = `${S.lastRunFloors}F`;
    document.getElementById("resPts").textContent = `点数：${S.lastRunPoints}`;
    document.getElementById("resBestPts").textContent = String(S.bestPoints);
    document.getElementById("resRankValue").textContent = plainRank;
    document.getElementById("resRankSub").textContent = rankSub;
    document.getElementById("resRankDate").textContent = rankDate;
    document.getElementById("resScoreAnimated").textContent = String(S.lastRunPoints);
    renderResultRewards(S.lastRewards);

    renderTowerMini(o.miniCanvas, S.allBlocks);

    o.scroll.scrollTop = 0;
    o.box.style.display = "flex";
    o.card.classList.remove("show");
    void o.card.offsetWidth;
    o.card.classList.add("show");
  }

  function hideResultOverlay(){
    if (!resultOverlay) return;
    resultOverlay.box.style.display = "none";
    resultOverlay.card.classList.remove("show");
    resultOverlay.card.style.opacity = "0";
    resultOverlay.card.style.transform = "translateY(12px) scale(.95)";
  }

  function renderTowerMini(canvas, blocks){
    const mctx = canvas.getContext("2d");
    const W = canvas.width;
    const H = canvas.height;

    mctx.clearRect(0,0,W,H);
    mctx.imageSmoothingEnabled = false;

    const g = mctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,"#071327");
    g.addColorStop(1,"#02050d");
    mctx.fillStyle = g;
    mctx.fillRect(0,0,W,H);

    if (!blocks || blocks.length === 0) return;

    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for (const b of blocks){
      minX = Math.min(minX,b.x);
      maxX = Math.max(maxX,b.x + b.width);
      minY = Math.min(minY,b.y);
      maxY = Math.max(maxY,b.y + b.h);
    }

    const pad = 10;
    const bw = Math.max(1,maxX - minX);
    const bh = Math.max(1,maxY - minY);
    const s = Math.min((W - pad*2) / bw, (H - pad*2) / bh);

    const ox = pad + (W - pad*2 - bw*s)/2 - minX*s;
    const oy = pad + (H - pad*2 - bh*s) - minY*s;

    const sorted = [...blocks].sort((a,b) => a.y - b.y);
    for (const b of sorted){
      const x = Math.round(ox + b.x*s);
      const y = Math.round(oy + b.y*s);
      const w = Math.max(1, Math.round(b.width*s));
      const h = Math.max(1, Math.round(b.h*s));
      const tile = b.tileKey ? IMG[b.tileKey] : null;
      const r = Math.max(3, Math.round(Math.min(w,h) * .22));

      mctx.save();
      mctx.beginPath();
      roundedPathOn(mctx,x,y,w,h,r);
      mctx.clip();

      if (tile && tile.naturalWidth) drawImageCover(mctx,tile,x,y,w,h);
      else{
        mctx.fillStyle = "rgba(255,210,80,.9)";
        mctx.fillRect(x,y,w,h);
      }

      mctx.restore();
    }
  }

  cv.addEventListener("pointerdown", (e) => {
    e.preventDefault();
    if (S.ending) return;
    if (!S.playing) start();
    else drop();
  }, { passive:false });

  stopBtn.addEventListener("click", () => {
    if (S.ending) return;
    if (!S.playing) start();
    else drop();
  });

  restartBtn.addEventListener("click", () => {
    reset();
  });

  loadImages().then(() => {
    loadMonthlyStats();
    fitCanvas();
    requestAnimationFrame(fitCanvas);
    reset();
    loop();
  });
})();
</script>
