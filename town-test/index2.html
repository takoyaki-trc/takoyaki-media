  <title>焼かれた伝説｜たこ焼きトレーディングカード - 2ページ目</title>
  <meta name="description" content="たこ焼きトレカの街マップ2ページ目。建物・タコ民・オクト表示・バックアップ対応。">

  <link rel="icon" href="https://takoyaki-trc.github.io/takoyaki-media/town/assets/images/icon.png">
  <link rel="apple-touch-icon" href="https://takoyaki-trc.github.io/takoyaki-media/town/assets/images/icon.png">
  <meta name="apple-mobile-web-app-title" content="焼かれた伝説">
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">

  <style>
    :root{
      --hud-top:max(8px,env(safe-area-inset-top));
      --panel-bg-soft:rgba(15,22,38,.82);
      --panel-line:rgba(255,255,255,.10);
      --panel-text:#fff;
      --shadow:0 12px 28px rgba(0,0,0,.28);
      --shell-max:900px;
      --gold:#ffe58a;
      --red:#ff5d5f;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      padding:0;
      width:100%;
      min-height:100%;
    }

    body{
      overflow-x:hidden;
      color:#fff;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:#0d1220;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      z-index:-3;
      pointer-events:none;
      background:
        radial-gradient(ellipse at center,rgba(0,0,0,0) 55%,rgba(0,0,0,.18) 100%),
        var(--sky,linear-gradient(#87b8e5 0%,#cfe8ff 55%,#ffffff 100%));
      transition:background 6s linear;
    }

    .page-shell{
      width:100%;
      max-width:var(--shell-max);
      margin:0 auto;
      padding:94px 8px 20px;
      position:relative;
      z-index:2;
    }

    .top-hud{
      position:fixed;
      top:var(--hud-top);
      left:0;
      right:0;
      z-index:2000;
      pointer-events:none;
    }

    .top-hud-inner{
      width:min(920px,calc(100% - 10px));
      margin:0 auto;
      pointer-events:none;
    }

    .hud-bar{
      pointer-events:auto;
      display:flex;
      align-items:center;
      gap:6px;
      flex-wrap:wrap;
      min-height:48px;
      padding:6px;
      border:1px solid var(--panel-line);
      border-radius:16px;
      background:linear-gradient(180deg,rgba(20,28,46,.96),rgba(10,14,24,.92));
      box-shadow:var(--shadow);
      backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);
    }

    .hud-left{
      display:flex;
      align-items:center;
      gap:6px;
      min-width:0;
      flex:1 1 auto;
      flex-wrap:wrap;
    }

    .hud-actions{
      display:flex;
      align-items:center;
      gap:6px;
      min-width:0;
      flex:0 0 auto;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .hud-btn,
    .hud-chip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      min-height:36px;
      min-width:0;
      padding:0 12px;
      border:1px solid rgba(255,255,255,.10);
      border-radius:12px;
      background:var(--panel-bg-soft);
      color:var(--panel-text);
      text-decoration:none;
      font-size:12px;
      font-weight:900;
      line-height:1;
      white-space:nowrap;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
    }

    .hud-btn{
      cursor:pointer;
      appearance:none;
      -webkit-tap-highlight-color:transparent;
      touch-action:manipulation;
    }

    .hud-btn:hover,
    .hud-btn:active{
      filter:brightness(1.04);
    }

    .hud-icon{
      font-size:15px;
      line-height:1;
      flex:0 0 auto;
    }

    .hud-btn.back-btn{
      padding-inline:14px;
    }

    .hud-chip.octo-chip{
      flex:1 1 180px;
      justify-content:flex-start;
      min-width:150px;
      background:
        linear-gradient(180deg,rgba(255,222,120,.08),rgba(255,255,255,.03)),
        var(--panel-bg-soft);
    }

    .octo-label{
      color:rgba(255,255,255,.82);
      font-weight:800;
    }

    .octo-value{
      color:var(--gold);
      font-weight:900;
      margin-left:2px;
    }

    .hud-btn.zukan-btn{
      background:linear-gradient(180deg,rgba(195,220,255,.10),rgba(255,255,255,.03)),var(--panel-bg-soft);
    }

    .hud-btn.serial-btn{
      background:linear-gradient(180deg,rgba(255,185,90,.16),rgba(255,255,255,.03)),var(--panel-bg-soft);
      border-color:rgba(255,220,130,.20);
    }

    .hud-btn.guide-btn{
      background:linear-gradient(180deg,rgba(140,200,255,.16),rgba(255,255,255,.03)),var(--panel-bg-soft);
      border-color:rgba(180,220,255,.24);
    }

    .icon-only{
      width:36px;
      min-width:36px;
      padding:0;
      position:relative;
    }

    .news-badge,
    .gift-badge{
      display:none;
      position:absolute;
      top:-5px;
      right:-3px;
      align-items:center;
      justify-content:center;
      min-width:16px;
      height:16px;
      padding:0 4px;
      border-radius:999px;
      background:var(--red);
      color:#fff;
      font-size:9px;
      font-weight:900;
      line-height:1;
      box-shadow:0 4px 10px rgba(255,77,79,.30);
    }

    .news-badge.is-show,
    .gift-badge.is-show{
      display:inline-flex;
    }

    @media(max-width:760px){
      .page-shell{padding-top:90px}
      .hud-left{flex:1 1 100%}
      .hud-actions{flex:1 1 100%;justify-content:flex-start}
    }

    @media(max-width:520px){
      .top-hud-inner{width:calc(100% - 8px)}
      .hud-bar{gap:5px;padding:5px;border-radius:14px}
      .hud-btn,.hud-chip{
        min-height:34px;
        padding:0 10px;
        font-size:11px;
        border-radius:11px;
      }
      .hud-btn.back-btn{
        min-width:76px;
        padding-inline:10px;
      }
      .hud-chip.octo-chip{
        min-width:0;
        flex:1 1 calc(100% - 82px);
      }
      .hud-actions{
        display:grid;
        grid-template-columns:minmax(0,1fr) minmax(0,1fr) 36px 36px minmax(0,1fr);
        gap:5px;
        width:100%;
      }
      .icon-only{width:36px;min-width:36px}
      .page-shell{padding-top:132px}
    }

    .map-wrap{
      position:relative;
      display:block;
      width:100%;
      max-width:900px;
      margin:0 auto;
      transform:translateZ(0);
      -webkit-transform:translateZ(0);
    }

    .map-img{
      display:block;
      width:100%;
      max-width:100%;
      height:auto;
      image-rendering:pixelated;
      transform:translateZ(0);
      -webkit-transform:translateZ(0);
    }

    .tf-building{
      position:absolute;
      display:block;
      z-index:40;
      cursor:pointer;
      transform:translate(-50%,-100%);
      transform-origin:50% 100%;
      touch-action:manipulation;
      -webkit-tap-highlight-color:transparent;
    }

    .tf-building > img{
      display:block;
      width:100%;
      height:auto;
      image-rendering:pixelated;
    }

    @media(hover:hover){
      .tf-building:hover{
        filter:drop-shadow(0 0 10px rgba(255,255,180,.75));
      }
    }

    .takomin{
      position:absolute;
      transform:translate(-50%,-100%);
      width:clamp(52px,6vw,72px);
      z-index:60;
      background:transparent;
      border:0;
      padding:0;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
      touch-action:manipulation;
      transform-origin:50% 100%;
    }

    .takomin img{
      width:100%;
      height:auto;
      display:block;
      image-rendering:pixelated;
      pointer-events:none;
      filter:
        drop-shadow(0 0 2px rgba(255,240,150,.95))
        drop-shadow(0 0 6px rgba(255,200,80,.75))
        drop-shadow(0 0 14px rgba(255,140,20,.55));
      animation:none!important;
    }

    .takomin-balloon{
      position:absolute;
      bottom:100%;
      left:50%;
      transform:translateX(-50%);
      z-index:999;
      display:none;
      background:#000;
      color:#fff;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,.16);
      font-size:12px;
      width:180px;
      max-width:min(180px,68vw);
      white-space:normal;
      word-break:break-word;
      line-height:1.6;
      text-align:center;
      pointer-events:none;
      box-shadow:0 10px 28px rgba(0,0,0,.32);
    }

    .t6 img{transform:scale(1.7);transform-origin:50% 100%}
    .t7 img{transform:scale(1.9);transform-origin:50% 100%}
    .t8 img{transform:scale(1.2);transform-origin:50% 100%}
    .t10 img{transform:scale(1.5);transform-origin:50% 100%}

    .t6 .takomin-balloon{
      left:auto;
      right:-18px;
      bottom:112%;
      transform:none;
    }

    .t7 .takomin-balloon{
      left:-18px;
      right:auto;
      bottom:112%;
      transform:none;
    }

    .t8 .takomin-balloon{
      left:50%;
      right:auto;
      bottom:118%;
      transform:translateX(-50%);
    }

    .t10 .takomin-balloon{
      left:auto;
      right:-18px;
      bottom:124%;
      transform:none;
    }

    .b1{left:18%;top:22%;width:110px}
    .b2{left:51%;top:51%;width:120px}
    .b3{left:20%;top:58%;width:118px}
    .b4{left:82%;top:22%;width:110px}
    .b5{left:52%;top:83%;width:120px}
    .b6{left:78%;top:58%;width:118px}

    .t2{top:22%;left:32%}
    .t3{top:24%;left:49%}
    .t4{top:21%;left:66%}
    .t6{top:42%;left:35%}
    .t7{top:83%;left:25%}
    .t8{top:60%;left:58%}
    .t9{top:77%;left:66%}
    .t10{top:64%;left:90%}

    .modal{
      position:fixed;
      inset:0;
      display:none;
      align-items:flex-start;
      justify-content:center;
      padding:16px;
      z-index:3000;
      background:rgba(0,0,0,.76);
      box-sizing:border-box;
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
    }

    .modal-card{
      width:min(720px,96vw);
      max-height:90vh;
      overflow:auto;
      border:2px solid rgba(255,255,255,.18);
      border-radius:16px;
      background:#111827;
      color:#fff;
      box-shadow:0 20px 60px rgba(0,0,0,.5);
      padding:16px;
      box-sizing:border-box;
      margin:auto 0;
      -webkit-overflow-scrolling:touch;
    }

    .modal-title{
      font-size:18px;
      font-weight:900;
      margin:0 0 12px;
    }

    .modal-text{
      font-size:13px;
      line-height:1.8;
      color:rgba(255,255,255,.88);
    }

    .modal-actions{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:14px;
    }

    .modal-btn{
      border:1px solid rgba(255,255,255,.22);
      border-radius:12px;
      padding:12px 14px;
      font-weight:900;
      cursor:pointer;
      background:rgba(255,255,255,.08);
      color:#fff;
    }

    .modal-btn.primary{
      border:0;
      background:#60a5fa;
      color:#08111f;
    }

    .gift-list{
      margin:14px 0 0;
      padding:14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.05);
    }

    .gift-list-title{
      font-size:14px;
      font-weight:900;
      margin-bottom:8px;
      color:#fff;
    }

    .gift-note{
      font-size:12px;
      line-height:1.7;
      color:rgba(255,255,255,.76);
      margin-top:10px;
    }

    .gift-item{
      font-size:13px;
      line-height:1.8;
      color:rgba(255,255,255,.92);
    }

    .gift-divider{
      border:0;
      height:1px;
      background:rgba(255,255,255,.12);
      margin:10px 0;
    }

    .inventory-summary{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
      margin-bottom:14px;
    }

    .inventory-card{
      padding:12px 14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.05);
    }

    .inventory-card-label{
      font-size:12px;
      font-weight:800;
      color:rgba(255,255,255,.72);
      margin-bottom:4px;
    }

    .inventory-card-value{
      font-size:18px;
      font-weight:900;
      color:#fff;
    }

    .inventory-groups{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .inventory-group{
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.04);
      border-radius:14px;
      padding:12px;
    }

    .inventory-group-title{
      font-size:14px;
      font-weight:900;
      margin:0 0 10px;
      color:#fff;
    }

    .inventory-icon-grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:10px;
    }

    .inventory-icon-item{
      position:relative;
      min-height:84px;
      border-radius:14px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.10);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:6px;
      padding:10px 8px;
      text-align:center;
    }

    .inventory-icon-emoji{
      font-size:28px;
      line-height:1;
    }

    .inventory-icon-name{
      font-size:11px;
      line-height:1.35;
      font-weight:800;
      color:#fff;
      word-break:break-word;
    }

    .inventory-count-badge{
      position:absolute;
      top:6px;
      right:6px;
      min-width:22px;
      height:22px;
      padding:0 6px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(180deg,#ffe58a,#ffbf47);
      color:#241600;
      font-size:11px;
      font-weight:900;
      box-shadow:0 6px 12px rgba(255,191,71,.28);
    }

    .inventory-empty{
      font-size:13px;
      line-height:1.8;
      color:rgba(255,255,255,.78);
      padding:14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.04);
    }

    @media(max-width:520px){
      .inventory-summary{grid-template-columns:1fr}
      .inventory-icon-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
    }

    .news-list{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .news-item{
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.05);
      border-radius:14px;
      padding:14px;
    }

    .news-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:8px;
      flex-wrap:wrap;
    }

    .news-date{
      font-size:12px;
      font-weight:900;
      color:#b9d9ff;
    }

    .news-label{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:40px;
      height:22px;
      padding:0 8px;
      border-radius:999px;
      font-size:10px;
      font-weight:900;
      line-height:1;
      background:#ff4d4f;
      color:#fff;
    }

    .news-item.is-read .news-label{
      background:rgba(255,255,255,.12);
      color:rgba(255,255,255,.72);
    }

    .news-title{
      font-size:15px;
      font-weight:900;
      color:#fff;
      margin:0 0 8px;
      line-height:1.45;
    }

    .news-body{
      font-size:13px;
      line-height:1.85;
      color
