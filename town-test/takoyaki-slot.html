<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>たこ焼きスロット｜焼きランプ</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background:
    radial-gradient(circle at top, #2b143d 0%, #09040f 45%, #000 100%);
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 14px;
}

.game {
  width: 100%;
  max-width: 430px;
  border: 3px solid #ffcc33;
  border-radius: 24px;
  padding: 16px;
  background: linear-gradient(180deg, #171021, #07040a);
  box-shadow:
    0 0 18px rgba(255, 204, 51, 0.5),
    inset 0 0 20px rgba(255, 120, 0, 0.15);
}

.title {
  text-align: center;
  font-size: 24px;
  font-weight: 900;
  color: #ffcc33;
  text-shadow: 0 0 10px #ff7b00;
  margin-bottom: 10px;
}

.sub-title {
  text-align: center;
  font-size: 12px;
  color: #ffd98a;
  margin-bottom: 12px;
}

.panel {
  background: #120b18;
  border: 2px solid #4b335f;
  border-radius: 18px;
  padding: 12px;
  margin-bottom: 12px;
}

.status {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  text-align: center;
  font-size: 13px;
}

.status div {
  background: #08050d;
  border: 1px solid #5d4370;
  border-radius: 12px;
  padding: 8px 4px;
}

.status strong {
  display: block;
  font-size: 18px;
  color: #fff1a8;
}

.yaki-lamp-wrap {
  display: flex;
  justify-content: center;
  margin: 14px 0;
}

.yaki-lamp {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background:
    radial-gradient(circle at 35% 30%, #fff5b8 0%, #ffd54a 22%, #cc6b00 55%, #381800 100%);
  border: 5px solid #ffe066;
  box-shadow:
    0 0 10px rgba(255, 190, 0, 0.35),
    inset 0 -10px 20px rgba(80, 20, 0, 0.55);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #421800;
  font-weight: 900;
  font-size: 18px;
  transition: 0.2s;
}

.yaki-lamp.on {
  background:
    radial-gradient(circle at 35% 28%, #fff 0%, #fff49b 18%, #ffeb3b 38%, #ff7b00 70%, #ff2600 100%);
  color: #5a1200;
  animation: lampFlash 0.45s infinite alternate;
}

@keyframes lampFlash {
  from {
    box-shadow:
      0 0 18px #ffe066,
      0 0 28px #ff9500,
      0 0 48px #ff3b00;
    transform: scale(1);
  }
  to {
    box-shadow:
      0 0 30px #fff,
      0 0 55px #ffea00,
      0 0 80px #ff3b00;
    transform: scale(1.04);
  }
}

.reels {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.reel {
  height: 118px;
  background: linear-gradient(180deg, #fff9dd, #f4d28a);
  border: 4px solid #ffcc33;
  border-radius: 18px;
  color: #111;
  overflow: hidden;
  position: relative;
  box-shadow: inset 0 0 20px rgba(0,0,0,0.35);
}

.symbol {
  height: 118px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 54px;
  line-height: 1;
  transition: transform 0.08s;
}

.reel.spinning .symbol {
  animation: shake 0.08s infinite;
}

@keyframes shake {
  0% { transform: translateY(-2px); }
  100% { transform: translateY(2px); }
}

.stop-buttons {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-top: 10px;
}

button {
  border: none;
  border-radius: 14px;
  padding: 13px 8px;
  font-weight: 900;
  color: #fff;
  background: linear-gradient(180deg, #ff4b4b, #990d0d);
  box-shadow: 0 5px 0 #4d0505;
  cursor: pointer;
  font-size: 15px;
}

button:active {
  transform: translateY(4px);
  box-shadow: 0 1px 0 #4d0505;
}

button:disabled {
  opacity: 0.45;
  cursor: not-allowed;
}

.main-button {
  width: 100%;
  margin-top: 12px;
  font-size: 20px;
  background: linear-gradient(180deg, #32e875, #087d31);
  box-shadow: 0 6px 0 #03491b;
}

.controls {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 10px;
}

.small-button {
  background: linear-gradient(180deg, #5678ff, #1c2d91);
  box-shadow: 0 5px 0 #10194d;
  font-size: 13px;
}

.message {
  min-height: 58px;
  margin-top: 12px;
  padding: 12px;
  border-radius: 14px;
  background: #050308;
  border: 1px solid #4b335f;
  color: #fff1a8;
  font-weight: 800;
  text-align: center;
  line-height: 1.5;
}

.flash-big {
  animation: bigFlash 0.8s ease;
}

@keyframes bigFlash {
  0%, 100% { background: linear-gradient(180deg, #171021, #07040a); }
  30% { background: #ffcc00; color: #000; }
  60% { background: #ff2b2b; }
}

.flash-reg {
  animation: regFlash 0.8s ease;
}

@keyframes regFlash {
  0%, 100% { background: linear-gradient(180deg, #171021, #07040a); }
  50% { background: #874cff; }
}

.dev {
  margin-top: 10px;
  font-size: 12px;
  color: #d8c2ff;
  text-align: center;
}

select {
  border-radius: 10px;
  padding: 6px;
  background: #08050d;
  color: #fff;
  border: 1px solid #7c5a99;
}

@media (max-width: 380px) {
  .symbol {
    font-size: 46px;
  }

  .reel,
  .symbol {
    height: 104px;
  }

  .yaki-lamp {
    width: 100px;
    height: 100px;
    font-size: 16px;
  }
}
</style>
</head>

<body>
<div class="game" id="game">
  <div class="title">たこ焼きスロット</div>
  <div class="sub-title">焼きランプが光れば、神焼きチャンス。</div>

  <div class="panel">
    <div class="status">
      <div>メダル<strong id="medals">500</strong></div>
      <div>BET<strong id="bet">3</strong></div>
      <div>獲得<strong id="win">0</strong></div>
    </div>

    <div class="yaki-lamp-wrap">
      <div class="yaki-lamp" id="lamp">焼き<br>ランプ</div>
    </div>

    <div class="reels">
      <div class="reel" id="reel0"><div class="symbol" id="symbol0">🟡</div></div>
      <div class="reel" id="reel1"><div class="symbol" id="symbol1">🐙</div></div>
      <div class="reel" id="reel2"><div class="symbol" id="symbol2">🔥</div></div>
    </div>

    <div class="stop-buttons">
      <button id="stop0" disabled>STOP</button>
      <button id="stop1" disabled>STOP</button>
      <button id="stop2" disabled>STOP</button>
    </div>

    <button class="main-button" id="startBtn">焼く！</button>

    <div class="controls">
      <button class="small-button" id="assistBtn">目押しアシスト：ON</button>
      <button class="small-button" id="resetBtn">メダル補充</button>
    </div>

    <div class="message" id="message">
      3枚BETで焼き開始！<br>たこぴ、準備完了。
    </div>

    <div class="dev">
      設定：
      <select id="settingSelect">
        <option value="1">設定1</option>
        <option value="2">設定2</option>
        <option value="3" selected>設定3</option>
        <option value="4">設定4</option>
        <option value="5">設定5</option>
        <option value="6">設定6</option>
      </select>
    </div>
  </div>
</div>

<script>
/*
  たこ焼きスロット 完全版
  --------------------------------------------------
  ・HTML/CSS/JSのみ
  ・レバーON時に内部抽選
  ・3リール停止
  ・最大4コマ引き込み風制御
  ・ボーナスフラグ持ち越し
  ・目押しアシストON/OFF
  ・設定1〜6
  --------------------------------------------------

  注意：
  実機の完全なリール制御ではなく、
  ブラウザゲーム用に分かりやすく簡略化した疑似制御です。
*/

/* =========================
   基本設定
========================= */

const BET = 3;

// 開発用：初期メダル
let medals = 500;

// 開発用：初期設定
let currentSetting = 3;

// 目押しアシスト
let assistMode = true;

// ボーナス持ち越しフラグ
let bonusFlag = null; // "BIG" or "REG" or null

// 今ゲームの内部成立役
let currentRole = null;

// 即告知か第3停止告知か
let pendingNotice = false;

/*
  機械割イメージ用の設定値。
  実際の出玉率はプレイ方法、目押しミス、ボーナス持ち越しで変動します。
*/
const SETTINGS = {
  1: { big: 1 / 310, reg: 1 / 430, cherry: 1 / 36, tako: 1 / 95, replay: 1 / 7.3, label: "約97.5%" },
  2: { big: 1 / 295, reg: 1 / 400, cherry: 1 / 35, tako: 1 / 92, replay: 1 / 7.3, label: "約98.5%" },
  3: { big: 1 / 280, reg: 1 / 370, cherry: 1 / 34, tako: 1 / 90, replay: 1 / 7.3, label: "約100.0%" },
  4: { big: 1 / 260, reg: 1 / 335, cherry: 1 / 33, tako: 1 / 86, replay: 1 / 7.3, label: "約102.0%" },
  5: { big: 1 / 240, reg: 1 / 300, cherry: 1 / 32, tako: 1 / 82, replay: 1 / 7.3, label: "約104.0%" },
  6: { big: 1 / 220, reg: 1 / 270, cherry: 1 / 31, tako: 1 / 78, replay: 1 / 7.3, label: "約106.0%" }
};

/*
  図柄定義。
  imageに画像URLを入れれば、あとから画像化しやすい構造。
*/
const SYMBOLS = {
  BIG:    { text: "🌈", name: "神焼き7", image: null },
  REG:    { text: "🐙", name: "たこぴ", image: null },
  GRILL:  { text: "🔥", name: "焼き台", image: null },
  TAKO:   { text: "🟡", name: "たこ焼き", image: null },
  WATER:  { text: "💧", name: "ミズ", image: null },
  STAR:   { text: "⭐", name: "レア星", image: null },
  CHERRY: { text: "🍒", name: "チェリー", image: null }
};

/*
  リール配列。
  ここを変更すると目押し難易度が変わります。
*/
const REELS = [
  ["BIG", "WATER", "TAKO", "CHERRY", "STAR", "REG", "TAKO", "GRILL", "WATER", "CHERRY", "TAKO", "STAR", "REG", "GRILL", "TAKO", "WATER", "BIG", "STAR", "TAKO", "CHERRY"],
  ["REG", "TAKO", "WATER", "STAR", "BIG", "GRILL", "TAKO", "WATER", "REG", "STAR", "TAKO", "GRILL", "BIG", "WATER", "TAKO", "STAR", "REG", "GRILL", "TAKO", "WATER"],
  ["TAKO", "STAR", "REG", "WATER", "GRILL", "BIG", "TAKO", "STAR", "WATER", "REG", "GRILL", "TAKO", "BIG", "WATER", "STAR", "TAKO", "REG", "GRILL", "WATER", "TAKO"]
];

// 現在表示中のリール位置
let reelPositions = [0, 0, 0];

// 停止済みか
let stopped = [true, true, true];

// 回転タイマー
let spinTimers = [null, null, null];

// 停止結果
let resultSymbols = [null, null, null];

// ゲーム中か
let isPlaying = false;

/* =========================
   DOM
========================= */

const gameEl = document.getElementById("game");
const medalEl = document.getElementById("medals");
const betEl = document.getElementById("bet");
const winEl = document.getElementById("win");
const messageEl = document.getElementById("message");
const lampEl = document.getElementById("lamp");
const startBtn = document.getElementById("startBtn");
const assistBtn = document.getElementById("assistBtn");
const resetBtn = document.getElementById("resetBtn");
const settingSelect = document.getElementById("settingSelect");

const reelEls = [
  document.getElementById("reel0"),
  document.getElementById("reel1"),
  document.getElementById("reel2")
];

const symbolEls = [
  document.getElementById("symbol0"),
  document.getElementById("symbol1"),
  document.getElementById("symbol2")
];

const stopBtns = [
  document.getElementById("stop0"),
  document.getElementById("stop1"),
  document.getElementById("stop2")
];

/* =========================
   表示更新
========================= */

function renderStatus(win = 0) {
  medalEl.textContent = medals;
  betEl.textContent = BET;
  winEl.textContent = win;
}

function setMessage(text) {
  messageEl.innerHTML = text;
}

function setLamp(on) {
  lampEl.classList.toggle("on", on);
}

function flash(type) {
  gameEl.classList.remove("flash-big", "flash-reg");
  void gameEl.offsetWidth;

  if (type === "BIG") gameEl.classList.add("flash-big");
  if (type === "REG") gameEl.classList.add("flash-reg");
}

function getSymbolText(symbolKey) {
  return SYMBOLS[symbolKey].text;
}

function renderReel(index) {
  const symbolKey = REELS[index][reelPositions[index]];
  symbolEls[index].textContent = getSymbolText(symbolKey);
}

/* =========================
   内部抽選
========================= */

function lottery() {
  // ボーナス持ち越し中は通常抽選しない
  if (bonusFlag) {
    return bonusFlag;
  }

  const s = SETTINGS[currentSetting];
  const r = Math.random();

  let p = 0;

  p += s.big;
  if (r < p) return "BIG";

  p += s.reg;
  if (r < p) return "REG";

  p += s.cherry;
  if (r < p) return "CHERRY";

  p += s.tako;
  if (r < p) return "TAKO";

  p += s.replay;
  if (r < p) return "REPLAY";

  return "MISS";
}

/* =========================
   リール制御
========================= */

/*
  最大4コマ以内の引き込み。
  stopBasePositionから4コマ先まで見て、狙い図柄があればそこに止める。
*/
function findPullInPosition(reelIndex, stopBasePosition, targetSymbol) {
  const reel = REELS[reelIndex];

  for (let offset = 0; offset <= 4; offset++) {
    const pos = (stopBasePosition + offset) % reel.length;
    if (reel[pos] === targetSymbol) {
      return pos;
    }
  }

  return stopBasePosition;
}

/*
  ハズレ時に、成立していない3つ揃いを避けるための簡易蹴り制御。
*/
function avoidAccidentalWin(reelIndex, stopBasePosition) {
  let pos = stopBasePosition;
  const reel = REELS[reelIndex];

  for (let attempt = 0; attempt < 5; attempt++) {
    const testSymbol = reel[pos];

    if (reelIndex === 2) {
      if (
        resultSymbols[0] &&
        resultSymbols[1] &&
        resultSymbols[0] === resultSymbols[1] &&
        resultSymbols[1] === testSymbol
      ) {
        pos = (pos + 1) % reel.length;
        continue;
      }
    }

    return pos;
  }

  return pos;
}

/*
  停止位置決定。
  assistMode ONなら当選役をかなり引き込みやすくする。
  OFFなら現在位置から4コマ範囲にあれば引き込む。
*/
function decideStopPosition(reelIndex) {
  const base = reelPositions[reelIndex];
  let target = null;

  if (currentRole === "BIG") target = "BIG";
  if (currentRole === "REG") target = "REG";
  if (currentRole === "TAKO") target = "TAKO";
  if (currentRole === "REPLAY") target = "WATER";

  // チェリーは左リールだけ狙う
  if (currentRole === "CHERRY" && reelIndex === 0) {
    target = "CHERRY";
  }

  if (target) {
    if (assistMode) {
      // アシストON：目押し補助として8コマ範囲で探す
      const reel = REELS[reelIndex];
      for (let offset = 0; offset <= 8; offset++) {
        const pos = (base + offset) % reel.length;
        if (reel[pos] === target) return pos;
      }
    }

    // アシストOFF：通常の4コマ引き込み
    return findPullInPosition(reelIndex, base, target);
  }

  // ハズレ時は偶然のボーナス揃いなどを避ける
  return avoidAccidentalWin(reelIndex, base);
}

/* =========================
   回転・停止
========================= */

function startSpin() {
  if (isPlaying) return;

  if (medals < BET) {
    setMessage("メダルが足りません。<br>焼き台に粉が入りません……。");
    return;
  }

  isPlaying = true;
  stopped = [false, false, false];
  resultSymbols = [null, null, null];
  renderStatus(0);

  medals -= BET;

  currentRole = lottery();

  // ボーナス初当たり時はフラグを立てる
  if (currentRole === "BIG" || currentRole === "REG") {
    bonusFlag = currentRole;

    // 告知タイミング：70%即告知、30%第3停止後
    if (Math.random() < 0.7) {
      pendingNotice = false;
      setLamp(true);
      setMessage("焼きランプ点灯！<br>ボーナス図柄を狙え！");
    } else {
      pendingNotice = true;
      setLamp(false);
      setMessage("焼き開始！<br>たこぴ、何かを隠している……。");
    }
  } else {
    pendingNotice = false;
    setLamp(false);
    setMessage("焼き開始！<br>たこぴ、回転中……");
  }

  for (let i = 0; i < 3; i++) {
    reelEls[i].classList.add("spinning");
    stopBtns[i].disabled = false;

    spinTimers[i] = setInterval(() => {
      reelPositions[i] = (reelPositions[i] + 1) % REELS[i].length;
      renderReel(i);
    }, 65 + i * 12);
  }

  startBtn.disabled = true;
}

function stopReel(index) {
  if (!isPlaying || stopped[index]) return;

  clearInterval(spinTimers[index]);
  spinTimers[index] = null;

  const stopPos = decideStopPosition(index);
  reelPositions[index] = stopPos;
  renderReel(index);

  reelEls[index].classList.remove("spinning");
  stopBtns[index].disabled = true;
  stopped[index] = true;

  const symbolKey = REELS[index][reelPositions[index]];
  resultSymbols[index] = symbolKey;

  // チェリーは左リール停止時点で一応告知
  if (index === 0 && currentRole === "CHERRY" && symbolKey === "CHERRY") {
    setMessage("左にチェリー停止！<br>たこぴ、つまみ食い成功。");
  }

  if (stopped.every(Boolean)) {
    finishGame();
  }
}

/* =========================
   役判定
========================= */

function finishGame() {
  let payout = 0;
  let message = "";
  const [a, b, c] = resultSymbols;

  // 第3停止告知
  if (pendingNotice && (currentRole === "BIG" || currentRole === "REG")) {
    setLamp(true);
    pendingNotice = false;
    setMessage("第3停止で焼きランプ点灯！<br>ボーナス確定！");
  }

  if (currentRole === "BIG" && a === "BIG" && b === "BIG" && c === "BIG") {
    payout = 300;
    medals += payout;
    bonusFlag = null;
    setLamp(false);
    flash("BIG");
    message = "🌈 神焼き降臨！！ 🌈<br>BIG BONUS +300枚！";
  } else if (currentRole === "REG" && a === "REG" && b === "REG" && c === "REG") {
    payout = 100;
    medals += payout;
    bonusFlag = null;
    setLamp(false);
    flash("REG");
    message = "🐙 半焼けボーナス！ 🐙<br>REG BONUS +100枚！";
  } else if (currentRole === "CHERRY" && a === "CHERRY") {
    payout = 10;
    medals += payout;
    message = "🍒 チェリー！ +10枚<br>たこぴ、端っこだけ焼けた。";
  } else if (currentRole === "TAKO" && a === "TAKO" && b === "TAKO" && c === "TAKO") {
    payout = 30;
    medals += payout;
    message = "🟡 たこ焼き揃い！ +30枚<br>外カリ中トロ、成功。";
  } else if (currentRole === "REPLAY" && a === "WATER" && b === "WATER" && c === "WATER") {
    payout = BET;
    medals += payout;
    message = "💧 リプレイ！<br>ミズ補充でもう一焼き。";
  } else if (bonusFlag) {
    message = "ボーナス成立中！<br>焼きランプ点灯中。図柄を狙え！";
    setLamp(true);
  } else if (currentRole === "CHERRY" && a !== "CHERRY") {
    message = "チェリー取りこぼし……。<br>たこぴ、目押しの修行へ。";
  } else {
    const misses = [
      "今日はまだ粉が足りない……。",
      "焦げた。だが、味はある。",
      "たこぴ、無言で首を振る。",
      "焼き台は沈黙した……。",
      "当たりは次の舟に入っているかも。"
    ];
    message = misses[Math.floor(Math.random() * misses.length)];
  }

  renderStatus(payout);
  setMessage(message);

  isPlaying = false;
  startBtn.disabled = false;

  for (let i = 0; i < 3; i++) {
    stopBtns[i].disabled = true;
  }
}

/* =========================
   イベント
========================= */

startBtn.addEventListener("click", startSpin);

stopBtns.forEach((btn, index) => {
  btn.addEventListener("click", () => stopReel(index));
});

assistBtn.addEventListener("click", () => {
  assistMode = !assistMode;
  assistBtn.textContent = assistMode ? "目押しアシスト：ON" : "目押しアシスト：OFF";
  setMessage(
    assistMode
      ? "目押しアシストON。<br>たこぴが少し手伝います。"
      : "目押しアシストOFF。<br>己の目で焼き切れ。"
  );
});

resetBtn.addEventListener("click", () => {
  medals += 300;
  renderStatus(0);
  setMessage("メダルを300枚補充しました。<br>粉、再入荷。");
});

settingSelect.addEventListener("change", e => {
  currentSetting = Number(e.target.value);
  const label = SETTINGS[currentSetting].label;
  setMessage(`設定${currentSetting}に変更しました。<br>機械割イメージ：${label}`);
});

/* =========================
   初期表示
========================= */

for (let i = 0; i < 3; i++) {
  reelPositions[i] = Math.floor(Math.random() * REELS[i].length);
  renderReel(i);
}

renderStatus(0);
setLamp(false);
</script>
</body>
