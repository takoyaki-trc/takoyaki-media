<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>たこ焼きスロット｜焼き場のランプ</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  min-height:100svh;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
  background:
    radial-gradient(circle at top,#6b1b17 0%,#23070a 48%,#070304 100%);
  color:#fff7e8;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:14px;
}

.slot-machine{
  width:min(390px,100%);
  border-radius:22px;
  background:linear-gradient(180deg,#ececec 0%,#9ea4aa 12%,#f4f4f4 18%,#b9bec4 100%);
  border:4px solid #222;
  box-shadow:0 20px 45px rgba(0,0,0,.55);
  overflow:hidden;
}

.top-arch{
  height:76px;
  background:
    radial-gradient(ellipse at center,#91ff9c 0%,#34c25b 35%,#d71920 38%,#b50010 70%);
  border-bottom:5px solid #333;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff7a0;
  font-weight:900;
  font-size:24px;
  text-shadow:0 3px 0 #630000,0 0 12px #fff36b;
}

.bonus-panel{
  margin:10px 16px;
  border:4px solid #8b0000;
  border-radius:10px;
  background:linear-gradient(180deg,#e71919,#910000);
  text-align:center;
  padding:10px 8px;
  font-size:20px;
  font-weight:900;
  color:#ffe27a;
  text-shadow:0 2px 0 #4a0000;
  box-shadow:inset 0 0 18px rgba(255,255,255,.25);
}

.reel-area{
  margin:10px 16px;
  padding:10px;
  border-radius:12px;
  background:
    linear-gradient(90deg,#061257,#1327a8 15%,#fff1a8 50%,#1327a8 85%,#061257);
  border:4px solid #ffd15a;
}

.reels{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  background:#111;
  padding:8px;
  border-radius:10px;
}

.reel{
  height:156px;
  background:#fffaf0;
  border:4px solid #222;
  border-radius:8px;
  overflow:hidden;
  position:relative;
  box-shadow:inset 0 8px 18px rgba(0,0,0,.22);
}

.reel-strip{
  position:absolute;
  top:0;
  left:0;
  width:100%;
}

.symbol{
  height:52px;
  display:grid;
  place-items:center;
  font-size:34px;
  color:#222;
  border-bottom:1px solid rgba(0,0,0,.08);
}

.reel.spinning .reel-strip{
  animation:reelSpin .22s linear infinite;
}

@keyframes reelSpin{
  from{transform:translateY(0)}
  to{transform:translateY(-260px)}
}

.center-line{
  position:absolute;
  left:0;
  right:0;
  top:52px;
  height:52px;
  pointer-events:none;
  border-top:3px solid rgba(255,0,0,.75);
  border-bottom:3px solid rgba(255,0,0,.75);
  box-shadow:0 0 10px rgba(255,0,0,.45);
}

.counter-panel{
  margin:10px 16px;
  background:#180b22;
  border:4px solid #222;
  border-radius:12px;
  padding:8px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
}

.counter{
  background:#050205;
  border:1px solid #52396d;
  border-radius:8px;
  padding:5px 3px;
  text-align:center;
  font-size:10px;
  color:#d6c2ff;
}

.counter b{
  display:block;
  color:#ff5cff;
  font-size:17px;
  margin-top:2px;
  font-family:monospace;
}

.control-panel{
  margin:0 16px 12px;
  padding:12px;
  background:linear-gradient(180deg,#222,#070707);
  border-radius:16px;
  border:4px solid #555;
}

.lamp-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
  margin-bottom:12px;
}

.takopi-lamp{
  width:70px;
  height:70px;
  border-radius:999px;
  background:radial-gradient(circle,#311,#080303);
  border:4px solid #111;
  display:grid;
  place-items:center;
  font-size:34px;
  box-shadow:inset 0 0 15px rgba(0,0,0,.8);
}

.takopi-lamp.on{
  background:radial-gradient(circle,#fff8b5 0%,#ffd83d 45%,#ff8400 80%);
  box-shadow:0 0 18px #fff36b,0 0 38px #ff9d00;
  animation:peka .75s infinite alternate;
}

@keyframes peka{
  from{transform:scale(1)}
  to{transform:scale(1.06)}
}

.lever{
  width:86px;
  height:62px;
  border-radius:18px;
  border:0;
  font-weight:900;
  background:linear-gradient(180deg,#ffef9a,#ffad25);
  color:#351600;
  box-shadow:0 6px 0 #8a4300;
}

.lever:active{
  transform:translateY(4px);
  box-shadow:0 2px 0 #8a4300;
}

.stop-buttons{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.stop-btn{
  height:56px;
  border-radius:999px;
  border:4px solid #fff;
  background:radial-gradient(circle,#ff4a4a,#a90000);
  color:#fff;
  font-weight:900;
  font-size:15px;
  box-shadow:0 6px 0 #4b0000;
}

.stop-btn:active{
  transform:translateY(4px);
  box-shadow:0 2px 0 #4b0000;
}

button:disabled{
  opacity:.35;
  pointer-events:none;
}

.lower-panel{
  background:linear-gradient(180deg,#e51d1d,#970000);
  border-top:5px solid #333;
  padding:18px 14px;
  text-align:center;
}

.character{
  font-size:52px;
  margin-bottom:6px;
}

.message{
  min-height:58px;
  background:rgba(0,0,0,.32);
  border:1px solid rgba(255,255,255,.22);
  border-radius:14px;
  padding:10px;
  font-weight:900;
  line-height:1.45;
}

.message.big{
  color:#fff27a;
  text-shadow:0 0 12px #ffe100;
}

.message.reg{
  color:#ffbaff;
  text-shadow:0 0 12px #ff55ff;
}

.message.replay{
  color:#aef7ff;
  text-shadow:0 0 12px #38e6ff;
}

.reset{
  margin-top:10px;
  width:100%;
  padding:11px;
  border:0;
  border-radius:12px;
  font-weight:900;
  background:linear-gradient(180deg,#fff,#cfcfcf);
  color:#222;
}
</style>
</head>

<body>

<div class="slot-machine">

  <div class="top-arch">TAKOYAKI SLOT</div>

  <div class="bonus-panel">BIG CHANCE!!</div>

  <div class="reel-area">
    <div class="reels">
      <div id="reel0" class="reel">
        <div class="reel-strip"></div>
        <div class="center-line"></div>
      </div>
      <div id="reel1" class="reel">
        <div class="reel-strip"></div>
        <div class="center-line"></div>
      </div>
      <div id="reel2" class="reel">
        <div class="reel-strip"></div>
        <div class="center-line"></div>
      </div>
    </div>
  </div>

  <div class="counter-panel">
    <div class="counter">CREDIT<b id="medal">100</b></div>
    <div class="counter">GAMES<b id="games">0</b></div>
    <div class="counter">BIG<b id="big">0</b></div>
    <div class="counter">REG<b id="reg">0</b></div>
  </div>

  <div class="control-panel">
    <div class="lamp-row">
      <div id="lamp" class="takopi-lamp">🐙</div>
      <button id="lever" class="lever">レバー<br>ON</button>
    </div>

    <div class="stop-buttons">
      <button id="stop0" class="stop-btn" disabled>左停止</button>
      <button id="stop1" class="stop-btn" disabled>中停止</button>
      <button id="stop2" class="stop-btn" disabled>右停止</button>
    </div>
  </div>

  <div class="lower-panel">
    <div class="character">🐙🔥</div>
    <div id="message" class="message">
      レバーONでスタート。<br>
      左・中・右を自分で止めるたこ。
    </div>
    <button id="reset" class="reset">リセット</button>
  </div>

</div>

<script>
(() => {
  "use strict";

  const STORAGE_KEY = "takoyaki_slot_lever_v1";

  const SYMBOLS = [
    { id:"tako", emoji:"🐙" },
    { id:"fire", emoji:"🔥" },
    { id:"takoyaki", emoji:"🍙" },
    { id:"rainbow", emoji:"🌈" },
    { id:"bomb", emoji:"💥" },
    { id:"sauce", emoji:"🟤" },
    { id:"star", emoji:"⭐" }
  ];

  const PAY = {
    cost:3,
    big:120,
    reg:45,
    replay:3
  };

  const reels = [
    document.getElementById("reel0"),
    document.getElementById("reel1"),
    document.getElementById("reel2")
  ];

  const strips = reels.map(r => r.querySelector(".reel-strip"));

  const stopBtns = [
    document.getElementById("stop0"),
    document.getElementById("stop1"),
    document.getElementById("stop2")
  ];

  const lever = document.getElementById("lever");
  const resetBtn = document.getElementById("reset");
  const lamp = document.getElementById("lamp");
  const message = document.getElementById("message");

  const medalEl = document.getElementById("medal");
  const gamesEl = document.getElementById("games");
  const bigEl = document.getElementById("big");
  const regEl = document.getElementById("reg");

  let state = loadState();

  let isSpinning = false;
  let stopped = [true,true,true];
  let result = null;
  let reelTimers = [null,null,null];
  let visibleSymbols = ["tako","tako","tako"];

  initReels();
  render();

  function loadState(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        const s = JSON.parse(raw);
        return {
          medal:Number(s.medal ?? 100),
          games:Number(s.games ?? 0),
          big:Number(s.big ?? 0),
          reg:Number(s.reg ?? 0)
        };
      }
    }catch(e){}

    return { medal:100, games:0, big:0, reg:0 };
  }

  function saveState(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function render(){
    medalEl.textContent = state.medal;
    gamesEl.textContent = state.games;
    bigEl.textContent = state.big;
    regEl.textContent = state.reg;
    lever.disabled = isSpinning || state.medal < PAY.cost;
  }

  function initReels(){
    strips.forEach((strip, index) => {
      strip.innerHTML = "";
      const loop = [...SYMBOLS,...SYMBOLS,...SYMBOLS,...SYMBOLS];

      loop.forEach(sym => {
        const div = document.createElement("div");
        div.className = "symbol";
        div.textContent = sym.emoji;
        strip.appendChild(div);
      });

      setCenterSymbol(index, "tako");
    });
  }

  function symbolById(id){
    return SYMBOLS.find(s => s.id === id) || SYMBOLS[0];
  }

  function setCenterSymbol(reelIndex, symbolId){
    const strip = strips[reelIndex];
    strip.innerHTML = "";

    const before = randomSymbol();
    const after = randomSymbol();
    const center = symbolById(symbolId);

    [before, center, after, ...SYMBOLS, ...SYMBOLS].forEach(sym => {
      const div = document.createElement("div");
      div.className = "symbol";
      div.textContent = sym.emoji;
      strip.appendChild(div);
    });

    strip.style.transform = "translateY(0)";
    visibleSymbols[reelIndex] = symbolId;
  }

  function randomSymbol(){
    return SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
  }

  function decideResult(){
    const r = Math.random();

    if(r < 0.012){
      return { type:"big", symbols:["rainbow","rainbow","rainbow"] };
    }

    if(r < 0.036){
      return { type:"reg", symbols:["bomb","bomb","bomb"] };
    }

    if(r < 0.145){
      return { type:"replay", symbols:["tako","tako","tako"] };
    }

    return { type:"miss", symbols:makeMissSymbols() };
  }

  function makeMissSymbols(){
    const ids = SYMBOLS.map(s => s.id);
    let arr;

    do{
      arr = [
        ids[Math.floor(Math.random() * ids.length)],
        ids[Math.floor(Math.random() * ids.length)],
        ids[Math.floor(Math.random() * ids.length)]
      ];
    }while(
      arr[0] === arr[1] &&
      arr[1] === arr[2] &&
      ["rainbow","bomb","tako"].includes(arr[0])
    );

    return arr;
  }

  function startSpin(){
    if(isSpinning) return;
    if(state.medal < PAY.cost){
      setMessage("メダルが足りないたこ。", "");
      return;
    }

    state.medal -= PAY.cost;
    state.games += 1;
    saveState();

    result = decideResult();
    isSpinning = true;
    stopped = [false,false,false];

    setLamp(false);
    setMessage("リール回転中……<br>好きな順番で止めるたこ。", "");

    reels.forEach((reel, i) => {
      reel.classList.add("spinning");
      stopBtns[i].disabled = false;

      reelTimers[i] = setInterval(() => {
        fillRandomStrip(i);
      }, 120);
    });

    render();
  }

  function fillRandomStrip(reelIndex){
    const strip = strips[reelIndex];
    strip.innerHTML = "";

    for(let i=0; i<12; i++){
      const div = document.createElement("div");
      div.className = "symbol";
      div.textContent = randomSymbol().emoji;
      strip.appendChild(div);
    }
  }

  function stopReel(index){
    if(!isSpinning || stopped[index]) return;

    stopped[index] = true;
    stopBtns[index].disabled = true;

    clearInterval(reelTimers[index]);
    reelTimers[index] = null;

    reels[index].classList.remove("spinning");
    setCenterSymbol(index, result.symbols[index]);

    vibrate(35);

    if(stopped.every(Boolean)){
      finishSpin();
    }
  }

  function finishSpin(){
    isSpinning = false;

    stopBtns.forEach(btn => btn.disabled = true);

    if(result.type === "big"){
      state.medal += PAY.big;
      state.big += 1;
      setLamp(true);
      setMessage("🌈🌈🌈<br>神焼きBONUS！<br>" + PAY.big + "メダル獲得！", "big");
      vibrate([80,40,120]);
    }else if(result.type === "reg"){
      state.medal += PAY.reg;
      state.reg += 1;
      setLamp(true);
      setMessage("💥💥💥<br>半焼けBONUS！<br>" + PAY.reg + "メダル獲得！", "reg");
      vibrate([60,40,60]);
    }else if(result.type === "replay"){
      state.medal += PAY.replay;
      setMessage("🐙🐙🐙<br>リプレイたこ。<br>" + PAY.replay + "メダル返却。", "replay");
      vibrate(50);
    }else{
      setLamp(false);
      setMessage("ハズレ。<br>まだ鉄板は温まっている……。", "");
    }

    saveState();
    render();
  }

  function setLamp(on){
    lamp.classList.toggle("on", on);
    lamp.textContent = on ? "✨" : "🐙";
  }

  function setMessage(text, type){
    message.className = "message";
    if(type) message.classList.add(type);
    message.innerHTML = text;
  }

  function vibrate(pattern){
    if(navigator.vibrate){
      navigator.vibrate(pattern);
    }
  }

  lever.addEventListener("click", startSpin);

  stopBtns.forEach((btn, index) => {
    btn.addEventListener("click", () => stopReel(index));
  });

  resetBtn.addEventListener("click", () => {
    localStorage.removeItem(STORAGE_KEY);

    state = { medal:100, games:0, big:0, reg:0 };

    isSpinning = false;
    stopped = [true,true,true];
    result = null;

    reelTimers.forEach(t => {
      if(t) clearInterval(t);
    });
    reelTimers = [null,null,null];

    reels.forEach((reel, i) => {
      reel.classList.remove("spinning");
      setCenterSymbol(i, "tako");
    });

    stopBtns.forEach(btn => btn.disabled = true);

    setLamp(false);
    setMessage("リセット完了。<br>レバーONでスタートたこ。", "");

    saveState();
    render();
  });

})();
</script>

</body>
</html>
