<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>たこ焼きスロット｜焼き場のランプ AT版</title>

<style>
*{box-sizing:border-box}

:root{
  --gold:#d8a642;
  --gold2:#ffe7a0;
  --gold3:#8d5d16;
  --black:#080604;
  --panel:#110b08;
  --red:#9b0000;
  --red2:#df1b1b;
}

body{
  margin:0;
  min-height:100svh;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
  background:
    radial-gradient(circle at top,#3d150d 0%,#140504 48%,#050201 100%);
  color:#fff7e8;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:12px;
}

.slot-machine{
  width:min(390px,100%);
  border-radius:18px;
  background:
    radial-gradient(circle at top,#2a2118 0%,#080604 52%,#030201 100%);
  border:4px solid #050302;
  box-shadow:
    0 22px 50px rgba(0,0,0,.7),
    inset 0 0 0 2px var(--gold),
    inset 0 0 0 6px #251607;
  overflow:hidden;
  position:relative;
}

.slot-machine:before,
.slot-machine:after{
  content:"";
  position:absolute;
  inset:10px;
  border:1px solid rgba(255,220,130,.45);
  border-radius:14px;
  pointer-events:none;
}

.top-arch{
  min-height:96px;
  padding:18px 10px 10px;
  background:
    radial-gradient(ellipse at center,rgba(255,220,120,.18),transparent 45%),
    linear-gradient(180deg,#120d08,#050302);
  border-bottom:3px solid var(--gold);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  color:var(--gold2);
  font-weight:1000;
  font-size:30px;
  line-height:1;
  letter-spacing:.03em;
  text-shadow:
    0 3px 0 #301500,
    0 0 12px rgba(255,190,55,.85),
    0 0 28px rgba(255,110,0,.35);
}

.top-arch small{
  margin-top:8px;
  font-size:15px;
  letter-spacing:.05em;
  color:#f7d27a;
}

.bonus-panel{
  margin:12px 16px 10px;
  border:3px solid var(--gold);
  border-radius:8px;
  background:
    linear-gradient(180deg,#5a0704,#b40000 45%,#430100);
  text-align:center;
  padding:11px 8px;
  font-size:22px;
  font-weight:1000;
  color:var(--gold2);
  text-shadow:0 2px 0 #210000,0 0 10px rgba(255,210,90,.7);
  box-shadow:
    inset 0 0 18px rgba(255,255,255,.18),
    0 0 12px rgba(255,170,40,.18);
}

.tako-meter{
  margin:0 16px 10px;
  padding:10px;
  border-radius:10px;
  background:
    linear-gradient(180deg,#130b06,#050302);
  border:2px solid var(--gold3);
  box-shadow:inset 0 0 0 1px rgba(255,230,150,.25);
}

.tako-meter-head{
  display:flex;
  justify-content:space-between;
  align-items:end;
  gap:8px;
  margin-bottom:8px;
}

.tako-meter-title{
  font-size:13px;
  font-weight:1000;
  color:#ffd77a;
  line-height:1.35;
  text-shadow:0 0 8px rgba(255,180,50,.65);
}

.tako-meter-level{
  font-size:11px;
  font-weight:900;
  color:#fff3c8;
  opacity:.9;
}

.tako-lamps{
  display:flex;
  gap:6px;
  justify-content:center;
  margin-bottom:8px;
}

.tako-dot{
  width:38px;
  height:38px;
  border-radius:999px;
  display:grid;
  place-items:center;
  background:#100b09;
  border:2px solid #322215;
  filter:grayscale(1);
  opacity:.34;
  position:relative;
  overflow:hidden;
}

.tako-dot img{
  width:34px;
  height:34px;
  object-fit:contain;
}

.tako-dot.on{
  filter:none;
  opacity:1;
  border-color:#ffb83e;
  box-shadow:
    0 0 10px #ffb21e,
    0 0 22px rgba(255,70,0,.7),
    inset 0 0 12px rgba(255,240,150,.45);
}

.tako-dot.on:before{
  content:"";
  position:absolute;
  left:4px;
  right:4px;
  bottom:-2px;
  height:20px;
  background:
    radial-gradient(circle at 30% 90%,#fff6a8 0 10%,transparent 11%),
    radial-gradient(circle at 50% 80%,#ffb000 0 18%,transparent 19%),
    radial-gradient(circle at 70% 85%,#ff4100 0 20%,transparent 21%);
  filter:blur(2px);
  opacity:.8;
  animation:flameFlicker .35s infinite alternate;
}

@keyframes flameFlicker{
  from{transform:translateY(2px) scaleY(.85);opacity:.65}
  to{transform:translateY(-2px) scaleY(1.18);opacity:1}
}

.expect-bar{
  height:13px;
  border-radius:999px;
  background:#050302;
  border:1px solid rgba(255,220,120,.35);
  overflow:hidden;
  position:relative;
}

.expect-fill{
  height:100%;
  width:0%;
  background:
    linear-gradient(90deg,#8e1500,#ff5a00,#ffd45b,#fff3a8);
  box-shadow:0 0 12px #ff6400;
  transition:width .35s ease;
}

.mode-panel{
  margin:0 16px 10px;
  padding:8px 10px;
  border-radius:8px;
  background:linear-gradient(180deg,#111927,#060811);
  border:2px solid var(--gold3);
  font-weight:1000;
  text-align:center;
  color:#aef7ff;
  text-shadow:0 0 8px rgba(56,230,255,.65);
  min-height:39px;
  box-shadow:inset 0 0 0 1px rgba(255,230,150,.18);
}

.reel-area{
  margin:10px 16px;
  padding:9px;
  border-radius:10px;
  background:
    linear-gradient(90deg,#050302,#17100b 12%,#876322 50%,#17100b 88%,#050302);
  border:3px solid var(--gold);
  position:relative;
  box-shadow:
    inset 0 0 0 2px #04135b,
    0 0 18px rgba(255,190,40,.22);
}

.reels{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:7px;
  background:#050505;
  padding:8px;
  border-radius:8px;
  position:relative;
}

.reel{
  height:156px;
  background:#fff7e4;
  border:3px solid #090909;
  border-radius:7px;
  overflow:hidden;
  position:relative;
  box-shadow:inset 0 8px 22px rgba(0,0,0,.35);
}

.reel-strip{
  position:absolute;
  top:0;
  left:0;
  width:100%;
}

.symbol{
  height:52px;
  display:grid;
  place-items:center;
  font-size:34px;
  color:#222;
  border-bottom:1px solid rgba(0,0,0,.08);
  transition:filter .18s ease, text-shadow .18s ease, transform .18s ease;
}

.symbol.glow-target{
  filter:drop-shadow(0 0 6px #fff0a0) drop-shadow(0 0 13px #ff8a00);
  text-shadow:0 0 10px #fff4a0,0 0 18px #ff7500;
  transform:scale(1.08);
}

.reel.spinning .reel-strip{
  animation:reelSpin .18s linear infinite;
}

@keyframes reelSpin{
  from{transform:translateY(0)}
  to{transform:translateY(-260px)}
}

.center-line{
  position:absolute;
  left:0;
  right:0;
  top:52px;
  height:52px;
  pointer-events:none;
  border-top:2px solid rgba(255,30,20,.55);
  border-bottom:2px solid rgba(255,30,20,.55);
  box-shadow:0 0 8px rgba(255,70,0,.35);
}

.reel-smoke{
  position:absolute;
  inset:8px;
  border-radius:8px;
  display:none;
  place-items:center;
  background:rgba(0,0,0,.46);
  backdrop-filter:blur(1.5px);
  z-index:20;
  pointer-events:none;
  text-align:center;
  padding:10px;
}

.reel-smoke.show{
  display:grid;
}

.navi-title{
  font-size:18px;
  font-weight:900;
  color:rgba(255,238,160,.62);
  text-shadow:0 0 8px rgba(255,160,0,.45);
}

.navi-sub{
  margin-top:6px;
  font-size:13px;
  font-weight:800;
  color:rgba(255,255,255,.52);
  line-height:1.4;
  text-shadow:0 0 6px rgba(0,0,0,.8);
}

.counter-panel{
  margin:10px 16px;
  background:#050304;
  border:2px solid var(--gold3);
  border-radius:10px;
  padding:8px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
  box-shadow:inset 0 0 0 1px rgba(255,230,150,.18);
}

.counter{
  background:#030102;
  border:1px solid #4c2f10;
  border-radius:8px;
  padding:5px 3px;
  text-align:center;
  font-size:10px;
  color:#f0c778;
}

.counter b{
  display:block;
  color:#ff5cff;
  font-size:17px;
  margin-top:2px;
  font-family:monospace;
}

.control-panel{
  margin:0 16px 12px;
  padding:12px;
  background:
    radial-gradient(circle at 18% 28%,rgba(255,70,20,.12),transparent 18%),
    linear-gradient(180deg,#161413,#050505);
  border-radius:14px;
  border:3px solid #2b2b2b;
  box-shadow:
    inset 0 0 0 1px rgba(255,220,130,.24),
    0 0 0 2px #050302;
}

.lamp-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
  margin-bottom:12px;
}

.takopi-lamp{
  width:76px;
  height:76px;
  border-radius:999px;
  background:radial-gradient(circle,#2a0808,#050202 70%);
  border:4px solid #080403;
  display:grid;
  place-items:center;
  box-shadow:
    inset 0 0 18px rgba(0,0,0,.9),
    0 0 0 2px #2e1c0a;
  overflow:hidden;
  position:relative;
}

.takopi-lamp img{
  width:68px;
  height:68px;
  object-fit:cover;
  border-radius:999px;
  filter:brightness(.62) saturate(.85);
  transition:.25s;
}

.takopi-lamp.on{
  background:radial-gradient(circle,#fff8b5 0%,#ffd83d 45%,#ff8400 80%);
  box-shadow:
    0 0 18px #fff36b,
    0 0 38px #ff9d00,
    0 0 58px rgba(255,0,0,.45);
  animation:peka .75s infinite alternate;
}

.takopi-lamp.on img{
  filter:brightness(1.22) saturate(1.45) drop-shadow(0 0 10px #fff1a0);
  transform:scale(1.08);
}

.takopi-lamp.on:after{
  content:"✨";
  position:absolute;
  right:2px;
  top:2px;
  font-size:18px;
  animation:spark .6s infinite alternate;
}

@keyframes peka{
  from{transform:scale(1)}
  to{transform:scale(1.06)}
}

@keyframes spark{
  from{opacity:.35;transform:scale(.8)}
  to{opacity:1;transform:scale(1.2)}
}

.lever{
  width:88px;
  height:64px;
  border-radius:14px;
  border:2px solid #ffe7a0;
  font-weight:1000;
  background:linear-gradient(180deg,#fff2a8,#d79018 75%,#875000);
  color:#261000;
  box-shadow:0 6px 0 #5c3300,0 0 12px rgba(255,210,90,.35);
}

.lever:active{
  transform:translateY(4px);
  box-shadow:0 2px 0 #5c3300;
}

.stop-buttons{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.stop-btn{
  height:56px;
  border-radius:999px;
  border:3px solid #bba27a;
  background:radial-gradient(circle,#cc2626,#750000);
  color:#ffe0a3;
  font-weight:1000;
  font-size:15px;
  box-shadow:0 6px 0 #280000,0 0 10px rgba(255,50,30,.25);
  text-shadow:0 2px 0 #2a0000;
}

.stop-btn:active{
  transform:translateY(4px);
  box-shadow:0 2px 0 #280000;
}

button:disabled{
  opacity:.35;
  pointer-events:none;
}

.lower-panel{
  background:linear-gradient(180deg,#140b06,#050302);
  border-top:3px solid var(--gold3);
  padding:15px 14px 16px;
  text-align:center;
}

.character{
  font-size:42px;
  margin-bottom:6px;
}

.message{
  min-height:78px;
  background:rgba(0,0,0,.45);
  border:1px solid rgba(255,210,120,.35);
  border-radius:10px;
  padding:10px;
  font-weight:900;
  line-height:1.45;
}

.message.big{
  color:#fff27a;
  text-shadow:0 0 12px #ffe100;
}

.message.reg{
  color:#ffbaff;
  text-shadow:0 0 12px #ff55ff;
}

.message.replay,
.message.at{
  color:#aef7ff;
  text-shadow:0 0 12px #38e6ff;
}

.message.hot{
  color:#ffdf74;
  text-shadow:0 0 13px #ff8b00;
}

.reset{
  margin-top:10px;
  width:100%;
  padding:11px;
  border:0;
  border-radius:10px;
  font-weight:1000;
  background:linear-gradient(180deg,#fff0b0,#c79024);
  color:#251100;
}
</style>
</head>

<body>

<div class="slot-machine">

  <div class="top-arch">
    TAKOYAKI SLOT
    <small>since2025</small>
  </div>

  <div class="bonus-panel" id="bonusPanel">BIG CHANCE!!</div>

  <div class="tako-meter">
    <div class="tako-meter-head">
      <div class="tako-meter-title">
        タコメーター<br>
        3連続からAT期待度UP / 5連続でAT確定！
      </div>
      <div class="tako-meter-level" id="expectText">期待度 低</div>
    </div>
    <div class="tako-lamps" id="takoMeter"></div>
    <div class="expect-bar"><div id="expectFill" class="expect-fill"></div></div>
  </div>

  <div class="mode-panel" id="modePanel">通常時</div>

  <div class="reel-area">
    <div class="reels">
      <div id="reel0" class="reel">
        <div class="reel-strip"></div>
        <div class="center-line"></div>
      </div>
      <div id="reel1" class="reel">
        <div class="reel-strip"></div>
        <div class="center-line"></div>
      </div>
      <div id="reel2" class="reel">
        <div class="reel-strip"></div>
        <div class="center-line"></div>
      </div>

      <div id="reelSmoke" class="reel-smoke">
        <div>
          <div id="naviTitle" class="navi-title"></div>
          <div id="naviSub" class="navi-sub"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="counter-panel">
    <div class="counter">CREDIT<b id="medal">100</b></div>
    <div class="counter">GAMES<b id="games">0</b></div>
    <div class="counter">BIG<b id="big">0</b></div>
    <div class="counter">AT<b id="atCount">0</b></div>
  </div>

  <div class="control-panel">
    <div class="lamp-row">
      <div id="lamp" class="takopi-lamp">
        <img src="https://ul.h3z.jp/uDXMjVvD.png" alt="たこぴランプ">
      </div>
      <button id="lever" class="lever">レバー<br>ON</button>
    </div>

    <div class="stop-buttons">
      <button id="stop0" class="stop-btn" disabled>左停止</button>
      <button id="stop1" class="stop-btn" disabled>中停止</button>
      <button id="stop2" class="stop-btn" disabled>右停止</button>
    </div>
  </div>

  <div class="lower-panel">
    <div class="character">🐙🔥</div>
    <div id="message" class="message">
      レバーONでスタート。<br>
      タコが揃うほどメーターが炎になるたこ。
    </div>
    <button id="reset" class="reset">リセット</button>
  </div>

</div>

<script>
(() => {
  "use strict";

  const STORAGE_KEY = "takoyaki_slot_at_card_design_v2";
  const PEKA_IMAGE = "https://ul.h3z.jp/uDXMjVvD.png";

  const SYMBOLS = [
    { id:"tako", emoji:"🐙" },
    { id:"fire", emoji:"🔥" },
    { id:"takoyaki", emoji:"🍙" },
    { id:"rainbow", emoji:"🌈" },
    { id:"bomb", emoji:"💥" },
    { id:"sauce", emoji:"🟤" },
    { id:"star", emoji:"⭐" }
  ];

  const PAY = {
    cost:3,
    big:120,
    reg:45,
    replay:3,
    koyaku:8,
    atKoyaku:12
  };

  const reels = [
    document.getElementById("reel0"),
    document.getElementById("reel1"),
    document.getElementById("reel2")
  ];

  const strips = reels.map(r => r.querySelector(".reel-strip"));

  const stopBtns = [
    document.getElementById("stop0"),
    document.getElementById("stop1"),
    document.getElementById("stop2")
  ];

  const lever = document.getElementById("lever");
  const resetBtn = document.getElementById("reset");
  const lamp = document.getElementById("lamp");
  const message = document.getElementById("message");
  const bonusPanel = document.getElementById("bonusPanel");
  const modePanel = document.getElementById("modePanel");
  const takoMeter = document.getElementById("takoMeter");
  const expectFill = document.getElementById("expectFill");
  const expectText = document.getElementById("expectText");

  const reelSmoke = document.getElementById("reelSmoke");
  const naviTitle = document.getElementById("naviTitle");
  const naviSub = document.getElementById("naviSub");

  const medalEl = document.getElementById("medal");
  const gamesEl = document.getElementById("games");
  const bigEl = document.getElementById("big");
  const atCountEl = document.getElementById("atCount");

  let audioCtx = null;
  let reelSoundTimer = null;

  let state = loadState();

  let isSpinning = false;
  let stopped = [true,true,true];
  let stopOrder = [];
  let result = null;
  let reelTimers = [null,null,null];
  let visibleSymbols = ["tako","tako","tako"];

  initMeter();
  initReels();
  render();

  function loadState(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        const s = JSON.parse(raw);
        return {
          medal:Number(s.medal ?? 100),
          games:Number(s.games ?? 0),
          big:Number(s.big ?? 0),
          reg:Number(s.reg ?? 0),
          atCount:Number(s.atCount ?? 0),
          mode:s.mode || "normal",
          takoMeter:Number(s.takoMeter ?? 0),
          atGames:Number(s.atGames ?? 0),
          atTotalAdded:Number(s.atTotalAdded ?? 0),
          bonusStock:s.bonusStock || null
        };
      }
    }catch(e){}

    return {
      medal:100,
      games:0,
      big:0,
      reg:0,
      atCount:0,
      mode:"normal",
      takoMeter:0,
      atGames:0,
      atTotalAdded:0,
      bonusStock:null
    };
  }

  function saveState(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function initMeter(){
    takoMeter.innerHTML = "";
    for(let i=0;i<5;i++){
      const d = document.createElement("div");
      d.className = "tako-dot";
      d.innerHTML = `<img src="${PEKA_IMAGE}" alt="タコ">`;
      takoMeter.appendChild(d);
    }
  }

  function updateMeter(){
    [...takoMeter.children].forEach((el,i) => {
      el.classList.toggle("on", i < state.takoMeter);
    });

    const pct = Math.min(100, state.takoMeter * 20);
    expectFill.style.width = pct + "%";

    if(state.takoMeter <= 1){
      expectText.textContent = "期待度 低";
    }else if(state.takoMeter === 2){
      expectText.textContent = "期待度 中";
    }else if(state.takoMeter === 3){
      expectText.textContent = "期待度 高";
    }else if(state.takoMeter === 4){
      expectText.textContent = "期待度 激高";
    }else{
      expectText.textContent = "AT確定";
    }
  }

  function render(){
    medalEl.textContent = state.medal;
    gamesEl.textContent = state.games;
    bigEl.textContent = state.big + state.reg;
    atCountEl.textContent = state.atCount;

    lever.disabled = isSpinning || state.medal < PAY.cost;

    updateMeter();

    if(state.mode === "normal"){
      modePanel.textContent = "通常時";
    }else if(state.mode === "atPrepare"){
      modePanel.textContent = "AT突入準備中｜小役で上乗せ抽選";
    }else if(state.mode === "at"){
      modePanel.textContent = "AT中｜残り " + state.atGames + "G";
    }else if(state.mode === "bonus"){
      modePanel.textContent = "ボーナス確定｜絵柄を狙え";
    }

    if(state.bonusStock){
      bonusPanel.textContent = state.bonusStock === "big" ? "BIG確定!! 🌈を狙え" : "REG確定!! 💥を狙え";
    }else if(state.mode === "at"){
      bonusPanel.textContent = "AT RUSH!!";
    }else if(state.mode === "atPrepare"){
      bonusPanel.textContent = "AT準備中!!";
    }else{
      bonusPanel.textContent = "BIG CHANCE!!";
    }
  }

  function initReels(){
    strips.forEach((strip, index) => {
      strip.innerHTML = "";
      const loop = [...SYMBOLS,...SYMBOLS,...SYMBOLS,...SYMBOLS];

      loop.forEach(sym => {
        const div = document.createElement("div");
        div.className = "symbol";
        div.textContent = sym.emoji;
        strip.appendChild(div);
      });

      setCenterSymbol(index, "tako");
    });
  }

  function symbolById(id){
    return SYMBOLS.find(s => s.id === id) || SYMBOLS[0];
  }

  function setCenterSymbol(reelIndex, symbolId, glowId = null){
    const strip = strips[reelIndex];
    strip.innerHTML = "";

    const before = randomSymbol();
    const after = randomSymbol();
    const center = symbolById(symbolId);

    [before, center, after, ...SYMBOLS, ...SYMBOLS].forEach(sym => {
      const div = document.createElement("div");
      div.className = "symbol";
      if(glowId && sym.id === glowId) div.classList.add("glow-target");
      div.textContent = sym.emoji;
      strip.appendChild(div);
    });

    strip.style.transform = "translateY(0)";
    visibleSymbols[reelIndex] = symbolId;
  }

  function randomSymbol(){
    return SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
  }

  function chance(p){
    return Math.random() < p;
  }

  function pick(arr){
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function decideResult(){
    if(state.bonusStock){
      return {
        role:"bonusStock",
        bonusType:state.bonusStock,
        target:state.bonusStock === "big" ? "rainbow" : "bomb",
        symbols:null,
        pekaTiming:"already"
      };
    }

    if(state.mode === "at"){
      return decideAtResult();
    }

    if(state.mode === "atPrepare"){
      return decideAtPrepareResult();
    }

    const r = Math.random();

    if(r < 0.010){
      const type = chance(.72) ? "big" : "reg";
      return {
        role:"bonus",
        bonusType:type,
        target:type === "big" ? "rainbow" : "bomb",
        symbols:null,
        pekaTiming:chance(.55) ? "lever" : "third"
      };
    }

    if(r < 0.320){
      return {
        role:"replay",
        target:"tako",
        symbols:["tako","tako","tako"],
        smoke:chance(.12),
        navi:"🐙を狙え！"
      };
    }

    if(r < 0.600){
      const k = pick(["fire","takoyaki","sauce","star"]);
      return {
        role:"koyaku",
        target:k,
        symbols:[k,k,k],
        smoke:chance(.12),
        navi:symbolById(k).emoji + "を狙え！"
      };
    }

    return {
      role:"miss",
      symbols:makeMissSymbols()
    };
  }

  function decideAtPrepareResult(){
    const r = Math.random();

    if(r < 0.55){
      const k = pick(["fire","takoyaki","sauce","star"]);
      return {
        role:"prepareKoyaku",
        target:k,
        symbols:[k,k,k],
        smoke:true,
        order:randomOrder(),
        navi:symbolById(k).emoji + " 押し順ナビ"
      };
    }

    if(r < 0.75){
      return {
        role:"atStart",
        symbols:makeMissSymbols()
      };
    }

    return {
      role:"miss",
      symbols:makeMissSymbols()
    };
  }

  function decideAtResult(){
    const r = Math.random();

    if(r < 0.62){
      const k = pick(["fire","takoyaki","sauce","star"]);
      return {
        role:"atKoyaku",
        target:k,
        symbols:[k,k,k],
        smoke:true,
        order:randomOrder(),
        navi:symbolById(k).emoji + " 押し順ナビ"
      };
    }

    if(r < 0.78){
      return {
        role:"replay",
        target:"tako",
        symbols:["tako","tako","tako"],
        smoke:true,
        order:randomOrder(),
        navi:"🐙 押し順ナビ"
      };
    }

    return {
      role:"miss",
      symbols:makeMissSymbols()
    };
  }

  function randomOrder(){
    const orders = [
      [0,1,2],
      [0,2,1],
      [1,0,2],
      [1,2,0],
      [2,0,1],
      [2,1,0]
    ];
    return pick(orders);
  }

  function orderText(order){
    const names = ["左","中","右"];
    return order.map((n,i) => (i+1) + "：" + names[n]).join(" → ");
  }

  function makeMissSymbols(){
    const ids = SYMBOLS.map(s => s.id);
    let arr;

    do{
      arr = [pick(ids),pick(ids),pick(ids)];
    }while(arr[0] === arr[1] && arr[1] === arr[2]);

    return arr;
  }

  function startSpin(){
    unlockAudio();

    if(isSpinning) return;
    if(state.medal < PAY.cost){
      playErrorSound();
      setMessage("メダルが足りないたこ。", "");
      return;
    }

    playLeverSound();

    state.medal -= PAY.cost;
    state.games += 1;

    if(state.mode === "at" && state.atGames > 0){
      state.atGames -= 1;
      if(state.atGames <= 0){
        state.mode = "normal";
        state.atGames = 0;
        state.atTotalAdded = 0;
        setMessage("AT終了。<br>またタコを集めるたこ。", "");
      }
    }

    result = decideResult();
    isSpinning = true;
    stopped = [false,false,false];
    stopOrder = [];

    hideNavi();

    if(result.role === "bonus" && result.pekaTiming === "lever"){
      setLamp(true);
      playPekaSound();
      state.bonusStock = result.bonusType;
      state.mode = "bonus";
      setMessage("レバーONでペカッ！<br>" + bonusLabel(result.bonusType) + "確定。絵柄を狙うたこ。", "hot");
    }else{
      if(!state.bonusStock) setLamp(false);
      setMessage("リール回転中……<br>好きな順番で止めるたこ。", "");
    }

    if(result.smoke){
      showNavi(result);
    }else if(result.role === "bonusStock"){
      showBonusAim();
    }

    startReelLoopSound();

    reels.forEach((reel, i) => {
      reel.classList.add("spinning");
      stopBtns[i].disabled = false;

      reelTimers[i] = setInterval(() => {
        fillRandomStrip(i);
      }, 105);
    });

    saveState();
    render();
  }

  function showNavi(res){
    reelSmoke.classList.add("show");
    naviTitle.textContent = res.navi || "チャンス";
    if(res.order){
      naviSub.textContent = orderText(res.order);
    }else{
      naviSub.textContent = "狙いは薄く、光る絵柄を目で追え！";
    }
  }

  function showBonusAim(){
    reelSmoke.classList.add("show");
    naviTitle.textContent = state.bonusStock === "big" ? "🌈を狙え！" : "💥を狙え！";
    naviSub.textContent = "目押し成功でボーナス入賞";
  }

  function hideNavi(){
    reelSmoke.classList.remove("show");
    naviTitle.textContent = "";
    naviSub.textContent = "";
  }

  function fillRandomStrip(reelIndex){
    const strip = strips[reelIndex];
    strip.innerHTML = "";

    for(let i=0; i<12; i++){
      const sym = randomSymbol();
      const div = document.createElement("div");
      div.className = "symbol";

      if(result && result.smoke && result.target && sym.id === result.target){
        div.classList.add("glow-target");
      }

      if(result && (result.role === "bonusStock" || result.role === "bonus") && result.target && sym.id === result.target){
        div.classList.add("glow-target");
      }

      div.textContent = sym.emoji;
      strip.appendChild(div);
    }
  }

  function stopReel(index){
    unlockAudio();

    if(!isSpinning || stopped[index]) return;

    playStopSound(index);

    stopped[index] = true;
    stopBtns[index].disabled = true;
    stopOrder.push(index);

    clearInterval(reelTimers[index]);
    reelTimers[index] = null;

    reels[index].classList.remove("spinning");

    const symbol = decideStoppedSymbol(index);
    const glow = result && result.target ? result.target : null;
    setCenterSymbol(index, symbol, glow);

    vibrate(35);

    if(stopped.every(Boolean)){
      stopReelLoopSound();
      finishSpin();
    }
  }

  function decideStoppedSymbol(index){
    if(result.role === "bonus" || result.role === "bonusStock"){
      const target = result.target;

      if(chance(.72)){
        return target;
      }

      return pick(SYMBOLS.map(s => s.id).filter(id => id !== target));
    }

    if(result.order){
      const correctSoFar = stopOrder.every((v,i) => v === result.order[i]);

      if(correctSoFar){
        return result.symbols[index];
      }

      return makeWrongSymbol(result.target);
    }

    if(result.symbols){
      if(result.smoke && chance(.075)){
        return makeWrongSymbol(result.target);
      }

      return result.symbols[index];
    }

    return randomSymbol().id;
  }

  function makeWrongSymbol(target){
    const ids = SYMBOLS.map(s => s.id).filter(id => id !== target);
    return pick(ids);
  }

  function finishSpin(){
    isSpinning = false;
    stopBtns.forEach(btn => btn.disabled = true);

    const line = [...visibleSymbols];
    const isTriple = line[0] === line[1] && line[1] === line[2];
    const tripleId = isTriple ? line[0] : null;

    if(result.role === "bonus" && result.pekaTiming === "third" && !state.bonusStock){
      setLamp(true);
      playPekaSound();
      state.bonusStock = result.bonusType;
      state.mode = "bonus";
      setMessage("第3停止でペカッ！<br>" + bonusLabel(result.bonusType) + "確定。次ゲームから絵柄を狙うたこ。", "hot");
      saveState();
      render();
      return;
    }

    if(result.role === "bonus" || result.role === "bonusStock"){
      handleBonusAim(line);
      return;
    }

    if(result.smoke && result.target){
      const targetHit = isTriple && tripleId === result.target;

      if(!targetHit && !result.order){
        forceBonusByNaviMiss();
        return;
      }

      if(!targetHit && result.order){
        setMessage("押し順ミス。<br>小役はこぼれたたこ。", "");
        saveState();
        render();
        return;
      }
    }

    if(result.role === "replay" && isTriple && tripleId === "tako"){
      handleTakoReplay();
    }else if(result.role === "koyaku" && isTriple){
      state.medal += PAY.koyaku;
      setMessage(symbolById(tripleId).emoji + symbolById(tripleId).emoji + symbolById(tripleId).emoji + "<br>小役成立！<br>" + PAY.koyaku + "メダル獲得。", "replay");
    }else if(result.role === "prepareKoyaku" && isTriple){
      state.medal += PAY.koyaku;
      const add = lotteryPrepareAdd();
      setMessage("AT準備中の小役成功！<br>" + PAY.koyaku + "メダル獲得。<br>" + addText(add), "at");
    }else if(result.role === "atKoyaku" && isTriple){
      state.medal += PAY.atKoyaku;
      const add = lotteryAtAdd();
      setMessage("AT中 小役成功！<br>" + PAY.atKoyaku + "メダル獲得。<br>" + addText(add), "at");
    }else if(result.role === "atStart"){
      startAt();
    }else{
      handleMiss();
    }

    if(state.mode === "at" && state.atGames <= 0){
      state.mode = "normal";
    }

    saveState();
    render();
  }

  function handleBonusAim(line){
    const target = state.bonusStock === "big" ? "rainbow" : "bomb";
    const isTriple = line[0] === target && line[1] === target && line[2] === target;

    if(isTriple){
      if(state.bonusStock === "big"){
        state.medal += PAY.big;
        state.big += 1;
        playBigSound();
        setMessage("🌈🌈🌈<br>神焼きBONUS入賞！<br>" + PAY.big + "メダル獲得！", "big");
      }else{
        state.medal += PAY.reg;
        state.reg += 1;
        playRegSound();
        setMessage("💥💥💥<br>半焼けBONUS入賞！<br>" + PAY.reg + "メダル獲得！", "reg");
      }

      state.bonusStock = null;
      state.mode = "normal";
      setLamp(false);
      state.takoMeter = 0;
    }else{
      setLamp(true);
      setMessage("ボーナス絵柄を狙え！<br>まだ確定中たこ。", "hot");
      state.mode = "bonus";
    }

    saveState();
    render();
  }

  function forceBonusByNaviMiss(){
    const type = chance(.70) ? "big" : "reg";
    state.bonusStock = type;
    state.mode = "bonus";
    setLamp(true);
    playPekaSound();
    setMessage("ナビ外れ発生……！<br>ボーナス確定たこ！<br>" + bonusLabel(type) + "を狙え。", "hot");
    saveState();
    render();
  }

  function handleTakoReplay(){
    state.medal += PAY.replay;
    state.takoMeter = Math.min(5, state.takoMeter + 1);

    let txt = "🐙🐙🐙<br>タコ揃い！<br>タコメーターが燃え上がる。";

    if(state.takoMeter >= 5){
      txt += "<br>5連続達成！AT確定たこ！";
      enterAtPrepare(true);
    }else if(state.takoMeter >= 3){
      const rates = {3:.45,4:.72};
      if(chance(rates[state.takoMeter] || .45)){
        txt += "<br>AT当選！準備中へ移行たこ。";
        enterAtPrepare(false);
      }else{
        txt += "<br>あと少しで鉄板が爆発しそうたこ。";
      }
    }else{
      txt += "<br>3個目から一気に熱くなるたこ。";
    }

    playReplaySound();
    setMessage(txt, "replay");
  }

  function enterAtPrepare(certain){
    state.mode = "atPrepare";
    const base = lotteryAtGames(certain);
    state.atGames = base;
    state.atTotalAdded = 0;
    state.takoMeter = 0;
    playPekaSound();
  }

  function startAt(){
    if(state.atGames <= 0){
      state.atGames = lotteryAtGames(false);
    }
    state.mode = "at";
    state.atCount += 1;
    playBigSound();
    setMessage("AT突入！<br>残り " + state.atGames + "G。<br>押し順ナビで小役を取るたこ！", "at");
  }

  function lotteryAtGames(certain){
    const r = Math.random();

    if(certain){
      if(r < .55) return 30;
      if(r < .82) return 50;
      if(r < .95) return 100;
      return 10;
    }

    if(r < .55) return 10;
    if(r < .82) return 30;
    if(r < .96) return 50;
    return 100;
  }

  function lotteryPrepareAdd(){
    const r = Math.random();
    let add = 0;

    if(r < .18) add = 5;
    else if(r < .26) add = 10;
    else if(r < .30) add = 30;

    if(add > 0){
      state.atGames += add;
      state.atTotalAdded += add;
      playPekaSound();
    }

    return add;
  }

  function lotteryAtAdd(){
    const r = Math.random();
    let add = 0;

    if(r < .15) add = 5;
    else if(r < .23) add = 10;
    else if(r < .27) add = 30;
    else if(r < .285) add = 50;

    if(add > 0){
      state.atGames += add;
      state.atTotalAdded += add;
      playPekaSound();
      vibrate([60,40,90]);
    }

    return add;
  }

  function addText(add){
    if(add > 0){
      return "上乗せ +" + add + "G！";
    }
    return "上乗せなし。まだ焼き足りないたこ。";
  }

  function handleMiss(){
    if(state.mode === "atPrepare"){
      setMessage("AT準備中。<br>小役を引けば上乗せチャンスたこ。", "");
      return;
    }

    if(state.mode === "at"){
      setMessage("AT中ハズレ。<br>残り " + state.atGames + "G。", "");
      return;
    }

    setLamp(false);
    playMissSound();
    setMessage("ハズレ。<br>まだ鉄板は温まっているたこ。", "");
  }

  function bonusLabel(type){
    return type === "big" ? "神焼きBONUS" : "半焼けBONUS";
  }

  function setLamp(on){
    lamp.classList.toggle("on", on);
  }

  function setMessage(text, type){
    message.className = "message";
    if(type) message.classList.add(type);
    message.innerHTML = text;
  }

  function vibrate(pattern){
    if(navigator.vibrate){
      navigator.vibrate(pattern);
    }
  }

  function unlockAudio(){
    if(!audioCtx){
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    if(audioCtx.state === "suspended"){
      audioCtx.resume();
    }
  }

  function tone(freq, duration, type = "square", volume = 0.08, delay = 0){
    if(!audioCtx) return;

    const now = audioCtx.currentTime + delay;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = type;
    osc.frequency.setValueAtTime(freq, now);

    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(volume, now + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start(now);
    osc.stop(now + duration + 0.03);
  }

  function noise(duration = 0.08, volume = 0.06, delay = 0){
    if(!audioCtx) return;

    const now = audioCtx.currentTime + delay;
    const bufferSize = audioCtx.sampleRate * duration;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);

    for(let i = 0; i < bufferSize; i++){
      data[i] = Math.random() * 2 - 1;
    }

    const src = audioCtx.createBufferSource();
    const gain = audioCtx.createGain();

    src.buffer = buffer;

    gain.gain.setValueAtTime(volume, now);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

    src.connect(gain);
    gain.connect(audioCtx.destination);

    src.start(now);
    src.stop(now + duration);
  }

  function playLeverSound(){
    tone(150, 0.05, "sawtooth", 0.08);
    tone(90, 0.08, "square", 0.06, 0.05);
  }

  function startReelLoopSound(){
    stopReelLoopSound();

    reelSoundTimer = setInterval(() => {
      if(!isSpinning) return;
      noise(0.025, 0.025);
      tone(95 + Math.random() * 25, 0.025, "square", 0.025);
    }, 95);
  }

  function stopReelLoopSound(){
    if(reelSoundTimer){
      clearInterval(reelSoundTimer);
      reelSoundTimer = null;
    }
  }

  function playStopSound(index){
    tone(220 + index * 55, 0.055, "square", 0.09);
    tone(120 + index * 30, 0.045, "triangle", 0.06, 0.04);
  }

  function playPekaSound(){
    tone(880, 0.08, "sine", 0.12);
    tone(1320, 0.10, "sine", 0.10, 0.08);
    tone(1760, 0.13, "sine", 0.08, 0.17);
  }

  function playBigSound(){
    tone(523.25, 0.10, "square", 0.10, 0.00);
    tone(659.25, 0.10, "square", 0.10, 0.12);
    tone(783.99, 0.10, "square", 0.10, 0.24);
    tone(1046.5, 0.22, "square", 0.11, 0.36);
    tone(1318.5, 0.24, "sine", 0.08, 0.58);
  }

  function playRegSound(){
    tone(392, 0.10, "square", 0.09, 0.00);
    tone(523.25, 0.10, "square", 0.09, 0.13);
    tone(659.25, 0.18, "square", 0.09, 0.26);
  }

  function playReplaySound(){
    tone(440, 0.08, "triangle", 0.07, 0.00);
    tone(660, 0.08, "triangle", 0.07, 0.10);
  }

  function playMissSound(){
    tone(180, 0.07, "sawtooth", 0.045, 0.00);
    tone(120, 0.10, "sawtooth", 0.035, 0.08);
  }

  function playErrorSound(){
    tone(100, 0.12, "sawtooth", 0.08);
    tone(80, 0.12, "sawtooth", 0.06, 0.11);
  }

  lever.addEventListener("click", startSpin);

  stopBtns.forEach((btn, index) => {
    btn.addEventListener("click", () => stopReel(index));
  });

  resetBtn.addEventListener("click", () => {
    unlockAudio();
    playStopSound(0);

    localStorage.removeItem(STORAGE_KEY);

    state = {
      medal:100,
      games:0,
      big:0,
      reg:0,
      atCount:0,
      mode:"normal",
      takoMeter:0,
      atGames:0,
      atTotalAdded:0,
      bonusStock:null
    };

    isSpinning = false;
    stopped = [true,true,true];
    stopOrder = [];
    result = null;

    reelTimers.forEach(t => {
      if(t) clearInterval(t);
    });
    reelTimers = [null,null,null];

    stopReelLoopSound();

    reels.forEach((reel, i) => {
      reel.classList.remove("spinning");
      setCenterSymbol(i, "tako");
    });

    stopBtns.forEach(btn => btn.disabled = true);

    hideNavi();
    setLamp(false);
    setMessage("リセット完了。<br>レバーONでスタートたこ。", "");

    saveState();
    render();
  });

})();
</script>

</body>
