<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>釣り神のタネ補填</title>

<style>
body{
margin:0;
background:#2b1550;
font-family:sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:#fff;
}

.box{
width:min(90vw,400px);
background:#3d216c;
padding:24px;
border-radius:18px;
text-align:center;
}

button{
margin-top:20px;
width:100%;
height:54px;
font-size:18px;
font-weight:bold;
border:none;
border-radius:14px;
background:#ffd65a;
cursor:pointer;
}

button:disabled{
opacity:.5;
cursor:not-allowed;
}

#msg{
margin-top:20px;
line-height:1.8;
}
</style>
</head>

<body>

<div class="box">

<h2>🎣釣り神のタネ補填</h2>

<p>
今回のみ補填ページです。<br>
受け取れるのは一度だけです。
</p>

<button id="btn">
受け取る
</button>

<div id="msg"></div>

</div>

<script>

const LS_INV="tf_v1_inv";
const CLAIM_KEY="fish_seed_fix_2026_07";

const btn=document.getElementById("btn");
const msg=document.getElementById("msg");

function load(key,def){
try{
return JSON.parse(localStorage.getItem(key)||JSON.stringify(def));
}catch(e){
return def;
}
}

function save(key,val){
localStorage.setItem(key,JSON.stringify(val));
}

if(localStorage.getItem(CLAIM_KEY)){
btn.disabled=true;
msg.innerHTML="✅この補填は受け取り済みです。";
}

btn.onclick=()=>{

if(localStorage.getItem(CLAIM_KEY)){
return;
}

const inv=load(LS_INV,{});

inv.seed_god_fish=Number(inv.seed_god_fish||0)+1;

save(LS_INV,inv);

localStorage.setItem(CLAIM_KEY,"1");

btn.disabled=true;

msg.innerHTML=
"🎉釣り神のタネを1個受け取りました！<br><br>称号ページへ戻って確認してください。";

};

</script>

</body>
</html>
