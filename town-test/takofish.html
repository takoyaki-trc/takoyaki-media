<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />

  <!-- Start KARTE Tag -->
  <script>!function(n){if(!window[n]){var o=window[n]=function(){var n=[].slice.call(arguments);return o.x?o.x.apply(0,n):o.q.push(n)};o.q=[],o.i=Date.now(),o.allow=function(){o.o="allow"},o.deny=function(){o.o="deny"}}}("krt")</script>
  <script async src="https://cdn-edge.karte.io/e881ae2322fe85206893871d5e65d626/edge.js"></script>

  <title>たこ焼き釣り｜焼かれた伝説</title>
  <meta name="description" content="たこ焼き釣りミニゲーム" />
  <style>
    :root{
      --bg0:#07060b;
      --bg1:#0c1025;
      --panel:rgba(255,255,255,.07);
      --line:rgba(255,255,255,.14);
      --text:#fff;
      --muted:rgba(255,255,255,.75);
      --btn:rgba(255,255,255,.10);
      --btn2:rgba(255,255,255,.16);
      --shadow:0 14px 40px rgba(0,0,0,.55);
      --cyan:#7fd0ff;
      --gold:#ffd979;
      --rare:#ffe8a0;
      --danger:#ff7d7d;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }

    body{
      margin:0;
      font-family:system-ui,-apple-system,"Noto Sans JP",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 50% 18%, #1a2040 0%, #070812 60%),
        linear-gradient(var(--bg0),var(--bg1));
      -webkit-tap-highlight-color:transparent;
      overscroll-behavior:none;
    }

    .app{
      min-height:100svh;
      display:flex;
      flex-direction:column;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:50;
      padding:10px 10px 8px;
      background:linear-gradient(180deg, rgba(0,0,0,.55), rgba(0,0,0,0));
      backdrop-filter:blur(8px);
    }

    .topbar-inner{
      max-width:920px;
      margin:0 auto;
      display:flex;
      align-items:center;
      gap:10px;
    }

    .backbtn{
      appearance:none;
      border:1px solid var(--line);
      background:rgba(255,255,255,.08);
      color:var(--text);
      border-radius:12px;
      padding:10px 12px;
      font-weight:900;
      cursor:pointer;
    }

    .titlebox{
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:0;
    }

    .title{
      font-weight:1000;
      letter-spacing:.02em;
      line-height:1.1;
      font-size:16px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .main{
      flex:1;
      display:flex;
      justify-content:center;
      padding:10px 10px calc(16px + env(safe-area-inset-bottom));
    }

    .card{
      width:min(560px, 100%);
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.14);
      border-radius:18px;
      box-shadow:var(--shadow);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      min-height:0;
    }

    .hud{
      padding:10px 12px;
      border-bottom:1px solid rgba(255,255,255,.12);
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      background:rgba(0,0,0,.12);
    }

    .hud-left{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }

    .btn{
      appearance:none;
      border:1px solid var(--line);
      background:var(--btn);
      color:var(--text);
      border-radius:14px;
      padding:10px 12px;
      font-weight:900;
      cursor:pointer;
    }

    .btn:hover{ background:var(--btn2); }
    .btn[disabled]{ opacity:.45; cursor:not-allowed; }

    .stats{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      font-size:12px;
      color:rgba(255,255,255,.9);
    }
    .stats b{ font-weight:1000; }

    .canvaswrap{
      position:relative;
      padding:10px;
      display:flex;
      flex-direction:column;
      gap:10px;
      min-height:0;
      flex:1;
    }

    .canvasbox{
      position:relative;
      width:100%;
      border-radius:16px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.14);
      background:#081425;
      flex:1;
      min-height:0;
      display:flex;
      align-items:center;
      justify-content:center;
      touch-action:none;
    }

    canvas{
      width:100%;
      height:auto;
      display:block;
      image-rendering:pixelated;
      touch-action:none;
    }

    .footnote{
      font-size:11px;
      color:rgba(255,255,255,.7);
      line-height:1.5;
    }

    .countOverlay{
      position:absolute;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      z-index:20;
      pointer-events:none;
      background:transparent;
    }
    .countOverlay.show{ display:flex; }

    .countInner{
      min-width:200px;
      text-align:center;
      padding:18px 22px;
      border-radius:20px;
      background:rgba(8,15,28,.28);
      border:1px solid rgba(255,255,255,.14);
      box-shadow:0 10px 34px rgba(0,0,0,.28);
      backdrop-filter:blur(3px);
    }

    .countLabel{
      font-size:12px;
      font-weight:1000;
      letter-spacing:.14em;
      color:rgba(255,255,255,.86);
      margin-bottom:8px;
    }

    .countNum{
      font-size:76px;
      line-height:1;
      font-weight:1000;
      text-shadow:
        0 0 10px rgba(127,208,255,.38),
        0 0 24px rgba(127,208,255,.18);
    }

    .countHelp{
      margin-top:8px;
      font-size:12px;
      font-weight:900;
      color:rgba(255,255,255,.82);
    }

    .dropSplash{
      position:absolute;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(circle at center, rgba(255,255,255,.12), rgba(0,0,0,.78) 65%);
      z-index:60;
      padding:20px;
    }
    .dropSplash.show{ display:flex; }

    .dropCard{
      width:min(420px, 100%);
      border-radius:24px;
      border:1px solid rgba(255,255,255,.22);
      background:
        radial-gradient(circle at top, rgba(255,255,255,.16), rgba(255,255,255,.05) 48%, rgba(0,0,0,.30) 100%);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.05) inset,
        0 20px 60px rgba(0,0,0,.55),
        0 0 35px rgba(127,208,255,.18);
      padding:20px 18px 18px;
      text-align:center;
      animation:dropPop .42s ease-out;
      position:relative;
      overflow:hidden;
    }

    .dropCard::before{
      content:"";
      position:absolute;
      inset:-40%;
      background:
        linear-gradient(120deg,
          transparent 0%,
          rgba(255,255,255,.08) 35%,
          transparent 55%);
      transform:rotate(12deg);
      pointer-events:none;
    }

    @keyframes dropPop{
      0%{ transform:scale(.72); opacity:0; }
      70%{ transform:scale(1.04); opacity:1; }
      100%{ transform:scale(1); opacity:1; }
    }

    .dropBadge{
      display:inline-block;
      padding:6px 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:1000;
      letter-spacing:.08em;
      border:1px solid rgba(255,255,255,.22);
      background:rgba(255,255,255,.08);
      margin-bottom:10px;
    }

    .dropHero{
      width:120px;
      height:120px;
      margin:0 auto 10px;
      border-radius:22px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(255,255,255,.06);
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 10px 28px rgba(0,0,0,.35);
    }

    .dropHero img{
      width:92px;
      height:92px;
      object-fit:contain;
      image-rendering:pixelated;
      display:block;
    }

    .dropTitle{
      font-size:30px;
      font-weight:1000;
      line-height:1.1;
      margin-bottom:6px;
      text-shadow:
        0 0 10px rgba(255,255,255,.10),
        0 0 22px rgba(127,208,255,.14);
    }

    .dropSub{
      font-size:14px;
      color:rgba(255,255,255,.86);
      margin-bottom:12px;
    }

    .dropQty{
      font-size:16px;
      font-weight:1000;
      margin-bottom:8px;
    }

    .dropTotal{
      font-size:13px;
      color:rgba(255,255,255,.78);
      margin-bottom:14px;
    }

    .dropAction{
      display:flex;
      gap:10px;
    }

    .dropAction .btn{
      flex:1;
      padding:12px 12px;
    }

    .dropRare{
      box-shadow:
        0 20px 60px rgba(0,0,0,.55),
        0 0 42px rgba(255,217,121,.28);
    }

    /* ===== 新しい結果モーダル ===== */
    #resultOverlay{
      position:absolute;
      inset:0;
      display:none;
      align-items:center !important;
      justify-content:center !important;
      padding:
        max(10px, env(safe-area-inset-top))
        10px
        max(10px, env(safe-area-inset-bottom))
        10px;
      box-sizing:border-box;
      z-index:80;
    }

    #resultOverlay.show{ display:flex; }

    #resultOverlay .result-bg{
      position:absolute;
      inset:0;
      background:rgba(0,0,0,.72);
      backdrop-filter:blur(2px);
      -webkit-backdrop-filter:blur(2px);
    }

    #resultOverlay .result-card{
      position:relative;
      width:min(92%, 440px);
      max-height:calc(100% - 8px);
      border-radius:18px;
      border:1px solid rgba(255,255,255,.16);
      background:
        radial-gradient(120% 80% at 50% 0%, rgba(255,214,120,.12), rgba(255,214,120,0) 36%),
        radial-gradient(100% 80% at 50% 100%, rgba(84,118,255,.09), rgba(84,118,255,0) 40%),
        linear-gradient(180deg, rgba(24,30,52,.97), rgba(10,14,26,.98));
      box-shadow:
        0 20px 60px rgba(0,0,0,.55),
        0 0 30px rgba(255,196,90,.08) inset;
      display:flex;
      flex-direction:column;
      overflow:hidden;
      box-sizing:border-box;
      transform:translateY(12px) scale(.95);
      opacity:0;
    }

    #resultOverlay.show .result-card{
      animation:resultPop .25s ease forwards;
    }

    @keyframes resultPop{
      0%{
        transform:translateY(14px) scale(.95);
        opacity:0;
      }
      65%{
        transform:translateY(-4px) scale(1.02);
        opacity:1;
      }
      100%{
        transform:translateY(0) scale(1);
        opacity:1;
      }
    }

    .result-scroll{
      flex:1 1 auto;
      min-height:0;
      overflow:auto;
      -webkit-overflow-scrolling:touch;
      padding:12px 12px 8px;
      scrollbar-width:none;
    }
    .result-scroll::-webkit-scrollbar{ display:none; }

    .result-actions{
      flex:0 0 auto;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      padding:10px 12px calc(10px + env(safe-area-inset-bottom));
      border-top:1px solid rgba(255,255,255,.08);
      background:linear-gradient(180deg, rgba(18,22,32,.96), rgba(12,15,22,.98));
    }

    .result-actions button{
      width:100%;
      min-width:0;
      padding:13px 12px;
      border-radius:12px;
      font-size:16px;
      font-weight:800;
    }

    .result-actions .quit-btn{
      background:#2a3147;
      color:#fff;
      font-weight:700;
    }

    .result-score-hero{
      margin:0 0 10px;
      padding:12px 10px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.12);
      background:
        radial-gradient(circle at 50% 0%, rgba(255,210,90,.18), rgba(255,210,90,0) 55%),
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      text-align:center;
      position:relative;
      overflow:hidden;
    }

    .result-score-hero::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:linear-gradient(120deg, rgba(255,255,255,0) 0%, rgba(255,255,255,.08) 40%, rgba(255,255,255,0) 70%);
      transform:translateX(-100%);
      animation:scoreShine 2.4s linear infinite;
    }

    @keyframes scoreShine{
      100%{ transform:translateX(100%); }
    }

    .result-score-label{
      font-size:12px;
      font-weight:900;
      letter-spacing:.12em;
      opacity:.78;
      margin-bottom:6px;
    }

    .result-score-value{
      font-size:38px;
      line-height:1;
      font-weight:1000;
      color:#fff8ea;
      text-shadow:
        0 0 12px rgba(255,214,110,.25),
        0 0 28px rgba(255,179,60,.16);
      display:inline-block;
      transform-origin:center center;
    }

    .result-score-value.bump{
      animation:scoreBump .22s ease;
    }

    @keyframes scoreBump{
      0%{ transform:scale(1); }
      40%{ transform:scale(1.12); }
      100%{ transform:scale(1); }
    }

    .result-rank-wrap{
      margin:0 0 10px;
      padding:12px 12px 11px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.12);
      background:
        radial-gradient(circle at 50% 0%, rgba(255,215,120,.14), rgba(255,215,120,0) 52%),
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025)),
        rgba(255,255,255,.03);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.06),
        0 0 18px rgba(255,190,80,.08);
    }

    .result-rank-label{
      font-size:11px;
      opacity:.72;
      font-weight:900;
      letter-spacing:.1em;
      margin-bottom:4px;
    }

    .result-rank-value{
      font-size:24px;
      font-weight:1000;
      line-height:1.35;
      color:#fff4d8;
      text-shadow:0 0 14px rgba(255,208,100,.18);
    }

    .result-rank-value.rank-high{
      color:#ffe7a0;
      text-shadow:
        0 0 12px rgba(255,217,121,.20),
        0 0 26px rgba(255,217,121,.18);
    }

    .result-rank-value.rank-god{
      color:#fff0bf;
      text-shadow:
        0 0 16px rgba(255,230,160,.28),
        0 0 36px rgba(255,206,80,.24);
    }

    .result-subline{
      margin-top:6px;
      font-size:13px;
      opacity:.88;
      line-height:1.55;
    }

    .result-date-line{
      margin-top:6px;
      font-size:12px;
      opacity:.72;
    }

    .result-stats{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin-bottom:10px;
    }

    .result-stat{
      padding:10px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.06);
    }

    .result-stat .k{
      opacity:.75;
      font-size:12px;
    }

    .result-stat .v{
      font-weight:900;
      font-size:18px;
      margin-top:2px;
    }

    .result-stat .sub{
      opacity:.85;
      font-size:12px;
      margin-top:4px;
    }

    .drop-section{
      margin:8px 0 10px;
    }

    .drop-section-title{
      font-size:12px;
      font-weight:900;
      letter-spacing:.05em;
      opacity:.82;
      margin-bottom:6px;
    }

    .result-drop-card{
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.06);
      margin:8px 0 8px;
    }

    .result-drop-card img{
      width:64px;
      height:64px;
      object-fit:cover;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(0,0,0,.18);
      flex:0 0 auto;
      image-rendering:pixelated;
    }

    .result-drop-kicker{
      display:inline-block;
      padding:4px 8px;
      border-radius:999px;
      background:rgba(255,196,70,.95);
      color:#2a1600;
      font-size:10px;
      font-weight:1000;
      margin-bottom:5px;
    }

    .result-drop-name{
      font-size:15px;
      font-weight:900;
      line-height:1.2;
    }

    .result-drop-count{
      font-size:12px;
      opacity:.84;
      margin-top:4px;
      line-height:1.4;
    }

    .drop-none{
      padding:10px 12px;
      border-radius:14px;
      border:1px dashed rgba(255,255,255,.18);
      background:rgba(255,255,255,.04);
      margin:8px 0 8px;
      font-size:13px;
      line-height:1.55;
      opacity:.92;
    }

    .rare-card{
      box-shadow:0 0 24px rgba(255,217,121,.18);
    }

    .secret-card{
      box-shadow:0 0 28px rgba(175,220,255,.22);
      background:
        radial-gradient(circle at top, rgba(145,220,255,.10), rgba(255,255,255,.04) 48%, rgba(0,0,0,.18) 100%);
    }

    .water-rare{
      box-shadow:0 0 22px rgba(255,217,121,.18);
    }

    @media (max-width:560px){
      .countNum{ font-size:60px; }
      .dropTitle{ font-size:24px; }
      .dropHero{
        width:100px;
        height:100px;
      }
      .dropHero img{
        width:78px;
        height:78px;
      }
      .result-score-value{ font-size:32px; }
      .result-rank-value{ font-size:20px; }
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-inner">
        <button id="backBtn" class="backbtn" type="button" aria-label="戻る">← 戻る</button>
        <div class="titlebox">
          <div class="title">たこ焼き釣り</div>
        </div>
      </div>
    </header>

    <main class="main">
      <section class="card" aria-label="たこ焼き釣り">
        <div class="hud">
          <div class="hud-left">
            <button id="retryBtn" class="btn" type="button">もう一回</button>
          </div>
          <div class="stats" aria-label="ステータス">
            <span>スコア：<b id="tfScore">0</b></span>
            <span>残り：<b id="tfTime">--</b>s</span>
            <span>連続：<b id="tfCombo">0</b></span>
            <span>失敗：<b id="tfMiss">0</b></span>
            <span>最高：<b id="tfBest">0</b></span>
          </div>
        </div>

        <div class="canvaswrap">
          <div class="canvasbox">
            <canvas id="tfCanvas" width="360" height="520"></canvas>

            <div id="countOverlay" class="countOverlay" aria-hidden="true">
              <div class="countInner">
                <div class="countLabel">START IN</div>
                <div id="countNum" class="countNum">3</div>
                <div class="countHelp">落とす位置を考えてね</div>
              </div>
            </div>

            <!-- 結果モーダル -->
            <div id="resultOverlay" role="dialog" aria-modal="true" aria-label="結果">
              <div class="result-bg"></div>
              <div class="result-card">
                <div class="result-scroll">
                  <div class="result-score-hero">
                    <div class="result-score-label">TOTAL CATCH</div>
                    <div id="resScoreAnimated" class="result-score-value">0</div>
                  </div>

                  <div class="result-rank-wrap">
                    <div class="result-rank-label">RANK</div>
                    <div id="resRankValue" class="result-rank-value">焼き結果</div>
                    <div id="resRankSub" class="result-subline">----</div>
                    <div id="resRankDate" class="result-date-line">記録：----</div>
                  </div>

                  <div class="result-stats">
                    <div class="result-stat">
                      <div class="k">今回</div>
                      <div id="resCurrentScore" class="v">0</div>
                      <div id="resCurrentMeta" class="sub">延長：なし</div>
                    </div>
                    <div class="result-stat">
                      <div class="k">BEST</div>
                      <div id="resBestScore" class="v">0</div>
                      <div id="resBestMeta" class="sub">最高記録</div>
                    </div>
                  </div>

                  <div id="resRewardsWrap"></div>
                </div>

                <div class="result-actions">
                  <button id="resultRetryBtn" type="button">もう一回釣る</button>
                  <button id="resultCloseBtn" class="quit-btn" type="button">閉じる</button>
                </div>
              </div>
            </div>

            <!-- ドロップ演出 -->
            <div id="dropSplash" class="dropSplash" aria-hidden="true">
              <div id="dropCard" class="dropCard">
                <div id="dropBadge" class="dropBadge">DROP</div>
                <div class="dropHero">
                  <img id="dropImg" alt="ドロップ報酬">
                </div>
                <div id="dropTitle" class="dropTitle">海水</div>
                <div id="dropSub" class="dropSub">ファームに報酬が追加された！</div>
                <div id="dropQty" class="dropQty">×1 GET!</div>
                <div id="dropTotal" class="dropTotal">所持数：0</div>
                <div class="dropAction">
                  <button id="dropOkBtn" class="btn" type="button">OK</button>
                </div>
              </div>
            </div>
          </div>

          <div class="footnote">
            タップで糸を落下 → 当てる → 巻き上げ。
          </div>
        </div>
      </section>
    </main>
  </div>

<script>
(() => {
  "use strict";

  const FISH_LS = {
    best: "takoyakiFishing_best_points",
    last: "takoyakiFishing_last_points",
    playedAt: "takoyakiFishing_last_played",
    compat: "fish_v1_state",
    zukan: "tf_v1_book",
    monthlyStats: "ttc_monthly_stats_v1",
    inv: "tf_v1_inv",
  };

  const V = "3";

  const DROP_WATERS = {
    rotten: {

  function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }

  function readIntLS(key, def=0){

  function formatLocal(dt){
    const y = dt.getFullYear();
    const m = String(dt.getMonth() + 1).padStart(2, "0");
    const d = String(dt.getDate()).padStart(2, "0");
    const hh = String(dt.getHours()).padStart(2, "0");
    const mm = String(dt.getMinutes()).padStart(2, "0");
    return `${y}/${m}/${d} ${hh}:${mm}`;
  }

  function getMonthKey(date = new Date()){
    return date.getFullYear() + "-" + String(date.getMonth() + 1).padStart(2, "0");
  }

  function defaultMonthlyStats(){
    return { monthKey: getMonthKey(), harvest: 0, sales: 0, fishing: 0, tower: 0 };
  }

  function normalizeMonthlyStats(raw){
    const curMonth = getMonthKey();
    if (!raw || typeof raw !== "object") return defaultMonthlyStats();
    const monthKey = String(raw.monthKey || "");
    if (monthKey !== curMonth) return defaultMonthlyStats();
    return {
      monthKey: curMonth,
      harvest: Number(raw.harvest || 0),
      sales: Number(raw.sales || 0),
      fishing: Number(raw.fishing || 0),
      tower: Number(raw.tower || 0),
    };
  }

  function loadMonthlyStats(){
    try{
      const raw = localStorage.getItem(FISH_LS.monthlyStats);
      if (!raw){
        const def = defaultMonthlyStats();
        localStorage.setItem(FISH_LS.monthlyStats, JSON.stringify(def));
        return def;
      }
      const parsed = JSON.parse(raw);
      const norm = normalizeMonthlyStats(parsed);
      localStorage.setItem(FISH_LS.monthlyStats, JSON.stringify(norm));
      return norm;
    }catch(_){
      const def = defaultMonthlyStats();
      localStorage.setItem(FISH_LS.monthlyStats, JSON.stringify(def));
      return def;
    }
  }

  function saveMonthlyStats(stats){
    const norm = normalizeMonthlyStats(stats);
    localStorage.setItem(FISH_LS.monthlyStats, JSON.stringify(norm));
  }

  function updateMonthlyFishingHigh(score = 0){
    const s = loadMonthlyStats();
    s.monthKey = getMonthKey();
    s.fishing = Math.max(Number(s.fishing || 0), Math.floor(Number(score || 0)));
    saveMonthlyStats(s);
  }

  function saveFishingRecord(score){
    score = Math.floor(Number(score) || 0);
    localStorage.setItem(FISH_LS.last, String(score));
    localStorage.setItem(FISH_LS.playedAt, new Date().toISOString());

    const best = readIntLS(FISH_LS.best, 0);
    const isNew = score > best;
    const newBest = isNew ? score : best;
    if (isNew) localStorage.setItem(FISH_LS.best, String(score));

    try{
      let st = {};
      try{ st = JSON.parse(localStorage.getItem(FISH_LS.compat) || "{}"); }catch(_){}
      st.best = Math.max(Math.floor(Number(st.best) || 0), newBest);
      st.last = score;
      st.updatedAt = Date.now();
      localStorage.setItem(FISH_LS.compat, JSON.stringify(st));
    }catch(_){}

    updateMonthlyFishingHigh(score);
    return { best: newBest, isNew };
  }

  function normalizeScore(score, min, max){
    if (max <= min) return 0;
    const s = clamp(Number(score) || 0, min, max);
    return (s - min) / (max - min);
  }

  function normalizeNegativeMagnitude(score, near = -151, deep = -1000){
    const s = Number(score) || 0;
    if (s > near) return 0;
    const mag = Math.abs(s);
    const minMag = Math.abs(near);
    const maxMag = Math.abs(deep);
    return clamp((mag - minMag) / (maxMag - minMag), 0, 1);
  }

      if (!inv.seed || typeof inv.seed !== "object") inv.seed = {};

      return inv;

  function addWaterToFarm(drop){
    if (!drop || !drop.id) return null;

    const inv = loadFarmInv();
    const cur = Math.max(0, Math.floor(Number(inv.water[drop.id] || 0)));
    const qty = Math.max(1, Math.floor(Number(drop.qty || 1)));
    inv.water[drop.id] = cur + qty;
    saveFarmInv(inv);

    return {
      id: drop.id,
      label: drop.label,
      img: drop.img || "",
      qty,
      total: inv.water[drop.id]
    };
  }

  function rollRateTable(table){
    const total = table.reduce((s, v) => s + Number(v.rate || 0), 0);
    const r = Math.random() * total;
    let acc = 0;
    for (const row of table){
      acc += Number(row.rate || 0);
      if (r < acc){
        if (!row.drop) return null;
        return { ...row.drop, qty: 1 };
      }
    }
    return null;
  }

  function rollWaterDrop(score){
    score = Math.floor(Number(score) || 0);

    if (score >= -150 && score <= 500){
      return null;
    }

    if (score <= -1001){
      return { ...DROP_WATERS.rotten, qty: 1 };
    }

    if (score >= -1000 && score <= -151){
      const t = normalizeNegativeMagnitude(score, -151, -1000);
      const chance = 30 + 20 * t;
      if (Math.random() * 100 < chance){
        return { ...DROP_WATERS.rotten, qty: 1 };
      }
      return null;
    }

    if (score >= 501 && score <= 1499){
      const t = normalizeScore(score, 501, 1499);
      const chance = 30 + 25 * t;
      if (Math.random() * 100 < chance){
        return { ...DROP_WATERS.sea, qty: 1 };
      }
      return null;
    }

    if (score >= 1500 && score <= 2499){
      const t = normalizeScore(score, 1500, 2499);
      const chance = 45 + 25 * t;
      if (Math.random() * 100 < chance){
        return { ...DROP_WATERS.yunokawa, qty: 1 };
      }
      return null;
    }

    if (score >= 2500 && score <= 3999){
      return rollRateTable([
        { rate: 20, drop: null },
        { rate: 20, drop: DROP_WATERS.supergod },
        { rate: 40, drop: DROP_WATERS.yunokawa },
        { rate: 20, drop: DROP_WATERS.sea },
      ]);
    }

    if (score >= 4000 && score <= 4999){
      return rollRateTable([
        { rate: 15, drop: null },
        { rate: 35, drop: DROP_WATERS.supergod },
        { rate: 35, drop: DROP_WATERS.yunokawa },
        { rate: 15, drop: DROP_WATERS.sea },
      ]);
    }

    if (score >= 5000){
      return rollRateTable([
        { rate: 55, drop: DROP_WATERS.supergod },
        { rate: 30, drop: DROP_WATERS.yunokawa },
        { rate: 15, drop: DROP_WATERS.sea },
      ]);
    }

    return null;
  }

  function rollCardDrop(score){
    let chance = 0;

    if (score >= 1000 && score <= 1999) chance = 5;
    else if (score >= 2000 && score <= 2999) chance = 10;
    else if (score >= 3000 && score <= 3999) chance = 15;
    else if (score >= 4000 && score <= 4999) chance = 20;
    else if (score >= 5000) chance = 25;

    if (chance <= 0) return null;
    if (Math.random() * 100 >= chance) return null;

    const total = FISH_CARDS.reduce((s, c) => s + c.weight, 0);
    let r = Math.random() * total;

    for (const c of FISH_CARDS){
      r -= c.weight;
      if (r <= 0) return { ...c };
    }
    return { ...FISH_CARDS[0] };
  }

  function saveCardToZukan(card){
    if (!card || !card.id) return { ok:false, count:0, isNew:false };

    const now = Date.now();

    try{
      let book = {};
      try{ book = JSON.parse(localStorage.getItem(FISH_LS.zukan) || "{}"); }catch(_){ book = {}; }

      if (!book || typeof book !== "object") book = {};
      if (!book.got || typeof book.got !== "object") book.got = {};

      const prev = book.got[card.id];
      let count = 1;
      let isNew = true;

      if (prev && typeof prev === "object"){
        const curCount = Number.isFinite(prev.count) ? prev.count : 1;
        count = curCount + 1;
        isNew = false;
        prev.count = count;
        prev.name = card.name || prev.name || "";
        prev.img = card.img || prev.img || "";
        prev.rarity = card.rarity || prev.rarity || "";
        prev.lastAt = now;
        book.got[card.id] = prev;
      } else {
        book.got[card.id] = {
          id: card.id,
          name: card.name || "",
          img: card.img || "",
          rarity: card.rarity || "",
          tier: "",
          count: 1,
          at: now,
          lastAt: now,
        };
      }

      localStorage.setItem(FISH_LS.zukan, JSON.stringify(book));
      return { ok:true, count, isNew };
    }catch(_){
      return { ok:false, count:0, isNew:false };
    }
  }

  function pickByWeight(list){
    let sum = 0;
    for (const it of list) sum += it.w;
    let r = Math.random() * sum;
    for (const it of list){
      r -= it.w;
      if (r <= 0) return it.key;
    }
    return list[list.length - 1].key;
  }

  function circleHit(ax, ay, ar, bx, by, br){
    const dx = ax - bx;
    const dy = ay - by;
    return (dx * dx + dy * dy) <= (ar + br) * (ar + br);
  }

  function circleRectHit(cx, cy, cr, rx, ry, rw, rh){
    const nx = clamp(cx, rx, rx + rw);
    const ny = clamp(cy, ry, ry + rh);
    const dx = cx - nx;
    const dy = cy - ny;
    return (dx * dx + dy * dy) <= cr * cr;
  }

  function nowMs(){ return performance.now(); }

  function getComboMultiplier(comboCount){
    if (comboCount >= 5) return 2.0;
    if (comboCount === 4) return 1.6;
    if (comboCount === 3) return 1.4;
    if (comboCount === 2) return 1.2;
    return 1.0;
  }

  function calcCatchScore(spec, comboAfterCatch){
    return Math.round(spec.size.base * spec.type.mult * getComboMultiplier(comboAfterCatch));
  }

  function buildTakoyakiSpec(){
    const sizeKey = pickByWeight(CFG.SIZE_WEIGHTS);
    const typeKey = pickByWeight(CFG.TYPE_WEIGHTS);
    const size = CFG.SIZE[sizeKey];
    const type = CFG.TYPE[typeKey];
    const previewPoints = Math.round(size.base * type.mult);
    return { sizeKey, size, type, points: previewPoints };
  }

  function pointerToCanvasX(e, cvs){
    const rect = cvs.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (CFG.W / rect.width);
    return clamp(x, CFG.MARGIN_X, CFG.W - CFG.MARGIN_X);
  }

  function hookDropSpeed(hy, floorY){
    const t = clamp((hy - CFG.TOP_Y) / Math.max(1, (floorY - CFG.TOP_Y)), 0, 1);
    return CFG.HOOK_DROP_BASE * (1.02 + 0.62 * t);
  }

  function hookReelSpeed(hy, floorY, hasCatch){
    const t = clamp((hy - CFG.TOP_Y) / Math.max(1, (floorY - CFG.TOP_Y)), 0, 1);
    return CFG.HOOK_REEL_BASE * (1.24 + 0.74 * (1 - t)) * (hasCatch ? 1.16 : 1.03);
  }

  function getRank(score){
    if (score === 3000) return null;
    const list = (score < 0) ? RANKS_MINUS : RANKS_PLUS;
    if (score < list[0].min) return list[0];
    if (score > list[list.length - 1].max) return list[list.length - 1];
    for (const r of list){
      if (score >= r.min && score <= r.max) return r;
    }
    return list[list.length - 1];
  }

  function refreshBestUI(){
    setText("tfBest", readIntLS(FISH_LS.best, 0));

  function loadImage(src){
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = () => reject(new Error(src));
      img.src = src;
    });
  }

  async function loadAllImages(){
    const keys = Object.keys(IMG_URLS);
    const images = {};
    const failed = [];
    for (const k of keys){
      try{ images[k] = await loadImage(IMG_URLS[k]); }
      catch(e){ failed.push({ key:k, url:String(e.message || e) }); }
    }
    return { images, failed };
  }

  function animateResultScore(target){
    if (scoreCountTimer) cancelAnimationFrame(scoreCountTimer);

    const end = Math.max(0, Math.floor(Number(target || 0)));
    if (end <= 0){
      els.resScoreAnimated.textContent = "0";
      els.resScoreAnimated.classList.remove("bump");
      void els.resScoreAnimated.offsetWidth;
      els.resScoreAnimated.classList.add("bump");
      return;
    }

    const duration = 820;
    const start = performance.now();

    const tick = () => {
      const now = performance.now();
      const t = Math.min(1, (now - start) / duration);
      const eased = 1 - Math.pow(1 - t, 3);
      const value = Math.floor(end * eased);
      els.resScoreAnimated.textContent = String(value);

      if (t >= 1){
        els.resScoreAnimated.textContent = String(end);
        els.resScoreAnimated.classList.remove("bump");
        void els.resScoreAnimated.offsetWidth;
        els.resScoreAnimated.classList.add("bump");
        return;
      }
      scoreCountTimer = requestAnimationFrame(tick);
    };

    scoreCountTimer = requestAnimationFrame(tick);
  }

  function applyRankTone(score){
    els.resRankValue.classList.remove("rank-high", "rank-god");
    if (score >= 7000){
      els.resRankValue.classList.add("rank-god");
    } else if (score >= 4000){
      els.resRankValue.classList.add("rank-high");
    }
  }

  async function showResultScreen(score, extended, oniReached){
    const rec = saveFishingRecord(score);
    refreshBestUI();

    const iso = localStorage.getItem(FISH_LS.playedAt);
    const dt = iso ? new Date(iso) : new Date();
    const dateText = formatLocal(dt);

    const waterDrop = rollWaterDrop(score);
    const dropInfo = addWaterToFarm(waterDrop);

    const cardDrop = rollCardDrop(score);
    let cardResult = { ok:false, count:0, isNew:false };
    if (cardDrop){
      cardResult = saveCardToZukan(cardDrop);
    }

    if (dropInfo){
      await showDropSplash({
        badge: "WATER DROP",
        title: dropInfo.label,
        sub: "ファームにミズが追加された！",
        qtyText: `×${dropInfo.qty} GET!`,
        totalText: `所持数：<b>${dropInfo.total}</b>`,
        img: dropInfo.img,
        rare: dropInfo.id === "water_supergod" || dropInfo.id === "water_yunokawa"
      });
    }

    if (cardDrop){
      await showDropSplash({
        badge: "CARD DROP",
        title: cardDrop.name,
        sub: cardResult.ok
          ? (cardResult.isNew ? "新しいカードを獲得！" : "同じカードを獲得！")
          : "保存に失敗しました。",
        qtyText: cardResult.ok
          ? getCardBadgeText(cardResult)
          : "SAVE ERROR",
        totalText: cardResult.ok
          ? `${cardDrop.rarity} / 図鑑所持数：<b>${cardResult.count}</b>`
          : "localStorageを確認",
        img: cardDrop.img,
        rare: cardDrop.rarity === "SR" || cardDrop.rarity === "SECRET"
      });
    }

    let rankName = "";
    let rankLine = "";

    if (score === 3000){
      rankName = SCORE_3000_LINE;
      rankLine = "――残ったのは、あなたの手だけだった。";
    } else {
      const r = getRank(score);
      rankName = r.name;
      rankLine = r.line;
    }

    els.resRankValue.textContent = String(rankName).replace(/[〘〙]/g, "");
    els.resRankSub.textContent = rankLine;
    els.resRankDate.textContent = `記録：${dateText}`;

    els.resCurrentScore.textContent = String(score);
    els.resCurrentMeta.textContent = extended
      ? `延長：あり / ${oniReached ? "鬼モード到達" : "鬼モード未到達"}`
      : "延長：なし";

    els.resBestScore.textContent = String(rec.best);
    els.resBestMeta.textContent = rec.isNew ? "最高記録を更新！" : "最高記録";

    applyRankTone(score);
    renderResultRewards(dropInfo, cardDrop, cardResult);
    showResult();
    animateResultScore(score);
  }

  function getRemainingTime(){
    if (!STATE) return 0;
    return Math.max(0, STATE.limit - STATE.elapsed);
  }

  function stopCountdown(){
    countdownRunning = false;
    if (countdownTimer){
      clearTimeout(countdownTimer);
      countdownTimer = null;
    }
    hideCountdown();
  }

  function detachPointer(){
    const cvs = els.canvas;
    if (cvs && onPointer){
      cvs.removeEventListener("pointerdown", onPointer);
      onPointer = null;
    }
  }

  function stopGame(){
    stopCountdown();
    if (timerId) clearInterval(timerId);
    timerId = null;
    if (rafId) cancelAnimationFrame(rafId);
    rafId = null;
    detachPointer();
    STATE = null;
  }

  function flashText(msg, ms){
    if (!STATE) return;
    STATE.flashMsg = msg;
    STATE.flashUntil = nowMs() + ms;
  }

  function drawImageCentered(ctx, img, x, y, size){
    ctx.drawImage(img, Math.round(x - size / 2), Math.round(y - size / 2), size, size);
  }

  function startTimerLoop(){
    if (timerId) clearInterval(timerId);

    timerId = setInterval(() => {
      if (!STATE || !STATE.timerStarted) return;
      if (getRemainingTime() <= 0) return;

      STATE.elapsed++;

      if (STATE.elapsed === 30){
        if (STATE.score >= CFG.EXT_SCORE){
          STATE.extended = true;
          STATE.limit = CFG.EXT_LIMIT;
          flashText(`延長解放！${CFG.EXT_LIMIT}秒へ`, 1100);
        } else {
          STATE.limit = CFG.BASE_LIMIT;
          flashText("終了！", 900);
        }
      }

      if (STATE.extended && STATE.elapsed === CFG.ONI_AT){
        STATE.oni = true;
        STATE.oniReached = true;
        STATE.freezeUntil = nowMs() + CFG.ONI_FREEZE_MS;
        flashText("鬼モード突入！！", 1000);
      }

      setText("tfTime", Math.max(0, STATE.limit - STATE.elapsed));
      setText("tfScore", STATE.score);
      setText("tfCombo", STATE.combo);
      setText("tfMiss", STATE.miss);

      if (getRemainingTime() <= 0 && !STATE.ended){
        STATE.ended = true;
        setTimeout(() => { showResultScreen(STATE.score, STATE.extended, STATE.oniReached); }, 120);
      }
    }, 1000);
  }

  function startGameWithCountdown(){
    if (countdownRunning) return;
    startGame({ withCountdown: true });
  }

  function startCountdownPhase(){
    if (!STATE) return;
    countdownRunning = true;
    STATE.phase = "countdown";
    STATE.inputEnabled = false;
    STATE.timerStarted = false;

    let n = CFG.COUNTDOWN_SEC;
    showCountdownNum(n);

    function tick(){
      if (!STATE || !countdownRunning) return;

      if (n > 1){
        n--;
        showCountdownNum(n);
        countdownTimer = setTimeout(tick, 1000);
        return;
      }

      els.countNum.textContent = "GO!";
      countdownTimer = setTimeout(() => {
        if (!STATE) return;
        stopCountdown();
        STATE.phase = "play";
        STATE.inputEnabled = true;
        STATE.timerStarted = true;
        startTimerLoop();
        flashText("START!", 650);
      }, 420);
    }

    countdownTimer = setTimeout(tick, 1000);
  }

  function startGame(opts = {}){
    const withCountdown = !!opts.withCountdown;

    stopGame();
    hideResult();

    const cvs = els.canvas;
    const ctx = cvs.getContext("2d");
    ctx.imageSmoothingEnabled = false;

    const W = CFG.W, H = CFG.H;
    const FLOOR_Y = Math.floor(H * CFG.FLOOR_Y_RATIO);
    const GIANT_DROP_START_Y = Math.floor(H * CFG.GIANT_DROP_START_Y_RATIO);
    const ENEMY_CENTER_Y = Math.floor(H * CFG.ENEMY_CENTER_Y_RATIO);
    const TOURIST_Y = ENEMY_CENTER_Y - Math.floor(CFG.ENEMY_GAP * 0.55);
    const SQUID_Y   = ENEMY_CENTER_Y + Math.floor(CFG.ENEMY_GAP * 0.55);

    STATE = {
      elapsed: 0,
      limit: CFG.BASE_LIMIT,
      extended: false,
      oni: false,
      oniReached: false,
      freezeUntil: 0,

      score: 0,
      combo: 0,
      miss: 0,

      flashMsg: "",
      flashUntil: 0,

      items: [],
      hook: null,
      tourist: null,
      squid: null,
      dash: null,
      dashTrail: [],

      ended: false,

      phase: withCountdown ? "countdown" : "play",
      inputEnabled: !withCountdown,
      timerStarted: !withCountdown,
    };

    function remaining(){
      return Math.max(0, STATE.limit - STATE.elapsed);
    }

    for (let i = 0; i < CFG.ITEM_COUNT; i++){
      const spec = buildTakoyakiSpec();
      const baseY = (FLOOR_Y - 14) + rand(-2, 2);
      STATE.items.push({
        x: rand(W * 0.15, W * 0.85),
        baseY,
        y: baseY,
        alive: true,
        spec,
        vx: (Math.random() < 0.5 ? -1 : 1) * (45 + rand(0, 22)),
        vxTarget: (Math.random() < 0.5 ? -1 : 1) * (45 + rand(0, 50)),
        bobAmp: rand(0.6, 2.4),
        bobSpd: rand(3.0, 7.8),
        bobPhase: rand(0, Math.PI * 2),
        nextMind: nowMs() + rand(450, 1100),
        pauseUntil: 0,
      });
    }

    function resetItem(it){
      it.spec = buildTakoyakiSpec();
      const baseY = (FLOOR_Y - 14) + rand(-2, 2);
      it.x = rand(W * 0.15, W * 0.85);
      it.baseY = baseY;
      it.y = baseY;
      it.alive = true;
      it.vx = (Math.random() < 0.5 ? -1 : 1) * (45 + rand(0, 22));
      it.vxTarget = (Math.random() < 0.5 ? -1 : 1) * (45 + rand(0, 50));
      it.bobAmp = rand(0.6, 2.4);
      it.bobSpd = rand(3.0, 7.8);
      it.bobPhase = rand(0, Math.PI * 2);
      it.nextMind = nowMs() + rand(450, 1100);
      it.pauseUntil = 0;
    }

    STATE.hook = {
      x: W * 0.5,
      y: 18,
      phase: "idle",
      hasCatch: false,
      caught: null,
      giantDropArmed: false,
      giantDropRolled: false,
      giantWillDrop: false,
    };

    function setHookIdle(){
      const h = STATE.hook;
      h.phase = "idle";
      h.y = 18;
      h.hasCatch = false;
      h.caught = null;
      h.giantDropArmed = false;
      h.giantDropRolled = false;
      h.giantWillDrop = false;
    }

    STATE.tourist = { x: 0, y: TOURIST_Y, w: 34, h: 18, dir: 1, speed: 90 };
    STATE.squid = {
      baseX: W - 58, baseY: SQUID_Y, x: W - 58, y: SQUID_Y,
      w: 58, h: 58, dir: -1,
      speed: 18, ampX: 10, ampY: 16, freq: 0.55,
      phase: Math.random() * Math.PI * 2,
    };

    const dashY = Math.floor((TOURIST_Y + SQUID_Y) * 0.5) - 12;
    STATE.dash = {
      active:false,
      x: W + 60,
      y: dashY,
      w: 54,
      h: 10,
      vx: -950,
      nextAt: nowMs() + (10 * 1000 + Math.random() * (15 - 10) * 1000)
    };

    function spawnDash(now){
      const d = STATE.dash;
      d.active = true;
      d.x = W + d.w + 10;
      d.vx = -950 * (STATE.oni ? 1.15 : 1.0);
      const minS = STATE.oni ? 4 : 10;
      const maxS = STATE.oni ? 7 : 15;
      d.nextAt = now + (minS * 1000 + Math.random() * (maxS - minS) * 1000);
      STATE.dashTrail.length = 0;
      if (STATE.phase === "play") flashText("⚠ 流れが来た", 520);
    }

    function despawnDash(){
      const d = STATE.dash;
      d.active = false;
      d.x = W + d.w + 10;
    }

    function startDropAt(x){
      if (!STATE || !STATE.inputEnabled) return;
      if (remaining() <= 0) return;
      const h = STATE.hook;
      if (h.phase !== "idle") return;
      h.x = clamp(x, 10, W - 10);
      h.phase = "drop";
      h.hasCatch = false;
      h.caught = null;
      h.giantDropArmed = false;
      h.giantDropRolled = false;
      h.giantWillDrop = false;
    }

    onPointer = (e) => {
      e.preventDefault();
      startDropAt(pointerToCanvasX(e, cvs));
    };
    cvs.addEventListener("pointerdown", onPointer, { passive:false });

    function drawBackground(now){
      const isOni = STATE.oni;
      ctx.fillStyle = isOni ? "#060819" : "#081425";
      ctx.fillRect(0, 0, W, H);

      const t = now / 1000;
      const band1 = Math.floor(40 + 12 * Math.sin(t * 0.6));
      const band2 = Math.floor(70 + 18 * Math.cos(t * 0.42));
      ctx.fillStyle = isOni ? "rgba(120,70,170,0.07)" : "rgba(60,130,220,0.07)";
      ctx.fillRect(0, 0, W, band1);
      ctx.fillRect(0, band1 + 50, W, band2);

      ctx.fillStyle = "rgba(255,255,255,0.06)";
      ctx.fillRect(0, FLOOR_Y, W, H - FLOOR_Y);
      ctx.fillStyle = "rgba(255,255,255,0.05)";
      ctx.fillRect(0, FLOOR_Y - 6, W, 6);

      if (isOni){
        ctx.fillStyle = "rgba(0,255,255,0.04)";
        ctx.fillRect(0, 0, W, H);
      }
    }

    function drawItems(){
      for (const it of STATE.items){
        if (!it.alive) continue;
        const img = IMGS[it.spec.type.imgKey];
        drawImageCentered(ctx, img, it.x, it.y, it.spec.size.draw);
      }
    }

    function drawTourist(){
      const t = STATE.tourist;
      const img = (t.dir > 0) ? IMGS.tourist_right : IMGS.tourist_left;
      drawImageCentered(ctx, img, t.x + t.w / 2, t.y, 44);
    }

    function drawSquid(){
      const s = STATE.squid;
      const img = IMGS.squid;
      const cx = s.x + s.w / 2;
      const cy = s.y;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.scale(s.dir, 1);
      ctx.drawImage(img, Math.round(-s.w / 2), Math.round(-s.h / 2), s.w, s.h);
      ctx.restore();
    }

    function drawDash(now){
      const d = STATE.dash;
      if (!d.active) return;

      const trail = STATE.dashTrail;
      trail.unshift({ x: d.x, t: now });
      if (trail.length > 4) trail.pop();

      for (let i = trail.length - 1; i >= 0; i--){
        const a = (i + 1) / (trail.length + 1);
        const alpha = 0.12 + 0.22 * (1 - a);
        const wid = d.w + i * 14;
        const hi  = d.h + i * 2;
        const x = trail[i].x - i * 10;
        const y = d.y;

        ctx.fillStyle = `rgba(0, 220, 255, ${alpha})`;
        ctx.fillRect(Math.round(x), Math.round(y - hi / 2), wid, hi);
      }

      ctx.fillStyle = "rgba(210, 255, 255, 0.35)";
      ctx.fillRect(Math.round(d.x), Math.round(d.y - d.h / 2), d.w, d.h);

      ctx.fillStyle = "rgba(0, 255, 255, 0.35)";
      ctx.fillRect(Math.round(d.x + d.w - 6), Math.round(d.y - d.h / 2), 6, d.h);
    }

    function drawHook(){
      const h = STATE.hook;
      ctx.strokeStyle = "rgba(255,255,255,.22)";
      ctx.beginPath();
      ctx.moveTo(h.x, 18);
      ctx.lineTo(h.x, h.y);
      ctx.stroke();

      drawImageCentered(ctx, IMGS.pick, h.x, h.y, 24);

      if (h.hasCatch && h.caught){
        const s = h.caught.size.draw;
        const ty = h.y + 12 + (s / 2) - 2;
        const img = IMGS[h.caught.type.imgKey];
        drawImageCentered(ctx, img, h.x, ty, s);
      }
    }

    function drawHUD(now){
      ctx.fillStyle = "#fff";
      ctx.font = "13px system-ui";

      const h = STATE.hook;
      if (STATE.phase === "countdown"){
        ctx.fillText("開始前：落とす位置を見定めよう", 10, 18);
      } else if (h.phase === "idle"){
        ctx.fillText("タップ：好きな位置に糸を垂らす", 10, 18);
      } else if (h.phase === "drop"){
        ctx.fillText("落下中…当てろ！", 10, 18);
      } else {
        ctx.fillText("巻き上げ中！天敵に注意！", 10, 18);
      }

      if (STATE.extended){
        ctx.fillStyle = "rgba(255,255,255,.75)";
        ctx.font = "12px system-ui";
        ctx.fillText("延長中", 10, 36);
      }

      if (STATE.oni){
        ctx.fillStyle = "rgba(0,255,255,.85)";
        ctx.font = "12px system-ui";
        ctx.fillText("鬼モード", 60, 36);
      }

      if (STATE.combo >= 2){
        const comboMult = getComboMultiplier(STATE.combo).toFixed(2);
        ctx.fillStyle = "rgba(255,220,120,.95)";
        ctx.font = "12px system-ui";
        ctx.fillText(`連続倍率 ×${comboMult}`, 130, 36);
      }

      if (now < STATE.flashUntil && STATE.flashMsg){
        ctx.fillStyle = "rgba(0,0,0,.55)";
        ctx.fillRect(0, 44, W, 26);
        ctx.fillStyle = "#fff";
        ctx.font = "13px system-ui";
        ctx.fillText(STATE.flashMsg, 12, 62);
      }

      if (STATE.freezeUntil && now < STATE.freezeUntil){
        ctx.fillStyle = "rgba(0,0,0,.35)";
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = "rgba(0,255,255,.9)";
        ctx.font = "18px system-ui";
        ctx.fillText("鬼モード突入", 110, 230);
      }

      if (getRemainingTime() <= 0 && STATE.phase === "play"){
        ctx.fillStyle = "rgba(0,0,0,.65)";
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = "#fff";
        ctx.font = "22px system-ui";
        ctx.fillText("TIME UP!", 120, 230);
      }
    }

    function render(now){
      drawBackground(now);
      drawTourist();
      drawSquid();
      drawDash(now);
      if (!STATE.hook.hasCatch) drawItems();
      drawHook();
      drawHUD(now);
    }

    let last = nowMs();

    function step(now){
      if (!STATE) return;
      const dt = Math.min(0.033, (now - last) / 1000);
      last = now;

      const mul = STATE.oni ? CFG.ONI_SPEED_MUL : 1.0;

      if (!(STATE.freezeUntil && now < STATE.freezeUntil)){
        for (const it of STATE.items){
          if (!it.alive) continue;

          if (now < it.pauseUntil){
            it.vx *= 0.90;
          } else {
            if (now >= it.nextMind){
              if (Math.random() < 0.10) it.pauseUntil = now + rand(260, 620);
              const flip = (Math.random() < 0.18) ? -1 : 1;
              const spd = 45 + rand(-18, 60);
              it.vxTarget = clamp(flip * (Math.random() < 0.5 ? -1 : 1) * spd, -130, 130);
              it.bobAmp = clamp(it.bobAmp + rand(-0.6, 0.9), 0.5, 3.4);
              it.bobSpd = clamp(it.bobSpd + rand(-1.2, 1.4), 2.0, 9.0);
              it.nextMind = now + rand(350, 1300);
            }

            const dv = it.vxTarget - it.vx;
            it.vx += clamp(dv, -240 * dt, 240 * dt);
            it.vx += rand(-6, 6) * dt;
            it.vx = clamp(it.vx, -130, 130);
          }

          it.x += it.vx * dt;

          const half = it.spec.size.draw / 2;
          if (it.x - half < 10){
            it.x = 10 + half;
            it.vx = Math.abs(it.vx) * (0.85 + Math.random() * 0.25);
            it.vxTarget = Math.abs(it.vxTarget) * (0.8 + Math.random() * 0.4);
            it.nextMind = Math.min(it.nextMind, now + rand(120, 420));
          }
          if (it.x + half > W - 10){
            it.x = (W - 10) - half;
            it.vx = -Math.abs(it.vx) * (0.85 + Math.random() * 0.25);
            it.vxTarget = -Math.abs(it.vxTarget) * (0.8 + Math.random() * 0.4);
            it.nextMind = Math.min(it.nextMind, now + rand(120, 420));
          }

          it.y = it.baseY + Math.sin((now / 1000) * it.bobSpd + it.bobPhase) * it.bobAmp;
        }

        const t = STATE.tourist;
        t.x += t.dir * t.speed * mul * dt;
        if (t.x < 0){ t.x = 0; t.dir *= -1; }
        if (t.x + t.w > W){ t.x = W - t.w; t.dir *= -1; }

        const s = STATE.squid;
        s.baseX += s.dir * s.speed * mul * dt;
        if (s.baseX < 0){ s.baseX = 0; s.dir *= -1; }
        if (s.baseX + s.w > W){ s.baseX = W - s.w; s.dir *= -1; }

        const sec = (now / 1000) * (Math.PI * 2) * s.freq + s.phase;
        s.x = s.baseX + Math.sin(sec) * s.ampX;
        s.y = s.baseY + Math.cos(sec * 0.85) * s.ampY;

        const d = STATE.dash;
        if (!d.active && now >= d.nextAt) spawnDash(now);
        if (d.active){
          d.x += d.vx * dt;
          if (d.x + d.w < -40) despawnDash();
        }
      }

      if (STATE.phase === "play" && !STATE.ended){
        const h = STATE.hook;

        if (h.phase === "drop"){
          const spd = hookDropSpeed(h.y, FLOOR_Y);
          h.y += spd * dt;

          if (!h.hasCatch){
            for (const it of STATE.items){
              if (!it.alive) continue;
              const rr = it.spec.size.draw * 0.38;
              if (circleHit(h.x, h.y, 10, it.x, it.y, rr)){
                h.hasCatch = true;
                h.phase = "reel";
                h.caught = it.spec;
                h.giantDropArmed = (it.spec.sizeKey === "giant");
                h.giantDropRolled = false;
                h.giantWillDrop = false;
                it.alive = false;
                flashText(`HIT!（${it.spec.size.label}/${it.spec.type.label}）`, 750);
                break;
              }
            }
          }

          if (h.y >= FLOOR_Y - 10){
            h.y = FLOOR_Y - 10;
            h.phase = "reel";
            if (!h.hasCatch){
              STATE.combo = 0;
              flashText("空振り…！", 600);
            }
          }
        }

        if (h.phase === "reel"){
          const spd = hookReelSpeed(h.y, FLOOR_Y, h.hasCatch);
          h.y -= spd * dt;

          if (h.hasCatch && h.caught && h.giantDropArmed){
            if (!h.giantDropRolled && h.y < GIANT_DROP_START_Y){
              h.giantDropRolled = true;
              h.giantWillDrop = (Math.random() < CFG.GIANT_DROP_CHANCE);
            }
            if (h.giantWillDrop && h.y < (GIANT_DROP_START_Y - 40)){
              const dead = STATE.items.find(v => !v.alive);
              if (dead) resetItem(dead);
              h.hasCatch = false;
              h.caught = null;
              STATE.combo = 0;
              STATE.miss++;
              flashText("巨大たこ焼き、落ちた！！", 950);
              setHookIdle();
            }
          }

          if (h.hasCatch && h.caught){
            const fishSize = h.caught.size.draw;
            const fishR = fishSize * 0.38;
            const fishX = h.x;
            const fishY = h.y + 12 + (fishSize / 2) - 2;

            const t = STATE.tourist;
            const s = STATE.squid;
            const d = STATE.dash;

            if (circleRectHit(fishX, fishY, fishR, t.x, t.y - t.h / 2, t.w, t.h)){
              const dead = STATE.items.find(v => !v.alive);
              if (dead) resetItem(dead);
              h.hasCatch = false;
              h.caught = null;
              STATE.combo = 0;
              STATE.miss++;
              flashText("観光客に横取りされた！", 850);
              setHookIdle();
            }

            if (h.hasCatch && circleRectHit(fishX, fishY, fishR, s.x, s.y - s.h / 2, s.w, s.h)){
              const dead = STATE.items.find(v => !v.alive);
              if (dead) resetItem(dead);
              h.hasCatch = false;
              h.caught = null;
              STATE.combo = 0;
              STATE.miss++;
              STATE.score -= 40;
              flashText("イカに奪われた… -40", 950);
              setHookIdle();
            }

            if (h.hasCatch && d.active && circleRectHit(fishX, fishY, fishR, d.x, d.y - d.h / 2, d.w, d.h)){
              const dead = STATE.items.find(v => !v.alive);
              if (dead) resetItem(dead);
              h.hasCatch = false;
              h.caught = null;
              STATE.combo = 0;
              STATE.miss++;
              flashText("観光客に横取りされた！", 850);
              setHookIdle();
              despawnDash();
            }
          }

          if (h.y <= 18){
            h.y = 18;
            if (h.hasCatch && h.caught){
              const dead = STATE.items.find(v => !v.alive);
              if (dead) resetItem(dead);

              const nextCombo = (h.caught.type.mult < 0) ? 0 : (STATE.combo + 1);
              const gained = calcCatchScore(h.caught, nextCombo);

              if (h.caught.type.mult < 0){
                STATE.score += gained;
                STATE.combo = 0;
                STATE.miss++;
                flashText(`生焼け！ ${gained}`, 900);
              } else {
                STATE.combo = nextCombo;
                STATE.score += gained;
                const comboMult = getComboMultiplier(STATE.combo).toFixed(2);
                flashText(`GET! ${gained > 0 ? "+" : ""}${gained}（×${comboMult}）`, 900);
              }

              h.hasCatch = false;
              h.caught = null;
              setHookIdle();
            } else {
              setHookIdle();
            }
          }
        }
      }

      setText("tfScore", STATE.score);
      setText("tfCombo", STATE.combo);
      setText("tfMiss", STATE.miss);
      setText("tfTime", Math.max(0, STATE.limit - STATE.elapsed));

      render(now);
      rafId = requestAnimationFrame(step);
    }

    setHookIdle();
    setText("tfScore", 0);
    setText("tfCombo", 0);
    setText("tfMiss", 0);
    setText("tfTime", CFG.BASE_LIMIT);

    rafId = requestAnimationFrame(step);

    if (withCountdown){
      startCountdownPhase();
    } else {
      startTimerLoop();
    }
  }

  async function init(){
    loadMonthlyStats();

    const ctx = els.canvas.getContext("2d");
    ctx.imageSmoothingEnabled = false;
    ctx.fillStyle = "#081425";
    ctx.fillRect(0, 0, CFG.W, CFG.H);
    ctx.fillStyle = "#fff";
    ctx.font = "16px system-ui";
    ctx.fillText("読み込み中…", 120, 260);

    const { images, failed } = await loadAllImages();
    if (failed.length){
      ctx.fillStyle = "#081425";
      ctx.fillRect(0, 0, CFG.W, CFG.H);
      ctx.fillStyle = "#fff";
      ctx.font = "14px system-ui";
      ctx.fillText("画像が読み込めないものがあります：", 20, 40);
      ctx.font = "11px system-ui";
      let y = 70;
      for (const f of failed){
        ctx.fillText(`- ${f.key}: ${f.url}`, 20, y);
        y += 16;
        if (y > CFG.H - 30) break;
      }
      ctx.fillText("CDN_BASE / ファイル名を確認してください。", 20, CFG.H - 16);
      return;
    }

    IMGS = images;
    refreshBestUI();

    const c2 = els.canvas.getContext("2d");
    c2.imageSmoothingEnabled = false;
    c2.fillStyle = "#081425";
    c2.fillRect(0, 0, CFG.W, CFG.H);
    c2.fillStyle = "#fff";
    c2.font = "14px system-ui";
    c2.fillText("ゲーム開始", 140, 260);

    startGameWithCountdown();
  }

  refreshBestUI();

  els.backBtn.addEventListener("click", () => {
    try{
      if (history.length > 1) history.back();
      else location.href = "../town/";
    }catch(_){
      location.href = "../town/";
    }
  });

  els.resultCloseBtn.addEventListener("click", () => {
    hideResult();
  });

  els.resultRetryBtn.addEventListener("click", () => {
    hideResult();
    startGameWithCountdown();
  });

  els.retryBtn.addEventListener("click", () => {
    hideResult();
    startGameWithCountdown();
  });

  init();
})();
</script>
</body>
