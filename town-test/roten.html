<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>露店（たこぴのお店）</title>

  <style>
    :root{
      --bg:#0f1220;
      --panel:rgba(0,0,0,.38);
      --panel2:rgba(0,0,0,.52);
      --line:rgba(255,255,255,.14);
      --text:#fff;
      --muted:rgba(255,255,255,.72);
      --gold: rgba(255,210,124,.75);
      --shadow: 0 16px 45px rgba(0,0,0,.45);
      --radius:16px;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }

    body{
      margin:0;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans JP",sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ===== Header ===== */
    .roten-header{
      position:sticky;
      top:0;
      z-index:50;
      background: linear-gradient(180deg, rgba(0,0,0,.55), rgba(0,0,0,0));
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .roten-head-inner{
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      padding:16px 14px 10px;
    }

    .roten-back{
      position:absolute;
      left:14px;
    }

    .roten-head-center{
      text-align:center;
    }

    .roten-title{ font-size:22px; font-weight:900; }
    .roten-sub{ margin-top:4px; color:var(--muted); font-size:12px; }

    /* ===== Layout ===== */
    .roten-app{
      padding:10px 12px 26px;
      max-width:980px;
      margin:0 auto;
    }

    /* ===== Buttons ===== */
    .btn{
      appearance:none;
      -webkit-appearance:none;
      border-radius:14px;
      font-weight:900;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:10px 12px;
      background: linear-gradient(180deg,#273155,#1a2036);
      border:1px solid rgba(255,255,255,.15);
      color:#fff;
      transition:.15s;
    }

    .btn:active{
      transform:translateY(2px);
      filter:brightness(.9);
    }

    .btn-ghost{
      background: rgba(255,255,255,.06);
    }

    .btn-gold{
      background: linear-gradient(180deg,#ffe27a,#d4a900);
      color:#2a2000;
      border:none;
    }

    .buybtn{
      background: linear-gradient(180deg,#ffb347,#ff7a18);
      color:#2b1800;
      border:none;
      box-shadow:0 4px 0 #b85b12;
    }

    .buybtn:active{
      transform:translateY(3px);
      box-shadow:0 2px 0 #b85b12;
    }

    /* ===== HUD ===== */
    .hud{
      display:flex;
      gap:10px;
      justify-content:space-between;
      padding:12px;
      border-radius:var(--radius);
      background:rgba(255,255,255,.05);
      margin-bottom: 12px;
    }

    .hud-left,
    .hud-right{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }

    .hud-pill{
      padding:8px 10px;
      border-radius:999px;
      background:rgba(0,0,0,.2);
      font-size:13px;
    }

    .hud-pill--big{
      font-size: 15px;
      font-weight: 900;
    }

    .hud-pill .num{
      font-size: 18px;
      font-weight: 1000;
    }

    .hud-pill .lbl,
    .hud-pill .sep,
    .hud-pill .ico,
    .hud-pill .tag{
      opacity: .95;
      margin-right: 2px;
    }

    .hud-pill b{
      font-size: 15px;
      margin: 0 4px 0 2px;
    }

    /* ===== Block ===== */
    .block{
      margin-top: 10px;
      padding: 12px;
      border-radius: var(--radius);
      background: rgba(255,255,255,.05);
    }

    .block-head{
      margin-bottom: 10px;
    }

    .block-title{
      font-size: 18px;
      font-weight: 1000;
      letter-spacing: .03em;
    }

    /* ===== Hero ===== */
    .shop-hero{
      margin-bottom: 12px;
    }

    .hero-card{
      display:grid;
      grid-template-columns: 140px 1fr;
      gap: 12px;
      padding: 12px;
      border-radius: 18px;
      background: rgba(255,255,255,.05);
      box-shadow: var(--shadow);
    }

    .hero-imgwrap{
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius: 16px;
      background: rgba(0,0,0,.18);
      min-height: 140px;
      overflow:hidden;
    }

    .hero-img{
      width: 100%;
      max-width: 120px;
      image-rendering: auto;
      display:block;
    }

    .hero-dialog{
      min-width: 0;
    }

    .hero-name{
      font-size: 18px;
      font-weight: 1000;
      margin-bottom: 6px;
    }

    .hero-text{
      line-height: 1.6;
      color: rgba(255,255,255,.95);
      margin-bottom: 12px;
      font-size: 14px;
    }

    .hero-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom: 8px;
    }

    /* ===== Tabs ===== */
    .tabs{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:12px;
    }

    .tab{
      padding:14px;
      border-radius:var(--radius);
      background:rgba(0,0,0,.18);
      text-align:center;
      font-weight:900;
    }

    .tab.is-active{
      border:1px solid var(--gold);
    }

    /* ===== Goods ===== */
    .goods-tabs{
      position:sticky;
      top:64px;
      z-index:20;
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:8px;
      padding:8px 0;
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
    }

    .goods-tab{
      appearance:none;
      -webkit-appearance:none;
      border:1px solid rgba(255,255,255,.14);
      color:#fff;
      padding:12px;
      border-radius:14px;
      background:rgba(0,0,0,.18);
      font-weight:900;
      cursor:pointer;
    }

    .goods-tab.is-active{
      border:1px solid var(--gold);
      box-shadow: 0 0 0 1px rgba(255,210,124,.14) inset;
    }

    .goods-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
    }

    @media (min-width:860px){
      .goods-grid{ grid-template-columns:repeat(3,1fr); }
    }

    .good{
      border-radius:16px;
      background:rgba(0,0,0,.18);
      overflow:hidden;
      border:1px solid rgba(255,255,255,.08);
    }

    .good-top{
      display:grid;
      grid-template-columns:88px 1fr;
      gap:10px;
      padding:10px;
    }

    .good-img{
      width:88px;
      height:88px;
      border-radius:14px;
      background:rgba(0,0,0,.2);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }

    .good-img img{
      width:78px;
      image-rendering:pixelated;
      display:block;
    }

    .good-name{
      font-weight:900;
      line-height:1.2;
    }

    .good-desc{
      font-size:12px;
      color:var(--muted);
      line-height: 1.45;
      margin-top: 6px;
      white-space: normal;
      word-break: break-word;
    }

    .good-fx{
      margin-top: 8px;
      font-size: 12px;
      color: rgba(255,255,255,.88);
      line-height: 1.45;
    }

    .good-row{
      display:flex;
      justify-content:space-between;
      padding:0 10px 10px;
    }

    .good-buy{
      width:100%;
    }

    /* ===== Modal ===== */
    .modal{
      position:fixed;
      inset:0;
      display:none;
    }

    .modal.is-open{ display:block; }

    .modal__backdrop{
      position:absolute;
      inset:0;
      background: rgba(0,0,0,.58);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
    }

    .modal__sheet{
      position:absolute;
      left:50%;
      bottom:10px;
      transform:translateX(-50%);
      width:min(720px,96vw);
      max-height: min(84vh, 900px);
      border-radius:18px;
      background:rgba(20,28,40,.96);
      box-shadow: 0 24px 60px rgba(0,0,0,.55);
      border:1px solid rgba(255,255,255,.12);
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }

    .modal__grab{
      width:46px;
      height:5px;
      border-radius:999px;
      background: rgba(255,255,255,.22);
      margin:10px auto 4px;
      flex: 0 0 auto;
    }

    .modal__head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding: 8px 12px 10px;
      border-bottom:1px solid rgba(255,255,255,.10);
      flex: 0 0 auto;
    }

    .modal__title{
      font-size:16px;
      font-weight:1000;
      letter-spacing:.03em;
    }

    .modal__x{
      min-width: 74px;
    }

    .modal__body{
      padding:14px;
      overflow:auto;
      -webkit-overflow-scrolling: touch;
    }

    /* ===== Modal inner common ===== */
    .mikuji-wrap{
      display:grid;
      gap:12px;
    }

    .note{
      padding:12px 14px;
      border-radius:14px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      color:rgba(255,255,255,.92);
      line-height:1.6;
      font-size:13px;
    }

    .inv-box{
      padding:12px;
      border-radius:16px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.10);
    }

    .inv-title{
      font-weight:1000;
      font-size:14px;
      margin-bottom:10px;
      letter-spacing:.02em;
    }

    .inv-row{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      padding:10px 0;
      border-top:1px solid rgba(255,255,255,.08);
    }

    .inv-row:first-of-type{
      border-top:none;
      padding-top:0;
    }

    .inv-left{
      min-width:0;
    }

    .inv-name{
      font-weight:800;
      display:block;
      line-height:1.45;
    }

    .inv-memo{
      display:block;
      margin-top:4px;
      color:rgba(255,255,255,.66);
      font-size:12px;
      line-height:1.4;
    }

    .inv-right{
      white-space:nowrap;
      font-weight:1000;
      font-size:14px;
    }

    .row{
      display:flex;
      justify-content:flex-end;
      gap:8px;
      flex-wrap:wrap;
    }

    /* ===== Mikuji ===== */
    .grill{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
    }

    .ball{
      padding:10px;
      border-radius:14px;
      background:rgba(0,0,0,.2);
    }

    .ball img{
      width:52px;
      image-rendering:pixelated;
    }

    /* ✅ toastがCSSで潰されても勝つ保険（最強） */
    #toast{
      position:fixed !important;
      left:12px !important;
      right:12px !important;
      bottom: calc(14px + env(safe-area-inset-bottom)) !important;
      z-index: 2147483647 !important;
      pointer-events:none !important;
      opacity:0 !important;
      transform: translateY(10px) scale(.98) !important;
      transition: opacity .16s ease, transform .18s ease !important;
      padding: 14px 14px !important;
      border-radius: 14px !important;
      font-weight: 900 !important;
      letter-spacing: .02em !important;
      text-align:center !important;
      color:#fff !important;
      background: rgba(15,18,32,.92) !important;
      border:1px solid rgba(255,255,255,.16) !important;
      box-shadow: 0 18px 44px rgba(0,0,0,.55) !important;
      backdrop-filter: blur(6px) !important;
      -webkit-backdrop-filter: blur(6px) !important;
    }
    #toast.is-show{
      opacity:1 !important;
      transform: translateY(0) scale(1) !important;
    }

    /* ✅「購入」が縦になる対策 */
    .block-title{
      writing-mode: horizontal-tb !important;
      text-orientation: mixed !important;
      white-space: nowrap !important;
      line-height: 1.1 !important;
    }

    /* ✅ HUD：スマホでも「オクトの右横に種/水/肥料」を確実に */
    .hud{
      display:flex !important;
      align-items:flex-start !important;
      justify-content: space-between !important;
      gap:10px !important;
    }

    .hud .hud-left{
      display:flex !important;
      flex-direction: row !important;
      align-items:center !important;
      gap:10px !important;
      flex-wrap: wrap !important;
      width:auto !important;
      min-width: 0 !important;
    }

    .hud .hud-left .hud-pill{
      width:auto !important;
      flex: 0 0 auto !important;
      white-space: nowrap !important;
      margin: 0 !important;
    }

    .hud .hud-left .hud-pill--big{
      margin:0 !important;
    }

    .hud .hud-right{
      flex: 0 0 auto !important;
      min-width: 0 !important;
    }

    /* ✅ 売り方をえらぶ：2択モーダル */
    .sellChoice{
      position: fixed;
      inset: 0;
      z-index: 2147483646;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 14px;
      background: rgba(0,0,0,.72);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .sellChoice.is-open{ display:flex; }

    .sellChoice__panel{
      width: min(620px, 100%);
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(15,18,32,.88);
      box-shadow: 0 18px 44px rgba(0,0,0,.6);
      overflow: hidden;
    }

    .sellChoice__head{
      padding: 12px 12px 10px;
      border-bottom: 1px solid rgba(255,255,255,.10);
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 10px;
    }
    .sellChoice__back{
      height: 36px;
      padding: 0 12px;
      border-radius: 12px;
      font-weight: 900;
      border:1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.08);
      color:#fff;
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
      user-select:none;
    }
    .sellChoice__title{
      font-weight: 1000;
      letter-spacing: .04em;
      text-align:center;
      flex: 1;
    }
    .sellChoice__spacer{
      width: 88px;
      flex: 0 0 auto;
    }

    .sellChoice__desc{
      padding: 12px 14px 0;
      font-size: 13px;
      line-height: 1.45;
      opacity: .92;
    }
    .sellChoice__desc b{ font-weight: 1000; }

    .sellChoice__body{
      padding: 12px 14px 14px;
      display:grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    @media (max-width: 360px){
      .sellChoice__body{
        grid-template-columns: 1fr;
      }
    }

    .sellCard{
      display:block;
      border-radius: 16px;
      overflow:hidden;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.15);
      text-decoration:none;
      color: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      transform: translateZ(0);
    }
    .sellCard:active{ transform: translateY(1px) scale(.99); }

    .sellCard img{
      display:block;
      width: 100%;
      height: clamp(150px, 26vw, 220px);
      object-fit: cover;
    }

    @media (min-width: 740px){
      .sellCard img{
        height: auto !important;
        max-height: 320px !important;
        object-fit: contain !important;
        background: rgba(0,0,0,.18);
      }
    }

    .sellChoice__note{
      padding: 0 14px 14px;
      opacity: .82;
      font-size: 12px;
      line-height: 1.4;
    }

    /* ===== スマホ最適化 ===== */
    @media (max-width:520px){
      .hud{
        flex-direction:column;
      }

      .goods-grid{
        grid-template-columns:1fr;
      }

      .good-top{
        grid-template-columns:110px 1fr;
      }

      .good-img{
        width:110px;
        height:110px;
      }

      .good-img img{
        width:96px;
      }

      .buybtn{
        padding:12px 14px;
      }

      .hero-card{
        grid-template-columns: 1fr;
      }

      .hero-imgwrap{
        min-height: 120px;
      }

      .hero-img{
        max-width: 112px;
      }
    }
  </style>
</head>

<body>
  <header class="roten-header">
    <div class="roten-head-inner">
      <button class="btn btn-ghost roten-back" id="rotenBackBtn" type="button" aria-label="戻る">←戻る</button>

      <div class="roten-head-center">
        <div class="roten-title">露店</div>
        <div class="roten-sub">マイ露店 / たこぴのお店</div>
      </div>
    </div>
  </header>

  <main id="rotenApp" class="roten-app">
    <section class="hud">
      <div class="hud-left">
        <div class="hud-pill hud-pill--big">
          <span class="tag">🪙</span>
          <span class="num" id="octoNow">0</span>
        </div>

        <div class="hud-pill">
          <span class="ico">🌱</span><span class="lbl">種</span><b id="chipSeed">0</b>
          <span class="sep">/</span>
          <span class="ico">💧</span><span class="lbl">水</span><b id="chipWater">0</b>
          <span class="sep">/</span>
          <span class="ico">🧪</span><span class="lbl">肥料</span><b id="chipFert">0</b>
        </div>
      </div>

      <div class="hud-right">
        <button class="btn btn-ghost" id="btnOpenInv" type="button">所持資材</button>
        <button class="btn btn-ghost" id="btnOpenRates" type="button">水のレア率メモ</button>
      </div>
    </section>

    <section class="shop-hero">
      <div class="hero-card">
        <div class="hero-imgwrap">
          <img class="hero-img" id="takopiHeroImg" src="https://ul.h3z.jp/0eBSeUBg.png" alt="たこぴ" />
        </div>

        <div class="hero-dialog">
          <div class="hero-name">たこぴ</div>
          <div class="hero-text" id="takopiSay">
            「いらっしゃい…たこ。<br>オクトで“未来”を買うの、すき…たこ？」
          </div>

          <div class="hero-actions"></div>

          <div style="display:flex; gap:8px; align-items:center;">
            <input
              id="serialInlineInput"
              type="text"
              inputmode="text"
              autocomplete="off"
              placeholder="例：TC-XXXX-XXXX"
              style="flex:1; min-width:0; padding:10px 12px; border-radius:12px; border:1px solid rgba(255,255,255,.18); background:rgba(0,0,0,.25); color:#fff; outline:none;"
            />
            <button class="btn" id="serialInlineBtn" type="button" style="white-space:nowrap;">使う</button>
          </div>
          <div id="serialInlineMsg" style="margin-top:6px; font-size:12px; opacity:.85;" aria-live="polite"></div>
        </div>
      </div>
    </section>

    <section class="block">
      <div class="block-head" style="display:flex; align-items:center; gap:10px;">
        <div class="block-title" style="flex:1;">購入</div>
        <div id="_aboutSlot" style="display:flex; justify-content:flex-end; align-items:center;"></div>
      </div>

      <div class="goods-tabs" aria-label="資材タブ">
        <button class="goods-tab is-active" data-kind="seed" type="button">タネ🌱</button>
        <button class="goods-tab" data-kind="water" type="button">ミズ💧</button>
        <button class="goods-tab" data-kind="fert" type="button">ヒリョウ🧪</button>
      </div>

      <div class="goods-grid" id="goodsGrid"></div>
    </section>
  </main>

  <div id="toast" aria-live="polite"></div>

  <!-- ====== Modal ====== -->
  <div class="modal" id="modal" aria-hidden="true">
    <div class="modal__backdrop" id="modalBg"></div>
    <div class="modal__sheet" role="dialog" aria-label="モーダル">
      <div class="modal__grab"></div>
      <div class="modal__head">
        <div class="modal__title" id="modalTitle">タイトル</div>
        <button class="btn modal__x" id="modalX" type="button">閉じる</button>
      </div>
      <div id="modalBody" class="modal__body"></div>
    </div>
  </div>

  <!-- ✅ 売り方をえらぶ（2択）モーダル -->
  <div class="sellChoice" id="sellChoice" aria-hidden="true">
    <div class="sellChoice__panel" role="dialog" aria-label="売り方をえらぶ">
      <div class="sellChoice__head">
        <button class="sellChoice__back" id="sellChoiceBack" type="button" aria-label="戻る">←戻る</button>
        <div class="sellChoice__title">売り方をえらぶ</div>
        <div class="sellChoice__spacer" aria-hidden="true"></div>
      </div>

      <div class="sellChoice__desc">
        <b>今すぐオクト化</b>する？ それとも <b>マイ露店でコツコツ販売</b>する？
      </div>

      <div class="sellChoice__body">
        <a class="sellCard" id="goInstantSell" href="sell.html" aria-label="たこぴに即売りへ">
          <img src="https://ul.h3z.jp/OY1i6zTs.png" alt="たこぴに即売り（換金）">
        </a>

        <a class="sellCard" id="goMyShopSell" href="https://takoyaki-trc.github.io/takoyaki-media/town/myshop.html" aria-label="マイ露店へ">
          <img src="https://ul.h3z.jp/03QxjNxa.png" alt="マイ露店で売る（たこ民に販売）">
        </a>
      </div>

      <div class="sellChoice__note">

      const curMonth = getMonthKey();

      if(!raw || typeof raw !== "object"){
        return defaultMonthlyStats();
      }

      const monthKey = String(raw.monthKey || "");
      if(monthKey !== curMonth){
        return defaultMonthlyStats();
      }

      return {
        monthKey: curMonth,
        harvest: Number(raw.harvest || 0),
        sales: Number(raw.sales || 0),
        fishing: Number(raw.fishing || 0),
        tower: Number(raw.tower || 0)

        const parsed = JSON.parse(raw);

        localStorage.setItem(LS.monthlyStats, JSON.stringify(norm));

    function forceModalStyle(modal){

    function openModal(title, html){
      const { modal, title:ttl, body } = getModalEls();

      ttl.textContent = title || "メニュー";

      forceModalStyle(modal);
      modal.classList.add("is-open");
      modal.setAttribute("aria-hidden","false");

      requestAnimationFrame(() => {
        forceModalStyle(modal);
        modal.classList.add("is-open");
      });

      document.documentElement.style.overflow = "hidden";
      document.body.style.overflow = "hidden";
    }

    function closeModal(){
      const { modal, body } = getModalEls();
      if(!modal) return;

      modal.classList.remove("is-open");
      modal.setAttribute("aria-hidden","true");
      if(body) body.innerHTML = "";

      modal.style.removeProperty("display");
      modal.style.removeProperty("position");
      modal.style.removeProperty("inset");
      modal.style.removeProperty("z-index");
      modal.style.removeProperty("pointer-events");

      document.documentElement.style.overflow = "";
      document.body.style.overflow = "";
    }

      clearTimeout(toastHype._t);
      el.style.setProperty("transition","none","important");
      el.style.setProperty("opacity","0","important");
      el.style.setProperty("transform","translateY(10px) scale(.98)","important");

        .good .serialMiniBtn[disabled]{ opacity:.55; }

        #_serialInlinePickWrap{
          display:none !important;
        }

          .good .buybar .buybtn{ min-width: 86px !important; }

          .good .boothLink{ min-width: 120px; }
          .good .serialMiniInput{ width: clamp(110px, 34vw, 180px); max-width: 180px; }

            flex-wrap:wrap;

          .good .serialMiniInput{

            max-width: 999px;

      document.head.appendChild(style);
    }

    function clamp(n, min, max){
      n = Math.floor(Number(n)||0);
      if(n < min) return min;
      if(n > max) return max;
      return n;
    }

    function buyMany(item, qty){
      qty = clamp(qty, 1, 99);
      const price = Math.max(0, Number(item.price||0));
      const total = price * qty;
      const octo = getOcto();
      if(octo < total) return { ok:false, need: total, has: octo };

      const inv = ensureInvKeys();
      inv[item.kind] = inv[item.kind] || {};
      inv[item.kind][item.id] = Number(inv[item.kind][item.id] || 0) + qty;
      saveInv(inv);

      setOcto(octo - total);
      addMonthlySales(total);

      pushLog(`購入：${item.name} ×${qty} -${total}オクト`);

      refreshHUD();
      renderGoods();
      setTakopiSayRandom();
      return { ok:true, total, qty, price };
    }

    let currentKind = "seed";

    function renderGoods(){
      const inv = ensureInvKeys();
      const grid = $("#goodsGrid");
      if(!grid) return;

      const list = GOODS.filter(g => g.kind === currentKind);

      grid.innerHTML = list.map(g => {
        const own = String(ownedCount(inv, g.kind, g.id));
        const canBuy = !!g.buyable;

        const badge = g.tag ? `<span class="miniTag">${g.tag}</span>` : "";
        const isSerialSeed = (g.kind === "seed" && SERIAL_ONLY_SEEDS.has(g.id));
        const periodLine = isSerialSeed
          ? `<div class="good-period">${COLLAB_PERIOD[g.id] || ""}</div>`
          : "";

        const priceLine = canBuy
          ? `<div class="priceline">単価 <b>${g.price}</b> オクト</div>`
          : ``;

        const buyBar = canBuy ? `
          <div class="buybar">
            <div class="qty">
              <button class="btn qtybtn qtyminus" type="button" aria-label="減らす">−</button>
              <input class="qtyin" type="number" inputmode="numeric" min="1" max="99" value="1">
              <button class="btn qtybtn qtyplus" type="button" aria-label="増やす">＋</button>
            </div>
            <button class="btn buybtn" type="button">買う</button>
          </div>
          ${priceLine}
        ` : (isSerialSeed ? `
          <div class="boothRow">
            <a class="boothLink" href="${BOOTH_URL}" target="_blank" rel="noopener">BOOTHへ</a>

            <div class="serialMini">
              <input class="serialMiniInput" type="text" inputmode="text" autocapitalize="characters" autocomplete="off"
                spellcheck="false"
                placeholder="${g.id === "seed_anniv" ? "ANNIV-XXXX-XXXX" : "GRATAN-XXXX-XXXX"}">
              <button class="serialMiniBtn" type="button"
                data-pick="${g.id === "seed_anniv" ? "anniv" : "gratan"}">送信</button>
            </div>
          </div>
        ` : `
          <div class="boothRow">
            <a class="boothLink" href="${BOOTH_URL}" target="_blank" rel="noopener">BOOTHへ</a>
          </div>
        `);

        return `
          <article class="good" data-kind="${g.kind}" data-id="${g.id}">
            <div class="good-top">
              <div class="good-img">
                <span class="ownBadge">×<b>${own}</b></span>
                <img src="${g.img}" alt="${g.name}" loading="lazy">
              </div>
              <div class="good-meta">
                <div class="good-name">${g.name} ${badge}</div>
                ${periodLine}
                <div class="good-desc">${(g.desc||"").replace(/\n/g,"<br>")}</div>
                <div class="good-fx">${g.fx ? `効果：<b>${g.fx}</b>` : ""}</div>
              </div>
            </div>

            <div class="good-row">
              <div class="good-buy">${buyBar}</div>
            </div>
          </article>
        `;
      }).join("");

      $$(".good", grid).forEach(card => {
        const kind = card.getAttribute("data-kind");
        const id   = card.getAttribute("data-id");
        const item = GOODS.find(x => x.kind===kind && x.id===id);
        if(!item) return;

        if(!item.buyable){
          if(item.kind === "seed" && SERIAL_ONLY_SEEDS.has(item.id)){
            wireCardSerialInput(card, item);
          }
          return;
        }

        const btn   = $(".buybtn", card);
        const minus = $(".qtyminus", card);
        const plus  = $(".qtyplus", card);
        const qtyIn = $(".qtyin", card);

        function getQty(){
          const v = qtyIn ? Number(qtyIn.value || 1) : 1;
          return clamp(v, 1, 99);
        }

        function setQty(v){
          if(!qtyIn) return;
          qtyIn.value = String(clamp(v, 1, 99));
        }

        minus?.addEventListener("click", (e)=>{
          e.preventDefault(); e.stopPropagation();
          setQty(getQty() - 1);
        });

        plus?.addEventListener("click", (e)=>{
          e.preventDefault(); e.stopPropagation();
          setQty(getQty() + 1);
        });

        qtyIn?.addEventListener("input", ()=>{ setQty(getQty()); });

        btn?.addEventListener("click", (e)=>{
          e.preventDefault(); e.stopPropagation();

          const qty = getQty();
          const r = buyMany(item, qty);
          if(!r.ok){
            toastHype("💥 オクトが足りない…たこ。", {kind:"bad"});
            return;
          }
          toastHype(`✨ 購入完了！「${item.name}」×${r.qty}（-${r.total}オクト）✨`, {kind:"good"});
        });
      });
    }

      const rows = items.map(g => {
        const c = String(ownedCount(inv, g.kind, g.id));
        let memo = "";
        if(!g.buyable && g.id==="seed_colabo") memo = "（ぐらたん／シリアル限定）";
        if(!g.buyable && g.id==="seed_anniv")  memo = "（ハーフアニバーサリー／シリアル限定）";
        return `
          <div class="inv-row">
            <div class="inv-left">

        <div class="mikuji-wrap">

    function wireChipBreakdowns(){
      $("#chipSeed")?.addEventListener("click", () => { openBreakdownModal("seed"); setTakopiSayRandom(); });
      $("#chipWater")?.addEventListener("click", () => { openBreakdownModal("water"); setTakopiSayRandom(); });
      $("#chipFert")?.addEventListener("click", () => { openBreakdownModal("fert"); setTakopiSayRandom(); });
    }

    function loadUsedCodes(){
      const obj = loadJSON(LS.codesUsed, {});
      return (obj && typeof obj === "object") ? obj : {};
    }

    function saveUsedCodes(obj){
      saveJSON(LS.codesUsed, obj);
    }

    function getDeviceId(){
      let id = localStorage.getItem(LS.deviceId);
      if(!id){
        id = "dev_" + Math.random().toString(36).slice(2) + Date.now().toString(36);
        localStorage.setItem(LS.deviceId, id);
      }
      return id;
    }

    async function redeemOnServer(endpoint, apiKey, code){
      const body = {
        apiKey,
        code,
        deviceId: getDeviceId(),
        app: "roten",
        ts: Date.now()
      };

      const res = await fetch(endpoint, {
        method: "POST",
        body: JSON.stringify(body),
        cache: "no-store",
      });

      if(!res.ok){
        throw new Error("通信エラー: HTTP " + res.status);
      }

      const data = await res.json().catch(()=>null);
      if(!data || typeof data.ok !== "boolean"){
        throw new Error("サーバー応答不正");
      }
      return data;
    }

    function applyRedeemReward(reward){
      const inv = ensureInvKeys();

      const addColabo = Math.max(0, Math.floor(Number(reward?.seed_colabo || 0) || 0));
      const addAnniv  = Math.max(0, Math.floor(Number(reward?.seed_anniv  || 0) || 0));

      if(addColabo > 0){
        inv.seed["seed_colabo"] = Number(inv.seed["seed_colabo"]||0) + addColabo;
      }
      if(addAnniv > 0){
        inv.seed["seed_anniv"] = Number(inv.seed["seed_anniv"]||0) + addAnniv;
      }

      saveInv(inv);
      return { addedSeedColabo: addColabo, addedSeedAnniv: addAnniv };
    }

    async function runRedeemWithPick(pick, code, btnEl, inputEl){
      const c = String(code || "").trim().toUpperCase();
      if(!c){
        toastHype("シリアルが空…たこ。", {kind:"bad"});
        return;
      }

      const used = loadUsedCodes();
      const usedKey = `${pick}:${c}`;
      if(used[usedKey]){
        toastHype("このコードは（この端末では）使用済み…たこ。", {kind:"bad"});
        return;
      }

      if(btnEl) btnEl.disabled = true;

      try{
        const endpoint = (pick === "anniv") ? ANNIV_REDEEM_ENDPOINT : REDEEM_ENDPOINT;
        const apiKey   = (pick === "anniv") ? ANNIV_REDEEM_API_KEY  : REDEEM_API_KEY;

        const data = await redeemOnServer(endpoint, apiKey, c);
        if(!data.ok){
          toastHype(data.message || data.error || "無効なコード…たこ。", {kind:"bad"});
          return;
        }

        const reward = data.reward || data.grant || {};
        const applied = applyRedeemReward(reward);

        used[usedKey] = { at: Date.now(), payload: reward };
        saveUsedCodes(used);

        if(inputEl) inputEl.value = "";

        if(pick === "anniv"){
          pushLog(`シリアル（Anniv）：${c}（アニバーサリーのタネ +${applied.addedSeedAnniv}）`);
          toastHype(`✨ 成功！アニバーサリーのタネ +${applied.addedSeedAnniv} ✨`, {kind:"good"});
        }else{
          pushLog(`シリアル（ぐらたん）：${c}（コラボのタネ +${applied.addedSeedColabo}）`);
          toastHype(`✨ 成功！コラボのタネ +${applied.addedSeedColabo} ✨`, {kind:"good"});
        }

        refreshHUD();
        renderGoods();
        setTakopiSayRandom();
      }catch(e){
        toastHype("通信に失敗した…たこ。時間を置いてもう一度。", {kind:"bad"});
      }finally{
        if(btnEl) btnEl.disabled = false;
      }
    }

    function wireCardSerialInput(card, item){
      const pick = (item.id === "seed_anniv") ? "anniv" : "gratan";
      const input = $(".serialMiniInput", card);
      const btn   = $(".serialMiniBtn", card);
      if(!input || !btn) return;

      if(btn.dataset.wired === "1") return;
      btn.dataset.wired = "1";

      btn.addEventListener("click", (e)=>{
        e.preventDefault(); e.stopPropagation();
        runRedeemWithPick(pick, input.value, btn, input);
      });

      input.addEventListener("keydown", (e)=>{
        if(e.key === "Enter"){
          e.preventDefault(); e.stopPropagation();
          runRedeemWithPick(pick, input.value, btn, input);
        }
      });
    }

    function openAboutModal(){
      openModal("📘 タネ/ミズ/ヒリョウについて", `
        <div class="mikuji-wrap">
          <div class="note">
            ここは「仕様書」じゃなく、<b>引きを良くするための作戦メモ</b>…たこ。<br>
            ※最終的な抽選は “ファーム側の収穫ロジック” に従う…たこ。
          </div>

          <div class="inv-box">
            <div class="inv-title">🌱 タネ（何を育てるか）</div>
            <div class="note">
              <b>タネは「出るカードの候補（プール）」</b>を決める入口…たこ。<br>
              ・<b>なに出るタネ</b>：候補が広い（完全ランダム）<br>
              ・<b>店頭/回線タネ</b>：候補が“それっぽく”寄る（店頭/回線の気配）<br>

          </div>

          <div class="inv-box">
            <div class="inv-title">💧 ミズ（レア度の押し上げ）</div>
            <div class="note">
              <b>ミズは「レア抽選の上振れ」を起こす</b>役…たこ。<br>
              下ほど“期待が上がる”代わりに、財布が乾く…たこ。<br><br>

              ・<b>ただの水</b>：基準。<b>UR/LRは出ない</b>（安全）<br>
              ・<b>なんか良さそう</b>：少しだけ上振れ（初心者向け）<br>
              ・<b>怪しい水</b>：現実準拠の標準（普段の空気）<br>
              ・<b>やりすぎな水</b>：勝負。上振れを狙う水<br>
              ・<b>押さなきゃよかった水</b>：事件枠。<b>“強い結果”が出やすい</b>（SNS向け）
            </div>

          <div class="inv-box">

              ・<b>気のせい肥料</b>：時短5%（体感）<br>
              ・<b>根性論ぶち込み</b>：時短20%（急ぎたい人）<br>
              ・<b>工程すっ飛ばし</b>：時短40%（近道はだいたい罠）<br>
              ・<b>時間を信じない</b>：時短70%。<b>稀にドロドロ生焼け</b>（禁忌）

          </div>

          <div class="row">
            <button class="btn btn-ghost" id="okAbout" type="button">閉じる</button>
          </div>

      const root = document.getElementById("modalBody") || document;
      $("#okAbout", root)?.addEventListener("click", closeModal);
    }

    function placeAboutButton(){
      let btn = $("#btnOpenRates");
      if(!btn){
        btn = document.createElement("button");

      btn.textContent = "タネ/ミズ/ヒリョウについて";

      if(!wrap){
        wrap = document.createElement("div");

        btn.addEventListener("click", () => {
          $$(".goods-tab").forEach(b => b.classList.remove("is-active"));
          btn.classList.add("is-active");

      $("#btnDebugPlus100000")?.addEventListener("click", () => {
        addOcto(100000);
        pushLog("デバッグ：オクト +100000");
        refreshHUD();
        setTakopiSayRandom();

      $("#btnOpenInv")?.addEventListener("click", (e) => {
        e.preventDefault();
        e.stopPropagation();
        toastHype("📦 所持内訳は、上の 🌱/💧/🧪 をタップ…たこ。", {kind:"info"});

      $("#btnOpenRates")?.addEventListener("click", () => {

    function wireSellChoiceModal(){
      const openBtn = document.getElementById("btnOpenSell");
      const modal   = document.getElementById("sellChoice");
      const backBtn = document.getElementById("sellChoiceBack");

      if(!modal) return;

      function open(){
        modal.classList.add("is-open");
        modal.setAttribute("aria-hidden","false");
        document.documentElement.style.overflow = "hidden";
        document.body.style.overflow = "hidden";
      }

      function close(){
        modal.classList.remove("is-open");
        modal.setAttribute("aria-hidden","true");
        document.documentElement.style.overflow = "";
        document.body.style.overflow = "";
      }

      if(openBtn){
        openBtn.addEventListener("click", function(e){
          e.preventDefault();
          e.stopPropagation();
          if (e.stopImmediatePropagation) e.stopImmediatePropagation();
          open();
        }, true);
      }

      backBtn?.addEventListener("click", close);
      modal.addEventListener("click", (e)=>{ if(e.target === modal) close(); });
      document.addEventListener("keydown", (e)=>{ if(e.key === "Escape") close(); });
    }

    function wireLaunchPresentOverride(){
      const btn = document.getElementById("btnLaunchPresent");
      if(!btn) return;

      function toInt(v){
        const n = parseInt(String(v||"0").replace(/[^\d-]/g,""),10);
        return Number.isFinite(n) ? n : 0;
      }

      const CAND_KEYS = [
        "octo", "OCTO", "octoNow", "TRC_OCTO", "LS_OCTO",
        "tf_v1_octo", "tf_octo", "tf_v1_state", "TRC_STATE"
      ];

      function readOcto(){
        for(const k of CAND_KEYS){
          const raw = localStorage.getItem(k);
          if(raw == null) continue;

          if((raw.startsWith("{") && raw.endsWith("}")) || (raw.startsWith("[") && raw.endsWith("]"))){
            try{
              const obj = JSON.parse(raw);
              const candidates = [
                obj?.octo, obj?.OCTO, obj?.money, obj?.wallet,
                obj?.inv?.octo, obj?.player?.octo
              ];
              for(const c of candidates){
                if(Number.isFinite(Number(c))) return Number(c);
              }
            }catch(_){}
            continue;
          }

          const n = toInt(raw);
          if(n !== 0 || raw === "0") return n;
        }

        const el = document.getElementById("octoNow");
        if(el) return toInt(el.textContent);
        return 0;
      }

      function writeOcto(next){
        const el = document.getElementById("octoNow");
        if(el) el.textContent = String(next);

        for(const k of CAND_KEYS){
          const raw = localStorage.getItem(k);
          if(raw == null) continue;

          if((raw.startsWith("{") && raw.endsWith("}"))){
            try{
              const obj = JSON.parse(raw);
              if(typeof obj === "object" && obj){
                if("octo" in obj) obj.octo = next;
                else if("OCTO" in obj) obj.OCTO = next;
                else if(obj.inv && typeof obj.inv === "object" && ("octo" in obj.inv)) obj.inv.octo = next;
                else continue;
                localStorage.setItem(k, JSON.stringify(obj));
              }
            }catch(_){}
            continue;
          }

          const n = toInt(raw);
          if(n !== 0 || raw === "0"){
            localStorage.setItem(k, String(next));
          }
        }

        window.dispatchEvent(new CustomEvent("octo:changed", { detail: { octo: next } }));
      }

      btn.addEventListener("click", function(){
        setTimeout(function(){
          const cur = readOcto();
          const next = cur + 5000;
          writeOcto(next);

          const t = document.getElementById("toast");
          if(t){
            t.textContent = "🎁 公開記念プレゼント：+5000オクト！";
            t.classList.add("is-show");
            setTimeout(()=>t.classList.remove("is-show"), 1400);
          }
        }, 0);
      }, true);
    }

    function boot(){
      loadMonthlyStats();
      ensureToast();
      injectBuyRowCSS();
      ensureInvKeys();
      placeAboutButton();
      setTakopiSayRandom();
      wireModalClose();
      wireTabs();
      wireButtons();
      wireChipBreakdowns();
      wireSellChoiceModal();
      wireLaunchPresentOverride();
      refreshHUD();
      renderGoods();
      toastHype("✨ 露店 起動！…たこ。", {kind:"info"});
    }

    if(document.readyState === "loading"){
      document.addEventListener("DOMContentLoaded", boot, { once:true });
    }else{
      boot();
    }
  })();
