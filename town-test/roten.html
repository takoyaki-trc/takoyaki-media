<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>露店（たこぴのお店）</title>

  <style>
    :root{
      --bg:#0f1220;
      --panel:rgba(0,0,0,.38);
      --panel2:rgba(0,0,0,.52);
      --line:rgba(255,255,255,.14);
      --text:#fff;
      --muted:rgba(255,255,255,.72);
      --gold: rgba(255,210,124,.75);
      --shadow: 0 16px 45px rgba(0,0,0,.45);
      --radius:16px;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }

    body{
      margin:0;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans JP",sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .roten-header{
      position:sticky;
      top:0;
      z-index:50;
      background: linear-gradient(180deg, rgba(0,0,0,.55), rgba(0,0,0,0));
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .roten-head-inner{
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      padding:16px 14px 10px;
    }

    .roten-back{
      position:absolute;
      left:14px;
    }

    .roten-head-center{
      text-align:center;
    }

    .roten-title{ font-size:22px; font-weight:900; }
    .roten-sub{ margin-top:4px; color:var(--muted); font-size:12px; }

    .roten-app{
      padding:10px 12px 26px;
      max-width:980px;
      margin:0 auto;
    }

    .btn{
      appearance:none;
      -webkit-appearance:none;
      border-radius:14px;
      font-weight:900;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:10px 12px;
      background: linear-gradient(180deg,#273155,#1a2036);
      border:1px solid rgba(255,255,255,.15);
      color:#fff;
      transition:.15s;
    }

    .btn:active{
      transform:translateY(2px);
      filter:brightness(.9);
    }

    .btn-ghost{
      background: rgba(255,255,255,.06);
    }

    .buybtn{
      background: linear-gradient(180deg,#ffb347,#ff7a18);
      color:#2b1800;
      border:none;
      box-shadow:0 4px 0 #b85b12;
    }

    .buybtn:active{
      transform:translateY(3px);
      box-shadow:0 2px 0 #b85b12;
    }

    .hud{
      display:flex !important;
      align-items:flex-start !important;
      justify-content: space-between !important;
      gap:10px !important;
      padding:12px;
      border-radius:var(--radius);
      background:rgba(255,255,255,.05);
      margin-bottom: 12px;
    }

    .hud-left,
    .hud-right{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }

    .hud .hud-left{
      display:flex !important;
      flex-direction: row !important;
      align-items:center !important;
      gap:10px !important;
      flex-wrap: wrap !important;
      width:auto !important;
      min-width: 0 !important;
    }

    .hud .hud-left .hud-pill{
      width:auto !important;
      flex: 0 0 auto !important;
      white-space: nowrap !important;
      margin: 0 !important;
    }

    .hud .hud-right{
      flex: 0 0 auto !important;
      min-width: 0 !important;
    }

    .hud-pill{
      padding:8px 10px;
      border-radius:999px;
      background:rgba(0,0,0,.2);
      font-size:13px;
    }

    .hud-pill--big{
      font-size: 15px;
      font-weight: 900;
    }

    .hud-pill .num{
      font-size: 18px;
      font-weight: 1000;
    }

    .hud-pill b{
      font-size: 15px;
      margin: 0 4px 0 2px;
    }

    .shop-hero{
      margin-bottom: 12px;
    }

    .hero-card{
      display:grid;
      grid-template-columns: 140px 1fr;
      gap: 12px;
      padding: 12px;
      border-radius: 18px;
      background: rgba(255,255,255,.05);
      box-shadow: var(--shadow);
    }

    .hero-imgwrap{
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius: 16px;
      background: rgba(0,0,0,.18);
      min-height: 140px;
      overflow:hidden;
    }

    .hero-img{
      width: 100%;
      max-width: 120px;
      display:block;
    }

    .hero-dialog{
      min-width: 0;
    }

    .hero-name{
      font-size: 18px;
      font-weight: 1000;
      margin-bottom: 6px;
    }

    .hero-text{
      line-height: 1.6;
      color: rgba(255,255,255,.95);
      font-size: 14px;
    }

    .block{
      margin-top: 10px;
      padding: 12px;
      border-radius: var(--radius);
      background: rgba(255,255,255,.05);
    }

    .block-head{
      margin-bottom: 10px;
    }

    .block-title{
      font-size: 18px;
      font-weight: 1000;
      letter-spacing: .03em;
      writing-mode: horizontal-tb !important;
      text-orientation: mixed !important;
      white-space: nowrap !important;
      line-height: 1.1 !important;
    }

    .goods-tabs{
      position:sticky;
      top:64px;
      z-index:20;
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:8px;
      padding:8px 0;
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
    }

    .goods-tab{
      appearance:none;
      -webkit-appearance:none;
      border:1px solid rgba(255,255,255,.14);
      color:#fff;
      padding:12px;
      border-radius:14px;
      background:rgba(0,0,0,.18);
      font-weight:900;
      cursor:pointer;
    }

    .goods-tab.is-active{
      border:1px solid var(--gold);
      box-shadow: 0 0 0 1px rgba(255,210,124,.14) inset;
    }

    .goods-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
    }

    @media (min-width:860px){
      .goods-grid{ grid-template-columns:repeat(3,1fr); }
    }

    .good{
      border-radius:16px;
      background:rgba(0,0,0,.18);
      overflow:hidden;
      border:1px solid rgba(255,255,255,.08);
    }

    .good-top{
      display:grid;
      grid-template-columns:88px 1fr;
      gap:10px;
      padding:10px;
    }

    .good-img{
      width:88px;
      height:88px;
      border-radius:14px;
      background:rgba(0,0,0,.2);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      position: relative !important;
    }

    .good-img img{
      width:78px;
      image-rendering:pixelated;
      display:block;
    }

    .ownBadge{
      position:absolute;
      top: 6px;
      right: 6px;
      z-index: 2;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .02em;
      color: rgba(255,255,255,.95);
      background: rgba(0,0,0,.55);
      border: 1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
    }

    .miniTag{
      display:inline-flex;
      align-items:center;
      padding: 3px 8px;
      border-radius: 999px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.16);
      font-size: 11px;
      opacity:.9;
      margin-left: 6px;
      white-space: nowrap;
    }

    .good-name{
      font-weight:900;
      line-height:1.2;
    }

    .good-period{
      margin-top: 6px;
      font-size: 12px;
      color: rgba(255,255,255,.75);
      letter-spacing: .01em;
    }

    .good-desc{
      font-size:12px;
      color:var(--muted);
      line-height: 1.45;
      margin-top: 6px;
      word-break: break-word;
    }

    .good-fx{
      margin-top: 8px;
      font-size: 12px;
      color: rgba(255,255,255,.88);
      line-height: 1.45;
    }

    .good-row{
      display:flex;
      justify-content:space-between;
      padding:0 10px 10px;
    }

    .good-buy{
      width:100%;
    }

    .buybar{
      display:flex !important;
      flex-direction:row !important;
      align-items:center !important;
      justify-content:flex-end !important;
      gap:8px !important;
      flex-wrap:nowrap !important;
    }

    .qty{
      display:flex !important;
      align-items:center !important;
      gap:6px !important;
      flex: 0 0 auto !important;
    }

    .qtybtn{
      min-width: 38px !important;
      height: 38px !important;
      padding: 0 10px !important;
      border-radius: 12px !important;
      font-weight: 900 !important;
      font-size: 14px !important;
    }

    .qtyin{
      width: 56px !important;
      height: 38px !important;
      text-align:center !important;
      border-radius: 12px !important;
      border:1px solid rgba(255,255,255,.18) !important;
      background:rgba(0,0,0,.22) !important;
      color:#fff !important;
      font-weight:900 !important;
      font-size: 14px !important;
      outline:none;
    }

    .buybtn{
      height: 38px !important;
      min-width: 92px !important;
      border-radius: 12px !important;
      flex: 0 0 auto !important;
      white-space:nowrap !important;
      font-weight: 900 !important;
      font-size: 13px !important;
      padding: 0 12px !important;
    }

    .priceline{
      margin-top: 6px;
      font-size: 12px;
      color: rgba(255,255,255,.72);
      text-align:right;
      white-space: nowrap;
    }

    .priceline b{ color: rgba(255,255,255,.92); }

    .boothRow{
      display:flex;
      justify-content:flex-end;
      align-items:center;
      gap:8px;
      flex-wrap:nowrap;
    }

    .boothLink{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      height: 38px;
      min-width: 120px;
      padding: 0 12px;
      border-radius: 12px;
      border:1px solid rgba(255,255,255,.18);
      background: linear-gradient(135deg, rgba(127,208,255,.30), rgba(166,120,255,.24));
      color: rgba(255,255,255,.98);
      text-decoration: none;
      font-weight: 1000;
      white-space: nowrap;
      box-shadow: 0 10px 26px rgba(0,0,0,.35), 0 0 18px rgba(127,208,255,.08);
    }

    .roten-about-wrap{
      display:flex;
      justify-content:flex-end;
      align-items:center;
      gap:10px;
      width:100%;
      margin:0;
    }

    .roten-about-btn{
      height: 36px !important;
      padding: 0 12px !important;
      border-radius: 12px !important;
      font-weight: 900 !important;
      font-size: 12px !important;
      white-space: nowrap !important;
    }

    .modal{
      position:fixed;
      inset:0;
      display:none;
    }

    .modal.is-open{ display:block; }

    .modal__backdrop{
      position:absolute;
      inset:0;
      background: rgba(0,0,0,.58);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
    }

    .modal__sheet{
      position:absolute;
      left:50%;
      bottom:10px;
      transform:translateX(-50%);
      width:min(720px,96vw);
      max-height: min(84vh, 900px);
      border-radius:18px;
      background:rgba(20,28,40,.96);
      box-shadow: 0 24px 60px rgba(0,0,0,.55);
      border:1px solid rgba(255,255,255,.12);
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }

    .modal__grab{
      width:46px;
      height:5px;
      border-radius:999px;
      background: rgba(255,255,255,.22);
      margin:10px auto 4px;
      flex: 0 0 auto;
    }

    .modal__head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding: 8px 12px 10px;
      border-bottom:1px solid rgba(255,255,255,.10);
      flex: 0 0 auto;
    }

    .modal__title{
      font-size:16px;
      font-weight:1000;
      letter-spacing:.03em;
    }

    .modal__body{
      padding:14px;
      overflow:auto;
      -webkit-overflow-scrolling: touch;
    }

    .mikuji-wrap{
      display:grid;
      gap:12px;
    }

    .note{
      padding:12px 14px;
      border-radius:14px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      color:rgba(255,255,255,.92);
      line-height:1.6;
      font-size:13px;
    }

    .inv-box{
      padding:12px;
      border-radius:16px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.10);
    }

    .inv-title{
      font-weight:1000;
      font-size:14px;
      margin-bottom:10px;
      letter-spacing:.02em;
    }

    .inv-row{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      padding:10px 0;
      border-top:1px solid rgba(255,255,255,.08);
    }

    .inv-row:first-of-type{
      border-top:none;
      padding-top:0;
    }

    .inv-left{
      min-width:0;
    }

    .inv-name{
      font-weight:800;
      display:block;
      line-height:1.45;
    }

    .inv-memo{
      display:block;
      margin-top:4px;
      color:rgba(255,255,255,.66);
      font-size:12px;
      line-height:1.4;
    }

    .inv-right{
      white-space:nowrap;
      font-weight:1000;
      font-size:14px;
    }

    .row{
      display:flex;
      justify-content:flex-end;
      gap:8px;
      flex-wrap:wrap;
    }

    .sellChoice{
      position: fixed;
      inset: 0;
      z-index: 2147483646;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 14px;
      background: rgba(0,0,0,.72);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .sellChoice.is-open{ display:flex; }

    .sellChoice__panel{
      width: min(620px, 100%);
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(15,18,32,.88);
      box-shadow: 0 18px 44px rgba(0,0,0,.6);
      overflow: hidden;
    }

    .sellChoice__head{
      padding: 12px 12px 10px;
      border-bottom: 1px solid rgba(255,255,255,.10);
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 10px;
    }

    .sellChoice__back{
      height: 36px;
      padding: 0 12px;
      border-radius: 12px;
      font-weight: 900;
      border:1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.08);
      color:#fff;
      cursor:pointer;
    }

    .sellChoice__title{
      font-weight: 1000;
      letter-spacing: .04em;
      text-align:center;
      flex: 1;
    }

    .sellChoice__spacer{
      width: 88px;
      flex: 0 0 auto;
    }

    .sellChoice__desc{
      padding: 12px 14px 0;
      font-size: 13px;
      line-height: 1.45;
      opacity: .92;
    }

    .sellChoice__body{
      padding: 12px 14px 14px;
      display:grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .sellCard{
      display:block;
      border-radius: 16px;
      overflow:hidden;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.15);
      text-decoration:none;
      color: inherit;
      cursor: pointer;
    }

    .sellCard img{
      display:block;
      width: 100%;
      height: clamp(150px, 26vw, 220px);
      object-fit: cover;
    }

    @media (min-width: 740px){
      .sellCard img{
        height: auto !important;
        max-height: 320px !important;
        object-fit: contain !important;
        background: rgba(0,0,0,.18);
      }
    }

    .sellChoice__note{
      padding: 0 14px 14px;
      opacity: .82;
      font-size: 12px;
      line-height: 1.4;
    }

    #btnOpenInv{ display:none !important; }

    #toast{
      position:fixed !important;
      left:12px !important;
      right:12px !important;
      bottom: calc(14px + env(safe-area-inset-bottom)) !important;
      z-index: 2147483647 !important;
      pointer-events:none !important;
      opacity:0 !important;
      transform: translateY(10px) scale(.98) !important;
      transition: opacity .16s ease, transform .18s ease !important;
      padding: 14px 14px !important;
      border-radius: 14px !important;
      font-weight: 900 !important;
      letter-spacing: .02em !important;
      text-align:center !important;
      color:#fff !important;
      background: rgba(15,18,32,.92) !important;
      border:1px solid rgba(255,255,255,.16) !important;
      box-shadow: 0 18px 44px rgba(0,0,0,.55) !important;
      backdrop-filter: blur(6px) !important;
      -webkit-backdrop-filter: blur(6px) !important;
    }

    @media (max-width:520px){
      .hud{
        flex-direction:column !important;
      }

      .goods-grid{
        grid-template-columns:1fr;
      }

      .good-top{
        grid-template-columns:110px 1fr;
      }

      .good-img{
        width:110px;
        height:110px;
      }

      .good-img img{
        width:96px;
      }

      .buybtn{
        padding:12px 14px;
      }

      .hero-card{
        grid-template-columns: 1fr;
      }

      .hero-imgwrap{
        min-height: 120px;
      }

      .hero-img{
        max-width: 112px;
      }
    }

    @media (max-width:420px){
      .buybar{ gap:7px !important; }
      .buybtn{ min-width: 86px !important; }
      .qtyin{ width: 52px !important; }
    }

    @media (max-width:360px){
      .sellChoice__body{
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <header class="roten-header">
    <div class="roten-head-inner">
      <button class="btn btn-ghost roten-back" id="rotenBackBtn" type="button" aria-label="戻る">←戻る</button>

      <div class="roten-head-center">
        <div class="roten-title">露店</div>
        <div class="roten-sub">マイ露店 / たこぴのお店</div>
      </div>
    </div>
  </header>

  <main id="rotenApp" class="roten-app">
    <section class="hud">
      <div class="hud-left">
        <div class="hud-pill hud-pill--big">
          <span>🪙</span>
          <span class="num" id="octoNow">0</span>
        </div>

        <div class="hud-pill">
          <span>🌱</span><span>種</span><b id="chipSeed">0</b>
          <span>/</span>
          <span>💧</span><span>水</span><b id="chipWater">0</b>
          <span>/</span>
          <span>🧪</span><span>肥料</span><b id="chipFert">0</b>
        </div>
      </div>

      <div class="hud-right">
        <button class="btn btn-ghost" id="btnOpenInv" type="button">所持資材</button>
        <button class="btn btn-ghost roten-about-btn" id="btnOpenRates" type="button">タネ/ミズ/ヒリョウについて</button>
      </div>
    </section>

    <section class="shop-hero">
      <div class="hero-card">
        <div class="hero-imgwrap">
          <img class="hero-img" id="takopiHeroImg" src="https://ul.h3z.jp/0eBSeUBg.png" alt="たこぴ" />
        </div>

        <div class="hero-dialog">
          <div class="hero-name">たこぴ</div>
          <div class="hero-text" id="takopiSay">
            「いらっしゃい…たこ。<br>オクトで“未来”を買うの、すき…たこ？」
          </div>
        </div>
      </div>
    </section>

    <section class="block">
      <div class="block-head" style="display:flex; align-items:center; gap:10px;">
        <div class="block-title" style="flex:1;">購入</div>
      </div>

      <div class="goods-tabs" aria-label="資材タブ">
        <button class="goods-tab is-active" data-kind="seed" type="button">タネ🌱</button>
        <button class="goods-tab" data-kind="water" type="button">ミズ💧</button>
        <button class="goods-tab" data-kind="fert" type="button">ヒリョウ🧪</button>
      </div>

      <div class="goods-grid" id="goodsGrid"></div>
    </section>
  </main>

  <div id="toast" aria-live="polite"></div>

  <div class="modal" id="modal" aria-hidden="true">
    <div class="modal__backdrop" id="modalBg"></div>
    <div class="modal__sheet" role="dialog" aria-label="モーダル">
      <div class="modal__grab"></div>
      <div class="modal__head">
        <div class="modal__title" id="modalTitle">タイトル</div>
        <button class="btn modal__x" id="modalX" type="button">閉じる</button>
      </div>
      <div id="modalBody" class="modal__body"></div>
    </div>
  </div>

  <div class="sellChoice" id="sellChoice" aria-hidden="true">
    <div class="sellChoice__panel" role="dialog" aria-label="売り方をえらぶ">
      <div class="sellChoice__head">
        <button class="sellChoice__back" id="sellChoiceBack" type="button" aria-label="戻る">←戻る</button>
        <div class="sellChoice__title">売り方をえらぶ</div>
        <div class="sellChoice__spacer" aria-hidden="true"></div>
      </div>

      <div class="sellChoice__desc">
        <b>今すぐオクト化</b>する？ それとも <b>マイ露店でコツコツ販売</b>する？
      </div>

      <div class="sellChoice__body">
        <a class="sellCard" id="goInstantSell" href="sell.html" aria-label="たこぴに即売りへ">
          <img src="https://ul.h3z.jp/OY1i6zTs.png" alt="たこぴに即売り（換金）">
        </a>

        <a class="sellCard" id="goMyShopSell" href="https://takoyaki-trc.github.io/takoyaki-media/town/myshop.html" aria-label="マイ露店へ">
          <img src="https://ul.h3z.jp/03QxjNxa.png" alt="マイ露店で売る（たこ民に販売）">
        </a>
      </div>

      <div class="sellChoice__note">
        ※即売り＝すぐ換金（安定） / マイ露店＝たこ民にコツコツ販売（上振れ狙い）
      </div>
    </div>
  </div>

  <script>
    (() => {
      "use strict";

      const LS = {
        octo: "roten_v1_octo",
        inv: "tf_v1_inv",
        book: "tf_v1_book",
        log: "roten_v1_log",
        monthlyStats: "ttc_monthly_stats_v1"
      };

      const BOOTH_URL = "https://takoyaki-toreka.booth.pm/";

      const COLLAB_PERIOD = {
        seed_colabo: "シリアル専用ページで受け取り",
        seed_anniv:  "シリアル専用ページで受け取り"
      };

      const $  = (sel, root=document) => root.querySelector(sel);
      const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));

      function loadJSON(key, fallback){
        try{
          const raw = localStorage.getItem(key);
          if(!raw) return fallback;
          return JSON.parse(raw);
        }catch(e){
          return fallback;
        }
      }

      function saveJSON(key, obj){
        localStorage.setItem(key, JSON.stringify(obj));
      }

      function getOcto(){
        return Number(localStorage.getItem(LS.octo) || 0);
      }

      function setOcto(v){
        localStorage.setItem(LS.octo, String(Math.max(0, Math.floor(Number(v)||0))));
      }

      function addOcto(delta){
        setOcto(getOcto() + Number(delta || 0));
      }

      function invDefault(){
        return { ver:1, seed:{}, water:{}, fert:{} };
      }

      function loadInv(){
        const inv = loadJSON(LS.inv, invDefault());
        inv.seed  = inv.seed  || {};
        inv.water = inv.water || {};
        inv.fert  = inv.fert  || {};
        return inv;
      }

      function saveInv(inv){
        saveJSON(LS.inv, inv);
      }

      function calcBookOwned(){
        const book = loadJSON(LS.book, null);
        if(!book || !book.got) return 0;
        let total = 0;
        for(const k of Object.keys(book.got)){
          const c = Number(book.got[k]?.count || 0);
          if(c > 0) total += c;
        }
        return total;
      }

      function pushLog(msg){
        const a = loadJSON(LS.log, []);
        a.unshift({ t: Date.now(), msg });
        saveJSON(LS.log, a.slice(0, 80));
      }

      function absAssetUrl(path){
        try{
          return new URL(path, location.href).toString();
        }catch(_){
          return path;
        }
      }

      function getMonthKey(date = new Date()){
        return date.getFullYear() + "-" + String(date.getMonth() + 1).padStart(2, "0");
      }

      function defaultMonthlyStats(){
        return {
          monthKey: getMonthKey(),
          harvest: 0,
          sales: 0,
          fishing: 0,
          tower: 0
        };
      }

      function normalizeMonthlyStats(raw){
        const curMonth = getMonthKey();
        if(!raw || typeof raw !== "object") return defaultMonthlyStats();
        const monthKey = String(raw.monthKey || "");
        if(monthKey !== curMonth) return defaultMonthlyStats();

        return {
          monthKey: curMonth,
          harvest: Number(raw.harvest || 0),
          sales: Number(raw.sales || 0),
          fishing: Number(raw.fishing || 0),
          tower: Number(raw.tower || 0)
        };
      }

      function loadMonthlyStats(){
        try{
          const raw = localStorage.getItem(LS.monthlyStats);
          if(!raw){
            const def = defaultMonthlyStats();
            localStorage.setItem(LS.monthlyStats, JSON.stringify(def));
            return def;
          }
          const parsed = JSON.parse(raw);
          const norm = normalizeMonthlyStats(parsed);
          localStorage.setItem(LS.monthlyStats, JSON.stringify(norm));
          return norm;
        }catch(e){
          const def = defaultMonthlyStats();
          localStorage.setItem(LS.monthlyStats, JSON.stringify(def));
          return def;
        }
      }

      function saveMonthlyStats(stats){
        const norm = normalizeMonthlyStats(stats);
        localStorage.setItem(LS.monthlyStats, JSON.stringify(norm));
      }

      function addMonthlySales(amount = 0){
        const s = loadMonthlyStats();
        s.monthKey = getMonthKey();
        s.sales = Number(s.sales || 0) + Math.max(0, Number(amount || 0));
        saveMonthlyStats(s);
      }

      const SEEDS = [
        { id:"seed_random",  name:"なに出るタネ", desc:"何が育つかは完全ランダム。\n店主も知らない。", img:"https://ul.h3z.jp/gnyvP580.png", fx:"完全ランダム" },
        { id:"seed_shop",    name:"店頭タネ", desc:"店で生まれたタネ。\n店頭ナンバーを宿している。", img:"https://ul.h3z.jp/IjvuhWoY.png", fx:"店頭の気配" },
        { id:"seed_line",    name:"回線タネ", desc:"画面の向こうから届いたタネ。\nクリックすると芽が出る。", img:"https://ul.h3z.jp/AonxB5x7.png", fx:"回線由来" },
        { id:"seed_special", name:"たこぴのタネ", desc:"今はまだ何も起きない。\nそのうち何か起きる。", img:"https://ul.h3z.jp/29OsEvjf.png", fx:"待て" },
        { id:"seed_bussasari",      name:"ブッ刺さりタネ", desc:"心に刺さる。\n財布にも刺さる。", img:"https://ul.h3z.jp/MjWkTaU3.png", fx:"刺さり補正" },
        { id:"seed_namara_kawasar", name:"なまら買わさるタネ", desc:"気付いたら買ってる。\nレジ前の魔物。", img:"https://ul.h3z.jp/yiqHzfi0.png", fx:"買わさり圧" },
        { id:"seed_colabo",  name:"【コラボ】ぐらたんのタネ", desc:"専用ページでシリアル入力すると受け取れる。", img:"https://ul.h3z.jp/wbnwoTzm.png", fx:"シリアル専用" },
        { id:"seed_anniv",   name:"ハーフアニバーサリーのタネ", desc:"専用ページでシリアル入力すると受け取れる。", img: absAssetUrl("assets/images/anniversary/anv1.png"), fx:"シリアル専用" },
      ];

      const WATERS = [
        { id:"water_plain_free", name:"ただの水", desc:"無料・UR/LRなし。\n無課金の基準。", img:"https://ul.h3z.jp/13XdhuHi.png", fx:"基準（水）" },
        { id:"water_nice",       name:"なんか良さそうな水", desc:"ちょい上振れ・LRなし。\n初心者の背中押し。", img:"https://ul.h3z.jp/3z04ypEd.png", fx:"ちょい上振れ" },
        { id:"water_suspicious", name:"怪しい水", desc:"現実準拠・標準。\n実パックと同じ空気。", img:"https://ul.h3z.jp/wtCO9mec.png", fx:"標準（現実準拠）" },
        { id:"water_overdo",     name:"やりすぎな水", desc:"勝負水・現実より上。\n体感で強い。", img:"https://ul.h3z.jp/vsL9ggf6.png", fx:"勝負" },
        { id:"water_regret",     name:"押さなきゃよかった水", desc:"確定枠・狂気。\n事件製造機（SNS向け）", img:"https://ul.h3z.jp/L0nafMOp.png", fx:"事件" },
      ];

      const FERTS = [
        { id:"fert_agedama", name:"ただの揚げ玉", desc:"時短0。\n《焼きすぎたカード》率UP", img:"https://ul.h3z.jp/9p5fx53n.png", fx:"時短 0%" },
        { id:"fert_feel",    name:"気のせい肥料", desc:"早くなった気がする。\n気のせいかもしれない。", img:"https://ul.h3z.jp/XqFTb7sw.png", fx:"時短 5%" },
        { id:"fert_guts",    name:"根性論ぶち込み肥料", desc:"理由はない。\n気合いだ。", img:"https://ul.h3z.jp/bT9ZcNnS.png", fx:"時短 20%" },
        { id:"fert_skip",    name:"工程すっ飛ばし肥料", desc:"途中は、\n見なかったことにした。", img:"https://ul.h3z.jp/FqPzx12Q.png", fx:"時短 40%" },
        { id:"fert_timeno",  name:"時間を信じない肥料", desc:"最終兵器・禁忌。\n稀に《ドロドロ生焼けカード》", img:"https://ul.h3z.jp/l2njWY57.png", fx:"時短 90〜100%" },
      ];

      const PRICE = {
        seed_random: 100,
        seed_shop: 200,
        seed_line: 200,
        seed_special: 10000,
        seed_bussasari: 50000,
        seed_namara_kawasar: 30000,
        water_plain_free: 50,
        water_nice: 100,
        water_suspicious: 300,
        water_overdo: 500,
        water_regret: 200,
        fert_agedama: 50,
        fert_feel: 100,
        fert_guts: 150,
        fert_skip: 200,
        fert_timeno: 300,
      };

      const SERIAL_ONLY_SEEDS = new Set(["seed_colabo", "seed_anniv"]);

      function buildGoods(){
        const goods = [];
        for(const s of SEEDS){
          const isSerialOnly = SERIAL_ONLY_SEEDS.has(s.id);
          goods.push({
            kind:"seed",
            id:s.id,
            name:s.name,
            desc:s.desc,
            fx:s.fx,
            img:s.img,
            price: isSerialOnly ? null : (PRICE[s.id] ?? 18),
            buyable: !isSerialOnly,
            tag: isSerialOnly ? null : "販売"
          });
        }
        for(const w of WATERS){
          goods.push({ kind:"water", id:w.id, name:w.name, desc:w.desc, fx:w.fx, img:w.img, price:(PRICE[w.id] ?? 18), buyable:true, tag:"販売" });
        }
        for(const f of FERTS){
          goods.push({ kind:"fert", id:f.id, name:f.name, desc:f.desc, fx:f.fx, img:f.img, price:(PRICE[f.id] ?? 18), buyable:true, tag:"販売" });
        }
        return goods;
      }

      const GOODS = buildGoods();

      const SAY = [
        "「いらっしゃい…たこ。オクトで“未来”を買うの、すき…たこ？」",
        "「種は物語…水は運…肥料は代償…たこ。」",
        "「まとめ買い？……いいね。焼き台が“鳴く”たこ…」",
        "「買うボタンは“契約”…押した瞬間、世界が少し変わる…たこ。」"
      ];

      function getModalEls(){
        return {
          modal: document.getElementById("modal"),
          bg:    document.getElementById("modalBg"),
          x:     document.getElementById("modalX"),
          title: document.getElementById("modalTitle"),
          body:  document.getElementById("modalBody"),
        };
      }

      function forceModalStyle(modal){
        if(!modal) return;
        modal.style.setProperty("position","fixed","important");
        modal.style.setProperty("inset","0","important");
        modal.style.setProperty("z-index","2147483646","important");
        modal.style.setProperty("display","block","important");
        modal.style.setProperty("pointer-events","auto","important");
      }

      function openModal(title, html){
        const { modal, title:ttl, body } = getModalEls();
        if(!modal || !ttl || !body){
          toastHype("⚠️ modal要素が見つからない。", {kind:"bad"});
          return;
        }

        ttl.textContent = title || "メニュー";
        body.innerHTML = html || "";

        forceModalStyle(modal);
        modal.classList.add("is-open");
        modal.setAttribute("aria-hidden","false");

        requestAnimationFrame(() => {
          forceModalStyle(modal);
          modal.classList.add("is-open");
        });

        document.documentElement.style.overflow = "hidden";
        document.body.style.overflow = "hidden";
      }

      function closeModal(){
        const { modal, body } = getModalEls();
        if(!modal) return;

        modal.classList.remove("is-open");
        modal.setAttribute("aria-hidden","true");
        if(body) body.innerHTML = "";

        modal.style.removeProperty("display");
        modal.style.removeProperty("position");
        modal.style.removeProperty("inset");
        modal.style.removeProperty("z-index");
        modal.style.removeProperty("pointer-events");

        document.documentElement.style.overflow = "";
        document.body.style.overflow = "";
      }

      function wireModalClose(){
        const { bg, x } = getModalEls();
        bg?.addEventListener("click", closeModal);
        x?.addEventListener("click", closeModal);
        document.addEventListener("keydown", (e)=>{ if(e.key==="Escape") closeModal(); });
      }

      function ownedCount(inv, kind, id){
        return Number((inv[kind]||{})[id] || 0);
      }

      function totalKind(inv, kind){
        const bucket = inv[kind] || {};
        let total = 0;
        for(const k of Object.keys(bucket)) total += Number(bucket[k] || 0);
        return total;
      }

      function ensureInvKeys(){
        const inv = loadInv();
        inv.seed  = inv.seed  || {};
        inv.water = inv.water || {};
        inv.fert  = inv.fert  || {};
        for(const g of GOODS){
          if(!(g.id in inv[g.kind])) inv[g.kind][g.id] = 0;
        }
        saveInv(inv);
        return inv;
      }

      function setTakopiSayRandom(){
        const t = SAY[Math.floor(Math.random()*SAY.length)];
        const el = $("#takopiSay");
        if(el) el.innerHTML = t;
      }

      function refreshHUD(){
        const inv = ensureInvKeys();
        $("#octoNow").textContent = String(getOcto());
        $("#chipSeed").textContent  = String(totalKind(inv, "seed"));
        $("#chipWater").textContent = String(totalKind(inv, "water"));
        $("#chipFert").textContent  = String(totalKind(inv, "fert"));
      }

      function toastHype(text, opt={}){
        const el = $("#toast");
        if(!el) return;

        const kind = opt.kind || "info";
        el.textContent = text || "";

        if(kind === "good"){
          el.style.setProperty("border","1px solid rgba(159,255,168,.35)","important");
          el.style.setProperty("box-shadow","0 18px 44px rgba(0,0,0,.55), 0 0 22px rgba(159,255,168,.18)","important");
        }else if(kind === "bad"){
          el.style.setProperty("border","1px solid rgba(255,154,165,.38)","important");
          el.style.setProperty("box-shadow","0 18px 44px rgba(0,0,0,.55), 0 0 22px rgba(255,154,165,.16)","important");
        }else{
          el.style.setProperty("border","1px solid rgba(255,255,255,.16)","important");
          el.style.setProperty("box-shadow","0 18px 44px rgba(0,0,0,.55)","important");
        }

        clearTimeout(toastHype._t);
        el.style.opacity = "0";
        el.style.transform = "translateY(10px) scale(.98)";
        void el.offsetHeight;

        requestAnimationFrame(()=>{
          el.style.opacity = "1";
          el.style.transform = "translateY(0) scale(1)";
        });

        toastHype._t = setTimeout(()=>{
          el.style.opacity = "0";
          el.style.transform = "translateY(10px) scale(.98)";
        }, 1900);
      }

      function clamp(n, min, max){
        n = Math.floor(Number(n)||0);
        if(n < min) return min;
        if(n > max) return max;
        return n;
      }

      function buyMany(item, qty){
        qty = clamp(qty, 1, 99);
        const price = Math.max(0, Number(item.price||0));
        const total = price * qty;
        const octo = getOcto();
        if(octo < total) return { ok:false };

        const inv = ensureInvKeys();
        inv[item.kind] = inv[item.kind] || {};
        inv[item.kind][item.id] = Number(inv[item.kind][item.id] || 0) + qty;
        saveInv(inv);

        setOcto(octo - total);
        addMonthlySales(total);
        pushLog(`購入：${item.name} ×${qty} -${total}オクト`);

        refreshHUD();
        renderGoods();
        setTakopiSayRandom();
        return { ok:true, total, qty };
      }

      let currentKind = "seed";

      function renderGoods(){
        const inv = ensureInvKeys();
        const grid = $("#goodsGrid");
        if(!grid) return;

        const list = GOODS.filter(g => g.kind === currentKind);

        grid.innerHTML = list.map(g => {
          const own = String(ownedCount(inv, g.kind, g.id));
          const canBuy = !!g.buyable;
          const badge = g.tag ? `<span class="miniTag">${g.tag}</span>` : "";
          const isSerialSeed = (g.kind === "seed" && SERIAL_ONLY_SEEDS.has(g.id));
          const periodLine = isSerialSeed ? `<div class="good-period">${COLLAB_PERIOD[g.id] || ""}</div>` : "";
          const priceLine = canBuy ? `<div class="priceline">単価 <b>${g.price}</b> オクト</div>` : ``;

          const buyBar = canBuy ? `
            <div class="buybar">
              <div class="qty">
                <button class="btn qtybtn qtyminus" type="button">−</button>
                <input class="qtyin" type="number" inputmode="numeric" min="1" max="99" value="1">
                <button class="btn qtybtn qtyplus" type="button">＋</button>
              </div>
              <button class="btn buybtn" type="button">買う</button>
            </div>
            ${priceLine}
          ` : `
            <div class="boothRow">
              <a class="boothLink" href="./serial.html">シリアル入力へ</a>
            </div>
          `;

          return `
            <article class="good" data-kind="${g.kind}" data-id="${g.id}">
              <div class="good-top">
                <div class="good-img">
                  <span class="ownBadge">×<b>${own}</b></span>
                  <img src="${g.img}" alt="${g.name}" loading="lazy">
                </div>
                <div class="good-meta">
                  <div class="good-name">${g.name} ${badge}</div>
                  ${periodLine}
                  <div class="good-desc">${(g.desc||"").replace(/\n/g,"<br>")}</div>
                  <div class="good-fx">${g.fx ? `効果：<b>${g.fx}</b>` : ""}</div>
                </div>
              </div>
              <div class="good-row">
                <div class="good-buy">${buyBar}</div>
              </div>
            </article>
          `;
        }).join("");

        $$(".good", grid).forEach(card => {
          const kind = card.getAttribute("data-kind");
          const id   = card.getAttribute("data-id");
          const item = GOODS.find(x => x.kind===kind && x.id===id);
          if(!item || !item.buyable) return;

          const btn   = $(".buybtn", card);
          const minus = $(".qtyminus", card);
          const plus  = $(".qtyplus", card);
          const qtyIn = $(".qtyin", card);

          function getQty(){
            return clamp(Number(qtyIn.value || 1), 1, 99);
          }

          function setQty(v){
            qtyIn.value = String(clamp(v, 1, 99));
          }

          minus?.addEventListener("click", (e)=>{
            e.preventDefault();
            setQty(getQty() - 1);
          });

          plus?.addEventListener("click", (e)=>{
            e.preventDefault();
            setQty(getQty() + 1);
          });

          qtyIn?.addEventListener("input", ()=>{
            setQty(getQty());
          });

          btn?.addEventListener("click", (e)=>{
            e.preventDefault();
            const qty = getQty();
            const r = buyMany(item, qty);
            if(!r.ok){
              toastHype("💥 オクトが足りない。", {kind:"bad"});
              return;
            }
            toastHype(`✨ 購入完了！「${item.name}」×${r.qty}（-${r.total}オクト）✨`, {kind:"good"});
          });
        });
      }

      function openBreakdownModal(kindKey){
        const inv = ensureInvKeys();
        const titleMap = { seed:"🌱 種の内訳", water:"💧 水の内訳", fert:"🧪 肥料の内訳" };
        const items = GOODS.filter(g => g.kind === kindKey);

        const rows = items.map(g => {
          const c = String(ownedCount(inv, g.kind, g.id));
          let memo = "";
          if(!g.buyable && g.id==="seed_colabo") memo = "（専用シリアルページ）";
          if(!g.buyable && g.id==="seed_anniv")  memo = "（専用シリアルページ）";
          return `
            <div class="inv-row">
              <div class="inv-left">
                <span class="inv-name">${g.name}</span>
                <span class="inv-memo">${memo}</span>
              </div>
              <div class="inv-right">×<b>${c}</b></div>
            </div>
          `;
        }).join("");

        openModal(titleMap[kindKey], `
          <div class="mikuji-wrap">
            <div class="inv-box">
              <div class="inv-title">${titleMap[kindKey]}</div>
              ${rows || `<div class="note">まだ何もない。</div>`}
            </div>
            <div class="row">
              <button class="btn btn-ghost" id="okBreakdown" type="button">閉じる</button>
            </div>
          </div>
        `);

        $("#okBreakdown", document.getElementById("modalBody"))?.addEventListener("click", closeModal);
      }

      function wireChipBreakdowns(){
        $("#chipSeed")?.addEventListener("click", () => { openBreakdownModal("seed"); setTakopiSayRandom(); });
        $("#chipWater")?.addEventListener("click", () => { openBreakdownModal("water"); setTakopiSayRandom(); });
        $("#chipFert")?.addEventListener("click", () => { openBreakdownModal("fert"); setTakopiSayRandom(); });
      }

      function openAboutModal(){
        openModal("📘 タネ/ミズ/ヒリョウについて", `
          <div class="mikuji-wrap">
            <div class="note">
              ここは「仕様書」じゃなく、<b>引きを良くするための作戦メモ</b>。<br>
              ※最終的な抽選はファーム側の収穫ロジックに従います。
            </div>

            <div class="inv-box">
              <div class="inv-title">🌱 タネ（何を育てるか）</div>
              <div class="note">
                <b>タネは「出るカードの候補」</b>を決める入口。<br>
                ・<b>なに出るタネ</b>：候補が広い（完全ランダム）<br>
                ・<b>店頭/回線タネ</b>：候補がそれっぽく寄る<br>

                ・<b>コラボ/アニバーサリー</b>：<b>専用シリアルページで受け取り</b>
              </div>
            </div>

            <div class="inv-box">
              <div class="inv-title">💧 ミズ（レア度の押し上げ）</div>
              <div class="note">
                ・<b>ただの水</b>：基準。UR/LRは出ない<br>
                ・<b>なんか良さそう</b>：少しだけ上振れ<br>
                ・<b>怪しい水</b>：現実準拠の標準<br>
                ・<b>やりすぎな水</b>：勝負水<br>
                ・<b>押さなきゃよかった水</b>：事件枠
              </div>
            </div>

            <div class="inv-box">
              <div class="inv-title">🧪 ヒリョウ（時間/事故率の調整）</div>
              <div class="note">
                ・<b>ただの揚げ玉</b>：時短0<br>
                ・<b>気のせい肥料</b>：時短5%<br>
                ・<b>根性論ぶち込み</b>：時短20%<br>
                ・<b>工程すっ飛ばし</b>：時短40%<br>
                ・<b>時間を信じない</b>：強いが禁忌
              </div>
            </div>

            <div class="row">
              <button class="btn btn-ghost" id="okAbout" type="button">閉じる</button>
            </div>
          </div>
        `);

        $("#okAbout", document.getElementById("modalBody"))?.addEventListener("click", closeModal);
      }

      function wireTabs(){
        $$(".goods-tab").forEach(btn => {
          btn.addEventListener("click", () => {
            $$(".goods-tab").forEach(b => b.classList.remove("is-active"));
            btn.classList.add("is-active");
            currentKind = btn.getAttribute("data-kind") || "seed";
            renderGoods();
          });
        });
      }

      function wireButtons(){
        $("#btnOpenRates")?.addEventListener("click", () => {
          openAboutModal();
          setTakopiSayRandom();
        });

        $("#rotenBackBtn")?.addEventListener("click", () => {
          if(history.length > 1){
            history.back();
          }else{
            location.href = "./index.html";
          }
        });
      }

      function wireSellChoiceModal(){
        const openBtn = document.getElementById("btnOpenSell");
        const modal   = document.getElementById("sellChoice");
        const backBtn = document.getElementById("sellChoiceBack");

        if(!modal) return;

        function open(){
          modal.classList.add("is-open");
          modal.setAttribute("aria-hidden","false");
          document.documentElement.style.overflow = "hidden";
          document.body.style.overflow = "hidden";
        }

        function close(){
          modal.classList.remove("is-open");
          modal.setAttribute("aria-hidden","true");
          document.documentElement.style.overflow = "";
          document.body.style.overflow = "";
        }

        if(openBtn){
          openBtn.addEventListener("click", function(e){
            e.preventDefault();
            e.stopPropagation();
            open();
          }, true);
        }

        backBtn?.addEventListener("click", close);
        modal.addEventListener("click", (e)=>{ if(e.target === modal) close(); });
      }

      function boot(){
        loadMonthlyStats();
        ensureInvKeys();
        setTakopiSayRandom();
        wireModalClose();
        wireTabs();
        wireButtons();
        wireChipBreakdowns();
        wireSellChoiceModal();
        refreshHUD();
        renderGoods();
        toastHype("✨ 露店 起動！", {kind:"info"});
      }

      if(document.readyState === "loading"){
        document.addEventListener("DOMContentLoaded", boot, { once:true });
      }else{
        boot();
      }
    })();
  </script>
</body>
</html>
