<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>たこぴのお店</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">

  <style>
    :root{
      --paper1:#fffdf7;
      --paper2:#f5ead7;
      --paper3:#ead8bd;

      --gold1:#fff4c7;
      --gold2:#f1d78b;
      --gold3:#c89a3b;
      --gold4:#8d5a1f;

      --wood1:#8e552a;
      --wood2:#6c3d1c;
      --wood3:#4d2914;

      --text:#fff8eb;
      --muted:rgba(255,248,235,.78);
      --ink:#4a2a12;
      --shadow:0 16px 45px rgba(0,0,0,.45);
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }

    body{
      margin:0;
      color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans JP",sans-serif;
      background:
        radial-gradient(1200px 520px at 50% -10%, rgba(255,205,112,.18), transparent 48%),
        linear-gradient(180deg, #1f5d4b 0%, #154538 36%, #103329 100%);
      background-attachment: fixed;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(rgba(255,255,255,.025), rgba(255,255,255,0)),
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,.018) 0 2px,
          transparent 2px 48px
        );
      opacity:.28;
    }

    .roten-header{
      position:sticky;
      top:0;
      z-index:50;
      padding:8px 12px 6px;
      background:linear-gradient(180deg, rgba(8,23,19,.78), rgba(8,23,19,.24));
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom:1px solid rgba(255,255,255,.08);
      isolation:isolate;
    }

    .roten-head-inner{
      position:relative;
      display:grid;
      grid-template-columns:72px 1fr 108px;
      align-items:center;
      gap:8px;
      min-height:68px;
      padding:7px 8px;
      border-radius:16px;
      background:
        linear-gradient(180deg, rgba(255,244,210,.10), rgba(255,255,255,.04)),
        linear-gradient(180deg, var(--wood1), var(--wood2) 54%, var(--wood3));
      border:2px solid rgba(248,214,139,.45);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.18),
        inset 0 0 0 2px rgba(255,237,194,.08),
        0 12px 28px rgba(0,0,0,.28);
      overflow:hidden;
    }

    .roten-head-inner::before{
      content:"";
      position:absolute;
      inset:5px;
      border-radius:11px;
      border:1px solid rgba(255,240,210,.14);
      pointer-events:none;
    }

    .roten-back-wrap,
    .header-farm-wrap{
      display:flex;
      align-items:center;
    }

    .roten-back-wrap{ justify-content:flex-start; }
    .header-farm-wrap{ justify-content:flex-end; }

    .roten-head-center{
      text-align:center;
      min-width:0;
      padding:0 2px;
    }

    .roten-title{
      font-size:24px;
      font-weight:1000;
      letter-spacing:.04em;
      line-height:1.02;
      color:#fff9ea;
      text-shadow:
        0 2px 0 rgba(74,41,13,.9),
        0 0 18px rgba(255,219,138,.14);
    }

    .roten-sub{
      margin-top:3px;
      color:rgba(255,245,224,.9);
      font-size:11px;
      letter-spacing:.04em;
      font-weight:700;
      text-shadow:0 1px 0 rgba(0,0,0,.24);
    }

    .btn{
      appearance:none;
      -webkit-appearance:none;
      border:none;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      text-decoration:none;
      transition:transform .15s ease, filter .15s ease;
      font-weight:900;
      font-family:inherit;
      touch-action:manipulation;
      -webkit-tap-highlight-color:transparent;
      user-select:none;
    }

    .btn:active{
      transform:translateY(2px);
      filter:brightness(.98);
    }

    .headlux-btn{
      position:relative;
      min-height:50px;
      padding:0 10px;
      border-radius:12px;
      color:#7a541e;
      background:
        radial-gradient(circle at 50% 16%, rgba(255,255,255,.72), rgba(255,255,255,0) 48%),
        linear-gradient(180deg, #fff7d6 0%, #efd68a 55%, #ddb85d 100%);
      border:2px solid rgba(255,242,204,.95);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,.8),
        inset 0 -2px 0 rgba(163,110,33,.22),
        0 4px 0 rgba(146,94,27,.56),
        0 10px 20px rgba(0,0,0,.16);
      white-space:nowrap;
    }

    .headlux-btn::before{
      content:"";
      position:absolute;
      inset:5px;
      border-radius:8px;
      border:1px solid rgba(255,248,227,.9);
      box-shadow:inset 0 0 0 1px rgba(217,171,77,.35);
      pointer-events:none;
    }

    .headlux-btn:hover{
      filter:brightness(1.03);
    }

    .roten-back{
      min-width:52px;
      padding:0 8px;
      font-size:22px;
      line-height:1;
    }

    .farm-go{
      min-width:96px;
      padding:0 8px;
      flex-direction:column;
      gap:1px;
      text-align:center;
      line-height:1.05;
    }

    .farm-go-main{
      font-size:14px;
      font-weight:700;
      letter-spacing:.01em;
    }

    .farm-go-sub{
      font-size:9px;
      font-weight:700;
      color:#9a7230;
    }

    .roten-app{
      max-width:980px;
      margin:0 auto;
      padding:12px 12px 28px;
    }

    .hud{
      display:flex;
      align-items:flex-start;
      justify-content:flex-start;
      gap:10px;
      padding:12px;
      border-radius:14px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03)),
        linear-gradient(180deg, rgba(82,48,29,.86), rgba(53,29,19,.92));
      border:1px solid rgba(255,255,255,.08);
      box-shadow:var(--shadow);
      margin-bottom:12px;
      position:relative;
      z-index:1;
    }

    .hud-line{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
      width:100%;
      flex-wrap:wrap;
    }

    .hud-money{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      border-radius:999px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.1), rgba(255,255,255,.03)),
        rgba(0,0,0,.18);
      border:1px solid rgba(255,255,255,.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
      font-weight:1000;
      white-space:nowrap;
      flex:0 0 auto;
    }

    .hud-money .money-num{
      font-size:18px;
      line-height:1;
    }

    .hud-resources{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      border-radius:999px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.03)),
        rgba(0,0,0,.16);
      border:1px solid rgba(255,255,255,.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
      font-size:13px;
      font-weight:900;
      white-space:nowrap;
      min-width:0;
      cursor:pointer;
      user-select:none;
      touch-action:manipulation;
      -webkit-tap-highlight-color:transparent;
    }

    .hud-resources b{
      font-size:14px;
    }

    .shop-hero{
      margin-bottom:14px;
      position:relative;
      z-index:1;
    }

    .hero-card{
      display:block;
      border-radius:14px;
      overflow:hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03)),
        linear-gradient(180deg, rgba(76,47,34,.95), rgba(48,29,20,.98));
      border:1px solid rgba(255,255,255,.08);
      box-shadow:var(--shadow);
    }

    .hero-imgwrap{
      position:relative;
      width:100%;
      background:
        radial-gradient(circle at 20% 18%, rgba(255,226,136,.28), transparent 26%),
        radial-gradient(circle at 82% 16%, rgba(255,182,116,.16), transparent 20%),
        linear-gradient(180deg, #784729 0%, #4d2f20 55%, #342116 100%);
      border-bottom:1px solid rgba(255,255,255,.08);
      overflow:hidden;
    }

    .hero-imgwrap::after{
      content:"";
      position:absolute;
      inset:auto 0 0 0;
      height:22%;
      background:
        linear-gradient(180deg, rgba(0,0,0,0), rgba(0,0,0,.18)),
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,.03) 0 18px,
          rgba(0,0,0,.03) 18px 36px
        );
      pointer-events:none;
    }

    .hero-img{
      display:block;
      width:100%;
      height:auto;
      object-fit:cover;
      min-height:240px;
      max-height:360px;
    }

    .hero-dialog{
      position:relative;
      margin:0;
      padding:12px 12px 14px;
      background:transparent;
      min-width:0;
    }

    .hero-bubble{
      position:relative;
      background: linear-gradient(180deg, var(--paper1), var(--paper2));
      border:3px solid #e0d0ab;
      border-radius:16px;
      min-height:126px;
      padding:42px 16px 16px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.85),
        0 8px 18px rgba(0,0,0,.18);
    }

    .hero-badge{
      position:absolute;
      left:16px;
      top:12px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:68px;
      height:26px;
      padding:0 10px;
      border-radius:7px;
      background:
        linear-gradient(180deg, #7a4b22, #5a3215);
      border:1px solid rgba(255,236,204,.25);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.15),
        0 4px 10px rgba(0,0,0,.14);
      color:#fff8ed;
      font-family:"DotGothic16", system-ui, sans-serif;
      font-size:12px;
      letter-spacing:.03em;
      line-height:1;
    }

    .hero-text{
      font-family:"DotGothic16", system-ui, sans-serif;
      line-height:1.85;
      color:var(--ink);
      font-size:14px;
      letter-spacing:.03em;
      text-shadow:none;
      word-break:break-word;
    }

    .block{
      margin-top:10px;
      padding:12px;
      border-radius:14px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03)),
        linear-gradient(180deg, rgba(78,47,31,.92), rgba(47,27,18,.95));
      border:1px solid rgba(255,255,255,.08);
      box-shadow:var(--shadow);
      position:relative;
      z-index:1;
    }

    .block-head{
      margin-bottom:10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:nowrap;
    }

    .block-title{
      font-size:19px;
      font-weight:1000;
      letter-spacing:.05em;
      white-space:nowrap !important;
      line-height:1.1 !important;
      flex:0 0 auto;
    }

    .block-actions{
      display:flex;
      align-items:center;
      gap:8px;
      flex:0 0 auto;
      margin-left:auto;
    }

    .about-btn{
      min-height:38px;
      padding:0 14px;
      border-radius:10px;
      font-size:12px;
      white-space:nowrap;
      color:#fff6e6;
      background:
        linear-gradient(180deg, rgba(255,238,164,.24), rgba(255,255,255,.05)),
        linear-gradient(180deg, #7b542b, #5c381d);
      border:1px solid rgba(255,227,138,.42);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.18),
        0 8px 18px rgba(0,0,0,.2);
    }

    .goods-tabs{
      position:sticky;
      top:74px;
      z-index:20;
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:8px;
      padding:8px 0;
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      isolation:isolate;
    }

    .goods-tab{
      appearance:none;
      -webkit-appearance:none;
      border:1px solid rgba(255,255,255,.12);
      color:#f0e1cb;
      padding:12px;
      border-radius:10px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.015)),
        linear-gradient(180deg, #513522, #3a2417);
      font-weight:900;
      cursor:pointer;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.05),
        0 6px 14px rgba(0,0,0,.16);
      transition:.15s ease;
      opacity:.82;
      touch-action:manipulation;
      -webkit-tap-highlight-color:transparent;
    }

    .goods-tab:hover{
      opacity:.95;
    }

    .goods-tab.is-active{
      color:#fffdf4;
      opacity:1;
      transform:translateY(-1px);
      border:2px solid rgba(255,231,149,.92);
      background:
        linear-gradient(180deg, rgba(255,246,202,.22), rgba(255,255,255,.06)),
        linear-gradient(180deg, #936133, #694120);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.16),
        0 0 0 2px rgba(255,209,109,.18),
        0 0 18px rgba(255,217,128,.24),
        0 8px 18px rgba(0,0,0,.22);
      text-shadow:0 1px 0 rgba(0,0,0,.22);
    }

    .goods-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
      position:relative;
      z-index:1;
    }

    @media (min-width:860px){
      .goods-grid{ grid-template-columns:repeat(3,1fr); }
    }

    .good{
      border-radius:12px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03)),
        linear-gradient(180deg, rgba(90,54,33,.96), rgba(60,35,22,.98));
      overflow:hidden;
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 10px 24px rgba(0,0,0,.2);
      transition:transform .18s ease, box-shadow .18s ease, filter .18s ease;
      position:relative;
      z-index:1;
    }

    .good.is-bought{
      animation:goodBoughtFlash .7s ease;
    }

    @keyframes goodBoughtFlash{
      0%{
        transform:scale(1);
        box-shadow:0 10px 24px rgba(0,0,0,.2), 0 0 0 rgba(255,214,115,0);
        filter:brightness(1);
      }
      35%{
        transform:scale(1.025);
        box-shadow:0 10px 24px rgba(0,0,0,.2), 0 0 26px rgba(255,214,115,.45);
        filter:brightness(1.08);
      }
      100%{
        transform:scale(1);
        box-shadow:0 10px 24px rgba(0,0,0,.2), 0 0 0 rgba(255,214,115,0);
        filter:brightness(1);
      }
    }

    .good-top{
      display:grid;
      grid-template-columns:88px 1fr;
      gap:10px;
      padding:10px;
    }

    .good-img{
      width:88px;
      height:88px;
      border-radius:10px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02)),
        rgba(0,0,0,.18);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      position:relative !important;
      border:1px solid rgba(255,255,255,.08);
    }

    .good-img img{
      width:78px;
      image-rendering:pixelated;
      display:block;
      pointer-events:none;
      user-select:none;
      -webkit-user-drag:none;
    }

    .ownBadge{
      position:absolute;
      top:6px;
      right:6px;
      z-index:2;
      padding:4px 8px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
      letter-spacing:.02em;
      color:#fff;
      background:rgba(0,0,0,.56);
      border:1px solid rgba(255,255,255,.18);
      backdrop-filter:blur(4px);
      -webkit-backdrop-filter:blur(4px);
      pointer-events:none;
      user-select:none;
      white-space:nowrap;
    }

    .miniTag{
      display:inline-flex;
      align-items:center;
      padding:3px 8px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(0,0,0,.16);
      font-size:11px;
      opacity:.92;
      margin-left:6px;
      white-space:nowrap;
    }

    .good-name{
      font-weight:1000;
      line-height:1.25;
      letter-spacing:.02em;
    }

    .good-desc{
      font-size:12px;
      color:var(--muted);
      line-height:1.48;
      margin-top:6px;
      word-break:break-word;
    }

    .good-fx{
      margin-top:8px;
      font-size:12px;
      color:rgba(255,255,255,.9);
      line-height:1.45;
    }

    .good-row{
      display:flex;
      justify-content:space-between;
      padding:0 10px 10px;
      position:relative;
      z-index:1;
    }

    .good-buy{
      width:100%;
      position:relative;
      z-index:1;
    }

    .buybar{
      display:flex !important;
      flex-direction:row !important;
      align-items:center !important;
      justify-content:flex-end !important;
      gap:8px !important;
      flex-wrap:nowrap !important;
      position:relative;
      z-index:1;
    }

    .qty{
      display:flex !important;
      align-items:center !important;
      gap:6px !important;
      flex:0 0 auto !important;
    }

    .qtybtn{
      min-width:38px !important;
      height:38px !important;
      padding:0 10px !important;
      border-radius:10px !important;
      font-weight:900 !important;
      font-size:14px !important;
      color:#fff8e8;
      background:
        linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.05)),
        linear-gradient(180deg, #6d4a2c, #4e311b);
      border:1px solid rgba(255,255,255,.14);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.12),
        0 8px 18px rgba(0,0,0,.24);
    }

    .qtyin{
      width:56px !important;
      height:38px !important;
      text-align:center !important;
      border-radius:10px !important;
      border:1px solid rgba(255,255,255,.16) !important;
      background:rgba(0,0,0,.18) !important;
      color:#fff !important;
      font-weight:900 !important;
      font-size:14px !important;
      outline:none;
      appearance:textfield;
      -moz-appearance:textfield;
    }

    .qtyin::-webkit-outer-spin-button,
    .qtyin::-webkit-inner-spin-button{
      -webkit-appearance:none;
      margin:0;
    }

    .buybtn{
      height:38px !important;
      min-width:92px !important;
      border-radius:10px !important;
      flex:0 0 auto !important;
      white-space:nowrap !important;
      font-weight:900 !important;
      font-size:13px !important;
      padding:0 12px !important;
      color:#3b2209;
      background:linear-gradient(180deg, #ffd885, #ef9d39);
      border:1px solid rgba(255,255,255,.18);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.24),
        0 4px 0 #9b5a18,
        0 10px 22px rgba(0,0,0,.24);
    }

    .buybtn:active{
      transform:translateY(3px);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.24),
        0 2px 0 #9b5a18,
        0 8px 18px rgba(0,0,0,.2);
    }

    .priceline{
      margin-top:6px;
      font-size:12px;
      color:rgba(255,255,255,.76);
      text-align:right;
      white-space:nowrap;
    }

    .priceline b{
      color:rgba(255,255,255,.96);
    }

    .modal{
      position:fixed;
      inset:0;
      display:none;
      pointer-events:none;
    }

    .modal.is-open{
      display:block;
      pointer-events:auto;
    }

    .modal__backdrop{
      position:absolute;
      inset:0;
      background:rgba(0,0,0,.58);
      backdrop-filter:blur(5px);
      -webkit-backdrop-filter:blur(5px);
    }

    .modal__sheet{
      position:absolute;
      left:50%;
      bottom:10px;
      transform:translateX(-50%);
      width:min(720px,96vw);
      max-height:min(84vh, 900px);
      border-radius:12px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03)),
        linear-gradient(180deg, #5d3720, #402515);
      box-shadow:0 24px 60px rgba(0,0,0,.55);
      border:1px solid rgba(255,255,255,.12);
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }

    .modal__grab{
      width:46px;
      height:5px;
      border-radius:999px;
      background:rgba(255,255,255,.22);
      margin:10px auto 4px;
      flex:0 0 auto;
    }

    .modal__head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:8px 12px 10px;
      border-bottom:1px solid rgba(255,255,255,.10);
      flex:0 0 auto;
    }

    .modal__title{
      font-size:16px;
      font-weight:1000;
      letter-spacing:.03em;
    }

    .modal__body{
      padding:14px;
      overflow:auto;
      -webkit-overflow-scrolling:touch;
    }

    .mikuji-wrap{
      display:grid;
      gap:12px;
    }

    .note{
      padding:12px 14px;
      border-radius:10px;
      background:rgba(255,250,235,.1);
      border:1px solid rgba(255,255,255,.10);
      color:rgba(255,248,235,.95);
      line-height:1.65;
      font-size:13px;
    }

    .inv-box{
      padding:12px;
      border-radius:10px;
      background:rgba(255,255,255,.06);

  <script>
    (() => {
      "use strict";

      const LS = {
        octo: "roten_v1_octo",
        inv: "tf_v1_inv",
        log: "roten_v1_log",
        monthlyStats: "ttc_monthly_stats_v1"
      };

      const $  = (sel, root=document) => root.querySelector(sel);
      const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));

      function loadJSON(key, fallback){
        try{
          const raw = localStorage.getItem(key);
          if(!raw) return fallback;
          return JSON.parse(raw);
        }catch(e){
          return fallback;
        }
      }

      function saveJSON(key, obj){
        localStorage.setItem(key, JSON.stringify(obj));
      }

      function getOcto(){
        return Number(localStorage.getItem(LS.octo) || 0);
      }

      function setOcto(v){
        localStorage.setItem(LS.octo, String(Math.max(0, Math.floor(Number(v) || 0))));
      }

      function invDefault(){
        return { ver:1, seed:{}, water:{}, fert:{} };
      }

      function loadInv(){
        const inv = loadJSON(LS.inv, invDefault());
        inv.seed  = inv.seed  || {};
        inv.water = inv.water || {};
        inv.fert  = inv.fert  || {};
        return inv;
      }

      function saveInv(inv){
        saveJSON(LS.inv, inv);
      }

      function pushLog(msg){
        const a = loadJSON(LS.log, []);
        a.unshift({ t: Date.now(), msg });
        saveJSON(LS.log, a.slice(0, 80));
      }

      function getMonthKey(date = new Date()){
        return date.getFullYear() + "-" + String(date.getMonth() + 1).padStart(2, "0");
      }

      function defaultMonthlyStats(){
        return {
          monthKey: getMonthKey(),
          harvest: 0,
          sales: 0,
          fishing: 0,
          tower: 0
        };
      }

      function normalizeMonthlyStats(raw){
        const curMonth = getMonthKey();
        if(!raw || typeof raw !== "object") return defaultMonthlyStats();
        const monthKey = String(raw.monthKey || "");
        if(monthKey !== curMonth) return defaultMonthlyStats();

        return {
          monthKey: curMonth,
          harvest: Number(raw.harvest || 0),
          sales: Number(raw.sales || 0),
          fishing: Number(raw.fishing || 0),
          tower: Number(raw.tower || 0)
        };
      }

      function loadMonthlyStats(){
        try{
          const raw = localStorage.getItem(LS.monthlyStats);
          if(!raw){
            const def = defaultMonthlyStats();
            localStorage.setItem(LS.monthlyStats, JSON.stringify(def));
            return def;
          }
          const parsed = JSON.parse(raw);
          const norm = normalizeMonthlyStats(parsed);
          localStorage.setItem(LS.monthlyStats, JSON.stringify(norm));
          return norm;
        }catch(e){
          const def = defaultMonthlyStats();
          localStorage.setItem(LS.monthlyStats, JSON.stringify(def));
          return def;
        }
      }

      function saveMonthlyStats(stats){
        const norm = normalizeMonthlyStats(stats);
        localStorage.setItem(LS.monthlyStats, JSON.stringify(norm));
      }

      function addMonthlySales(amount = 0){
        const s = loadMonthlyStats();
        s.monthKey = getMonthKey();
        s.sales = Number(s.sales || 0) + Math.max(0, Number(amount || 0));
        saveMonthlyStats(s);
      }

      const SEEDS = [
        { id:"seed_random",  name:"なに出るタネ", desc:"何が育つかは完全ランダム。\n店主も知らない。", img:"https://ul.h3z.jp/gnyvP580.png", fx:"完全ランダム" },
        { id:"seed_shop",    name:"店頭タネ", desc:"店で生まれたタネ。\n店頭ナンバーを宿している。", img:"https://ul.h3z.jp/IjvuhWoY.png", fx:"店頭の気配" },

        { id:"seed_bussasari", name:"ブッ刺さりタネ", desc:"心に刺さる。\n財布にも刺さる。", img:"https://ul.h3z.jp/MjWkTaU3.png", fx:"刺さり補正" },
        { id:"seed_namara_kawasar", name:"なまら買わさるタネ", desc:"気付いたら買ってる。\nレジ前の魔物。", img:"https://ul.h3z.jp/yiqHzfi0.png", fx:"買わさり圧" }
      ];

      const WATERS = [
        { id:"water_plain_free", name:"ただの水", desc:"無料・UR/LRなし。\n無課金の基準。", img:"https://ul.h3z.jp/13XdhuHi.png", fx:"基準（水）" },
        { id:"water_nice",       name:"なんか良さそうな水", desc:"ちょい上振れ・LRなし。\n初心者の背中押し。", img:"https://ul.h3z.jp/3z04ypEd.png", fx:"ちょい上振れ" },
        { id:"water_suspicious", name:"怪しい水", desc:"現実準拠・標準。\n実パックと同じ空気。", img:"https://ul.h3z.jp/wtCO9mec.png", fx:"標準（現実準拠）" },
        { id:"water_overdo",     name:"やりすぎな水", desc:"勝負水・現実より上。\n体感で強い。", img:"https://ul.h3z.jp/vsL9ggf6.png", fx:"勝負" },
        { id:"water_regret",     name:"押さなきゃよかった水", desc:"確定枠・狂気。\n事件製造機（SNS向け）", img:"https://ul.h3z.jp/L0nafMOp.png", fx:"事件" }
      ];

      const FERTS = [
        { id:"fert_agedama", name:"ただの揚げ玉", desc:"時短0。\n《焼きすぎたカード》率UP", img:"https://ul.h3z.jp/9p5fx53n.png", fx:"時短 0%" },
        { id:"fert_feel",    name:"気のせい肥料", desc:"早くなった気がする。\n気のせいかもしれない。", img:"https://ul.h3z.jp/XqFTb7sw.png", fx:"時短 5%" },
        { id:"fert_guts",    name:"根性論ぶち込み肥料", desc:"理由はない。\n気合いだ。", img:"https://ul.h3z.jp/bT9ZcNnS.png", fx:"時短 20%" },
        { id:"fert_skip",    name:"工程すっ飛ばし肥料", desc:"途中は、\n見なかったことにした。", img:"https://ul.h3z.jp/FqPzx12Q.png", fx:"時短 40%" },
        { id:"fert_timeno",  name:"時間を信じない肥料", desc:"最終兵器・禁忌。\n稀に《ドロドロ生焼けカード》", img:"https://ul.h3z.jp/l2njWY57.png", fx:"時短 90〜100%" }
      ];

      const PRICE = {
        seed_random: 100,
        seed_shop: 200,
        seed_line: 200,
        seed_special: 10000,
        seed_bussasari: 50000,
        seed_namara_kawasar: 30000,
        water_plain_free: 50,
        water_nice: 100,
        water_suspicious: 300,
        water_overdo: 500,
        water_regret: 200,
        fert_agedama: 50,
        fert_feel: 100,
        fert_guts: 150,
        fert_skip: 200,
        fert_timeno: 300
      };

      function buildGoods(){
        const goods = [];

        for(const s of SEEDS){
          goods.push({
            kind:"seed",
            id:s.id,
            name:s.name,
            desc:s.desc,
            fx:s.fx,
            img:s.img,
            price: PRICE[s.id] ?? 18,
            tag:"販売"
          });
        }

        for(const w of WATERS){
          goods.push({
            kind:"water",
            id:w.id,
            name:w.name,
            desc:w.desc,
            fx:w.fx,
            img:w.img,
            price: PRICE[w.id] ?? 18,
            tag:"販売"
          });
        }

        for(const f of FERTS){
          goods.push({
            kind:"fert",
            id:f.id,
            name:f.name,
            desc:f.desc,
            fx:f.fx,
            img:f.img,
            price: PRICE[f.id] ?? 18,
            tag:"販売"
          });
        }

        return goods;
      }

      const GOODS = buildGoods();

      const SAY = [
        "「いらっしゃい…たこ。今日は何を仕入れていく…たこ？」",
        "「この店は、よくある道具屋みたいで…ちょっとだけ変…たこ。」",
        "「タネは物語、水は運、ヒリョウは近道…でも近道は、だいたい何かある…たこ。」",
        "「買うってことは、未来を少しだけ先に決めるってこと…たこ。」"
      ];

      const BUY_SAY = [
        "「仕入れ完了…たこ。未来がひとつ、動いたたこ。」",
        "「その買い物、あとで効いてくる…たこ。」",
        "「いい仕入れ…たこ。畑が少し騒がしくなるたこ。」",
        "「買った瞬間は静かでも、結果はだいたい騒がしい…たこ。」"
      ];

      let currentKind = "seed";
      let lastGridActionTs = 0;

      function getModalEls(){
        return {
          modal: document.getElementById("modal"),
          bg: document.getElementById("modalBg"),
          x: document.getElementById("modalX"),
          title: document.getElementById("modalTitle"),
          body: document.getElementById("modalBody")
        };
      }

      function forceModalStyle(modal){
        if(!modal) return;
        modal.style.setProperty("position","fixed","important");
        modal.style.setProperty("inset","0","important");
        modal.style.setProperty("z-index","2147483646","important");
        modal.style.setProperty("display","block","important");
        modal.style.setProperty("pointer-events","auto","important");
      }

      function openModal(title, html){
        const { modal, title:ttl, body } = getModalEls();
        if(!modal || !ttl || !body) return;

        ttl.textContent = title || "メニュー";
        body.innerHTML = html || "";

        forceModalStyle(modal);
        modal.classList.add("is-open");
        modal.setAttribute("aria-hidden","false");

        requestAnimationFrame(() => {
          forceModalStyle(modal);
          modal.classList.add("is-open");
        });

        document.documentElement.style.overflow = "hidden";
        document.body.style.overflow = "hidden";
      }

      function closeModal(){
        const { modal, body } = getModalEls();
        if(!modal) return;

        modal.classList.remove("is-open");
        modal.setAttribute("aria-hidden","true");
        if(body) body.innerHTML = "";

        modal.style.removeProperty("display");
        modal.style.removeProperty("position");
        modal.style.removeProperty("inset");
        modal.style.removeProperty("z-index");
        modal.style.removeProperty("pointer-events");

        document.documentElement.style.overflow = "";
        document.body.style.overflow = "";
      }

      function wireModalClose(){
        const { bg, x } = getModalEls();
        bg?.addEventListener("click", closeModal, { passive:true });
        x?.addEventListener("click", closeModal, { passive:true });
        document.addEventListener("keydown", (e) => {
          if(e.key === "Escape") closeModal();
        });
      }

      function ownedCount(inv, kind, id){
        return Number((inv[kind] || {})[id] || 0);
      }

      function totalKindVisible(inv, kind){
        const ids = GOODS.filter(g => g.kind === kind).map(g => g.id);
        let total = 0;
        for(const id of ids){
          total += Number((inv[kind] || {})[id] || 0);
        }
        return total;
      }

      function ensureInvKeys(){
        const inv = loadInv();
        inv.seed = inv.seed || {};
        inv.water = inv.water || {};
        inv.fert = inv.fert || {};

        for(const g of GOODS){
          if(!(g.id in inv[g.kind])) inv[g.kind][g.id] = 0;
        }

        saveInv(inv);
        return inv;
      }

      function setTakopiSayRandom(){
        const t = SAY[Math.floor(Math.random() * SAY.length)];
        const el = $("#takopiSay");
        if(el) el.innerHTML = t.replace(/\n/g, "<br>");
      }

      function setTakopiBuySay(){
        const t = BUY_SAY[Math.floor(Math.random() * BUY_SAY.length)];
        const el = $("#takopiSay");
        if(el) el.innerHTML = t.replace(/\n/g, "<br>");
      }

      function refreshHUD(){
        const inv = ensureInvKeys();
        $("#octoNow").textContent = String(getOcto());
        $("#chipSeed").textContent = String(totalKindVisible(inv, "seed"));
        $("#chipWater").textContent = String(totalKindVisible(inv, "water"));
        $("#chipFert").textContent = String(totalKindVisible(inv, "fert"));
      }

      function clamp(n, min, max){
        n = Math.floor(Number(n) || 0);
        if(n < min) return min;
        if(n > max) return max;
        return n;
      }

      function pulseBoughtCard(kind, id){
        const card = document.querySelector(`.good[data-kind="${kind}"][data-id="${id}"]`);
        if(!card) return;
        card.classList.remove("is-bought");
        void card.offsetWidth;
        card.classList.add("is-bought");
        setTimeout(() => {
          card.classList.remove("is-bought");
        }, 800);
      }

      function showPurchasePop(itemName, qty, total){
        const pop   = $("#purchasePop");
        const title = $("#purchasePopTitle");
        const name  = $("#purchasePopName");
        const price = $("#purchasePopPrice");
        const sub   = $("#purchasePopSub");

        if(!pop || !title || !name || !price || !sub) return;

        clearTimeout(showPurchasePop._timer);

        title.textContent = "✨購入完了✨";
        name.textContent = `${itemName} ×${qty}`;
        price.textContent = `🪙 -${total}オクト`;
        sub.textContent = "仕入れ成功…たこ。";

        pop.classList.remove("is-show");
        pop.setAttribute("aria-hidden", "true");
        void pop.offsetWidth;

        pop.classList.add("is-show");
        pop.setAttribute("aria-hidden", "false");

        showPurchasePop._timer = setTimeout(() => {
          pop.classList.remove("is-show");
          pop.setAttribute("aria-hidden", "true");
        }, 2000);
      }

      function buyMany(item, qty){
        qty = clamp(qty, 1, 99);
        const price = Math.max(0, Number(item.price || 0));
        const total = price * qty;
        const octo = getOcto();

        if(octo < total) return { ok:false };

        const inv = ensureInvKeys();
        inv[item.kind] = inv[item.kind] || {};
        inv[item.kind][item.id] = Number(inv[item.kind][item.id] || 0) + qty;
        saveInv(inv);

        setOcto(octo - total);
        addMonthlySales(total);
        pushLog(`購入：${item.name} ×${qty} -${total}オクト`);

        refreshHUD();
        renderGoods();
        setTakopiBuySay();
        showPurchasePop(item.name, qty, total);
        pulseBoughtCard(item.kind, item.id);

        return { ok:true, total, qty };
      }

      function getItemByCard(card){
        if(!card) return null;
        const kind = card.getAttribute("data-kind");
        const id = card.getAttribute("data-id");
        return GOODS.find(x => x.kind === kind && x.id === id) || null;
      }

      function getQtyInput(card){
        return $(".qtyin", card);
      }

      function getCardQty(card){
        const qtyIn = getQtyInput(card);
        return clamp(Number(qtyIn?.value || 1), 1, 99);
      }

      function setCardQty(card, v){
        const qtyIn = getQtyInput(card);
        if(!qtyIn) return;
        qtyIn.value = String(clamp(v, 1, 99));
      }

      function handleGoodsGridAction(target){
        const actionEl = target.closest(".qtyminus, .qtyplus, .buybtn");
        if(!actionEl) return false;

        const card = actionEl.closest(".good");
        if(!card) return false;

        const item = getItemByCard(card);
        if(!item) return false;

        if(actionEl.classList.contains("qtyminus")){
          setCardQty(card, getCardQty(card) - 1);
          return true;
        }

        if(actionEl.classList.contains("qtyplus")){
          setCardQty(card, getCardQty(card) + 1);
          return true;
        }

        if(actionEl.classList.contains("buybtn")){
          buyMany(item, getCardQty(card));
          return true;
        }

        return false;
      }

      function wireGoodsGrid(){
        const grid = $("#goodsGrid");
        if(!grid) return;

        grid.addEventListener("input", (e) => {
          const input = e.target.closest(".qtyin");
          if(!input) return;
          const card = input.closest(".good");
          if(!card) return;
          setCardQty(card, input.value);
        });

        grid.addEventListener("change", (e) => {
          const input = e.target.closest(".qtyin");
          if(!input) return;
          const card = input.closest(".good");
          if(!card) return;
          setCardQty(card, input.value);
        });

        grid.addEventListener("click", (e) => {
          if(handleGoodsGridAction(e.target)){
            e.preventDefault();
            lastGridActionTs = Date.now();
          }
        });

        grid.addEventListener("pointerup", (e) => {
          if(!(e.pointerType === "touch" || e.pointerType === "pen")) return;

          const now = Date.now();
          if(now - lastGridActionTs < 350) return;

          if(handleGoodsGridAction(e.target)){
            e.preventDefault();
            lastGridActionTs = now;
          }
        });

        grid.addEventListener("keydown", (e) => {
          const target = e.target;
          if(!target) return;

          if((e.key === "Enter" || e.key === " ") && target.closest(".qtyminus, .qtyplus, .buybtn")){
            if(handleGoodsGridAction(target)){
              e.preventDefault();
              lastGridActionTs = Date.now();
            }
          }
        });
      }

      function renderGoods(){
        const inv = ensureInvKeys();
        const grid = $("#goodsGrid");
        if(!grid) return;

        const list = GOODS.filter(g => g.kind === currentKind);

        grid.innerHTML = list.map(g => {
          const own = String(ownedCount(inv, g.kind, g.id));
          const badge = g.tag ? `<span class="miniTag">${g.tag}</span>` : "";

          return `
            <article class="good" data-kind="${g.kind}" data-id="${g.id}">
              <div class="good-top">
                <div class="good-img">
                  <span class="ownBadge">×<b>${own}</b></span>
                  <img src="${g.img}" alt="${g.name}" loading="lazy" draggable="false">
                </div>
                <div class="good-meta">
                  <div class="good-name">${g.name} ${badge}</div>
                  <div class="good-desc">${(g.desc || "").replace(/\n/g,"<br>")}</div>
                  <div class="good-fx">${g.fx ? `効果：<b>${g.fx}</b>` : ""}</div>
                </div>
              </div>

              <div class="good-row">
                <div class="good-buy">
                  <div class="buybar">
                    <div class="qty">
                      <button class="btn qtybtn qtyminus" type="button" aria-label="数量を減らす">−</button>
                      <input class="qtyin" type="number" inputmode="numeric" min="1" max="99" step="1" value="1" aria-label="数量">
                      <button class="btn qtybtn qtyplus" type="button" aria-label="数量を増やす">＋</button>
                    </div>
                    <button class="btn buybtn" type="button" aria-label="${g.name}を購入">買う</button>
                  </div>
                  <div class="priceline">単価 <b>${g.price}</b> オクト</div>
                </div>
              </div>
            </article>
          `;
        }).join("");
      }

      function wireResourceSummary(){
        const el = $("#resourcesSummary");
        if(!el) return;

        const open = () => {
          const inv = loadInv();

          openModal("📦 所持資材の内訳", `
            <div class="mikuji-wrap">
              <div class="inv-box">
                <div class="inv-title">🌱 種</div>
                ${GOODS.filter(g => g.kind === "seed").map(g => `
                  <div class="inv-row">
                    <div class="inv-left"><span class="inv-name">${g.name}</span></div>
                    <div class="inv-right">×<b>${ownedCount(inv, "seed", g.id)}</b></div>
                  </div>
                `).join("")}
              </div>

              <div class="inv-box">
                <div class="inv-title">💧 水</div>
                ${GOODS.filter(g => g.kind === "water").map(g => `
                  <div class="inv-row">
                    <div class="inv-left"><span class="inv-name">${g.name}</span></div>
                    <div class="inv-right">×<b>${ownedCount(inv, "water", g.id)}</b></div>
                  </div>
                `).join("")}
              </div>

              <div class="inv-box">
                <div class="inv-title">🧪 ヒリョウ</div>
                ${GOODS.filter(g => g.kind === "fert").map(g => `
                  <div class="inv-row">
                    <div class="inv-left"><span class="inv-name">${g.name}</span></div>
                    <div class="inv-right">×<b>${ownedCount(inv, "fert", g.id)}</b></div>
                  </div>
                `).join("")}
              </div>

              <div class="row">
                <button class="btn modal-close-btn" id="okSummary" type="button">閉じる</button>
              </div>
            </div>
          `);

          $("#okSummary", document.getElementById("modalBody"))?.addEventListener("click", closeModal, { passive:true });
          setTakopiSayRandom();
        };

        el.addEventListener("click", open);
        el.addEventListener("keydown", (e) => {
          if(e.key === "Enter" || e.key === " "){
            e.preventDefault();
            open();
          }
        });
      }

      function openAboutModal(){
        openModal("📘 タネ/ミズ/ヒリョウについて", `
          <div class="mikuji-wrap">
            <div class="note">
              ここは仕様書というより、<b>たこぴのお店の仕入れメモ</b>みたいなもの。<br>
              最終的な抽選や成長は、たこ焼き畑側のロジックに従う。
            </div>

            <div class="inv-box">
              <div class="inv-title">🌱 タネ（何を育てるか）</div>
              <div class="note">
                タネは、<b>どんなカードが育ちやすいか</b>の入口。<br>
                ・なに出るタネ：完全ランダム<br>
                ・店頭タネ：店の空気を帯びた枠<br>
                ・回線タネ：画面の向こう由来<br>
                ・たこぴのタネ：静かな特別枠<br>
                ・ブッ刺さり / なまら買わさる：高額で濃い体験向け
              </div>
            </div>

            <div class="inv-box">
              <div class="inv-title">💧 ミズ（レア度の押し上げ）</div>
              <div class="note">
                ミズは、<b>レア抽選の上振れ</b>に関わる。<br>
                ・ただの水：基準<br>
                ・なんか良さそうな水：少し上振れ<br>
                ・怪しい水：標準<br>
                ・やりすぎな水：勝負用<br>
                ・押さなきゃよかった水：事件用
              </div>
            </div>

            <div class="inv-box">
              <div class="inv-title">🧪 ヒリョウ（時間や事故率の調整）</div>
              <div class="note">
                ヒリョウは、<b>時短や事故率</b>に影響する。<br>
                ・ただの揚げ玉：時短0<br>
                ・気のせい肥料：少し短縮<br>
                ・根性論ぶち込み：中くらい短縮<br>
                ・工程すっ飛ばし：かなり短縮<br>
                ・時間を信じない：最終兵器
              </div>
            </div>

            <div class="row">
              <button class="btn modal-close-btn" id="okAbout" type="button">閉じる</button>
            </div>
          </div>
        `);

        $("#okAbout", document.getElementById("modalBody"))?.addEventListener("click", closeModal, { passive:true });
      }

      function wireTabs(){
        $$(".goods-tab").forEach(btn => {
          btn.addEventListener("click", () => {
            $$(".goods-tab").forEach(b => b.classList.remove("is-active"));
            btn.classList.add("is-active");
            currentKind = btn.getAttribute("data-kind") || "seed";
            renderGoods();
          });
        });
      }

      function wireButtons(){
        $("#btnOpenRates")?.addEventListener("click", () => {
          openAboutModal();
          setTakopiSayRandom();
        });

        $("#rotenBackBtn")?.addEventListener("click", () => {
          if(history.length > 1){
            history.back();
          }else{
            location.href = "./index.html";
          }
        });
      }

      function boot(){
        loadMonthlyStats();
        ensureInvKeys();
        setTakopiSayRandom();
        wireModalClose();
        wireTabs();
        wireButtons();
        wireResourceSummary();
        wireGoodsGrid();
        refreshHUD();
        renderGoods();
      }

      if(document.readyState === "loading"){
        document.addEventListener("DOMContentLoaded", boot, { once:true });
      }else{
        boot();
      }
    })();
  </script>
</body>
</html>
