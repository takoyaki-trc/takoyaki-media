<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>たこぴのお店</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">

  <style>
    :root{
      --paper1:#fff9ec;
      --paper2:#f0e2bb;
      --text:#fff8eb;
      --muted:rgba(255,248,235,.78);
      --ink:#35210f;
      --shadow:0 16px 45px rgba(0,0,0,.45);
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }

    body{
      margin:0;
      color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans JP",sans-serif;
      background:
        radial-gradient(1200px 520px at 50% -10%, rgba(255,205,112,.18), transparent 48%),
        linear-gradient(180deg, #3d2340 0%, #25192f 36%, #17121f 100%);
      background-attachment: fixed;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(rgba(255,255,255,.025), rgba(255,255,255,0)),
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,.018) 0 2px,
          transparent 2px 48px
        );
      opacity:.35;
    }

    .roten-header{
      position:sticky;
      top:0;
      z-index:50;
      background:linear-gradient(180deg, rgba(17,8,10,.74), rgba(17,8,10,.18));
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .roten-head-inner{
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      padding:14px 14px 10px;
      min-height:78px;
    }

    .roten-back{
      position:absolute;
      left:14px;
      top:50%;
      transform:translateY(-50%);
    }

    .roten-head-center{
      text-align:center;
      padding:0 64px;
    }

    .roten-title{
      font-size:22px;
      font-weight:1000;
      letter-spacing:.05em;
      text-shadow:0 2px 0 rgba(0,0,0,.25);
    }

    .roten-sub{
      margin-top:4px;
      color:var(--muted);
      font-size:12px;
      letter-spacing:.04em;
    }

    .roten-app{
      max-width:980px;
      margin:0 auto;
      padding:12px 12px 28px;
    }

    .btn{
      appearance:none;
      -webkit-appearance:none;
      border-radius:14px;
      font-weight:900;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:10px 12px;
      border:1px solid rgba(255,255,255,.14);
      color:#fff8e8;
      background:
        linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.05)),
        linear-gradient(180deg, #6d4a2c, #4e311b);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.12),
        0 8px 18px rgba(0,0,0,.24);
      transition:.15s;
      text-decoration:none;
    }

    .btn:active{
      transform:translateY(2px);
      filter:brightness(.96);
    }

    .btn-ghost{
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04)),
        linear-gradient(180deg, rgba(93,57,34,.88), rgba(66,39,23,.92));
    }

    .buybtn{
      background:
        linear-gradient(180deg, #ffd885, #ef9d39);
      color:#3b2209;
      border:1px solid rgba(255,255,255,.18);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.24),
        0 4px 0 #9b5a18,
        0 10px 22px rgba(0,0,0,.24);
    }

    .buybtn:active{
      transform:translateY(3px);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.24),
        0 2px 0 #9b5a18,
        0 8px 18px rgba(0,0,0,.2);
    }

    /* 右上 畑ボタン */
    .header-farm-wrap{
      position:absolute;
      right:14px;
      top:50%;
      transform:translateY(-50%);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .farm-icon-btn{
      width:46px;
      height:46px;
      padding:0;
      border-radius:14px;
      position:relative;
      overflow:visible;
      background:
        linear-gradient(180deg, rgba(224,255,190,.22), rgba(255,255,255,.05)),
        linear-gradient(180deg, #658a32, #3a5617);
      border:1px solid rgba(222,255,186,.38);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.15),
        0 8px 18px rgba(0,0,0,.24);
      font-size:22px;
      line-height:1;
    }

    .farm-icon-btn:hover{
      filter:brightness(1.04);
    }

    .farm-icon-btn::after{
      content:"";
      position:absolute;
      inset:-4px;
      border-radius:18px;
      pointer-events:none;
      opacity:0;
    }

    .farm-icon-btn.is-glow{
      animation:farmPulse 1.6s ease-in-out infinite;
    }

    .farm-icon-btn.is-glow::after{
      opacity:1;
      animation:farmRing 1.6s ease-out infinite;
      box-shadow:
        0 0 0 2px rgba(199,255,153,.18),
        0 0 18px rgba(199,255,153,.48),
        0 0 34px rgba(142,255,117,.34);
    }

    .farm-badge{
      position:absolute;
      right:-6px;
      top:-6px;
      min-width:18px;
      height:18px;
      padding:0 5px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:10px;
      font-weight:1000;
      color:#38220b;
      background:linear-gradient(180deg, #fff2b0, #ffcf59);
      border:1px solid rgba(255,255,255,.55);
      box-shadow:0 4px 10px rgba(0,0,0,.25);
      letter-spacing:.02em;
    }

    .farm-tip{
      position:absolute;
      right:0;
      top:56px;
      max-width:130px;
      padding:8px 10px;
      border-radius:12px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.04)),
        rgba(28,18,14,.92);
      border:1px solid rgba(214,255,181,.26);
      color:#fff8eb;
      font-size:11px;
      line-height:1.45;
      text-align:center;
      box-shadow:0 10px 24px rgba(0,0,0,.26);
      transform-origin:top right;
      animation:tipFloat 1.8s ease-in-out infinite;
    }

    .farm-tip::before{
      content:"";
      position:absolute;
      right:16px;
      top:-7px;
      width:12px;
      height:12px;
      background:rgba(28,18,14,.92);
      border-left:1px solid rgba(214,255,181,.26);
      border-top:1px solid rgba(214,255,181,.26);
      transform:rotate(45deg);
    }

    @keyframes farmPulse{
      0%,100%{
        transform:translateY(0) scale(1);
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,.15),
          0 8px 18px rgba(0,0,0,.24),
          0 0 0 rgba(170,255,142,0);
      }
      50%{
        transform:translateY(-1px) scale(1.03);
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,.15),
          0 8px 18px rgba(0,0,0,.24),
          0 0 22px rgba(170,255,142,.34);
      }
    }

    @keyframes farmRing{
      0%{
        transform:scale(.92);
        opacity:.9;
      }
      100%{
        transform:scale(1.16);
        opacity:0;
      }
    }

    @keyframes tipFloat{
      0%,100%{ transform:translateY(0); }
      50%{ transform:translateY(-2px); }
    }

    .hud{
      display:flex;
      align-items:flex-start;
      justify-content:flex-start;
      gap:10px;
      padding:12px;
      border-radius:20px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03)),
        linear-gradient(180deg, rgba(82,48,29,.86), rgba(53,29,19,.92));
      border:1px solid rgba(255,255,255,.08);
      box-shadow:var(--shadow);
      margin-bottom:12px;
    }

    .hud-line{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
      width:100%;
      flex-wrap:wrap;
    }

    .hud-money{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      border-radius:999px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.1), rgba(255,255,255,.03)),
        rgba(0,0,0,.18);
      border:1px solid rgba(255,255,255,.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
      font-weight:1000;
      white-space:nowrap;
      flex:0 0 auto;
    }

    .hud-money .money-label{
      font-size:13px;
      color:rgba(255,248,235,.92);
      letter-spacing:.03em;
    }

    .hud-money .money-num{
      font-size:18px;
      line-height:1;
    }

    .hud-resources{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      border-radius:999px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.03)),
        rgba(0,0,0,.16);
      border:1px solid rgba(255,255,255,.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
      font-size:13px;
      font-weight:900;
      white-space:nowrap;
      min-width:0;
      cursor:pointer;
      user-select:none;
    }

    .hud-resources b{
      font-size:14px;
    }

    .shop-hero{
      margin-bottom:14px;
    }

    .hero-card{
      display:block;
      border-radius:22px;
      overflow:hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03)),
        linear-gradient(180deg, rgba(76,47,34,.95), rgba(48,29,20,.98));
      border:1px solid rgba(255,255,255,.08);
      box-shadow:var(--shadow);
    }

    .hero-imgwrap{
      position:relative;
      width:100%;
      background:
        radial-gradient(circle at 20% 18%, rgba(255,226,136,.28), transparent 26%),
        radial-gradient(circle at 82% 16%, rgba(255,182,116,.16), transparent 20%),
        linear-gradient(180deg, #784729 0%, #4d2f20 55%, #342116 100%);
      border-bottom:1px solid rgba(255,255,255,.08);
      overflow:hidden;
    }

    .hero-imgwrap::after{
      content:"";
      position:absolute;
      inset:auto 0 0 0;
      height:22%;
      background:
        linear-gradient(180deg, rgba(0,0,0,0), rgba(0,0,0,.18)),
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,.03) 0 18px,
          rgba(0,0,0,.03) 18px 36px
        );
      pointer-events:none;
    }

    .hero-img{
      display:block;
      width:100%;
      height:auto;
      object-fit:cover;
      min-height:240px;
      max-height:360px;
    }

    .hero-dialog{
      position:relative;
      margin:0;
      padding:14px 14px 16px;
      background:transparent;
      min-width:0;
    }

    .hero-text{
      font-family:"DotGothic16", system-ui, sans-serif;
      line-height:1.8;
      color:var(--ink);
      font-size:14px;
      letter-spacing:.03em;
      background: linear-gradient(180deg, var(--paper1), var(--paper2));
      border:3px solid #fff7dc;
      border-radius:18px;
      padding:14px 14px 13px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.7),
        0 8px 18px rgba(0,0,0,.18);
      text-shadow:none;
    }

    .block{
      margin-top:10px;
      padding:12px;
      border-radius:20px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03)),
        linear-gradient(180deg, rgba(78,47,31,.92), rgba(47,27,18,.95));
      border:1px solid rgba(255,255,255,.08);
      box-shadow:var(--shadow);
    }

    .block-head{
      margin-bottom:10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:nowrap;
    }

    .block-title{
      font-size:19px;
      font-weight:1000;
      letter-spacing:.05em;
      white-space:nowrap !important;
      line-height:1.1 !important;
      flex:0 0 auto;
    }

    .block-actions{
      display:flex;
      align-items:center;
      gap:8px;
      flex:0 0 auto;
      margin-left:auto;
    }

    .about-btn{
      height:38px;
      padding:0 14px;
      border-radius:12px;
      font-size:12px;
      white-space:nowrap;
      background:
        linear-gradient(180deg, rgba(255,238,164,.24), rgba(255,255,255,.05)),
        linear-gradient(180deg, #7b542b, #5c381d);
      border:1px solid rgba(255,227,138,.42);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.18),
        0 8px 18px rgba(0,0,0,.2);
    }

    .goods-tabs{
      position:sticky;
      top:64px;
      z-index:20;
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:8px;
      padding:8px 0;
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
    }

    .goods-tab{
      appearance:none;
      -webkit-appearance:none;
      border:1px solid rgba(255,255,255,.12);
      color:#f0e1cb;
      padding:12px;
      border-radius:14px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.015)),
        linear-gradient(180deg, #513522, #3a2417);
      font-weight:900;
      cursor:pointer;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.05),
        0 6px 14px rgba(0,0,0,.16);
      transition:.15s ease;
      opacity:.82;
    }

    .goods-tab:hover{
      opacity:.95;
    }

    .goods-tab.is-active{
      color:#fffdf4;
      opacity:1;
      transform:translateY(-1px);
      border:2px solid rgba(255,231,149,.92);
      background:
        linear-gradient(180deg, rgba(255,246,202,.22), rgba(255,255,255,.06)),
        linear-gradient(180deg, #936133, #694120);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.16),
        0 0 0 2px rgba(255,209,109,.18),
        0 0 18px rgba(255,217,128,.24),
        0 8px 18px rgba(0,0,0,.22);
      text-shadow:0 1px 0 rgba(0,0,0,.22);
    }

    .goods-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
    }

    @media (min-width:860px){
      .goods-grid{ grid-template-columns:repeat(3,1fr); }
    }

    .good{
      border-radius:18px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03)),
        linear-gradient(180deg, rgba(90,54,33,.96), rgba(60,35,22,.98));
      overflow:hidden;
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 10px 24px rgba(0,0,0,.2);
    }

    .good-top{
      display:grid;
      grid-template-columns:88px 1fr;
      gap:10px;
      padding:10px;
    }

    .good-img{
      width:88px;
      height:88px;
      border-radius:14px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02)),
        rgba(0,0,0,.18);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      position:relative !important;
      border:1px solid rgba(255,255,255,.08);
    }

    .good-img img{
      width:78px;
      image-rendering:pixelated;
      display:block;
    }

    .ownBadge{
      position:absolute;
      top:6px;
      right:6px;
      z-index:2;
      padding:4px 8px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
      letter-spacing:.02em;
      color:#fff;
      background:rgba(0,0,0,.56);
      border:1px solid rgba(255,255,255,.18);
      backdrop-filter:blur(4px);
      -webkit-backdrop-filter:blur(4px);
      pointer-events:none;
      user-select:none;
      white-space:nowrap;
    }

    .miniTag{
      display:inline-flex;
      align-items:center;
      padding:3px 8px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(0,0,0,.16);
      font-size:11px;
      opacity:.92;
      margin-left:6px;
      white-space:nowrap;
    }

    .good-name{
      font-weight:1000;
      line-height:1.25;
      letter-spacing:.02em;
    }

    .good-desc{
      font-size:12px;
      color:var(--muted);
      line-height:1.48;
      margin-top:6px;
      word-break:break-word;
    }

    .good-fx{
      margin-top:8px;
      font-size:12px;
      color:rgba(255,255,255,.9);
      line-height:1.45;
    }

    .good-row{
      display:flex;
      justify-content:space-between;
      padding:0 10px 10px;
    }

    .good-buy{
      width:100%;
    }

    .buybar{
      display:flex !important;
      flex-direction:row !important;
      align-items:center !important;
      justify-content:flex-end !important;
      gap:8px !important;
      flex-wrap:nowrap !important;
    }

    .qty{
      display:flex !important;
      align-items:center !important;
      gap:6px !important;
      flex:0 0 auto !important;
    }

    .qtybtn{
      min-width:38px !important;
      height:38px !important;
      padding:0 10px !important;
      border-radius:12px !important;
      font-weight:900 !important;
      font-size:14px !important;
    }

    .qtyin{
      width:56px !important;
      height:38px !important;
      text-align:center !important;
      border-radius:12px !important;
      border:1px solid rgba(255,255,255,.16) !important;
      background:rgba(0,0,0,.18) !important;
      color:#fff !important;
      font-weight:900 !important;
      font-size:14px !important;
      outline:none;
    }

    .buybtn{
      height:38px !important;
      min-width:92px !important;
      border-radius:12px !important;
      flex:0 0 auto !important;
      white-space:nowrap !important;
      font-weight:900 !important;
      font-size:13px !important;
      padding:0 12px !important;
    }

    .priceline{
      margin-top:6px;
      font-size:12px;
      color:rgba(255,255,255,.76);
      text-align:right;
      white-space:nowrap;
    }

    .priceline b{
      color:rgba(255,255,255,.96);
    }

    .modal{
      position:fixed;
      inset:0;
      display:none;
    }

    .modal.is-open{
      display:block;
    }

    .modal__backdrop{
      position:absolute;
      inset:0;
      background:rgba(0,0,0,.58);
      backdrop-filter:blur(5px);
      -webkit-backdrop-filter:blur(5px);
    }

    .modal__sheet{
      position:absolute;
      left:50%;
      bottom:10px;
      transform:translateX(-50%);
      width:min(720px,96vw);
      max-height:min(84vh, 900px);
      border-radius:18px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03)),
        linear-gradient(180deg, #5d3720, #402515);
      box-shadow:0 24px 60px rgba(0,0,0,.55);
      border:1px solid rgba(255,255,255,.12);
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }

    .modal__grab{
      width:46px;
      height:5px;
      border-radius:999px;
      background:rgba(255,255,255,.22);
      margin:10px auto 4px;
      flex:0 0 auto;
    }

    .modal__head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:8px 12px 10px;
      border-bottom:1px solid rgba(255,255,255,.10);
      flex:0 0 auto;
    }

    .modal__title{
      font-size:16px;
      font-weight:1000;
      letter-spacing:.03em;
    }

    .modal__body{
      padding:14px;
      overflow:auto;
      -webkit-overflow-scrolling:touch;
    }

    .mikuji-wrap{
      display:grid;
      gap:12px;
    }

    .note{
      padding:12px 14px;
      border-radius:14px;
      background:rgba(255,250,235,.1);
      border:1px solid rgba(255,255,255,.10);
      color:rgba(255,248,235,.95);
      line-height:1.65;
      font-size:13px;
    }

    .inv-box{
      padding:12px;
      border-radius:16px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
    }

    .inv-title{
      font-weight:1000;
      font-size:14px;
      margin-bottom:10px;
      letter-spacing:.02em;
    }

    .inv-row{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      padding:10px 0;
      border-top:1px solid rgba(255,255,255,.08);
    }

    .inv-row:first-of-type{
      border-top:none;
      padding-top:0;
    }

    .inv-left{
      min-width:0;
    }

    .inv-name{
      font-weight:800;
      display:block;
      line-height:1.45;
    }

    .inv-right{
      white-space:nowrap;
      font-weight:1000;
      font-size:14px;
    }

    .row{
      display:flex;
      justify-content:flex-end;
      gap:8px;
      flex-wrap:wrap;
    }

    #toast{
      position:fixed !important;
      left:12px !important;
      right:12px !important;
      bottom:calc(14px + env(safe-area-inset-bottom)) !important;
      z-index:2147483647 !important;
      pointer-events:none !important;
      opacity:0 !important;
      transform:translateY(10px) scale(.98) !important;
      transition:opacity .16s ease, transform .18s ease !important;
      padding:14px 14px !important;

<body>
  <header class="roten-header">
    <div class="roten-head-inner">
      <button class="btn btn-ghost roten-back" id="rotenBackBtn" type="button" aria-label="戻る">←戻る</button>

      <div class="roten-head-center">
        <div class="roten-title">たこぴのお店</div>
        <div class="roten-sub">資材ショップ</div>
      </div>

      <div class="header-farm-wrap">
        <a
          class="btn farm-icon-btn is-glow"
          id="btnGoFarmTop"
          href="./farm.html"
          aria-label="たこ焼き畑へ"
          title="たこ焼き畑へ"
        >🌱</a>
        <div class="farm-badge" id="farmBadge">!</div>
        <div class="farm-tip" id="farmTip">たこ焼き畑へ移動</div>
      </div>
    </div>
  </header>

  <main id="rotenApp" class="roten-app">
    <section class="hud">
      <div class="hud-line">
        <div class="hud-money">
          <span>🪙</span>
          <span class="money-num" id="octoNow">0</span>
        </div>

        <div class="hud-resources" id="resourcesSummary" role="button" tabindex="0" aria-label="所持資材の内訳を見る">
          <span>🌱</span><span id="chipSeed">0</span>
          <span>/</span>
          <span>💧</span><span id="chipWater">0</span>
          <span>/</span>
          <span>🧪</span><span id="chipFert">0</span>
        </div>
      </div>
    </section>

    <section class="shop-hero">
      <div class="hero-card">
        <div class="hero-imgwrap">
          <img class="hero-img" id="takopiHeroImg" src="https://ul.h3z.jp/0eBSeUBg.png" alt="たこぴ" />
        </div>

        <div class="hero-dialog">
          <div class="hero-text" id="takopiSay">
            「いらっしゃい…たこ。<br>今日は何を仕入れていく…たこ？」
          </div>
        </div>
      </div>
    </section>

    <section class="block">
      <div class="block-head">
        <div class="block-title">購入</div>

        <div class="block-actions">
          <button class="btn about-btn" id="btnOpenRates" type="button">🔰 タネ/ミズ/ヒリョウについて</button>
        </div>
      </div>

      <div class="goods-tabs" aria-label="資材タブ">
        <button class="goods-tab is-active" data-kind="seed" type="button">タネ🌱</button>
        <button class="goods-tab" data-kind="water" type="button">ミズ💧</button>
        <button class="goods-tab" data-kind="fert" type="button">ヒリョウ🧪</button>
      </div>

      <div class="goods-grid" id="goodsGrid"></div>
    </section>
  </main>

  <div id="toast" aria-live="polite"></div>

  <div class="modal" id="modal" aria-hidden="true">
    <div class="modal__backdrop" id="modalBg"></div>
    <div class="modal__sheet" role="dialog" aria-label="モーダル">
      <div class="modal__grab"></div>
      <div class="modal__head">
        <div class="modal__title" id="modalTitle">タイトル</div>
        <button class="btn" id="modalX" type="button">閉じる</button>
      </div>
      <div id="modalBody" class="modal__body"></div>
    </div>
  </div>

  <script>
    (() => {
      "use strict";

      const LS = {
        octo: "roten_v1_octo",
        inv: "tf_v1_inv",
        log: "roten_v1_log",
        monthlyStats: "ttc_monthly_stats_v1",
        farmGuideSeen: "roten_v1_farm_guide_seen"
      };

      const $  = (sel, root=document) => root.querySelector(sel);
      const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));

      function loadJSON(key, fallback){
        try{
          const raw = localStorage.getItem(key);
          if(!raw) return fallback;
          return JSON.parse(raw);
        }catch(e){
          return fallback;
        }
      }

      function saveJSON(key, obj){
        localStorage.setItem(key, JSON.stringify(obj));
      }

      function getOcto(){
        return Number(localStorage.getItem(LS.octo) || 0);
      }

      function setOcto(v){
        localStorage.setItem(LS.octo, String(Math.max(0, Math.floor(Number(v) || 0))));
      }

      function invDefault(){
        return { ver:1, seed:{}, water:{}, fert:{} };
      }

      function loadInv(){
        const inv = loadJSON(LS.inv, invDefault());
        inv.seed  = inv.seed  || {};
        inv.water = inv.water || {};
        inv.fert  = inv.fert  || {};
        return inv;
      }

      function saveInv(inv){
        saveJSON(LS.inv, inv);
      }

      function pushLog(msg){
        const a = loadJSON(LS.log, []);
        a.unshift({ t: Date.now(), msg });
        saveJSON(LS.log, a.slice(0, 80));
      }

      function getMonthKey(date = new Date()){
        return date.getFullYear() + "-" + String(date.getMonth() + 1).padStart(2, "0");
      }

      function defaultMonthlyStats(){
        return {
          monthKey: getMonthKey(),
          harvest: 0,
          sales: 0,
          fishing: 0,
          tower: 0
        };
      }

      function normalizeMonthlyStats(raw){
        const curMonth = getMonthKey();
        if(!raw || typeof raw !== "object") return defaultMonthlyStats();
        const monthKey = String(raw.monthKey || "");
        if(monthKey !== curMonth) return defaultMonthlyStats();

        return {
          monthKey: curMonth,
          harvest: Number(raw.harvest || 0),
          sales: Number(raw.sales || 0),
          fishing: Number(raw.fishing || 0),
          tower: Number(raw.tower || 0)
        };
      }

      function loadMonthlyStats(){
        try{
          const raw = localStorage.getItem(LS.monthlyStats);
          if(!raw){
            const def = defaultMonthlyStats();
            localStorage.setItem(LS.monthlyStats, JSON.stringify(def));
            return def;
          }
          const parsed = JSON.parse(raw);
          const norm = normalizeMonthlyStats(parsed);
          localStorage.setItem(LS.monthlyStats, JSON.stringify(norm));
          return norm;
        }catch(e){
          const def = defaultMonthlyStats();
          localStorage.setItem(LS.monthlyStats, JSON.stringify(def));
          return def;
        }
      }

      function saveMonthlyStats(stats){
        const norm = normalizeMonthlyStats(stats);
        localStorage.setItem(LS.monthlyStats, JSON.stringify(norm));
      }

      function addMonthlySales(amount = 0){
        const s = loadMonthlyStats();
        s.monthKey = getMonthKey();
        s.sales = Number(s.sales || 0) + Math.max(0, Number(amount || 0));
        saveMonthlyStats(s);
      }

      const SEEDS = [
        { id:"seed_random",  name:"なに出るタネ", desc:"何が育つかは完全ランダム。\n店主も知らない。", img:"https://ul.h3z.jp/gnyvP580.png", fx:"完全ランダム" },
        { id:"seed_shop",    name:"店頭タネ", desc:"店で生まれたタネ。\n店頭ナンバーを宿している。", img:"https://ul.h3z.jp/IjvuhWoY.png", fx:"店頭の気配" },
        { id:"seed_line",    name:"回線タネ", desc:"画面の向こうから届いたタネ。\nクリックすると芽が出る。", img:"https://ul.h3z.jp/AonxB5x7.png", fx:"回線由来" },
        { id:"seed_special", name:"たこぴのタネ", desc:"今はまだ何も起きない。\nそのうち何か起きる。", img:"https://ul.h3z.jp/29OsEvjf.png", fx:"待て" },
        { id:"seed_bussasari", name:"ブッ刺さりタネ", desc:"心に刺さる。\n財布にも刺さる。", img:"https://ul.h3z.jp/MjWkTaU3.png", fx:"刺さり補正" },
        { id:"seed_namara_kawasar", name:"なまら買わさるタネ", desc:"気付いたら買ってる。\nレジ前の魔物。", img:"https://ul.h3z.jp/yiqHzfi0.png", fx:"買わさり圧" }
      ];

      const WATERS = [
        { id:"water_plain_free", name:"ただの水", desc:"無料・UR/LRなし。\n無課金の基準。", img:"https://ul.h3z.jp/13XdhuHi.png", fx:"基準（水）" },
        { id:"water_nice",       name:"なんか良さそうな水", desc:"ちょい上振れ・LRなし。\n初心者の背中押し。", img:"https://ul.h3z.jp/3z04ypEd.png", fx:"ちょい上振れ" },
        { id:"water_suspicious", name:"怪しい水", desc:"現実準拠・標準。\n実パックと同じ空気。", img:"https://ul.h3z.jp/wtCO9mec.png", fx:"標準（現実準拠）" },
        { id:"water_overdo",     name:"やりすぎな水", desc:"勝負水・現実より上。\n体感で強い。", img:"https://ul.h3z.jp/vsL9ggf6.png", fx:"勝負" },
        { id:"water_regret",     name:"押さなきゃよかった水", desc:"確定枠・狂気。\n事件製造機（SNS向け）", img:"https://ul.h3z.jp/L0nafMOp.png", fx:"事件" }
      ];

      const FERTS = [
        { id:"fert_agedama", name:"ただの揚げ玉", desc:"時短0。\n《焼きすぎたカード》率UP", img:"https://ul.h3z.jp/9p5fx53n.png", fx:"時短 0%" },
        { id:"fert_feel",    name:"気のせい肥料", desc:"早くなった気がする。\n気のせいかもしれない。", img:"https://ul.h3z.jp/XqFTb7sw.png", fx:"時短 5%" },
        { id:"fert_guts",    name:"根性論ぶち込み肥料", desc:"理由はない。\n気合いだ。", img:"https://ul.h3z.jp/bT9ZcNnS.png", fx:"時短 20%" },
        { id:"fert_skip",    name:"工程すっ飛ばし肥料", desc:"途中は、\n見なかったことにした。", img:"https://ul.h3z.jp/FqPzx12Q.png", fx:"時短 40%" },
        { id:"fert_timeno",  name:"時間を信じない肥料", desc:"最終兵器・禁忌。\n稀に《ドロドロ生焼けカード》", img:"https://ul.h3z.jp/l2njWY57.png", fx:"時短 90〜100%" }
      ];

      const PRICE = {
        seed_random: 100,
        seed_shop: 200,
        seed_line: 200,
        seed_special: 10000,
        seed_bussasari: 50000,
        seed_namara_kawasar: 30000,
        water_plain_free: 50,
        water_nice: 100,
        water_suspicious: 300,
        water_overdo: 500,
        water_regret: 200,
        fert_agedama: 50,
        fert_feel: 100,
        fert_guts: 150,
        fert_skip: 200,
        fert_timeno: 300
      };

      function buildGoods(){
        const goods = [];

        for(const s of SEEDS){
          goods.push({
            kind:"seed",
            id:s.id,
            name:s.name,
            desc:s.desc,
            fx:s.fx,
            img:s.img,
            price: PRICE[s.id] ?? 18,
            tag:"販売"
          });
        }

        for(const w of WATERS){
          goods.push({
            kind:"water",
            id:w.id,
            name:w.name,
            desc:w.desc,
            fx:w.fx,
            img:w.img,
            price: PRICE[w.id] ?? 18,
            tag:"販売"
          });
        }

        for(const f of FERTS){
          goods.push({
            kind:"fert",
            id:f.id,
            name:f.name,
            desc:f.desc,
            fx:f.fx,
            img:f.img,
            price: PRICE[f.id] ?? 18,
            tag:"販売"
          });
        }

        return goods;
      }

      const GOODS = buildGoods();

      const SAY = [
        "「いらっしゃい…たこ。今日は何を仕入れていく…たこ？」",
        "「この店は、よくある道具屋みたいで…ちょっとだけ変…たこ。」",
        "「タネは物語、水は運、ヒリョウは近道…でも近道は、だいたい何かある…たこ。」",
        "「買うってことは、未来を少しだけ先に決めるってこと…たこ。」"
      ];

      function getModalEls(){
        return {
          modal: document.getElementById("modal"),
          bg: document.getElementById("modalBg"),
          x: document.getElementById("modalX"),
          title: document.getElementById("modalTitle"),
          body: document.getElementById("modalBody")
        };
      }

      function forceModalStyle(modal){
        if(!modal) return;
        modal.style.setProperty("position","fixed","important");
        modal.style.setProperty("inset","0","important");
        modal.style.setProperty("z-index","2147483646","important");
        modal.style.setProperty("display","block","important");
        modal.style.setProperty("pointer-events","auto","important");
      }

      function openModal(title, html){
        const { modal, title:ttl, body } = getModalEls();
        if(!modal || !ttl || !body){
          toastHype("⚠️ modal要素が見つからない。", {kind:"bad"});
          return;
        }

        ttl.textContent = title || "メニュー";
        body.innerHTML = html || "";

        forceModalStyle(modal);
        modal.classList.add("is-open");
        modal.setAttribute("aria-hidden","false");

        requestAnimationFrame(() => {
          forceModalStyle(modal);
          modal.classList.add("is-open");
        });

        document.documentElement.style.overflow = "hidden";
        document.body.style.overflow = "hidden";
      }

      function closeModal(){
        const { modal, body } = getModalEls();
        if(!modal) return;

        modal.classList.remove("is-open");
        modal.setAttribute("aria-hidden","true");
        if(body) body.innerHTML = "";

        modal.style.removeProperty("display");
        modal.style.removeProperty("position");
        modal.style.removeProperty("inset");
        modal.style.removeProperty("z-index");
        modal.style.removeProperty("pointer-events");

        document.documentElement.style.overflow = "";
        document.body.style.overflow = "";
      }

      function wireModalClose(){
        const { bg, x } = getModalEls();
        bg?.addEventListener("click", closeModal);
        x?.addEventListener("click", closeModal);
        document.addEventListener("keydown", (e) => {
          if(e.key === "Escape") closeModal();
        });
      }

      function ownedCount(inv, kind, id){
        return Number((inv[kind] || {})[id] || 0);
      }

      function totalKindVisible(inv, kind){
        const ids = GOODS.filter(g => g.kind === kind).map(g => g.id);
        let total = 0;
        for(const id of ids){
          total += Number((inv[kind] || {})[id] || 0);
        }
        return total;
      }

      function ensureInvKeys(){
        const inv = loadInv();
        inv.seed = inv.seed || {};
        inv.water = inv.water || {};
        inv.fert = inv.fert || {};

        for(const g of GOODS){
          if(!(g.id in inv[g.kind])) inv[g.kind][g.id] = 0;
        }

        saveInv(inv);
        return inv;
      }

      function setTakopiSayRandom(){
        const t = SAY[Math.floor(Math.random() * SAY.length)];
        const el = $("#takopiSay");
        if(el) el.innerHTML = t.replace(/\n/g, "<br>");
      }

      function refreshHUD(){
        const inv = ensureInvKeys();
        $("#octoNow").textContent = String(getOcto());
        $("#chipSeed").textContent = String(totalKindVisible(inv, "seed"));
        $("#chipWater").textContent = String(totalKindVisible(inv, "water"));
        $("#chipFert").textContent = String(totalKindVisible(inv, "fert"));
      }

      function toastHype(text, opt = {}){
        const el = $("#toast");
        if(!el) return;

        const kind = opt.kind || "info";
        el.textContent = text || "";

        if(kind === "good"){
          el.style.setProperty("border","1px solid rgba(159,255,168,.35)","important");
          el.style.setProperty("box-shadow","0 18px 44px rgba(0,0,0,.55), 0 0 22px rgba(159,255,168,.18)","important");
        }else if(kind === "bad"){
          el.style.setProperty("border","1px solid rgba(255,154,165,.38)","important");
          el.style.setProperty("box-shadow","0 18px 44px rgba(0,0,0,.55), 0 0 22px rgba(255,154,165,.16)","important");
        }else{
          el.style.setProperty("border","1px solid rgba(255,255,255,.16)","important");
          el.style.setProperty("box-shadow","0 18px 44px rgba(0,0,0,.55)","important");
        }

        clearTimeout(toastHype._t);
        el.style.opacity = "0";
        el.style.transform = "translateY(10px) scale(.98)";
        void el.offsetHeight;

        requestAnimationFrame(() => {
          el.style.opacity = "1";
          el.style.transform = "translateY(0) scale(1)";
        });

        toastHype._t = setTimeout(() => {
          el.style.opacity = "0";
          el.style.transform = "translateY(10px) scale(.98)";
        }, 1900);
      }

      function clamp(n, min, max){
        n = Math.floor(Number(n) || 0);
        if(n < min) return min;
        if(n > max) return max;
        return n;
      }

      function buyMany(item, qty){
        qty = clamp(qty, 1, 99);
        const price = Math.max(0, Number(item.price || 0));
        const total = price * qty;
        const octo = getOcto();

        if(octo < total) return { ok:false };

        const inv = ensureInvKeys();
        inv[item.kind] = inv[item.kind] || {};
        inv[item.kind][item.id] = Number(inv[item.kind][item.id] || 0) + qty;
        saveInv(inv);

        setOcto(octo - total);
        addMonthlySales(total);
        pushLog(`購入：${item.name} ×${qty} -${total}オクト`);

        refreshHUD();
        renderGoods();
        setTakopiSayRandom();
        return { ok:true, total, qty };
      }

      let currentKind = "seed";

      function renderGoods(){
        const inv = ensureInvKeys();
        const grid = $("#goodsGrid");
        if(!grid) return;

        const list = GOODS.filter(g => g.kind === currentKind);

        grid.innerHTML = list.map(g => {
          const own = String(ownedCount(inv, g.kind, g.id));
          const badge = g.tag ? `<span class="miniTag">${g.tag}</span>` : "";

          return `
            <article class="good" data-kind="${g.kind}" data-id="${g.id}">
              <div class="good-top">
                <div class="good-img">
                  <span class="ownBadge">×<b>${own}</b></span>
                  <img src="${g.img}" alt="${g.name}" loading="lazy">
                </div>
                <div class="good-meta">
                  <div class="good-name">${g.name} ${badge}</div>
                  <div class="good-desc">${(g.desc || "").replace(/\n/g,"<br>")}</div>
                  <div class="good-fx">${g.fx ? `効果：<b>${g.fx}</b>` : ""}</div>
                </div>
              </div>

              <div class="good-row">
                <div class="good-buy">
                  <div class="buybar">
                    <div class="qty">
                      <button class="btn qtybtn qtyminus" type="button">−</button>
                      <input class="qtyin" type="number" inputmode="numeric" min="1" max="99" value="1">
                      <button class="btn qtybtn qtyplus" type="button">＋</button>
                    </div>
                    <button class="btn buybtn" type="button">買う</button>
                  </div>
                  <div class="priceline">単価 <b>${g.price}</b> オクト</div>
                </div>
              </div>
            </article>
          `;
        }).join("");

        $$(".good", grid).forEach(card => {
          const kind = card.getAttribute("data-kind");
          const id = card.getAttribute("data-id");
          const item = GOODS.find(x => x.kind === kind && x.id === id);
          if(!item) return;

          const btn   = $(".buybtn", card);
          const minus = $(".qtyminus", card);
          const plus  = $(".qtyplus", card);
          const qtyIn = $(".qtyin", card);

          function getQty(){
            return clamp(Number(qtyIn.value || 1), 1, 99);
          }

          function setQty(v){
            qtyIn.value = String(clamp(v, 1, 99));
          }

          minus?.addEventListener("click", (e) => {
            e.preventDefault();
            setQty(getQty() - 1);
          });

          plus?.addEventListener("click", (e) => {
            e.preventDefault();
            setQty(getQty() + 1);
          });

          qtyIn?.addEventListener("input", () => {
            setQty(getQty());
          });

          btn?.addEventListener("click", (e) => {
            e.preventDefault();
            const qty = getQty();
            const r = buyMany(item, qty);
            if(!r.ok){
              toastHype("💥 オクトが足りない。", {kind:"bad"});
              return;
            }
            toastHype(`✨ 購入完了！「${item.name}」×${r.qty}（-${r.total}オクト）✨`, {kind:"good"});
          });
        });
      }

      function openBreakdownModal(kindKey){
        const inv = ensureInvKeys();

        const titleMap = {
          seed:"🌱 種の内訳",
          water:"💧 水の内訳",
          fert:"🧪 ヒリョウの内訳"
        };

        const items = GOODS.filter(g => g.kind === kindKey);

        const rows = items.map(g => {
          const c = String(ownedCount(inv, g.kind, g.id));
          return `
            <div class="inv-row">
              <div class="inv-left">
                <span class="inv-name">${g.name}</span>
              </div>
              <div class="inv-right">×<b>${c}</b></div>
            </div>
          `;
        }).join("");

        openModal(titleMap[kindKey], `
          <div class="mikuji-wrap">
            <div class="inv-box">
              <div class="inv-title">${titleMap[kindKey]}</div>
              ${rows || `<div class="note">まだ何もない。</div>`}
            </div>
            <div class="row">
              <button class="btn btn-ghost" id="okBreakdown" type="button">閉じる</button>
            </div>
          </div>
        `);

        $("#okBreakdown", document.getElementById("modalBody"))?.addEventListener("click", closeModal);
      }

      function wireResourceSummary(){
        const el = $("#resourcesSummary");
        if(!el) return;

        const open = () => {
          openModal("📦 所持資材の内訳", `
            <div class="mikuji-wrap">
              <div class="inv-box">
                <div class="inv-title">🌱 種</div>
                ${GOODS.filter(g => g.kind === "seed").map(g => `
                  <div class="inv-row">
                    <div class="inv-left"><span class="inv-name">${g.name}</span></div>
                    <div class="inv-right">×<b>${ownedCount(loadInv(), "seed", g.id)}</b></div>
                  </div>
                `).join("")}
              </div>

              <div class="inv-box">
                <div class="inv-title">💧 水</div>
                ${GOODS.filter(g => g.kind === "water").map(g => `
                  <div class="inv-row">
                    <div class="inv-left"><span class="inv-name">${g.name}</span></div>
                    <div class="inv-right">×<b>${ownedCount(loadInv(), "water", g.id)}</b></div>
                  </div>
                `).join("")}
              </div>

              <div class="inv-box">
                <div class="inv-title">🧪 ヒリョウ</div>
                ${GOODS.filter(g => g.kind === "fert").map(g => `
                  <div class="inv-row">
                    <div class="inv-left"><span class="inv-name">${g.name}</span></div>
                    <div class="inv-right">×<b>${ownedCount(loadInv(), "fert", g.id)}</b></div>
                  </div>
                `).join("")}
              </div>

              <div class="row">
                <button class="btn btn-ghost" id="okSummary" type="button">閉じる</button>
              </div>
            </div>
          `);

          $("#okSummary", document.getElementById("modalBody"))?.addEventListener("click", closeModal);
          setTakopiSayRandom();
        };

        el.addEventListener("click", open);
        el.addEventListener("keydown", (e) => {
          if(e.key === "Enter" || e.key === " "){
            e.preventDefault();
            open();
          }
        });
      }

      function openAboutModal(){
        openModal("📘 タネ/ミズ/ヒリョウについて", `
          <div class="mikuji-wrap">
            <div class="note">
              ここは仕様書というより、<b>たこぴのお店の仕入れメモ</b>みたいなもの。<br>
              最終的な抽選や成長は、たこ焼き畑側のロジックに従う。
            </div>

            <div class="inv-box">
              <div class="inv-title">🌱 タネ（何を育てるか）</div>
              <div class="note">
                タネは、<b>どんなカードが育ちやすいか</b>の入口。<br>
                ・なに出るタネ：完全ランダム<br>
                ・店頭タネ：店の空気を帯びた枠<br>
                ・回線タネ：画面の向こう由来<br>
                ・たこぴのタネ：静かな特別枠<br>
                ・ブッ刺さり / なまら買わさる：高額で濃い体験向け
              </div>
            </div>

            <div class="inv-box">
              <div class="inv-title">💧 ミズ（レア度の押し上げ）</div>
              <div class="note">
                ミズは、<b>レア抽選の上振れ</b>に関わる。<br>
                ・ただの水：基準<br>
                ・なんか良さそうな水：少し上振れ<br>
                ・怪しい水：標準<br>
                ・やりすぎな水：勝負用<br>
                ・押さなきゃよかった水：事件用
              </div>
            </div>

            <div class="inv-box">
              <div class="inv-title">🧪 ヒリョウ（時間や事故率の調整）</div>
              <div class="note">
                ヒリョウは、<b>時短や事故率</b>に影響する。<br>
                ・ただの揚げ玉：時短0<br>
                ・気のせい肥料：少し短縮<br>
                ・根性論ぶち込み：中くらい短縮<br>
                ・工程すっ飛ばし：かなり短縮<br>
                ・時間を信じない：最終兵器
              </div>
            </div>

            <div class="row">
              <button class="btn btn-ghost" id="okAbout" type="button">閉じる</button>
            </div>
          </div>
        `);

        $("#okAbout", document.getElementById("modalBody"))?.addEventListener("click", closeModal);
      }

      function wireTabs(){
        $$(".goods-tab").forEach(btn => {
          btn.addEventListener("click", () => {
            $$(".goods-tab").forEach(b => b.classList.remove("is-active"));
            btn.classList.add("is-active");
            currentKind = btn.getAttribute("data-kind") || "seed";
            renderGoods();
          });
        });
      }

      function wireButtons(){
        $("#btnOpenRates")?.addEventListener("click", () => {
          openAboutModal();
          setTakopiSayRandom();
        });

        $("#rotenBackBtn")?.addEventListener("click", () => {
          if(history.length > 1){
            history.back();
          }else{
            location.href = "./index.html";
          }
        });
      }

      function setupFarmGuide(){
        const btn = $("#btnGoFarmTop");
        const badge = $("#farmBadge");
        const tip = $("#farmTip");
        if(!btn) return;

        const seen = localStorage.getItem(LS.farmGuideSeen) === "1";

        if(seen){
          btn.classList.remove("is-glow");
          if(badge) badge.style.display = "none";
          if(tip) tip.style.display = "none";
        }else{
          btn.classList.add("is-glow");
          if(badge) badge.style.display = "flex";
          if(tip) tip.style.display = "block";

          setTimeout(() => {
            if(tip) tip.style.display = "none";
          }, 6000);
        }

        btn.addEventListener("click", () => {
          localStorage.setItem(LS.farmGuideSeen, "1");
        });
      }

      function boot(){
        loadMonthlyStats();
        ensureInvKeys();
        setTakopiSayRandom();
        wireModalClose();
        wireTabs();
        wireButtons();
        wireResourceSummary();
        setupFarmGuide();
        refreshHUD();
        renderGoods();
        toastHype("✨ たこぴのお店 起動！", {kind:"info"});
      }

      if(document.readyState === "loading"){
        document.addEventListener("DOMContentLoaded", boot, { once:true });
      }else{
        boot();
      }
    })();
  </script>
</body>
</html>
