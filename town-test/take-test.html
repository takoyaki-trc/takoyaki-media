<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>テスト用アイテム配布</title>

<style>
  body{
    margin:0;
    min-height:100vh;
    display:grid;
    place-items:center;
    background:#fff7df;
    font-family:system-ui,-apple-system,"Noto Sans JP",sans-serif;
    color:#2b2116;
  }
  .box{
    width:min(92vw,420px);
    background:#fff;
    border:3px solid #2b2116;
    border-radius:20px;
    padding:24px;
    box-shadow:0 10px 0 rgba(0,0,0,.18);
    text-align:center;
  }
  h1{
    font-size:22px;
    margin:0 0 12px;
  }
  p{
    line-height:1.7;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:14px;
    padding:14px 16px;
    font-size:16px;
    font-weight:900;
    background:#111;
    color:#fff;
    cursor:pointer;
  }
  button:disabled{
    background:#999;
    cursor:not-allowed;
  }
  .result{
    margin-top:16px;
    font-weight:900;
    color:#d14b00;
    line-height:1.7;
  }
  .note{
    margin-top:14px;
    font-size:13px;
    color:#6b5a44;
  }
</style>
</head>

<body>
  <div class="box">
    <h1>テスト用アイテム配布</h1>

    <p>
      やりすぎな水 ×50<br>
      天からの一滴 ×50
    </p>

    <button id="giveBtn">受け取る</button>

    <div id="result" class="result"></div>

    <div class="note">
      ※この端末・このブラウザのデータに追加されます。<br>
      ※一度だけ受け取れる設定です。
    </div>
  </div>

<script>
(() => {
  "use strict";

  const LS_INV = "tf_v1_inv";
  const GIVE_KEY = "test_give_overdo_drop_once_v1";

  const WATER_ID = "water_overdo"; // やりすぎな水
  const FERT_ID = "fert_drop";     // 天からの一滴

  const GIVE_QTY = 50;

  const btn = document.getElementById("giveBtn");
  const result = document.getElementById("result");

  function loadJson(key, fallback) {
    try {
      const raw = localStorage.getItem(key);
      if (!raw) return fallback;
      return JSON.parse(raw);
    } catch (e) {
      return fallback;
    }
  }

  function saveJson(key, value) {
    localStorage.setItem(key, JSON.stringify(value));
  }

  function ensureInv(inv) {
    if (!inv || typeof inv !== "object") inv = {};
    inv.ver = inv.ver || 1;
    inv.seed = inv.seed || {};
    inv.water = inv.water || {};
    inv.fert = inv.fert || {};
    return inv;
  }

  function alreadyGiven() {
    return localStorage.getItem(GIVE_KEY) === "1";
  }

  function updateButton() {
    if (alreadyGiven()) {
      btn.disabled = true;
      btn.textContent = "受け取り済み";
      result.innerHTML = "すでに受け取り済みです。";
    }
  }

  btn.addEventListener("click", () => {
    if (alreadyGiven()) {
      updateButton();
      return;
    }

    const inv = ensureInv(loadJson(LS_INV, { ver: 1, seed: {}, water: {}, fert: {} }));

    inv.water[WATER_ID] = Number(inv.water[WATER_ID] || 0) + GIVE_QTY;
    inv.fert[FERT_ID] = Number(inv.fert[FERT_ID] || 0) + GIVE_QTY;

    saveJson(LS_INV, inv);
    localStorage.setItem(GIVE_KEY, "1");

    btn.disabled = true;
    btn.textContent = "受け取り完了";

    result.innerHTML =
      "受け取り完了！<br>" +
      "やりすぎな水 ×50<br>" +
      "天からの一滴 ×50<br>" +
      "畑ページに戻ると反映されます。";
  });

  updateButton();
})();
</script>
</body>
</html>
