<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>たこ焼き防衛アクション</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#111;overflow:hidden;font-family:system-ui,sans-serif;user-select:none}
#game{width:100vw;height:100dvh;max-width:520px;margin:0 auto;background:#79d6ff;position:relative;overflow:hidden;border-left:4px solid #111;border-right:4px solid #111}
#hud{position:absolute;top:0;left:0;right:0;height:58px;background:#2b160c;color:#fff;z-index:20;display:flex;justify-content:space-around;align-items:center;font-weight:900;border-bottom:4px solid #111}
.stat{background:#fff1b8;color:#2b160c;border:3px solid #111;border-radius:8px;padding:4px 6px;font-size:12px}
#world{position:absolute;left:0;top:58px;width:100%;height:calc(100% - 164px);overflow:hidden;background:linear-gradient(#86dfff 0%,#c7f2ff 55%,#78c957 56%,#4fa736 100%)}
#ground{position:absolute;left:0;right:0;bottom:0;height:62px;background:#6b3b1d;border-top:5px solid #2b160c}
#shop{position:absolute;left:8px;bottom:62px;font-size:48px;z-index:3}
#customer{position:absolute;left:18px;bottom:118px;font-size:32px;z-index:4}
#grill{position:absolute;left:82px;bottom:62px;width:76px;height:44px;background:#222;border:4px solid #111;border-radius:10px;z-index:4;text-align:center;color:#fff;font-size:11px;font-weight:900;padding-top:3px}
#chargeBar{position:absolute;left:6px;right:6px;bottom:5px;height:8px;background:#555;border:2px solid #111}
#chargeFill{height:100%;width:0%;background:#ffd35f}
#player{position:absolute;width:48px;height:64px;left:120px;bottom:62px;z-index:5;font-size:42px;display:flex;align-items:center;justify-content:center}
.enemy{position:absolute;width:46px;height:46px;font-size:38px;display:flex;align-items:center;justify-content:center;z-index:4}
.enemyName{position:absolute;top:-18px;left:-26px;width:100px;text-align:center;font-size:10px;font-weight:900;color:#fff;text-shadow:2px 2px #000}
.shot{position:absolute;width:28px;height:28px;border-radius:50%;border:3px solid #32180b;z-index:6}
.sauce{background:#b85b22}
.hot{background:#d92718}
.salt{background:#f2e4bd}
.item{position:absolute;width:34px;height:34px;font-size:30px;z-index:3}
#message{position:absolute;left:10px;right:10px;top:68px;background:#fff;color:#2b160c;border:4px solid #111;border-radius:12px;padding:8px;text-align:center;font-weight:900;z-index:30}
#controls{position:absolute;left:0;right:0;bottom:0;height:106px;background:#2b160c;border-top:4px solid #111;z-index:25;display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:8px}
button{border:4px solid #111;border-radius:12px;background:#ffd35f;color:#2b160c;font-weight:1000;font-size:12px;box-shadow:0 4px 0 #111}
button:active{transform:translateY(4px);box-shadow:none}
#start{position:absolute;left:50%;top:52%;transform:translate(-50%,-50%);z-index:50;width:220px;height:72px;background:#ff8b5a;font-size:20px}
#gameover{position:absolute;inset:0;background:rgba(0,0,0,.75);z-index:60;display:none;align-items:center;justify-content:center;text-align:center;color:#fff;font-weight:900;padding:20px}
#gameoverBox{background:#fff1b8;color:#2b160c;border:5px solid #111;border-radius:18px;padding:20px}
#restart{margin-top:14px;width:170px;height:56px;background:#ff8b5a}
</style>
</head>
<body>
<div id="game">
  <div id="hud">
    <div class="stat">店HP <span id="hp">5</span></div>
    <div class="stat">撃破 <span id="score">0</span></div>
    <div class="stat">弾 <span id="ammo">15</span></div>
    <div class="stat">必殺 <span id="sp">0</span>%</div>
    <div class="stat">味 <span id="type">ソース</span></div>
  </div>

  <div id="message">焼き台の近くで弾を補充！客を守れ！</div>

  <div id="world">
    <div id="ground"></div>
    <div id="shop">🏮</div>
    <div id="customer">🙂</div>
    <div id="grill">焼き台<div id="chargeBar"><div id="chargeFill"></div></div></div>
    <div id="player">🧑‍🍳</div>
  </div>

  <button id="start">営業開始</button>

  <div id="controls">
    <button id="left">←</button>
    <button id="right">→</button>
    <button id="jump">跳ぶ</button>
    <button id="attack">投げる</button>
    <button id="skill">必殺</button>
    <button id="sauceBtn">ソース</button>
    <button id="hotBtn">辛口</button>
    <button id="saltBtn">塩</button>
    <button id="dummy1">焼台で補充</button>
    <button id="dummy2">客を守れ</button>
  </div>

  <div id="gameover">
    <div id="gameoverBox">
      <div id="resultText"></div>
      <button id="restart">もう一度</button>
    </div>
  </div>
</div>

<script>
const world=document.getElementById("world");
const playerEl=document.getElementById("player");
const hpEl=document.getElementById("hp");
const scoreEl=document.getElementById("score");
const ammoEl=document.getElementById("ammo");
const spEl=document.getElementById("sp");
const typeEl=document.getElementById("type");
const msgEl=document.getElementById("message");
const startBtn=document.getElementById("start");
const gameoverEl=document.getElementById("gameover");
const resultText=document.getElementById("resultText");
const chargeFill=document.getElementById("chargeFill");

let running=false,last=0,spawn=0,itemSpawn=0,bossSpawned=false;
let keys={},enemies=[],shots=[],items=[];
let shotType="sauce",charge=0;

let player={x:120,y:62,vx:0,vy:0,w:48,h:64,hp:5,ammo:15,score:0,sp:0,facing:1,inv:0};

const groundY=62,gravity=1500,speed=260,jumpPower=620;

const enemyTypes=[
  {icon:"🐙",name:"焦げタコ",hp:1,speed:95},
  {icon:"💸",name:"原価高騰",hp:2,speed:75},
  {icon:"⭐",name:"低評価",hp:1,speed:135},
  {icon:"🌶️",name:"辛口魔人",hp:2,speed:110}
];

function msg(t){msgEl.textContent=t}
function updateHud(){
  hpEl.textContent=player.hp;
  scoreEl.textContent=player.score;
  ammoEl.textContent=player.ammo;
  spEl.textContent=Math.floor(player.sp);
  typeEl.textContent=shotType==="sauce"?"ソース":shotType==="hot"?"辛口":"塩";
  chargeFill.style.width=Math.min(100,charge)+"%";
}

function startGame(){
  running=true;bossSpawned=false;charge=0;shotType="sauce";
  player={x:120,y:62,vx:0,vy:0,w:48,h:64,hp:5,ammo:15,score:0,sp:0,facing:1,inv:0};
  enemies.forEach(e=>e.el.remove());shots.forEach(s=>s.el.remove());items.forEach(i=>i.el.remove());
  enemies=[];shots=[];items=[];
  spawn=0;itemSpawn=0;
  startBtn.style.display="none";gameoverEl.style.display="none";
  msg("営業開始！敵がお客さんに届く前に焼き払え！");
  updateHud();
  last=performance.now();
  requestAnimationFrame(loop);
}

function endGame(win=false){
  running=false;
  resultText.innerHTML=win
    ? `勝利！<br>原価高騰魔王を焼き払った！<br>撃破数：${player.score}`
    : `営業終了……<br>撃破数：${player.score}<br>客席を守りきれなかった。`;
  gameoverEl.style.display="flex";
}

function loop(now){
  if(!running)return;
  const dt=Math.min((now-last)/1000,.033);last=now;

  updatePlayer(dt);updateShots(dt);updateEnemies(dt);updateItems(dt);

  spawn+=dt;itemSpawn+=dt;
  if(spawn>Math.max(.55,1.5-player.score*.025)){
    spawnEnemy(false);spawn=0;
  }
  if(itemSpawn>8){spawnItem();itemSpawn=0}

  if(player.score>=20 && !bossSpawned){
    bossSpawned=true;spawnEnemy(true);msg("⚠ 原価高騰魔王が来た！");
  }

  updateHud();
  requestAnimationFrame(loop);
}

function updatePlayer(dt){
  let m=0;if(keys.left)m--;if(keys.right)m++;
  player.vx=m*speed;if(m)player.facing=m;
  player.x+=player.vx*dt;
  player.x=Math.max(5,Math.min(world.clientWidth-player.w-5,player.x));
  player.vy-=gravity*dt;player.y+=player.vy*dt;
  if(player.y<groundY){player.y=groundY;player.vy=0}

  const nearGrill=player.x>65&&player.x<160&&player.y<=groundY+2;
  if(nearGrill){
    charge+=45*dt;
    if(charge>=100){
      charge=0;player.ammo+=8;player.sp=Math.min(100,player.sp+8);
      msg("焼き台でたこ焼き補充！");
    }
  }

  if(player.inv>0){
    player.inv-=dt;
    playerEl.style.opacity=Math.floor(player.inv*10)%2?".35":"1";
  }else playerEl.style.opacity="1";

  playerEl.style.left=player.x+"px";
  playerEl.style.bottom=player.y+"px";
  playerEl.style.transform=player.facing===-1?"scaleX(-1)":"scaleX(1)";
}

function jump(){
  if(running&&player.y<=groundY+1)player.vy=jumpPower;
}

function attack(){
  if(!running)return;
  if(player.ammo<=0){msg("弾切れ！焼き台に戻って補充！");return}
  player.ammo--;

  const el=document.createElement("div");
  el.className="shot "+shotType;
  world.appendChild(el);

  shots.push({
    el,type:shotType,
    x:player.x+(player.facing===1?40:-8),
    y:player.y+28,
    vx:player.facing*540,
    w:28,h:28
  });
}

function special(){
  if(!running)return;
  if(player.sp<100){msg("必殺ゲージ不足！");return}
  player.sp=0;
  msg("💥 必殺《熱々地獄キャッチボール》発動！");
  for(let i=enemies.length-1;i>=0;i--){
    enemies[i].hp-=5;
    if(enemies[i].hp<=0){
      enemies[i].el.remove();
      enemies.splice(i,1);
      player.score++;
    }
  }
}

function updateShots(dt){
  for(let i=shots.length-1;i>=0;i--){
    const s=shots[i];s.x+=s.vx*dt;
    s.el.style.left=s.x+"px";s.el.style.bottom=s.y+"px";
    if(s.x<-40||s.x>world.clientWidth+40){s.el.remove();shots.splice(i,1)}
  }
}

function spawnEnemy(boss){
  const t=boss?{icon:"👹",name:"原価高騰魔王",hp:18,speed:45}:enemyTypes[Math.floor(Math.random()*enemyTypes.length)];
  const el=document.createElement("div");
  el.className="enemy";
  el.style.fontSize=boss?"54px":"38px";
  el.style.width=boss?"70px":"46px";
  el.style.height=boss?"70px":"46px";
  el.innerHTML=`<div class="enemyName">${t.name}</div>${t.icon}`;
  world.appendChild(el);
  enemies.push({
    el,name:t.name,boss,
    x:world.clientWidth+50,y:groundY,w:boss?70:46,h:boss?70:46,
    hp:t.hp,speed:t.speed+Math.min(70,player.score*1.5)
  });
}

function updateEnemies(dt){
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    e.x-=e.speed*dt;
    e.el.style.left=e.x+"px";e.el.style.bottom=e.y+"px";

    for(let j=shots.length-1;j>=0;j--){
      const s=shots[j];
      if(hit(s,e)){
        let dmg=1;
        if(s.type==="hot")dmg=2;
        if(s.type==="salt"&&e.boss)dmg=3;
        e.hp-=dmg;
        s.el.remove();shots.splice(j,1);

        if(e.hp<=0){
          e.el.remove();enemies.splice(i,1);
          player.score++;
          player.sp=Math.min(100,player.sp+15);
          player.ammo+=2;
          msg(e.boss?"🏆 魔王撃破！":"敵を焼いた！");
          if(e.boss)endGame(true);
          return;
        }
      }
    }

    if(hit(player,e)&&player.inv<=0){
      player.hp--;player.inv=1.2;
      msg(e.name+"にぶつかった！");
      if(player.hp<=0){updateHud();endGame();return}
    }

    if(e.x<55){
      e.el.remove();enemies.splice(i,1);
      player.hp--;
      msg("敵がお客さんに到達！クレーム発生！");
      if(player.hp<=0){updateHud();endGame();return}
    }
  }
}

function spawnItem(){
  const list=[{icon:"🥚",type:"heal"},{icon:"🍘",type:"ammo"},{icon:"🔥",type:"sp"}];
  const it=list[Math.floor(Math.random()*list.length)];
  const el=document.createElement("div");
  el.className="item";el.textContent=it.icon;world.appendChild(el);
  items.push({el,type:it.type,x:world.clientWidth+30,y:groundY+20+Math.random()*100,w:34,h:34,speed:90});
}

function updateItems(dt){
  for(let i=items.length-1;i>=0;i--){
    const it=items[i];it.x-=it.speed*dt;
    it.el.style.left=it.x+"px";it.el.style.bottom=it.y+"px";
    if(hit(player,it)){
      if(it.type==="heal"){player.hp=Math.min(5,player.hp+1);msg("マヨで回復！")}
      if(it.type==="ammo"){player.ammo+=10;msg("たこ焼き補充！")}
      if(it.type==="sp"){player.sp=Math.min(100,player.sp+35);msg("火力上昇！")}
      it.el.remove();items.splice(i,1);continue;
    }
    if(it.x<-50){it.el.remove();items.splice(i,1)}
  }
}

function hit(a,b){
  return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;
}

function press(n,v){keys[n]=v}

["left","right"].forEach(id=>{
  const el=document.getElementById(id);
  el.addEventListener("touchstart",e=>{e.preventDefault();press(id,true)});
  el.addEventListener("touchend",e=>{e.preventDefault();press(id,false)});
  el.onmousedown=()=>press(id,true);
  el.onmouseup=()=>press(id,false);
});
document.getElementById("jump").ontouchstart=e=>{e.preventDefault();jump()};
document.getElementById("attack").ontouchstart=e=>{e.preventDefault();attack()};
document.getElementById("skill").ontouchstart=e=>{e.preventDefault();special()};
document.getElementById("jump").onmousedown=jump;
document.getElementById("attack").onmousedown=attack;
document.getElementById("skill").onmousedown=special;

document.getElementById("sauceBtn").onclick=()=>{shotType="sauce";msg("ソース弾：安定")};
document.getElementById("hotBtn").onclick=()=>{shotType="hot";msg("辛口弾：高火力")};
document.getElementById("saltBtn").onclick=()=>{shotType="salt";msg("塩弾：ボスに強い")};

window.addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft")press("left",true);
  if(e.key==="ArrowRight")press("right",true);
  if(e.key==="ArrowUp"||e.key===" ")jump();
  if(e.key==="z")attack();
  if(e.key==="x")special();
});
window.addEventListener("keyup",e=>{
  if(e.key==="ArrowLeft")press("left",false);
  if(e.key==="ArrowRight")press("right",false);
});

startBtn.onclick=startGame;
document.getElementById("restart").onclick=startGame;
updateHud();
</script>
</body>
</html>
