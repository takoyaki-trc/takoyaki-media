<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>たこ焼きジャンプゲーム</title>

<style>
html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:#111;
  color:#fff;
  font-family:system-ui,sans-serif;
  overflow:hidden;
  touch-action:none;
}

#game{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
  user-select:none;
  background:linear-gradient(#7ec7ff 0%,#bfe8ff 52%,#8d7657 53%,#3b2715 100%);
}

/* 街背景 */
#city{
  position:absolute;
  left:0;
  bottom:92px;
  width:220vw;
  height:230px;
  z-index:1;
  background:
    linear-gradient(#6c86a0,#4f6478);
  animation:cityMove 12s linear infinite;
}

#city::before{
  content:"";
  position:absolute;
  left:0;
  bottom:0;
  width:100%;
  height:100%;
  background:
    linear-gradient(#d9b16f,#d9b16f) 20px 80px/90px 150px,
    linear-gradient(#9fc3d8,#9fc3d8) 140px 40px/120px 190px,
    linear-gradient(#c9855f,#c9855f) 300px 100px/95px 130px,
    linear-gradient(#b7b7b7,#b7b7b7) 440px 60px/130px 170px,
    linear-gradient(#e0c27d,#e0c27d) 620px 90px/110px 140px,
    linear-gradient(#8fb0c8,#8fb0c8) 780px 50px/120px 180px,
    linear-gradient(#c7775d,#c7775d) 940px 105px/100px 125px,
    linear-gradient(#b8b8b8,#b8b8b8) 1100px 70px/130px 160px,
    linear-gradient(#d9b16f,#d9b16f) 1280px 90px/100px 140px,
    linear-gradient(#9fc3d8,#9fc3d8) 1440px 45px/130px 185px;
  background-repeat:repeat-x;
}

#city::after{
  content:"";
  position:absolute;
  left:0;
  bottom:40px;
  width:100%;
  height:70px;
  background:
    repeating-linear-gradient(
      90deg,
      transparent 0 38px,
      rgba(255,255,210,.8) 38px 52px,
      transparent 52px 90px
    );
  opacity:.9;
}

@keyframes cityMove{
  from{ transform:translateX(0); }
  to{ transform:translateX(-110vw); }
}

#road{
  position:absolute;
  left:0;
  bottom:0;
  width:100%;
  height:92px;
  background:
    repeating-linear-gradient(
      90deg,
      #3d3d3d 0 70px,
      #464646 70px 140px
    );
  border-top:6px solid #f0d07a;
  z-index:2;
}

#road::after{
  content:"";
  position:absolute;
  left:0;
  top:38px;
  width:200%;
  height:8px;
  background:repeating-linear-gradient(
    90deg,
    #fff 0 60px,
    transparent 60px 120px
  );
  animation:roadLineMove 1.5s linear infinite;
}

@keyframes roadLineMove{
  from{ transform:translateX(0); }
  to{ transform:translateX(120px); }
}

#hud{
  position:absolute;
  top:10px;
  left:10px;
  z-index:30;
  font-weight:bold;
  line-height:1.6;
  text-shadow:2px 2px #000;
}

#player{
  position:absolute;
  right:8vw;
  bottom:80px;
  width:150px;
  height:auto;
  z-index:15;
  image-rendering:pixelated;
  transform-origin:center bottom;
}

.run{
  animation:runBob .25s infinite alternate;
}

@keyframes runBob{
  from{ transform:translateY(0) rotate(1deg); }
  to{ transform:translateY(-7px) rotate(-1deg); }
}

.jump{
  transform:rotate(0deg);
}

.takoyaki{
  position:absolute;
  left:-120px;
  bottom:80px;
  border-radius:50%;
  background:
    radial-gradient(circle at 35% 28%, #ffd28a 0 13%, transparent 14%),
    radial-gradient(circle at 60% 65%, #7a2d12 0 18%, transparent 19%),
    radial-gradient(circle at 50% 50%, #c96b22 0 60%, #7a2d12 61% 100%);
  box-shadow:inset -6px -8px #5b1e0d, inset 5px 5px #f0a64a;
  z-index:10;
}

.takoyaki::before{
  content:"";
  position:absolute;
  left:20%;
  top:18%;
  width:60%;
  height:12%;
  background:#fff4d8;
  transform:rotate(-20deg);
  box-shadow:0 12px #2e9b43, 10px 22px #fff4d8;
}

.line{
  position:absolute;
  bottom:92px;
  height:6px;
  border-radius:4px;
  opacity:.95;
  z-index:6;
}

#successLine{
  right:30vw;
  width:22vw;
  background:#ffe066;
  box-shadow:0 0 12px #ffe066;
}

#perfectLine{
  right:38vw;
  width:6vw;
  background:#fff;
  box-shadow:0 0 18px #fff;
}

#message{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  z-index:50;
  background:rgba(0,0,0,.58);
  font-size:22px;
  font-weight:bold;
  line-height:1.7;
  padding:20px;
}

.hidden{
  display:none!important;
}
</style>
</head>

<body>
<div id="game">
  <div id="city"></div>

  <div id="hud">
    SCORE：<span id="score">0</span><br>
    COMBO：<span id="combo">0</span><br>
    BONUS：×<span id="bonus">1.0</span>
  </div>

  <div id="successLine" class="line"></div>
  <div id="perfectLine" class="line"></div>

  <img id="player" class="run" src="https://ul.h3z.jp/s2peAezZ.png" alt="player">

  <div id="road"></div>

  <div id="message">
    たこ焼きジャンプ！<br>
    タップでジャンプ<br>
    長押しで大ジャンプ<br><br>
    画面を押してスタート
  </div>
</div>

<script>
(() => {
  const game = document.getElementById("game");
  const player = document.getElementById("player");
  const scoreEl = document.getElementById("score");
  const comboEl = document.getElementById("combo");
  const bonusEl = document.getElementById("bonus");
  const message = document.getElementById("message");

  let started = false;
  let gameOver = false;

  let score = 0;
  let combo = 0;
  let bonus = 1;

  const groundBottom = 80;

  let playerY = 0;
  let velocityY = 0;
  const gravity = 0.72;

  const firstJumpPower = 15;
  const holdBoostPower = 0.72;
  const maxHoldFrames = 32;

  let isGround = true;
  let isPressing = false;
  let holdFrames = 0;

  let takoyakis = [];
  let lastSpawn = 0;
  let spawnInterval = 1500;

  const sizes = [
    { name:"極小", size:34, minSpeed:2.4, maxSpeed:3.8, point:80 },
    { name:"小", size:48, minSpeed:2.2, maxSpeed:3.5, point:100 },
    { name:"中", size:66, minSpeed:2.0, maxSpeed:3.2, point:130 },
    { name:"大", size:86, minSpeed:1.8, maxSpeed:2.9, point:170 },
    { name:"特大", size:112, minSpeed:1.6, maxSpeed:2.6, point:230 }
  ];

  function updateHud(){
    scoreEl.textContent = Math.floor(score);
    comboEl.textContent = combo;
    bonusEl.textContent = bonus.toFixed(1);
  }

  function startGame(){
    if(started) return;
    started = true;
    message.classList.add("hidden");
    requestAnimationFrame(loop);
  }

  function startPress(e){
    e.preventDefault();

    if(gameOver){
      location.reload();
      return;
    }

    startGame();

    if(!isGround) return;

    isPressing = true;
    holdFrames = 0;
    jumpStart();
  }

  function endPress(e){
    e.preventDefault();
    isPressing = false;
  }

  function jumpStart(){
    isGround = false;
    velocityY = -firstJumpPower;
    player.classList.remove("run");
    player.classList.add("jump");
  }

  game.addEventListener("pointerdown", startPress);
  game.addEventListener("pointerup", endPress);
  game.addEventListener("pointercancel", endPress);
  game.addEventListener("pointerleave", endPress);

  window.addEventListener("keydown", e => {
    if(e.code === "Space" && !isPressing){
      startPress(e);
    }
  });

  window.addEventListener("keyup", e => {
    if(e.code === "Space"){
      endPress(e);
    }
  });

  function spawnTakoyaki(){
    const data = sizes[Math.floor(Math.random() * sizes.length)];

    const el = document.createElement("div");
    el.className = "takoyaki";
    el.style.width = data.size + "px";
    el.style.height = data.size + "px";
    el.style.bottom = groundBottom + "px";
    game.appendChild(el);

    takoyakis.push({
      el,
      x: -data.size,
      size: data.size,
      speed: data.minSpeed + Math.random() * (data.maxSpeed - data.minSpeed),
      point: data.point,
      passed: false,
      rotation: 0
    });

    spawnInterval = 1250 + Math.random() * 1250;
  }

  function rectsHit(a,b){
    return !(
      a.right < b.left ||
      a.left > b.right ||
      a.bottom < b.top ||
      a.top > b.bottom
    );
  }

  function checkLandingBonus(){
    const playerRect = player.getBoundingClientRect();
    const center = playerRect.left + playerRect.width / 2;
    const w = window.innerWidth;

    const successStart = w * 0.48;
    const successEnd = w * 0.70;
    const perfectStart = w * 0.56;
    const perfectEnd = w * 0.62;

    if(center >= perfectStart && center <= perfectEnd){
      combo++;
      bonus = 2.5 + combo * 0.15;
      score += 300 * bonus;
      showText("神着地！ ×" + bonus.toFixed(1));
    }else if(center >= successStart && center <= successEnd){
      combo++;
      bonus = 1.5 + combo * 0.1;
      score += 150 * bonus;
      showText("着地成功！ ×" + bonus.toFixed(1));
    }else{
      combo = 0;
      bonus = 1;
      showText("着地ズレ…");
    }

    updateHud();
  }

  function showText(text){
    const div = document.createElement("div");
    div.textContent = text;
    div.style.position = "absolute";
    div.style.left = "50%";
    div.style.top = "35%";
    div.style.transform = "translate(-50%,-50%)";
    div.style.fontSize = "24px";
    div.style.fontWeight = "bold";
    div.style.textShadow = "3px 3px #000";
    div.style.zIndex = "40";
    div.style.pointerEvents = "none";
    game.appendChild(div);

    let y = 0;
    const timer = setInterval(() => {
      y -= 2;
      div.style.transform = `translate(-50%, calc(-50% + ${y}px))`;
      div.style.opacity = String(1 + y / 60);

      if(y < -60){
        clearInterval(timer);
        div.remove();
      }
    }, 16);
  }

  function endGame(){
    gameOver = true;
    isPressing = false;

    message.innerHTML =
      "焼かれた……！<br><br>" +
      "SCORE：" + Math.floor(score) + "<br>" +
      "画面タップでリトライ";
    message.classList.remove("hidden");
  }

  function loop(time){
    if(gameOver) return;

    if(time - lastSpawn > spawnInterval){
      spawnTakoyaki();
      lastSpawn = time;
    }

    if(isPressing && !isGround && holdFrames < maxHoldFrames && velocityY < 0){
      velocityY -= holdBoostPower;
      holdFrames++;
    }

    playerY += velocityY;
    velocityY += gravity;

    if(playerY >= 0){
      playerY = 0;
      velocityY = 0;

      if(!isGround){
        isGround = true;
        isPressing = false;
        holdFrames = 0;
        player.classList.add("run");
        player.classList.remove("jump");
        checkLandingBonus();
      }
    }

    player.style.bottom = (groundBottom - playerY) + "px";

    const playerRect = player.getBoundingClientRect();

    for(let i = takoyakis.length - 1; i >= 0; i--){
      const t = takoyakis[i];

      t.x += t.speed;
      t.rotation += t.speed * 5;

      t.el.style.left = t.x + "px";
      t.el.style.transform = `rotate(${t.rotation}deg)`;

      const rect = t.el.getBoundingClientRect();

      if(rectsHit(playerRect, rect)){
        endGame();
        return;
      }

      if(!t.passed && rect.left > playerRect.right){
        t.passed = true;
        score += t.point * bonus;
        updateHud();
      }

      if(t.x > window.innerWidth + 200){
        t.el.remove();
        takoyakis.splice(i,1);
      }
    }

    score += 0.12 * bonus;
    updateHud();

    requestAnimationFrame(loop);
  }

  updateHud();
})();
</script>
</body>
</html>
