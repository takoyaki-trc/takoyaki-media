<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>たこ焼き屋さんゲーム</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  background:#2b180f;
  font-family:system-ui,sans-serif;
  color:#fff;
  user-select:none;
}
#game{
  max-width:520px;
  height:100dvh;
  margin:0 auto;
  display:flex;
  flex-direction:column;
  background:linear-gradient(#ffb36b 0%,#b94f24 34%,#3a1d10 100%);
  overflow:hidden;
}
header{
  height:52px;
  display:flex;
  justify-content:space-around;
  align-items:center;
  background:#2a130b;
  border-bottom:4px solid #120804;
  font-weight:900;
}
.stat{
  background:#fff1bd;
  color:#32180b;
  border:3px solid #120804;
  border-radius:8px;
  padding:5px 8px;
  font-size:13px;
}
#customers{
  height:122px;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:5px;
  padding:7px;
  background:#713017;
  border-bottom:4px solid #120804;
}
.seat{
  background:#ffd27a;
  border:3px solid #120804;
  border-radius:10px;
  color:#32180b;
  text-align:center;
  font-size:10px;
  font-weight:900;
  padding:3px;
  position:relative;
}
.face{font-size:27px;line-height:28px}
.order{
  background:#fff;
  border:2px solid #120804;
  border-radius:6px;
  padding:2px;
  height:48px;
  overflow:hidden;
}
.bar{
  position:absolute;
  left:4px;
  bottom:4px;
  height:6px;
  background:#25b84a;
  border:1px solid #120804;
}
#message{
  margin:7px;
  min-height:42px;
  background:#fff;
  color:#32180b;
  border:3px solid #120804;
  border-radius:10px;
  padding:8px;
  font-weight:900;
  text-align:center;
}
#stall{
  flex:1;
  padding:6px 10px;
}
#sign{
  text-align:center;
  background:#fff1bd;
  color:#32180b;
  border:4px solid #120804;
  border-radius:12px;
  padding:5px;
  font-weight:1000;
  font-size:18px;
  margin-bottom:7px;
}
#grill{
  height:250px;
  background:#171717;
  border:6px solid #080808;
  border-radius:18px;
  padding:12px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  grid-template-rows:repeat(3,1fr);
  gap:9px;
  box-shadow:inset 0 0 0 5px #444;
}
.hole{
  border-radius:50%;
  background:#303030;
  border:4px solid #050505;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}
.tako{
  width:54px;
  height:54px;
  border-radius:50%;
  border:3px solid #120804;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  font-weight:1000;
  color:#301507;
}
.empty{opacity:.15}
.oil{background:#444;color:#fff}
.batter{background:#f2dfb4}
.ingredient{background:#f0cf85}
.raw{background:#e6b66a}
.ready1{background:#d98f3b}
.ready2{background:#c4772c}
.done{background:#b96526;color:#fff5c9}
.burn{background:#2b1007;color:#ffcf75}
.badge{
  position:absolute;
  top:-7px;
  right:-5px;
  background:#fff;
  color:#111;
  border:2px solid #111;
  border-radius:8px;
  font-size:10px;
  padding:1px 4px;
}
#plate{
  margin-top:7px;
  height:70px;
  background:#f8f1df;
  color:#32180b;
  border:4px solid #120804;
  border-radius:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-weight:1000;
}
#buttons,#toppings,#serve{
  display:grid;
  gap:6px;
  padding:7px;
  background:#2a130b;
}
#buttons{grid-template-columns:repeat(3,1fr)}
#toppings{grid-template-columns:repeat(3,1fr)}
#serve{grid-template-columns:repeat(5,1fr)}
button{
  border:3px solid #120804;
  border-radius:10px;
  background:#ffd35f;
  color:#32180b;
  font-weight:1000;
  padding:10px 3px;
  font-size:12px;
  box-shadow:0 3px 0 #120804;
}
button:active{
  transform:translateY(3px);
  box-shadow:none;
}
button:disabled{
  background:#777;
  color:#333;
}
.small{font-size:11px}
</style>
</head>
<body>
<div id="game">
  <header>
    <div class="stat">売上 <span id="money">0</span>円</div>
    <div class="stat">連続 <span id="combo">0</span></div>
    <div class="stat">残り <span id="timer">120</span>秒</div>
  </header>

  <div id="customers"></div>

  <div id="message">営業開始を押してスタート</div>

  <main id="stall">
    <div id="sign">たこ焼き屋台 焼き場ラッシュ</div>
    <div id="grill"></div>
    <div id="plate">皿：空</div>
  </main>

  <div id="buttons">
    <button id="startBtn">営業開始</button>
    <button id="plateBtn">皿に盛る</button>
    <button id="trashBtn">捨てる</button>
  </div>

  <div id="toppings">
    <button data-top="sauce">ソース</button>
    <button data-top="hot">辛口</button>
    <button data-top="mayo">マヨ</button>
    <button data-top="aonori">青のり</button>
    <button data-top="salt">塩こしょう</button>
    <button data-top="clear">消す</button>
  </div>

  <div id="serve"></div>
</div>

<script>
const $ = id => document.getElementById(id);

const orders = [
  { text:"ソース＋マヨ＋青のり！", need:["sauce","mayo","aonori"] },
  { text:"辛口ソース＋マヨ！", need:["hot","mayo"] },
  { text:"塩こしょう！", need:["salt"] },
  { text:"ソースだけ！", need:["sauce"] },
  { text:"ソース＋マヨ！", need:["sauce","mayo"] }
];

let running=false;
let money=0;
let combo=0;
let time=120;
let customers=[];
let loop=null;
let spawnLoop=null;

let holes=[];
let plate={
  balls:0,
  quality:"none",
  toppings:[]
};

function newHole(){
  return {
    state:"empty",
    step:0,
    changed:Date.now(),
    quality:"none"
  };
}

function init(){
  holes = Array.from({length:12},newHole);
  renderAll();
}

function msg(t){
  $("message").textContent=t;
}

function start(){
  running=true;
  money=0;
  combo=0;
  time=120;
  customers=[];
  holes = Array.from({length:12},newHole);
  plate={balls:0,quality:"none",toppings:[]};

  msg("穴をタップ！ 油→生地→具材→焼く→返す→完成");
  spawnCustomer();
  renderAll();

  clearInterval(loop);
  clearInterval(spawnLoop);

  loop=setInterval(()=>{
    if(!running)return;
    time--;
    updateHoles();
    updateCustomers();
    renderAll();
    if(time<=0)end();
  },1000);

  spawnLoop=setInterval(()=>{
    if(running)spawnCustomer();
  },3600);
}

function end(){
  running=false;
  clearInterval(loop);
  clearInterval(spawnLoop);
  msg("営業終了！売上 "+money+"円！");
  renderAll();
}

function spawnCustomer(){
  if(customers.length>=5)return;
  const o=orders[Math.floor(Math.random()*orders.length)];
  customers.push({
    order:o,
    wait:32
  });
}

function updateCustomers(){
  customers.forEach(c=>c.wait--);
  const before=customers.length;
  customers=customers.filter(c=>c.wait>0);
  if(before!==customers.length){
    combo=0;
    msg("待たせすぎてお客さんが帰った！");
  }
}

function updateHoles(){
  const now=Date.now();

  holes.forEach(h=>{
    const sec=(now-h.changed)/1000;

    if(h.state==="raw" && sec>=3){
      h.state="ready1";
      h.changed=now;
    }

    if(h.state==="ready1" && sec>=5){
      h.state="burn";
      h.quality="burn";
    }

    if(h.state==="cooked1" && sec>=5){
      h.state="ready2";
      h.changed=now;
    }

    if(h.state==="ready2" && sec>=5){
      h.state="burn";
      h.quality="burn";
    }

    if(h.state==="done" && sec>=7){
      h.state="burn";
      h.quality="burn";
    }
  });
}

function tapHole(i){
  if(!running)return;

  const h=holes[i];
  const now=Date.now();

  if(h.state==="empty"){
    h.state="oil";
    h.changed=now;
    msg("油を引いた！");
  }
  else if(h.state==="oil"){
    h.state="batter";
    h.changed=now;
    msg("生地を流した！");
  }
  else if(h.state==="batter"){
    h.state="ingredient";
    h.changed=now;
    msg("タコ・紅しょうが・天かす投入！");
  }
  else if(h.state==="ingredient"){
    h.state="raw";
    h.changed=now;
    msg("焼き開始！3秒後にぐつぐつするよ");
  }
  else if(h.state==="raw"){
    msg("まだ早い！ぐつぐつするまで待とう");
  }
  else if(h.state==="ready1"){
    h.state="cooked1";
    h.changed=now;
    msg("1回目ひっくり返し成功！");
  }
  else if(h.state==="cooked1"){
    msg("まだ早い！もう少し焼こう");
  }
  else if(h.state==="ready2"){
    h.state="done";
    h.quality="good";
    h.changed=now;
    msg("完成！皿に盛れるよ");
  }
  else if(h.state==="done"){
    msg("完成済み！皿に盛ろう");
  }
  else if(h.state==="burn"){
    msg("焦げた……捨てるしかない");
  }

  renderAll();
}

function plateUp(){
  if(!running)return;

  const done = holes.filter(h=>h.state==="done" || h.state==="burn");

  if(done.length<8){
    msg("まだ8個そろってない！");
    return;
  }

  const take = [];
  for(let i=0;i<holes.length;i++){
    if((holes[i].state==="done" || holes[i].state==="burn") && take.length<8){
      take.push(i);
    }
  }

  const burnt = take.some(i=>holes[i].state==="burn");

  take.forEach(i=>holes[i]=newHole());

  plate.balls=8;
  plate.quality=burnt ? "burn" : "good";
  plate.toppings=[];

  msg(burnt ? "焦げ入りたこ焼きを皿に盛った…" : "8個入り完成！トッピングしよう！");
  renderAll();
}

function trash(){
  holes=Array.from({length:12},newHole);
  plate={balls:0,quality:"none",toppings:[]};
  msg("焼き台と皿をリセットした");
  renderAll();
}

function addTop(t){
  if(!running || plate.balls<=0)return;

  if(t==="clear"){
    plate.toppings=[];
    msg("トッピングを消した");
  }else{
    if(!plate.toppings.includes(t))plate.toppings.push(t);
    msg("トッピング追加！");
  }
  renderAll();
}

function serveSeat(i){
  if(!running)return;
  if(!customers[i])return;
  if(plate.balls<=0){
    msg("皿が空です！");
    return;
  }

  const need=customers[i].order.need;
  const got=plate.toppings;
  const correct = need.length===got.length && need.every(x=>got.includes(x));

  if(plate.quality!=="good"){
    money+=100;
    combo=0;
    msg("焦げてる！100円だけ払って帰った…");
  }else if(correct){
    combo++;
    const earn=500+combo*50;
    money+=earn;
    msg("注文どおり！ "+earn+"円ゲット！");
  }else{
    money+=200;
    combo=0;
    msg("トッピング違い！200円だけもらった…");
  }

  customers.splice(i,1);
  plate={balls:0,quality:"none",toppings:[]};
  renderAll();
}

function topName(t){
  return {
    sauce:"ソース",
    hot:"辛口",
    mayo:"マヨ",
    aonori:"青のり",
    salt:"塩こしょう"
  }[t] || t;
}

function renderAll(){
  $("money").textContent=money;
  $("combo").textContent=combo;
  $("timer").textContent=time;

  renderCustomers();
  renderGrill();
  renderPlate();
  renderServe();

  $("startBtn").disabled=running;
  $("plateBtn").disabled=!running || plate.balls>0;
  $("trashBtn").disabled=!running;
}

function renderCustomers(){
  const el=$("customers");
  el.innerHTML="";

  for(let i=0;i<5;i++){
    const c=customers[i];
    const div=document.createElement("div");
    div.className="seat";

    if(c){
      const w=Math.max(0,c.wait/32*100);
      div.innerHTML=`
        <div class="face">🙂</div>
        <div class="order">${c.order.text}</div>
        <div class="bar" style="width:${w}%"></div>
      `;
    }else{
      div.innerHTML=`
        <div class="face">🪑</div>
        <div class="order">空席</div>
      `;
    }
    el.appendChild(div);
  }
}

function renderGrill(){
  const el=$("grill");
  el.innerHTML="";

  holes.forEach((h,i)=>{
    const hole=document.createElement("div");
    hole.className="hole";
    hole.onclick=()=>tapHole(i);

    let cls="empty";
    let text="○";
    let badge="";

    if(h.state==="oil"){cls="oil";text="油";}
    if(h.state==="batter"){cls="batter";text="生地";}
    if(h.state==="ingredient"){cls="ingredient";text="具";}
    if(h.state==="raw"){cls="raw";text="焼";badge="3秒";}
    if(h.state==="ready1"){cls="ready1";text="返";badge="今";}
    if(h.state==="cooked1"){cls="ready2";text="焼";badge="5秒";}
    if(h.state==="ready2"){cls="ready2";text="返";badge="今";}
    if(h.state==="done"){cls="done";text="完成";}
    if(h.state==="burn"){cls="burn";text="焦げ";}

    hole.innerHTML=`<div class="tako ${cls}">${text}</div>${badge?`<div class="badge">${badge}</div>`:""}`;
    el.appendChild(hole);
  });
}

function renderPlate(){
  if(plate.balls<=0){
    $("plate").textContent="皿：空";
    return;
  }

  const tops=plate.toppings.length ? plate.toppings.map(topName).join("＋") : "トッピングなし";
  const q=plate.quality==="good" ? "焼き加減◎" : "焦げあり";
  $("plate").textContent=`皿：8個入り / ${q} / ${tops}`;
}

function renderServe(){
  const el=$("serve");
  el.innerHTML="";

  for(let i=0;i<5;i++){
    const b=document.createElement("button");
    b.className="small";
    b.textContent=(i+1)+"番へ";
    b.disabled=!running || !customers[i] || plate.balls<=0;
    b.onclick=()=>serveSeat(i);
    el.appendChild(b);
  }
}

$("startBtn").onclick=start;
$("plateBtn").onclick=plateUp;
$("trashBtn").onclick=trash;

document.querySelectorAll("#toppings button").forEach(b=>{
  b.onclick=()=>addTop(b.dataset.top);
});

init();
</script>
</body>
</html>
