<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>たこ焼き屋さんミニゲーム</title>
<style>
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}
body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#2b1b12;
  color:#fff;
  overflow:hidden;
}
#game{
  width:100vw;
  height:100dvh;
  max-width:520px;
  margin:0 auto;
  background:linear-gradient(#ffb15c,#8b3f1f 45%,#2b1b12);
  display:flex;
  flex-direction:column;
  position:relative;
  border-left:4px solid #1b100b;
  border-right:4px solid #1b100b;
}
header{
  height:58px;
  background:#3b1f12;
  border-bottom:4px solid #1b100b;
  display:flex;
  justify-content:space-around;
  align-items:center;
  font-weight:800;
  font-size:14px;
}
.stat{
  background:#fff3c8;
  color:#3b1f12;
  border:3px solid #1b100b;
  padding:5px 8px;
  border-radius:8px;
}
#customers{
  height:120px;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:4px;
  padding:8px;
  background:#7a371c;
  border-bottom:4px solid #1b100b;
}
.seat{
  background:#f6c06d;
  border:3px solid #1b100b;
  border-radius:10px;
  position:relative;
  padding:4px;
  color:#2b1b12;
  text-align:center;
  font-size:11px;
  overflow:hidden;
}
.person{
  font-size:28px;
  line-height:28px;
}
.order{
  background:#fff;
  border:2px solid #1b100b;
  border-radius:6px;
  padding:3px;
  margin-top:2px;
  height:48px;
  overflow:hidden;
  font-weight:700;
}
.waitbar{
  position:absolute;
  left:4px;
  right:4px;
  bottom:4px;
  height:7px;
  background:#4caf50;
  border:1px solid #1b100b;
}
#stall{
  flex:1;
  position:relative;
  padding:10px;
}
#sign{
  text-align:center;
  font-weight:900;
  font-size:20px;
  background:#fff3c8;
  color:#3b1f12;
  border:4px solid #1b100b;
  border-radius:10px;
  padding:6px;
  margin-bottom:8px;
}
#grill{
  width:100%;
  height:210px;
  background:#151515;
  border:5px solid #080808;
  border-radius:16px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  padding:12px;
  box-shadow:inset 0 0 0 5px #444;
}
.hole{
  background:#333;
  border:4px solid #080808;
  border-radius:50%;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
}
.ball{
  width:52px;
  height:52px;
  border-radius:50%;
  background:#f0d080;
  border:3px solid #1b100b;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
}
.raw{ background:#f3ddb0; }
.cooking{ background:#e4b45e; }
.good{ background:#c87932; }
.burnt{ background:#3a1d10; color:#ffdf80; }
.emptyBall{
  opacity:.2;
}
#status{
  min-height:44px;
  margin-top:8px;
  background:#fff;
  color:#2b1b12;
  border:3px solid #1b100b;
  border-radius:10px;
  padding:8px;
  font-weight:800;
  text-align:center;
}
#plate{
  margin-top:8px;
  height:72px;
  background:#f7f1df;
  border:4px solid #1b100b;
  border-radius:50%;
  color:#2b1b12;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  text-align:center;
}
#controls{
  background:#3b1f12;
  border-top:4px solid #1b100b;
  padding:8px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
}
button{
  border:3px solid #1b100b;
  border-radius:10px;
  background:#ffd56a;
  color:#2b1b12;
  font-weight:900;
  font-size:13px;
  padding:10px 4px;
  box-shadow:0 3px 0 #1b100b;
}
button:active{
  transform:translateY(3px);
  box-shadow:none;
}
button:disabled{
  background:#777;
  color:#333;
}
#toppings{
  background:#5a2a16;
  border-top:3px solid #1b100b;
  padding:8px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
}
#serveArea{
  background:#2b1b12;
  padding:8px;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:5px;
}
.serveBtn{
  background:#ff9c5a;
  font-size:12px;
  padding:8px 2px;
}
.selected{
  outline:4px solid #00ff99;
}
.flash{
  animation:flash .25s 2;
}
@keyframes flash{
  0%{filter:brightness(1)}
  50%{filter:brightness(2)}
  100%{filter:brightness(1)}
}
</style>
</head>
<body>

<div id="game">
  <header>
    <div class="stat">売上 <span id="money">0</span>円</div>
    <div class="stat">連続 <span id="combo">0</span></div>
    <div class="stat">残り <span id="time">90</span>秒</div>
  </header>

  <div id="customers"></div>

  <main id="stall">
    <div id="sign">たこ焼き菜々 焼き場ラッシュ</div>
    <div id="grill"></div>
    <div id="status">油を引いて営業開始！</div>
    <div id="plate">皿：まだ空です</div>
  </main>

  <div id="controls">
    <button id="oilBtn">油を引く</button>
    <button id="batterBtn">生地</button>
    <button id="octoBtn">タコ</button>
    <button id="beniBtn">紅しょうが</button>
    <button id="tenBtn">天かす</button>
    <button id="flipBtn">ひっくり返す</button>
    <button id="plateBtn">皿に盛る</button>
    <button id="resetBtn">焼き直す</button>
    <button id="startBtn">営業開始</button>
  </div>

  <div id="toppings">
    <button data-top="sauce">ソース</button>
    <button data-top="hot">辛口ソース</button>
    <button data-top="mayo">マヨ</button>
    <button data-top="aonori">青のり</button>
    <button data-top="salt">塩こしょう</button>
    <button data-top="clear">トッピング消す</button>
  </div>

  <div id="serveArea"></div>
</div>

<script>
const orders = [
  {
    text:"ソースにマヨネーズと青のり！",
    need:["sauce","mayo","aonori"]
  },
  {
    text:"辛口ソースにマヨネーズ！",
    need:["hot","mayo"]
  },
  {
    text:"塩こしょう！",
    need:["salt"]
  },
  {
    text:"ソースだけ！",
    need:["sauce"]
  },
  {
    text:"マヨ多めでソース！",
    need:["sauce","mayo"]
  }
];

const customersEl = document.getElementById("customers");
const grillEl = document.getElementById("grill");
const serveArea = document.getElementById("serveArea");
const statusEl = document.getElementById("status");
const plateEl = document.getElementById("plate");
const moneyEl = document.getElementById("money");
const comboEl = document.getElementById("combo");
const timeEl = document.getElementById("time");

let money = 0;
let combo = 0;
let timeLeft = 90;
let gameRunning = false;
let mainTimer = null;
let customerTimer = null;

let customers = [];
let selectedSeat = null;

let grill = {
  oil:false,
  batter:false,
  octo:false,
  beni:false,
  ten:false,
  state:"empty",
  flipCount:0,
  readyAt:0,
  quality:"none"
};

let plate = {
  hasTakoyaki:false,
  quality:"none",
  toppings:[]
};

function init(){
  renderCustomers();
  renderGrill();
  renderServeButtons();
  updateButtons();
}

function startGame(){
  if(gameRunning) return;
  gameRunning = true;
  money = 0;
  combo = 0;
  timeLeft = 90;
  customers = [];
  selectedSeat = null;
  resetGrill();
  resetPlate();
  updateStats();
  setStatus("営業開始！お客さんを待とう！");
  spawnCustomer();

  mainTimer = setInterval(()=>{
    timeLeft--;
    updateCustomers();
    updateStats();

    if(timeLeft <= 0){
      endGame();
    }
  },1000);

  customerTimer = setInterval(()=>{
    if(gameRunning) spawnCustomer();
  },3500);
}

function endGame(){
  gameRunning = false;
  clearInterval(mainTimer);
  clearInterval(customerTimer);
  setStatus(`営業終了！本日の売上は ${money}円！`);
  document.querySelectorAll("button").forEach(btn=>{
    if(btn.id !== "startBtn") btn.disabled = true;
  });
  document.getElementById("startBtn").disabled = false;
}

function spawnCustomer(){
  if(!gameRunning) return;
  if(customers.length >= 5) return;

  const order = orders[Math.floor(Math.random()*orders.length)];
  customers.push({
    id:Date.now()+Math.random(),
    order,
    wait:24
  });
  renderCustomers();
  renderServeButtons();
}

function updateCustomers(){
  customers.forEach(c=>c.wait--);

  const before = customers.length;
  customers = customers.filter(c=>c.wait > 0);

  if(customers.length < before){
    combo = 0;
    setStatus("お客さんが怒って帰ってしまった！");
  }

  renderCustomers();
  renderServeButtons();
}

function renderCustomers(){
  customersEl.innerHTML = "";

  for(let i=0;i<5;i++){
    const c = customers[i];
    const seat = document.createElement("div");
    seat.className = "seat";

    if(c){
      const percent = Math.max(0, c.wait / 24 * 100);
      seat.innerHTML = `
        <div class="person">🙂</div>
        <div class="order">${c.order.text}</div>
        <div class="waitbar" style="width:${percent}%;"></div>
      `;
      if(selectedSeat === i) seat.classList.add("selected");
      seat.onclick = () => {
        selectedSeat = i;
        renderCustomers();
        setStatus(`${i+1}番席を選択中：${c.order.text}`);
      };
    }else{
      seat.innerHTML = `
        <div class="person">🪑</div>
        <div class="order">空席</div>
      `;
    }

    customersEl.appendChild(seat);
  }
}

function renderGrill(){
  grillEl.innerHTML = "";

  for(let i=0;i<12;i++){
    const hole = document.createElement("div");
    hole.className = "hole";

    if(grill.state === "empty"){
      hole.innerHTML = `<div class="ball emptyBall">○</div>`;
    }else{
      let cls = "raw";
      let icon = "○";

      if(grill.state === "cooking1"){
        cls = "cooking";
        icon = "ぐ";
      }
      if(grill.state === "waitFlip1"){
        cls = "cooking";
        icon = "♨";
      }
      if(grill.state === "cooking2"){
        cls = "good";
        icon = "↻";
      }
      if(grill.state === "waitFlip2"){
        cls = "good";
        icon = "♨";
      }
      if(grill.state === "finish"){
        cls = "good";
        icon = "◎";
      }
      if(grill.quality === "burnt"){
        cls = "burnt";
        icon = "焦";
      }

      hole.innerHTML = `<div class="ball ${cls}">${icon}</div>`;
    }

    grillEl.appendChild(hole);
  }
}

function renderServeButtons(){
  serveArea.innerHTML = "";

  for(let i=0;i<5;i++){
    const btn = document.createElement("button");
    btn.className = "serveBtn";
    btn.textContent = `${i+1}番へ提供`;
    btn.disabled = !customers[i] || !plate.hasTakoyaki || !gameRunning;
    btn.onclick = () => serve(i);
    serveArea.appendChild(btn);
  }
}

function setStatus(text){
  statusEl.textContent = text;
  statusEl.classList.remove("flash");
  void statusEl.offsetWidth;
  statusEl.classList.add("flash");
}

function updateStats(){
  moneyEl.textContent = money;
  comboEl.textContent = combo;
  timeEl.textContent = timeLeft;
}

function updateButtons(){
  const disabled = !gameRunning;

  document.getElementById("oilBtn").disabled = disabled || grill.state !== "empty" || grill.oil;
  document.getElementById("batterBtn").disabled = disabled || !grill.oil || grill.batter;
  document.getElementById("octoBtn").disabled = disabled || !grill.batter || grill.octo;
  document.getElementById("beniBtn").disabled = disabled || !grill.octo || grill.beni;
  document.getElementById("tenBtn").disabled = disabled || !grill.beni || grill.ten;
  document.getElementById("flipBtn").disabled = disabled || !(grill.state === "waitFlip1" || grill.state === "waitFlip2");
  document.getElementById("plateBtn").disabled = disabled || grill.state !== "finish" || plate.hasTakoyaki;
  document.getElementById("resetBtn").disabled = disabled;
  document.getElementById("startBtn").disabled = gameRunning;

  renderServeButtons();
}

function resetGrill(){
  grill = {
    oil:false,
    batter:false,
    octo:false,
    beni:false,
    ten:false,
    state:"empty",
    flipCount:0,
    readyAt:0,
    quality:"none"
  };
  renderGrill();
  updateButtons();
}

function resetPlate(){
  plate = {
    hasTakoyaki:false,
    quality:"none",
    toppings:[]
  };
  renderPlate();
}

function renderPlate(){
  if(!plate.hasTakoyaki){
    plateEl.textContent = "皿：まだ空です";
  }else{
    const names = plate.toppings.map(t=>{
      if(t==="sauce") return "ソース";
      if(t==="hot") return "辛口";
      if(t==="mayo") return "マヨ";
      if(t==="aonori") return "青のり";
      if(t==="salt") return "塩こしょう";
      return t;
    });
    plateEl.textContent = `皿：たこ焼き完成 / ${names.length ? names.join("＋") : "トッピングなし"}`;
  }
  renderServeButtons();
}

function addTopping(top){
  if(!gameRunning || !plate.hasTakoyaki) return;

  if(top === "clear"){
    plate.toppings = [];
    renderPlate();
    setStatus("トッピングを消した！");
    return;
  }

  if(!plate.toppings.includes(top)){
    plate.toppings.push(top);
  }

  renderPlate();
  setStatus("トッピング追加！");
}

function checkOrder(need, got){
  if(need.length !== got.length) return false;
  return need.every(x=>got.includes(x));
}

function serve(index){
  const customer = customers[index];
  if(!customer || !plate.hasTakoyaki) return;

  const correct = checkOrder(customer.order.need, plate.toppings);

  if(plate.quality !== "good"){
    setStatus("焼き加減が悪い！お客さんしょんぼり！");
    combo = 0;
    money += 100;
  }else if(correct){
    combo++;
    const bonus = combo * 20;
    money += 500 + bonus;
    setStatus(`大成功！${500+bonus}円ゲット！`);
  }else{
    combo = 0;
    money += 200;
    setStatus("トッピングが違う！でも少しだけ払ってくれた！");
  }

  customers.splice(index,1);
  selectedSeat = null;
  resetPlate();
  updateStats();
  renderCustomers();
  renderServeButtons();
}

document.getElementById("startBtn").onclick = startGame;

document.getElementById("oilBtn").onclick = ()=>{
  grill.oil = true;
  setStatus("油を引いた！");
  updateButtons();
};

document.getElementById("batterBtn").onclick = ()=>{
  grill.batter = true;
  setStatus("生地を流した！");
  updateButtons();
};

document.getElementById("octoBtn").onclick = ()=>{
  grill.octo = true;
  setStatus("タコを入れた！");
  updateButtons();
};

document.getElementById("beniBtn").onclick = ()=>{
  grill.beni = true;
  setStatus("紅しょうがを入れた！");
  updateButtons();
};

document.getElementById("tenBtn").onclick = ()=>{
  grill.ten = true;
  grill.state = "cooking1";
  grill.quality = "good";
  setStatus("天かす投入！3秒後にぐつぐつします。");
  renderGrill();
  updateButtons();

  setTimeout(()=>{
    if(grill.state === "cooking1"){
      grill.state = "waitFlip1";
      setStatus("ぐつぐつ！今だ、ひっくり返せ！");
      renderGrill();
      updateButtons();

      setTimeout(()=>{
        if(grill.state === "waitFlip1"){
          grill.quality = "burnt";
          setStatus("焦げ始めた！早くひっくり返して！");
          renderGrill();
        }
      },3000);
    }
  },3000);
};

document.getElementById("flipBtn").onclick = ()=>{
  if(grill.state === "waitFlip1"){
    grill.state = "cooking2";
    setStatus("1回目ひっくり返し成功！5秒待とう。");
    renderGrill();
    updateButtons();

    setTimeout(()=>{
      if(grill.state === "cooking2"){
        grill.state = "waitFlip2";
        setStatus("もう一度ひっくり返すタイミング！");
        renderGrill();
        updateButtons();

        setTimeout(()=>{
          if(grill.state === "waitFlip2"){
            grill.quality = "burnt";
            setStatus("焼きすぎ注意！焦げてきた！");
            renderGrill();
          }
        },3000);
      }
    },5000);

  }else if(grill.state === "waitFlip2"){
    grill.state = "finish";
    setStatus("完成！皿に盛り付けよう！");
    renderGrill();
    updateButtons();
  }
};

document.getElementById("plateBtn").onclick = ()=>{
  if(grill.state !== "finish") return;

  plate.hasTakoyaki = true;
  plate.quality = grill.quality;
  plate.toppings = [];
  setStatus("皿に盛った！注文どおりにトッピングしよう！");
  resetGrill();
  renderPlate();
};

document.getElementById("resetBtn").onclick = ()=>{
  resetGrill();
  setStatus("焼き台をリセットした！");
};

document.querySelectorAll("#toppings button").forEach(btn=>{
  btn.onclick = ()=>{
    addTopping(btn.dataset.top);
  };
});

init();
</script>

</body>
</html>
