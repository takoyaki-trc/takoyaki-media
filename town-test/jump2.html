<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>焼かれし者決定戦</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  background:#1b0f0a;
  color:#fff;
  font-family:system-ui,sans-serif;
  overflow:hidden;
}
#game{
  max-width:520px;
  height:100dvh;
  margin:0 auto;
  background:linear-gradient(#ffb15f,#8b331d 42%,#1b0f0a);
  display:flex;
  flex-direction:column;
}
header{
  background:#2a130b;
  border-bottom:4px solid #0b0503;
  text-align:center;
  padding:8px;
  font-weight:900;
}
#field{
  flex:1;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.card{
  background:#fff2c2;
  color:#2a130b;
  border:4px solid #0b0503;
  border-radius:14px;
  padding:10px;
}
.name{
  font-size:18px;
  font-weight:900;
}
.hpbox{
  height:18px;
  background:#3a1b10;
  border:3px solid #0b0503;
  border-radius:10px;
  overflow:hidden;
  margin-top:6px;
}
.hp{
  height:100%;
  background:linear-gradient(90deg,#35d35c,#e9ff70);
  width:100%;
}
.info{
  font-weight:900;
  margin-top:5px;
}
#arena{
  flex:1;
  background:#32170d;
  border:4px solid #0b0503;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:space-around;
  padding:10px;
}
.fighter{
  text-align:center;
  font-size:54px;
}
.label{
  font-size:13px;
  font-weight:900;
}
#log{
  height:120px;
  background:#fff;
  color:#2a130b;
  border:4px solid #0b0503;
  border-radius:14px;
  padding:10px;
  overflow:auto;
  font-weight:800;
  line-height:1.45;
}
#buttons{
  background:#2a130b;
  border-top:4px solid #0b0503;
  padding:8px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
}
button{
  border:3px solid #0b0503;
  border-radius:12px;
  background:#ffd45f;
  color:#2a130b;
  font-weight:900;
  padding:13px 5px;
  font-size:15px;
  box-shadow:0 4px 0 #0b0503;
}
button:active{
  transform:translateY(4px);
  box-shadow:none;
}
button:disabled{
  background:#777;
  color:#333;
}
#restart{
  background:#ff8b5a;
}
.small{
  font-size:12px;
}
</style>
</head>
<body>

<div id="game">
  <header>🔥 焼かれし者決定戦 🔥</header>

  <div id="field">
    <div class="card">
      <div class="name">あなた：たこ焼き菜々</div>
      <div class="hpbox"><div id="playerHpBar" class="hp"></div></div>
      <div class="info">HP <span id="playerHp">100</span> / 100　売上 <span id="money">0</span>円</div>
    </div>

    <div id="arena">
      <div class="fighter">
        🧑‍🍳
        <div class="label">店主</div>
      </div>
      <div style="font-size:32px;font-weight:900;">VS</div>
      <div class="fighter">
        🐙
        <div class="label">焼かれし敵</div>
      </div>
    </div>

    <div class="card">
      <div class="name">敵：焦げタコ魔王</div>
      <div class="hpbox"><div id="enemyHpBar" class="hp"></div></div>
      <div class="info">HP <span id="enemyHp">100</span> / 100</div>
    </div>

    <div id="log">営業開始！たこ焼きで敵を焼き尽くせ！</div>
  </div>

  <div id="buttons">
    <button onclick="playerAction('sauce')">ソース攻撃<br><span class="small">安定ダメージ</span></button>
    <button onclick="playerAction('hot')">辛口ソース<br><span class="small">高火力・失敗あり</span></button>
    <button onclick="playerAction('mayo')">マヨ回復<br><span class="small">HP回復</span></button>
    <button onclick="playerAction('aonori')">青のり煙幕<br><span class="small">敵の命中率低下</span></button>
    <button onclick="playerAction('special')">必殺技<br><span class="small">熱々地獄キャッチボール</span></button>
    <button id="restart" onclick="restart()">最初から</button>
  </div>
</div>

<script>
let playerHp = 100;
let enemyHp = 100;
let money = 0;
let special = 0;
let enemyBlind = false;
let gameOver = false;

const logEl = document.getElementById("log");

function rand(min,max){
  return Math.floor(Math.random()*(max-min+1))+min;
}

function addLog(text){
  logEl.innerHTML = text + "<br>" + logEl.innerHTML;
}

function update(){
  document.getElementById("playerHp").textContent = playerHp;
  document.getElementById("enemyHp").textContent = enemyHp;
  document.getElementById("money").textContent = money;

  document.getElementById("playerHpBar").style.width = playerHp + "%";
  document.getElementById("enemyHpBar").style.width = enemyHp + "%";

  if(enemyHp <= 0){
    enemyHp = 0;
    gameOver = true;
    addLog("🏆 勝利！焦げタコ魔王はソースの海に沈んだ！");
    disableButtons();
  }

  if(playerHp <= 0){
    playerHp = 0;
    gameOver = true;
    addLog("💀 敗北……店主は焼き台の前で力尽きた。");
    disableButtons();
  }
}

function disableButtons(){
  document.querySelectorAll("button").forEach(btn=>{
    if(btn.id !== "restart") btn.disabled = true;
  });
}

function enableButtons(){
  document.querySelectorAll("button").forEach(btn=>{
    btn.disabled = false;
  });
}

function playerAction(type){
  if(gameOver)return;

  let damage = 0;

  if(type === "sauce"){
    damage = rand(13,20);
    enemyHp -= damage;
    money += 300;
    special += 1;
    addLog("🔥 ソース攻撃！ " + damage + "ダメージ！");
  }

  if(type === "hot"){
    if(Math.random() < 0.7){
      damage = rand(22,34);
      enemyHp -= damage;
      money += 450;
      special += 1;
      addLog("🌶 辛口ソース炸裂！ " + damage + "ダメージ！");
    }else{
      addLog("🌶 辛すぎてむせた！攻撃失敗！");
    }
  }

  if(type === "mayo"){
    const heal = rand(16,26);
    playerHp = Math.min(100, playerHp + heal);
    special += 1;
    addLog("🥚 マヨネーズ回復！ HP +" + heal);
  }

  if(type === "aonori"){
    enemyBlind = true;
    special += 1;
    addLog("🌿 青のり煙幕！次の敵攻撃が外れやすくなった！");
  }

  if(type === "special"){
    if(special < 3){
      addLog("💥 必殺ゲージ不足！あと " + (3-special) + " 回行動が必要！");
      enemyTurn();
      update();
      return;
    }

    special = 0;
    damage = rand(35,50);
    enemyHp -= damage;
    money += 777;
    addLog("💥 必殺《熱々地獄キャッチボール》！！ " + damage + "ダメージ！");
  }

  update();

  if(!gameOver){
    setTimeout(enemyTurn,500);
  }
}

function enemyTurn(){
  if(gameOver)return;

  if(enemyBlind && Math.random() < 0.65){
    enemyBlind = false;
    addLog("🌿 敵は青のりで前が見えない！攻撃ミス！");
    update();
    return;
  }

  enemyBlind = false;

  const moves = ["burn","tax","review"];
  const move = moves[Math.floor(Math.random()*moves.length)];

  if(move === "burn"){
    const d = rand(12,20);
    playerHp -= d;
    addLog("🐙 敵の《焦げつきアタック》！ " + d + "ダメージ！");
  }

  if(move === "tax"){
    const d = rand(8,16);
    playerHp -= d;
    money = Math.max(0,money-200);
    addLog("💸 敵の《原価高騰》！ " + d + "ダメージ、売上200円減少！");
  }

  if(move === "review"){
    const d = rand(15,25);
    playerHp -= d;
    addLog("⭐ 敵の《低評価レビュー》！心に " + d + "ダメージ！");
  }

  update();
}

function restart(){
  playerHp = 100;
  enemyHp = 100;
  money = 0;
  special = 0;
  enemyBlind = false;
  gameOver = false;
  logEl.innerHTML = "営業開始！たこ焼きで敵を焼き尽くせ！";
  enableButtons();
  update();
}

update();
</script>

</body>
</html>
