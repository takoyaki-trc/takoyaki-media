<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>タコ民たこ焼きバトル</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#111;overflow:hidden;font-family:system-ui,sans-serif;user-select:none}
#game{width:100vw;height:100dvh;max-width:520px;margin:0 auto;position:relative;overflow:hidden;background:#8edcff;border-left:4px solid #111;border-right:4px solid #111}
#hud{position:absolute;top:0;left:0;right:0;height:58px;background:#2b160c;color:#fff;z-index:20;display:flex;justify-content:space-around;align-items:center;border-bottom:4px solid #111;font-weight:900}
.stat{background:#fff1b8;color:#2b160c;border:3px solid #111;border-radius:8px;padding:4px 6px;font-size:12px}
#world{position:absolute;left:0;top:58px;width:100%;height:calc(100% - 178px);overflow:hidden;background:linear-gradient(#8edcff 0%,#c7f4ff 55%,#73c958 56%,#4da139 100%)}
#ground{position:absolute;left:0;right:0;bottom:0;height:62px;background:#6b3b1d;border-top:5px solid #2b160c}
#shop{position:absolute;left:8px;bottom:62px;font-size:48px;z-index:3}
#player{position:absolute;width:58px;height:58px;left:95px;bottom:62px;z-index:10}
#player img,.enemy img,.ally img{width:100%;height:100%;object-fit:contain}
.enemy{position:absolute;width:54px;height:54px;z-index:6}
.ally{position:absolute;width:46px;height:46px;z-index:8}
.bubble{position:absolute;left:-4px;top:-46px;width:58px;height:46px;background:#fff;border:3px solid #111;border-radius:16px;display:flex;align-items:center;justify-content:center;z-index:12}
.bubble img{width:34px;height:34px;object-fit:contain}
.bubble:after{content:"";position:absolute;left:23px;bottom:-9px;border-width:8px 6px 0 6px;border-style:solid;border-color:#111 transparent transparent transparent}
.shot{position:absolute;width:32px;height:32px;z-index:15}
.shot img{width:100%;height:100%;object-fit:contain}
.moneyShot{position:absolute;width:30px;height:22px;background:#78e35f;border:3px solid #125c20;border-radius:4px;z-index:14}
.moneyShot:after{content:"￥";position:absolute;inset:0;text-align:center;font-weight:900;color:#0c4217;font-size:14px}
.naviShot{position:absolute;width:34px;height:28px;background:#fff;border:3px solid #111;border-radius:50%;z-index:14}
.naviShot:after{content:"↩";position:absolute;inset:0;text-align:center;font-weight:900;color:#111}
.effectText{position:absolute;color:#fff;font-weight:1000;font-size:16px;text-shadow:2px 2px #000;z-index:30}
#message{position:absolute;left:10px;right:10px;top:68px;background:#fff;color:#2b160c;border:4px solid #111;border-radius:12px;padding:7px;text-align:center;font-weight:900;z-index:35;font-size:13px}

#controls{
  position:absolute;
  left:0;right:0;bottom:0;
  height:120px;
  background:#2b160c;
  border-top:4px solid #111;
  z-index:25;
  display:grid;
  grid-template-columns:1.1fr 1.1fr 1.1fr 1.4fr 1.4fr 1.4fr;
  grid-template-rows:1fr 1fr;
  gap:6px;
  padding:8px;
}
button{border:4px solid #111;border-radius:12px;background:#ffd35f;color:#2b160c;font-weight:1000;font-size:13px;box-shadow:0 4px 0 #111}
button:active{transform:translateY(4px);box-shadow:none}
.moveBtn{font-size:28px;background:#8fd7ff}
.jumpBtn{font-size:16px;background:#a9ff86}
.takoBtn{background:#fff1b8;display:flex;align-items:center;justify-content:center;gap:3px;padding:2px}
.takoBtn img{width:42px;height:42px;object-fit:contain}
.takoBtn span{font-size:10px;line-height:1.1}
#left{grid-column:1;grid-row:1 / 3}
#right{grid-column:2;grid-row:1 / 3}
#jump{grid-column:3;grid-row:1 / 3}
#sauceBtn{grid-column:4;grid-row:1 / 3}
#plainBtn{grid-column:5;grid-row:1 / 3}
#rainbowBtn{grid-column:6;grid-row:1 / 3}

#start{position:absolute;left:50%;top:52%;transform:translate(-50%,-50%);z-index:60;width:230px;height:74px;background:#ff8b5a;font-size:20px}
#gameover{position:absolute;inset:0;background:rgba(0,0,0,.75);z-index:70;display:none;align-items:center;justify-content:center;text-align:center;color:#fff;font-weight:900;padding:20px}
#gameoverBox{background:#fff1b8;color:#2b160c;border:5px solid #111;border-radius:18px;padding:20px}
#restart{margin-top:14px;width:170px;height:56px;background:#ff8b5a}
</style>
</head>

<body>
<div id="game">
  <div id="hud">
    <div class="stat">HP <span id="hp">5</span></div>
    <div class="stat">撃破 <span id="score">0</span></div>
    <div class="stat">味方 <span id="allyCount">0</span></div>
    <div class="stat">弾 <span id="ammo">30</span></div>
    <div class="stat">攻撃は画像タップ</div>
  </div>

  <div id="message">敵の吹き出し画像と同じたこ焼きボタンを押して攻撃！</div>

  <div id="world">
    <div id="ground"></div>
    <div id="shop">🏮</div>
    <div id="player"><img src="https://ul.h3z.jp/GTLtELOH.png"></div>
  </div>

  <button id="start">営業開始</button>

  <div id="controls">
    <button id="left" class="moveBtn">←</button>
    <button id="right" class="moveBtn">→</button>
    <button id="jump" class="jumpBtn">ジャンプ</button>

    <button id="sauceBtn" class="takoBtn">
      <img src="https://ul.h3z.jp/KExnnkbm.png"><span>ソース<br>攻撃</span>
    </button>
    <button id="plainBtn" class="takoBtn">
      <img src="https://ul.h3z.jp/wiCmZBtx.png"><span>すっぴん<br>攻撃</span>
    </button>
    <button id="rainbowBtn" class="takoBtn">
      <img src="https://ul.h3z.jp/0qwzik6N.png"><span>虹たこ<br>攻撃</span>
    </button>
  </div>

  <div id="gameover">
    <div id="gameoverBox">
      <div id="resultText"></div>
      <button id="restart">もう一度</button>
    </div>
  </div>
</div>

<script>
const IMG = {
  player:"https://ul.h3z.jp/GTLtELOH.png",
  sauce:"https://ul.h3z.jp/KExnnkbm.png",
  plain:"https://ul.h3z.jp/wiCmZBtx.png",
  rainbow:"https://ul.h3z.jp/0qwzik6N.png",
  money:"https://ul.h3z.jp/thcJlQxN.png",
  navi:"https://ul.h3z.jp/O7HnD9yW.png",
  protect:"https://ul.h3z.jp/eGH3QnGl.png",
  pioneer:"https://ul.h3z.jp/nVMTG7mF.png"
};

const world = document.getElementById("world");
const playerEl = document.getElementById("player");
const hpEl = document.getElementById("hp");
const scoreEl = document.getElementById("score");
const allyCountEl = document.getElementById("allyCount");
const ammoEl = document.getElementById("ammo");
const msgEl = document.getElementById("message");
const startBtn = document.getElementById("start");
const gameoverEl = document.getElementById("gameover");
const resultText = document.getElementById("resultText");

let running=false,last=0,spawnTimer=0,keys={};
let enemies=[],shots=[],allies=[],supportShots=[],effects=[];

let player={x:90,y:62,vx:0,vy:0,w:58,h:58,hp:5,ammo:30,score:0,facing:-1,inv:0};

const groundY=62,gravity=1500,speed=250,jumpPower=600;

const enemyTypes=[
  {key:"money",name:"札束タコ民",img:IMG.money,want:"sauce",hp:1,speed:58,allyType:"money",allyChance:0.45},
  {key:"navi",name:"ナビタコ民",img:IMG.navi,want:"sauce",hp:1,speed:64,allyType:"navi",allyChance:0.45},
  {key:"protect",name:"未開封保護タコ民",img:IMG.protect,want:"rainbow",hp:2,speed:46,allyType:"protect",allyChance:0.5},
  {key:"pioneer",name:"さきがけタコ民",img:IMG.pioneer,want:"plain",hp:2,speed:70,allyType:"pioneer",allyChance:0.5}
];

function msg(t){msgEl.textContent=t}
function shotLabel(type){return type==="sauce"?"ソース":type==="plain"?"すっぴん":"虹たこ"}
function updateHud(){
  hpEl.textContent=player.hp;
  scoreEl.textContent=player.score;
  allyCountEl.textContent=allies.length;
  ammoEl.textContent=player.ammo;
}

function startGame(){
  running=true;
  enemies.forEach(e=>e.el.remove());
  shots.forEach(s=>s.el.remove());
  allies.forEach(a=>a.el.remove());
  supportShots.forEach(s=>s.el.remove());
  effects.forEach(e=>e.el.remove());
  enemies=[];shots=[];allies=[];supportShots=[];effects=[];

  player={x:90,y:62,vx:0,vy:0,w:58,h:58,hp:5,ammo:30,score:0,facing:-1,inv:0};
  spawnTimer=0;
  startBtn.style.display="none";
  gameoverEl.style.display="none";
  msg("営業開始！たこ焼き画像を押すとそのまま攻撃！");
  updateHud();
  last=performance.now();
  requestAnimationFrame(loop);
}

function endGame(){
  running=false;
  resultText.innerHTML=`営業終了！<br>撃破数：${player.score}<br>仲間：${allies.length}体`;
  gameoverEl.style.display="flex";
}

function loop(now){
  if(!running)return;
  const dt=Math.min((now-last)/1000,0.033);
  last=now;

  updatePlayer(dt);
  updateEnemies(dt);
  updateShots(dt);
  updateAllies(dt);
  updateSupportShots(dt);
  updateEffects(dt);

  spawnTimer+=dt;
  if(spawnTimer>Math.max(0.85,2.05-player.score*0.018)){
    spawnEnemy();
    spawnTimer=0;
  }

  updateHud();
  requestAnimationFrame(loop);
}

function updatePlayer(dt){
  let move=0;
  if(keys.left)move--;
  if(keys.right)move++;

  player.vx=move*speed;
  if(move!==0)player.facing=move;

  player.x+=player.vx*dt;
  player.x=Math.max(4,Math.min(world.clientWidth-player.w-4,player.x));

  player.vy-=gravity*dt;
  player.y+=player.vy*dt;

  if(player.y<groundY){player.y=groundY;player.vy=0}

  if(player.inv>0){
    player.inv-=dt;
    playerEl.style.opacity=Math.floor(player.inv*10)%2?".35":"1";
  }else playerEl.style.opacity="1";

  playerEl.style.left=player.x+"px";
  playerEl.style.bottom=player.y+"px";

  /* 主役の身体向きを左右逆にする */
  playerEl.style.transform=player.facing===1 ? "scaleX(-1)" : "scaleX(1)";
}

function jump(){
  if(!running)return;
  if(player.y<=groundY+1)player.vy=jumpPower;
}

function attack(type){
  if(!running)return;
  if(player.ammo<=0){
    msg("たこ焼き切れ！敵を倒すと少し補充される！");
    return;
  }

  player.ammo--;

  const el=document.createElement("div");
  el.className="shot";
  el.innerHTML=`<img src="${IMG[type]}">`;
  world.appendChild(el);

  shots.push({
    el,type,
    x:player.x+(player.facing===1?42:-14),
    y:player.y+26,
    vx:player.facing*500,
    w:32,h:32
  });

  msg(`${shotLabel(type)}たこ焼き攻撃！`);
}

function spawnEnemy(){
  const t=enemyTypes[Math.floor(Math.random()*enemyTypes.length)];

  const el=document.createElement("div");
  el.className="enemy";
  el.innerHTML=`
    <div class="bubble"><img src="${IMG[t.want]}"></div>
    <img src="${t.img}">
  `;
  world.appendChild(el);

  enemies.push({
    el,key:t.key,name:t.name,img:t.img,want:t.want,
    hp:t.hp,maxHp:t.hp,
    speed:t.speed+Math.min(42,player.score*0.9),
    allyType:t.allyType,allyChance:t.allyChance,
    x:world.clientWidth+50,y:groundY,w:54,h:54,
    stunned:0,reversed:0
  });
}

function updateEnemies(dt){
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];

    if(e.stunned>0)e.stunned-=dt;
    else{
      const dir=e.reversed>0?1:-1;
      e.x+=dir*e.speed*dt;
    }

    if(e.reversed>0)e.reversed-=dt;

    e.el.style.left=e.x+"px";
    e.el.style.bottom=e.y+"px";
    e.el.style.filter=e.stunned>0?"grayscale(1) brightness(1.4)":"none";

    if(hit(player,e)&&player.inv<=0){
      const pioneer=allies.find(a=>a.type==="pioneer");
      if(pioneer){
        pioneer.hp--;
        popText(pioneer.x,pioneer.y+50,"身代わり！");
        msg("さきがけタコ民がダメージを受けた！");
        if(pioneer.hp<=0)removeAlly(pioneer);
      }else{
        player.hp--;
        player.inv=1.2;
        msg(`${e.name}にぶつかった！`);
        if(player.hp<=0){updateHud();endGame();return}
      }
    }

    if(e.x<20){
      e.el.remove();
      enemies.splice(i,1);
      player.hp--;
      msg("敵が屋台に到達！HP減少！");
      if(player.hp<=0){updateHud();endGame();return}
    }

    if(e.x>world.clientWidth+120){
      e.el.remove();
      enemies.splice(i,1);
    }
  }
}

function updateShots(dt){
  for(let i=shots.length-1;i>=0;i--){
    const s=shots[i];
    s.x+=s.vx*dt;
    s.el.style.left=s.x+"px";
    s.el.style.bottom=s.y+"px";

    for(let j=enemies.length-1;j>=0;j--){
      const e=enemies[j];

      if(hit(s,e)){
        if(s.type===e.want){
          e.hp--;
          popText(e.x,e.y+50,"正解！");
          msg(`${e.name}に正解たこ焼き命中！`);
        }else{
          popText(e.x,e.y+50,"違う！");
          msg(`${e.name}はこのたこ焼きじゃない！`);
          e.speed+=10;
        }

        s.el.remove();
        shots.splice(i,1);

        if(e.hp<=0)defeatEnemy(j);
        break;
      }
    }

    if(s.x<-50||s.x>world.clientWidth+50){
      if(s.el.parentNode)s.el.remove();
      shots.splice(i,1);
    }
  }
}

function defeatEnemy(index){
  const e=enemies[index];
  player.score++;
  player.ammo+=2;

  const alreadySameAlly=allies.some(a=>a.type===e.allyType);
  const becomeAlly=!alreadySameAlly&&Math.random()<e.allyChance&&allies.length<4;

  if(becomeAlly){
    addAlly(e);
    msg(`${e.name}が味方になった！`);
    popText(e.x,e.y+55,"仲間！");
  }else{
    msg(`${e.name}を焼いた！`);
    popText(e.x,e.y+55,"撃破！");
  }

  e.el.remove();
  enemies.splice(index,1);
}

function addAlly(enemy){
  const el=document.createElement("div");
  el.className="ally";
  el.innerHTML=`<img src="${enemy.img}">`;
  world.appendChild(el);

  let hp=1;
  if(enemy.allyType==="protect")hp=3;
  if(enemy.allyType==="pioneer")hp=3;

  allies.push({
    el,type:enemy.allyType,
    x:player.x-45-allies.length*34,
    y:groundY,w:46,h:46,hp,cooldown:0
  });
}

function removeAlly(ally){
  const index=allies.indexOf(ally);
  if(index>=0){
    ally.el.remove();
    allies.splice(index,1);
    msg("味方タコ民が消えた！");
  }
}

function updateAllies(dt){
  allies.forEach((a,index)=>{
    let targetX=player.x-48-index*36;
    let targetY=groundY;

    if(a.type==="pioneer")targetX=player.x+player.facing*55;

    a.x+=(targetX-a.x)*Math.min(1,dt*6);
    a.y+=(targetY-a.y)*Math.min(1,dt*6);

    a.el.style.left=a.x+"px";
    a.el.style.bottom=a.y+"px";

    a.cooldown-=dt;

    if(a.type==="money"&&a.cooldown<=0){
      fireSupport(a,"money");
      a.cooldown=2.5;
    }

    if(a.type==="navi"&&a.cooldown<=0){
      fireSupport(a,"navi");
      a.cooldown=3.3;
    }

    if(a.type==="protect"&&a.cooldown<=0){
      protectBlast(a);
      a.cooldown=2.3;
    }
  });
}

function fireSupport(ally,type){
  if(enemies.length===0)return;

  const el=document.createElement("div");
  el.className=type==="money"?"moneyShot":"naviShot";
  world.appendChild(el);

  supportShots.push({
    el,type,
    x:ally.x+20,y:ally.y+25,
    vx:390,w:34,h:28
  });
}

function updateSupportShots(dt){
  for(let i=supportShots.length-1;i>=0;i--){
    const s=supportShots[i];
    s.x+=s.vx*dt;
    s.el.style.left=s.x+"px";
    s.el.style.bottom=s.y+"px";

    for(let j=enemies.length-1;j>=0;j--){
      const e=enemies[j];

      if(hit(s,e)){
        if(s.type==="money"){
          e.stunned=1.8;
          popText(e.x,e.y+50,"停止！");
          msg("札束攻撃！敵の動きが止まった！");
        }

        if(s.type==="navi"){
          e.reversed=2.0;
          popText(e.x,e.y+50,"Uターン！");
          msg("ナビ攻撃！敵がUターンした！");
        }

        s.el.remove();
        supportShots.splice(i,1);
        break;
      }
    }

    if(s.x>world.clientWidth+50){
      if(s.el.parentNode)s.el.remove();
      supportShots.splice(i,1);
    }
  }
}

function protectBlast(ally){
  let used=false;

  enemies.forEach(e=>{
    const dx=Math.abs((e.x+e.w/2)-(ally.x+ally.w/2));
    const dy=Math.abs((e.y+e.h/2)-(ally.y+ally.h/2));

    if(dx<90&&dy<80){
      e.x+=90;
      e.stunned=0.7;
      used=true;
      popText(e.x,e.y+50,"圧力！");
    }
  });

  if(used){
    ally.hp--;
    msg("未開封保護タコ民の王者の圧力！");
    if(ally.hp<=0)removeAlly(ally);
  }
}

function popText(x,y,text){
  const el=document.createElement("div");
  el.className="effectText";
  el.textContent=text;
  el.style.left=x+"px";
  el.style.bottom=y+"px";
  world.appendChild(el);
  effects.push({el,life:0.8,x,y});
}

function updateEffects(dt){
  for(let i=effects.length-1;i>=0;i--){
    const e=effects[i];
    e.life-=dt;
    e.y+=40*dt;
    e.el.style.bottom=e.y+"px";
    e.el.style.opacity=Math.max(0,e.life/0.8);

    if(e.life<=0){
      e.el.remove();
      effects.splice(i,1);
    }
  }
}

function hit(a,b){
  return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;
}

function press(name,value){keys[name]=value}

["left","right"].forEach(id=>{
  const el=document.getElementById(id);
  el.addEventListener("touchstart",e=>{e.preventDefault();press(id,true)});
  el.addEventListener("touchend",e=>{e.preventDefault();press(id,false)});
  el.addEventListener("mousedown",()=>press(id,true));
  el.addEventListener("mouseup",()=>press(id,false));
  el.addEventListener("mouseleave",()=>press(id,false));
});

document.getElementById("jump").addEventListener("touchstart",e=>{e.preventDefault();jump()});
document.getElementById("jump").addEventListener("mousedown",jump);

document.getElementById("sauceBtn").addEventListener("touchstart",e=>{e.preventDefault();attack("sauce")});
document.getElementById("plainBtn").addEventListener("touchstart",e=>{e.preventDefault();attack("plain")});
document.getElementById("rainbowBtn").addEventListener("touchstart",e=>{e.preventDefault();attack("rainbow")});

document.getElementById("sauceBtn").addEventListener("mousedown",()=>attack("sauce"));
document.getElementById("plainBtn").addEventListener("mousedown",()=>attack("plain"));
document.getElementById("rainbowBtn").addEventListener("mousedown",()=>attack("rainbow"));

window.addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft")press("left",true);
  if(e.key==="ArrowRight")press("right",true);
  if(e.key==="ArrowUp"||e.key===" ")jump();
  if(e.key==="1")attack("sauce");
  if(e.key==="2")attack("plain");
  if(e.key==="3")attack("rainbow");
});

window.addEventListener("keyup",e=>{
  if(e.key==="ArrowLeft")press("left",false);
  if(e.key==="ArrowRight")press("right",false);
});

startBtn.onclick=startGame;
document.getElementById("restart").onclick=startGame;

updateHud();
</script>
</body>
</html>
