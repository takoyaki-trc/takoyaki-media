<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>たこ焼きジャンプゲーム</title>

<style>
html,body{
  margin:0;
  padding:0;
  background:#111;
  color:#fff;
  font-family:system-ui,sans-serif;
  overflow:hidden;
  touch-action:none;
}

#game{
  position:relative;
  width:100vw;
  height:100vh;
  background:linear-gradient(#10131d,#202638 58%,#6b4a2b 59%,#2a1a0d);
  overflow:hidden;
  user-select:none;
}

#hud{
  position:absolute;
  top:10px;
  left:10px;
  z-index:20;
  font-weight:bold;
  text-shadow:2px 2px #000;
  line-height:1.6;
}

#player{
  position:absolute;
  right:8vw;
  bottom:80px;
  width:150px;
  height:auto;
  z-index:10;
  image-rendering:pixelated;
  transform-origin:center bottom;
}

.run{
  animation:runBob .25s infinite alternate;
}

@keyframes runBob{
  from{ transform:translateY(0) rotate(1deg) scaleX(-1); }
  to{ transform:translateY(-7px) rotate(-1deg) scaleX(-1); }
}

.jump{
  transform:scaleX(-1);
}

.takoyaki{
  position:absolute;
  bottom:80px;
  left:-120px;
  border-radius:50%;
  background:
    radial-gradient(circle at 35% 28%, #ffd28a 0 13%, transparent 14%),
    radial-gradient(circle at 60% 65%, #7a2d12 0 18%, transparent 19%),
    radial-gradient(circle at 50% 50%, #c96b22 0 60%, #7a2d12 61% 100%);
  box-shadow:inset -6px -8px #5b1e0d, inset 5px 5px #f0a64a;
  z-index:8;
}

.takoyaki::before{
  content:"";
  position:absolute;
  left:20%;
  top:18%;
  width:60%;
  height:12%;
  background:#fff4d8;
  transform:rotate(-20deg);
  box-shadow:0 12px #2e9b43, 10px 22px #fff4d8;
}

.line{
  position:absolute;
  bottom:72px;
  height:6px;
  border-radius:4px;
  opacity:.9;
  z-index:5;
}

#successLine{
  right:30vw;
  width:22vw;
  background:#ffe066;
  box-shadow:0 0 12px #ffe066;
}

#perfectLine{
  right:38vw;
  width:6vw;
  background:#fff;
  box-shadow:0 0 18px #fff;
}

.groundDot{
  position:absolute;
  bottom:62px;
  width:70px;
  height:4px;
  background:#ddd;
  opacity:.5;
  animation:groundMove .9s linear forwards;
}

@keyframes groundMove{
  from{ left:-100px; }
  to{ left:110vw; }
}

#message{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  z-index:30;
  background:rgba(0,0,0,.55);
  font-size:22px;
  font-weight:bold;
  line-height:1.7;
  padding:20px;
}

.hidden{
  display:none!important;
}
</style>
</head>

<body>
<div id="game">
  <div id="hud">
    SCORE：<span id="score">0</span><br>
    COMBO：<span id="combo">0</span><br>
    BONUS：×<span id="bonus">1.0</span>
  </div>

  <div id="successLine" class="line"></div>
  <div id="perfectLine" class="line"></div>

  <img id="player" class="run" src="https://ul.h3z.jp/s2peAezZ.png" alt="player">

  <div id="message">
    たこ焼きジャンプ！<br>
    ワンタップでジャンプ<br>
    着地ラインを狙え！<br><br>
    画面タップでスタート
  </div>
</div>

<script>
(() => {
  const game = document.getElementById("game");
  const player = document.getElementById("player");
  const scoreEl = document.getElementById("score");
  const comboEl = document.getElementById("combo");
  const bonusEl = document.getElementById("bonus");
  const message = document.getElementById("message");

  let started = false;
  let gameOver = false;

  let score = 0;
  let combo = 0;
  let bonus = 1;

  let playerY = 0;
  let velocityY = 0;
  const gravity = 0.9;
  const jumpPower = 18;
  let isGround = true;

  let takoyakis = [];
  let lastSpawn = 0;
  let spawnInterval = 1200;

  const groundBottom = 80;

  const sizes = [
    { name:"極小", size:34, minSpeed:5.5, maxSpeed:8.5, point:80 },
    { name:"小", size:48, minSpeed:4.8, maxSpeed:7.8, point:100 },
    { name:"中", size:66, minSpeed:4.2, maxSpeed:7.0, point:130 },
    { name:"大", size:86, minSpeed:3.8, maxSpeed:6.5, point:170 },
    { name:"特大", size:112, minSpeed:3.2, maxSpeed:5.8, point:230 }
  ];

  function updateHud(){
    scoreEl.textContent = Math.floor(score);
    comboEl.textContent = combo;
    bonusEl.textContent = bonus.toFixed(1);
  }

  function startGame(){
    if(started) return;
    started = true;
    message.classList.add("hidden");
    requestAnimationFrame(loop);
    setInterval(createGroundDot, 220);
  }

  function jump(){
    if(!isGround || gameOver) return;

    isGround = false;
    velocityY = jumpPower;
    player.classList.remove("run");
    player.classList.add("jump");
  }

  function tap(e){
    e.preventDefault();

    if(gameOver){
      location.reload();
      return;
    }

    startGame();
    jump();
  }

  game.addEventListener("pointerdown", tap);

  window.addEventListener("keydown", e => {
    if(e.code === "Space"){
      e.preventDefault();
      tap(e);
    }
  });

  function spawnTakoyaki(){
    const data = sizes[Math.floor(Math.random() * sizes.length)];
    const el = document.createElement("div");
    el.className = "takoyaki";
    el.style.width = data.size + "px";
    el.style.height = data.size + "px";
    el.style.bottom = groundBottom + "px";
    game.appendChild(el);

    takoyakis.push({
      el,
      x: -data.size,
      size: data.size,
      speed: data.minSpeed + Math.random() * (data.maxSpeed - data.minSpeed),
      point: data.point,
      passed: false,
      rotation: 0
    });

    spawnInterval = 850 + Math.random() * 850;
  }

  function createGroundDot(){
    if(!started || gameOver) return;
    const dot = document.createElement("div");
    dot.className = "groundDot";
    dot.style.width = 30 + Math.random() * 90 + "px";
    dot.style.bottom = 58 + Math.random() * 20 + "px";
    game.appendChild(dot);
    setTimeout(() => dot.remove(), 1000);
  }

  function rectsHit(a,b){
    return !(
      a.right < b.left ||
      a.left > b.right ||
      a.bottom < b.top ||
      a.top > b.bottom
    );
  }

  function checkLandingBonus(){
    const playerRect = player.getBoundingClientRect();
    const center = playerRect.left + playerRect.width / 2;
    const w = window.innerWidth;

    const successStart = w * 0.48;
    const successEnd = w * 0.70;
    const perfectStart = w * 0.56;
    const perfectEnd = w * 0.62;

    if(center >= perfectStart && center <= perfectEnd){
      combo++;
      bonus = 2.5 + combo * 0.15;
      score += 300 * bonus;
      showText("神着地！ ×" + bonus.toFixed(1));
    }else if(center >= successStart && center <= successEnd){
      combo++;
      bonus = 1.5 + combo * 0.1;
      score += 150 * bonus;
      showText("着地成功！ ×" + bonus.toFixed(1));
    }else{
      combo = 0;
      bonus = 1;
      showText("着地ズレ…");
    }

    updateHud();
  }

  function showText(text){
    const div = document.createElement("div");
    div.textContent = text;
    div.style.position = "absolute";
    div.style.left = "50%";
    div.style.top = "35%";
    div.style.transform = "translate(-50%,-50%)";
    div.style.fontSize = "24px";
    div.style.fontWeight = "bold";
    div.style.textShadow = "3px 3px #000";
    div.style.zIndex = "40";
    div.style.pointerEvents = "none";
    game.appendChild(div);

    let y = 0;
    const timer = setInterval(() => {
      y -= 2;
      div.style.transform = `translate(-50%, calc(-50% + ${y}px))`;
      div.style.opacity = String(1 + y / 60);
      if(y < -60){
        clearInterval(timer);
        div.remove();
      }
    }, 16);
  }

  function endGame(){
    gameOver = true;
    message.innerHTML =
      "焼かれた……！<br><br>" +
      "SCORE：" + Math.floor(score) + "<br>" +
      "画面タップでリトライ";
    message.classList.remove("hidden");
  }

  function loop(time){
    if(gameOver) return;

    if(time - lastSpawn > spawnInterval){
      spawnTakoyaki();
      lastSpawn = time;
    }

    playerY += velocityY;
    velocityY -= gravity;

    if(playerY <= 0){
      if(!isGround){
        playerY = 0;
        velocityY = 0;
        isGround = true;
        player.classList.add("run");
        player.classList.remove("jump");
        checkLandingBonus();
      }
    }

    player.style.bottom = groundBottom + playerY + "px";

    const playerRect = player.getBoundingClientRect();

    for(let i = takoyakis.length - 1; i >= 0; i--){
      const t = takoyakis[i];

      t.x += t.speed;
      t.rotation += t.speed * 5;

      t.el.style.left = t.x + "px";
      t.el.style.transform = `rotate(${t.rotation}deg)`;

      const rect = t.el.getBoundingClientRect();

      if(rectsHit(playerRect, rect)){
        endGame();
        return;
      }

      if(!t.passed && rect.left > playerRect.right){
        t.passed = true;
        score += t.point * bonus;
        updateHud();
      }

      if(t.x > window.innerWidth + 200){
        t.el.remove();
        takoyakis.splice(i,1);
      }
    }

    score += 0.12 * bonus;
    updateHud();

    requestAnimationFrame(loop);
  }

  updateHud();
})();
</script>
</body>
</html>
