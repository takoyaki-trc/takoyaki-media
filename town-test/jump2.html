<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>たこ焼きバトルアクション</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  background:#111;
  overflow:hidden;
  font-family:system-ui,sans-serif;
  user-select:none;
}
#game{
  width:100vw;
  height:100dvh;
  max-width:520px;
  margin:0 auto;
  background:#77c7ff;
  position:relative;
  overflow:hidden;
  border-left:4px solid #111;
  border-right:4px solid #111;
}
#hud{
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:54px;
  background:#2b160c;
  color:#fff;
  z-index:20;
  display:flex;
  justify-content:space-around;
  align-items:center;
  font-weight:900;
  border-bottom:4px solid #111;
}
.stat{
  background:#fff1b8;
  color:#2b160c;
  border:3px solid #111;
  border-radius:8px;
  padding:4px 7px;
  font-size:13px;
}
#world{
  position:absolute;
  left:0;
  top:54px;
  width:100%;
  height:calc(100% - 154px);
  overflow:hidden;
  background:linear-gradient(#85d7ff 0%,#bcecff 55%,#78c957 56%,#4fa736 100%);
}
.cloud{
  position:absolute;
  color:white;
  font-size:42px;
  opacity:.9;
  animation:cloudMove 14s linear infinite;
}
@keyframes cloudMove{
  from{transform:translateX(560px)}
  to{transform:translateX(-120px)}
}
#ground{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:62px;
  background:#6b3b1d;
  border-top:5px solid #2b160c;
}
#player{
  position:absolute;
  width:48px;
  height:64px;
  left:70px;
  bottom:62px;
  z-index:5;
  font-size:42px;
  display:flex;
  align-items:center;
  justify-content:center;
}
#player::after{
  content:"";
  position:absolute;
  bottom:-3px;
  width:38px;
  height:10px;
  background:rgba(0,0,0,.25);
  border-radius:50%;
}
.enemy{
  position:absolute;
  width:46px;
  height:46px;
  font-size:38px;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:4;
}
.enemyName{
  position:absolute;
  top:-17px;
  left:-20px;
  width:90px;
  text-align:center;
  font-size:10px;
  font-weight:900;
  color:#fff;
  text-shadow:2px 2px #000;
}
.shot{
  position:absolute;
  width:28px;
  height:28px;
  border-radius:50%;
  background:#d98234;
  border:3px solid #32180b;
  z-index:6;
}
.shot::after{
  content:"";
  position:absolute;
  width:10px;
  height:4px;
  background:#fff7d0;
  top:4px;
  left:5px;
  border-radius:50%;
}
.item{
  position:absolute;
  width:34px;
  height:34px;
  font-size:30px;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:3;
}
#message{
  position:absolute;
  left:10px;
  right:10px;
  top:65px;
  background:#fff;
  color:#2b160c;
  border:4px solid #111;
  border-radius:12px;
  padding:8px;
  text-align:center;
  font-weight:900;
  z-index:30;
}
#controls{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:100px;
  background:#2b160c;
  border-top:4px solid #111;
  z-index:25;
  display:grid;
  grid-template-columns:1fr 1fr 1fr 1fr;
  gap:8px;
  padding:10px;
}
button{
  border:4px solid #111;
  border-radius:14px;
  background:#ffd35f;
  color:#2b160c;
  font-weight:1000;
  font-size:15px;
  box-shadow:0 5px 0 #111;
}
button:active{
  transform:translateY(5px);
  box-shadow:none;
}
#start{
  position:absolute;
  left:50%;
  top:52%;
  transform:translate(-50%,-50%);
  z-index:50;
  width:210px;
  height:70px;
  background:#ff8b5a;
  font-size:20px;
}
#gameover{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.75);
  z-index:60;
  display:none;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:#fff;
  font-weight:900;
  padding:20px;
}
#gameoverBox{
  background:#fff1b8;
  color:#2b160c;
  border:5px solid #111;
  border-radius:18px;
  padding:20px;
}
#restart{
  margin-top:14px;
  width:170px;
  height:56px;
  background:#ff8b5a;
}
</style>
</head>
<body>

<div id="game">
  <div id="hud">
    <div class="stat">HP <span id="hp">5</span></div>
    <div class="stat">撃破 <span id="score">0</span></div>
    <div class="stat">弾 <span id="ammo">20</span></div>
  </div>

  <div id="message">右から来る敵を、たこ焼きで焼き払え！</div>

  <div id="world">
    <div class="cloud" style="top:30px;animation-delay:0s;">☁️</div>
    <div class="cloud" style="top:85px;animation-delay:5s;">☁️</div>
    <div class="cloud" style="top:55px;animation-delay:9s;">☁️</div>
    <div id="ground"></div>
    <div id="player">🧑‍🍳</div>
  </div>

  <button id="start">営業開始</button>

  <div id="controls">
    <button id="left">← 左</button>
    <button id="right">右 →</button>
    <button id="jump">ジャンプ</button>
    <button id="attack">投げる</button>
  </div>

  <div id="gameover">
    <div id="gameoverBox">
      <div id="resultText">結果</div>
      <button id="restart">もう一度</button>
    </div>
  </div>
</div>

<script>
const game = document.getElementById("game");
const world = document.getElementById("world");
const playerEl = document.getElementById("player");
const hpEl = document.getElementById("hp");
const scoreEl = document.getElementById("score");
const ammoEl = document.getElementById("ammo");
const msgEl = document.getElementById("message");
const startBtn = document.getElementById("start");
const gameoverEl = document.getElementById("gameover");
const resultText = document.getElementById("resultText");

let running = false;
let keys = {};
let lastTime = 0;
let spawnTimer = 0;
let itemTimer = 0;

let player = {
  x:70,
  y:62,
  vx:0,
  vy:0,
  w:48,
  h:64,
  hp:5,
  ammo:20,
  score:0,
  facing:1,
  invincible:0
};

let enemies = [];
let shots = [];
let items = [];

const groundY = 62;
const gravity = 1500;
const speed = 260;
const jumpPower = 620;

const enemyTypes = [
  {icon:"🐙", name:"焦げタコ", hp:1, speed:95, damage:1},
  {icon:"💸", name:"原価高騰", hp:2, speed:70, damage:1},
  {icon:"⭐", name:"低評価", hp:1, speed:130, damage:1},
  {icon:"🌶️", name:"辛口魔人", hp:2, speed:110, damage:1}
];

function startGame(){
  running = true;
  player.x = 70;
  player.y = groundY;
  player.vx = 0;
  player.vy = 0;
  player.hp = 5;
  player.ammo = 20;
  player.score = 0;
  player.facing = 1;
  player.invincible = 0;

  enemies.forEach(e=>e.el.remove());
  shots.forEach(s=>s.el.remove());
  items.forEach(i=>i.el.remove());
  enemies = [];
  shots = [];
  items = [];

  spawnTimer = 0;
  itemTimer = 0;
  startBtn.style.display = "none";
  gameoverEl.style.display = "none";
  msg("営業開始！たこ焼き投げ放題！");
  updateHud();

  lastTime = performance.now();
  requestAnimationFrame(loop);
}

function endGame(){
  running = false;
  resultText.innerHTML = `営業終了！<br>撃破数：${player.score}<br><br>${player.score>=20 ? "伝説の焼き手です。" : "まだ焼ける。もう一回！"}`;
  gameoverEl.style.display = "flex";
}

function msg(t){
  msgEl.textContent = t;
}

function updateHud(){
  hpEl.textContent = player.hp;
  scoreEl.textContent = player.score;
  ammoEl.textContent = player.ammo;
}

function loop(now){
  if(!running)return;

  const dt = Math.min((now - lastTime) / 1000, 0.033);
  lastTime = now;

  updatePlayer(dt);
  updateShots(dt);
  updateEnemies(dt);
  updateItems(dt);
  spawnTimer += dt;
  itemTimer += dt;

  if(spawnTimer > Math.max(0.7, 1.7 - player.score * 0.03)){
    spawnEnemy();
    spawnTimer = 0;
  }

  if(itemTimer > 7){
    spawnItem();
    itemTimer = 0;
  }

  updateHud();
  requestAnimationFrame(loop);
}

function updatePlayer(dt){
  let move = 0;
  if(keys.left)move -= 1;
  if(keys.right)move += 1;

  player.vx = move * speed;
  if(move !== 0)player.facing = move;

  player.x += player.vx * dt;
  player.x = Math.max(8, Math.min(world.clientWidth - player.w - 8, player.x));

  player.vy -= gravity * dt;
  player.y += player.vy * dt;

  if(player.y < groundY){
    player.y = groundY;
    player.vy = 0;
  }

  if(player.invincible > 0){
    player.invincible -= dt;
    playerEl.style.opacity = Math.floor(player.invincible * 10) % 2 ? ".35" : "1";
  }else{
    playerEl.style.opacity = "1";
  }

  playerEl.style.left = player.x + "px";
  playerEl.style.bottom = player.y + "px";
  playerEl.style.transform = player.facing === -1 ? "scaleX(-1)" : "scaleX(1)";
}

function jump(){
  if(!running)return;
  if(player.y <= groundY + 1){
    player.vy = jumpPower;
  }
}

function attack(){
  if(!running)return;
  if(player.ammo <= 0){
    msg("たこ焼き切れ！マヨか皿を拾え！");
    return;
  }

  player.ammo--;

  const el = document.createElement("div");
  el.className = "shot";
  world.appendChild(el);

  const shot = {
    el,
    x:player.x + (player.facing === 1 ? 40 : -8),
    y:player.y + 28,
    vx:player.facing * 520,
    w:28,
    h:28
  };
  shots.push(shot);
}

function updateShots(dt){
  for(let i=shots.length-1;i>=0;i--){
    const s = shots[i];
    s.x += s.vx * dt;

    s.el.style.left = s.x + "px";
    s.el.style.bottom = s.y + "px";

    if(s.x < -40 || s.x > world.clientWidth + 40){
      s.el.remove();
      shots.splice(i,1);
    }
  }
}

function spawnEnemy(){
  const type = enemyTypes[Math.floor(Math.random()*enemyTypes.length)];
  const el = document.createElement("div");
  el.className = "enemy";
  el.innerHTML = `<div class="enemyName">${type.name}</div>${type.icon}`;
  world.appendChild(el);

  const e = {
    el,
    x:world.clientWidth + 40,
    y:groundY + Math.random()*10,
    w:46,
    h:46,
    hp:type.hp,
    speed:type.speed + Math.min(80, player.score*2),
    damage:type.damage,
    name:type.name
  };

  enemies.push(e);
}

function updateEnemies(dt){
  for(let i=enemies.length-1;i>=0;i--){
    const e = enemies[i];
    e.x -= e.speed * dt;

    e.el.style.left = e.x + "px";
    e.el.style.bottom = e.y + "px";

    for(let j=shots.length-1;j>=0;j--){
      const s = shots[j];
      if(hit(s,e)){
        e.hp--;
        s.el.remove();
        shots.splice(j,1);

        if(e.hp <= 0){
          e.el.remove();
          enemies.splice(i,1);
          player.score++;
          player.ammo += 1;
          msg(`${e.name}を焼いた！`);
          return;
        }
      }
    }

    if(hit(player,e)){
      if(player.invincible <= 0){
        player.hp -= e.damage;
        player.invincible = 1.3;
        msg(`${e.name}にぶつかった！`);
        if(player.hp <= 0){
          updateHud();
          endGame();
          return;
        }
      }
    }

    if(e.x < -70){
      e.el.remove();
      enemies.splice(i,1);
    }
  }
}

function spawnItem(){
  const types = [
    {icon:"🥚", type:"mayo"},
    {icon:"🍘", type:"ammo"},
    {icon:"🔥", type:"power"}
  ];
  const it = types[Math.floor(Math.random()*types.length)];

  const el = document.createElement("div");
  el.className = "item";
  el.textContent = it.icon;
  world.appendChild(el);

  items.push({
    el,
    type:it.type,
    x:world.clientWidth + 30,
    y:groundY + 10 + Math.random()*90,
    w:34,
    h:34,
    speed:90
  });
}

function updateItems(dt){
  for(let i=items.length-1;i>=0;i--){
    const it = items[i];
    it.x -= it.speed * dt;
    it.el.style.left = it.x + "px";
    it.el.style.bottom = it.y + "px";

    if(hit(player,it)){
      if(it.type === "mayo"){
        player.hp = Math.min(5, player.hp+1);
        msg("マヨで回復！");
      }
      if(it.type === "ammo"){
        player.ammo += 8;
        msg("たこ焼きを補充！");
      }
      if(it.type === "power"){
        player.ammo += 15;
        msg("焼き台ブースト！弾大量補充！");
      }
      it.el.remove();
      items.splice(i,1);
      continue;
    }

    if(it.x < -50){
      it.el.remove();
      items.splice(i,1);
    }
  }
}

function hit(a,b){
  return (
    a.x < b.x + b.w &&
    a.x + a.w > b.x &&
    a.y < b.y + b.h &&
    a.y + a.h > b.y
  );
}

function press(name,v){
  keys[name]=v;
}

document.getElementById("left").addEventListener("touchstart",e=>{e.preventDefault();press("left",true)});
document.getElementById("left").addEventListener("touchend",e=>{e.preventDefault();press("left",false)});
document.getElementById("right").addEventListener("touchstart",e=>{e.preventDefault();press("right",true)});
document.getElementById("right").addEventListener("touchend",e=>{e.preventDefault();press("right",false)});
document.getElementById("jump").addEventListener("touchstart",e=>{e.preventDefault();jump()});
document.getElementById("attack").addEventListener("touchstart",e=>{e.preventDefault();attack()});

document.getElementById("left").onmousedown=()=>press("left",true);
document.getElementById("left").onmouseup=()=>press("left",false);
document.getElementById("right").onmousedown=()=>press("right",true);
document.getElementById("right").onmouseup=()=>press("right",false);
document.getElementById("jump").onmousedown=jump;
document.getElementById("attack").onmousedown=attack;

window.addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft")press("left",true);
  if(e.key==="ArrowRight")press("right",true);
  if(e.key==="ArrowUp" || e.key===" ")jump();
  if(e.key==="z" || e.key==="Z")attack();
});
window.addEventListener("keyup",e=>{
  if(e.key==="ArrowLeft")press("left",false);
  if(e.key==="ArrowRight")press("right",false);
});

startBtn.onclick=startGame;
document.getElementById("restart").onclick=startGame;
</script>
</body>
</html>
