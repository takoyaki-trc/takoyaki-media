<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>たこ焼きファーム</title>
  <link rel="stylesheet" href="assets/takofarm.css">
</head>

<body>
  <div class="wrap">

    <!-- =========================
      ヘッダー
    ========================= -->
    <header class="hud">
      <a class="hudBtn" href="./index.html" aria-label="戻る">←</a>

      <div class="hudCenter">
        <div class="hudTitle">たこ焼きファーム</div>
        <div class="hudSub">焼かれた伝説を収穫せよ</div>
      </div>

      <a class="hudBtn" href="./zukan.html" aria-label="図鑑">図鑑</a>
    </header>

    <!-- =========================
      メニュー
    ========================= -->
    <nav class="actionGrid" aria-label="メニュー">
      <a href="./roten.html" class="actionBtn">
        <span class="ico" aria-hidden="true">🏪</span>
        <span class="txt">資材屋</span>
      </a>

      <a href="./myshop.html" class="actionBtn">
        <span class="ico" aria-hidden="true">💰</span>
        <span class="txt">マイ露店</span>
      </a>

      <button class="actionBtn" id="howtoBtn" type="button">
        <span class="ico" aria-hidden="true">📜</span>
        <span class="txt">遊び方</span>
      </button>
    </nav>

    <!-- =========================
      XPパネル
    ========================= -->
    <section class="xpPanel xpPanelCompact" aria-label="経験値">
      <div class="xpMainRow">
        <div class="lvBadge">
          <span class="lvBadgeLabel">Lv</span>
          <b id="stLevel">1</b>
        </div>

        <div class="xpMain">
          <div class="xpTop xpTopCompact">
            <div>次Lvまで <b id="stXpLeft">0</b></div>
            <small><span id="stXpNow">0</span>/<span id="stXpNeed">0</span></small>
          </div>
          <div class="xpBarWrap" aria-hidden="true">
            <div id="stXpBar" class="xpBar"></div>
          </div>
        </div>
      </div>

      <div class="miniStats">
        <div class="miniStat">🔓 解放 <b id="stUnlock">3</b>/25</div>
        <div class="miniStat">📖 図鑑 <b id="stBook">0</b></div>
        <div class="miniStat">✨ XP <b id="stXP">0</b></div>
      </div>
    </section>

    <!-- =========================
      装備
    ========================= -->
    <section class="loadoutWrap" aria-label="装備">
      <div class="loadoutHead">
        <div class="loadoutTtl">装備</div>
        <div class="loadoutSub">タップで変更</div>
      </div>

      <div class="loadout">
        <button class="equipCard" id="equipSeed" type="button">
          <div class="equipTop">
            <span class="equipTag equipTag-seed">タネ</span>
          </div>
          <div class="equipImg">
            <img id="equipSeedImg" src="https://ul.h3z.jp/muPEAkao.png" alt="タネ">
            <span class="equipCnt" id="equipSeedCnt">×0</span>
          </div>
          <div class="equipName" id="equipSeedName">未装備</div>
        </button>

        <button class="equipCard" id="equipWater" type="button">
          <div class="equipTop">
            <span class="equipTag equipTag-water">ミズ</span>
          </div>
          <div class="equipImg">
            <img id="equipWaterImg" src="https://ul.h3z.jp/muPEAkao.png" alt="ミズ">
            <span class="equipCnt" id="equipWaterCnt">×0</span>
          </div>
          <div class="equipName" id="equipWaterName">未装備</div>
        </button>

        <button class="equipCard" id="equipFert" type="button">
          <div class="equipTop">
            <span class="equipTag equipTag-fert">ヒリョウ</span>
          </div>
          <div class="equipImg">
            <img id="equipFertImg" src="https://ul.h3z.jp/muPEAkao.png" alt="ヒリョウ">
            <span class="equipCnt" id="equipFertCnt">×0</span>
          </div>
          <div class="equipName" id="equipFertName">未装備</div>
        </button>
      </div>
    </section>

    <!-- =========================
      畑
    ========================= -->
    <section aria-label="畑">
      <div id="farm" class="farm"></div>
    </section>

    <!-- =========================
      フッター
    ========================= -->
    <footer class="footer">
      © たこ焼き菜々 / 焼かれた伝説<br>
      たこ焼きトレーディングカード
    </footer>

    <!-- JS用ダミー -->
    <div hidden>
      <span id="stGrow">0</span>
      <span id="stReady">0</span>
      <span id="stBurn">0</span>
    </div>

  </div>

  <!-- =========================
    モーダル
  ========================= -->
  <div id="modal" class="modal" aria-hidden="true">
    <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="mTitle">
      <div class="sheetHead">
        <div class="ttl" id="mTitle">遊び方</div>
        <button id="mClose" type="button">閉じる</button>
      </div>
      <div class="sheetBody">
        <div id="mBody"></div>
      </div>
    </div>
  </div>

  <script src="assets/takofarm.js"></script>

  <script>
    const howtoBtn = document.getElementById("howtoBtn");
    const modal = document.getElementById("modal");
    const mBody = document.getElementById("mBody");
    const mClose = document.getElementById("mClose");

    function openModal() {
      modal.setAttribute("aria-hidden", "false");
      removeInnerCloseButtons();
    }

    function closeModal() {
      modal.setAttribute("aria-hidden", "true");
    }

    function removeInnerCloseButtons() {
      const innerButtons = mBody.querySelectorAll("button, .gridSmallBtn, .row button, .sheetBody button");
      innerButtons.forEach(btn => {
        const text = (btn.textContent || "").trim();
        if (text === "閉じる") {
          btn.remove();
        }
      });
    }

    howtoBtn.onclick = () => {
      openModal();
      mBody.innerHTML = `
        <div class="howtoBlock">
          <div class="howtoTitle">たこ焼きファームの遊び方</div>

          <div class="howtoSec">
            <b>① 資材屋で準備する</b><br>
            資材屋では、育成に使う <b>タネ・ミズ・ヒリョウ</b> を購入できます。<br>
            まずはここで育てたい組み合わせをそろえます。
          </div>

          <div class="howtoSec">
            <b>② 装備を選ぶ</b><br>
            上の装備欄をタップすると、使いたい資材を変更できます。<br>
            <b>タネ・ミズ・ヒリョウの組み合わせ</b>によって、出やすいカードや育成時間、結果が変わります。
          </div>

          <div class="howtoSec">
            <b>③ 畑に植える</b><br>
            「植える」と表示された空きマスをタップすると育成開始です。<br>
            1つのマスにつき1回ずつ育成できます。
          </div>

          <div class="howtoSec">
            <b>④ 時間経過で成長する</b><br>
            育成中のマスには残り時間が表示されます。<br>
            時間が0になると収穫や回収ができる状態になります。
          </div>

          <div class="howtoSec">
            <b>⑤ 放置しすぎると焦げることがある</b><br>
            たこ焼きは放置しすぎると焦げることがあります。<br>
            焦げた場合は、通常とは違う結果になることがあります。
          </div>

          <div class="howtoSec">
            <b>⑥ 回収して図鑑に集める</b><br>
            収穫・回収したカードは図鑑に記録されます。<br>
            いろいろな組み合わせを試して、図鑑コンプリートを目指してください。
          </div>

          <div class="howtoSec">
            <b>⑦ マイ露店で売る</b><br>
            マイ露店では、自分が収穫したカードを並べて売ることができます。<br>
            育てるだけでなく、売って楽しむのもこのゲームのポイントです。
          </div>
        </div>
      `;
      removeInnerCloseButtons();
    };

    mClose.onclick = closeModal;

    modal.addEventListener("click", (e) => {
      if (e.target === modal) closeModal();
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && modal.getAttribute("aria-hidden") === "false") {
        closeModal();
      }
    });

    const observer = new MutationObserver(() => {
      removeInnerCloseButtons();
    });

    observer.observe(mBody, {
      childList: true,
      subtree: true
    });
  </script>
</body>
</html>
