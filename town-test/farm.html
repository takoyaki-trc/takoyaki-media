<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>たこ焼きファーム</title>
  <link rel="stylesheet" href="assets/takofarm.css">
</head>

<body>
  <div class="wrap">

    <!-- =========================
      🔥 HUD
    ========================= -->
    <div class="hud">
      <a class="hudBtn" href="./index.html" aria-label="戻る">←</a>

      <div class="hudCenter">
        <div class="hudTitle">たこ焼きファーム</div>
        <div class="hudSub">焼かれた伝説を収穫せよ</div>
      </div>

      <a class="hudBtn" href="./zukan.html" aria-label="図鑑">図鑑</a>
    </div>

    <!-- =========================
      🔥 ステータス
    ========================= -->
    <div class="hudStatus">
      <div class="hudItem">Lv <b id="stLevel">1</b></div>
      <div class="hudItem">XP <b id="stXP">0</b></div>
      <div class="hudItem">解放 <b id="stUnlock">3</b>/25</div>
      <div class="hudItem">図鑑 <b id="stBook">0</b></div>
    </div>

    <!-- =========================
      🔥 導線
    ========================= -->
    <div class="actionGrid">
      <a href="./roten.html" class="actionBtn isPrimary">
        <span class="ico">🏪</span>
        <span class="txt">お店</span>
      </a>

      <a href="./myshop.html" class="actionBtn">
        <span class="ico">💰</span>
        <span class="txt">露店</span>
      </a>

      <button class="actionBtn" id="howtoBtn" type="button">
        <span class="ico">📜</span>
        <span class="txt">遊び方</span>
      </button>
    </div>

    <!-- =========================
      🔥 XPバー
    ========================= -->
    <div class="xpPanel">
      <div class="xpTop">
        <div>次Lvまで <b id="stXpLeft">0</b></div>
        <small><span id="stXpNow">0</span>/<span id="stXpNeed">0</span></small>
      </div>
      <div class="xpBarWrap">
        <div id="stXpBar" class="xpBar"></div>
      </div>
    </div>

    <!-- =========================
      🔥 装備HUD
    ========================= -->
    <div class="loadoutWrap">
      <div class="loadoutHead">
        <div class="loadoutTtl">装備</div>
        <div class="loadoutSub">タップで変更</div>
      </div>

      <div class="loadout">
        <button class="equipCard" id="equipSeed" type="button">
          <div class="equipTop">
            <span class="equipTag">タネ</span>
            <span class="equipCnt" id="equipSeedCnt">×0</span>
          </div>
          <div class="equipImg">
            <img id="equipSeedImg" src="https://ul.h3z.jp/muPEAkao.png" alt="タネ">
          </div>
          <div class="equipName" id="equipSeedName">未装備</div>
        </button>

        <button class="equipCard" id="equipWater" type="button">
          <div class="equipTop">
            <span class="equipTag">ミズ</span>
            <span class="equipCnt" id="equipWaterCnt">×0</span>
          </div>
          <div class="equipImg">
            <img id="equipWaterImg" src="https://ul.h3z.jp/muPEAkao.png" alt="ミズ">
          </div>
          <div class="equipName" id="equipWaterName">未装備</div>
        </button>

        <button class="equipCard" id="equipFert" type="button">
          <div class="equipTop">
            <span class="equipTag">ヒリョウ</span>
            <span class="equipCnt" id="equipFertCnt">×0</span>
          </div>
          <div class="equipImg">
            <img id="equipFertImg" src="https://ul.h3z.jp/muPEAkao.png" alt="ヒリョウ">
          </div>
          <div class="equipName" id="equipFertName">未装備</div>
        </button>
      </div>
    </div>

    <!-- =========================
      🌱 畑
    ========================= -->
    <div id="farm" class="farm"></div>

    <!-- 🔥 JS用ダミー -->
    <div style="display:none;">
      <span id="stGrow">0</span>
      <span id="stReady">0</span>
      <span id="stBurn">0</span>
    </div>

  </div>

  <!-- =========================
    📜 モーダル
  ========================= -->
  <div id="modal" class="modal" aria-hidden="true">
    <div class="sheet">
      <div class="sheetHead">
        <div class="ttl" id="mTitle">遊び方</div>
        <button id="mClose" type="button">閉じる</button>
      </div>
      <div class="sheetBody" id="mBody"></div>
    </div>
  </div>

  <script src="assets/takofarm.js"></script>

  <!-- =========================
    🔥 遊び方
  ========================= -->
  <script>
    const howtoBtn = document.getElementById("howtoBtn");
    const modal = document.getElementById("modal");
    const mBody = document.getElementById("mBody");
    const mClose = document.getElementById("mClose");

    howtoBtn.onclick = () => {
      modal.setAttribute("aria-hidden", "false");
      mBody.innerHTML = `
        <div class="step">
          ① タネを装備<br>
          ② 畑をタップで植える<br>
          ③ 時間で収穫<br><br>
          ⚠ 放置すると焼ける
        </div>
      `;
    };

    mClose.onclick = () => {
      modal.setAttribute("aria-hidden", "true");
    };

    modal.addEventListener("click", (e) => {
      if (e.target === modal) {
        modal.setAttribute("aria-hidden", "true");
      }
    });
  </script>

</body>
</html>
