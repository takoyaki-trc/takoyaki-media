<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>神のタネ補填ページ</title>
<style>
body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(180deg,#4b2478,#120620);
  color:#fff8e8;
  font-family:"MS Gothic",sans-serif;
}
.box{
  width:min(92vw,420px);
  padding:24px;
  border-radius:20px;
  background:rgba(255,255,255,.08);
  border:2px solid rgba(255,223,140,.45);
  text-align:center;
  box-shadow:0 18px 40px rgba(0,0,0,.4);
}
h1{font-size:22px;color:#ffe8a3}
button{
  width:100%;
  min-height:54px;
  border-radius:16px;
  border:2px solid #ffe8a3;
  background:linear-gradient(180deg,#fff0b8,#dca946);
  color:#2b1c08;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
}
.result{
  margin-top:18px;
  line-height:1.8;
  font-size:15px;
}
</style>
</head>
<body>

<div class="box">
  <h1>🌱 神のタネ補填</h1>
  <p>取得できなかった神のタネを補填します。</p>
  <button id="grantBtn">残りの神のタネを受け取る</button>
  <div class="result" id="result"></div>
</div>

<script>
(() => {
  "use strict";

  const LS_INV = "tf_v1_inv";

  const GOD_SEEDS = [
    { id:"seed_god_yaki",  name:"焼き神のタネ" },
    { id:"seed_god_shop",  name:"露店神のタネ" },
    { id:"seed_god_fish",  name:"釣り神のタネ" },
    { id:"seed_god_tower", name:"塔神のタネ" }
  ];

  function loadInv(){
    try{
      return JSON.parse(localStorage.getItem(LS_INV) || "{}");
    }catch(e){
      return {};
    }
  }

  function saveInv(inv){
    localStorage.setItem(LS_INV, JSON.stringify(inv));
  }

  function grantMissingSeeds(){
    const inv = loadInv();
    const added = [];
    const already = [];

    GOD_SEEDS.forEach(seed => {
      const count = Number(inv[seed.id] || 0);

      if(count <= 0){
        inv[seed.id] = 1;
        added.push(seed.name);
      }else{
        already.push(`${seed.name}：${count}個`);
      }
    });

    saveInv(inv);

    const result = document.getElementById("result");

    if(added.length){
      result.innerHTML =
        "✅ 補填完了しました！<br><br>" +
        added.map(v => `🌱 ${v} を1個追加`).join("<br>") +
        "<br><br>称号の頂ページに戻って確認してください。";
    }else{
      result.innerHTML =
        "すべての神のタネをすでに所持しています。<br><br>" +
        already.join("<br>");
    }
  }

  document.getElementById("grantBtn").addEventListener("click", grantMissingSeeds);
})();
</script>

</body>
</html>
