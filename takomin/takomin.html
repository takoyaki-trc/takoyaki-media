<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>タコ民育成ルーム</title>
  <link rel="stylesheet" href="takomin-ui.css">
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="hud">
        <div class="chip"><div class="l">Day</div><div class="v" id="hudDay">1 / 10</div></div>
        <div class="chip"><div class="l">HP</div><div class="v" id="hudHp">0 / 0</div></div>
        <div class="chip"><div class="l">オクト</div><div class="v" id="hudOcto">0</div></div>
        <div class="chip"><div class="l">残りカード数</div><div class="v" id="hudFeed">0</div></div>
      </div>
    </div>

    <div class="layout">
      <div class="panel room" id="roomPanel">
        <div class="room-ui">
          <div class="room-badge" id="phaseBadge">幼体フェーズ</div>
          <div class="room-badge" id="personalityBadge">性格：未確定</div>
        </div>

        <div class="takomin-stage">
          <div class="balloon" id="takominBalloon">……</div>
          <div class="takomin-shell">
            <div class="takomin" id="takominBox">
              <div class="sprite" id="takominSprite"></div>
            </div>
            <div class="name" id="takominName">のっぺりタコ民</div>
          </div>
        </div>

        <div class="floor"></div>
      </div>

      <div class="panel">
        <div class="section">
          <h2 class="title">行動</h2>
          <div class="action-grid">
            <button class="btn" id="btnFeedOpen">カードを与える</button>
            <button class="btn secondary" id="btnRunEvent">今日のイベント</button>
            <button class="btn good" id="btnHeal">回復カード</button>
            <button class="btn secondary" id="btnNextDay">次の日へ（デバッグ）</button>
          </div>
          <div class="sub action-note">
            Day1〜3：正体不明 / Day4：種類判明 / Day7：性格確定 / Day10：卒業
          </div>
        </div>

        <div class="section">
          <h2 class="title">今日の状態</h2>
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-top"><div class="stat-name">攻撃</div><div class="stat-value" id="valAtk">0</div></div>
              <div class="bar"><i id="barAtk"></i></div>
            </div>
            <div class="stat-card">
              <div class="stat-top"><div class="stat-name">防御</div><div class="stat-value" id="valDef">0</div></div>
              <div class="bar"><i id="barDef"></i></div>
            </div>
            <div class="stat-card">
              <div class="stat-top"><div class="stat-name">味</div><div class="stat-value" id="valTaste">0</div></div>
              <div class="bar"><i id="barTaste"></i></div>
            </div>
            <div class="stat-card">
              <div class="stat-top"><div class="stat-name">函館愛</div><div class="stat-value" id="valLove">0</div></div>
              <div class="bar"><i id="barLove"></i></div>
            </div>
          </div>
          <canvas id="radarChart" width="500" height="260"></canvas>
        </div>

        <div class="section">
          <h2 class="title">イベント結果</h2>
          <div class="event-box" id="eventBox">今日はまだイベント未実行です。</div>
        </div>
      </div>
    </div>

    <div class="panel bottom-panel">
      <div class="section">
        <h2 class="title">ログ</h2>
        <div class="log" id="logList"></div>
      </div>
    </div>
  </div>

  <!-- 所持カードモーダル -->
  <div class="modal" id="feedModal">
    <div class="modal-panel large">
      <div class="modal-head">
        <div>
          <div class="modal-title">所持カードから選ぶ</div>
          <div class="sub">所持枚数があるカードだけ表示されます</div>
        </div>
        <button class="btn mini secondary" id="btnFeedClose" type="button">閉じる</button>
      </div>
      <div class="modal-body">
        <div class="owned-grid" id="ownedCardGrid"></div>
      </div>
    </div>
  </div>

  <!-- 強襲：導入 -->
  <div class="raid-intro hidden" id="raidIntro">
    <div class="raid-intro-dark"></div>
    <div class="raid-intro-text" id="raidIntroText">敵があらわれた!!</div>
    <div class="raid-intro-bang hidden" id="raidIntroBang">バーン!!!!</div>
  </div>

  <!-- 強襲：本戦 -->
  <div class="raid-screen hidden" id="raidScreen">
    <div class="raid-bg"></div>

    <div class="raid-top">
      <div class="raid-top-chip" id="raidEnemyName">敵名</div>
      <div class="raid-top-chip" id="raidDangerText">画面タップで敵を攻撃しろ!!</div>
    </div>

    <div class="raid-enemy-wrap">
      <div class="raid-enemy" id="raidEnemyTapArea">
        <div class="raid-enemy-sprite" id="raidEnemySprite"></div>
        <div class="hit-fx" id="hitFx"></div>
      </div>
      <div class="hp-ui enemy">
        <div class="hp-label">敵HP</div>
        <div class="bar"><i id="enemyHpBar"></i></div>
        <div class="hp-text" id="enemyHpText">0 / 0</div>
      </div>
    </div>

    <div class="raid-bottom">
      <div class="raid-player-box">
        <div class="raid-player-thumb" id="raidPlayerSprite"></div>
        <div class="hp-ui player">
          <div class="hp-label">タコ民HP</div>
          <div class="bar"><i id="playerHpBar"></i></div>
          <div class="hp-text" id="playerHpText">0 / 0</div>
        </div>
      </div>

      <div class="raid-actions-fixed">
        <button class="attack-orb" id="btnRaidAttack" type="button">
          <span class="attack-orb-icon" id="attackOrbIcon">👊</span>
          <span class="attack-orb-label" id="attackOrbLabel">タコ殴り</span>
        </button>
        <button class="raid-mini-btn secondary" id="btnUseRaw" type="button">生焼け</button>
        <button class="raid-mini-btn danger" id="btnUseBurn" type="button">焼きすぎ</button>
      </div>
    </div>

    <div class="raid-status" id="raidStatus">戦闘開始</div>
    <div class="result-box hidden" id="raidResultBox"></div>
    <button class="raid-close btn mini secondary hidden" id="btnRaidClose" type="button">閉じる</button>
  </div>

  <script src="takomin-cards.js"></script>
  <script src="takomin-items.js"></script>
  <script src="takomin-data.js"></script>
  <script src="takomin-main.js"></script>
</body>
</html>
