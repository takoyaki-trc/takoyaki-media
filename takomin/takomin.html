<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>タコ民育成ルーム</title>
  <style>
    :root{
      --bg1:#111827;
      --bg2:#1f2937;
      --bg3:#0f172a;
      --panel:#111827cc;
      --line:rgba(255,255,255,.12);
      --text:#f8fafc;
      --muted:#cbd5e1;
      --accent:#fb923c;
      --accent2:#f59e0b;
      --danger:#ef4444;
      --good:#22c55e;
      --chip:#ffffff14;
      --shadow:0 10px 25px rgba(0,0,0,.28);
      --radius:18px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:linear-gradient(180deg,var(--bg1),var(--bg3));color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif}
    body{min-height:100dvh}
    .wrap{max-width:980px;margin:0 auto;padding:14px}
    .topbar{
      display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:14px;
      position:sticky;top:0;z-index:20;padding-top:max(8px,env(safe-area-inset-top));
      background:linear-gradient(180deg,rgba(17,24,39,.96),rgba(17,24,39,.86),rgba(17,24,39,0));
      backdrop-filter: blur(8px);
    }
    .hud{
      display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;
    }
    .chip{
      background:var(--chip);border:1px solid var(--line);border-radius:14px;padding:10px 12px;box-shadow:var(--shadow)
    }
    .chip .l{font-size:11px;color:var(--muted);font-weight:800}
    .chip .v{font-size:18px;font-weight:900;margin-top:2px}
    .layout{display:grid;grid-template-columns:1.3fr .9fr;gap:14px}
    @media (max-width:860px){
      .layout{grid-template-columns:1fr}
      .hud{grid-template-columns:repeat(2,minmax(0,1fr))}
    }
    .panel{
      background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
      box-shadow:var(--shadow);overflow:hidden
    }
    .section{padding:14px}
    .section + .section{border-top:1px solid var(--line)}
    .title{font-size:18px;font-weight:900;margin:0 0 10px}
    .sub{font-size:12px;color:var(--muted)}
    .room{
      position:relative;min-height:380px;
      background:
        radial-gradient(circle at top,rgba(251,146,60,.18),transparent 34%),
        linear-gradient(180deg,#1e293b 0%,#111827 70%);
      overflow:hidden
    }
    .floor{
      position:absolute;left:0;right:0;bottom:0;height:120px;
      background:linear-gradient(180deg,#334155,#1f2937);
      border-top:1px solid rgba(255,255,255,.08)
    }
    .room-ui{
      position:absolute;top:12px;left:12px;right:12px;display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap
    }
    .room-badge{
      background:rgba(255,255,255,.1);backdrop-filter:blur(6px);
      border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:8px 10px;font-size:12px;font-weight:800
    }
    .takomin-stage{
      position:absolute;left:50%;bottom:82px;transform:translateX(-50%);
      display:flex;flex-direction:column;align-items:center;gap:10px
    }
    .balloon{
      max-width:280px;background:#fff;color:#111827;border-radius:18px;padding:10px 14px;
      font-weight:800;font-size:14px;position:relative;box-shadow:0 12px 24px rgba(0,0,0,.25)
    }
    .balloon:after{
      content:"";position:absolute;left:50%;transform:translateX(-50%);bottom:-10px;
      border:10px solid transparent;border-top-color:#fff
    }
    .takomin{
      width:160px;height:160px;border-radius:24px;
      display:grid;place-items:center;position:relative;
      background:linear-gradient(180deg,#fda4af,#fb7185);
      border:3px solid rgba(255,255,255,.18);
      box-shadow:inset 0 0 0 2px rgba(255,255,255,.08), 0 18px 26px rgba(0,0,0,.28);
    }
    .takomin .sprite{
      font-size:68px;line-height:1;
      filter:drop-shadow(0 8px 8px rgba(0,0,0,.2));
      user-select:none
    }
    .takomin .name{
      position:absolute;bottom:-34px;left:50%;transform:translateX(-50%);
      background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.12);
      padding:6px 12px;border-radius:999px;font-size:12px;font-weight:900;white-space:nowrap
    }
    .action-grid{
      display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px
    }
    .btn{
      appearance:none;border:none;border-radius:14px;padding:13px 14px;
      font-weight:900;font-size:14px;color:#fff;cursor:pointer;
      background:linear-gradient(180deg,var(--accent),var(--accent2));
      box-shadow:var(--shadow)
    }
    .btn.secondary{background:linear-gradient(180deg,#475569,#334155)}
    .btn.good{background:linear-gradient(180deg,#34d399,#10b981)}
    .btn.danger{background:linear-gradient(180deg,#f87171,#ef4444)}
    .btn:disabled{opacity:.45;cursor:not-allowed}
    .mini{
      font-size:12px;padding:10px 12px;border-radius:12px
    }
    .feed-area{
      display:grid;gap:10px
    }
    .feed-list{
      display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px
    }
    @media (max-width:520px){ .feed-list{grid-template-columns:1fr} }
    .feed-item{
      border:1px solid var(--line);border-radius:14px;padding:10px;background:rgba(255,255,255,.04);
      display:flex;justify-content:space-between;gap:10px;align-items:center
    }
    .feed-meta{min-width:0}
    .feed-name{font-size:13px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .feed-stat{font-size:11px;color:var(--muted);margin-top:4px}
    .bar{
      height:10px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden
    }
    .bar > i{
      display:block;height:100%;background:linear-gradient(90deg,#f59e0b,#fb923c);width:0%
    }
    .stats-grid{
      display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px
    }
    .stat-card{
      border:1px solid var(--line);border-radius:14px;padding:12px;background:rgba(255,255,255,.04)
    }
    .stat-top{display:flex;justify-content:space-between;align-items:center;gap:10px}
    .stat-name{font-size:12px;color:var(--muted);font-weight:800}
    .stat-value{font-size:20px;font-weight:900}
    .chart-wrap{padding:8px 0 0}
    canvas{display:block;width:100%;height:260px}
    .log{
      max-height:300px;overflow:auto;display:flex;flex-direction:column;gap:8px
    }
    .log-item{
      border:1px solid var(--line);border-radius:12px;padding:10px;background:rgba(255,255,255,.04);font-size:13px
    }
    .event-box{
      border:1px solid var(--line);border-radius:16px;padding:12px;background:rgba(255,255,255,.04)
    }
    .hidden{display:none !important}
    .raid-modal{
      position:fixed;inset:0;background:rgba(2,6,23,.82);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px
    }
    .raid-panel{
      width:min(720px,100%);background:#0f172a;border:1px solid var(--line);border-radius:20px;box-shadow:0 30px 60px rgba(0,0,0,.5);overflow:hidden
    }
    .raid-head{
      padding:14px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:12px;align-items:center
    }
    .raid-body{padding:16px}
    .raid-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    @media (max-width:720px){ .raid-grid{grid-template-columns:1fr} }
    .enemy-box,.player-box{
      border:1px solid var(--line);border-radius:16px;padding:14px;background:rgba(255,255,255,.04)
    }
    .enemy-sprite,.player-sprite{
      display:grid;place-items:center;height:120px;font-size:64px
    }
    .raid-actions{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-top:12px}
    .raid-status{font-size:12px;color:var(--muted);margin-top:8px;min-height:18px}
    .result-box{
      margin-top:14px;border:1px solid var(--line);border-radius:14px;padding:12px;background:rgba(255,255,255,.05);font-weight:800
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="hud">
        <div class="chip"><div class="l">Day</div><div class="v" id="hudDay">1 / 10</div></div>
        <div class="chip"><div class="l">HP</div><div class="v" id="hudHp">0 / 0</div></div>
        <div class="chip"><div class="l">オクト</div><div class="v" id="hudOcto">0</div></div>
        <div class="chip"><div class="l">残りカード数</div><div class="v" id="hudFeed">0</div></div>
      </div>
    </div>

    <div class="layout">
      <div class="panel room">
        <div class="room-ui">
          <div class="room-badge" id="phaseBadge">幼体フェーズ</div>
          <div class="room-badge" id="personalityBadge">性格：未確定</div>
        </div>

        <div class="takomin-stage">
          <div class="balloon" id="takominBalloon">……</div>
          <div class="takomin" id="takominBody">
            <div class="sprite" id="takominSprite">🐙</div>
            <div class="name" id="takominName">のっぺりタコ民</div>
          </div>
        </div>

        <div class="floor"></div>
      </div>

      <div class="panel">
        <div class="section">
          <h2 class="title">行動</h2>
          <div class="action-grid">
            <button class="btn" id="btnFeedOpen">カードを与える</button>
            <button class="btn secondary" id="btnRunEvent">今日のイベント</button>
            <button class="btn good" id="btnHeal">回復カード</button>
            <button class="btn secondary" id="btnNextDay">次の日へ（デバッグ）</button>
          </div>
          <div class="sub" style="margin-top:10px">
            Day1〜3：正体不明 / Day4：種類判明 / Day7：性格確定 / Day10：卒業
          </div>
        </div>

        <div class="section">
          <h2 class="title">今日の状態</h2>
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-top"><div class="stat-name">攻撃</div><div class="stat-value" id="valAtk">0</div></div>
              <div class="chart-wrap"><div class="bar"><i id="barAtk"></i></div></div>
            </div>
            <div class="stat-card">
              <div class="stat-top"><div class="stat-name">防御</div><div class="stat-value" id="valDef">0</div></div>
              <div class="chart-wrap"><div class="bar"><i id="barDef"></i></div></div>
            </div>
            <div class="stat-card">
              <div class="stat-top"><div class="stat-name">味</div><div class="stat-value" id="valTaste">0</div></div>
              <div class="chart-wrap"><div class="bar"><i id="barTaste"></i></div></div>
            </div>
            <div class="stat-card">
              <div class="stat-top"><div class="stat-name">函館愛</div><div class="stat-value" id="valLove">0</div></div>
              <div class="chart-wrap"><div class="bar"><i id="barLove"></i></div></div>
            </div>
          </div>
          <canvas id="radarChart" width="500" height="260"></canvas>
        </div>

        <div class="section">
          <h2 class="title">イベント結果</h2>
          <div class="event-box" id="eventBox">今日はまだイベント未実行です。</div>
        </div>
      </div>
    </div>

    <div class="panel" style="margin-top:14px">
      <div class="section">
        <h2 class="title">カードを与える</h2>
        <div class="feed-area">
          <div class="sub">下の候補はランダム表示です。カードデータを 50 種入れるとその中から選ばれます。</div>
          <div class="feed-list" id="feedList"></div>
        </div>
      </div>

      <div class="section">
        <h2 class="title">ログ</h2>
        <div class="log" id="logList"></div>
      </div>
    </div>
  </div>

  <div class="raid-modal" id="raidModal">
    <div class="raid-panel">
      <div class="raid-head">
        <div>
          <div style="font-size:18px;font-weight:900">強襲イベント</div>
          <div class="sub" id="raidEnemyName">敵名</div>
        </div>
        <button class="btn mini secondary" id="btnRaidClose" type="button">閉じる</button>
      </div>
      <div class="raid-body">
        <div class="raid-grid">
          <div class="enemy-box">
            <div style="font-weight:900">敵</div>
            <div class="enemy-sprite" id="raidEnemySprite">👾</div>
            <div class="sub">HP</div>
            <div class="bar"><i id="enemyHpBar"></i></div>
            <div style="font-weight:900;margin-top:8px" id="enemyHpText">0 / 0</div>
          </div>

          <div class="player-box">
            <div style="font-weight:900">タコ民</div>
            <div class="player-sprite" id="raidPlayerSprite">🐙</div>
            <div class="sub">HP</div>
            <div class="bar"><i id="playerHpBar"></i></div>
            <div style="font-weight:900;margin-top:8px" id="playerHpText">0 / 0</div>

            <div class="raid-actions">
              <button class="btn" id="btnRaidAttack" type="button">攻撃</button>
              <button class="btn secondary" id="btnUseRaw" type="button">生焼け</button>
              <button class="btn danger" id="btnUseBurn" type="button">焼きすぎ</button>
            </div>
            <div class="raid-status" id="raidStatus">戦闘開始</div>
          </div>
        </div>

        <div class="result-box hidden" id="raidResultBox"></div>
      </div>
    </div>
  </div>

  <script src="takomin-cards.js"></script>
  <script src="takomin-items.js"></script>
  <script src="takomin-data.js"></script>

  <script>
    (() => {
      "use strict";

      const KEY = {
        state: "takomin_room_v1_state",
        book: "takomin_room_v1_book",
        relics: "takomin_room_v1_relics",
        log: "takomin_room_v1_log"
      };

      const MAX_STAT = TAKOMIN_DATA.maxStat;
      const GROWTH_DAYS = TAKOMIN_DATA.growthDays;

      const $ = (sel, root = document) => root.querySelector(sel);
      const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
      const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
      const choice = arr => arr[Math.floor(Math.random() * arr.length)];
      const now = () => Date.now();

      function toTodayKeyJP() {
        const d = new Date(new Date().toLocaleString("en-US", { timeZone: "Asia/Tokyo" }));
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        return `${y}-${m}-${day}`;
      }

      function loadJSON(key, fallback) {
        try {
          const v = localStorage.getItem(key);
          return v ? JSON.parse(v) : fallback;
        } catch {
          return fallback;
        }
      }

      function saveJSON(key, value) {
        localStorage.setItem(key, JSON.stringify(value));
      }

      function weightedPick(list) {
        const total = list.reduce((s, v) => s + v.weight, 0);
        let r = Math.random() * total;
        for (const item of list) {
          r -= item.weight;
          if (r <= 0) return item;
        }
        return list[list.length - 1];
      }

      function pickTakominByRarity() {
        const rarityObj = weightedPick(TAKOMIN_DATA.rarityRate);
        const rarity = rarityObj.rarity;
        const pool = TAKOMIN_DATA.takomins.filter(v => v.rarity === rarity);
        if (!pool.length) {
          return {
            id: "fallback_n",
            name: "のっぺりタコ民",
            rarity: "N",
            attackStyle: "タコ殴り"
          };
        }
        return choice(pool);
      }

      function buildNewState() {
        const takomin = pickTakominByRarity();
        const base = TAKOMIN_DATA.rarityBaseStat[takomin.rarity] || TAKOMIN_DATA.rarityBaseStat.N;

        return {
          createdAt: now(),
          takominId: takomin.id,
          takominName: takomin.name,
          takominRarity: takomin.rarity,
          takominAttackStyle: takomin.attackStyle,
          phase: "baby",
          day: 1,
          revealed: false,
          personality: null,
          hp: base.hp,
          maxHp: base.hp,
          atk: base.atk,
          def: base.def,
          taste: base.taste,
          love: base.love,
          octo: 0,
          dailyFeedUsed: 0,
          dailyFeedLimit: TAKOMIN_DATA.rarityFeedLimit[takomin.rarity] || 3,
          lastDayKey: toTodayKeyJP(),
          todayEventDone: false,
          lockedUntil: 0,
          feedHistory: [],
          eventHistory: [],
          usedBattleItemToday: false,
          raidCurrent: null
        };
      }

      let state = loadJSON(KEY.state, null);
      if (!state) {
        state = buildNewState();
        saveJSON(KEY.state, state);
      }

      let book = loadJSON(KEY.book, []);
      let logs = loadJSON(KEY.log, []);

      function pushLog(text) {
        logs.unshift({
          at: new Date().toLocaleString("ja-JP"),
          text
        });
        logs = logs.slice(0, 60);
        saveJSON(KEY.log, logs);
      }

      function saveState() {
        saveJSON(KEY.state, state);
      }

      function isLocked() {
        return state.lockedUntil && now() < state.lockedUntil;
      }

      function getRemainingLockMs() {
        return Math.max(0, state.lockedUntil - now());
      }

      function formatRemain(ms) {
        const sec = Math.ceil(ms / 1000);
        const h = Math.floor(sec / 3600);
        const m = Math.floor((sec % 3600) / 60);
        return `${h}時間${m}分`;
      }

      function getPhaseInfo(day) {
        if (day <= 3) return { key: "baby", label: "幼体フェーズ" };
        if (day <= 6) return { key: "reveal", label: "判明フェーズ" };
        if (day === 7) return { key: "personality", label: "性格確定フェーズ" };
        if (day <= 9) return { key: "grown", label: "完成直前フェーズ" };
        return { key: "adult", label: "卒業フェーズ" };
      }

      function getTakominDisplayName() {
        if (state.day <= 3) return "のっぺりタコ民";
        return state.takominName;
      }

      function getTakominBalloonText() {
        if (isLocked()) return "ぐったりしているたこ……";
        if (state.day <= 3) return choice(TAKOMIN_DATA.phaseTexts.baby);
        if (state.day >= 7 && state.personality) {
          return {
            "攻撃型": "今日は暴れたい気分たこ",
            "防御型": "受けて立つたこ",
            "味職人型": "味で語るたこ",
            "地元愛型": "函館に捧げるたこ",
            "バランス型": "全部それなりに大事たこ"
          }[state.personality] || choice(TAKOMIN_DATA.phaseTexts.adult);
        }
        return choice(TAKOMIN_DATA.phaseTexts.adult);
      }

      function getTakominSprite() {
        if (state.day <= 3) return "🫧";
        if (state.day <= 6) return "🐙";
        if (state.day <= 9) return "🐙✨";
        return "👑";
      }

      function maybeResetDaily() {
        const today = toTodayKeyJP();
        if (state.lastDayKey !== today) {
          state.lastDayKey = today;
          state.dailyFeedUsed = 0;
          state.todayEventDone = false;
          state.usedBattleItemToday = false;
          saveState();
        }
      }

      function applyStat(name, amount) {
        state[name] = clamp(Math.floor(state[name] + amount), 0, MAX_STAT);
      }

      function applyCardToStats(card) {
        const rarityMul = TAKOMIN_DATA.rarityCardMultiplier[card.rarity] || 1;
        const scale = TAKOMIN_DATA.cardStatScale;

        applyStat("atk",   Math.round(card.atk   * scale * rarityMul));
        applyStat("def",   Math.round(card.def   * scale * rarityMul));
        applyStat("taste", Math.round(card.taste * scale * rarityMul));
        applyStat("love",  Math.round(card.love  * scale * rarityMul));
      }

      function pickFeedCandidates(count = 6) {
        if (!Array.isArray(TAKOMIN_CARDS) || !TAKOMIN_CARDS.length) return [];
        const pool = [...TAKOMIN_CARDS];
        const out = [];
        while (pool.length && out.length < count) {
          const idx = Math.floor(Math.random() * pool.length);
          out.push(pool.splice(idx, 1)[0]);
        }
        return out;
      }

      let feedCandidates = pickFeedCandidates();

      function renderFeedList() {
        const root = $("#feedList");
        root.innerHTML = "";

        if (!TAKOMIN_CARDS.length) {
          root.innerHTML = `<div class="sub">takomin-cards.js にカードを追加してください。</div>`;
          return;
        }

        feedCandidates.forEach(card => {
          const item = document.createElement("div");
          item.className = "feed-item";
          item.innerHTML = `
            <div class="feed-meta">
              <div class="feed-name">${escapeHtml(card.name || card.id)}</div>
              <div class="feed-stat">[${card.rarity}] 攻:${card.atk} / 防:${card.def} / 味:${card.taste} / 愛:${card.love}</div>
            </div>
            <button class="btn mini" type="button">与える</button>
          `;
          item.querySelector("button").addEventListener("click", () => feedCard(card));
          root.appendChild(item);
        });
      }

      function feedCard(card) {
        maybeResetDaily();

        if (isLocked()) {
          alert(`行動不能中です。残り ${formatRemain(getRemainingLockMs())}`);
          return;
        }

        if (state.dailyFeedUsed >= state.dailyFeedLimit) {
          alert(`今日はこれ以上与えられません（上限 ${state.dailyFeedLimit} 枚）`);
          return;
        }

        applyCardToStats(card);
        state.dailyFeedUsed += 1;
        state.feedHistory.push({
          day: state.day,
          cardId: card.id,
          cardName: card.name || card.id
        });
        state.feedHistory = state.feedHistory.slice(-200);

        pushLog(`Day${state.day}: ${card.name || card.id} を与えた`);
        saveState();
        renderAll();
      }

      function determinePersonality() {
        const arr = [
          { key: "攻撃型", value: state.atk },
          { key: "防御型", value: state.def },
          { key: "味職人型", value: state.taste },
          { key: "地元愛型", value: state.love }
        ].sort((a, b) => b.value - a.value);

        if (Math.abs(arr[0].value - arr[1].value) <= 12) {
          state.personality = "バランス型";
        } else {
          state.personality = arr[0].key;
        }
      }

      function advanceDay() {
        maybeResetDaily();

        if (isLocked()) {
          alert(`行動不能中です。残り ${formatRemain(getRemainingLockMs())}`);
          return;
        }

        if (state.day >= GROWTH_DAYS) {
          graduateTakomin();
          return;
        }

        state.day += 1;

        if (state.day === 4) {
          state.revealed = true;
          pushLog(`Day4: ${state.takominName} の正体が判明`);
        }

        if (state.day === 7) {
          determinePersonality();
          pushLog(`Day7: 性格が ${state.personality} に確定`);
        }

        if (state.day === 10) {
          pushLog(`Day10: 大人のタコ民になった`);
        }

        state.dailyFeedUsed = 0;
        state.todayEventDone = false;
        state.usedBattleItemToday = false;
        saveState();
        renderAll();
      }

      function graduateTakomin() {
        const rewardOcto = Math.floor(
          (state.atk + state.def + state.taste + state.love) * 0.8 + rand(50, 180)
        );

        const record = {
          takominId: state.takominId,
          name: state.takominName,
          rarity: state.takominRarity,
          personality: state.personality || "未確定",
          finalStats: {
            hp: state.hp,
            atk: state.atk,
            def: state.def,
            taste: state.taste,
            love: state.love
          },
          rewardOcto,
          graduatedAt: new Date().toLocaleString("ja-JP")
        };

        book.unshift(record);
        book = book.slice(0, 200);
        saveJSON(KEY.book, book);

        pushLog(`${state.takominName}「今まで世話になったな！」 報酬 ${rewardOcto} オクト`);
        alert(`${state.takominName}「今まで世話になったな！」\n${rewardOcto}オクトを残して旅立ちました。`);

        localStorage.removeItem(KEY.state);
        state = buildNewState();
        saveState();
        renderAll();
      }

      function setEventText(text) {
        $("#eventBox").textContent = text;
      }

      function runDailyEvent() {
        maybeResetDaily();

        if (isLocked()) {
          alert(`行動不能中です。残り ${formatRemain(getRemainingLockMs())}`);
          return;
        }

        if (state.todayEventDone) {
          alert("今日はもうイベントを実行済みです。");
          return;
        }

        const r = Math.random();

        state.todayEventDone = true;

        if (r < TAKOMIN_DATA.eventRate.janken) {
          runJanken();
        } else if (r < TAKOMIN_DATA.eventRate.janken + TAKOMIN_DATA.eventRate.raid) {
          runRaid();
        } else {
          runMemoryGame();
        }

        saveState();
        renderAll();
      }

      function runJanken() {
        const win = Math.random() < 0.55;
        if (win) {
          const targets = ["atk", "def", "taste", "love"];
          const t = choice(targets);
          const gain = rand(5, 12);
          applyStat(t, gain);

          const jpName = { atk: "攻撃", def: "防御", taste: "味", love: "函館愛" }[t];
          setEventText(`じゃんけんに勝った！ ${jpName} が ${gain} 上がった。`);
          pushLog(`じゃんけん勝利：${jpName}+${gain}`);
        } else {
          state.hp = clamp(state.hp - 15, 0, state.maxHp);
          setEventText("じゃんけんに負けた……HPが15減った。");
          pushLog("じゃんけん敗北：HP-15");
          checkLockIfNeeded();
        }
      }

      function runMemoryGame() {
        const pairs = rand(1, 5);
        const gain = pairs === 5 ? 14 : pairs === 4 ? 10 : pairs === 3 ? 7 : pairs === 2 ? 5 : 3;

        const targets = ["atk", "def", "taste", "love"];
        const t = choice(targets);
        applyStat(t, gain);

        const jpName = { atk: "攻撃", def: "防御", taste: "味", love: "函館愛" }[t];
        setEventText(`神経衰弱で ${pairs} 組そろえた！ ${jpName} が ${gain} 上がった。`);
        pushLog(`神経衰弱：${pairs}組 / ${jpName}+${gain}`);
      }

      // =========================
      // 強襲
      // =========================
      let raidTimer = null;

      function buildRaidEnemy() {
        const enemyInfo = weightedPick(TAKOMIN_DATA.raidEnemyRate);
        const base = TAKOMIN_DATA.raidEnemies[enemyInfo.id];

        return {
          ...base,
          hp: base.maxHp,
          stunnedUntil: 0,
          usedItem: false
        };
      }

      function runRaid() {
        state.raidCurrent = {
          enemy: buildRaidEnemy(),
          playerHp: state.hp,
          result: null,
          finished: false
        };
        openRaidModal();
        renderRaid();
        setEventText(`強襲発生！ ${state.raidCurrent.enemy.name} が部屋に紛れ込んだ。`);
        pushLog(`強襲開始：${state.raidCurrent.enemy.name}`);
        startRaidEnemyLoop();
      }

      function openRaidModal() {
        $("#raidModal").style.display = "flex";
      }

      function closeRaidModal(force = false) {
        if (state.raidCurrent && !state.raidCurrent.finished && !force) return;
        stopRaidEnemyLoop();
        $("#raidModal").style.display = "none";
      }

      function startRaidEnemyLoop() {
        stopRaidEnemyLoop();
        if (!state.raidCurrent || state.raidCurrent.finished) return;

        const loop = () => {
          if (!state.raidCurrent || state.raidCurrent.finished) return;
          const raid = state.raidCurrent;
          const enemy = raid.enemy;

          if (now() < enemy.stunnedUntil) {
            raidTimer = setTimeout(loop, 250);
            renderRaid();
            return;
          }

          const damage = clamp(Math.round(enemy.attack - state.def * 0.15), 3, 9999);
          raid.playerHp = clamp(raid.playerHp - damage, 0, state.maxHp);
          $("#raidStatus").textContent = `${enemy.name} の攻撃！ HP -${damage}`;

          if (raid.playerHp <= 0) {
            finishRaid(false);
            return;
          }

          renderRaid();
          raidTimer = setTimeout(loop, enemy.attackIntervalMs);
        };

        raidTimer = setTimeout(loop, state.raidCurrent.enemy.attackIntervalMs);
      }

      function stopRaidEnemyLoop() {
        if (raidTimer) {
          clearTimeout(raidTimer);
          raidTimer = null;
        }
      }

      function attackRaid() {
        if (!state.raidCurrent || state.raidCurrent.finished) return;

        const raid = state.raidCurrent;
        const enemy = raid.enemy;

        let baseAttack = state.day <= 3 ? "タコ殴り" : state.takominAttackStyle || "固有攻撃";
        let damage = clamp(Math.round(6 + state.atk * 0.22), 1, 9999);

        enemy.hp = clamp(enemy.hp - damage, 0, enemy.maxHp);
        $("#raidStatus").textContent = `${baseAttack}！ ${enemy.name} に ${damage} ダメージ`;

        if (enemy.hp <= 0) {
          finishRaid(true);
          return;
        }

        renderRaid();
      }

      function useRaidItem(itemId) {
        if (!state.raidCurrent || state.raidCurrent.finished) return;
        if (state.raidCurrent.enemy.usedItem) {
          alert("この強襲ではもうアイテムを使っています。");
          return;
        }

        const raid = state.raidCurrent;
        const enemy = raid.enemy;

        if (itemId === "SP-RAW") {
          enemy.stunnedUntil = now() + (TAKOMIN_ITEMS.battleItems.find(v => v.id === "SP-RAW")?.stunSeconds || 3) * 1000;
          enemy.usedItem = true;
          $("#raidStatus").textContent = `生焼けカード！ ${enemy.name} が腹を壊して動けない。`;
          pushLog(`強襲：生焼けカードを使用`);
        }

        if (itemId === "SP-BURN") {
          const cutRate = TAKOMIN_ITEMS.battleItems.find(v => v.id === "SP-BURN")?.cutRate || (1 / 3);
          const cut = Math.max(1, Math.floor(enemy.hp * cutRate));
          enemy.hp = clamp(enemy.hp - cut, 0, enemy.maxHp);
          enemy.usedItem = true;
          $("#raidStatus").textContent = `焼きすぎたカード！ ${enemy.name} のHPを ${cut} 削った。`;
          pushLog(`強襲：焼きすぎたカードを使用 / 敵HP-${cut}`);

          if (enemy.hp <= 0) {
            finishRaid(true);
            return;
          }
        }

        renderRaid();
      }

      function finishRaid(win) {
        stopRaidEnemyLoop();

        if (!state.raidCurrent) return;
        const raid = state.raidCurrent;
        raid.finished = true;

        if (win) {
          const enemy = raid.enemy;
          const gain = rand(enemy.rewardMin, enemy.rewardMax);

          applyStat("atk", gain);
          applyStat("def", gain);
          applyStat("taste", gain);
          applyStat("love", gain);

          const octo = rand(enemy.octoMin, enemy.octoMax);
          state.octo += octo;
          state.hp = clamp(raid.playerHp, 0, state.maxHp);

          raid.result = `勝利！ 全パラメーター +${gain} / オクト +${octo}`;
          setEventText(`${enemy.name}を撃退！ 全パラメーター +${gain}、オクト +${octo}`);
          pushLog(`強襲勝利：${enemy.name} / 全パラ+${gain} / オクト+${octo}`);
        } else {
          state.hp = 0;
          state.lockedUntil = now() + 24 * 60 * 60 * 1000;
          raid.result = `敗北……HPが尽きたため24時間行動不能。`;
          setEventText(`${raid.enemy.name} に敗北……24時間何もできない。`);
          pushLog(`強襲敗北：${raid.enemy.name} / 24時間行動不能`);
        }

        saveState();
        renderRaid();
        renderAll();
      }

      function renderRaid() {
        const raid = state.raidCurrent;
        if (!raid) return;

        $("#raidEnemyName").textContent = raid.enemy.name;
        $("#raidEnemySprite").textContent =
          raid.enemy.id === "gokiburi" ? "🪳" :
          raid.enemy.id === "takonyan" ? "🐱" : "🐻";
        $("#raidPlayerSprite").textContent = getTakominSprite();

        $("#enemyHpText").textContent = `${raid.enemy.hp} / ${raid.enemy.maxHp}`;
        $("#enemyHpBar").style.width = `${(raid.enemy.hp / raid.enemy.maxHp) * 100}%`;

        $("#playerHpText").textContent = `${raid.playerHp} / ${state.maxHp}`;
        $("#playerHpBar").style.width = `${(raid.playerHp / state.maxHp) * 100}%`;

        $("#btnRaidAttack").disabled = raid.finished;
        $("#btnUseRaw").disabled = raid.finished || raid.enemy.usedItem;
        $("#btnUseBurn").disabled = raid.finished || raid.enemy.usedItem;

        const resultBox = $("#raidResultBox");
        if (raid.finished) {
          resultBox.classList.remove("hidden");
          resultBox.textContent = raid.result || "";
        } else {
          resultBox.classList.add("hidden");
          resultBox.textContent = "";
        }
      }

      // =========================
      // 回復
      // =========================
      function healWithCard() {
        if (!TAKOMIN_ITEMS.healCards?.length) {
          alert("回復カードがありません。");
          return;
        }

        const healCard = TAKOMIN_ITEMS.healCards[0];
        const healAmount = Math.max(1, Math.floor(state.maxHp * (healCard.healValue || 0.5)));

        state.hp = clamp(state.hp + healAmount, 0, state.maxHp);

        if (isLocked() && state.hp > 0) {
          state.lockedUntil = 0;
          pushLog(`回復カード使用：行動不能から復帰`);
        }

        setEventText(`${healCard.name} で HP を ${healAmount} 回復した。`);
        pushLog(`回復カード使用：HP+${healAmount}`);
        saveState();
        renderAll();
      }

      function checkLockIfNeeded() {
        if (state.hp <= 0) {
          state.hp = 0;
          state.lockedUntil = now() + 24 * 60 * 60 * 1000;
        }
      }

      // =========================
      // 描画
      // =========================
      function renderHUD() {
        $("#hudDay").textContent = `${state.day} / ${GROWTH_DAYS}`;
        $("#hudHp").textContent = `${state.hp} / ${state.maxHp}`;
        $("#hudOcto").textContent = String(state.octo);
        $("#hudFeed").textContent = `${Math.max(0, state.dailyFeedLimit - state.dailyFeedUsed)} / ${state.dailyFeedLimit}`;
      }

      function renderRoom() {
        const phase = getPhaseInfo(state.day);
        $("#phaseBadge").textContent = phase.label;
        $("#personalityBadge").textContent = `性格：${state.personality || "未確定"}`;
        $("#takominBalloon").textContent = getTakominBalloonText();
        $("#takominName").textContent = getTakominDisplayName();
        $("#takominSprite").textContent = getTakominSprite();
      }

      function renderStats() {
        $("#valAtk").textContent = state.atk;
        $("#valDef").textContent = state.def;
        $("#valTaste").textContent = state.taste;
        $("#valLove").textContent = state.love;

        $("#barAtk").style.width = `${state.atk / MAX_STAT * 100}%`;
        $("#barDef").style.width = `${state.def / MAX_STAT * 100}%`;
        $("#barTaste").style.width = `${state.taste / MAX_STAT * 100}%`;
        $("#barLove").style.width = `${state.love / MAX_STAT * 100}%`;
      }

      function drawRadarChart() {
        const canvas = $("#radarChart");
        const ctx = canvas.getContext("2d");
        const dpr = Math.max(1, window.devicePixelRatio || 1);
        const width = canvas.clientWidth || 500;
        const height = 260;

        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        ctx.clearRect(0, 0, width, height);

        const cx = width / 2;
        const cy = height / 2;
        const radius = Math.min(width, height) * 0.31;

        const labels = [
          { name: "HP", value: state.hp },
          { name: "攻撃", value: state.atk },
          { name: "防御", value: state.def },
          { name: "味", value: state.taste },
          { name: "函館愛", value: state.love }
        ];

        ctx.strokeStyle = "rgba(255,255,255,.16)";
        ctx.lineWidth = 1;

        for (let ring = 1; ring <= 5; ring++) {
          ctx.beginPath();
          labels.forEach((_, i) => {
            const angle = -Math.PI / 2 + (Math.PI * 2 / labels.length) * i;
            const r = radius * (ring / 5);
            const x = cx + Math.cos(angle) * r;
            const y = cy + Math.sin(angle) * r;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          });
          ctx.closePath();
          ctx.stroke();
        }

        labels.forEach((label, i) => {
          const angle = -Math.PI / 2 + (Math.PI * 2 / labels.length) * i;
          const x = cx + Math.cos(angle) * radius;
          const y = cy + Math.sin(angle) * radius;
          ctx.beginPath();
          ctx.moveTo(cx, cy);
          ctx.lineTo(x, y);
          ctx.stroke();

          const lx = cx + Math.cos(angle) * (radius + 20);
          const ly = cy + Math.sin(angle) * (radius + 20);
          ctx.fillStyle = "rgba(255,255,255,.9)";
          ctx.font = "12px sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(label.name, lx, ly);
        });

        ctx.beginPath();
        labels.forEach((label, i) => {
          const angle = -Math.PI / 2 + (Math.PI * 2 / labels.length) * i;
          const r = radius * (clamp(label.value, 0, MAX_STAT) / MAX_STAT);
          const x = cx + Math.cos(angle) * r;
          const y = cy + Math.sin(angle) * r;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        });
        ctx.closePath();
        ctx.fillStyle = "rgba(251,146,60,.28)";
        ctx.strokeStyle = "rgba(251,146,60,1)";
        ctx.lineWidth = 2;
        ctx.fill();
        ctx.stroke();
      }

      function renderLogs() {
        const root = $("#logList");
        root.innerHTML = "";
        if (!logs.length) {
          root.innerHTML = `<div class="sub">まだログがありません。</div>`;
          return;
        }
        logs.forEach(item => {
          const el = document.createElement("div");
          el.className = "log-item";
          el.innerHTML = `<strong>${escapeHtml(item.at)}</strong><br>${escapeHtml(item.text)}`;
          root.appendChild(el);
        });
      }

      function renderButtons() {
        const locked = isLocked();

        $("#btnFeedOpen").disabled = locked;
        $("#btnRunEvent").disabled = locked || state.todayEventDone;
        $("#btnNextDay").disabled = locked;

        if (locked) {
          setEventText(`現在行動不能中です。残り ${formatRemain(getRemainingLockMs())}`);
        }
      }

      function renderAll() {
        maybeResetDaily();
        renderHUD();
        renderRoom();
        renderStats();
        drawRadarChart();
        renderLogs();
        renderButtons();
        renderFeedList();
      }

      function escapeHtml(str) {
        return String(str)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      // =========================
      // イベント
      // =========================
      $("#btnFeedOpen").addEventListener("click", () => {
        feedCandidates = pickFeedCandidates();
        renderFeedList();
      });

      $("#btnRunEvent").addEventListener("click", runDailyEvent);
      $("#btnHeal").addEventListener("click", healWithCard);
      $("#btnNextDay").addEventListener("click", advanceDay);

      $("#btnRaidAttack").addEventListener("click", attackRaid);
      $("#btnUseRaw").addEventListener("click", () => useRaidItem("SP-RAW"));
      $("#btnUseBurn").addEventListener("click", () => useRaidItem("SP-BURN"));
      $("#btnRaidClose").addEventListener("click", () => closeRaidModal(false));

      window.addEventListener("resize", drawRadarChart);

      renderAll();
    })();
  </script>
</body>
</html>
